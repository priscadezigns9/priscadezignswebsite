<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Spec-Analyzer | The Tech Scout HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FFD700; --bg: #050505; --text: #fff; --border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }

        header { position: fixed; top: 0; width: 100%; padding: 25px 8%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(5,5,5,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; color: #fff; }
        
        .hero { min-height: 100vh; padding: 180px 8% 100px; text-align: center; }
        .tag { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 5px; color: var(--accent); font-weight: 900; margin-bottom: 20px; }
        h1 { font-size: clamp(3rem, 10vw, 7rem); font-weight: 900; line-height: 0.9; margin-bottom: 60px; }

        .interface { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 60px; max-width: 900px; margin: 0 auto; }
        .input-group { display: flex; gap: 20px; margin-top: 20px; }
        input { flex: 1; padding: 20px; background: transparent; border: 1px solid var(--border); color: #fff; font-family: inherit; font-size: 1.1rem; }
        .run-btn { padding: 0 40px; background: var(--accent); color: #000; border: none; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }

        #ai-result { margin-top: 60px; }
        .report { text-align: left; animation: slideUp 0.8s; border-left: 2px solid var(--accent); padding-left: 40px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 30px; }
        .metric-box { padding: 20px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); }
        .m-label { font-size: 0.6rem; text-transform: uppercase; color: #888; margin-bottom: 10px; }
        .m-val { font-size: 1.2rem; font-weight: 700; color: #fff; }

        .acq-btn { display: inline-block; width: 100%; text-align: center; background: #fff; color: #000; text-decoration: none; padding: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; margin-top: 40px; }

        footer { padding: 100px 8% 50px; text-align: center; border-top: 1px solid var(--border); opacity: 0.3; }
    </style>
</head>
<body>
    <header>
        <a href="../" class="logo">TECH SCOUT</a>
        <nav><a href="../" style="color:#fff; text-decoration:none; font-weight:700; font-size:0.7rem; text-transform:uppercase; letter-spacing:2px;">Intel</a></nav>
    </header>

    <main class="hero">
        <span class="tag">Neural Spec-Analyzer V1.0</span>
        <h1>Tech Intelligence.</h1>

        <div class="interface">
            <p style="color:#666; margin-bottom:40px; text-transform:uppercase; letter-spacing:3px; font-size:0.8rem;">Identify Gadget or Component for Benchmarking</p>
            <div class="input-group">
                <input type="text" id="ai-input" placeholder="e.g. iPhone 16 Pro, M4 Max Chip, Nvidia 50-series..." autocomplete="off">
                <button class="run-btn" onclick="runAnalysis()">Analyze</button>
            </div>
            <div id="ai-result"></div>
        </div>
    </main>

    <footer>© 2026 THE TECH SCOUT HQ // ARCHIVAL INNOVATION INTELLIGENCE</footer>

    <script>
    function runAnalysis() {
        const input = document.getElementById('ai-input').value.trim();
        const res = document.getElementById('ai-result');
        if(!input) return;

        res.innerHTML = '<p style="color:var(--accent); font-weight:900; letter-spacing:8px; margin-top:40px;">CRUNCHING ARCHIVAL DATA...</p>';

        setTimeout(() => {
            const query = input.toLowerCase(); const tag = "priscadezigns-20";
            let tier = "S-Tier"; let longevity = "9.2/10";
            
            res.innerHTML = `
                <div class="report">
                    <span class="tag" style="font-size:0.6rem;">Scan Complete // Intelligence Verdict: Recommended</span>
                    <h2 style="font-size:2.5rem; margin:10px 0 30px;">Archival Spec Readout</h2>
                    
                    <div class="metric-grid">
                        <div class="metric-box"><div class="m-label">Performance Tier</div><div class="m-val">${tier}</div></div>
                        <div class="metric-box"><div class="m-label">Longevity Index</div><div class="m-val">${longevity}</div></div>
                        <div class="metric-box"><div class="m-label">Innovation Delta</div><div class="m-val">+18.5%</div></div>
                    </div>

                    <p style="color:#888; font-size:0.9rem;">Intelligence confirms "${input}" as a high-fidelity acquisition. Technical trajectory suggests this silhouette remains a top-tier asset for the 2026-2027 cycle.</p>

                    <a href="https://www.amazon.com/s?k=${encodeURIComponent(input)}&tag=${tag}" target="_blank" class="acq-btn">Acquire Gadget →</a>
                </div>
            `;
        }, 1800);
    }
    </script>
</body>
</html>
