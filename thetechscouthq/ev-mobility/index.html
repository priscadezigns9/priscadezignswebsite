<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolve Mobility Showroom</title>
    <style>
        :root {
            --bg: #000;
            --text: #fffff0;
            --accent: #d4af37;
        }
        body {
            margin: 0;
            padding: 0;
            background: var(--bg) url('https://share.zapia.com/13j61jz1b9yjqpgddl5cle') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .overlay {
            background: rgba(0,0,0,0.7);
            padding: 60px;
            border-radius: 2px;
            text-align: center;
            border: 1px solid rgba(255,255,240,0.1);
        }
        h1 {
            font-size: 3.5rem;
            letter-spacing: 15px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        h2 {
            font-weight: 300;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent);
            margin-top: 0;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 50px;
        }
        .gallery-item {
            padding: 20px 40px;
            border: 1px solid var(--text);
            color: var(--text);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
        }
        .gallery-item:hover {
            background: var(--text);
            color: var(--bg);
        }
        .footer {
            margin-top: 60px;
            font-size: 0.8rem;
            opacity: 0.6;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <h2>The Digital</h2>
        <h1>Showroom</h1>
        <div class="gallery-grid">
            <a href="https://site.zapia.com/jhuyw9wx" class="gallery-item">Denza D9</a>
            <a href="https://site.zapia.com/x4musqtc" class="gallery-item">iCar 03</a>
            <a href="#" class="gallery-item" style="opacity: 0.5;">Sealion 7 (Coming Soon)</a>
            <a href="#" class="gallery-item" style="opacity: 0.5;">Hyptec HT (Coming Soon)</a>
        </div>
        <div class="footer">EVOLVE MOBILITY LIMITED | TRINIDAD & TOBAGO</div>
    </div>


<style>
  
  
  
  
  @media (prefers-reduced-motion: reduce) {
    
</style>


</body>
</html>
