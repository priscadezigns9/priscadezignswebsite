<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Boutique | Tech Scout HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00FF41; --bg: #0D0D0D; --text: #FFFFFF; --border: rgba(128,128,128,0.1); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        nav { height: 80px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Inter', serif; font-size: 1.5rem; color: var(--primary); text-decoration: none; font-weight: 700; text-transform: uppercase; }
        .shop-header { padding: 80px 5% 40px; text-align: center; }
        h1 { font-family: 'Inter', serif; font-size: 3.5rem; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 40px 5%; }
        .card { background: rgba(128,128,128,0.05); border: 1px solid var(--border); padding: 20px; text-decoration: none; color: inherit; transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .img-box { aspect-ratio: 1/1; background: #fff; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .name { font-family: 'Inter', serif; font-size: 1.3rem; margin-bottom: 15px; flex-grow: 1; }
        .btn { background: var(--primary); color: #000; text-align: center; padding: 12px; font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        footer { padding: 40px 5%; text-align: center; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>
    <nav><a href="../" class="logo">Tech Scout HQ</a></nav>
    <div class="shop-header"><h1>The Boutique</h1></div>
    <main class="grid">
        <a href="https://www.amazon.com/s?k=Razer+Viper+V3+Pro&tag=priscadezigns-20" class="card" target="_blank">
            <div class="img-box"><img src="https://m.media-amazon.com/images/I/51Cps60NQpL._AC_SL1000_.jpg" alt="Razer Viper V3 Pro"></div>
            <div style="font-size:0.6rem; color:var(--primary); font-weight:700; text-transform:uppercase; margin-bottom:10px;">Peripherals</div>
            <h3 class="name">Razer Viper V3 Pro</h3>
            <div class="btn">Acquire Essential</div>
        </a>
        <a href="https://www.amazon.com/s?k=SteelSeries+Arctis+Nova+7&tag=priscadezigns-20" class="card" target="_blank">
            <div class="img-box"><img src="https://m.media-amazon.com/images/I/61KAcyfr66L._AC_SL1000_.jpg" alt="SteelSeries Arctis Nova 7"></div>
            <div style="font-size:0.6rem; color:var(--primary); font-weight:700; text-transform:uppercase; margin-bottom:10px;">Peripherals</div>
            <h3 class="name">SteelSeries Arctis Nova 7</h3>
            <div class="btn">Acquire Essential</div>
        </a>
        <a href="https://www.amazon.com/s?k=Apple+MacBook+Air+M3&tag=priscadezigns-20" class="card" target="_blank">
            <div class="img-box"><img src="https://m.media-amazon.com/images/I/71RT7klbBkL._AC_SL1000_.jpg" alt="Apple MacBook Air M3"></div>
            <div style="font-size:0.6rem; color:var(--primary); font-weight:700; text-transform:uppercase; margin-bottom:10px;">Computing</div>
            <h3 class="name">Apple MacBook Air M3</h3>
            <div class="btn">Acquire Essential</div>
        </a>
        <a href="https://www.amazon.com/s?k=Samsung+T7+Shield+SSD&tag=priscadezigns-20" class="card" target="_blank">
            <div class="img-box"><img src="https://m.media-amazon.com/images/I/81-8S8hVXL._AC_SL1000_.jpg" alt="Samsung T7 Shield SSD"></div>
            <div style="font-size:0.6rem; color:var(--primary); font-weight:700; text-transform:uppercase; margin-bottom:10px;">Computing</div>
            <h3 class="name">Samsung T7 Shield SSD</h3>
            <div class="btn">Acquire Essential</div>
        </a>
    </main>
    <footer>&copy; 2026 TECH SCOUT HQ // PRISCA DEZIGNS</footer>
</body>
</html>
