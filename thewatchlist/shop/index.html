<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Horological Vault | The Watch List</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C8A96E; --bg: #050505; --text: #FFFFFF; --border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        nav { padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { display: flex; align-items: center; text-decoration: none; color: #fff; }
        .logo img { height: 40px; margin-right: 15px; border-radius: 50%; }
        .container { max-width: 1200px; margin: 0 auto; padding: 80px 5%; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; margin-bottom: 50px; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 50px; }
        .card { background: #0A0A0A; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; padding: 30px; transition: 0.4s; text-decoration: none; color: inherit; position: relative; }
        .card:hover { border-color: var(--gold); transform: translateY(-8px); }
        .img-box { aspect-ratio: 4/5; background: #fff; margin-bottom: 30px; border-radius: 2px; display: flex; align-items: center; justify-content: center; padding: 35px; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; mix-blend-mode: multiply; }
        .item-category { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; color: var(--gold); font-weight: 700; margin-bottom: 15px; }
        .item-title { font-family: 'Cormorant Garamond', serif; font-weight: 700; margin-bottom: 15px; font-size: 1.4rem; line-height: 1.1; }
        .item-price { font-weight: 700; font-size: 1.2rem; color: var(--gold); margin-bottom: 25px; }
        .btn { display: inline-block; width: 100%; text-align: center; border: 1px solid var(--gold); color: var(--gold); padding: 14px; border-radius: 2px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; transition: 0.3s; }
        .card:hover .btn { background: var(--gold); color: #000; }
    </style>
</head>
<body>
    <nav>
        <a href="../" class="logo">
            <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/logos/the-watch-list.png" alt="The Watch List">
            <span style="font-family:'Cormorant Garamond'; font-size:1.5rem; font-weight:700; letter-spacing:1px;">THE WATCH LIST</span>
        </a>
    </nav>
    <div class="container">
        <h1>HOROLOGICAL VAULT</h1>
        <div class="grid">
            <a href="https://www.amazon.com/dp/B0006AAS5G?tag=priscadezigns-20" class="card" target="_blank">
                <div class="item-category">Classic</div>
                <div class="img-box"><img src="https://m.media-amazon.com/images/I/719fN4A8GEL._AC_SL1500_.jpg" alt="Seiko 5"></div>
                <div class="item-title">Seiko 5 Men's SNK809 Automatic Stainless Steel</div>
                <div class="item-price">$105.00</div>
                <div class="btn">View Archive</div>
            </a>
            <a href="https://www.amazon.com/dp/B000GAYQKY?tag=priscadezigns-20" class="card" target="_blank">
                <div class="item-category">Diver</div>
                <div class="img-box"><img src="https://m.media-amazon.com/images/I/81B-8tM+xPL._AC_SL1500_.jpg" alt="Casio Duro"></div>
                <div class="item-title">Casio Men's MDV106-1A Duro Analog Watch</div>
                <div class="item-price">$49.95</div>
                <div class="btn">View Archive</div>
            </a>
            <a href="https://www.amazon.com/dp/B00791YURC?tag=priscadezigns-20" class="card" target="_blank">
                <div class="item-category">Tool</div>
                <div class="img-box"><img src="https://m.media-amazon.com/images/I/61PQSiTkywL._AC_SL1500_.jpg" alt="Hamilton Khaki"></div>
                <div class="item-title">Hamilton Khaki Field Mechanical Watch</div>
                <div class="item-price">$495.00</div>
                <div class="btn">View Archive</div>
            </a>
        </div>
    </div>
</body>
</html>
