<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | The Watch List Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&family=Space+Grotesk:wght@300;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #C5A059; --bg: #050508; --text: #FFFFFF; --border: rgba(255,255,255,0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; }

        header { padding: 40px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo-group { display: flex; align-items: center; gap: 15px; text-decoration: none; color: #fff; }
        .logo-text { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 700; font-style: italic; }

        .container { max-width: 1200px; margin: 80px auto; padding: 0 6%; }
        .section-title { font-family: 'Cormorant Garamond', serif; font-size: 3rem; font-style: italic; margin-bottom: 60px; text-align: center; }

        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .product-card { background: #0D0D14; border: 1px solid var(--border); padding: 40px; text-align: center; transition: 0.4s; text-decoration: none; color: inherit; }
        .product-card:hover { border-color: var(--accent); transform: translateY(-10px); }
        .product-card img { width: 100%; height: 250px; object-fit: contain; margin-bottom: 30px; }
        .product-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-style: italic; margin-bottom: 15px; }
        .product-card .price { color: var(--accent); font-weight: 700; font-size: 1.2rem; margin-bottom: 20px; display: block; }
        .buy-btn { display: inline-block; padding: 12px 30px; border: 1px solid var(--accent); color: #fff; text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; font-weight: 700; transition: 0.4s; }
        .product-card:hover .buy-btn { background: var(--accent); color: #000; }

        footer { padding: 80px 6% 40px; border-top: 1px solid var(--border); text-align: center; opacity: 0.4; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <header>
        <a href="../" class="logo-group">
            <span class="logo-text">The Watch List</span>
        </a>
        <nav>
            <a href="../" style="color:#fff; text-decoration:none; font-size:0.8rem; text-transform:uppercase; letter-spacing:2px; opacity:0.6;">← Back</a>
        </nav>
    </header>

    <div class="container">
        <h1 class="section-title">The Vault</h1>
        <div class="shop-grid">
            <a href="https://www.amazon.com/Casio-A168WG-9EF-Womens-Watch/dp/B0039UT5OU?tag=priscadezigns-20" class="product-card">
                <img src="https://m.media-amazon.com/images/I/61U08U165UL._AC_UX679_.jpg" alt="Casio Vintage Gold">
                <h3>Casio Vintage A168W</h3>
                <span class="price">High-Fidelity Utility</span>
                <span class="buy-btn">View on Amazon</span>
            </a>
            <a href="https://www.amazon.com/Timex-Expedition-North-41mm-Watch/dp/B09D8T2Y9R?tag=priscadezigns-20" class="product-card">
                <img src="https://m.media-amazon.com/images/I/81fH+0y8G5L._AC_UX679_.jpg" alt="Timex Expedition North">
                <h3>Timex Expedition North</h3>
                <span class="price">Sovereign Performance</span>
                <span class="buy-btn">View on Amazon</span>
            </a>
            <a href="https://www.amazon.com/Seiko-5-Automatic-Watch-SNXS79K1/dp/B000GZA36G?tag=priscadezigns-20" class="product-card">
                <img src="https://m.media-amazon.com/images/I/71R2H3PZtDL._AC_UX679_.jpg" alt="Seiko 5 Automatic">
                <h3>Seiko 5 Automatic</h3>
                <span class="price">Archival Heritage</span>
                <span class="buy-btn">View on Amazon</span>
            </a>
        </div>
    </div>

    <footer>
        <p>© 2026 THE WATCH LIST // PRISCA DEZIGNS EMPIRE</p>
    </footer>
</body>
</html>
