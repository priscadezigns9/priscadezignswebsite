<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Command | Prisca Dezigns</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .sidebar-item:hover { background: rgba(99, 102, 241, 0.1); }
        .sidebar-item.active { background: rgba(99, 102, 241, 0.2); border-left: 4px solid #6366f1; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <div class="w-72 glass flex flex-col p-6">
        <div class="flex items-center space-x-3 mb-10">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-bold text-xl">P</div>
            <span class="text-lg font-bold tracking-tight">Prisca Dezigns</span>
        </div>
        
        <div class="space-y-1 flex-1">
            <button onclick="switchView('ledger')" id="btn-ledger" class="sidebar-item active w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all">
                <span>Unified Ledger</span>
            </button>
            <button onclick="switchView('outreach')" id="btn-outreach" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all">
                <span>Cold Outreach</span>
            </button>
            <button onclick="switchView('chat')" id="btn-chat" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all">
                <span>Chatbot Leads</span>
            </button>
            <button onclick="switchView('drew')" id="btn-drew" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all">
                <span>Drew Voice Logs</span>
            </button>
            <button onclick="switchView('finance')" id="btn-finance" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all">
                <span>Finance Vault</span>
            </button>
        </div>

        <div class="mt-auto pt-6 border-t border-slate-700 text-xs text-slate-400">
            <p>System Version: v12.5 FINAL</p>
            <p>Status: Synchronized</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 glass flex items-center justify-between px-10">
            <h1 id="view-title" class="text-2xl font-bold">Unified Ledger</h1>
            <div class="flex items-center space-x-6">
                <select onchange="filterByBrand(this.value)" class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm">
                    <option value="all">Filter: All Brands</option>
                    <option value="Prisca Dezigns">Prisca Dezigns</option>
                    <option value="Template Shop">Template Shop</option>
                </select>
                <button onclick="fetchData()" id="sync-btn" class="bg-indigo-600 hover:bg-indigo-700 px-6 py-2 rounded-lg font-bold transition-all flex items-center space-x-2">
                    <span>Sync Neural Bridge</span>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-10">
            <div id="content-grid" class="space-y-6">
                <div class="flex items-center justify-center h-64 text-slate-500 italic">Initializing handshake...</div>
            </div>
        </main>
    </div>

    <script>
        const SB_URL = 'https://sazhdnqzaqpqcralmthh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let currentView = 'ledger';
        let dataStore = { ledger: [], outreach: [], chat: [], drew: [], finance: [] };

        async function fetchData() {
            const btn = document.getElementById('sync-btn');
            if(btn) btn.querySelector('span').innerText = 'Syncing...';
            
            try {
                // 1. Unified Ledger & Chat Leads
                const { data: leads } = await sb.from('client_leads').select('*').order('created_at', { ascending: false });
                dataStore.ledger = leads || [];
                dataStore.chat = dataStore.ledger.filter(l => (l.brand || '').toLowerCase().includes('chatbot'));
                
                // 2. Cold Outreach
                const { data: outreach } = await sb.from('outreach_leads').select('*').order('date_sent', { ascending: false });
                dataStore.outreach = outreach || [];

                // 3. Drew Voice Logs
                const { data: calls } = await sb.from('drew_calls').select('*').order('call_date', { ascending: false });
                dataStore.drew = calls || [];

                // 4. Finance Vault (Real Infrastructure)
                dataStore.finance = [
                    { date: '2026-07-10', vendor: 'GitHub', category: 'Infrastructure', amount: '$4.00', status: 'Verified' },
                    { date: '2026-07-09', vendor: 'Vercel', category: 'Deployment', amount: '$20.00', status: 'Verified' },
                    { date: '2026-07-08', vendor: 'Supabase', category: 'Database', amount: '$25.00', status: 'Verified' }
                ];

                render();
            } catch (e) { console.error(e); }
            finally { if(btn) btn.querySelector('span').innerText = 'Sync Neural Bridge'; }
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + view).classList.add('active');
            document.getElementById('view-title').innerText = document.getElementById('btn-' + view).querySelector('span').innerText;
            render();
        }

        function filterByBrand(brand) {
            if(brand === 'all') { renderTable(dataStore.ledger); return; }
            const filtered = dataStore.ledger.filter(l => (l.brand || '').includes(brand));
            renderTable(filtered);
        }

        function render() {
            const grid = document.getElementById('content-grid');
            if(currentView === 'ledger' || currentView === 'chat') {
                renderTable(currentView === 'ledger' ? dataStore.ledger : dataStore.chat);
            } else if(currentView === 'outreach') {
                renderOutreach();
            } else if(currentView === 'drew') {
                renderDrew();
            } else if(currentView === 'finance') {
                renderFinance();
            }
        }

        function renderTable(leads) {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = `
                <div class="glass rounded-2xl overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-800/50">
                            <tr>
                                <th class="px-6 py-4 text-xs font-bold uppercase text-slate-400">Date</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase text-slate-400">Client</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase text-slate-400">Package</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase text-slate-400">Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${leads.map(l => `
                            <tr class="border-t border-slate-700/50 hover:bg-white/5">
                                <td class="px-6 py-4 text-sm text-slate-400">${new Date(l.created_at).toLocaleDateString()}</td>
                                <td class="px-6 py-4 font-bold text-indigo-300">${l.name}</td>
                                <td class="px-6 py-4 text-sm">${l.package || l.brand}</td>
                                <td class="px-6 py-4"><span class="bg-indigo-900/50 text-indigo-300 px-3 py-1 rounded-full text-xs font-bold uppercase">${l.status}</span></td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        function renderOutreach() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    ${dataStore.outreach.map(o => `
                    <div class="glass rounded-2xl p-6 hover:border-indigo-500 transition-all border border-transparent">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-bold text-lg text-indigo-300">${o.company_name}</h3>
                                <p class="text-sm text-slate-400">${o.email}</p>
                            </div>
                            <span class="bg-green-900/50 text-green-400 px-3 py-1 rounded-full text-[10px] font-bold uppercase">${o.status}</span>
                        </div>
                        <div class="text-xs text-slate-500 mb-4">${o.notes || 'No priority notes captured.'}</div>
                        <div class="flex justify-between items-center pt-4 border-t border-slate-700">
                            <span class="text-[10px] text-slate-500 uppercase tracking-widest">${o.campaign} Campaign</span>
                            <span class="text-[10px] text-slate-500 italic">${o.date_sent}</span>
                        </div>
                    </div>`).join('')}
                </div>`;
        }

        function renderDrew() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = `
                <div class="space-y-4">
                    ${dataStore.drew.map(d => `
                    <div class="glass rounded-2xl p-6 flex items-center justify-between border border-transparent hover:border-indigo-500 transition-all">
                        <div class="flex items-center space-x-6">
                            <div class="w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center font-bold text-xl">${d.customer_name ? d.customer_name[0] : '?'}</div>
                            <div>
                                <h3 class="font-bold text-lg">${d.customer_name}</h3>
                                <p class="text-indigo-400 font-mono tracking-tighter">${d.phone}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-sm font-bold text-indigo-300 uppercase tracking-tighter">${d.outcome}</div>
                            <div class="text-xs text-slate-500 italic max-w-xs mt-1">${d.summary}</div>
                        </div>
                    </div>`).join('')}
                </div>`;
        }

        function renderFinance() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = `
                <div class="glass rounded-2xl p-8 max-w-3xl">
                    <div class="flex justify-between items-end mb-10">
                        <div>
                            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-1">Total Verified Infrastructure</h2>
                            <p class="text-4xl font-extrabold text-white tracking-tighter">$49.00</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] bg-green-900/50 text-green-400 px-3 py-1 rounded-full font-bold uppercase tracking-widest">Bridge Active</span>
                        </div>
                    </div>
                    <div class="space-y-4">
                        ${dataStore.finance.map(f => `
                        <div class="flex items-center justify-between py-4 border-b border-slate-700/50 last:border-0">
                            <div>
                                <h4 class="font-bold text-indigo-300">${f.vendor}</h4>
                                <p class="text-xs text-slate-500 uppercase tracking-widest">${f.category}</p>
                            </div>
                            <div class="text-right">
                                <div class="font-bold text-lg">${f.amount}</div>
                                <div class="text-[10px] text-green-500 uppercase font-bold">${f.status}</div>
                            </div>
                        </div>`).join('')}
                    </div>
                </div>`;
        }

        window.onload = fetchData;
    </script>
</body>
</html>
