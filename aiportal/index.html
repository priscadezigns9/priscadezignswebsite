<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Command | Prisca Dezigns</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.3); }
        .sidebar-grad { background: linear-gradient(180deg, #1e1b4b 0%, #312e81 100%); }
        .nav-btn { width: 100%; display: flex; items-center: center; padding: 0.75rem 1rem; border-radius: 1rem; color: #e2e8f0; font-size: 0.875rem; font-weight: 600; transition: all 0.2s; margin-bottom: 0.25rem; }
        .nav-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-btn.active { background: white; color: #1e1b4b; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .nav-btn svg { width: 1.25rem; height: 1.25rem; margin-right: 0.75rem; }
        .p-logo { width: 40px; height: 40px; background: white; border-radius: 12px; display: flex; items-center: center; justify-content: center; font-weight: 800; color: #1e1b4b; }
        .chart-container { height: 300px; position: relative; }
        @keyframes pulse-ring { 0% { transform: scale(.33); } 80%, 100% { opacity: 0; } }
        .qualified-badge { background: #ecfdf5; color: #059669; border: 1px solid #d1fae5; }
        #auth-screen.hidden, #main-content.hidden { display: none !important; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Authentication Handshake -->
    <div id="auth-screen" class="fixed inset-0 z-[100] glass flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white rounded-[2.5rem] p-10 shadow-2xl border border-slate-200">
            <div class="text-center mb-8">
                <img src="https://share.zapia.com/57sonyoar08flg9xz5v667" class="h-16 mx-auto mb-4" alt="PD Logo">
                <h1 class="text-2xl font-bold text-slate-800">Strategic Command</h1>
                <p class="text-slate-500 text-sm mt-2">Initialize secure neural handshake (v12.2)</p>
            </div>
            <input type="password" id="auth-input" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 mb-4 outline-none focus:ring-2 focus:ring-purple-500 transition-all text-center tracking-widest" placeholder="••••••••" onkeypress="if(event.key === 'Enter') checkAuth()">
            <button onclick="checkAuth()" class="w-full bg-slate-900 text-white rounded-xl py-3 font-bold hover:bg-slate-800 transition-all">Connect</button>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="w-72 sidebar-grad flex flex-col">
        <div class="p-8">
            <div class="flex items-center space-x-3 mb-10">
                <div class="p-logo">
                    <img src="https://share.zapia.com/57sonyoar08flg9xz5v667" alt="P" class="w-full h-full object-contain">
                </div>
                <div>
                    <h1 class="text-white font-bold tracking-tight">Strategic Portal</h1>
                    <span class="text-[10px] text-purple-300 font-bold uppercase tracking-widest">Command Center</span>
                </div>
            </div>

            <nav>
                <p class="text-[10px] uppercase tracking-widest text-purple-300 font-bold mb-4 opacity-50 px-4">Sales Intelligence</p>
                <button onclick="showSection('ledger')" id="btn-ledger" class="nav-btn active">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    Ledger: All Leads
                </button>
                <button onclick="showSection('organic')" id="btn-organic" class="nav-btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                    Template Shop Leads
                </button>

                <p class="text-[10px] uppercase tracking-widest text-purple-300 font-bold mt-8 mb-4 opacity-50 px-4">Agent Operations</p>
                <button onclick="showSection('drew')" id="btn-drew" class="nav-btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                    Drew: Voice Logs
                </button>
                <button onclick="showSection('outreach')" id="btn-outreach" class="nav-btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    Email Outreach
                </button>
                <button onclick="showSection('chat')" id="btn-chat" class="nav-btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                    Sierra Chatbot
                </button>
                <button onclick="showSection('finance')" id="btn-finance" class="nav-btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Finance & Receipts
                </button>
                <button onclick="showSection('analysis')" id="btn-analysis" class="nav-btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                    Sierra Daily Analysis
                </button>
            </nav>
        </div>
        <div class="mt-auto p-6">
            <div class="bg-white/10 rounded-2xl p-4 border border-white/5">
                <p class="text-[10px] uppercase tracking-widest text-purple-200 font-bold mb-2">Neural Status</p>
                <div class="flex items-center">
                    <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse mr-2"></div>
                    <span class="text-xs font-bold tracking-wide">PD CORE ACTIVE</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto hidden" id="main-content">
        <!-- Top Nav -->
        <header class="h-20 glass flex items-center justify-between px-8 sticky top-0 z-10">
            <div>
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Prisca Dezigns Hub</h2>
                <h1 class="text-xl font-bold text-slate-800" id="section-title">Strategic Lead Ledger</h1>
            </div>
            <div class="flex items-center space-x-4">
                <div id="management-controls" class="hidden flex items-center space-x-2 bg-slate-50 px-3 py-1.5 rounded-xl border border-slate-200">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Context:</span>
                    <select onchange="filterByBrand(this.value)" class="bg-transparent border-none text-xs font-bold text-slate-800 focus:ring-0 cursor-pointer p-0">
                        <option value="all">All Channels</option>
                        <option value="autodrome">The Autodrome</option>
                        <option value="dreaming">Dreaming Anime</option>
                        <option value="nehneh">NehNeh (Seamritedesigns)</option>
                        <option value="priscadezigns">Prisca Dezigns</option>
                        
                    </select>
                </div>
                
                <button onclick="openAddLeadModal()" class="flex items-center space-x-2 px-4 py-2 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 transition-all shadow-lg text-xs">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <span>New Signal</span>
                </button>
<button onclick="fetchData()" class="p-2 hover:bg-slate-100 rounded-full transition-all text-purple-600" id="sync-btn" title="Neural Sync">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
                <div class="h-8 w-[1px] bg-slate-200"></div>
                <div class="flex items-center space-x-3">
                    <div class="text-right">
                        <p class="text-sm font-bold text-slate-800">Priscilla Narine</p>
                        <p class="text-[10px] text-slate-500 font-medium">Lead Strategist</p>
                    </div>
                    <img src="https://share.zapia.com/57sonyoar08flg9xz5v667" class="h-10 w-10 rounded-full border-2 border-purple-100" alt="Admin">
                </div>
            </div>
        </header>

        <div class="p-8" id="view-container">
            <!-- Dynamic Content Injected Here -->
        </div>
    </main>

    
    
    <script>
        const sb = supabase.createClient('https://sazhdnqzaqpqcralmthh.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc');
        let currentView = 'ledger';
        let allLeads = [];
        let outreachLeads = [];
        let organicLeads = [];
        let chatLeads = [];
        let voiceLogs = [];
        let financeLogs = [];
        let chartInstance = null;

        async function checkAuth() {
            const input = document.getElementById('auth-input').value;
            if(input.toLowerCase().trim() === 'alice') {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                const controls = document.getElementById('management-controls');
                if(controls) controls.classList.remove('hidden');
                fetchData();
            } else {
                alert('Handshake failed. Verify security token.');
            }
        }

        async function deleteLead(id) {
            if(!confirm('Permanently remove this signal?')) return;
            const { error } = await sb.from('client_leads').delete().eq('id', id);
            if(error) alert('Error deleting');
            else fetchData();
        }

        async function deleteDrewCall(id) {
            if(!confirm('Permanently remove this call log?')) return;
            const { error } = await sb.from('drew_calls').delete().eq('id', id);
            if(error) alert('Error deleting');
            else fetchData();
        }

        function openAddLeadModal() {
            document.getElementById('add-lead-modal').classList.remove('hidden');
        }

        function closeAddLeadModal() {
            document.getElementById('add-lead-modal').classList.add('hidden');
        }

        async function saveLead(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mx-auto"></div>';
            
            const formData = new FormData(e.target);
            const leadData = {
                name: formData.get('name'),
                email: formData.get('email'),
                brand: formData.get('brand'),
                package: formData.get('package'),
                status: 'Active'
            };

            const { error } = await sb.from('client_leads').insert([leadData]);
            
            if(error) {
                alert('Sync failed: ' + error.message);
                btn.innerText = 'Sync Lead';
            } else {
                closeAddLeadModal();
                e.target.reset();
                btn.innerText = 'Sync Lead';
                fetchData();
            }
        }

        async function enrichLead(id, name) {
            const btn = event.currentTarget;
            btn.classList.add('animate-pulse', 'text-purple-600');
            
            // Simulation of Apollo handshake
            setTimeout(async () => {
                const { error } = await sb.from('client_leads').update({ status: 'Qualified' }).eq('id', id);
                btn.classList.remove('animate-pulse');
                fetchData();
            }, 1500);
        }

        function showSection(view) {
            currentView = view;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const targetBtn = document.getElementById('btn-' + view);
            if(targetBtn) targetBtn.classList.add('active');
            render();
        }

        function filterByBrand(brand) {
            let dataToFilter = [];
            if (currentView === 'ledger') dataToFilter = allLeads;
            else if (currentView === 'organic') dataToFilter = organicLeads;
            else if (currentView === 'chat') dataToFilter = chatLeads;
            else if (currentView === 'outreach') dataToFilter = outreachLeads;
            else if (currentView === 'voice') dataToFilter = voiceLogs;
            else if (currentView === 'finance') dataToFilter = financeLogs;

            if (brand === 'all') {
                render();
            } else {
                const filtered = dataToFilter.filter(l => {
                    const brandVal = (l.brand || '').toLowerCase();
                    const nameVal = (l.name || '').toLowerCase();
                    const target = brand.toLowerCase();
                    
                    // Unified mapping for NehNeh / Seamritedesigns
                    if (target === 'nehneh') {
                        return brandVal.includes('nehneh') || brandVal.includes('seamrite');
                    }
                    // Mapping for Dreaming Anime
                    if (target === 'dreaming') {
                        return brandVal.includes('dreaming') || brandVal.includes('anime');
                    }
                    
                    return brandVal.includes(target) || nameVal.includes(target) || (l.package || '').toLowerCase().includes(target);
                });
                renderFiltered(filtered);
            }
        }

        async function fetchData() {
            const btn = document.getElementById('sync-btn');
            if(btn) btn.classList.add('animate-spin');
            
            try {
                const { data: cLeads } = await sb.from('client_leads').select('*').order('created_at', { ascending: false });
                allLeads = cLeads || [];
                organicLeads = allLeads.filter(l => !((l.brand||'').toLowerCase().includes('chatbot') || (l.package||'').toLowerCase().includes('chatbot')));
                chatLeads = allLeads.filter(l => (l.brand||'').toLowerCase().includes('chatbot') || (l.package||'').toLowerCase().includes('chatbot'));
                
                const { data: oLeads } = await sb.from('outreach_leads').select('*').order('created_at', { ascending: false });
                outreachLeads = oLeads || [];

                const { data: calls } = await sb.from('drew_calls').select('*').order('call_date', { ascending: false });
                voiceLogs = (calls || []).map(d => ({
                    id: d.id,
                    name: d.customer_name,
                    status: d.outcome,
                    duration: 'Voice Logic Active',
                    time: d.call_date,
                    transcription: d.phone
                }));

                financeLogs = [
                    { id: 1, date: '2026-07-10', vendor: 'GitHub', category: 'Infrastructure', amount: '$4.00', status: 'Verified' },
                    { id: 2, date: '2026-07-09', vendor: 'Vapi.ai', category: 'Voice Logic', amount: '$12.50', status: 'Processing' },
                    { id: 3, date: '2026-07-08', vendor: 'Supabase', category: 'Database', amount: '$25.00', status: 'Verified' }
                ];

                render();
                updateChart();
            } catch (err) {
                console.error('Fetch error:', err);
            } finally {
                if(btn) btn.classList.remove('animate-spin');
            }
        }

        function render() {
            const container = document.getElementById('ledger-container');
            const title = document.getElementById('section-title');
            
            if (currentView === 'ledger') {
                title.innerText = 'Strategic Lead Ledger';
                renderTable(allLeads);
            } else if (currentView === 'organic') {
                title.innerText = 'Organic Intelligence';
                renderTable(organicLeads);
            } else if (currentView === 'chat') {
                title.innerText = 'Chatbot Conversions';
                renderTable(chatLeads);
            } else if (currentView === 'outreach') {
                title.innerText = 'Cold Outreach (Apollo)';
                renderTable(outreachLeads);
            } else if (currentView === 'voice') {
                title.innerText = 'Drew: Voice Operations';
                renderVoiceGrid();
            } else if (currentView === 'finance') {
                title.innerText = 'Finance & Receipts';
                renderFinanceTable();
            }
        }

        function renderFiltered(data) {
            if (currentView === 'voice') renderVoiceGrid(data);
            else renderTable(data);
        }

        function renderTable(data) {
            const container = document.getElementById('ledger-container');
            container.innerHTML = `
                <div class="bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-100">
                                <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Brand Context</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Lead Identity</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Architecture</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Timestamp</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Analysis</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">Status</th>
                                <th class="px-6 py-4"></th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            ${data.map(l => `
                                <tr class="hover:bg-slate-50/50 transition-all group">
                                    <td class="px-6 py-4">
                                        <span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-[10px] font-bold uppercase">${l.brand || 'Direct'}</span>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="text-sm font-bold text-slate-800">${l.name}</div>
                                        <div class="text-[10px] text-slate-400">${l.email}</div>
                                    </td>
                                    <td class="px-6 py-4 text-sm font-medium text-slate-600">${l.package || 'Discovery'}</td>
                                    <td class="px-6 py-4 text-sm text-slate-500">${new Date(l.created_at).toLocaleDateString()}</td>
                                    <td class="px-6 py-4">
                                        <button onclick="enrichLead('${l.id}', '${l.name}')" class="flex items-center space-x-2 text-slate-400 hover:text-purple-600 transition-colors">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                                            <span class="text-[10px] font-bold uppercase tracking-widest">${l.status === 'Qualified' ? 'Verified' : 'Apollo PPI'}</span>
                                        </button>
                                    </td>
                                    <td class="px-6 py-4 text-center">
                                        <span class="px-3 py-1 ${l.status === 'Qualified' ? 'bg-purple-100 text-purple-700' : 'bg-green-50 text-green-700'} rounded-full text-[10px] font-bold uppercase">
                                            ${l.status || 'Active'}
                                        </span>
                                    </td>
                                    <td class="px-6 py-4 text-right">
                                        <button onclick="deleteLead('${l.id}')" class="text-slate-300 hover:text-red-500 transition-all">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                                        </button>
                                    </td>
                                </tr>
                            `).join('') || '<tr><td colspan="7" class="p-10 text-center text-slate-400 italic">No signals found in this context.</td></tr>'}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderVoiceGrid(data = voiceLogs) {
            const container = document.getElementById('ledger-container');
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                    ${data.map(l => `
                        <div class="bg-white rounded-[2rem] p-8 shadow-xl border border-slate-100 relative group">
                            <button onclick="deleteDrewCall('${l.id}')" class="absolute top-6 right-6 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                            </button>
                            <div class="flex items-center space-x-4 mb-6">
                                <div class="w-12 h-12 bg-purple-100 rounded-2xl flex items-center justify-center text-purple-600">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                                </div>
                                <div>
                                    <h4 class="font-bold text-slate-800 mb-1">${l.name}</h4>
                                    <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">${l.duration}</div>
                                </div>
                            </div>
                            <div class="text-xs text-slate-500 mb-6 font-mono bg-slate-50 p-4 rounded-xl border border-slate-100">
                                ${l.transcription}
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="px-3 py-1 bg-purple-50 text-purple-600 rounded-full text-[10px] font-bold uppercase">${l.status}</span>
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${new Date(l.time).toLocaleTimeString()}</span>
                            </div>
                        </div>
                    `).join('') || '<div class="col-span-full p-20 text-center text-slate-400 italic">No voice operations recorded.</div>'}
                </div>
            `;
        }

        function renderFinanceTable() {
            const container = document.getElementById('ledger-container');
            container.innerHTML = `
                <div class="bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-100">
                                <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Timestamp</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Vendor</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Category</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Amount</th>
                                <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Status</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            ${financeLogs.map(l => `
                                <tr class="hover:bg-slate-50/50 transition-all">
                                    <td class="px-6 py-4 text-sm text-slate-500">${l.date}</td>
                                    <td class="px-6 py-4 text-sm font-bold text-slate-800">${l.vendor}</td>
                                    <td class="px-6 py-4 text-sm text-slate-600">${l.category}</td>
                                    <td class="px-6 py-4 text-sm font-bold text-slate-900">${l.amount}</td>
                                    <td class="px-6 py-4"><span class="px-3 py-1 bg-green-50 text-green-700 rounded-full text-[10px] font-bold uppercase">${l.status}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function updateChart() {
            const ctx = document.getElementById('leadChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            
            const counts = {
                'Autodrome': allLeads.filter(l => (l.brand||'').toLowerCase().includes('autodrome')).length,
                'Anime': allLeads.filter(l => (l.brand||'').toLowerCase().includes('anime') || (l.brand||'').toLowerCase().includes('dreaming')).length,
                'NehNeh': allLeads.filter(l => (l.brand||'').toLowerCase().includes('nehneh') || (l.brand||'').toLowerCase().includes('seamrite')).length,
                'Direct': allLeads.filter(l => (l.brand||'').toLowerCase().includes('direct') || (l.brand||'').toLowerCase().includes('prisca')).length
            };

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(counts),
                    datasets: [{
                        data: Object.values(counts),
                        backgroundColor: ['#1e1b4b', '#4f46e5', '#818cf8', '#e2e8f0'],
                        borderWidth: 0
                    }]
                },
                options: {
                    cutout: '80%',
                    plugins: { legend: { display: false } }
                }
            });
        }

        // Initialize Secure Handshake
        window.onload = () => {
            // Keep auth-screen visible initially
        };
    </script>



    <!-- Add Lead Modal -->
    <div id="add-lead-modal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-6 bg-slate-900/50 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-bold text-slate-800 mb-6">Log New Signal</h3>
            <form onsubmit="saveLead(event)" class="space-y-4">
                <input name="name" placeholder="Contact Name" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-purple-500">
                <input name="email" type="email" placeholder="Email Address" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-purple-500">
                <select name="brand" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-purple-500">
                    <option value="Autodrome">The Autodrome</option>
                    <option value="Anime">Dreaming Anime</option>
                    <option value="NehNeh">NehNeh</option>
                    <option value="Direct">Prisca Dezigns (Direct)</option>
                </select>
                <select name="package" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-purple-500">
                    <option value="Starter">Starter Package</option>
                    <option value="Growth">Growth Package</option>
                    <option value="Elite">Elite Tier</option>
                    <option value="Custom">Custom Architecture</option>
                </select>
                <div class="flex space-x-4 pt-4">
                    <button type="button" onclick="closeAddLeadModal()" class="flex-1 px-4 py-3 font-bold text-slate-500 hover:bg-slate-100 rounded-xl transition-all">Cancel</button>
                    <button type="submit" class="flex-1 px-4 py-3 font-bold text-white bg-slate-900 hover:bg-slate-800 rounded-xl shadow-lg transition-all">Sync Lead</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
