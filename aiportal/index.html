<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Command | Prisca Dezigns</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-amethyst: #7D52B5; --brand-orchid: #743089; --brand-ivory: #F5F2ED; --brand-dark: #301934; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--brand-ivory); color: var(--brand-dark); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05); }
        .nav-btn { width: 100%; display: flex; align-items: center; gap: 0.75rem; padding: 1rem 1.5rem; border-radius: 1.25rem; font-size: 0.875rem; font-weight: 600; color: rgba(255, 255, 255, 0.5); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-btn:hover { color: white; background: rgba(255, 255, 255, 0.1); transform: translateX(5px); }
        .nav-btn.active { color: white; background: var(--brand-amethyst); box-shadow: 0 10px 25px -5px rgba(125, 82, 181, 0.5); }
        .sidebar { background: #1a0b2e; }
        #auth-screen { background: radial-gradient(circle at top right, #301934, #1a0b2e); }
    </style>
</head>
<body class="bg-slate-50 overflow-hidden">
    <div id="auth-screen" class="fixed inset-0 z-[999] flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white rounded-[3rem] p-12 shadow-2xl text-center">
            <img src="https://share.zapia.com/57sonyoar08flg9xz5v667" class="h-20 mx-auto mb-6">
            <h1 class="text-3xl font-extrabold text-slate-800 mb-2 cursor-pointer" onclick="handleAuthClick()">Strategic Command</h1>
            <p class="text-slate-400 mb-10">Handshake Required</p>
            <input type="password" id="auth-input" class="w-full bg-slate-100 border-none rounded-2xl px-6 py-4 mb-6 outline-none focus:ring-2 focus:ring-purple-500 text-center tracking-[0.5em] opacity-0 pointer-events-none" placeholder="••••••••" onkeypress="if(event.key === 'Enter') checkAuth()">
            <button onclick="checkAuth()" class="w-full bg-slate-900 text-white rounded-2xl py-4 font-bold">Initialize</button>
        </div>
    </div>

    <div id="main-layout" class="flex h-screen opacity-0 transition-opacity duration-1000">
        <aside class="w-80 sidebar flex flex-col border-r border-white/5">
            <div class="p-10">
                <div class="flex items-center gap-3 mb-10 text-white font-bold text-xl">SIERRA HUB</div>
                <nav class="space-y-2">
                    <button id="btn-ledger" onclick="showSection('ledger')" class="nav-btn active">Lead Ledger</button>
                    <button id="btn-intake" onclick="showSection('intake')" class="nav-btn">Document Intake</button>
                    <button id="btn-vault" onclick="showSection('vault')" class="nav-btn">Media Vault</button>
                    <button id="btn-voice" onclick="showSection('voice')" class="nav-btn">Voice Ops</button>
                </nav>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-slate-50">
            <header class="h-24 bg-white border-b border-slate-200 px-12 flex items-center justify-between">
                <h2 id="section-title" class="text-2xl font-extrabold text-slate-800">Lead Ledger</h2>
                <div class="flex items-center gap-4">
                    <button onclick="syncAll()" class="p-3 bg-slate-100 rounded-xl">Refresh</button>
                    <button onclick="openAddLeadModal()" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold">+ New Lead</button>
                </div>
            </header>
            <div id="content-mount" class="flex-1 overflow-y-auto p-12"></div>
        </main>
    </div>

    <div id="add-lead-modal" class="fixed inset-0 z-[1000] hidden flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm">
        <div class="bg-white rounded-[2.5rem] p-12 max-w-xl w-full">
            <h3 class="text-2xl font-bold mb-8">Sync Manual Lead</h3>
            <form onsubmit="saveLead(event)" class="space-y-4">
                <input name="name" placeholder="Contact Name" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4">
                <input name="email" type="email" placeholder="Email" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4">
                <input name="brand" placeholder="Brand" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4">
                <select name="package" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4">
                    <option value="Starter">Starter</option><option value="Growth">Growth</option><option value="Trusted">Trusted</option>
                </select>
                <div class="flex gap-4 mt-8">
                    <button type="button" onclick="closeAddLeadModal()" class="flex-1 bg-slate-100 py-4 rounded-xl">Cancel</button>
                    <button type="submit" class="flex-2 bg-slate-900 text-white py-4 rounded-xl px-10">Sync</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sbUrl = 'https://sazhdnqzaqpqcralmthh.supabase.co';
        const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc';
        const sb = supabase.createClient(sbUrl, sbKey);

        let clickCount = 0; let allLeads = []; let allMedia = []; let allCalls = []; let currentSection = 'ledger';

        function handleAuthClick() { clickCount++; if(clickCount >= 5) { const i = document.getElementById('auth-input'); i.style.opacity = '1'; i.style.pointerEvents = 'auto'; i.focus(); } }
        function checkAuth() { if(document.getElementById('auth-input').value === 'alice') { localStorage.setItem('pd_auth', 'true'); location.reload(); } else alert('Fail'); }

        async function syncAll() {
            const { data: l } = await sb.from('client_leads').select('*').order('created_at', { ascending: false });
            const { data: m } = await sb.from('media').select('*').order('created_at', { ascending: false });
            const { data: c } = await sb.from('drew_calls').select('*').order('created_at', { ascending: false });
            allLeads = l || []; allMedia = m || []; allCalls = c || [];
            showSection(currentSection);
        }

        function showSection(id) {
            currentSection = id;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + id).classList.add('active');
            const m = document.getElementById('content-mount');
            if(id === 'ledger') renderLedger(m);
            if(id === 'intake') renderIntake(m);
            if(id === 'vault') renderVault(m);
            if(id === 'voice') renderVoice(m);
        }

        function renderLedger(m) {
            m.innerHTML = `
                <div class="grid grid-cols-2 gap-8 mb-12">
                    <div class="bg-white p-8 rounded-3xl border border-slate-200">Total: ${allLeads.length}</div>
                    <div class="bg-white p-8 rounded-3xl border border-slate-200 text-purple-600">Active: ${allLeads.filter(x=>x.status==='Active').length}</div>
                </div>
                <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden">
                    <table class="w-full text-left"><tbody class="divide-y divide-slate-100">
                        ${allLeads.map(l => `<tr class="hover:bg-slate-50"><td class="p-8"><b>${l.brand}</b> (${l.name})</td><td class="p-8 text-right"><button onclick="deleteLead('${l.id}')">Delete</button></td></tr>`).join('')}
                    </tbody></table>
                </div>`;
        }

        function renderIntake(m) {
            m.innerHTML = `
                <div class="max-w-2xl mx-auto py-20">
                    <div class="bg-white rounded-[3rem] p-20 border-4 border-dashed border-slate-200 text-center hover:border-purple-400 cursor-pointer" onclick="document.getElementById('file-in').click()">
                        <input type="file" id="file-in" class="hidden" onchange="handleUp(this.files)">
                        <h3 class="text-2xl font-bold">Drop Files Here</h3>
                        <p class="text-slate-400 mt-2">Analysis Logic Active</p>
                    </div>
                    <div id="stack" class="mt-8 space-y-4"></div>
                </div>`;
        }

        async function handleUp(files) {
            const s = document.getElementById('stack');
            for(let f of files) {
                const r = document.createElement('div'); r.className = 'bg-white p-4 rounded-xl border'; r.innerText = f.name + ' - Processing...'; s.appendChild(r);
                await sb.from('media').insert([{ name: f.name, status: 'Processed', type: f.type, size: f.size }]);
            }
            setTimeout(syncAll, 1500);
        }

        function renderVault(m) {
            m.innerHTML = `<div class="grid grid-cols-3 gap-6">${allMedia.map(x => `<div class="bg-white p-8 rounded-3xl border"><b>${x.name}</b><br><small>${x.status}</small></div>`).join('')}</div>`;
        }

        function renderVoice(m) {
            m.innerHTML = `<div class="bg-white rounded-3xl border overflow-hidden"><table class="w-full text-left"><tbody class="divide-y divide-slate-100">${allCalls.map(c => `<tr><td class="p-8"><b>${c.agent}</b>: ${c.summary}</td></tr>`).join('')}</tbody></table></div>`;
        }

        function openAddLeadModal() { document.getElementById('add-lead-modal').classList.remove('hidden'); }
        function closeAddLeadModal() { document.getElementById('add-lead-modal').classList.add('hidden'); }
        async function saveLead(e) { e.preventDefault(); const d = new FormData(e.target); await sb.from('client_leads').insert([{ name: d.get('name'), email: d.get('email'), brand: d.get('brand'), package: d.get('package'), status: 'Active' }]); closeAddLeadModal(); syncAll(); }
        async function deleteLead(id) { if(confirm('Delete?')) { await sb.from('client_leads').delete().eq('id', id); syncAll(); } }

        if(localStorage.getItem('pd_auth') === 'true') { document.getElementById('auth-screen').style.display='none'; document.getElementById('main-layout').classList.remove('opacity-0'); syncAll(); }
    </script>
</body>
</html>
