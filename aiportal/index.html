<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Command | Prisca Dezigns</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .sidebar-grad { background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%); }
        .nav-btn { @apply flex items-center space-x-3 w-full px-4 py-3 rounded-xl text-slate-400 font-semibold transition-all hover:bg-white/5; }
        .nav-btn.active { @apply bg-white/10 text-white shadow-lg; }
        .nav-btn svg { @apply w-5 h-5; }
        .p-logo { width: 32px; height: 32px; background: white; border-radius: 8px; padding: 4px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <!-- Auth Screen -->
    <div id="auth-screen" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white rounded-3xl p-10 shadow-2xl">
            <div class="text-center mb-8">
                <img src="https://share.zapia.com/57sonyoar08flg9xz5v667" class="h-16 mx-auto mb-4" alt="PD Logo">
                <h1 class="text-2xl font-bold text-slate-800">Strategic Command</h1>
                <p class="text-slate-500 text-sm mt-2">Initialize secure neural handshake (v12.4)</p>
            </div>
            <input type="password" id="auth-input" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 mb-4 outline-none focus:ring-2 focus:ring-purple-500 transition-all text-center tracking-widest" placeholder="••••••••" onkeypress="if(event.key === 'Enter') checkAuth()">
            <button onclick="checkAuth()" class="w-full bg-slate-900 text-white rounded-xl py-3 font-bold hover:bg-slate-800 transition-all">Connect</button>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="w-72 sidebar-grad flex flex-col">
        <div class="p-8">
            <div class="flex items-center space-x-3 mb-10">
                <div class="p-logo"><img src="https://share.zapia.com/57sonyoar08flg9xz5v667" alt="P"></div>
                <div>
                    <h1 class="text-white font-bold tracking-tight">Strategic Portal</h1>
                    <span class="text-[10px] text-purple-300 font-bold uppercase tracking-widest">Command Center</span>
                </div>
            </div>
            <nav class="space-y-1">
                <p class="text-[10px] uppercase tracking-widest text-purple-300 font-bold mb-4 opacity-50 px-4">Sales Intelligence</p>
                <button onclick="showSection('ledger')" id="btn-ledger" class="nav-btn active">Ledger: All Leads</button>
                <button onclick="showSection('organic')" id="btn-organic" class="nav-btn">Prisca Dezigns Leads</button>
                <button onclick="showSection('shop')" id="btn-shop" class="nav-btn">Template Shop</button>
                <button onclick="showSection('outreach')" id="btn-outreach" class="nav-btn">Email Outreach</button>
                <button onclick="showSection('chat')" id="btn-chat" class="nav-btn">Chatbot Leads</button>
                <button onclick="showSection('drew')" id="btn-drew" class="nav-btn">Drew Voice Logs</button>
                <div class="pt-6">
                    <p class="text-[10px] uppercase tracking-widest text-purple-300 font-bold mb-4 opacity-50 px-4">Administrative</p>
                    <button onclick="showSection('finance')" id="btn-finance" class="nav-btn">Finance Vault</button>
                </div>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="flex-1 bg-[#f8fafc] overflow-y-auto hidden">
        <header class="bg-white border-b border-slate-200 px-8 py-6 sticky top-0 z-10 flex justify-between items-center">
            <div>
                <h2 id="section-title" class="text-xl font-bold text-slate-800">Ledger: All Leads</h2>
                <p class="text-slate-500 text-sm">Real-time signal management</p>
            </div>
            <div class="flex items-center space-x-4">
                <div id="management-controls" class="hidden flex items-center space-x-2 bg-slate-50 px-3 py-1.5 rounded-xl border border-slate-200">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Context:</span>
                    <select id="brand-context" onchange="filterByBrand(this.value)" class="bg-transparent text-sm font-bold text-slate-700 outline-none cursor-pointer">
                        <option value="all">Prisca Dezigns (Global)</option>
                        <option value="Autodrome">The Autodrome</option>
                        <option value="Anime">Dreaming Anime</option>
                        <option value="NehNeh">NehNeh</option>
                    </select>
                </div>
                <button id="sync-btn" onclick="fetchData()" class="p-2.5 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 transition-all text-slate-600 shadow-sm">
                    Sync Handshake
                </button>
            </div>
        </header>

        <div id="view-container" class="p-8">
            <!-- Content dynamic via render() -->
        </div>
    </main>

    <script>
        const sb = supabase.createClient('https://sazhdnqzaqpqcralmthh.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6InR5cGUiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc');
        
        let allLeads = [];
        let ledgerLeads = [];
        let organicLeads = [];
        let chatLeads = [];
        let shopLeads = [];
        let outreachLeads = [];
        let voiceLogs = [];
        let financeLogs = [];
        let currentView = 'ledger';

        async function checkAuth() {
            if(document.getElementById('auth-input').value.toLowerCase().trim() === 'alice') {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('management-controls').classList.remove('hidden');
                fetchData();
            } else {
                alert('Handshake failed.');
            }
        }

        function showSection(view) {
            currentView = view;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + view).classList.add('active');
            
            const titles = {
                ledger: 'Ledger: All Leads',
                organic: 'Prisca Dezigns Leads',
                shop: 'Template Shop Orders',
                outreach: 'Email Outreach Logs',
                chat: 'Chatbot Leads',
                drew: 'Drew Voice Logs',
                finance: 'Finance Vault'
            };
            document.getElementById('section-title').innerText = titles[view];
            render();
        }

        async function fetchData() {
            const btn = document.getElementById('sync-btn');
            if(btn) btn.classList.add('animate-spin');
            try {
                const { data: leads } = await sb.from('client_leads').select('*').order('created_at', { ascending: false });
                allLeads = leads || [];
                ledgerLeads = allLeads;
                organicLeads = allLeads.filter(l => (l.brand || '').toLowerCase() === 'prisca dezigns');
                chatLeads = allLeads.filter(l => (l.brand || '').toLowerCase().includes('chatbot'));
                shopLeads = allLeads.filter(l => (l.brand || '').toLowerCase().includes('shop'));

                const { data: oLeads } = await sb.from('outreach_leads').select('*').order('date_sent', { ascending: false });
                outreachLeads = oLeads || [];

                const { data: vLogs } = await sb.from('drew_calls').select('*').order('call_date', { ascending: false });
                voiceLogs = vLogs || [];

                financeLogs = [
                    { date: '2026-07-10', vendor: 'GitHub', category: 'Infrastructure', amount: '$4.00', status: 'Verified' },
                    { date: '2026-07-09', vendor: 'Vercel', category: 'Deployment', amount: '$20.00', status: 'Verified' },
                    { date: '2026-07-08', vendor: 'Supabase', category: 'Database', amount: '$25.00', status: 'Verified' }
                ];
                render();
            } catch (e) { console.error(e); }
            finally { if(btn) setTimeout(() => btn.classList.remove('animate-spin'), 800); }
        }

        function filterByBrand(brand) {
            if(brand === 'all') {
                ledgerLeads = allLeads;
            } else {
                ledgerLeads = allLeads.filter(l => (l.brand || '').includes(brand) || (l.package || '').includes(brand));
            }
            render();
        }

        function render() {
            const container = document.getElementById('view-container');
            let data = [];
            if(currentView === 'ledger') data = ledgerLeads;
            if(currentView === 'organic') data = organicLeads;
            if(currentView === 'chat') data = chatLeads;
            if(currentView === 'shop') data = shopLeads;
            if(currentView === 'outreach') return renderOutreach();
            if(currentView === 'drew') return renderDrew();
            if(currentView === 'finance') return renderFinance();

            container.innerHTML = `
                <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden">
                    <table class="w-full text-left">
                        <thead><tr class="bg-slate-50 border-b border-slate-200 text-[10px] uppercase tracking-widest font-bold text-slate-400">
                            <th class="px-6 py-4">Name</th><th class="px-6 py-4">Brand/Context</th><th class="px-6 py-4">Package</th><th class="px-6 py-4">Date</th>
                        </tr></thead>
                        <tbody class="divide-y divide-slate-100">
                            ${data.map(l => `<tr>
                                <td class="px-6 py-4 font-bold text-slate-800">${l.name}</td>
                                <td class="px-6 py-4 text-xs text-slate-500">${l.brand}</td>
                                <td class="px-6 py-4 text-xs font-bold text-purple-600">${l.package || '---'}</td>
                                <td class="px-6 py-4 text-xs text-slate-400">${new Date(l.created_at).toLocaleDateString()}</td>
                            </tr>`).join('') || '<tr><td colspan="4" class="p-10 text-center text-slate-400">No active signals.</td></tr>'}
                        </tbody>
                    </table>
                </div>`;
        }

        function renderOutreach() {
            document.getElementById('view-container').innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${outreachLeads.map(o => `
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                            <div class="flex justify-between mb-2">
                                <h3 class="font-bold text-slate-800">${o.company_name}</h3>
                                <span class="text-[10px] font-bold uppercase px-2 py-1 bg-green-100 text-green-600 rounded-md">${o.status}</span>
                            </div>
                            <p class="text-xs text-slate-500 mb-2">${o.email}</p>
                            <div class="bg-slate-50 p-3 rounded-lg text-xs italic text-slate-600">${o.notes || 'No recent notes.'}</div>
                        </div>
                    `).join('')}
                </div>`;
        }

        function renderDrew() {
            document.getElementById('view-container').innerHTML = `
                <div class="space-y-4">
                    ${voiceLogs.map(v => `
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 flex justify-between items-center">
                            <div>
                                <h3 class="font-bold text-slate-800">${v.customer_name}</h3>
                                <p class="text-xs text-slate-500">${v.outcome}</p>
                                <p class="text-[10px] text-slate-400 mt-1">${new Date(v.call_date).toLocaleString()}</p>
                            </div>
                            <div class="text-right max-w-md"><p class="text-xs text-slate-600">${v.summary}</p></div>
                        </div>
                    `).join('')}
                </div>`;
        }

        function renderFinance() {
            document.getElementById('view-container').innerHTML = `
                <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden">
                    <table class="w-full text-left">
                        <thead><tr class="bg-slate-50 border-b border-slate-200 text-[10px] uppercase tracking-widest font-bold text-slate-400">
                            <th class="px-6 py-4">Date</th><th class="px-6 py-4">Vendor</th><th class="px-6 py-4">Amount</th><th class="px-6 py-4">Status</th>
                        </tr></thead>
                        <tbody>
                            ${financeLogs.map(f => `<tr>
                                <td class="px-6 py-4 text-sm">${f.date}</td>
                                <td class="px-6 py-4 font-bold text-slate-800">${f.vendor}</td>
                                <td class="px-6 py-4 font-bold text-purple-600">${f.amount}</td>
                                <td class="px-6 py-4"><span class="text-[10px] font-bold uppercase text-green-600">${f.status}</span></td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
        }
    </script>
</body>
</html>
