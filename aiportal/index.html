<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Command Center | Prisca Dezigns</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .sidebar-grad { background: linear-gradient(180deg, #1e1b4b 0%, #312e81 100%); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0,0,0,0.05); }
        .sidebar-item { color: #cbd5e1; transition: all 0.2s; }
        .sidebar-item:hover { background: rgba(255, 255, 255, 0.1); color: white; }
        .sidebar-item.active { background: white; color: #1e1b4b; font-weight: bold; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <div class="w-72 sidebar-grad flex flex-col p-6 shadow-2xl">
        <div class="flex items-center space-x-3 mb-10">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center font-bold text-xl text-indigo-950">P</div>
            <span class="text-lg font-bold tracking-tight text-white">Strategic Portal</span>
        </div>
        
        <div class="space-y-1 flex-1">
            <button onclick="switchView('ledger')" id="btn-ledger" class="sidebar-item active w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-left">
                <span>Strategic Lead Ledger</span>
            </button>
            <button onclick="switchView('outreach')" id="btn-outreach" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-left">
                <span>Cold Outreach</span>
            </button>
            <button onclick="switchView('chat')" id="btn-chat" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-left">
                <span>Chatbot Leads</span>
            </button>
            <button onclick="switchView('drew')" id="btn-drew" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-left">
                <span>Drew Technical Logs</span>
            </button>
            <button onclick="switchView('finance')" id="btn-finance" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-left">
                <span>Financial Intelligence</span>
            </button>
        </div>

        <div class="mt-auto pt-6 border-t border-white/10 text-[10px] text-indigo-300 uppercase tracking-widest font-bold">
            <p>System Version: v12.6</p>
            <p class="mt-1">Handshake: Synchronized</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white/70 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10">
            <h1 id="view-title" class="text-2xl font-bold text-slate-800">Strategic Command Center</h1>
            <div class="flex items-center space-x-6">
                <select onchange="filterByBrand(this.value)" class="bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm text-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm">
                    <option value="all">All Brands</option>
                    <option value="Prisca Dezigns">Prisca Dezigns</option>
                    <option value="Template Shop">Template Shop</option>
                </select>
                <button onclick="fetchData()" id="sync-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-bold shadow-lg shadow-indigo-200 transition-all flex items-center space-x-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    <span>Sync Neural Bridge</span>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-10 bg-slate-50/50">
            <div id="content-grid" class="max-w-7xl mx-auto space-y-6">
                <!-- Data Renders Here -->
            </div>
        </main>
    </div>

    <script>
        const SB_URL = 'https://sazhdnqzaqpqcralmthh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let currentView = 'ledger';
        let data = { ledger: [], outreach: [], chat: [], drew: [], finance: [] };

        async function fetchData() {
            const btn = document.getElementById('sync-btn');
            if(btn) btn.classList.add('animate-spin');
            
            try {
                const { data: leads } = await sb.from('client_leads').select('*').order('created_at', { ascending: false });
                data.ledger = leads || [];
                data.chat = data.ledger.filter(l => (l.brand || '').toLowerCase().includes('chatbot'));
                
                const { data: outreach } = await sb.from('outreach_leads').select('*').order('date_sent', { ascending: false });
                data.outreach = outreach || [];

                const { data: calls } = await sb.from('drew_calls').select('*').order('call_date', { ascending: false });
                data.drew = calls || [];

                data.finance = [
                    { date: '2026-07-10', vendor: 'GitHub', category: 'Infrastructure', amount: '$4.00', status: 'Verified' },
                    { date: '2026-07-09', vendor: 'Vercel', category: 'Deployment', amount: '$20.00', status: 'Verified' },
                    { date: '2026-07-08', vendor: 'Supabase', category: 'Database', amount: '$25.00', status: 'Verified' }
                ];

                render();
            } catch (e) { console.error(e); }
            finally { if(btn) setTimeout(() => btn.classList.remove('animate-spin'), 1000); }
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + view).classList.add('active');
            
            const titles = {
                ledger: 'Strategic Lead Ledger',
                outreach: 'Cold Outreach Logs',
                chat: 'Chatbot Leads',
                drew: 'Drew Technical Logs',
                finance: 'Financial Intelligence'
            };
            document.getElementById('view-title').innerText = titles[view];
            render();
        }

        function filterByBrand(brand) {
            if(brand === 'all') { render(); return; }
            const filtered = data.ledger.filter(l => (l.brand || '').includes(brand));
            renderTable(filtered);
        }

        function render() {
            const grid = document.getElementById('content-grid');
            if(currentView === 'ledger' || currentView === 'chat') {
                renderTable(currentView === 'ledger' ? data.ledger : data.chat);
            } else if(currentView === 'outreach') {
                renderOutreach();
            } else if(currentView === 'drew') {
                renderDrew();
            } else if(currentView === 'finance') {
                renderFinance();
            }
        }

        function renderTable(leads) {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="px-6 py-4 text-[10px] font-bold uppercase text-slate-500 tracking-widest">Entry Date</th>
                                <th class="px-6 py-4 text-[10px] font-bold uppercase text-slate-500 tracking-widest">Client Identity</th>
                                <th class="px-6 py-4 text-[10px] font-bold uppercase text-slate-500 tracking-widest">Service Node</th>
                                <th class="px-6 py-4 text-[10px] font-bold uppercase text-slate-500 tracking-widest">Flow Status</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            ${leads.map(l => `
                            <tr class="hover:bg-slate-50/50 transition-colors">
                                <td class="px-6 py-4 text-xs font-mono text-slate-400">${new Date(l.created_at).toLocaleDateString()}</td>
                                <td class="px-6 py-4 font-bold text-slate-800">${l.name}</td>
                                <td class="px-6 py-4 text-xs text-indigo-600 font-semibold">${l.package || l.brand}</td>
                                <td class="px-6 py-4"><span class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase">${l.status}</span></td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        function renderOutreach() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    ${data.outreach.map(o => `
                    <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm hover:shadow-md transition-all">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-bold text-lg text-slate-800">${o.company_name}</h3>
                                <p class="text-xs text-slate-500 font-mono">${o.email}</p>
                            </div>
                            <span class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase">${o.status}</span>
                        </div>
                        <p class="text-xs text-slate-600 leading-relaxed bg-slate-50 p-3 rounded-lg border border-slate-100">${o.notes || 'No strategic notes recorded.'}</p>
                        <div class="flex justify-between items-center mt-6 pt-4 border-t border-slate-50">
                            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">${o.campaign} Node</span>
                            <span class="text-[10px] text-slate-400 italic">${o.date_sent}</span>
                        </div>
                    </div>`).join('')}
                </div>`;
        }

        function renderDrew() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = `
                <div class="grid grid-cols-1 gap-4">
                    ${data.drew.map(d => `
                    <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm flex items-center justify-between">
                        <div class="flex items-center space-x-6">
                            <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center font-bold text-lg border border-indigo-100">${d.customer_name[0]}</div>
                            <div>
                                <h3 class="font-bold text-slate-800">${d.customer_name}</h3>
                                <p class="text-sm font-mono text-indigo-500">${d.phone}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-xs font-bold text-slate-400 uppercase tracking-tighter mb-1">Call Outcome</div>
                            <div class="text-sm font-bold text-indigo-600 uppercase">${d.outcome}</div>
                        </div>
                    </div>`).join('')}
                </div>`;
        }

        function renderFinance() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = `
                <div class="bg-white rounded-3xl p-10 border border-slate-200 shadow-sm max-w-2xl mx-auto">
                    <div class="flex justify-between items-center mb-12">
                        <div>
                            <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Verified Ledger Total</h2>
                            <p class="text-5xl font-black text-slate-900 tracking-tighter">$49.00</p>
                        </div>
                        <div class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-600">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                    </div>
                    <div class="space-y-6">
                        ${data.finance.map(f => `
                        <div class="flex items-center justify-between py-5 border-b border-slate-50 last:border-0">
                            <div>
                                <h4 class="font-bold text-slate-800">${f.vendor}</h4>
                                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mt-1">${f.category}</p>
                            </div>
                            <div class="text-right">
                                <div class="font-bold text-lg text-slate-900">${f.amount}</div>
                                <div class="text-[9px] text-emerald-500 font-bold uppercase tracking-widest">Verified</div>
                            </div>
                        </div>`).join('')}
                    </div>
                </div>`;
        }

        window.onload = fetchData;
    </script>
</body>
</html>
