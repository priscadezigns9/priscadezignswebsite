<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prisca Dezigns — Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --text: #fff; --accent: #888; --border: rgba(255,255,255,0.1); }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Jost', sans-serif; min-height: 100vh; padding: 60px 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 80px; }
        .eyebrow { font-size: 0.75rem; font-weight: 400; letter-spacing: 6px; text-transform: uppercase; color: var(--accent); margin-bottom: 24px; display: block; }
        h1 { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 700; line-height: 1; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 20px; }
        .articles { display: grid; gap: 40px; margin-bottom: 80px; }
        .article-card { border: 1px solid var(--border); padding: 40px; text-decoration: none; color: inherit; transition: 0.3s; }
        .article-card:hover { border-color: #fff; }
        .article-card .date { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 15px; display: block; }
        .article-card h2 { font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        .article-card p { color: var(--accent); font-size: 1rem; line-height: 1.6; }
        .back-link { display: block; text-align: center; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); text-decoration: none; margin-top: 40px; }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <span class="eyebrow">The 2026 Archive</span>
            <h1>Prisca Dezigns Blog</h1>
        </header>

        <div class="articles">
            <a href="the-2026-strategic-pivot.html" class="article-card">
                <span class="date">May 24, 2026</span>
                <h2>The 2026 Strategic Pivot</h2>
                <p>An inside look at the structural shift from static magazines to dynamic blog ecosystems across the Empire.</p>
            </a>
        </div>

        <a href="../" class="back-link">Back to Home</a>
    </div>
</body>
</html>
