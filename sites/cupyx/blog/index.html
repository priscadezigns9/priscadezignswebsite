<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupyx Blog</title>
    <meta name="description" content="Latest articles and news from Cupyx. Part of the Prisca Dezigns Empire.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap">
    
    <style>
        :root {
            --brand-color: #00FFAA;
            --bg: #000000;
            --surface: #0a0a0a;
            --text: #ffffff;
            --border: rgba(255,255,255,0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 60px 6%;
            text-align: center;
        }
        
        .header h1 {
            font-size: 3rem;
            letter-spacing: -2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .header p {
            font-size: 0.9rem;
            color: var(--brand-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 6%;
        }
        
        .blog-feed {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        
        .article-item {
            border-bottom: 1px solid var(--border);
            padding-bottom: 40px;
        }
        
        .article-item:last-child {
            border-bottom: none;
        }
        
        .article-date {
            font-size: 0.8rem;
            color: var(--brand-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .article-title {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: var(--text);
            text-decoration: none;
            display: block;
        }
        
        .article-title:hover {
            color: var(--brand-color);
        }
        
        .article-excerpt {
            font-size: 1rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 20px;
        }
        
        .article-link {
            display: inline-block;
            padding: 10px 20px;
            border: 1px solid var(--brand-color);
            color: var(--brand-color);
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .article-link:hover {
            background: var(--brand-color);
            color: var(--bg);
        }
        
        footer {
            padding: 60px 6%;
            text-align: center;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Cupyx</h1>
    <p>Blog & Articles</p>
</div>

<div class="container">
    <div class="blog-feed" id="blog-feed">
        <!-- Articles will be populated here -->
    </div>
</div>

<footer>
    <p>Cupyx is part of the Prisca Dezigns Global Empire.</p>
    <p style="margin-top: 15px;">© 2026 Cupyx | Articles & Intelligence</p>
</footer>

<script>
// This will be replaced with dynamic article loading
// For now, fetch articles from the blog directory
fetch('articles.json')
    .then(response => response.json())
    .then(articles => {
        const feed = document.getElementById('blog-feed');
        articles.forEach(article => {
            const item = document.createElement('div');
            item.className = 'article-item';
            item.innerHTML = `
                <div class="article-date">${article.date}</div>
                <a href="${article.url}" class="article-title">${article.title}</a>
                <p class="article-excerpt">${article.excerpt}</p>
                <a href="${article.url}" class="article-link">Read Article</a>
            `;
            feed.appendChild(item);
        });
    })
    .catch(err => console.log('No articles yet'));
</script>

</body>
</html>
