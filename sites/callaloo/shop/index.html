<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lab | Calalloo Alpha Shop</title>
    <style>
        :root {
            --orange: #F97316;
            --black: #000;
            --gray: #0a0a0a;
            --light: #111;
            --text: #fff;
        }

        body {
            background-color: var(--black);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        header {
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--light);
        }

        .logo-sm {
            width: 60px;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-size: 2.5rem;
            color: var(--orange);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 3rem;
        }

        .product-card {
            background: var(--gray);
            border: 1px solid var(--light);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--orange);
        }

        .product-image {
            width: 100%;
            height: 300px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--light);
        }

        .product-image img {
            max-width: 80%;
            max-height: 80%;
            filter: grayscale(1) contrast(1.2);
            transition: filter 0.3s;
        }

        .product-card:hover .product-image img {
            filter: none;
        }

        .product-info {
            padding: 2rem;
        }

        .product-tag {
            color: var(--orange);
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            display: block;
        }

        .product-name {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .product-price {
            font-size: 1.2rem;
            color: #888;
        }

        .buy-btn {
            display: block;
            width: 100%;
            background: var(--orange);
            color: #fff;
            text-align: center;
            padding: 1rem;
            text-decoration: none;
            font-weight: 700;
            margin-top: 2rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <a href="../index.html"><img src="../ai_concept_39_neo_alpha.png" alt="The Alpha Signal" class="logo-sm"></a>
        <h1>The Lab</h1>
        <p style="color: #444; letter-spacing: 5px; text-transform: uppercase; font-size: 0.8rem;">The Alpha Signal Inventory</p>
    </header>

    <div class="container">
        <div class="shop-grid">
            <!-- Product 1: The Alpha Signal Pod -->
            <article class="product-card">
                <div class="product-image">
                    <img src="../../../ai_concept_39_neo_alpha.png" alt="Alpha Core">
                </div>
                <div class="product-info">
                    <span class="product-tag">Reveal 2026-A</span>
                    <h3 class="product-name">Alpha Core Proxy</h3>
                    <p class="product-price">Speculative Access Only</p>
                    <a href="#" class="buy-btn">Inquire for Alpha</a>
                </div>
            </article>

            <!-- Product 2: Trend Intelligence Ledger -->
            <article class="product-card">
                <div class="product-image">
                    <img src="../../../ai_concept_39_neo_alpha.png" alt="Ledger">
                </div>
                <div class="product-info">
                    <span class="product-tag">Data Asset</span>
                    <h3 class="product-name">Signal Ledger v1.0</h3>
                    <p class="product-price">Limited Release</p>
                    <a href="#" class="buy-btn">Secure Data</a>
                </div>
            </article>
        </div>
    </div>

</body>
</html>
