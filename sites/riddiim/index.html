<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIDDIIM | Sovereign Music Studio</title>
    <script src="../../wallet-core.js"></script>
    <style>
        :root { --accent: #FF6B00; --bg: #0A0A0A; --surface: #111; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: 2px; }
        .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
        .login-box { background: var(--surface); padding: 40px; border-radius: 30px; border: 1px solid #222; max-width: 400px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .btn-wallet { display: block; width: 100%; padding: 18px; background: #7B35D4; color: white; border: none; border-radius: 15px; font-weight: 900; font-size: 0.9rem; text-transform: uppercase; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .btn-wallet:hover { transform: scale(1.02); background: #8e44ad; }
        
        /* Sidebar Overlay */
        .sidebar { position: fixed; top: 0; right: -420px; width: 420px; height: 100vh; background: rgba(5,5,5,0.98); backdrop-filter: blur(30px); border-left: 1px solid #222; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; text-align: left; }
        .sidebar.active { right: 0; }
        .sidebar-header { padding: 30px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-tabs { display: flex; border-bottom: 1px solid #111; }
        .sidebar-tabs button { flex: 1; background: none; border: none; color: #444; padding: 15px; font-size: 0.6rem; font-weight: 800; cursor: pointer; }
        .sidebar-content { flex: 1; overflow-y: auto; }
    </style>
</head>
<body>
    <header>
        <div class="logo">RIDDIIM</div>
        <nav><a href="/" style="color: #666; text-decoration: none; font-size: 0.7rem; font-weight: 800;">HUB</a></nav>
    </header>

    <main class="hero">
        <div class="login-box">
            <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/riddiim_logo.png" style="width: 100px; margin-bottom: 30px; border-radius: 50%;">
            <h1 style="margin: 0; font-size: 2rem;">Sovereign Music Studio</h1>
            <p style="color: #666; font-size: 0.9rem; margin-top: 10px;">Connect your node to start engineering.</p>
            <button onclick="toggleSidebar()" class="btn-wallet">Sign In with Wallet</button>
        </div>
    </main>

    <!-- Wallet Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2 style="color:white; margin:0; font-size:1.1rem;">PRISCION WALLET</h2>
            <button onclick="toggleSidebar()" style="background:none; border:none; color:#555; font-size:2rem; cursor:pointer;">&times;</button>
        </div>
        <div class="sidebar-tabs">
            <button id="tab-assets" onclick="switchWalletTabCore('assets')">Assets</button>
            <button id="tab-vault" onclick="switchWalletTabCore('vault')">Vault</button>
            <button id="tab-shop" onclick="switchWalletTabCore('shop')">Hub</button>
            <button id="tab-sync" onclick="switchWalletTabCore('sync')">Security</button>
        </div>
        <div class="sidebar-content" id="wallet-main-view"></div>
    </div>

    <script>
        function toggleSidebar() { 
            const s = document.getElementById('sidebar');
            s.classList.toggle('active'); 
            if(s.classList.contains('active')) initializeWallet('sidebar');
        }
    </script>
</body>
</html>
