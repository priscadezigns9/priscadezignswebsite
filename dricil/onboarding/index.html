<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding | Dricil AI</title>
    <link rel="stylesheet" href="../shared/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../shared/app.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">DRICIL<span>.</span></div>
                <a href="../landing/index.html">Back to Home</a>
            </nav>
        </div>
    </header>

    <div class="container" style="max-width: 600px; padding: 60px 0;">
        <h1>Let's build your brand voice.</h1>
        <p style="margin-bottom: 40px; color: var(--text-muted);">This info allows our AI to generate content that sounds exactly like you.</p>

        <form id="onboardingForm">
            <div class="form-group">
                <label for="business_name">Business Name</label>
                <input type="text" id="business_name" required>
            </div>
            <div class="form-group">
                <label for="industry">Industry</label>
                <input type="text" id="industry" placeholder="e.g. SaaS, E-commerce, Real Estate" required>
            </div>
            <div class="form-group">
                <label for="target_audience">Target Audience</label>
                <input type="text" id="target_audience" placeholder="e.g. Tech-savvy millennials" required>
            </div>
            <div class="form-group">
                <label for="brand_voice">Brand Voice</label>
                <select id="brand_voice">
                    <option value="professional">Professional & Authoritative</option>
                    <option value="friendly">Friendly & Accessible</option>
                    <option value="bold">Bold & Disruptive</option>
                    <option value="casual">Casual & Witty</option>
                </select>
            </div>
            <div class="form-group">
                <label>Social Platforms</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <label style="font-weight: normal;"><input type="checkbox" name="platforms" value="twitter"> Twitter</label>
                    <label style="font-weight: normal;"><input type="checkbox" name="platforms" value="linkedin"> LinkedIn</label>
                    <label style="font-weight: normal;"><input type="checkbox" name="platforms" value="instagram"> Instagram</label>
                    <label style="font-weight: normal;"><input type="checkbox" name="platforms" value="facebook"> Facebook</label>
                </div>
            </div>
            <div class="form-group">
                <label for="primary_goal">Primary Goal</label>
                <select id="primary_goal">
                    <option value="awareness">Brand Awareness</option>
                    <option value="leads">Lead Generation</option>
                    <option value="engagement">Community Engagement</option>
                    <option value="sales">Direct Sales</option>
                </select>
            </div>
            <div class="form-group">
                <label for="competitors">Top 3 Competitors (comma separated)</label>
                <input type="text" id="competitors">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Complete Onboarding</button>
        </form>

        <div id="successMessage" style="display: none; margin-top: 40px; padding: 20px; background: #e0f2f1; border-radius: 8px; text-align: center;">
            <h2 style="color: var(--primary-teal);">Welcome to Dricil!</h2>
            <p>Your AI engine is now spinning up. Check your email for your welcome package.</p>
            <a href="../dashboard/index.html" class="btn btn-primary" style="margin-top: 20px;">Go to Dashboard</a>
        </div>
    </div>

    <script>
        document.getElementById('onboardingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                business_name: document.getElementById('business_name').value,
                industry: document.getElementById('industry').value,
                brand_voice: document.getElementById('brand_voice').value,
                primary_goal: document.getElementById('primary_goal').value,
                platforms: Array.from(document.querySelectorAll('input[name="platforms"]:checked')).map(cb => cb.value),
                competitors: document.getElementById('competitors').value.split(',').map(s => s.trim())
            };

            console.log("Saving onboarding data:", formData);
            
            // In a real app: await dricilApp.saveOnboarding(formData);
            
            document.getElementById('onboardingForm').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
        });
    </script>
</body>
</html>
