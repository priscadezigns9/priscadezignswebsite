<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Start Your Website — Vela</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F7F4EF;color:#0D0C0A;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:60px 24px 80px}
a{text-decoration:none;color:inherit}
:root{--rust:#C84B2F;--ink:#0D0C0A;--cream:#F7F4EF;--muted:#7A756E;--border:#E2DDD6}

.top{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:540px;margin-bottom:48px}
.nav-logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--ink)}
.nav-logo span{color:var(--rust)}
.back{font-size:0.8rem;color:var(--muted);transition:color 0.2s}
.back:hover{color:var(--ink)}

.card{width:100%;max-width:540px;background:#fff;border:1px solid var(--border);border-radius:4px;padding:44px 40px}
.card-eyebrow{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--rust);margin-bottom:14px}
.card h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-1px;color:var(--ink);margin-bottom:8px;line-height:1.1}
.card p.sub{color:var(--muted);font-size:0.88rem;margin-bottom:36px;line-height:1.65}

.field{margin-bottom:20px}
label{display:block;font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px}
input,textarea,select{width:100%;background:var(--cream);border:1px solid var(--border);border-radius:2px;padding:12px 14px;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--rust)}
textarea{resize:vertical;min-height:100px;line-height:1.6}
select option{background:#fff}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.divider{height:1px;background:var(--border);margin:28px 0}

.submit{width:100%;background:var(--rust);color:#fff;border:none;padding:16px;border-radius:2px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.3px;margin-top:8px}
.submit:hover{background:#A83A20;transform:translateY(-1px)}

.note{font-size:0.75rem;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6}
</style>
</head>
<body>

<div class="top">
  <a class="nav-logo" href="/vela/"><span>V</span>ela</a>
  <a class="back" href="/vela/">← Back</a>
</div>

<div class="card">
  <div class="card-eyebrow">Website Project Brief</div>
  <h1>Let's build your site.</h1>
  <p class="sub">Fill in the details below — we'll have your custom website live within 24 hours.</p>

  <div class="row">
    <div class="field"><label>Your Name *</label><input type="text" placeholder="Full name"/></div>
    <div class="field"><label>WhatsApp *</label><input type="tel" placeholder="+1 868 000 0000"/></div>
  </div>
  <div class="field"><label>Email Address *</label><input type="email" placeholder="you@example.com"/></div>
  <div class="field">
    <label>Package *</label>
    <select>
      <option value="">Select a package...</option>
      <option>Starter — $299 (5 pages, 24h delivery)</option>
      <option>Business — $599 (10 pages + blog)</option>
      <option>Empire — $999 (unlimited + e-commerce)</option>
      <option>Not sure yet — help me choose</option>
    </select>
  </div>
  <div class="row">
    <div class="field"><label>Business Name</label><input type="text" placeholder="Optional"/></div>
    <div class="field"><label>Industry</label><input type="text" placeholder="e.g. Real Estate"/></div>
  </div>
  <div class="field"><label>Website Goal *</label><textarea placeholder="What should your website do? Get leads? Sell products? Show a portfolio? Tell us your goal and any specific pages you need."></textarea></div>
  <div class="field"><label>Do you have a domain?</label><select><option value="">Select...</option><option>Yes, I already have one</option><option>No, I need one</option><option>Not sure</option></select></div>
  <div class="field"><label>How did you find us?</label><select><option value="">Select...</option><option>Facebook</option><option>Instagram</option><option>Google</option><option>Referral</option><option>Other</option></select></div>

  <div class="divider"></div>
  <button class="submit">Submit My Project →</button>
  <p class="note">We'll reach out within 2 hours to confirm your brief and collect payment.</p>
</div>

</body>
</html>
