<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO_ENGINE Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">SEO_ENGINE</div>
            <nav>
                <a href="#" class="active" onclick="showTab('dashboard')">Dashboard</a>
                <a href="#" onclick="showTab('audits')">Audits</a>
                <a href="#" onclick="showTab('content')">Content</a>
                <a href="#" onclick="showTab('calendar')">Calendar</a>
                <a href="#" onclick="showTab('settings')">Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <div id="dashboard-tab" class="tab-content active">
                <div class="search-bar">
                    <input type="text" id="url-input" placeholder="Enter URL (e.g., https://example.com)">
                    <button onclick="runAudit()">Analyze</button>
                </div>

                <div class="results-grid">
                    <div class="card score-card">
                        <h3>SEO Score</h3>
                        <div class="score-container">
                            <svg viewBox="0 0 36 36" class="circular-chart">
                                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <path id="score-circle" class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <text x="18" y="20.35" class="percentage" id="score-text">0</text>
                            </svg>
                        </div>
                    </div>

                    <div class="card issues-card">
                        <h3>Critical Issues</h3>
                        <ul id="issues-list">
                            <li>Run an audit to see issues...</li>
                        </ul>
                    </div>

                    <div class="card recommendations-card">
                        <h3>Top Recommendations</h3>
                        <ul id="recommendations-list">
                            <li>Run an audit to see recommendations...</li>
                        </ul>
                    </div>
                </div>
            </div>

            <div id="content-tab" class="tab-content">
                <div class="content-generator">
                    <h2>AI Content Generator</h2>
                    <div class="input-group">
                        <input type="text" id="keyword-input" placeholder="Enter target keyword...">
                        <button onclick="generateBlog()">Generate Blog Post</button>
                    </div>
                    <div id="blog-output" class="blog-preview" style="display:none;">
                        <div class="blog-header">
                            <h3 id="blog-title"></h3>
                            <button class="copy-btn" onclick="copyContent()">Copy Content</button>
                        </div>
                        <div id="blog-body" class="blog-body"></div>
                    </div>
                </div>
            </div>

            <div id="calendar-tab" class="tab-content">
                <h2>Content Calendar</h2>
                <div class="calendar-grid" id="calendar-grid">
                    <!-- JS will populate this -->
                </div>
            </div>
        </main>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
