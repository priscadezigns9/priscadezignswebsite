<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shop &mdash; Couture Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Cormorant+Garamond:wght@300;400;600&display=swap">
<style>
  :root {
    --accent: #2c2c2c;
    --bg: #f7f5f2;
    --text: #1a1a1a;
    --text-dim: #666;
    --border: #e8e4de;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Space Grotesk', sans-serif; background: #fff; color: var(--text); }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 12px 20px; font-size: 0.85rem; color: var(--text-dim);
    text-decoration: none; border-bottom: 1px solid var(--border);
    width: 100%; background: #fff;
  }
  .back-link:hover { color: var(--accent); }
  .shop-hero {
    background: var(--bg); padding: 40px 24px 32px; text-align: center;
  }
  .shop-hero img { max-height: 80px; max-width: 200px; object-fit: contain; margin-bottom: 12px; }
  .shop-hero h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 2rem; font-weight: 300; color: var(--text); margin-bottom: 4px; }
  .shop-hero p { font-size: 0.9rem; color: var(--text-dim); }
  .filter-bar {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
    padding: 24px 24px 0; max-width: 900px; margin: 0 auto;
  }
  .filter-btn, .filter-all {
    padding: 8px 20px; border: 1.5px solid var(--border); border-radius: 30px;
    background: #fff; color: var(--text-dim); font-family: inherit; font-size: 0.85rem;
    font-weight: 600; cursor: pointer; transition: all 0.18s;
  }
  .filter-btn:hover, .filter-all:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active, .filter-all.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  .products-section {
    padding: 32px 24px 80px; max-width: 1200px; margin: 0 auto;
  }
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 24px; margin-top: 24px;
  }
  .product-card {
    border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden;
    transition: box-shadow 0.2s, transform 0.2s; background: #fff;
  }
  .product-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.1); transform: translateY(-2px); }
  .product-card.hidden { display: none; }
  .product-card-img {
    width: 100%; aspect-ratio: 1/1; object-fit: cover; background: var(--bg);
  }
  .product-card-body { padding: 16px; }
  .product-brand { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 4px; text-transform: uppercase; }
  .product-tag {
    display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px;
    background: var(--bg); color: var(--text-dim); margin-bottom: 6px;
  }
  .product-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 6px; line-height: 1.35; }
  .product-desc { font-size: 0.8rem; color: var(--text-dim); line-height: 1.5; margin-bottom: 10px; }
  .product-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .product-stars { color: #f59e0b; font-size: 0.8rem; }
  .product-reviews { font-size: 0.75rem; color: var(--text-dim); }
  .product-price { font-size: 1.1rem; font-weight: 800; color: var(--text); margin-bottom: 12px; }
  .product-btn {
    display: block; text-align: center; padding: 10px; background: var(--accent);
    color: #fff; border-radius: 6px; font-weight: 700; font-size: 0.82rem;
    text-decoration: none; transition: opacity 0.2s;
  }
  .product-btn:hover { opacity: 0.88; }
  .no-results {
    text-align: center; padding: 60px 24px; color: var(--text-dim);
    font-size: 1rem; display: none;
  }
  .footer-mini {
    background: var(--bg); padding: 24px; text-align: center;
    font-size: 0.82rem; color: var(--text-dim); border-top: 1px solid var(--border);
  }
  .footer-mini a { color: var(--accent); text-decoration: none; }
  @media(max-width:600px) {
    .product-grid { grid-template-columns: 1fr; }
    .products-section { padding: 20px 16px 60px; }
  }
</style>
</head>
<body>

<a href="/couture-gallery/" class="back-link">&#8592; Back to Couture Gallery</a>

<div class="shop-hero">
  <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/logos/couture-gallery.jpg" alt="Couture Gallery logo">
  <h1>Shop &mdash; Couture Gallery</h1>
  <p>Luxury handbags & leather goods</p>
</div>

<div class="filter-bar">
  <button class="filter-all active" data-filter="all">All Products</button>
      <button class="filter-btn" data-filter="totes">👜 Totes</button>
      <button class="filter-btn" data-filter="crossbody">👝 Crossbody</button>
      <button class="filter-btn" data-filter="clutches">💼 Clutches</button>
</div>

<section class="products-section">
  <div class="product-grid" id="productGrid">
    <!-- Products are shown from the main product grid above; 
         this shop page serves as the filtered view entry point.
         Add product cards here with data-category="[cat]" attributes. -->
  </div>
  <p class="no-results" id="noResults">No products found in this category. <a href="/couture-gallery/shop/">View all products</a></p>
</section>

<footer class="footer-mini">
  <p>A <a href="/">Prisca Dezigns</a> brand &mdash; &copy; 2026 All rights reserved. Affiliate links &mdash; we may earn a commission at no extra cost to you.</p>
</footer>

<script>
(function() {
  var allBtn = document.querySelector('.filter-all');
  var filterBtns = document.querySelectorAll('.filter-btn');
  var cards = document.querySelectorAll('.product-card');
  var noResults = document.getElementById('noResults');

  function applyFilter(cat) {
    var visible = 0;
    cards.forEach(function(card) {
      if (cat === 'all' || card.dataset.category === cat) {
        card.classList.remove('hidden');
        visible++;
      } else {
        card.classList.add('hidden');
      }
    });
    if (cards.length === 0) {
      noResults.style.display = 'none';
    } else {
      noResults.style.display = visible === 0 ? 'block' : 'none';
    }
  }

  function setActive(clickedBtn) {
    allBtn.classList.remove('active');
    filterBtns.forEach(function(b) { b.classList.remove('active'); });
    clickedBtn.classList.add('active');
  }

  if (allBtn) {
    allBtn.addEventListener('click', function() {
      setActive(allBtn);
      applyFilter('all');
    });
  }

  filterBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      setActive(btn);
      applyFilter(btn.dataset.filter);
    });
  });

  // URL category preselection
(function(){
  var p = new URLSearchParams(window.location.search);
  var c = p.get('cat');
  if(c){
    var b = document.querySelector('[data-filter="'+c+'"]');
    if(b) b.click();
  }
})();
})();
</script>
</body>
</html>
