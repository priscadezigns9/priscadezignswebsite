<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0F; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 80px; padding: 60px; }
.row { display: flex; align-items: center; gap: 60px; flex-wrap: wrap; justify-content: center; }
.wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
.label { font-family: sans-serif; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: #333; }
</style>
</head>
<body>

<!-- APP ICON — Vinyl, shady/worn -->
<div class="row">
<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="320" height="320">
  <defs>
    <!-- Noise/grain filter for worn texture -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Scratchy irregular stroke via displacement -->
    <filter id="scratchy">
      <feTurbulence type="turbulence" baseFrequency="0.02 0.08" numOctaves="3" seed="7" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="2.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Worn vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#0A0A0F" stop-opacity="0.7"/>
    </radialGradient>

    <!-- Subtle glow toward center -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="vinylClip">
      <circle cx="200" cy="200" r="185"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0A0A0F" rx="88"/>

  <!-- Vinyl disc base -->
  <circle cx="200" cy="200" r="185" fill="#0D0D0D"/>

  <!-- Groove rings — slightly wobbly via scratchy filter, uneven opacity -->
  <g clip-path="url(#vinylClip)" filter="url(#scratchy)" fill="none" stroke-linecap="round">

    <circle cx="200" cy="200" r="181" stroke="white" stroke-width="1.4" stroke-opacity="0.18"/>
    <circle cx="200" cy="200" r="172" stroke="white" stroke-width="1.5" stroke-opacity="0.22"/>
    <circle cx="200" cy="200" r="163" stroke="white" stroke-width="1.4" stroke-opacity="0.20"/>
    <circle cx="200" cy="200" r="154" stroke="white" stroke-width="1.6" stroke-opacity="0.26"/>
    <circle cx="200" cy="200" r="145" stroke="white" stroke-width="1.4" stroke-opacity="0.24"/>
    <circle cx="200" cy="200" r="136" stroke="white" stroke-width="1.5" stroke-opacity="0.30"/>
    <circle cx="200" cy="200" r="127" stroke="white" stroke-width="1.6" stroke-opacity="0.34"/>
    <circle cx="200" cy="200" r="118" stroke="white" stroke-width="1.4" stroke-opacity="0.38"/>
    <circle cx="200" cy="200" r="109" stroke="white" stroke-width="1.5" stroke-opacity="0.42"/>
    <circle cx="200" cy="200" r="100" stroke="white" stroke-width="1.6" stroke-opacity="0.48"/>
    <circle cx="200" cy="200" r="91"  stroke="white" stroke-width="1.5" stroke-opacity="0.52"/>
    <circle cx="200" cy="200" r="82"  stroke="white" stroke-width="1.6" stroke-opacity="0.58"/>
    <circle cx="200" cy="200" r="73"  stroke="white" stroke-width="1.5" stroke-opacity="0.64"/>
    <circle cx="200" cy="200" r="64"  stroke="white" stroke-width="1.6" stroke-opacity="0.70"/>

  </g>

  <!-- Label area (center of vinyl — matte zone) -->
  <circle cx="200" cy="200" r="54" fill="#111114"/>
  <circle cx="200" cy="200" r="53" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Subtle grain on label -->
  <circle cx="200" cy="200" r="53" fill="url(#glow)"/>

  <!-- Spindle hole -->
  <circle cx="200" cy="200" r="6" fill="#0A0A0F" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- Vignette overlay — makes edges look worn -->
  <circle cx="200" cy="200" r="185" fill="url(#vignette)"/>

  <!-- Outer edge — slightly rough -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5" filter="url(#scratchy)"/>

</svg>
<div class="label">App icon</div>
</div>

<!-- WORDMARK LOGO -->
<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" width="420" height="300">
  <rect width="560" height="400" fill="#0A0A0F"/>

  <defs>
    <filter id="grain2">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="scratchy2">
      <feTurbulence type="turbulence" baseFrequency="0.02 0.08" numOctaves="3" seed="12" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <clipPath id="miniClip"><circle cx="60" cy="130" r="52"/></clipPath>
  </defs>

  <!-- Mini vinyl icon -->
  <circle cx="60" cy="130" r="52" fill="#0D0D0D"/>
  <g clip-path="url(#miniClip)" filter="url(#scratchy2)" fill="none">
    <circle cx="60" cy="130" r="50" stroke="white" stroke-width="1.3" stroke-opacity="0.18"/>
    <circle cx="60" cy="130" r="43" stroke="white" stroke-width="1.3" stroke-opacity="0.26"/>
    <circle cx="60" cy="130" r="36" stroke="white" stroke-width="1.3" stroke-opacity="0.34"/>
    <circle cx="60" cy="130" r="29" stroke="white" stroke-width="1.3" stroke-opacity="0.44"/>
    <circle cx="60" cy="130" r="22" stroke="white" stroke-width="1.3" stroke-opacity="0.56"/>
  </g>
  <circle cx="60" cy="130" r="14" fill="#111114" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="60" cy="130" r="3" fill="#0A0A0F" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- RIDDIM wordmark -->
  <text x="130" y="152"
    font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="86"
    fill="white"
    letter-spacing="-4"
    filter="url(#scratchy2)"
  >RIDDIM</text>

  <!-- Tagline -->
  <text x="131" y="188"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="300"
    font-size="11"
    fill="rgba(255,255,255,0.35)"
    letter-spacing="5.5"
  >HEAR IT. FIND IT. CREATE IT.</text>

</svg>
<div class="label">Word logo</div>
</div>
</div>

</body>
</html>
