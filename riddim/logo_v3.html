<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050508; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 60px; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="460" height="460">
  <rect width="500" height="500" fill="#0A0A0F" rx="80"/>

  <defs>
    <clipPath id="vinylClip">
      <circle cx="250" cy="250" r="210"/>
    </clipPath>
  </defs>

  <!-- Vinyl background -->
  <circle cx="250" cy="250" r="212" fill="#0A0A0F" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!--
    CONCEPT: Spiral grooves going inward.
    Outer grooves (large radius) = normal concentric arcs, full circles.
    As radius shrinks toward center, the arcs on the RIGHT side
    gradually deviate to trace the R letterform.
    
    R letterform centered in inner zone (r = 30 to 110):
    - Stem: left side of R, x=210 to x=220, y=175 to y=325
    - Bowl: curves right from stem top, peak x≈295, returns y≈255
    - Leg: diagonal from bowl-stem junction down-right to x≈315, y≈320, curls out
    
    Outer grooves (r = 120 to 210): pure circles, normal vinyl look
    Transition grooves (r = 80 to 120): gradually shifting right side
    Inner grooves (r = 30 to 80): fully forming the R
  -->

  <g fill="none" stroke-linecap="round" clip-path="url(#vinylClip)">

    <!-- OUTER GROOVES — pure circles, normal vinyl (r=130 to 205, 8 grooves) -->
    <circle cx="250" cy="250" r="205" stroke="rgba(255,255,255,0.55)" stroke-width="1.8"/>
    <circle cx="250" cy="250" r="195" stroke="rgba(255,255,255,0.52)" stroke-width="1.8"/>
    <circle cx="250" cy="250" r="185" stroke="rgba(255,255,255,0.50)" stroke-width="1.8"/>
    <circle cx="250" cy="250" r="175" stroke="rgba(255,255,255,0.48)" stroke-width="1.8"/>
    <circle cx="250" cy="250" r="165" stroke="rgba(255,255,255,0.46)" stroke-width="1.8"/>
    <circle cx="250" cy="250" r="155" stroke="rgba(255,255,255,0.44)" stroke-width="1.8"/>
    <circle cx="250" cy="250" r="145" stroke="rgba(255,255,255,0.42)" stroke-width="1.8"/>
    <circle cx="250" cy="250" r="135" stroke="rgba(255,255,255,0.40)" stroke-width="1.8"/>

    <!--
      TRANSITION + INNER GROOVES — right side starts deviating into R shape
      Each groove = left arc (normal) + right side follows R contour at that y range
      
      The R contour on right side:
      Outermost inner (r=125): just the very top/bottom of stem visible
      r=115: stem edges + hint of bowl starting
      r=105: bowl starts to arc right
      r=95: bowl peak
      r=85: bowl coming back, leg junction
      r=75: leg starts going diagonal
      r=65: leg going down-right
      r=55: leg curving out
      r=45: base of leg + base of stem
      
      For the left half: normal arc from bottom going counter-clockwise to top
      For the right half: follow R outline at matching y positions
      
      R outline points:
      Stem left x=216, stem right x=226 (10px wide stem)
      Bowl: from (226,180) arc to peak (296,230) back to (226,258)  
      Leg junction: (226,258) diagonal to (305,318) with outward curve
      
      Each groove traces ONE contour line parallel to the R outline
    -->

    <!-- r=125 — transition begins, right side barely deviates -->
    <path d="
      M 250 375
      A 125 125 0 1 0 250 125
      L 250 125
      Q 268 125 268 145
      L 268 355
      Q 268 375 250 375 Z
    " stroke="rgba(255,255,255,0.38)" stroke-width="1.8" fill="none"/>

    <!-- r=115 — stem becomes visible on right -->
    <path d="
      M 250 365
      A 115 115 0 1 0 250 135
      L 258 135
      L 258 365
      L 250 365 Z
    " stroke="rgba(255,255,255,0.50)" stroke-width="1.8" fill="none"/>

    <!-- r=105 — bowl starts curving right -->
    <path d="
      M 250 355
      A 105 105 0 1 0 250 145
      L 258 145
      L 258 182
      Q 295 195 295 230
      Q 295 258 258 265
      L 258 355
      L 250 355 Z
    " stroke="rgba(255,255,255,0.60)" stroke-width="1.8" fill="none"/>

    <!-- r=95 — bowl peak -->
    <path d="
      M 250 345
      A 95 95 0 1 0 250 155
      L 256 155
      L 256 178
      Q 310 198 308 232
      Q 306 262 256 268
      L 268 285
      Q 300 310 308 330
      L 256 345
      L 250 345 Z
    " stroke="rgba(255,255,255,0.70)" stroke-width="2" fill="none"/>

    <!-- r=85 — bowl closing, leg junction -->
    <path d="
      M 250 335
      A 85 85 0 1 0 250 165
      L 252 165
      L 252 174
      Q 318 200 315 234
      Q 312 264 252 270
      L 264 288
      Q 298 315 312 336
      L 252 335
      L 250 335 Z
    " stroke="rgba(255,255,255,0.78)" stroke-width="2" fill="none"/>

    <!-- r=75 — leg going diagonal -->
    <path d="
      M 250 325
      A 75 75 0 1 0 250 175
      L 248 175
      L 248 170
      Q 312 196 310 234
      Q 308 264 248 272
      L 260 292
      Q 294 320 305 340
      L 248 325
      L 250 325 Z
    " stroke="rgba(255,255,255,0.82)" stroke-width="2.2" fill="none"/>

    <!-- r=65 — leg flowing outward -->
    <path d="
      M 250 315
      A 65 65 0 1 0 250 185
      L 244 185
      L 244 168
      Q 305 192 303 233
      Q 301 262 244 270
      L 255 290
      Q 286 318 295 338
      C 298 345 294 352 287 350
      C 281 348 277 342 273 336
      L 244 298
      L 244 315
      L 250 315 Z
    " stroke="rgba(255,255,255,0.88)" stroke-width="2.2" fill="none"/>

    <!-- r=55 — inner, R most defined -->
    <path d="
      M 250 305
      A 55 55 0 1 0 250 195
      L 240 195
      L 240 165
      Q 296 188 294 232
      Q 292 260 240 268
      L 250 286
      Q 278 314 285 332
      C 288 340 283 347 276 345
      C 270 343 265 336 262 330
      L 240 295
      L 240 305
      L 250 305 Z
    " stroke="rgba(255,255,255,0.92)" stroke-width="2.2" fill="none"/>

    <!-- r=45 — innermost visible groove -->
    <path d="
      M 250 295
      A 45 45 0 1 0 250 205
      L 236 205
      L 236 162
      Q 285 184 283 231
      Q 281 258 236 266
      L 245 282
      Q 270 308 275 326
      C 278 334 272 340 266 338
      C 260 336 256 329 253 323
      L 236 292
      L 236 295
      L 250 295 Z
    " stroke="rgba(255,255,255,0.95)" stroke-width="2.2" fill="none"/>

  </g>

  <!-- Center hole -->
  <circle cx="250" cy="250" r="22" fill="#0A0A0F" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <circle cx="250" cy="250" r="6" fill="rgba(255,255,255,0.5)"/>

  <!-- Outer edge -->
  <circle cx="250" cy="250" r="212" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

</svg>
</body>
</html>
