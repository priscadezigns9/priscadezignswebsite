<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0F; display: flex; align-items: center; justify-content: center; min-height: 100vh; gap: 60px; flex-wrap: wrap; padding: 60px; }
.wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.label { font-family: sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #4B5563; }
</style>
</head>
<body>

<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="420" height="420">
  <rect width="500" height="500" fill="#0A0A0F" rx="72"/>

  <!--
    RIDDIM LOGO v6
    - Tighter rings (14 rings, 14px spacing) — looks like real vinyl
    - Depth: outer rings dimmer, inner rings brighter and slightly thicker
    - R at center: tail of leg curves back and CONNECTS into the next ring out
    - Center: cx=250, cy=252
  -->

  <defs>
    <!-- Radial gradient for depth — brighter toward center -->
    <radialGradient id="depthGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- 
      14 rings from outer (r=230) to inner (r=34), spacing=14
      Each ring: stroke-opacity increases inward, stroke-width slightly increases inward
      Outer rings: opacity 0.28, width 2.5
      Inner rings: opacity 0.92, width 3.8
    -->

    <!-- Ring 1 — r=230 outermost -->
    <ellipse cx="250" cy="252" rx="228" ry="228" stroke="white" stroke-width="2.2" stroke-opacity="0.28"/>
    <!-- Ring 2 — r=216 -->
    <ellipse cx="250" cy="252" rx="214" ry="214" stroke="white" stroke-width="2.3" stroke-opacity="0.33"/>
    <!-- Ring 3 — r=202 -->
    <ellipse cx="250" cy="252" rx="200" ry="200" stroke="white" stroke-width="2.4" stroke-opacity="0.38"/>
    <!-- Ring 4 — r=188 -->
    <ellipse cx="250" cy="252" rx="186" ry="186" stroke="white" stroke-width="2.5" stroke-opacity="0.43"/>
    <!-- Ring 5 — r=174 -->
    <ellipse cx="250" cy="252" rx="172" ry="172" stroke="white" stroke-width="2.6" stroke-opacity="0.48"/>
    <!-- Ring 6 — r=160 -->
    <ellipse cx="250" cy="252" rx="158" ry="158" stroke="white" stroke-width="2.7" stroke-opacity="0.54"/>
    <!-- Ring 7 — r=146 -->
    <ellipse cx="250" cy="252" rx="144" ry="144" stroke="white" stroke-width="2.8" stroke-opacity="0.60"/>
    <!-- Ring 8 — r=132 -->
    <ellipse cx="250" cy="252" rx="130" ry="130" stroke="white" stroke-width="2.9" stroke-opacity="0.65"/>
    <!-- Ring 9 — r=118 -->
    <ellipse cx="250" cy="252" rx="116" ry="116" stroke="white" stroke-width="3.0" stroke-opacity="0.70"/>
    <!-- Ring 10 — r=104 -->
    <ellipse cx="250" cy="252" rx="102" ry="102" stroke="white" stroke-width="3.1" stroke-opacity="0.75"/>
    <!-- Ring 11 — r=90 -->
    <ellipse cx="250" cy="252" rx="88" ry="88" stroke="white" stroke-width="3.2" stroke-opacity="0.80"/>
    <!-- Ring 12 — r=76 -->
    <ellipse cx="250" cy="252" rx="74" ry="74" stroke="white" stroke-width="3.3" stroke-opacity="0.85"/>
    <!-- Ring 13 — r=62 -->
    <ellipse cx="250" cy="252" rx="60" ry="60" stroke="white" stroke-width="3.4" stroke-opacity="0.90"/>

    <!--
      THE R — innermost ring (replaces r=48 circle)
      Same weight as ring 13 but slightly brighter.
      
      R centered at 250, 252
      Height: 68px (top=218, bottom=286)
      Width: 52px
      
      Key points:
      Stem: (228, 218) down to (228, 286)
      Bowl: arc from (228,218) → peak (278,244) → back (228,268)
      Leg: from (240,268) diagonal to (272,286)
      Leg TAIL: curves back LEFT and connects into ring 13 at the bottom
      
      The tail of the leg sweeps back into an arc that 
      merges seamlessly with the next ring out — so it 
      looks like the groove just continues outward naturally.
    -->

    <path d="
      M 228 218
      L 228 286

      M 228 218
      C 228 216 232 214 238 214
      C 258 214 278 222 278 242
      C 278 262 258 270 238 270
      L 228 270

      M 244 270
      C 252 271 260 276 266 284
      L 276 298
      C 280 304 278 312 270 314
      C 262 316 256 308 250 300
      C 240 286 232 294 222 294
      C 208 294 196 286 196 272
      C 196 264 200 258 206 254
    "
    stroke="white"
    stroke-width="3.6"
    stroke-opacity="1"
    />

  </g>

  <!-- Center hole — small, like vinyl -->
  <circle cx="250" cy="252" r="14" fill="#0A0A0F" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <circle cx="250" cy="252" r="4" fill="rgba(255,255,255,0.45)"/>

  <!-- Subtle outer edge glow -->
  <circle cx="250" cy="252" r="234" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="3"/>

</svg>
<div class="label">Riddim</div>
</div>

<!-- FULL LOGO WITH WORDMARK -->
<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 220" width="680" height="183">
  <rect width="820" height="220" fill="#0A0A0F"/>

  <!-- Mini vinyl icon -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(10,0)">
    <ellipse cx="110" cy="110" rx="100" ry="100" stroke="white" stroke-width="1.8" stroke-opacity="0.28"/>
    <ellipse cx="110" cy="110" rx="86" ry="86" stroke="white" stroke-width="1.9" stroke-opacity="0.35"/>
    <ellipse cx="110" cy="110" rx="72" ry="72" stroke="white" stroke-width="2.0" stroke-opacity="0.43"/>
    <ellipse cx="110" cy="110" rx="58" ry="58" stroke="white" stroke-width="2.1" stroke-opacity="0.52"/>
    <ellipse cx="110" cy="110" rx="44" ry="44" stroke="white" stroke-width="2.2" stroke-opacity="0.62"/>
    <ellipse cx="110" cy="110" rx="30" ry="30" stroke="white" stroke-width="2.3" stroke-opacity="0.75"/>

    <!-- R at center -->
    <path d="
      M 101 93 L 101 127
      M 101 93 C 101 91 104 90 108 90 C 118 90 126 95 126 105 C 126 115 118 119 108 119 L 101 119
      M 107 119 C 111 120 115 123 118 128 L 124 136
      C 127 140 125 145 121 146 C 117 147 114 143 112 139
      C 108 132 103 136 97 136 C 90 136 84 131 84 124
    "
    stroke="white" stroke-width="2.5" stroke-opacity="1"/>

    <circle cx="110" cy="110" r="6" fill="#0A0A0F" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <circle cx="110" cy="110" r="2" fill="rgba(255,255,255,0.4)"/>
  </g>

  <!-- RIDDIM wordmark -->
  <text x="245" y="122" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="72" fill="white" letter-spacing="-3">RIDDIM</text>
  <text x="247" y="152" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="11" fill="#4B5563" letter-spacing="6">HEAR IT. FIND IT. CREATE IT.</text>

</svg>
<div class="label">Full logo</div>
</div>

</body>
</html>
