<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0F; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 60px; }
.wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.label { font-family: sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #4B5563; }
</style>
</head>
<body>

<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="440" height="440">
  <rect width="500" height="500" fill="#0A0A0F" rx="72"/>

  <!--
    ORGANIC WATER RIPPLES
    Each ring is a hand-crafted bezier path — not a perfect ellipse.
    Real water ripples are:
    - Slightly squished on one side
    - One edge more rounded, opposite edge flatter
    - Each ring a different shape — not just scaled versions of each other
    - Subtle wobble — like surface tension is pulling unevenly
    
    All rings drawn as 4-point cubic bezier closed paths.
    Drop point: roughly (252, 258)
  -->

  <!-- Ring 12 — outermost, most spread, most irregular -->
  <path d="M 252 26 C 380 22 478 118 476 252 C 474 378 372 476 248 474 C 118 472 22 374 24 248 C 26 126 128 30 252 26 Z"
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.22"/>

  <!-- Ring 11 -->
  <path d="M 251 42 C 368 38 462 130 460 252 C 458 368 360 460 244 458 C 132 456 40 362 42 248 C 44 136 138 46 251 42 Z"
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.28"/>

  <!-- Ring 10 -->
  <path d="M 251 58 C 356 55 446 142 444 253 C 442 358 350 445 246 443 C 146 441 58 353 60 249 C 62 148 150 61 251 58 Z"
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.34"/>

  <!-- Ring 9 — starts feeling more organic -->
  <path d="M 253 76 C 346 70 430 156 428 254 C 426 348 338 430 246 428 C 158 426 74 342 76 250 C 78 160 163 82 253 76 Z"
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.40"/>

  <!-- Ring 8 -->
  <path d="M 254 94 C 336 88 414 168 413 255 C 412 338 330 414 248 413 C 168 412 91 332 92 252 C 93 173 174 100 254 94 Z"
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.47"/>

  <!-- Ring 7 -->
  <path d="M 255 112 C 326 107 398 180 397 256 C 396 328 322 398 250 397 C 180 396 109 324 110 254 C 111 185 186 117 255 112 Z"
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.54"/>

  <!-- Ring 6 — more wobble here -->
  <path d="M 254 130 C 316 124 384 192 383 257 C 382 318 316 382 252 382 C 190 382 126 318 126 256 C 126 196 194 136 254 130 Z"
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.61"/>

  <!-- Ring 5 -->
  <path d="M 253 150 C 305 144 366 204 365 258 C 364 308 308 364 254 364 C 202 364 144 308 144 257 C 144 207 203 156 253 150 Z"
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.67"/>

  <!-- Ring 4 -->
  <path d="M 252 168 C 295 163 348 207 348 256 C 348 302 298 346 254 347 C 212 348 162 302 162 257 C 162 214 212 173 252 168 Z"
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.73"/>

  <!-- Ring 3 -->
  <path d="M 252 186 C 285 182 330 218 330 255 C 330 292 290 330 254 331 C 220 332 178 294 178 257 C 178 223 221 190 252 186 Z"
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.79"/>

  <!-- Ring 2 -->
  <path d="M 251 204 C 276 201 312 228 312 254 C 312 280 280 312 254 313 C 229 314 196 282 196 256 C 196 232 228 207 251 204 Z"
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.85"/>

  <!-- Ring 1 — innermost, tightest, still a little organic -->
  <path d="M 252 222 C 268 220 294 238 294 255 C 294 272 272 293 254 294 C 237 295 214 273 214 256 C 214 240 237 224 252 222 Z"
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.91"/>

  <!-- Clear center — drop point -->
  <path d="M 252 238 C 262 236 276 246 276 256 C 276 266 264 278 254 278 C 244 279 232 267 232 257 C 232 248 243 240 252 238 Z"
    fill="#0A0A0F" stroke="none"/>

  <!--
    THE R — same weight, centered at drop point ~(253, 257)
    Thick white + dark cutout for even double line
  -->
  <path d="
    M 234 212
    L 234 302
    M 234 212
    C 234 209 238 207 244 207
    C 265 207 286 218 286 242
    C 286 266 265 276 244 276
    L 234 276
    M 248 276
    C 259 278 270 286 277 298
    L 288 315
  "
  fill="none" stroke="white" stroke-width="10" stroke-opacity="0.92"
  stroke-linecap="round" stroke-linejoin="round"/>

  <path d="
    M 234 212
    L 234 302
    M 234 212
    C 234 209 238 207 244 207
    C 265 207 286 218 286 242
    C 286 266 265 276 244 276
    L 234 276
    M 248 276
    C 259 278 270 286 277 298
    L 288 315
  "
  fill="none" stroke="#0A0A0F" stroke-width="6"
  stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Tiny drop dot -->
  <circle cx="253" cy="257" r="3" fill="rgba(255,255,255,0.45)"/>

</svg>
<div class="label">Riddim</div>
</div>

</body>
</html>
