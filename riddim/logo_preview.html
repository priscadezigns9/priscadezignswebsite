<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050508; display: flex; align-items: center; justify-content: center; min-height: 100vh; gap: 48px; flex-wrap: wrap; padding: 40px; }

.logo-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
}
.label { font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #4B5563; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- LARGE -->
<div class="logo-wrap">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="300" height="300">
    <rect width="400" height="400" fill="#0A0A0F" rx="60"/>
    <circle cx="200" cy="200" r="155" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

    <!-- Stem -->
    <line x1="148" y1="130" x2="148" y2="275" stroke="white" stroke-width="20" stroke-linecap="round"/>

    <!-- Bowl — smooth arc from stem top, curves right and back -->
    <path d="M 148 130 C 148 130 160 126 190 126 C 230 126 256 146 256 172 C 256 198 232 214 200 214 L 148 214"
      fill="none" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Leg — flows from bowl junction, curves out and down like a wave tail -->
    <path d="M 190 214 C 205 214 218 220 228 232 L 255 268 C 260 276 256 288 248 290 C 240 292 234 286 230 280 L 206 246 C 196 232 180 226 162 226"
      fill="none" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Flowing wave tail at base of leg — the "flow" signature -->
    <path d="M 148 275 C 148 275 148 292 158 294 C 170 296 176 284 176 275"
      fill="none" stroke="white" stroke-width="20" stroke-linecap="round"/>
  </svg>
  <div class="label">App Icon</div>
</div>

<!-- WITH WORDMARK -->
<div class="logo-wrap">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="450" height="300">
    <rect width="600" height="400" fill="#0A0A0F" rx="40"/>

    <!-- R icon -->
    <line x1="80" y1="110" x2="80" y2="285" stroke="white" stroke-width="18" stroke-linecap="round"/>
    <path d="M 80 110 C 80 110 92 107 116 107 C 148 107 168 122 168 144 C 168 166 150 180 126 180 L 80 180"
      fill="none" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 118 180 C 130 180 140 186 148 196 L 168 224 C 172 230 170 238 164 240 C 158 242 153 237 150 232 L 132 206 C 124 196 112 190 98 190"
      fill="none" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 80 283 C 80 283 80 296 88 298 C 98 300 103 290 103 283"
      fill="none" stroke="white" stroke-width="18" stroke-linecap="round"/>

    <!-- RIDDIM wordmark -->
    <text x="210" y="220" font-family="'Inter', sans-serif" font-weight="900" font-size="88" fill="white" letter-spacing="-4">RIDDIM</text>

    <!-- Tagline -->
    <text x="212" y="256" font-family="'Inter', sans-serif" font-weight="400" font-size="14" fill="#4B5563" letter-spacing="5">HEAR IT. FIND IT. CREATE IT.</text>
  </svg>
  <div class="label">Full Logo</div>
</div>

<!-- SMALL — favicon size preview -->
<div class="logo-wrap">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="80" height="80">
    <rect width="400" height="400" fill="#0A0A0F" rx="80"/>
    <line x1="148" y1="130" x2="148" y2="275" stroke="white" stroke-width="22" stroke-linecap="round"/>
    <path d="M 148 130 C 148 130 160 126 190 126 C 230 126 256 146 256 172 C 256 198 232 214 200 214 L 148 214"
      fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 190 214 C 205 214 218 220 228 232 L 255 268 C 260 276 256 288 248 290 C 240 292 234 286 230 280 L 206 246 C 196 232 180 226 162 226"
      fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 148 275 C 148 275 148 292 158 294 C 170 296 176 284 176 275"
      fill="none" stroke="white" stroke-width="22" stroke-linecap="round"/>
  </svg>
  <div class="label">Favicon</div>
</div>

</body>
</html>
