<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Yield Intelligence | Primeland Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,700&family=Inter:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #C5A059; --bg: #F9F9F7; --text: #1A1A1A; --border: #E5E5E0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.8; }

        header { position: fixed; top: 0; width: 100%; padding: 25px 8%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(249,249,247,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; color: #000; }
        
        .scout-hero { min-height: 100vh; padding: 180px 8% 100px; max-width: 1200px; margin: 0 auto; }
        .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 4px; color: var(--accent); font-weight: 700; margin-bottom: 20px; display: block; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 6vw, 5rem); line-height: 1.1; margin-bottom: 60px; font-weight: 400; }

        .calc-box { background: #fff; border: 1px solid var(--border); padding: 60px; border-radius: 2px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 10px; display: block; }
        input { width: 100%; padding: 15px; border: 1px solid var(--border); font-family: inherit; font-size: 1rem; }
        .calc-btn { width: 100%; padding: 20px; background: #000; color: #fff; border: none; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; transition: 0.3s; }
        .calc-btn:hover { background: var(--accent); }

        #scout-result { margin-top: 60px; }
        .yield-report { border-top: 2px solid #000; padding-top: 50px; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; margin: 40px 0; }
        .metric-box { padding: 30px; background: #fcfcfc; border: 1px solid var(--border); }
        .m-label { font-size: 0.6rem; text-transform: uppercase; color: #888; margin-bottom: 10px; }
        .m-val { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: #000; }

        .verdict-box { padding: 40px; background: #fafafa; border-left: 4px solid var(--accent); }
        .verdict-box p { font-size: 1.1rem; font-family: 'Cormorant Garamond', serif; font-style: italic; }

        footer { padding: 100px 8% 50px; text-align: center; border-top: 1px solid var(--border); opacity: 0.5; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <header>
        <a href="../" class="logo">Primeland</a>
        <nav><a href="../" style="color:#000; text-decoration:none; font-weight:700; font-size:0.7rem; text-transform:uppercase; letter-spacing:1px;">Market Home</a></nav>
    </header>

    <main class="scout-hero">
        <span class="label">Neural Yield Scout V4.0</span>
        <h1>Asset Intelligence.</h1>

        <div class="calc-box">
            <div class="input-row">
                <div><label>Purchase Price ($)</label><input type="number" id="price" placeholder="e.g. 450000"></div>
                <div><label>Expected Monthly Rent ($)</label><input type="number" id="rent" placeholder="e.g. 2800"></div>
            </div>
            <div class="input-row">
                <div><label>Down Payment (%)</label><input type="number" id="down" placeholder="20"></div>
                <div><label>Annual Appreciation (%)</label><input type="number" id="app" placeholder="3.5"></div>
            </div>
            <button class="calc-btn" onclick="calculateYield()">Run Intelligence Scan</button>

            <div id="scout-result"></div>
        </div>
    </main>

    <footer>© 2026 PRIMELAND NETWORK // A PRISCA DEZIGNS EMPIRE ASSET</footer>

    <script>
    function calculateYield() {
        const price = parseFloat(document.getElementById('price').value);
        const rent = parseFloat(document.getElementById('rent').value);
        const down = parseFloat(document.getElementById('down').value) / 100;
        const res = document.getElementById('scout-result');
        if(!price || !rent) return;

        res.innerHTML = '<p style="text-align:center; font-weight:700; letter-spacing:4px; margin-top:40px;">SIMULATING MARKET CONDITIONS...</p>';

        setTimeout(() => {
            const capRate = ((rent * 12) / price) * 100;
            const cashFlow = (rent * 12) * 0.45; // 40% operating exp estimate
            const coc = (cashFlow / (price * down)) * 100;

            res.innerHTML = `
                <div class="yield-report">
                    <span class="label">Archival Intelligence Report</span>
                    <h2 style="font-family:'Cormorant Garamond'; font-size:2.5rem; margin-bottom:40px;">Investment Viability Readout</h2>
                    
                    <div class="metric-grid">
                        <div class="metric-box"><div class="m-label">Cap Rate</div><div class="m-val">${capRate.toFixed(2)}%</div></div>
                        <div class="metric-box"><div class="m-label">Cash-on-Cash</div><div class="m-val">${coc.toFixed(2)}%</div></div>
                        <div class="metric-box"><div class="m-label">10-Year ROI</div><div class="m-val">Predictive</div></div>
                    </div>

                    <div class="verdict-box">
                        <p><strong>NEURAL VERDICT:</strong> This asset shows strong high-fidelity potential. Based on the 45% operating expense buffer, the cash-on-cash return indicates a stable long-term yield. Recommendation: ACQUIRE for archival growth.</p>
                    </div>

                    <a href="https://www.amazon.com/s?k=real+estate+investment+books&tag=priscadezigns-20" target="_blank" 
                       style="display:block; margin-top:40px; padding:20px; background:#000; color:#fff; text-align:center; text-decoration:none; font-weight:700; text-transform:uppercase; letter-spacing:2px;">
                       Access Investment Resources →
                    </a>
                </div>
            `;
        }, 1500);
    }
    </script>
</body>
</html>
