<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Deck | RIDDIIM</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050508;
      --accent: #FFFFFF;
      --muted: #5A5A70;
      --border: rgba(255, 255, 255, 0.08);
      --font-mono: 'Space Mono', monospace;
      --font-sans: 'Space Grotesk', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: #fff; font-family: var(--font-sans); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    header { height: 80px; padding: 0 48px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: #fff; }
    .nav-vinyl { width: 24px; height: 24px; border-radius: 50%; background: radial-gradient(circle, #222 30%, #000 30%); border: 1px solid rgba(255,255,255,0.1); animation: spin 4s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .nav-wordmark { font-family: var(--font-mono); font-size: 16px; font-weight: 700; letter-spacing: 4px; }

    main { flex: 1; display: flex; flex-direction: column; padding: 20px 40px; overflow-y: auto; align-items: center; }
    
    .tabs { display: flex; gap: 20px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 12px; width: 100%; max-width: 800px; }
    .tab { font-family: var(--font-mono); font-size: 10px; color: var(--muted); cursor: pointer; letter-spacing: 2px; text-transform: uppercase; transition: color 0.3s; }
    .tab.active { color: #fff; }

    .search-container { width: 100%; max-width: 600px; margin-bottom: 20px; position: relative; }
    input { width: 100%; background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 16px 24px; color: #fff; font-family: var(--font-sans); font-size: 16px; border-radius: 4px; outline: none; transition: border 0.3s; }
    input:focus { border-color: rgba(255,255,255,0.3); }

    /* Results Panel */
    #search-results { width: 100%; max-width: 600px; max-height: 200px; overflow-y: auto; background: var(--bg); border: 1px solid var(--border); border-top: none; display: none; margin-bottom: 20px; }
    .result-item { padding: 12px 20px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; gap: 15px; }
    .result-item:hover { background: rgba(255,255,255,0.05); }
    .result-item img { width: 40px; height: 40px; border-radius: 2px; object-fit: cover; }
    .result-info { flex: 1; overflow: hidden; }
    .result-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-artist { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
    
    .deck-container { width: 100%; max-width: 800px; background: rgba(10,10,15,0.8); border: 1px solid var(--border); border-radius: 8px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; min-height: 300px; display: flex; flex-direction: column; }
    
    #player-mount { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
    iframe { border: none; border-radius: 4px; width: 100%; height: 380px; }

    .deck-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 2px; }
    .pulse-dot { width: 8px; height: 8px; background: #22C55E; border-radius: 50%; box-shadow: 0 0 10px #22C55E; animation: blink 2s infinite; }
    @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    #feedback { font-family: var(--font-mono); font-size: 10px; color: #ff3d00; margin-top: 10px; text-align: center; display: none; }
  </style>
</head>
<body>

<header>
  <a href="../" class="nav-brand">
    <div class="nav-vinyl"></div>
    <span class="nav-wordmark">RIDDIIM</span>
  </a>
  <div style="font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 2px;">NEURAL DECK V.1.2</div>
</header>

<main>
  <div class="tabs">
    <div class="tab active" data-source="soundcloud">Universal Search</div>
    <div class="tab" data-source="native">Vault</div>
  </div>

  <div class="search-container">
    <input type="text" placeholder="Search Artist or Song..." id="query">
    <div id="search-results"></div>
    <div id="feedback">SEARCHING_GLOBAL_SIGNALS...</div>
  </div>

  <div class="deck-container">
    <div class="deck-header">
      <div style="display: flex; align-items: center; gap: 10px;">
        <div class="pulse-dot"></div>
        SIGNAL_STATUS: <span id="source-label">READY</span>
      </div>
      <div>CORE_STABLE</div>
    </div>
    
    <div id="player-mount">
      <div style="text-align: center; color: var(--muted); font-family: var(--font-mono); font-size: 12px; letter-spacing: 4px;">INITIALIZING_NEURAL_DECK...</div>
    </div>
  </div>

  <div style="margin-top: 40px; font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 2px; text-align: center;">
    SOVEREIGN AUDIO INTERFACE • POWERED BY RIDDIIM
  </div>
</main>

<script>
  const queryInput = document.getElementById('query');
  const resultsPanel = document.getElementById('search-results');
  const feedback = document.getElementById('feedback');
  const mount = document.getElementById('player-mount');
  const sourceLabel = document.getElementById('source-label');

  // SoundCloud Public Search Proxy (Simulation of Universal Search Bridge)
  async function performSearch(q) {
    feedback.style.display = 'block';
    resultsPanel.style.display = 'none';
    
    try {
      // In a production environment, this calls the Riddiim Search Bridge.
      // For this high-fidelity demonstration, we simulate the "Neural Recognition" of results.
      const mockResults = [
        { title: q + " - Neural Mix", artist: "Riddiim Labs", id: "track1", url: "https://soundcloud.com/riddiim/vibe1" },
        { title: "Burna Boy - Last Last", artist: "Burna Boy", id: "bb1", url: "https://soundcloud.com/burnaboy/last-last" },
        { title: "Burna Boy - Ye", artist: "Burna Boy", id: "bb2", url: "https://soundcloud.com/burnaboy/ye" },
        { title: "Tems - Free Mind", artist: "Tems", id: "t1", url: "https://soundcloud.com/tems/free-mind" }
      ].filter(r => r.title.toLowerCase().includes(q.toLowerCase()) || r.artist.toLowerCase().includes(q.toLowerCase()));

      renderResults(mockResults);
    } catch (e) {
      feedback.textContent = 'SIGNAL_ERROR';
    }
  }

  function renderResults(items) {
    feedback.style.display = 'none';
    if(items.length === 0) {
      resultsPanel.innerHTML = '<div style="padding:20px; font-size:10px; color:var(--muted);">NO_SIGNALS_FOUND</div>';
    } else {
      resultsPanel.innerHTML = items.map(item => `
        <div class="result-item" onclick="loadTrack('${item.url}', '${item.title}')">
          <div class="result-info">
            <div class="result-title">${item.title}</div>
            <div class="result-artist">${item.artist}</div>
          </div>
        </div>
      `).join('');
    }
    resultsPanel.style.display = 'block';
  }

  function loadTrack(url, title) {
    resultsPanel.style.display = 'none';
    sourceLabel.textContent = 'ACTIVE_SIGNAL';
    
    // We use the SoundCloud Widget API to host the song within Riddiim
    mount.innerHTML = `<iframe scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%23050508&auto_play=true&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe>`;
    
    queryInput.value = title;
  }

  queryInput.oninput = (e) => {
    const val = e.target.value.trim();
    if(val.length > 2) {
      performSearch(val);
    } else {
      resultsPanel.style.display = 'none';
      feedback.style.display = 'none';
    }
  };

  queryInput.onkeydown = (e) => {
    if(e.key === 'Enter') {
      const val = queryInput.value.trim();
      if(val.includes('http')) {
        loadTrack(val, "Bridged Signal");
      }
    }
  }
</script>
</body>
</html>
