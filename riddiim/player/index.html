<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Neural Deck | RIDDIIM</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Riddiim">
  <link rel="icon" type="image/png" href="https://priscadezigns.org/assets/logos/riddiim_favicon.png">
  <link rel="apple-touch-icon" href="https://priscadezigns.org/assets/logos/riddiim_favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="neural_engine.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050508;
      --accent: #FFFFFF;
      --muted: #5A5A70;
      --border: rgba(255, 255, 255, 0.08);
      --font-mono: 'Space Mono', monospace;
      --font-sans: 'Space Grotesk', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: #fff; font-family: var(--font-sans); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    header { height: 70px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; }
    .nav-vinyl { width: 20px; height: 20px; border-radius: 50%; background: radial-gradient(circle, #222 30%, #000 30%); border: 1px solid rgba(255,255,255,0.1); animation: spin 4s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .nav-wordmark { font-family: var(--font-mono); font-size: 14px; font-weight: 700; letter-spacing: 2px; }

    main { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; align-items: center; -webkit-overflow-scrolling: touch; }
    
    .tabs { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; width: 100%; max-width: 600px; position: sticky; top: 0; background: var(--bg); z-index: 50; }
    .tab { font-family: var(--font-mono); font-size: 11px; color: var(--muted); cursor: pointer; letter-spacing: 1px; text-transform: uppercase; padding: 10px 5px; }
    .tab.active { color: #fff; border-bottom: 2px solid #fff; }

    .search-row { display: flex; gap: 10px; width: 100%; max-width: 600px; margin-bottom: 15px; position: relative; }
    input { flex: 1; background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 16px 20px; color: #fff; font-family: var(--font-sans); font-size: 16px; border-radius: 12px; outline: none; appearance: none; }
    
    .hum-btn { 
      width: 54px; height: 54px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
      display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; transition: all 0.2s;
    }
    .hum-btn.active { background: #ff3d00; border-color: #ff3d00; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }

    #search-results { 
      position: absolute; top: 100%; left: 0; width: 100%; max-height: 350px; overflow-y: auto; 
      background: #0A0A0F; border: 1px solid var(--border); border-radius: 12px; 
      display: none; z-index: 200; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
      -webkit-overflow-scrolling: touch;
    }
    .result-item { padding: 16px 15px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; gap: 12px; }
    .result-item:active { background: rgba(255,255,255,0.05); }
    .result-item img { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; }
    .result-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-artist { font-size: 10px; color: var(--muted); font-family: var(--font-mono); text-transform: uppercase; }
    
    .deck-container { 
      width: 100%; max-width: 600px; background: rgba(10,10,15,0.8); border: 1px solid var(--border); 
      border-radius: 20px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
      display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; margin-bottom: 20px;
    }
    
    .player-ui { width: 100%; text-align: center; display: none; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
    .art-wrap { width: 65vw; height: 65vw; max-width: 250px; max-height: 250px; margin: 0 auto 20px; position: relative; }
    .art-wrap img { width: 100%; height: 100%; border-radius: 15px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    #neural-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 15px; pointer-events: none; opacity: 0.8; display: none; }
    
    .track-meta h2 { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
    .track-meta p { font-family: var(--font-mono); color: var(--muted); font-size: 11px; letter-spacing: 2px; }

    .controls { margin-top: auto; padding-top: 30px; display: flex; align-items: center; justify-content: center; gap: 25px; }
    .main-btn { width: 64px; height: 64px; border-radius: 50%; background: #fff; color: #000; border: none; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .main-btn:active { transform: scale(0.95); }
    .sec-btn { background: none; border: 1px solid var(--border); color: #fff; padding: 12px 24px; border-radius: 30px; font-family: var(--font-mono); font-size: 10px; cursor: pointer; }
    .sec-btn:active { background: rgba(255,255,255,0.05); }

    .visualizer { width: 100%; height: 30px; display: flex; align-items: center; justify-content: center; gap: 3px; margin-top: 25px; }
    .v-bar { width: 3px; height: 4px; background: #fff; border-radius: 10px; opacity: 0.3; }

    #feedback { font-family: var(--font-mono); font-size: 9px; color: var(--muted); margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }

    /* Offline Banner */
    #offline-mode { 
      position: fixed; bottom: 0; left: 0; width: 100%; background: #ff3d00; color: #fff; 
      padding: 10px; text-align: center; font-family: var(--font-mono); font-size: 10px; 
      display: none; z-index: 1000; 
    }
  </style>
</head>
<body>

<div id="offline-mode">OFFLINE_SOVEREIGN_MODE_ACTIVE</div>

<header>
  <a href="../" class="nav-brand">
    <div class="nav-vinyl"></div>
    <span class="nav-wordmark">RIDDIIM</span>
  </a>
  <div style="font-family: var(--font-mono); font-size: 9px; color: var(--muted); letter-spacing: 1px;">V1.4_PWA</div>
</header>

<main>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('search')">Search</div>
    <div class="tab" onclick="switchTab('library')">My Library</div>
  </div>

  <div class="search-row">
    <input type="text" placeholder="Search Artist or Song..." id="query" autocomplete="off">
    <button class="hum-btn" id="hum-trigger" title="Sing to Find">🎙️</button>
    <div id="search-results"></div>
  </div>
  <div id="feedback">Analyzing signals...</div>

  <div class="deck-container">
    <div id="empty-state" style="opacity: 0.3; text-align: center; font-family: var(--font-mono); font-size: 11px;">SEARCH_TO_BEGIN</div>
    
    <div class="player-ui" id="player-ui">
      <div class="art-wrap">
        <img id="track-art" src="" alt="">
        <canvas id="neural-canvas"></canvas>
      </div>
      <div class="track-meta">
        <h2 id="track-name">Track Name</h2>
        <p id="artist-name">Artist Name</p>
      </div>
      
      <div class="visualizer" id="viz"></div>
      
      <div class="controls">
        <button class="sec-btn" onclick="saveToLibrary()">SAVE_FAVORITE</button>
        <button class="main-btn" id="play-trigger">▶</button>
      </div>
    </div>
  </div>
</main>

<audio id="audio-core"></audio>

<script>
  const query = document.getElementById('query');
  const results = document.getElementById('search-results');
  const feedback = document.getElementById('feedback');
  const humBtn = document.getElementById('hum-trigger');
  const audio = document.getElementById('audio-core');
  const playBtn = document.getElementById('play-trigger');
  
  let isHumming = false;
  let currentTrack = null;
  let favorites = JSON.parse(localStorage.getItem('riddiim_favs') || '[]');

  // PWA Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  // Offline Detection
  window.addEventListener('online', () => document.getElementById('offline-mode').style.display = 'none');
  window.addEventListener('offline', () => document.getElementById('offline-mode').style.display = 'block');

  // Neural Recognition (Real Sovereign Analysis)
  humBtn.onclick = async () => {
    if(isHumming) return;
    
    try {
      isHumming = true;
      humBtn.classList.add('active');
      feedback.textContent = 'HANDSHAKING NEURAL FREQUENCIES...';
      document.getElementById('neural-canvas').style.display = 'block';
      
      // Start a countdown for UX
      let count = 5;
      const timer = setInterval(() => {
        count--;
        if(count > 0) feedback.textContent = `LISTENING [SIGNAL_STRENGTH_98%] ... ${count}S`;
        else clearInterval(timer);
      }, 1000);

      const signature = await NeuralEngine.startAnalysis();
      
      if(signature && signature !== 'UNKNOWN_SIGNAL') {
        feedback.textContent = `FOUND NEURAL VIBE: ${signature.toUpperCase()}`;
        const s = document.createElement('script');
        s.src = `https://api.deezer.com/search?q=${encodeURIComponent(signature)}&limit=10&output=jsonp&callback=handleSearch`;
        document.body.appendChild(s);
      } else {
        feedback.textContent = 'SIGNAL_TOO_WEAK. PLEASE SING LOUDER.';
      }
    } catch (e) {
      feedback.textContent = 'NEURAL_HARDWARE_ERROR. CHECK PERMISSIONS.';
    } finally {
      humBtn.classList.remove('active');
      document.getElementById('neural-canvas').style.display = 'none';
      isHumming = false;
    }
  };

  // Search Logic
  let t;
  query.oninput = (e) => {
    clearTimeout(t);
    const v = e.target.value.trim();
    if(v.length < 2) return results.style.display = 'none';
    t = setTimeout(() => {
      const s = document.createElement('script');
      s.src = `https://api.deezer.com/search?q=${encodeURIComponent(v)}&limit=10&output=jsonp&callback=handleSearch`;
      document.body.appendChild(s);
    }, 400);
  };

  window.handleSearch = (data) => {
    if(!data.data) return;
    results.innerHTML = data.data.map(i => `
      <div class="result-item" onclick='loadTrack(${JSON.stringify({
        title: i.title,
        artist: i.artist.name,
        art: i.album.cover_big,
        preview: i.preview
      }).replace(/'/g, "&apos;")})'>
        <img src="${i.album.cover_small}">
        <div class="res-info">
          <div class="result-title">${i.title}</div>
          <div class="result-artist">${i.artist.name}</div>
        </div>
      </div>
    `).join('');
    results.style.display = 'block';
  };

    window.loadTrack = (t) => {
    currentTrack = t;
    results.style.display = 'none';
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('player-ui').style.display = 'block';
    
    const artImg = document.getElementById('track-art');
    artImg.onerror = () => {
      artImg.src = 'https://priscadezigns.org/assets/logos/riddiim_favicon.png';
    };
    artImg.src = t.art || 'https://priscadezigns.org/assets/logos/riddiim_favicon.png';
    
    document.getElementById('track-name').textContent = t.title;
    document.getElementById('artist-name').textContent = t.artist;
    audio.src = t.preview;
    audio.play();
    playBtn.textContent = '||';
  };

  window.saveToLibrary = () => {
    if(!currentTrack) return;
    if(!favorites.find(f => f.title === currentTrack.title)) {
      favorites.push(currentTrack);
      localStorage.setItem('riddiim_favs', JSON.stringify(favorites));
      alert('SIGNAL_SAVED_TO_VAULT');
    }
  };

  window.switchTab = (tab) => {
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');
    if(tab === 'library') {
      const data = { data: favorites };
      handleSearch(data);
      results.style.display = 'block';
    } else {
      results.style.display = 'none';
    }
  };

  // Visualizer
  const viz = document.getElementById('viz');
  for(let i=0; i<30; i++) {
    const b = document.createElement('div');
    b.className = 'v-bar';
    viz.appendChild(b);
  }

  function anim() {
    if(!audio.paused) {
      document.querySelectorAll('.v-bar').forEach(b => {
        const h = 4 + Math.random() * 26;
        b.style.height = h + 'px';
        b.style.opacity = h/30;
      });
    }
    requestAnimationFrame(anim);
  }
  anim();

  playBtn.onclick = () => {
    if(audio.paused) { audio.play(); playBtn.textContent = '||'; }
    else { audio.pause(); playBtn.textContent = '▶'; }
  };
</script>
</body>
</html>
