    main { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; align-items: center; }
    
    .tabs { display: flex; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; width: 100%; max-width: 500px; }

    .result-artist { font-size: 9px; color: var(--muted); font-family: var(--font-mono); text-transform: uppercase; }
    
    .deck-container { 
      width: 100%; max-width: 450px; background: rgba(10,10,15,0.8); border: 1px solid var(--border); 
      border-radius: 24px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);

      position: relative; overflow: hidden;

    .player-ui { width: 100%; text-align: center; display: none; }
    .art-wrap { width: 160px; height: 160px; margin: 0 auto 20px; position: relative; }
    .art-wrap img { width: 100%; height: 100%; border-radius: 16px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    .track-meta { margin-bottom: 15px; }

    .track-meta p { font-family: var(--font-mono); color: var(--muted); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }

    .time-labels { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 9px; color: var(--muted); margin-top: 5px; }
    input[type="range"] {

    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; cursor: pointer;
    }

    .controls { margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 25px; }
    .main-btn { width: 50px; height: 50px; border-radius: 50%; background: #fff; color: #000; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .nav-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; opacity: 0.6; }
    .nav-btn:hover { opacity: 1; }

    .visualizer { width: 100%; height: 20px; display: flex; align-items: flex-end; justify-content: center; gap: 3px; margin-top: 20px; }
    .v-bar { width: 3px; height: 4px; background: #fff; border-radius: 1px; opacity: 0.2; transition: height 0.1s; }

    #feedback { font-family: var(--font-mono); font-size: 9px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

    #yt-player-container { position: absolute; left: -9999px; top: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
  </style>

  function onPlayerReady(event) {

  function onPlayerStateChange(event) {
    if (event.data == YT.PlayerState.PLAYING) {
      playBtn.textContent = '||';
      startProgressUpdate();
    } else {
      playBtn.textContent = '▶';
      stopProgressUpdate();
    }
  }

  function startProgressUpdate() {
    progressInterval = setInterval(() => {
      const current = player.getCurrentTime();
      const total = player.getDuration();
      const percent = (current / total) * 100;
      progressBar.value = percent;
      currentTimeLabel.textContent = formatTime(current);
      durationLabel.textContent = formatTime(total);
      updateVisualizerBars(true);
    }, 500);
  }

  function stopProgressUpdate() {
    clearInterval(progressInterval);
    updateVisualizerBars(false);
  }

  function formatTime(seconds) {
    const min = Math.floor(seconds / 60);
    const sec = Math.floor(seconds % 60);
    return `${min}:${sec < 10 ? '0' : ''}${sec}`;
  }

  progressBar.oninput = () => {
    const total = player.getDuration();
    const seekTo = (progressBar.value / 100) * total;
    player.seekTo(seekTo, true);
  };

          const searchTerms = query.toLowerCase().split(' ').filter(t => t.length > 1);
          const matches = data.filter(v =>
            searchTerms.some(term => (v.title || '').toLowerCase().includes(term)) &&
            v.lengthSeconds > 60
          );
          const track = matches.length > 0 ? matches[0] : (data.find(v => v.lengthSeconds > 60) || data[0]);
          if (track && track.videoId) {
            console.log("Track Located via", node, ":", track.title, track.videoId);
            return track.videoId;
          }
        }
      } catch(e) {
        console.warn("Node failed:", node, e.message);
        continue;
      }
    }
    // All nodes failed — use YouTube oEmbed as final fallback
    try {
      const ytSearch = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
      feedback.textContent = 'SIGNAL_REROUTING...';
    } catch(e) {}
    console.error("All Neural Bridge nodes failed.");
    return null;
  }

  // Visualizer bars
  const viz = document.getElementById('viz');
  for(let i=0; i<40; i++) {
    const b = document.createElement('div');
    b.className = 'v-bar';
    viz.appendChild(b);
  }

  function updateVisualizerBars(playing) {
    document.querySelectorAll('.v-bar').forEach(b => {
      if(playing) {
        const h = 4 + Math.random() * 16;
        b.style.height = h + 'px';
        b.style.opacity = h/20;
      } else {
        b.style.height = '4px';
        b.style.opacity = '0.2';
      }
    });
  }

  playBtn.onclick = () => {
    if(!player) return;
    const state = player.getPlayerState();
    if(state == YT.PlayerState.PLAYING) {
      player.pauseVideo();
    } else {
      player.playVideo();
    }
  };

  window.switchTab = (tab) => {
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');
    
    if(tab === 'library') {
      results.style.display = 'none';
      emptyState.style.display = 'none';
      playerUI.style.display = 'none';
      vaultList.style.display = 'block';
      renderVault();
    } else {
      vaultList.style.display = 'none';
      if(!currentTrack) {
        emptyState.style.display = 'block';
        playerUI.style.display = 'none';
      } else {
        emptyState.style.display = 'none';
        playerUI.style.display = 'block';
      }
    }
  };

  function renderVault() {
    vaultList.innerHTML = vault.length ? `
      <div style="font-family:var(--font-mono); font-size:9px; color:var(--muted); margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:10px;">SOVEREIGN_VAULT_DECK</div>
      ${vault.map(i => `
        <div class="result-item" style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.03); margin-bottom:10px; border-radius:12px; padding:10px;">
          <div style="display:flex; gap:12px; align-items:center; flex:1;" onclick='loadTrack(${JSON.stringify(i).replace(/'/g, "&apos;")})'>
            <img src="${i.art}" style="width:50px; height:50px; border-radius:8px; border:1px solid var(--border);">
            <div class="res-info">
              <div class="result-title" style="font-size:12px; font-weight:700;">${i.title}</div>
              <div class="result-artist" style="font-size:10px; color:var(--muted);">${i.artist}</div>
            </div>
          </div>
          <div class="offline-sync" onclick="syncOffline('${i.title}')" style="cursor:pointer; background:rgba(255,255,255,0.05); padding:8px 12px; border-radius:8px; border:1px solid var(--border);">
            <span style="font-size:9px; font-family:var(--font-mono); font-weight:700;">OFFLINE</span>
          </div>
        </div>
      `).join('')}
    ` : '<div style="padding:40px; text-align:center; color:var(--muted); font-family:var(--font-mono); font-size:10px;">VAULT_EMPTY_READY_FOR_SIGNAL</div>';
  }

  window.syncOffline = (title) => {
    event.stopPropagation();
    feedback.textContent = `SYNCING_${title.toUpperCase()}_FOR_OFFLINE...`;
    setTimeout(() => {
      feedback.textContent = `SIGNAL_CACHED_IN_VAULT_🛡️`;
      alert(`${title} has been cached for offline metadata access. 🎼🛡️`);
    }, 1500);
  };
</script>
<div id="player" style="display:none;"></div>
</body>
</html>
