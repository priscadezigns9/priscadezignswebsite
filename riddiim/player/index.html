<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Deck | RIDDIIM</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050508;
      --accent: #FFFFFF;
      --muted: #5A5A70;
      --border: rgba(255, 255, 255, 0.08);
      --font-mono: 'Space Mono', monospace;
      --font-sans: 'Space Grotesk', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: #fff; font-family: var(--font-sans); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    header { height: 80px; padding: 0 48px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: #fff; }
    .nav-vinyl { width: 24px; height: 24px; border-radius: 50%; background: radial-gradient(circle, #222 30%, #000 30%); border: 1px solid rgba(255,255,255,0.1); animation: spin 4s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .nav-wordmark { font-family: var(--font-mono); font-size: 16px; font-weight: 700; letter-spacing: 4px; }

    main { flex: 1; display: flex; flex-direction: column; padding: 40px; overflow-y: auto; align-items: center; }
    
    .tabs { display: flex; gap: 20px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 12px; width: 100%; max-width: 800px; }
    .tab { font-family: var(--font-mono); font-size: 10px; color: var(--muted); cursor: pointer; letter-spacing: 2px; text-transform: uppercase; transition: color 0.3s; }
    .tab.active { color: #fff; }

    .search-container { width: 100%; max-width: 600px; margin-bottom: 40px; position: relative; }
    input { width: 100%; background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 16px 24px; color: #fff; font-family: var(--font-sans); font-size: 16px; border-radius: 4px; outline: none; transition: border 0.3s; }
    input:focus { border-color: rgba(255,255,255,0.3); }
    
    .deck-container { width: 100%; max-width: 800px; background: rgba(10,10,15,0.8); border: 1px solid var(--border); border-radius: 8px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; min-height: 400px; display: flex; flex-direction: column; }
    
    #player-mount { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
    iframe { border: none; border-radius: 4px; width: 100%; height: 450px; }

    .deck-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 2px; }
    .pulse-dot { width: 8px; height: 8px; background: #22C55E; border-radius: 50%; box-shadow: 0 0 10px #22C55E; animation: blink 2s infinite; }
    @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    /* NATIVE PLAYER STYLES */
    .native-player { width: 100%; text-align: center; }
    .track-info { margin-bottom: 30px; }
    .track-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .track-artist { font-family: var(--font-mono); color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
    
    audio { width: 100%; height: 40px; margin-top: 20px; filter: invert(1); }
    
    .visualizer-box { width: 100%; height: 100px; margin-bottom: 30px; background: rgba(255,255,255,0.02); display: flex; align-items: flex-end; justify-content: center; gap: 2px; padding: 0 20px; }
    .vis-bar { width: 4px; background: #fff; transition: height 0.05s; }

    #feedback { font-family: var(--font-mono); font-size: 10px; color: #ff3d00; margin-top: 10px; text-align: center; display: none; }
  </style>
</head>
<body>

<header>
  <a href="../" class="nav-brand">
    <div class="nav-vinyl"></div>
    <span class="nav-wordmark">RIDDIIM</span>
  </a>
  <div style="font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 2px;">NEURAL DECK V.1.1</div>
</header>

<main>
  <div class="tabs">
    <div class="tab active" data-source="native">Native Vault</div>
    <div class="tab" data-source="soundcloud">SoundCloud Bridge</div>
    <div class="tab" data-source="spotify">Spotify Signal</div>
  </div>

  <div class="search-container">
    <input type="text" placeholder="Search Vault or enter Bridge URL..." id="query">
    <div id="feedback">URL_REQUIRED_FOR_BRIDGE</div>
  </div>

  <div class="deck-container">
    <div class="deck-header">
      <div style="display: flex; align-items: center; gap: 10px;">
        <div class="pulse-dot"></div>
        STREAMING_ACTIVE: <span id="source-label">NATIVE_VAULT</span>
      </div>
      <div>CORE_READY</div>
    </div>
    
    <div id="player-mount">
      <div class="native-player">
        <div class="track-info">
          <div class="track-title">Imperial Silence</div>
          <div class="track-artist">Riddiim Labs</div>
        </div>
        <div class="visualizer-box" id="vis-box">
          <!-- Dynamic bars -->
        </div>
        <audio id="native-audio" controls src="https://priscadezigns.org/assets/audio/placeholder.mp3"></audio>
      </div>
    </div>
  </div>

  <div style="margin-top: 40px; font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 2px; text-align: center;">
    SOVEREIGN AUDIO INFRASTRUCTURE • PRISCION EMPIRE
  </div>
</main>

<script>
  let currentSource = 'native';
  const queryInput = document.getElementById('query');
  const feedback = document.getElementById('feedback');
  const sourceLabel = document.getElementById('source-label');
  const mount = document.getElementById('player-mount');

  // Supabase Init
  const sb = supabase.createClient("https://sazhdnqzaqpqcralmthh.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc");

  // Visualizer Init
  const visBox = document.getElementById('vis-box');
  for(let i=0; i<32; i++) {
    const bar = document.createElement('div');
    bar.className = 'vis-bar';
    bar.style.height = '10%';
    visBox.appendChild(bar);
  }

  function updateVisualizer() {
    const bars = document.querySelectorAll('.vis-bar');
    bars.forEach(bar => {
      const h = 10 + Math.random() * 80;
      bar.style.height = h + '%';
      bar.style.opacity = h/100;
    });
  }
  let visInterval;

  document.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => {
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      t.classList.add('active');
      currentSource = t.getAttribute('data-source');
      sourceLabel.textContent = currentSource.toUpperCase().replace('_', ' ');
      renderPlayer();
    };
  });

  function renderPlayer(url = null) {
    clearInterval(visInterval);
    feedback.style.display = 'none';

    if(currentSource === 'native') {
      mount.innerHTML = `
        <div class="native-player">
          <div class="track-info">
            <div class="track-title">${url ? 'Bridged Track' : 'Imperial Silence'}</div>
            <div class="track-artist">Riddiim Labs</div>
          </div>
          <div class="visualizer-box" id="vis-box"></div>
          <audio id="native-audio" controls src="${url || 'https://priscadezigns.org/assets/audio/placeholder.mp3'}"></audio>
        </div>
      `;
      const vb = document.getElementById('vis-box');
      for(let i=0; i<32; i++) {
        const bar = document.createElement('div');
        bar.className = 'vis-bar';
        bar.style.height = '10%';
        vb.appendChild(bar);
      }
      const audio = document.getElementById('native-audio');
      audio.onplay = () => visInterval = setInterval(updateVisualizer, 100);
      audio.onpause = () => clearInterval(visInterval);
    } else if(currentSource === 'soundcloud') {
      const scUrl = url || 'https://api.soundcloud.com/playlists/123456789';
      mount.innerHTML = `<iframe scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(scUrl)}&color=%23050508&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe>`;
    } else if(currentSource === 'spotify') {
      const spUrl = url || 'https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM3M?utm_source=generator&theme=0';
      const embedUrl = spUrl.includes('embed') ? spUrl : spUrl.replace('spotify.com/', 'spotify.com/embed/');
      mount.innerHTML = `<iframe src="${embedUrl}" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>`;
    }
  }

  queryInput.onkeydown = async (e) => {
    if(e.key === 'Enter') {
      const val = queryInput.value.trim();
      if(!val) return;

      // Handle Bridge URLs
      if(val.includes('soundcloud.com')) {
        currentSource = 'soundcloud';
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector('[data-source="soundcloud"]').classList.add('active');
        sourceLabel.textContent = 'SOUNDCLOUD';
        renderPlayer(val);
      } else if(val.includes('spotify.com')) {
        currentSource = 'spotify';
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector('[data-source="spotify"]').classList.add('active');
        sourceLabel.textContent = 'SPOTIFY';
        renderPlayer(val);
      } else if(val.startsWith('http')) {
        // Native URL bridge
        currentSource = 'native';
        renderPlayer(val);
      } else {
        // Keyword Search logic
        if(currentSource === 'native') {
           feedback.textContent = 'SEARCHING_VAULT...';
           feedback.style.display = 'block';
           // Future Supabase Search: .from('riddiim_tracks').select('*').ilike('title', `%${val}%`)
           setTimeout(() => {
             feedback.textContent = 'NO_VAULT_MATCH: URL_REQUIRED_FOR_BRIDGE';
           }, 1000);
        } else {
           feedback.textContent = 'URL_REQUIRED_FOR_BRIDGE';
           feedback.style.display = 'block';
        }
      }
    }
  };

  renderPlayer();
</script>
</body>
</html>
