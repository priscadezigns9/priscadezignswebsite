<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Deck | RIDDIIM</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050508;
      --accent: #FFFFFF;
      --muted: #5A5A70;
      --border: rgba(255, 255, 255, 0.08);
      --font-mono: 'Space Mono', monospace;
      --font-sans: 'Space Grotesk', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: #fff; font-family: var(--font-sans); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    header { height: 80px; padding: 0 48px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: #fff; }
    .nav-vinyl { width: 24px; height: 24px; border-radius: 50%; background: radial-gradient(circle, #222 30%, #000 30%); border: 1px solid rgba(255,255,255,0.1); animation: spin 4s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .nav-wordmark { font-family: var(--font-mono); font-size: 16px; font-weight: 700; letter-spacing: 4px; }

    main { flex: 1; display: flex; flex-direction: column; padding: 20px 40px; overflow-y: auto; align-items: center; }
    
    .search-container { width: 100%; max-width: 600px; margin-bottom: 20px; position: relative; }
    input { width: 100%; background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 18px 24px; color: #fff; font-family: var(--font-sans); font-size: 16px; border-radius: 8px; outline: none; transition: all 0.3s; }
    input:focus { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.04); }

    /* Results Panel */
    #search-results { 
      position: absolute; top: 100%; left: 0; width: 100%; max-height: 400px; overflow-y: auto; 
      background: #0A0A0F; border: 1px solid var(--border); border-radius: 0 0 12px 12px; 
      display: none; z-index: 200; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
    }
    .result-item { padding: 16px 20px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; gap: 15px; transition: background 0.2s; }
    .result-item:hover { background: rgba(255,255,255,0.05); }
    .result-item img { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
    .result-info { flex: 1; overflow: hidden; }
    .result-title { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .result-artist { font-size: 11px; color: var(--muted); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1px; }
    
    .deck-container { 
      width: 100%; max-width: 800px; background: rgba(10,10,15,0.8); border: 1px solid var(--border); 
      border-radius: 12px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
      position: relative; min-height: 450px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    
    .player-ui { width: 100%; text-align: center; display: none; }
    .art-stack { position: relative; width: 220px; height: 220px; margin: 0 auto 40px; }
    .art-stack img { width: 100%; height: 100%; border-radius: 12px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    .track-meta h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -1px; }
    .track-meta p { font-family: var(--font-mono); color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 4px; }

    .controls { margin-top: 40px; display: flex; align-items: center; justify-content: center; gap: 30px; }
    .play-btn { 
      width: 64px; height: 64px; border-radius: 50%; background: #fff; color: #000; 
      display: flex; align-items: center; justify-content: center; font-size: 24px; 
      cursor: pointer; transition: transform 0.2s; border: none;
    }
    .play-btn:hover { transform: scale(1.05); }

    .visualizer { width: 100%; height: 40px; display: flex; align-items: center; justify-content: center; gap: 3px; margin-top: 40px; opacity: 0.5; }
    .v-bar { width: 3px; height: 10px; background: #fff; transition: height 0.1s; border-radius: 10px; }

    #feedback { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }

    /* Empty State */
    #empty-state { text-align: center; opacity: 0.3; font-family: var(--font-mono); font-size: 12px; letter-spacing: 4px; }
  </style>
</head>
<body>

<header>
  <a href="../" class="nav-brand">
    <div class="nav-vinyl"></div>
    <span class="nav-wordmark">RIDDIIM</span>
  </a>
  <div style="font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 2px;">NEURAL_DECK_ACTIVE</div>
</header>

<main>
  <div class="search-container">
    <input type="text" placeholder="Search Artist or Track..." id="query" autocomplete="off">
    <div id="search-results"></div>
    <div id="feedback">Ready to analyze signals...</div>
  </div>

  <div class="deck-container">
    <div id="empty-state">SEARCH_AND_SELECT_TRACK</div>
    
    <div class="player-ui" id="player-ui">
      <div class="art-stack">
        <img id="track-art" src="" alt="Art">
      </div>
      <div class="track-meta">
        <h2 id="track-name">Track Name</h2>
        <p id="artist-name">Artist Name</p>
      </div>
      
      <div class="visualizer" id="visualizer"></div>
      
      <div class="controls">
        <button class="play-btn" id="play-trigger">▶</button>
      </div>

      <div style="margin-top: 40px;">
        <a id="full-signal" href="" target="_blank" style="font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-decoration: none; letter-spacing: 2px; border: 1px solid var(--border); padding: 10px 20px; border-radius: 4px;">OPEN_FULL_SIGNAL</a>
      </div>
    </div>
  </div>

  <audio id="core-audio"></audio>
</main>

<script>
  const query = document.getElementById('query');
  const results = document.getElementById('search-results');
  const feedback = document.getElementById('feedback');
  const ui = document.getElementById('player-ui');
  const empty = document.getElementById('empty-state');
  const audio = document.getElementById('core-audio');
  const playBtn = document.getElementById('play-trigger');
  
  // Visualizer Bars
  const viz = document.getElementById('visualizer');
  for(let i=0; i<32; i++) {
    const bar = document.createElement('div');
    bar.className = 'v-bar';
    viz.appendChild(bar);
  }

  // Deezer Search via JSONP
  let searchTimeout;
  query.oninput = (e) => {
    clearTimeout(searchTimeout);
    const val = e.target.value.trim();
    if(val.length < 2) {
      results.style.display = 'none';
      return;
    }
    
    searchTimeout = setTimeout(() => {
      feedback.textContent = 'Analyzing signal: ' + val.toUpperCase();
      const script = document.createElement('script');
      script.src = `https://api.deezer.com/search?q=${encodeURIComponent(val)}&limit=10&output=jsonp&callback=handleSearch`;
      document.body.appendChild(script);
      setTimeout(() => script.remove(), 1000);
    }, 400);
  };

  window.handleSearch = (data) => {
    if(!data.data || data.data.length === 0) {
      feedback.textContent = 'NO_SIGNALS_DETECTED';
      results.innerHTML = '<div style="padding:20px; text-align:center; color:var(--muted); font-size:10px;">ZERO_RESULTS</div>';
    } else {
      feedback.textContent = data.total + ' Signals Found';
      results.innerHTML = data.data.map(item => `
        <div class="result-item" onclick='loadTrack(${JSON.stringify({
          title: item.title,
          artist: item.artist.name,
          art: item.album.cover_big,
          preview: item.preview,
          link: item.link
        }).replace(/'/g, "&apos;")})'>
          <img src="${item.album.cover_small}" alt="Art">
          <div class="result-info">
            <div class="result-title">${item.title}</div>
            <div class="result-artist">${item.artist.name}</div>
          </div>
        </div>
      `).join('');
    }
    results.style.display = 'block';
  };

  window.loadTrack = (track) => {
    results.style.display = 'none';
    empty.style.display = 'none';
    ui.style.display = 'block';
    
    document.getElementById('track-art').src = track.art;
    document.getElementById('track-name').textContent = track.title;
    document.getElementById('artist-name').textContent = track.artist;
    document.getElementById('full-signal').href = track.link;
    
    audio.src = track.preview;
    audio.play();
    playBtn.textContent = '||';
  };

  playBtn.onclick = () => {
    if(audio.paused) {
      audio.play();
      playBtn.textContent = '||';
    } else {
      audio.pause();
      playBtn.textContent = '▶';
    }
  };

  // Neural Visualizer Logic
  function animateViz() {
    if(!audio.paused) {
      const bars = document.querySelectorAll('.v-bar');
      bars.forEach(bar => {
        const h = 5 + Math.random() * 35;
        bar.style.height = h + 'px';
        bar.style.opacity = h/40;
      });
    }
    requestAnimationFrame(animateViz);
  }
  animateViz();

  // Close results on click outside
  document.onclick = (e) => {
    if(!e.target.closest('.search-container')) results.style.display = 'none';
  };
</script>
</body>
</html>
