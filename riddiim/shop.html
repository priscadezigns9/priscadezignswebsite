<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Riddiim Shop | Audio Gear & Merch</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0A0F; color:#FFFFFF; font-family:'Space Grotesk', sans-serif;}
:root{ --border:rgba(255,255,255,0.07); --white:#FFFFFF; --muted:#5A5A70; --bg2:#0F0F16; --bg3:#13131C; }

nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:0 48px;height:68px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-brand{display:flex;align-items:center;gap:12px; text-decoration:none; color:white;}
.nav-wordmark{font-family:"Space Mono",monospace;font-size:17px;font-weight:700;letter-spacing:4px;color:var(--white)}

.container{max-width:1200px; margin:0 auto; padding:120px 24px;}
.grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:40px;}
.card{background:var(--bg3); padding:40px; border:1px solid var(--border); border-radius:4px; text-align:center;}
.card img{width:100%; border-radius:2px; margin-bottom:20px;}
.card h3{margin-bottom:10px;}
.price{font-weight:700; font-size:1.2rem; margin-top:20px;}
.btn{display:inline-block; padding:12px 24px; background:white; color:black; text-decoration:none; margin-top:20px; font-weight:700; border-radius:2px;}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-brand">
    <span class="nav-wordmark">RIDDIIM</span>
  </a>
</nav>

<div class="container">
  <h1 style="font-size:4rem; margin-bottom:60px;">The Shop.</h1>
  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600&q=80" alt="Headphones">
      <h3>Acustiq Pro-X1</h3>
      <p style="color:var(--muted);">High-fidelity studio monitoring headphones.</p>
      <div class="price">49.00</div>
      <a href="#" class="btn">ADD TO CART</a>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600&q=80" alt="Tee">
      <h3>Riddiim '26 Tee</h3>
      <p style="color:var(--muted);">Limited edition archival oversized tee.</p>
      <div class="price">5.00</div>
      <a href="#" class="btn">ADD TO CART</a>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1558008258-3256797b43f3?w=600&q=80" alt="Vinyl">
      <h3>Neural Sessions Vol. 1</h3>
      <p style="color:var(--muted);">Exclusive vinyl pressing of the Labs audio experiments.</p>
      <div class="price">5.00</div>
      <a href="#" class="btn">ADD TO CART</a>
    </div>
  </div>
</div>
</body>
</html>
