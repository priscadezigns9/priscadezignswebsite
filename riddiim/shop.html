<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riddiim Shop - Gold Standard v4.2</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { --brand-color: #8b5cf6; --bg-dark: #0a0a0a; --card-bg: #141414; --text-light: #f0f0f0; --border-color: #222; }
body{margin:0;font-family:'Inter', sans-serif;background:var(--bg-dark);color:var(--text-light);line-height:1.6}
nav{background:var(--bg-dark);padding:20px 5%;border-bottom:3px solid var(--brand-color);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.5)}
#logo { height: 50px; max-width: 200px; object-fit: contain; }

.cat-bar { background: #111; padding: 15px 5%; display: flex; gap: 15px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid var(--border-color); scrollbar-width: none; }
.cat-bar::-webkit-scrollbar { display: none; }
.cat-btn { background: #1a1a1a; border: 1px solid #333; padding: 10px 20px; border-radius: 30px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; transition: 0.3s; color: #aaa; }
.cat-btn.active { background: var(--brand-color); color: #fff; border-color: var(--brand-color); }

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:40px;padding:40px 5%}
.card{background:var(--card-bg);border:1px solid var(--border-color);border-radius:20px;padding:30px;text-align:center;transition:0.4s;display:flex;flex-direction:column;position:relative}
.card:hover{transform:translateY(-10px);box-shadow:0 20px 40px rgba(0,0,0,0.4);border-color:var(--brand-color)}
.category-label{font-size:0.7rem;color:var(--brand-color);font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:15px;opacity:0.8}
.img-box{height:300px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;background:#1a1a1a;border-radius:12px;overflow:hidden}
img.product-img{max-width:90%;max-height:90%;object-fit:contain;transition:0.5s}
.card:hover img.product-img{transform:scale(1.05)}
h3{font-size:1rem;margin:0 0 15px;font-weight:800;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;height:3em;color:var(--text-light)}
.price{color:var(--brand-color);font-weight:900;font-size:1.5rem;margin-bottom:20px}
.btn{display:block;background:var(--brand-color);color:#fff;padding:18px;border-radius:12px;text-decoration:none;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-top:auto;font-size:0.85rem;transition:0.3s}
.btn:hover{filter:brightness(1.1);box-shadow:0 8px 15px rgba(139, 92, 246, 0.3)}

footer{padding:60px 5%;text-align:center;background:#000;color:#fff;border-top: 1px solid var(--border-color);}
.empire-footer { font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6; margin-top: 20px; }

#loader { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-dark); z-index:1000; display:flex; flex-direction: column; justify-content:center; align-items:center; transition: 0.5s; }
#loaderText { color: var(--brand-color); }
#loader.hidden { opacity:0; pointer-events:none; }
#upBtn { position: fixed; bottom: 30px; right: 30px; background: var(--brand-color); color: #fff; width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 1.5rem; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000; transition: 0.3s; }
#upBtn:hover { transform: translateY(-5px); filter: brightness(1.1); }
</style></head>
<body>
<div id="loader"><h2 id="loaderText">RIDDIIM</h2></div>
<nav><img id="logo" src="https://priscadezigns.org/assets/logos/riddiim_wordmark.png" alt="Riddiim Logo"></nav>
<div class="cat-bar" id="catBar"></div>
<div class="grid" id="grid"></div>
<button id="upBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>
<footer id="footer">
    <div id="brandName" style="font-weight:900; font-size:1.5rem">RIDDIIM</div>
    <div class="empire-footer">A PRISCA DEZIGNS EMPIRE VENTURE - GOLD STANDARD RESTORATION v4.2</div>
</footer>

<script>
const sb = supabase.createClient("https://sazhdnqzaqpqcralmthh.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc");
let allItems = [];

async function load() {
  const { data } = await sb.from("empire_inventory").select("*").eq("brand", "Riddiim");
  allItems = data || [];
  
  const categories = ["All", ...new Set(allItems.map(i => i.category))];
  document.getElementById("catBar").innerHTML = categories.map(c => `<button class="cat-btn ${c==='All'?'active':''}" onclick="filter('${c}')">${c}</button>`).join("");
  
  render(allItems);
  document.getElementById("loader").classList.add("hidden");
}

function render(items) {
  document.getElementById("grid").innerHTML = items.map(p => `
    <div class="card">
      <div class="category-label">${p.category}</div>
      <div class="img-box"><img class="product-img" src="${p.image_url}" loading="lazy"></div>
      <h3>${p.title}</h3>
      <div class="price">${p.price}</div>
      <a href="${p.affiliate_link}" class="btn" target="_blank">Acquire Audio</a>
    </div>
  `).join("");
}

function filter(cat) {
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.toggle("active", b.innerText === cat));
  const filtered = cat === "All" ? allItems : allItems.filter(i => i.category === cat);
  render(filtered);
}

window.onload = load;
</script>
</body></html>
