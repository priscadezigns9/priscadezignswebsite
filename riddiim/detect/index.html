<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Neural Detection | RIDDIIM</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050508;
      --accent: #FFFFFF;
      --muted: #5A5A70;
      --border: rgba(255, 255, 255, 0.08);
      --font-mono: 'Space Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* ── HEADER ── */
    header { height: 80px; padding: 0 48px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); }
    .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: #fff; }
    .nav-vinyl { width: 24px; height: 24px; border-radius: 50%; background: radial-gradient(circle, #222 30%, #000 30%); border: 1px solid rgba(255,255,255,0.1); animation: spin 4s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .nav-wordmark { font-family: var(--font-mono); font-size: 16px; font-weight: 700; letter-spacing: 4px; }

    /* ── MAIN ── */
    main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; position: relative; }
    
    .scanner-ring { width: 200px; height: 200px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); margin-bottom: 40px; }
    .scanner-ring:active { transform: scale(0.95); }
    .scanner-ring::before { content: ""; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid #fff; opacity: 0; transform: scale(0.8); }
    .scanner-ring.active::before { animation: pulse 2s infinite; }
    @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }
    
    .mic-icon { width: 64px; height: 64px; fill: #fff; }
    .status-text { font-family: var(--font-mono); font-size: 11px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    .result-box { max-width: 400px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 24px; border-radius: 4px; display: none; margin-top: 40px; text-align: left; animation: fadeUp 0.5s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .result-box h3 { font-size: 20px; margin-bottom: 4px; }
    .result-box p { font-size: 14px; color: var(--muted); margin-bottom: 16px; }
    .btn-stream { background: #fff; color: #000; padding: 12px 20px; text-decoration: none; font-weight: 800; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; display: inline-block; }

    canvas { position: absolute; bottom: 0; left: 0; width: 100%; height: 150px; pointer-events: none; opacity: 0.3; }
  </style>
</head>
<body>

<header>
  <a href="../" class="nav-brand">
    <div class="nav-vinyl"></div>
    <span class="nav-wordmark">RIDDIIM</span>
  </a>
  <div style="font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 2px;">NEURAL SENSOR V.1.0</div>
</header>

<main>
  <div class="status-text" id="status">Tap to Identify</div>
  <div class="scanner-ring" id="micBtn">
    <svg class="mic-icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </div>
  
  <div class="result-box" id="resultBox">
    <div style="display: flex; gap: 20px; align-items: flex-start;">
      <div style="width: 80px; height: 80px; background: #222; border: 1px solid var(--border);" id="art"></div>
      <div>
        <h3 id="trackTitle">Song Title</h3>
        <p id="trackArtist">Artist Name</p>
        <a href="#" class="btn-stream">Stream High-Fidelity</a>
      </div>
    </div>
  </div>

  <canvas id="visualizer"></canvas>
</main>

<script>
  const micBtn = document.getElementById('micBtn');
  const status = document.getElementById('status');
  const resultBox = document.getElementById('resultBox');
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');
  
  let isRecording = false;
  let audioContext, analyser, dataArray;

  function initVisualizer() {
    canvas.width = window.innerWidth;
    canvas.height = 150;
    analyser.fftSize = 256;
    const bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
  }

  function draw() {
    if(!isRecording) return;
    requestAnimationFrame(draw);
    analyser.getByteFrequencyData(dataArray);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const barWidth = (canvas.width / dataArray.length) * 2.5;
    let x = 0;
    for(let i = 0; i < dataArray.length; i++) {
      const barHeight = dataArray[i] / 2;
      ctx.fillStyle = `rgba(255, 255, 255, ${barHeight/100})`;
      ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
      x += barWidth + 1;
    }
  }

  micBtn.onclick = async () => {
    if(isRecording) return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      const source = audioContext.createMediaStreamSource(stream);
      source.connect(analyser);
      
      initVisualizer();
      isRecording = true;
      micBtn.classList.add('active');
      status.textContent = 'Analyzing Frequencies...';
      draw();

      // MOCK DETECTION ENGINE (While awaiting API keys)
      setTimeout(() => {
        isRecording = false;
        micBtn.classList.remove('active');
        status.textContent = 'Match Found';
        
        // Show result
        document.getElementById('trackTitle').textContent = "Sovereign Echoes";
        document.getElementById('trackArtist').textContent = "Priscion Labs ft. Digital Rhythms";
        resultBox.style.display = 'block';
        
        // Stop stream
        stream.getTracks().forEach(t => t.stop());
      }, 5000);

    } catch (err) {
      status.textContent = 'Mic Access Required';
      console.error(err);
    }
  };
</script>
</body>
</html>
