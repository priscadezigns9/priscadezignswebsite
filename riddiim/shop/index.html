<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Lab Vault | RIDDIIM</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050508;
      --bg-card: rgba(10, 10, 15, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #FFFFFF;
      --muted: #888899;
      --font-mono: 'Space Mono', monospace;
      --font-sans: 'Space Grotesk', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: #fff;
      font-family: var(--font-sans);
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* ── NEURAL PULSE BACKGROUND ── */
    #neural-pulse {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; pointer-events: none;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 200; padding: 0 48px; height: 80px; display: flex; align-items: center; justify-content: space-between; background: rgba(5,5,8,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
    }
    .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: #fff; }
    .nav-vinyl { width: 24px; height: 24px; border-radius: 50%; background: radial-gradient(circle, #222 30%, #000 30%); border: 1px solid rgba(255,255,255,0.1); animation: spin 4s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .nav-wordmark { font-family: var(--font-mono); font-size: 16px; font-weight: 700; letter-spacing: 4px; }
    .nav-links a { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--muted); text-decoration: none; text-transform: uppercase; margin-left: 32px; transition: color 0.2s; }
    .nav-links a:hover { color: #fff; }

    /* ── HEADER ── */
    .header { padding: 120px 6% 60px; text-align: center; }
    .header h1 { font-family: var(--font-mono); font-size: clamp(40px, 8vw, 80px); font-weight: 700; letter-spacing: -2px; margin-bottom: 20px; }
    .header p { color: var(--muted); font-size: 14px; letter-spacing: 4px; text-transform: uppercase; font-family: var(--font-mono); }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px;
      background: var(--border);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .card {
      background: var(--bg);
      padding: 40px;
      transition: background 0.3s;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .card:hover { background: var(--bg-card); }
    .card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(45deg, transparent 48%, rgba(255,255,255,0.02) 50%, transparent 52%); transform: translateX(-100%); transition: transform 0.6s; }
    .card:hover::before { transform: translateX(100%); }

    .img-wrap { width: 100%; height: 280px; display: flex; align-items: center; justify-content: center; margin-bottom: 32px; background: #fff; border-radius: 2px; padding: 20px; mix-blend-mode: screen; opacity: 0.9; }
    .img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }

    .category { font-family: var(--font-mono); font-size: 9px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
    .title { font-size: 18px; font-weight: 700; line-height: 1.4; margin-bottom: 16px; min-height: 50px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .price { font-family: var(--font-mono); font-size: 20px; font-weight: 700; margin-bottom: 24px; color: #fff; }
    
    .btn-buy {
      margin-top: auto;
      border: 1px solid var(--border);
      color: #fff;
      padding: 16px;
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      transition: all 0.2s;
    }
    .btn-buy:hover { background: #fff; color: #000; }

    /* ── LOADER ── */
    #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
    .loader-wordmark { font-family: var(--font-mono); font-size: 24px; letter-spacing: 8px; font-weight: 700; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    /* ── FOOTER ── */
    footer { padding: 120px 6% 60px; border-top: 1px solid var(--border); text-align: center; }
    .foot-logo { font-family: var(--font-mono); font-size: 20px; font-weight: 700; letter-spacing: 6px; margin-bottom: 24px; }
    .foot-meta { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

    @media (max-width: 768px) {
      nav { padding: 0 24px; }
      .header { padding: 80px 6% 40px; }
      .card { padding: 30px; }
    }
  </style>
</head>
<body>

<div id="loader"><div class="loader-wordmark">RIDDIIM</div></div>

<canvas id="neural-pulse"></canvas>

<nav>
  <a href="../" class="nav-brand">
    <div class="nav-vinyl"></div>
    <span class="nav-wordmark">RIDDIIM</span>
  </a>
  <div class="nav-links">
    <a href="../studio/">Studio</a>
    <a href="../detect/">Detect</a>
  </div>
</nav>

<section class="header">
  <p>Neural Audio Infrastructure</p>
  <h1>Audio Vault</h1>
</section>

<div class="grid" id="product-grid">
  <!-- Items injected by Supabase -->
</div>

<footer>
  <div class="foot-logo">RIDDIIM</div>
  <div style="margin-bottom: 20px;">
    <a href="../legal/" style="color: var(--muted); text-decoration: none; font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin: 0 15px;">Legal</a>
    <a href="mailto:riddiim@priscadezigns.org" style="color: var(--muted); text-decoration: none; font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin: 0 15px;">Support</a>
  </div>
  <div class="foot-meta">Sovereign Audio Engineering • Priscion Empire Division</div>
</footer>

<script>
  // Supabase Integration
  const sbUrl = "https://sazhdnqzaqpqcralmthh.supabase.co";
  const sbKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc";
  const supabaseClient = supabase.createClient(sbUrl, sbKey);

  async function fetchProducts() {
    try {
      console.log("Initializing Vault Access...");
      const { data, error } = await supabaseClient
        .from('empire_inventory')
        .select('*')
        .eq('brand', 'Riddiim');

      if (error) {
        console.error("Supabase Error:", error);
        throw error;
      }
      console.log("Vault Items Retrieved:", data ? data.length : 0);
      renderProducts(data);
    } catch (err) {
      console.error("Vault Access Error:", err);
      document.getElementById('product-grid').innerHTML = '<div style="grid-column: 1/-1; padding: 100px; text-align: center; color: var(--muted);">ERROR_ACCESS_DENIED: VAULT_OFFLINE</div>';
    } finally {
      document.getElementById('loader').style.opacity = '0';
      setTimeout(() => document.getElementById('loader').remove(), 500);
    }
  }

  function renderProducts(items) {
    const grid = document.getElementById('product-grid');
    if (!items || items.length === 0) {
      grid.innerHTML = '<div style="grid-column: 1/-1; padding: 100px; text-align: center; color: var(--muted);">NO_ASSETS_FOUND</div>';
      return;
    }

    grid.innerHTML = items.map(p => `
      <div class="card">
        <div class="category">${p.category || 'Audio Asset'}</div>
        <div class="img-wrap">
          <img src="${p.image_url}" alt="${p.title}" onerror="this.src='https://priscadezigns.org/logos/pd_mark_sq.png'">
        </div>
        <h3 class="title">${p.title}</h3>
        <div class="price">${p.price === "$--" ? "Sovereign Asset" : p.price}</div>
        <a href="${p.affiliate_link}" class="btn-buy" target="_blank">Acquire Asset</a>
      </div>
    `).join('');
  }

  // Neural Pulse Visualizer
  const canvas = document.getElementById('neural-pulse');
  const ctx = canvas.getContext('2d');
  let w, h;
  function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  const pts = [];
  for(let i=0; i<40; i++) pts.push({ x: Math.random()*w, y: Math.random()*h, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3 });

  function draw() {
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = "rgba(255,255,255,0.4)";
    pts.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x<0) p.x=w; if(p.x>w) p.x=0;
      if(p.y<0) p.y=h; if(p.y>h) p.y=0;
      ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();

  fetchProducts();
</script>
</body>
</html>
