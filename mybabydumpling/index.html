<head>

    <style>
        :root {
            --accent: #FFB6C1;
            --bg: #FFFFFF;
            --text: #333333;
            --muted: #888888;
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Playfair Display', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-main); background: var(--bg); color: var(--text); line-height: 1.6; }

        header {
            padding: 20px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #F0F0F0;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }
        
        .logo-wrap img {
            height: 50px;
        }

        nav a {
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            font-size: 0.9rem;
            margin-left: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav a:hover { color: var(--accent); }

        .hero {
            padding: 120px 6%;
            display: flex;
            align-items: center;
            gap: 5%;
        }

        .hero-content { flex: 1; }
        .hero-content h1 {
            font-family: var(--font-heading);
            font-size: clamp(3rem, 8vw, 5.5rem);
            line-height: 1;
            margin-bottom: 20px;
            color: #1A1A1A;
        }
        
        .hero-content p {
            font-size: 1.1rem;
            color: var(--muted);
            max-width: 500px;
            margin-bottom: 40px;
        }

        .btn-primary {
            display: inline-block;
            background: var(--accent);
            color: #FFF;
            padding: 20px 40px;
            text-decoration: none;
            font-weight: 900;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(255,182,193,0.3);
            transition: 0.3s;
        }

        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255,182,193,0.4); }

        .hero-visual {
            flex: 1;
            aspect-ratio: 1;
            background: #FAFAFA;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .hero-visual img {
            max-width: 80%;
            object-fit: contain;
        }

        footer {
            padding: 80px 6%;
            border-top: 1px solid #F0F0F0;
            text-align: center;
        }
        
        .footer-logo {
            height: 40px;
            margin-bottom: 20px;
            opacity: 0.8;
        }
        
        .footer-text {
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo-wrap">
            <img src="https://drive.google.com/uc?export=view&id=1omJEv1CQv5oGMPK3pE0pgrYDUyOiqViO" alt="My Baby Dumpling Logo">
        </a>
        <nav>
            <a href="shop/">Shop</a>
            <a href="nurture/">Nurture AI</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Nurturing Excellence.</h1>
                <p>Curated high-fidelity hardware and neural diagnostic support for the modern parent.</p>
                <a href="shop/" class="btn-primary">Explore The Collection →</a>
            </div>
            <div class="hero-visual">
                <img src="https://drive.google.com/uc?export=view&id=1jzut_kzMRdGAPFv85HjIzIRDQtLfBo11" alt="MBD Visual Core">
            </div>
        </section>
    </main>

    <footer>
        <img src="https://drive.google.com/uc?export=view&id=1omJEv1CQv5oGMPK3pE0pgrYDUyOiqViO" alt="MBD Logo" class="footer-logo">
        <p class="footer-text">© 2026 MY BABY DUMPLING // PRISCA DEZIGNS EMPIRE</p>
    </footer>
</body>
</html>
