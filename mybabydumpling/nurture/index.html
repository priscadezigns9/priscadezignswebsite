<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Neural Nurture | My Baby Dumpling</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FFB6C1; --bg: #fff; --text: #555; --border: #f9f9f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }

        header { position: fixed; top: 0; width: 100%; padding: 25px 8%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-weight: 700; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; color: #000; }
        
        .hero { min-height: 100vh; padding: 180px 8% 100px; text-align: center; max-width: 800px; margin: 0 auto; }
        .tag { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; color: var(--accent); font-weight: 700; margin-bottom: 20px; }
        h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 700; color: #000; line-height: 1.1; margin-bottom: 50px; }

        .nurture-box { background: #fafafa; border: 1px solid var(--border); padding: 50px; border-radius: 20px; }
        .input-group { display: flex; gap: 15px; margin-top: 20px; }
        input { flex: 1; padding: 20px; border: 1px solid #eee; border-radius: 10px; font-family: inherit; font-size: 1rem; }
        .run-btn { padding: 0 30px; background: #000; color: #fff; border: none; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border-radius: 10px; transition: 0.3s; }

        #ai-result { margin-top: 50px; }
        .nurture-report { text-align: left; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .tip-card { background: #fff; border: 1px solid var(--border); padding: 30px; border-radius: 15px; margin-top: 30px; }
        .tip-title { font-weight: 700; color: #000; margin-bottom: 10px; }

        .acq-btn { display: inline-block; width: 100%; text-align: center; background: var(--accent); color: #fff; text-decoration: none; padding: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; margin-top: 40px; border-radius: 10px; }

        footer { padding: 100px 8% 50px; text-align: center; border-top: 1px solid var(--border); opacity: 0.5; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <header>
        <a href="../" class="logo">My Baby Dumpling</a>
        <nav><a href="../shop/" style="color:#000; text-decoration:none; font-weight:700; font-size:0.7rem; text-transform:uppercase; letter-spacing:1px;">Shop</a></nav>
    </header>

    <main class="hero">
        <span class="tag">Neural Nurture AI V1.0</span>
        <h1>Parenthood Intelligence.</h1>

        <div class="nurture-box">
            <p style="color:#999; margin-bottom:30px; font-size:0.9rem; text-transform:uppercase; letter-spacing:2px;">Enter Milestone or Care Question</p>
            <div class="input-group">
                <input type="text" id="ai-input" placeholder="e.g. 6-month sleep regression, nursery setup..." autocomplete="off">
                <button class="run-btn" onclick="runNurture()">Ask</button>
            </div>
            <div id="ai-result"></div>
        </div>
    </main>

    <footer>© 2026 MY BABY DUMPLING // ARCHIVAL CARE INTELLIGENCE</footer>

    <script>
    function runNurture() {
        const input = document.getElementById('ai-input').value.trim();
        const res = document.getElementById('ai-result');
        if(!input) return;

        res.innerHTML = '<p style="text-align:center; font-weight:700; letter-spacing:2px; margin-top:40px; color:var(--accent);">CALIBRATING NURTURE DATA...</p>';

        setTimeout(() => {
            const query = input.toLowerCase(); const tag = "priscadezigns-20";
            let verdict = "Optimal Care Path Generated";
            
            res.innerHTML = `
                <div class="nurture-report">
                    <span class="tag" style="font-size:0.6rem;">Nurture Core Synced // Protocol Active</span>
                    <div class="tip-card">
                        <div class="tip-title">Intelligence Verdict for "${input}"</div>
                        <p style="font-size:0.95rem; color:#666;">Our high-fidelity care models suggest a focus on environment stabilization and tactile resonance. Maintaining a consistent sensory rhythm is critical for this milestone.</p>
                    </div>

                    <a href="https://www.amazon.com/s?k=${encodeURIComponent(input)}+baby+essentials&tag=${tag}" target="_blank" class="acq-btn">Acquire Care Components →</a>
                </div>
            `;
        }, 1800);
    }
    </script>
</body>
</html>
