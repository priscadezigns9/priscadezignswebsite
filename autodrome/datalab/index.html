<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Intelligence Core | Autodrome Data Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&family=Space+Grotesk:wght@300;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #E63946; 
            --bg: #050508; 
            --text: #FFFFFF; 
            --border: rgba(255,255,255,0.08); 
            --card-bg: rgba(255,255,255,0.02);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Space Grotesk', sans-serif; 
            overflow-x: hidden;
        }

        /* --- BACKGROUND EFFECTS --- */
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            opacity: 0.3;
        }
        .glow {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80vw; height: 80vw;
            background: radial-gradient(circle, rgba(230,57,70,0.05) 0%, transparent 70%);
            z-index: -1;
            filter: blur(100px);
        }

        header { 
            position: fixed; top: 0; width: 100%; padding: 30px 8%; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; background: rgba(5,5,8,0.8); backdrop-filter: blur(30px); 
            border-bottom: 1px solid var(--border); 
        }
        .logo-group { display: flex; align-items: center; gap: 15px; text-decoration: none; color: #fff; }
        .logo-group img { width: 50px; border-radius: 12px; border: 1px solid var(--border); }
        .logo-text { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 700; font-style: italic; }

        .lab-hero { 
            min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 150px 8% 100px; text-align: center; 
        }
        .status-tag {
            color: var(--accent); font-weight: 900; letter-spacing: 8px; 
            text-transform: uppercase; font-size: 0.8rem; margin-bottom: 40px; 
            display: inline-flex; align-items: center; gap: 10px;
        }
        .status-tag span { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        h1 { 
            font-family: 'Cormorant Garamond', serif; font-size: clamp(3.5rem, 10vw, 8rem); 
            font-style: italic; line-height: 0.9; margin-bottom: 60px; font-weight: 700;
        }

        .engine-interface { 
            background: var(--card-bg); border: 1px solid var(--border); 
            padding: 80px; border-radius: 4px; max-width: 1000px; width: 100%;
            position: relative; overflow: hidden;
        }
        .interface-header {
            position: absolute; top: 0; left: 0; width: 100%; padding: 15px 30px;
            background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; font-size: 0.6rem; 
            font-family: 'Space Mono', monospace; text-transform: uppercase; color: var(--muted);
        }

        .input-wrap { display: flex; gap: 25px; margin-top: 20px; }
        input { 
            flex: 1; padding: 25px; background: rgba(255,255,255,0.02); 
            border: 1px solid var(--border); color: #fff; font-size: 1.2rem;
            font-family: 'Space Grotesk', sans-serif;
        }
        input:focus { outline: none; border-color: var(--accent); }
        .run-btn { 
            padding: 0 50px; background: var(--accent); color: #fff; 
            border: none; font-weight: 900; text-transform: uppercase; 
            cursor: pointer; letter-spacing: 2px; transition: 0.3s;
        }
        .run-btn:hover { background: #fff; color: var(--accent); }

        #lab-result { margin-top: 50px; }
        .report-card { 
            text-align: left; border: 1px solid var(--accent); 
            padding: 50px; background: rgba(230,57,70,0.05); 
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .report-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .vehicle-id { font-family: 'Space Mono', monospace; font-weight: 900; color: var(--accent); font-size: 0.8rem; }
        
        .part-row { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 30px; }
        .part-label { font-size: 0.65rem; text-transform: uppercase; color: var(--muted); letter-spacing: 2px; margin-bottom: 10px; }
        .part-value { font-size: 1.1rem; font-weight: 700; color: #fff; }

        .buy-cta { 
            display: inline-block; width: 100%; text-align: center;
            background: var(--accent); color: #fff; text-decoration: none; 
            padding: 25px; font-weight: 900; font-size: 0.9rem; 
            text-transform: uppercase; letter-spacing: 3px; margin-top: 40px;
        }

        footer { padding: 100px 8% 50px; text-align: center; border-top: 1px solid var(--border); }
        .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; opacity: 0.5; margin-bottom: 20px; display: block; }
        .footer-copy { font-size: 0.6rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }

        @media (max-width: 768px) {
            h1 { font-size: 4rem; }
            .engine-interface { padding: 40px 20px; }
            .input-wrap { flex-direction: column; }
            .run-btn { padding: 25px; }
            .part-row { grid-template-columns: 1fr; gap: 20px; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="glow"></div>

    <header>
        <a href="../" class="logo-group">
            <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/logos/the-autodrome.jpg" alt="The Autodrome">
            <span class="logo-text">The Autodrome</span>
        </a>
        <nav><a href="../garage/" style="color:#fff; text-decoration:none; font-weight:700; font-size:0.8rem; text-transform:uppercase; letter-spacing:2px;">Garage</a></nav>
    </header>

    <main class="lab-hero">
        <div class="status-tag"><span></span> Neural Execution Core Online</div>
        <h1>The Intelligence Hub.</h1>
        
        <div class="engine-interface">
            <div class="interface-header">
                <span>V7.0 // ARCHIVAL DATA LAB</span>
                <span>CALIBRATION: ACTIVE</span>
            </div>

            <p style="color:var(--muted); margin-bottom:40px; font-size:0.9rem; text-transform:uppercase; letter-spacing:2px;">Identify Vehicle to Begin Archival Scan</p>
            
            <div class="input-wrap">
                <input type="text" id="lab-input" placeholder="MODEL IDENTIFIER (e.g. FERRARI 488, KIA EV6)..." autocomplete="off">
                <button class="run-btn" onclick="runCalibration()">Calibrate</button>
            </div>

            <div id="lab-result"></div>
        </div>
    </main>

    <footer>
        <span class="footer-logo">The Autodrome</span>
        <p class="footer-copy">© 2026 PRISCA DEZIGNS EMPIRE // HIGH-FIDELITY AUTOMOTIVE SOVEREIGNTY</p>
    </footer>

    <script>
    function runCalibration() {
        const input = document.getElementById('lab-input').value.trim();
        const res = document.getElementById('lab-result');
        if(!input) return;

        res.innerHTML = '<p style="color:var(--accent); font-weight:900; margin-top:40px; letter-spacing:5px;">EXECUTING NEURAL SCAN...</p>';
        
        setTimeout(() => {
            const query = input.toLowerCase();
            let d = { b: "High-Fidelity", o: "Motul 300V Competition 15W-50", br: "Brembo CCMR Carbon Discs", t: "Michelin Pilot Sport 4S" };
            
            const brands = {
                "ferrari": { b: "Ferrari", o: "Shell Helix Ultra 5W-40", br: "Brembo Carbon Discs", t: "Pirelli P-Zero Corsa" },
                "kia": { b: "Kia", o: "Quaker State Synthetic 5W-30", br: "PowerStop Evolution", t: "Hankook Ventus S1" },
                "toyota": { b: "Toyota", o: "Toyota 0W-20 Synthetic", br: "Akebono Ceramic", t: "Bridgestone Turanza" },
                "lamborghini": { b: "Lamborghini", o: "Castrol EDGE 10W-60", br: "Brembo CCM", t: "Pirelli P-Zero" },
                "porsche": { b: "Porsche", o: "Mobil 1 0W-40", br: "PCCB Carbon Ceramic", t: "Michelin Pilot Sport Cup 2" }
            };

            for(let k in brands) { if(query.includes(k)) { d = brands[k]; break; } }

            res.innerHTML = `
                <div class="report-card">
                    <div class="report-header">
                        <div>
                            <span class="vehicle-id">SCAN REPORT // ${input.toUpperCase()}</span>
                            <h2 style="font-family:'Cormorant Garamond'; font-size:2.5rem; font-style:italic; margin-top:10px;">Calibration Result</h2>
                        </div>
                        <span style="font-family:'Space Mono'; font-size:0.6rem; opacity:0.4;">VER: 7.0.0.1</span>
                    </div>

                    <div class="part-row">
                        <div>
                            <div class="part-label">Archival Lubricant</div>
                            <div class="part-value">${d.o}</div>
                        </div>
                        <div>
                            <div class="part-label">Kinetic Braking</div>
                            <div class="part-value">${d.br}</div>
                        </div>
                    </div>

                    <div class="part-row">
                        <div>
                            <div class="part-label">Contact Surface (Tires)</div>
                            <div class="part-value">${d.t}</div>
                        </div>
                        <div>
                            <div class="part-label">Tuning Status</div>
                            <div class="part-value" style="color:var(--accent)">OPTIMIZED</div>
                        </div>
                    </div>

                    <a href="https://www.amazon.com/s?k=${encodeURIComponent(d.o)}+${encodeURIComponent(d.b)}&tag=priscadezigns-20" target="_blank" class="buy-cta">Acquire Precision Components →</a>
                    
                    <p style="margin-top:30px; font-size:0.6rem; text-align:center; color:var(--muted); text-transform:uppercase; letter-spacing:2px;">Data provided via the Sovereign Neural Intelligence Network</p>
                </div>`;
        }, 1800);
    }
    </script>
</body>
</html>
