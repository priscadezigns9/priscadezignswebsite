<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Sovereign Intelligence Core | Autodrome Data Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&family=Space+Grotesk:wght@300;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #E63946; --bg: #050508; --text: #FFFFFF; --border: rgba(255,255,255,0.08); --card-bg: rgba(255,255,255,0.02); --muted: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
        header { position: fixed; top: 0; width: 100%; padding: 30px 8%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(5,5,8,0.8); backdrop-filter: blur(30px); border-bottom: 1px solid var(--border); }
        .logo-group { display: flex; align-items: center; gap: 15px; text-decoration: none; color: #fff; }
        .logo-group img { width: 50px; border-radius: 12px; border: 1px solid var(--border); }
        .logo-text { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 700; font-style: italic; }
        .nav-links { display: flex; gap: 40px; align-items: center; }
        .nav-links a { color: #fff; text-decoration: none; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { opacity: 1; color: var(--accent); }
        .lab-hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 150px 8% 100px; text-align: center; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 8vw, 6rem); font-style: italic; line-height: 1; margin-bottom: 60px; font-weight: 700; }
        .engine-interface { background: var(--card-bg); border: 1px solid var(--border); padding: 60px; border-radius: 4px; max-width: 1200px; width: 100%; position: relative; overflow: hidden; }
        .interface-header { position: absolute; top: 0; left: 0; width: 100%; padding: 15px 30px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 0.6rem; font-family: 'Space Mono', monospace; text-transform: uppercase; color: var(--muted); }
        .input-wrap { display: flex; gap: 20px; margin-top: 20px; }
        input { flex: 1; padding: 25px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); color: #fff; font-size: 1.2rem; font-family: 'Space Grotesk', sans-serif; }
        .run-btn { padding: 0 50px; background: var(--accent); color: #fff; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; letter-spacing: 2px; transition: 0.3s; }
        .report-section { margin-bottom: 60px; border-top: 1px solid var(--border); padding-top: 40px; text-align: left; }
        .section-title { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; display: block; }
        .specs-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; }
        .spec-item { border: 1px solid var(--border); padding: 25px; background: rgba(255,255,255,0.01); }
        .spec-label { font-size: 0.6rem; text-transform: uppercase; color: var(--muted); letter-spacing: 2px; margin-bottom: 10px; }
        .spec-value { font-size: 1.2rem; font-weight: 700; color: #fff; }
        .parts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .part-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 30px; text-decoration: none; color: inherit; transition: 0.3s; }
        .part-card:hover { border-color: var(--accent); background: rgba(230,57,70,0.03); }
        .part-card h3 { font-size: 1rem; margin-bottom: 15px; color: #fff; }
        .part-card p { font-size: 0.8rem; color: var(--muted); margin-bottom: 25px; }
        .part-link { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--accent); font-weight: 700; text-transform: uppercase; }
        .deep-search-bar { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .search-pill { padding: 12px 25px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; transition: 0.3s; }
        .search-pill:hover { border-color: #fff; color: #fff; }
        footer { padding: 100px 8% 50px; text-align: center; border-top: 1px solid var(--border); }
    </style>
</head>
<body>
    <header>
        <a href="../" class="logo-group"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/the_autodrome.png" alt="The Autodrome"><span class="logo-text">The Autodrome</span></a>
        <nav class="nav-links"><a href="../">Home</a><a href="../garage/">Garage</a><a href="./" class="active">Data Lab</a><a href="../blog/">Intel</a></nav>
    </header>
    <main class="lab-hero">
        <h1>Total Machine Archival.</h1>
        <div class="engine-interface">
            <div class="interface-header"><span>DEEP SCAN PROTOCOL: READY</span><span>EMPIRE DATABASE: CONNECTED</span></div>
            <p style="color:var(--muted); margin-bottom:40px; font-size:0.9rem; text-transform:uppercase; letter-spacing:3px;">Identify Machine for Full Component Decomposition</p>
            <div class="input-wrap"><input type="text" id="lab-input" placeholder="MANUFACTURER + MODEL..."><button class="run-btn" onclick="runDeepScan()">Archival Scan</button></div>
            <div id="lab-result"></div>
        </div>
    </main>
    <footer><p style="font-family:'Space Mono'; font-size:0.6rem; letter-spacing:3px; color:var(--muted); text-transform:uppercase;">© 2026 PRISCA DEZIGNS EMPIRE // NEURAL DATA LAB</p></footer>
    <script>
    function runDeepScan() {
        const input = document.getElementById('lab-input').value.trim();
        const res = document.getElementById('lab-result');
        if(!input) return;
        res.innerHTML = '<div style="margin-top:60px; color:var(--accent); font-weight:900; letter-spacing:8px;">SCANNING ARCHIVES...</div>';
        setTimeout(() => {
            const query = input.toLowerCase(); const tag = "priscadezigns-20";
            let data = { engine: "Universal Kinetic", hp: "Unknown", top_speed: "Classified", weight: "Dynamic", oil: "Motul 300V Competition", brakes: "Brembo Carbon-Ceramic", tires: "Michelin Pilot Sport 4S" };
            const db = {
                "ferrari": { make: "Ferrari", engine: "V8 Twin-Turbo", hp: "710", top_speed: "211 MPH", weight: "3,373 LBS", oil: "Shell Helix Ultra 5W-40", brakes: "Brembo CCB System", tires: "Pirelli P-Zero Corsa" },
                "kia": { make: "Kia", engine: "Turbocharged Inline-4", hp: "290", top_speed: "155 MPH", weight: "3,534 LBS", oil: "Quaker State Synthetic 5W-30", brakes: "PowerStop Evolution", tires: "Hankook Ventus S1" },
                "toyota": { make: "Toyota", engine: "Naturally Aspirated V6", hp: "301", top_speed: "135 MPH", weight: "3,572 LBS", oil: "Toyota Genuine 0W-20", brakes: "Akebono Pro-ACT Ceramic", tires: "Bridgestone Turanza" }
            };
            for(let key in db) { if(query.includes(key)) { data = db[key]; break; } }
            res.innerHTML = `<div class="report-section"><span class="section-title">Technical Report</span><div class="specs-grid"><div class="spec-item"><div class="spec-label">Configuration</div><div class="spec-value">${data.engine}</div></div><div class="spec-item"><div class="spec-label">Output (HP)</div><div class="spec-value">${data.hp}</div></div><div class="spec-item"><div class="spec-label">Velocity</div><div class="spec-value">${data.top_speed}</div></div><div class="spec-item"><div class="spec-label">Weight</div><div class="spec-value">${data.weight}</div></div></div></div><div class="report-section"><span class="section-title">Precision Components</span><div class="parts-grid"><a href="https://www.amazon.com/s?k=${encodeURIComponent(data.oil)}+${encodeURIComponent(input)}&tag=${tag}" target="_blank" class="part-card"><h3>Lubricant</h3><p>${data.oil}</p><span class="part-link">Acquire →</span></a><a href="https://www.amazon.com/s?k=${encodeURIComponent(data.brakes)}+${encodeURIComponent(input)}&tag=${tag}" target="_blank" class="part-card"><h3>Braking</h3><p>${data.brakes}</p><span class="part-link">Acquire →</span></a><a href="https://www.amazon.com/s?k=${encodeURIComponent(data.tires)}+${encodeURIComponent(input)}&tag=${tag}" target="_blank" class="part-card"><h3>Contact</h3><p>${data.tires}</p><span class="part-link">Acquire →</span></a></div></div><div class="report-section"><span class="section-title">Deep Hardware Access</span><div class="deep-search-bar"><a href="https://www.amazon.com/s?k=${encodeURIComponent(input)}+screws+clips&tag=${tag}" target="_blank" class="search-pill">Fasteners</a><a href="https://www.amazon.com/s?k=${encodeURIComponent(input)}+maintenance+kit&tag=${tag}" target="_blank" class="search-pill">Maintenance Kits</a><a href="https://www.amazon.com/s?k=${encodeURIComponent(input)}+gaskets+seals&tag=${tag}" target="_blank" class="search-pill">Gaskets</a><a href="https://www.amazon.com/s?k=${encodeURIComponent(input)}+engine+internals&tag=${tag}" target="_blank" class="search-pill">Internals</a><a href="https://www.amazon.com/s?k=${encodeURIComponent(input)}+electrical+sensors&tag=${tag}" target="_blank" class="search-pill">Sensors</a></div><a href="https://www.amazon.com/s?k=${encodeURIComponent(input)}+parts&tag=${tag}" target="_blank" style="display:block; margin-top:40px; padding:25px; border:1px solid var(--accent); color:var(--accent); text-align:center; text-decoration:none; font-weight:900; text-transform:uppercase; letter-spacing:5px;">FULL ARCHIVAL DATABASE: ${input.toUpperCase()}</a></div>`;
        }, 2000);
    }
    </script>
</body>
</html>
