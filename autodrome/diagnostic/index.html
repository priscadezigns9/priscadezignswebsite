<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE AUTODROME | Diagnostic Link</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Urbanist:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #7c3aed;
            --lilac: #c084fc;
            --bg: #050810;
            --font-h1: "DM Serif Display", serif;
            --font-body: "Urbanist", sans-serif;
        }
        body { background: var(--bg); color: #fff; font-family: var(--font-body); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { padding: 40px; text-align: center; }
        h1 { font-family: var(--font-h1); color: var(--lilac); font-size: 2.5rem; margin: 0; }
        .subtitle { text-transform: uppercase; letter-spacing: 4px; font-size: 0.7rem; opacity: 0.6; margin-top: 10px; }
        .main-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(124, 58, 237, 0.2);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            margin-top: 20px;
        }
        .status-ring {
            width: 200px;
            height: 200px;
            border: 2px solid rgba(124, 58, 237, 0.1);
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .status-ring::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--purple);
            border-radius: 50%;
            border-top-color: transparent;
            animation: rotate 2s linear infinite;
        }
        .scan-btn {
            background: var(--purple);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header>
        <h1>DIAGNOSTIC</h1>
        <div class="subtitle">Neural Vehicle Analysis</div>
    </header>
    <div class="main-card">
        <div class="status-ring">
            <span id="stat-text">READY</span>
        </div>
        <button class="scan-btn">Initialize Link</button>
        <p style="font-size: 0.8rem; margin-top: 25px; opacity: 0.5;">Connect via Bluetooth OBDLink MX+</p>
    </div>
</body>
</html>
