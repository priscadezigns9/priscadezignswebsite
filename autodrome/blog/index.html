<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autodrome Lab Editorial — High-Performance Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050508; --teal: #00B4A6; --red: #C0392B; --white: #F5F5F7; --gray: #86868B; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        header { padding: 4rem 2rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        h1 { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; margin: 0; letter-spacing: 2px; }
        .container { max-width: 1000px; margin: 4rem auto; padding: 0 2rem; }
        .article-card { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 2rem 0; }
        .article-card h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; margin: 0; }
        .article-card a { color: var(--white); text-decoration: none; transition: color 0.3s; }
        .article-card a:hover { color: var(--teal); }
        .date { color: var(--gray); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem; display: block; }
        footer { padding: 4rem 2rem; text-align: center; font-size: 0.9rem; color: var(--gray); border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <header><h1>AUTODROME EDITORIAL</h1></header>
    <div class="container">
        <div class="article-card">
            <span class="date">2026.05.27</span>
            <h2><a href="ferrari-luce-jony-ive-ev-supercar/">Ferrari Luce: Jony Ive’s First EV Supercar</a></h2>
            <p>Alpha Reveal: 1,114 HP, Zero Screens, and the Return of the Tactile Supercar.</p>
        </div>
    </div>
    <footer><p>© 2026 AUTODROME | LUXURY AUTOMOTIVE LAB</p></footer>
</body>
</html>
