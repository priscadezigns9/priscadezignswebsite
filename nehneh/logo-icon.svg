<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Black circle background -->
  <circle cx="50" cy="50" r="48" fill="#0A0A08"/>
  <circle cx="50" cy="50" r="48" fill="none" stroke="#E8007D" stroke-width="1.5"/>

  <!-- Needle — tall diagonal across the circle -->
  <line x1="38" y1="18" x2="58" y2="72" stroke="#E8007D" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Needle eye at top -->
  <ellipse cx="38.5" cy="20" rx="5.5" ry="3.2" fill="none" stroke="#E8007D" stroke-width="1.8"/>
  <!-- Needle tip point -->
  <circle cx="58.5" cy="73" r="1.2" fill="#E8007D"/>

  <!-- Thread looping elegantly -->
  <path d="M58 72 Q66 82 57 88 Q48 94 60 98" fill="none" stroke="#E8007D" stroke-width="1.5" stroke-linecap="round"/>

  <!-- N N initials subtly -->
  <text x="50" y="60" font-family="Georgia, serif" font-size="18" font-style="italic" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">NN</text>
</svg>
