<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&amp;display=swap');
    </style>
  </defs>

  <!-- Background: transparent -->

  <!-- Needle accent line — diagonal, hot pink -->
  <line x1="192" y1="18" x2="210" y2="90" stroke="#E8007D" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Needle eye -->
  <ellipse cx="193" cy="20" rx="5" ry="3" fill="none" stroke="#E8007D" stroke-width="1.6"/>
  <!-- Thread tail curving off needle -->
  <path d="M210 90 Q220 108 208 118 Q196 128 212 138" fill="none" stroke="#E8007D" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Brand name: Neh Neh in elegant script style -->
  <text
    x="50"
    y="95"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="68"
    font-style="italic"
    font-weight="bold"
    fill="#FFFFFF"
    letter-spacing="2"
  >Neh Neh</text>

  <!-- Tagline -->
  <text
    x="52"
    y="125"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="15"
    font-style="normal"
    font-weight="normal"
    fill="#E8007D"
    letter-spacing="6"
  >HAUTE COUTURE</text>

  <!-- Thin underline accent -->
  <line x1="52" y1="132" x2="320" y2="132" stroke="#E8007D" stroke-width="0.8"/>
</svg>
