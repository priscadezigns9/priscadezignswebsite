<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rowcell | Algorithmic Data Utility</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFFFFF; --text: #111111; --muted: #666666; --accent: #2ECC71; --border: rgba(0,0,0,0.08); --font-heading: 'Playfair Display', serif; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; padding-bottom: 100px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 40px; }
        nav { padding: 40px 0; display: flex; justify-content: center; }
        .grid-logo { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; width: 32px; height: 32px; }
        .grid-logo div { background: var(--accent); border-radius: 2px; }
        .hero { padding: 80px 0 60px; text-align: center; }
        h1 { font-family: var(--font-heading); font-size: 4rem; margin-bottom: 24px; }
        .tier-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 32px; margin-top: 60px; }
        .tier-card { background: white; border: 1px solid var(--border); padding: 48px; border-radius: 12px; position: relative; }
        .btn { display: inline-block; width: 100%; padding: 20px; border-radius: 8px; text-decoration: none; font-weight: 600; text-align: center; border: 1px solid var(--accent); cursor: pointer; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-outline { background: transparent; color: var(--accent); }
        .pay-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;align-items:center;justify-content:center}
        .pay-modal-overlay.open{display:flex}
        .pay-modal-box{background:#fff;color:#111;border-radius:16px;padding:32px;max-width:460px;width:90%;position:relative;}
        .pay-modal-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:1.3rem;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <nav><div class="logo-wrap"><div class="grid-logo"><div></div><div></div><div></div><div></div></div><span style="font-weight: 800; font-size: 0.9rem; letter-spacing: 2px;">ROWCELL</span></div></nav>
        <section class="hero"><h1>Data Integrity.</h1><p>High-fidelity data scrubbing and algorithmic structural utility.</p></section>
        <div class="tier-grid">
            <div class="tier-card"><h3>Starter Cleanup</h3><p>$10.00</p><button onclick="openPayModal('Rowcell Starter', '$10.00')" class="btn btn-outline">Select Starter</button></div>
            <div class="tier-card"><h3>Pro Utility</h3><p>$35.00</p><button onclick="openPayModal('Rowcell Pro', '$35.00')" class="btn btn-primary">Select Pro</button></div>
        </div>
    </div>
    <div class="pay-modal-overlay" id="payModal"><div class="pay-modal-box"><button class="pay-modal-close" onclick="closePayModal()">✕</button><h3 id="pay-plan-title">Request Access</h3><p id="pay-plan-price" style="font-weight:700;color:#2ECC71;margin-bottom:20px;"></p>
        <form id="leadForm" onsubmit="submitLead(event)">
            <input type="hidden" id="selectedPackage">
            <input type="text" id="leadName" placeholder="Name" required style="width:100%;padding:12px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;">
            <input type="email" id="leadEmail" placeholder="Email" required style="width:100%;padding:12px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;">
            <textarea id="leadDetail" placeholder="Data project details" style="width:100%;padding:12px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;height:80px;"></textarea>
            <button type="submit" id="submitBtn" style="width:100%;padding:14px;background:#2ECC71;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;">Send Request</button>
        </form>
        <div id="successMsg" style="display:none;text-align:center;"><h3>Request Sent</h3><p>We'll reach out to start your data scrubbing.</p></div>
    </div></div>
    <script>
    function openPayModal(plan, price) { document.getElementById('pay-plan-title').textContent = plan; document.getElementById('pay-plan-price').textContent = price; document.getElementById('selectedPackage').value = plan + ' (' + price + ')'; document.getElementById('payModal').classList.add('open'); }
    function closePayModal() { document.getElementById('payModal').classList.remove('open'); }
    async function submitLead(event) { event.preventDefault(); const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.textContent = 'Sending...'; try { const response = await fetch('https://sktpjacowqaedddtrhuz.supabase.co/rest/v1/leads', { method: 'POST', headers: { 'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdHBqYWNvd3FhZWRkZHRyaHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDk5MzEsImV4cCI6MjA5NDIyNTkzMX0.FK4N_ATFTaUuGXrYu_7OBn3qCdlo0rOzxk-E6TxJxqs', 'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdHBqYWNvd3FhZWRkZHRyaHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDk5MzEsImV4cCI6MjA5NDIyNTkzMX0.FK4N_ATFTaUuGXrYu_7OBn3qCdlo0rOzxk-E6TxJxqs', 'Content-Type': 'application/json' }, body: JSON.stringify({ name: document.getElementById('leadName').value, email: document.getElementById('leadEmail').value, package: document.getElementById('selectedPackage').value, category: 'Rowcell Data', details: document.getElementById('leadDetail').value }) }); if (response.ok) { document.getElementById('leadForm').style.display = 'none'; document.getElementById('successMsg').style.display = 'block'; } else { alert('Try again.'); btn.disabled = false; btn.textContent = 'Send Request'; } } catch (err) { alert('Error.'); btn.disabled = false; } }
    </script>
</body>
</html>
