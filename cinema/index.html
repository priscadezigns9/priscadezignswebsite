<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA | DREAMING ANIME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #FF6B00; 
            --bg: #050505; 
            --panel: #0F0F0F;
            --border: #1F1F1F;
        }
        
        body, html { margin:0; padding:0; background:var(--bg); color:#fff; font-family:'Inter', sans-serif; height: 100%; }
        
        /* Navigation */
        nav { background:#000; padding:15px 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
        .logo-wrap { display: flex; align-items: baseline; gap: 15px; }
        .logo { font-family:'Bangers'; font-size:2.2rem; color:var(--primary); text-decoration:none; letter-spacing:1px; }
        #auth-status { font-family: 'Space Mono'; font-size: 9px; color: #444; cursor: pointer; letter-spacing: 1px; }
        .search-bar { background:#111; border:1px solid #333; padding:12px 25px; color:#fff; border-radius:8px; width:300px; font-family:inherit; outline: none; }

        /* Grid */
        .anime-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:25px; padding:40px 5%; min-height: 80vh; }
        .card { aspect-ratio:2/3; background:#111; border-radius:10px; overflow:hidden; cursor:pointer; position:relative; transition: 0.3s; border:1px solid #1a1a1a; }
        .card:hover { transform: translateY(-5px); border-color:var(--primary); }
        .card img { width:100%; height:100%; object-fit:cover; }
        .card-title { position:absolute; bottom:0; left:0; right:0; padding:15px; background:linear-gradient(transparent, rgba(0,0,0,0.95)); font-size:0.85rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

        /* Full Page Cinema (V13) */
        #cinema-view { display:none; min-height:100vh; background:var(--bg); width:100%; }
        
        .cinema-header { padding:20px 5%; background:#000; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:20px; position:sticky; top:0; z-index:1001; }
        .back-btn { background:transparent; color:#fff; border:1px solid #333; padding:12px 24px; border-radius:6px; cursor:pointer; font-weight:700; display:flex; align-items:center; gap:10px; font-size:0.85rem; text-transform: uppercase; transition: 0.3s; }
        .back-btn:hover { background:#1a1a1a; border-color:var(--primary); }

        .cinema-main { max-width:1500px; margin:40px auto; padding:0 5%; display:grid; grid-template-columns: 1fr 380px; gap:40px; }
        @media (max-width: 1200px) { .cinema-main { grid-template-columns: 1fr; } }

        .player-outer { width:100%; background:#000; border-radius:12px; overflow:hidden; border:1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        .aspect-ratio { width:100%; aspect-ratio:16/9; position:relative; background:#000; }
        iframe { width:100%; height:100%; border:none; position:absolute; top:0; left:0; }

        .player-footer { background:var(--panel); padding:25px; display:flex; flex-wrap:wrap; gap:20px; border-top:1px solid var(--border); align-items:center; }
        .serv-list { display:flex; gap:10px; flex-wrap:wrap; }
        .serv-btn { background:#1a1a1a; border:1px solid #333; color:#aaa; padding:10px 20px; border-radius:6px; cursor:pointer; font-size:0.75rem; font-weight:700; transition: 0.3s; }
        .serv-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); box-shadow: 0 0 20px rgba(255,107,0,0.2); }

        .episode-matrix { background:var(--panel); border-radius:12px; border:1px solid var(--border); padding:30px; height:fit-content; }
        .ep-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap:12px; margin-top:20px; max-height:600px; overflow-y:auto; padding-right:10px; }
        .ep-btn { background:#1a1a1a; border: 1px solid #333; color:#fff; padding:15px 5px; border-radius:6px; text-align:center; cursor:pointer; font-size:0.9rem; font-weight:700; transition: 0.2s; }
        .ep-btn:hover, .ep-btn.active { background:var(--primary); border-color:var(--primary); }

        .anime-content { margin-top:40px; }
        .anime-name { font-family:'Bangers'; font-size:3rem; color:var(--primary); margin:0 0 15px 0; letter-spacing: 1px; }
        .anime-meta { color:var(--primary); font-weight:800; font-size:0.9rem; text-transform: uppercase; margin-bottom: 20px; }
        .anime-synopsis { color:#aaa; line-height:1.8; font-size:1rem; max-width: 900px; }

        /* Loader */
        #loader { position:absolute; top:0; left:0; width:100%; height:100%; background:#000; z-index:10; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .spinner { width:40px; height:40px; border:3px solid rgba(255,107,0,0.1); border-top-color:var(--primary); border-radius:50%; animation:spin 1s infinite linear; margin-bottom:15px; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>
    <div id="hub-view">
        <nav>
            <div class="logo-wrap">
                <a href="/" class="logo">DREAMING ANIME</a>
                <div id="auth-status" onclick="toggleAuthModal()">[HANDSHAKE_REQUIRED]</div>
            </div>
            <input type="text" class="search-bar" placeholder="Search transmissions..." onkeyup="if(event.key==='Enter') searchAnime(this.value)">
        </nav>
        <div id="grid" class="anime-grid"></div>
    </div>

    <div id="cinema-view">
        <div class="cinema-header">
            <button class="back-btn" onclick="closeCinema()"><i class="fas fa-arrow-left"></i> BACK TO HUB</button>
            <div style="margin-left:auto; color:var(--primary); font-size:0.8rem; font-weight:800; letter-spacing:2px;">DREAMING CINEMA V13</div>
        </div>

        <div class="cinema-main">
            <div class="player-section">
                <div class="player-outer">
                    <div class="aspect-ratio" id="player-container"></div>
                    <div class="player-footer">
                        <div class="serv-list" id="serv-list"></div>
                        <button class="back-btn" style="margin-left:auto;" onclick="loadTransmission()"><i class="fas fa-sync"></i> REFRESH</button>
                    </div>
                </div>

                <div class="anime-content">
                    <h1 class="anime-name" id="m-title">INITIALIZING...</h1>
                    <div class="anime-meta" id="m-meta">EPISODE 1</div>
                    <p class="anime-synopsis" id="m-desc">Establishing a high-fidelity transmission handshake...</p>
                </div>
            </div>

            <div class="episode-matrix">
                <h3 style="margin:0; font-size:1rem; letter-spacing:1px; border-bottom: 1px solid var(--border); padding-bottom: 20px;">EPISODE MATRIX</h3>
                <div class="ep-grid" id="ep-grid"></div>
            </div>
        </div>
    </div>

    <!-- Sovereign Vault Modal -->
    <div id="auth-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; align-items:center; justify-content:center; padding:20px;">
        <div style="background:#0F0F0F; border:1px solid var(--border); padding:40px; width:100%; max-width:400px; border-radius:12px; text-align:center;">
            <div style="font-family:'Bangers'; font-size:2.5rem; color:var(--primary); margin-bottom:10px; letter-spacing:1px;">SOVEREIGN VAULT</div>
            <p style="font-size:9px; color:#555; margin-bottom:30px; letter-spacing:1px; font-family:'Space Mono';">SECURE YOUR TRANSMISSION ACROSS THE EMPIRE</p>
            
            <input type="email" id="auth-email" placeholder="NEURAL_EMAIL" style="width:100%; background:#000; border:1px solid #222; padding:15px; color:#fff; border-radius:8px; margin-bottom:15px; font-family:inherit; outline:none;">
            <input type="password" id="auth-pass" placeholder="VAULT_KEY" style="width:100%; background:#000; border:1px solid #222; padding:15px; color:#fff; border-radius:8px; margin-bottom:30px; font-family:inherit; outline:none;">
            
            <button onclick="handleAuth('signin')" id="signin-btn" style="width:100%; background:var(--primary); color:#fff; padding:15px; border-radius:8px; font-weight:700; border:none; margin-bottom:15px; cursor:pointer; font-family:'Bangers'; font-size:1.2rem; letter-spacing:1px;">SIGN_IN</button>
            <button onclick="handleAuth('signup')" id="signup-btn" style="width:100%; background:transparent; color:#fff; padding:15px; border-radius:8px; font-weight:700; border:1px solid #333; cursor:pointer; font-family:'Bangers'; font-size:1.2rem; letter-spacing:1px;">CREATE_IDENTITY</button>
            
            <div onclick="toggleAuthModal()" style="margin-top:30px; font-size:10px; color:#444; cursor:pointer; letter-spacing:2px; font-family:'Space Mono';">CANCEL_HANDSHAKE</div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient("https://sktpjacowqaedddtrhuz.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdHBqYWNvd3FhZWRkZHRyaHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDk5MzEsImV4cCI6MjA5NDIyNTkzMX0.FK4N_ATFTaUuGXrYu_7OBn3qCdlo0rOzxk-E6TxJxqs");
        
        let user = null;
        window.toggleAuthModal = () => {
            const m = document.getElementById('auth-modal');
            m.style.display = m.style.display === 'none' ? 'flex' : 'none';
        };

        const updateAuthUI = (u) => {
            user = u;
            const status = document.getElementById('auth-status');
            if(user) {
                status.textContent = `[IDENTITY_LOCKED: ${user.email.split('@')[0].toUpperCase()}]`;
                status.style.color = 'var(--primary)';
            } else {
                status.textContent = '[HANDSHAKE_REQUIRED]';
                status.style.color = '#444';
            }
        };

        window.handleAuth = async (type) => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-pass').value;
            if(!email || !password) return alert('MISSING_CREDENTIALS');

            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'CONNECTING...';

            try {
                const { data, error } = type === 'signup' 
                    ? await sb.auth.signUp({ email, password })
                    : await sb.auth.signInWithPassword({ email, password });

                if(error) throw error;
                updateAuthUI(data.user);
                toggleAuthModal();
                if(type === 'signup') alert('IDENTITY_CREATED. CHECK EMAIL FOR HANDSHAKE.');
            } catch(e) {
                alert(`AUTH_ERROR: ${e.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = type === 'signup' ? 'CREATE_IDENTITY' : 'SIGN_IN';
            }
        };

        sb.auth.getSession().then(({data}) => {
            if(data.session) updateAuthUI(data.session.user);
        });

        const ANILIST = 'https://graphql.anilist.co';
        let curMalId = null;
        let curAniId = null;
        let curEp = 1;
        let curServ = 'vidsrc_me';
        let totalEps = 0;
        let attemptIndex = 0;
        let fallbackTimer = null;

        const SOURCES = [
            { id: 'vidsrc_me', name: 'NODE 1 (STABLE)', getUrl: (name, ep, malId) => `https://vidsrc.me/embed/anime?malid=${malId}&episode=${ep}` },
            { id: 'vidsrc_to', name: 'NODE 2 (LEGACY)', getUrl: (name, ep, malId) => `https://vidsrc.to/embed/anime/${malId}/${ep}` },
            { id: 'vidsrc_pro', name: 'NODE 3 (PRO)', getUrl: (name, ep, malId) => `https://vidsrc.pro/embed/anime/${malId}/${ep}` },
            { id: 'vidsrc_cc', name: 'NODE 4 (ALT)', getUrl: (name, ep, malId) => `https://vidsrc.cc/v2/embed/anime/${malId}/${ep}` },
            { id: 'vidsrc_xyz', name: 'NODE 5 (FAST)', getUrl: (name, ep, malId) => `https://vidsrc.xyz/embed/anime/${malId}/${ep}` },
            { id: 'embed_su', name: 'NODE 6 (MIRROR)', getUrl: (name, ep, malId) => `https://embed.su/embed/anime/${malId}/${ep}` },
            { id: 'vidsrc_net', name: 'NODE 7 (EXTRA)', getUrl: (name, ep, malId) => `https://vidsrc.net/embed/anime/${malId}/${ep}` },
            { id: 'vidsrc_title', name: 'NODE 8 (TITLE SEARCH)', getUrl: (name, ep, malId) => `https://vidsrc.me/embed/anime?title=${encodeURIComponent(name)}&episode=${ep}` },
            { id: 'youtube', name: 'YOUTUBE (SEARCH)', getUrl: (name, ep, malId) => `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(name + ' episode ' + ep)}` }
        ];

        async function init(){
            const q = `query { Page(page: 1, perPage: 24) { media(status: RELEASING, type: ANIME, sort: TRENDING_DESC) { id idMal title { english romaji } coverImage { large } } } }`;
            try {
                const r = await fetch(ANILIST, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q}) });
                const d = await r.json();
                renderGrid(d.data.Page.media);
            } catch(e) {}
            renderServList();
        }

        function renderServList(){
            const list = document.getElementById('serv-list');
            list.innerHTML = SOURCES.map((s, idx) => `
                <button class="serv-btn ${curServ===s.id?'active':''}" onclick="setNode('${s.id}')">${s.name}</button>
            `).join('');
        }

        async function searchAnime(q){
            if(!q) return init();
            document.getElementById('grid').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:100px;">Searching...</div>';
            const query = `query ($q: String) { Page(page: 1, perPage: 24) { media(search: $q, type: ANIME) { id idMal title { english romaji } coverImage { large } } } }`;
            try {
                const r = await fetch(ANILIST, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query, variables:{q}}) });
                const d = await r.json();
                renderGrid(d.data.Page.media);
            } catch(e) {}
        }

        function renderGrid(data){
            const g = document.getElementById('grid');
            g.innerHTML = data.map(i => `
                <div class="card" onclick="openCinema(${i.idMal}, 1, ${i.id})">
                    <img src="${i.coverImage.large}" loading="lazy">
                    <div class="card-title">${i.title.english || i.title.romaji}</div>
                </div>
            `).join('');
        }

        async function openCinema(malId, ep, aniId){
            curMalId = malId; curAniId = aniId; curEp = ep;
            document.getElementById('hub-view').style.display = 'none';
            document.getElementById('cinema-view').style.display = 'block';
            window.scrollTo(0,0);

            const q = `query ($id: Int) { Media(id: $id) { title { english romaji } description episodes } }`;
            try {
                const r = await fetch(ANILIST, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q, variables:{id:aniId}}) });
                const d = await r.json();
                const a = d.data.Media;
                document.getElementById('m-title').innerText = a.title.english || a.title.romaji;
                document.getElementById('m-desc').innerHTML = a.description || 'Summary unavailable.';
                totalEps = a.episodes || 24;
                renderMatrix(totalEps);
            } catch(e) { renderMatrix(24); }
            loadTransmission();
        }

        function renderMatrix(count){
            const grid = document.getElementById('ep-grid');
            let html = '';
            for(let i=1; i<=count; i++) html += `<div class="ep-btn ${i===curEp?'active':''}" onclick="setEp(${i})">${i}</div>`;
            grid.innerHTML = html;
        }

        function loadTransmission(forceSourceId = null){
            const container = document.getElementById('player-container');
            document.getElementById('m-meta').innerText = `EPISODE ${curEp}`;
            
            if(forceSourceId){
                curServ = forceSourceId;
                attemptIndex = SOURCES.findIndex(s => s.id === forceSourceId);
            } else {
                attemptIndex = 0;
                curServ = SOURCES[attemptIndex].id;
            }
            
            trySource();
        }

        function trySource(){
            clearTimeout(fallbackTimer);
            if(attemptIndex >= SOURCES.length){
                document.getElementById('player-container').innerHTML = `
                    <div id="loader" style="background:#111;">
                        <i class="fas fa-exclamation-triangle" style="font-size:2rem;color:var(--primary);margin-bottom:15px;"></i>
                        <div style="text-align:center;color:#fff;">NO SOURCES AVAILABLE</div>
                        <div style="font-size:0.7rem;margin-top:10px;color:#666;">Try refreshing or another episode.</div>
                    </div>`;
                return;
            }

            const source = SOURCES[attemptIndex];
            const container = document.getElementById('player-container');
            const animeName = document.getElementById('m-title').innerText;
            const url = source.getUrl(animeName, curEp, curMalId);

            curServ = source.id;
            updateNodeUI();

            container.innerHTML = `
                <div id="loader">
                    <div class="spinner"></div>
                    <div style="font-size:0.7rem;letter-spacing:2px;color:var(--primary)">SEARCHING FOR AVAILABLE SOURCES...</div>
                    <div style="font-size:0.6rem;color:#666;margin-top:10px;">TRYING ${source.name}</div>
                </div>
                <iframe src="${url}" allowfullscreen onload="onPlayerLoad()"></iframe>
            `;

            fallbackTimer = setTimeout(() => {
                // If it's still loading (loader visible), try next
                const loader = document.getElementById('loader');
                if(loader && loader.style.display !== 'none'){
                    console.log(`Source ${source.name} timed out, trying next...`);
                    attemptIndex++;
                    trySource();
                }
            }, 10000); 
        }

        function onPlayerLoad(){
            clearTimeout(fallbackTimer);
            const loader = document.getElementById('loader');
            if(loader) loader.style.display = 'none';
        }

        function updateNodeUI(){
            const btns = document.querySelectorAll('.serv-btn');
            btns.forEach((btn, idx) => {
                if(idx === attemptIndex) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        function setNode(s){
            loadTransmission(s);
        }

        function setEp(e){
            curEp = e;
            document.querySelectorAll('.ep-btn').forEach((btn, idx) => {
                if(idx+1 === e) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            loadTransmission();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function closeCinema(){
            document.getElementById('cinema-view').style.display = 'none';
            document.getElementById('hub-view').style.display = 'block';
            document.getElementById('player-container').innerHTML = '';
            clearTimeout(fallbackTimer);
        }
        init();
    </script>
</body>
</html>
