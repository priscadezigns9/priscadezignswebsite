<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Olfactive Intelligence | Essence Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,700&family=Inter:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #C5A059; --bg: #0A0A0A; --text: #FFFFFF; --border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.8; overflow-x: hidden; }

        header { position: fixed; top: 0; width: 100%; padding: 25px 8%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; text-decoration: none; color: #fff; }
        
        .hero { min-height: 100vh; padding: 180px 8% 100px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 5px; color: var(--accent); font-weight: 900; margin-bottom: 30px; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 7vw, 6rem); font-style: italic; line-height: 1; margin-bottom: 60px; }

        .interface { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 60px; max-width: 900px; width: 100%; position: relative; }
        .interface::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
        
        .input-group { display: flex; gap: 20px; margin-top: 20px; }
        input { flex: 1; padding: 20px; background: transparent; border: 1px solid var(--border); color: #fff; font-family: inherit; font-size: 1.1rem; }
        .run-btn { padding: 0 40px; background: var(--accent); color: #000; border: none; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .run-btn:hover { background: #fff; }

        #ai-result { margin-top: 60px; }
        .olfactive-report { text-align: left; animation: fadeIn 1s ease; border-top: 1px solid var(--border); padding-top: 40px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .scent-profile { display: grid; grid-template-columns: 1.5fr 1fr; gap: 50px; margin-top: 30px; }
        .notes-list { list-style: none; margin-top: 20px; }
        .notes-list li { font-size: 0.9rem; color: #aaa; margin-bottom: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .notes-list li b { color: #fff; }

        .acquisition-box { background: rgba(197,160,89,0.05); border: 1px solid var(--accent); padding: 40px; margin-top: 40px; }
        .acq-btn { display: inline-block; width: 100%; text-align: center; background: var(--accent); color: #000; text-decoration: none; padding: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; margin-top: 20px; }

        footer { padding: 100px 8% 50px; text-align: center; border-top: 1px solid var(--border); opacity: 0.3; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; }
    </style>
</head>
<body>
    <header>
        <a href="../" class="logo">Essence Elite</a>
        <nav><a href="../shop/" style="color:#fff; text-decoration:none; font-weight:700; font-size:0.7rem; text-transform:uppercase; letter-spacing:1px;">The Collection</a></nav>
    </header>

    <main class="hero">
        <span class="label">Neural Olfactive Engine V2.1</span>
        <h1>Scent Synthesis.</h1>

        <div class="interface">
            <p style="color:#888; margin-bottom:40px; text-transform:uppercase; letter-spacing:3px; font-size:0.8rem;">Define a mood, environment, or aesthetic profile</p>
            <div class="input-group">
                <input type="text" id="ai-input" placeholder="e.g. Rainy evening in Kyoto, old library..." autocomplete="off">
                <button class="run-btn" onclick="synthesizeScent()">Calibrate</button>
            </div>
            <div id="ai-result"></div>
        </div>
    </main>

    <footer>© 2026 ESSENCE ELITE // ARCHIVAL FRAGRANCE INTELLIGENCE</footer>

    <script>
    function synthesizeScent() {
        const input = document.getElementById('ai-input').value.trim();
        const res = document.getElementById('ai-result');
        if(!input) return;

        res.innerHTML = '<p style="text-align:center; color:var(--accent); font-weight:900; letter-spacing:5px; margin-top:40px;">ANALYZING MOLECULAR STRUCTURE...</p>';

        setTimeout(() => {
            const query = input.toLowerCase(); const tag = "priscadezigns-20";
            let name = "Neural Synthesis No. 04"; let notes = ["Iso E Super", "Ambroxan", "White Musk"];
            
            if(query.includes('rain') || query.includes('water')) { name = "Petrichor Intelligence"; notes = ["Geosmin", "Wet Stone", "Ozone", "Silver Fir"]; }
            if(query.includes('old') || query.includes('book') || query.includes('library')) { name = "Archival Paper"; notes = ["Cellulose", "Vanillin", "Ancient Oak", "Dusty Leather"]; }
            if(query.includes('night') || query.includes('dark')) { name = "Noir Execution"; notes = ["Black Agarwood", "Smoked Vetiver", "Castoreum", "Ink"]; }

            res.innerHTML = `
                <div class="olfactive-report">
                    <span class="label" style="font-size:0.6rem;">Calibration Complete // Signature ID: ${Math.floor(Math.random()*9999)}</span>
                    <h2 style="font-family:'Cormorant Garamond'; font-size:2.5rem; font-style:italic; margin:10px 0 30px;">${name}</h2>
                    
                    <div class="scent-profile">
                        <div>
                            <p style="color:#888; font-size:0.9rem;">Intelligence verdict suggests a profile centered on high-fidelity molecular synthesis to match the "${input}" aesthetic.</p>
                            <ul class="notes-list">
                                ${notes.map(n => `<li><span>${n}</span><b>Active</b></li>`).join('')}
                            </ul>
                        </div>
                        <div class="acquisition-box">
                            <span style="font-size:0.6rem; font-weight:900; text-transform:uppercase; letter-spacing:2px; color:var(--accent);">Empire Recommendation</span>
                            <p style="font-size:0.8rem; margin-top:10px; color:#fff;">Acquire the foundational components or similar archival silhouettes via the sovereign storefront.</p>
                            <a href="https://www.amazon.com/s?k=${encodeURIComponent(name)}+fragrance&tag=${tag}" target="_blank" class="acq-btn">Acquire Silhouette →</a>
                        </div>
                    </div>
                </div>
            `;
        }, 2000);
    }
    </script>
</body>
</html>
