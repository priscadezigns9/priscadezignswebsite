<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Scent Archive | Essence Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --bg: #0A0A0A; --text: #FFFFFF; --border: rgba(255,255,255,0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; letter-spacing: 0.02em; }
        nav { padding: 40px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo-group { display: flex; align-items: center; gap: 15px; text-decoration: none; color: #fff; }
        .logo-mark { width: 40px; height: 40px; background: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-weight: 700; color: #000; font-size: 1.4rem; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
        .container { max-width: 1200px; margin: 0 auto; padding: 100px 5%; }
        h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 70px; text-align: center; text-transform: uppercase; font-weight: 400; font-style: italic; letter-spacing: 4px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 60px; }
        .card { background: #000; border: 1px solid var(--border); padding: 40px 30px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); text-decoration: none; color: inherit; text-align: center; }
        .card:hover { border-color: var(--gold); background: #050505; }
        .img-box { aspect-ratio: 1/1.2; background: #fff; margin-bottom: 35px; display: flex; align-items: center; justify-content: center; padding: 40px; border-radius: 0; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; mix-blend-mode: multiply; filter: grayscale(20%); transition: 0.5s; }
        .card:hover .img-box img { filter: grayscale(0%); transform: scale(1.05); }
        .item-brand { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 5px; color: var(--gold); margin-bottom: 15px; font-weight: 700; }
        .item-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 15px; font-weight: 400; }
        .item-price { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; color: var(--gold); margin-bottom: 30px; }
        .btn { display: inline-block; width: 100%; text-align: center; border-bottom: 1px solid var(--gold); color: var(--gold); padding-bottom: 10px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; transition: 0.3s; }
        .card:hover .btn { letter-spacing: 5px; }
    </style>
</head>
<body>
    <nav>
        <a href="../" class="logo-group">
            <div class="logo-mark">E</div>
            <span class="logo-text">ESSENCE ELITE</span>
        </a>
    </nav>
    <div class="container">
        <h1>SCENT ARCHIVE</h1>
        <div class="grid">
            <a href="https://www.amazon.com/dp/B00336S0A2?tag=priscadezigns-20" class="card" target="_blank">
                <div class="item-brand">Creed</div>
                <div class="img-box"><img src="https://m.media-amazon.com/images/I/61Aocnk7QBL._AC_SL1500_.jpg" alt="Aventus"></div>
                <div class="item-title">Aventus Eau De Parfum</div>
                <div class="item-price">$495.00</div>
                <div class="btn">Acquire Curation</div>
            </a>
            <a href="https://www.amazon.com/dp/B00V3E7C64?tag=priscadezigns-20" class="card" target="_blank">
                <div class="item-brand">Tom Ford</div>
                <div class="img-box"><img src="https://m.media-amazon.com/images/I/61PQSiTkywL._AC_SL1500_.jpg" alt="Oud Wood"></div>
                <div class="item-title">Private Blend Oud Wood</div>
                <div class="item-price">$295.00</div>
                <div class="btn">Acquire Curation</div>
            </a>
            <a href="https://www.amazon.com/dp/B00XPX6S16?tag=priscadezigns-20" class="card" target="_blank">
                <div class="item-brand">Maison Margiela</div>
                <div class="img-box"><img src="https://m.media-amazon.com/images/I/71RoxAM5DVL._AC_SL1500_.jpg" alt="Jazz Club"></div>
                <div class="item-title">REPLICA Jazz Club</div>
                <div class="item-price">$160.00</div>
                <div class="btn">Acquire Curation</div>
            </a>
        </div>
    </div>
</body>
</html>
