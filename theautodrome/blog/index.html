<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Autodrome Editorial — 2026 Velocity Intelligence</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap">
    <style>
        :root { --accent: #ffffff; --bg: #000000; --surface: #0a0a0a; --text: #ffffff; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.6; }
        .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 80px 6%; text-align: center; }
        .header h1 { font-size: 3.5rem; letter-spacing: 4px; margin: 0; text-transform: uppercase; font-weight: 700; }
        .header p { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: #666; margin-top: 10px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 80px 6%; }
        .editorial-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 60px; }
        .article-card { transition: transform 0.2s; border-bottom: 1px solid var(--border); padding-bottom: 40px; }
        .article-card:hover { transform: translateY(-5px); }
        .article-tag { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #fff; text-transform: uppercase; margin-bottom: 16px; display: block; border-left: 2px solid #fff; padding-left: 10px; }
        .article-title { font-size: 1.8rem; line-height: 1.2; margin-bottom: 20px; text-decoration: none; color: var(--text); display: block; font-weight: 700; }
        .article-excerpt { font-size: 0.95rem; color: rgba(255,255,255,0.6); margin-bottom: 24px; }
        footer { padding: 80px 6%; text-align: center; font-size: 0.75rem; color: rgba(255,255,255,0.3); border-top: 1px solid var(--border); }
    </style>
</head>
<body>
<header class="header"><h1>THE AUTODROME</h1><p>// VELOCITY INTELLIGENCE _ LOG 2026.06.05</p></header>
<div class="container">
    <div class="editorial-grid">
        <article class="article-card">
            <span class="article-tag">Performance / EV</span>
            <a href="byd-nebula-2026.html" class="article-title">BYD Kosmera Nebula: The 1,876 HP Electric Predator</a>
            <p class="article-excerpt"> BYD disrupts the hypercar status quo with a 1.7s predator designed for the track.</p>
        </article>
    </div>
</div>
<footer><div style="font-weight:700;">PRISCA DEZIGNS EMPIRE</div></footer>
</body>
</html>
