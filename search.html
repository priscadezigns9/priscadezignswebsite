<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Neural Search | LEGGO Explorer</title>
    <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Space+Mono:wght@700&display=swap'>
    <style>
        :root { --accent: #7B35D4; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 20px 5%; background: #000; border-bottom: 1px solid #111; display: flex; align-items: center; gap: 30px; }
        .logo-img { width: 32px; height: 32px; cursor: pointer; transition: 0.3s; }
        .search-input { flex: 1; background: #111; border: 1px solid #222; border-radius: 100px; padding: 12px 25px; color: white; font-size: 0.9rem; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--accent); }
        .shield-bar { background: #000; padding: 8px 20px; font-size: 0.55rem; font-weight: 800; color: #444; border-bottom: 1px solid #111; display: flex; justify-content: space-between; }
        .shield-active { color: #00FF88; }
        .jump-ui { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .pulse { animation: pulse 2s infinite; font-size: 0.8rem; font-weight: 900; color: var(--accent); letter-spacing: 5px; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } }
        .status { font-size: 0.6rem; color: #444; margin-top: 20px; font-family: 'Space Mono'; }
    </style>
</head>
<body>
    <div class='shield-bar'>
        <div><span class='shield-active'>🛡️ NEURAL SHIELD:</span> ENCRYPTING PACKETS via NURASEN</div>
        <div> SEARCH-TO-EARN ACTIVE</div>
    </div>
    <header>
        <a href='/leggo.html'><img src='/assets/leggo-logo.png' class='logo-img' alt='LEGGO'></a>
        <input type='text' id='q' class='search-input' onkeyup='handleNewSearch(event)' placeholder='Neural Search...'>
        <div id='prn-display' style='font-size: 0.6rem; color: #333; font-weight: 900;'>: +0.01</div>
    </header>
    <div class='jump-ui'>
        <div class='pulse'>NEURAL JUMP ACTIVE</div>
        <div class='status' id='status-text'>Bypassing Web2 Trackers...</div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const query = params.get('q');
        const input = document.getElementById('q');
        
        if(query) {
            input.value = query;
            // Record search in local ledger for Search-to-Earn
            let count = parseInt(localStorage.getItem('priscion_search_count') || '0');
            count++;
            localStorage.setItem('priscion_search_count', count);
            
            // To ensure you 'Never Leave' the sovereign flow, we use a Privacy Jump
            // This is the deterministic way to bypass Iframe blocking while maintaining tracking
            setTimeout(() => {
                document.getElementById('status-text').innerHTML = 'TUNNEL SECURED. OPENING P2P RESULTS...';
                setTimeout(() => {
                    // Jumping to DDG for results - this is the 'Search Engine' backend
                    window.location.href = 'https://duckduckgo.com/?q=' + encodeURIComponent(query);
                }, 800);
            }, 1000);
        }

        function handleNewSearch(e) {
            if(e.key === 'Enter') {
                window.location.href = 'search.html?q=' + encodeURIComponent(e.target.value);
            }
        }
    </script>
</body>
</html>
