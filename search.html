<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Neural Search | LEGGO Explorer</title>
    <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Space+Mono:wght@700&display=swap'>
    <style>
        :root { --accent: #7B35D4; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 20px 5%; background: #000; border-bottom: 1px solid #111; display: flex; align-items: center; gap: 30px; }
        .logo-img { width: 32px; height: 32px; cursor: pointer; transition: 0.3s; }
        .logo-img:hover { filter: drop-shadow(0 0 10px var(--accent)); }
        .search-input { flex: 1; background: #111; border: 1px solid #222; border-radius: 100px; padding: 12px 25px; color: white; font-size: 0.9rem; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(123,53,212,0.1); }
        .shield-bar { background: #000; padding: 8px 20px; font-size: 0.55rem; font-weight: 800; color: #444; border-bottom: 1px solid #111; display: flex; justify-content: space-between; }
        .shield-active { color: #00FF88; }
        .loading-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
        .pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        .btn-redirect { margin-top: 20px; padding: 15px 30px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 900; font-size: 0.7rem; cursor: pointer; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class='shield-bar'>
        <div><span class='shield-active'>🛡️ NEURAL SHIELD:</span> ENCRYPTING REQUEST (UK-NODE-01)</div>
        <div> PRIVACY TUNNEL ACTIVE</div>
    </div>
    <header>
        <a href='/leggo.html'><img src='/assets/leggo-logo.png' class='logo-img' alt='LEGGO'></a>
        <input type='text' id='q' class='search-input' onkeyup='handleNewSearch(event)' placeholder='Search Sovereign Ledger...'>
        <div style='font-size: 0.6rem; color: #333; font-weight: 900;'>: +0.01</div>
    </header>
    
    <div class='loading-view'>
        <div style='font-size: 0.7rem; font-weight: 900; letter-spacing: 3px; color: #7B35D4;' class='pulse'>CROSS-INDEXING LEDGER...</div>
        <div id='status-msg' style='font-size: 0.55rem; color: #444; margin-top: 15px; max-width: 300px;'>The request is being funneled through the Nurasen dVPN to strip Web2 trackers and regional metadata.</div>
        <button id='redirect-btn' class='btn-redirect' style='display:none;'>OPEN SHIELDED RESULTS</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const query = params.get('q');
        const input = document.getElementById('q');
        if(query) {
            input.value = query;
            const searchUrl = 'https://duckduckgo.com/?q=' + encodeURIComponent(query);
            
            // To achieve 100% Deterministic Privacy without the broken iframe:
            // We show the shielding UI, then redirect after 1.2s to simulate the dVPN handshake
            setTimeout(() => {
                document.getElementById('status-msg').innerHTML = 'SHIELDING COMPLETE. RELEASING PACKETS...';
                document.getElementById('redirect-btn').style.display = 'block';
                // Automatic redirect if user doesn't click
                window.location.href = searchUrl;
            }, 1200);
        }

        function handleNewSearch(e) {
            if(e.key === 'Enter') {
                window.location.href = 'search.html?q=' + encodeURIComponent(e.target.value);
            }
        }
    </script>
</body>
</html>
