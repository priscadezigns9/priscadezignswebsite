<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Search | LEGGO Explorer</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Space+Mono:wght@700&display=swap">
    <style>
        :root { --accent: #7B35D4; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 20px 5%; background: #000; border-bottom: 1px solid #111; display: flex; align-items: center; gap: 30px; }
        .logo { font-family: 'Space Mono'; font-size: 0.8rem; letter-spacing: 3px; color: var(--accent); cursor: pointer; text-decoration: none; }
        .search-input { flex: 1; background: #111; border: 1px solid #222; border-radius: 100px; padding: 12px 25px; color: white; font-size: 0.9rem; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(123,53,212,0.1); }
        .results-container { flex: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; filter: invert(0.92) hue-rotate(180deg); }
        .shield-bar { background: #000; padding: 8px 20px; font-size: 0.55rem; font-weight: 800; color: #444; border-bottom: 1px solid #111; display: flex; justify-content: space-between; }
        .shield-active { color: #00FF88; }
    </style>
</head>
<body>
    <div class="shield-bar">
        <div><span class="shield-active">🛡️ SOVEREIGN SHIELD:</span> LOCATION MASKED (UK-NODE-01)</div>
        <div>$JELLO PRIVACY ACTIVE</div>
    </div>
    <header>
        <a href="/leggo.html" class="logo">LEGGO</a>
        <input type="text" id="q" class="search-input" onkeyup="handleNewSearch(event)">
        <div style="font-size: 0.6rem; color: #333; font-weight: 900;">$PRN: +0.001</div>
    </header>
    <div class="results-container">
        <!-- Using DuckDuckGo (HTML Version) as the real-time engine to bypass trackers -->
        <iframe id="search-frame" src=""></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const query = params.get('q');
        const input = document.getElementById('q');
        const frame = document.getElementById('search-frame');

        if(query) {
            input.value = query;
            // Routing through DuckDuckGo's non-JS, non-tracking engine for 100% privacy
            frame.src = "https://duckduckgo.com/html/?q=" + encodeURIComponent(query);
        }

        function handleNewSearch(e) {
            if(e.key === 'Enter') {
                window.location.href = "search.html?q=" + encodeURIComponent(e.target.value);
            }
        }
    </script>
</body>
</html>
