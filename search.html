<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Neural Search | LEGGO Explorer</title>
    <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Space+Mono:wght@700&display=swap'>
    <style>
        :root { --accent: #7B35D4; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px 5%; background: #000; border-bottom: 1px solid #111; display: flex; align-items: center; gap: 20px; z-index: 100; }
        .logo-img { width: 28px; height: 28px; cursor: pointer; }
        .search-input { flex: 1; background: #111; border: 1px solid #222; border-radius: 100px; padding: 10px 20px; color: white; font-size: 0.85rem; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--accent); }
        .shield-bar { background: #000; padding: 6px 20px; font-size: 0.5rem; font-weight: 800; color: #444; border-bottom: 1px solid #111; display: flex; justify-content: space-between; }
        .shield-active { color: #00FF88; }
        .results-view { flex: 1; position: relative; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
        .overlay-shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .pulse { animation: pulse 2s infinite; font-size: 0.7rem; font-weight: 900; color: var(--accent); letter-spacing: 5px; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class='shield-bar'>
        <div><span class='shield-active'>🛡️ NEURAL SHIELD:</span> ENCRYPTING P2P TUNNEL</div>
        <div> SEARCH-TO-EARN ACTIVE</div>
    </div>
    <header>
        <a href='/leggo.html'><img src='/assets/leggo-logo.png' class='logo-img' alt='LEGGO'></a>
        <input type='text' id='q' class='search-input' onkeyup='handleNewSearch(event)' placeholder='Search Sovereign Ledger...'>
        <div style='font-size: 0.55rem; color: #333; font-weight: 900;'>: +0.01</div>
    </header>
    <div class='results-view'>
        <div id='shield-overlay' class='overlay-shield'>
            <div class='pulse'>ESTABLISHING SOVEREIGN HANDSHAKE...</div>
            <div style='font-size: 0.5rem; color: #444; margin-top: 15px;'>Bypassing Web2 Trackers via Nurasen dVPN</div>
        </div>
        <!-- Using Google with igu=1 to bypass some iframe blocks and maintain 'Never Leave' mandate -->
        <iframe id='search-frame' src=''></iframe>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const query = params.get('q');
        const input = document.getElementById('q');
        const frame = document.getElementById('search-frame');
        const overlay = document.getElementById('shield-overlay');

        if(query) {
            input.value = query;
            // Never Leave: Load results in Iframe
            // Note: Some queries might still block, but igu=1 is the best sovereign bridge for now
            frame.src = 'https://www.google.com/search?q=' + encodeURIComponent(query) + '&igu=1';
            
            // Record rewards
            let count = parseInt(localStorage.getItem('priscion_search_count') || '0');
            localStorage.setItem('priscion_search_count', count + 1);

            // Hide shield after handshake
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 1500);
        } else {
            overlay.innerHTML = '<div style="font-size:0.7rem; color:#222; font-weight:900;">AWAITING NEURAL COMMAND...</div>';
        }

        function handleNewSearch(e) {
            if(e.key === 'Enter') {
                window.location.href = 'search.html?q=' + encodeURIComponent(e.target.value);
            }
        }
    </script>
</body>
</html>
