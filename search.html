<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Neural Search | Sovereign Ledger</title>
    <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Space+Mono:wght@700&display=swap'>
    <style>
        :root { --accent: #7B35D4; --bg: #050505; --card: #0A0A0A; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { padding: 20px 5%; background: #000; border-bottom: 1px solid #111; display: flex; align-items: center; gap: 30px; position: sticky; top: 0; z-index: 100; }
        .logo-img { width: 32px; height: 32px; cursor: pointer; }
        .search-input { flex: 1; background: #111; border: 1px solid #222; border-radius: 100px; padding: 12px 25px; color: white; font-size: 0.95rem; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(123,53,212,0.1); }
        .results-container { padding: 40px 5%; flex: 1; max-width: 1000px; margin: 0 auto; width: 90%; }
        .result-card { background: var(--card); border: 1px solid #111; border-radius: 15px; padding: 25px; margin-bottom: 20px; transition: 0.3s; display: block; text-decoration: none; color: white; }
        .result-card:hover { border-color: var(--accent); background: #0D0D0D; transform: translateY(-3px); }
        .res-category { font-family: 'Space Mono'; font-size: 0.55rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .res-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 8px; }
        .res-desc { font-size: 0.8rem; color: #666; line-height: 1.5; }
        .ledger-tag { display: inline-block; padding: 4px 10px; border-radius: 4px; background: rgba(0,255,136,0.05); color: #00FF88; font-size: 0.5rem; font-weight: 900; margin-top: 15px; border: 1px solid rgba(0,255,136,0.1); }
        .empty-state { text-align: center; padding: 100px 20px; color: #333; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        .shield-bar { background: #000; padding: 8px 20px; font-size: 0.55rem; font-weight: 800; color: #444; border-bottom: 1px solid #111; display: flex; justify-content: space-between; }
        .shield-active { color: #00FF88; }
        .web-fallback { margin-top: 40px; padding: 30px; border: 1px dashed #222; border-radius: 15px; text-align: center; }
        .btn-web { background: transparent; border: 1px solid #444; color: #888; padding: 10px 20px; border-radius: 100px; font-size: 0.6rem; font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn-web:hover { border-color: var(--accent); color: white; }
    </style>
</head>
<body>
    <div class='shield-bar'>
        <div><span class='shield-active'>🛡️ NEURAL SHIELD:</span> INDEXING SOVEREIGN LEDGER...</div>
        <div>$PRN: +0.01 EARNED</div>
    </div>
    <header>
        <a href='/leggo.html'><img src='/assets/leggo-logo.png' class='logo-img' alt='LEGGO'></a>
        <input type='text' id='q' class='search-input' onkeyup='handleNewSearch(event)' placeholder='Neural Command...'>
    </header>
    
    <div class='results-container' id='results'>
        <div class='empty-state pulse'>REACHING LEDGER NODES...</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const query = (params.get('q') || '').toLowerCase();
        const input = document.getElementById('q');
        const resultsDiv = document.getElementById('results');

        if(query) {
            input.value = query;
            performSearch(query);
        } else {
            resultsDiv.innerHTML = '<div class="empty-state">AWAITING INPUT...</div>';
        }

        async function performSearch(q) {
            try {
                const resp = await fetch('/vault_manifest.json');
                const manifest = await resp.json();
                
                const brands = [
                    { name: 'Dreaming Anime', id: 'dreaminganime', desc: 'Sovereign Cinema, Mimi Theater, and Manga Vault.' },
                    { name: 'Atelia Gaming', id: 'ateliagaming', desc: 'High-fidelity PC gaming and hardware engineering.' },
                    { name: 'Nurasen', id: 'nurasen', desc: 'Neural cybersecurity and digital defense protocols.' },
                    { name: 'Couture Gallery', id: 'couturegallery', desc: 'High-end fashion signals and archival aesthetics.' },
                    { name: 'Verdant Co', id: 'verdantco', desc: 'Sustainability and circular economy infrastructure.' },
                    { name: 'The Way Made Known', id: 'thewaymadeknown', desc: 'Analytical faith and Gospel mission backbone.' },
                    { name: 'Deskwell', id: 'deskwell', desc: 'Ergonomic workspace engineering and productivity.' },
                    { name: 'The Gen Play', id: 'thegenplay', desc: 'High-fidelity toys and collectibles laboratory.' },
                    { name: 'D Panyard', id: 'dpanyard', desc: 'Caribbean cultural hub and business platform.' },
                    { name: 'Riddiim', id: 'riddiim', desc: 'Music super-app and audio engineering.' }
                ];

                const filteredManifest = manifest.filter(item => 
                    item.name.toLowerCase().includes(q) || 
                    item.category.toLowerCase().includes(q)
                );

                const filteredBrands = brands.filter(brand => 
                    brand.name.toLowerCase().includes(q) || 
                    brand.desc.toLowerCase().includes(q)
                );

                renderResults(filteredBrands, filteredManifest, q);
            } catch (err) {
                resultsDiv.innerHTML = '<div class="empty-state">LEDGER OFFLINE. TRYING WEB JUMP...</div>';
                setTimeout(() => openWebJump(q), 2000);
            }
        }

        function renderResults(brands, items, q) {
            if(brands.length === 0 && items.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="empty-state">NO SOVEREIGN MATCHES FOUND FOR "${q}"</div>
                    <div class="web-fallback">
                        <div style="font-size:0.7rem; color:#444;">Broaden search to global Web2 nodes?</div>
                        <button class="btn-web" onclick="openWebJump('${q}')">INITIATE WEB JUMP</button>
                    </div>
                `;
                return;
            }

            let html = '';
            brands.forEach(b => {
                html += `
                    <a href="/${b.id}/" class="result-card">
                        <div class="res-category">Empire Node / ${b.id}.prn</div>
                        <div class="res-title">${b.name}</div>
                        <div class="res-desc">${b.desc}</div>
                        <div class="ledger-tag">ACTIVE NODE</div>
                    </a>
                `;
            });

            items.forEach(i => {
                html += `
                    <a href="${i.url}" class="result-card">
                        <div class="res-category">Ledger Asset / ${i.category}</div>
                        <div class="res-title">${i.name}</div>
                        <div class="res-desc">Deterministic ID: ${i.id}</div>
                        <div class="ledger-tag">${i.ledger_status}</div>
                    </a>
                `;
            });

            resultsDiv.innerHTML = html;
        }

        function openWebJump(q) {
            window.location.href = 'https://duckduckgo.com/?q=' + encodeURIComponent(q);
        }

        function handleNewSearch(e) {
            if(e.key === 'Enter') {
                window.location.href = 'search.html?q=' + encodeURIComponent(e.target.value);
            }
        }
    </script>
</body>
</html>
