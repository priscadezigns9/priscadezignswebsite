<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Boutique | The Escapist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #E63946; --bg: #FFFFFF; --text: #1A1A1A; --border: rgba(128,128,128,0.15); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        nav { height: 90px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 6%; background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Inter', serif; font-size: 1.6rem; color: var(--primary); text-decoration: none; font-weight: 700; letter-spacing: 1px; }
        .shop-header { padding: 120px 6% 60px; text-align: center; }
        h1 { font-family: 'Inter', serif; font-size: 4rem; margin: 0; letter-spacing: -1px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; padding: 60px 6%; }
        .card { background: rgba(128,128,128,0.05); border: 1px solid var(--border); padding: 30px; text-decoration: none; color: inherit; transition: 0.4s; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--primary); transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .img-box { aspect-ratio: 1/1; background: #fff; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; padding: 15px; border-radius: 2px; }
        .img-box img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .name { font-family: 'Inter', serif; font-size: 1.6rem; margin: 0 0 20px; flex-grow: 1; }
        .btn { background: var(--primary); color: #fff; text-align: center; padding: 15px; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }
        footer { padding: 80px 6%; border-top: 1px solid var(--border); text-align: center; font-size: 0.75rem; opacity: 0.4; }
    </style>
</head>
<body>
    <nav><a href="../" class="logo">The Escapist</a></nav>
    <div class="shop-header"><h1>The Boutique</h1></div>
    <main class="grid">
        <a href="https://www.amazon.com/s?k=Samsonite+Freeform+Hardside&tag=priscadezigns-20" class="card" target="_blank">
            <div class="img-box"><img src="https://m.media-amazon.com/images/I/71RT7klbBkL._AC_SL1000_.jpg" alt="Samsonite Freeform Hardside"></div>
            <div style="font-size:0.65rem; color:var(--primary); font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-bottom:12px;">Luggage</div>
            <h3 class="name">Samsonite Freeform Hardside</h3>
            <div class="btn">Acquire Essential</div>
        </a>
        <a href="https://www.amazon.com/s?k=Away+The+Carry-On&tag=priscadezigns-20" class="card" target="_blank">
            <div class="img-box"><img src="https://m.media-amazon.com/images/I/81hXpZ8v4zL._AC_SL1000_.jpg" alt="Away The Carry-On"></div>
            <div style="font-size:0.65rem; color:var(--primary); font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-bottom:12px;">Luggage</div>
            <h3 class="name">Away The Carry-On</h3>
            <div class="btn">Acquire Essential</div>
        </a>
        <a href="https://www.amazon.com/s?k=Sony+WH-1000XM5+Headphones&tag=priscadezigns-20" class="card" target="_blank">
            <div class="img-box"><img src="https://m.media-amazon.com/images/I/61MC8BK0w0L._AC_SL1000_.jpg" alt="Sony WH-1000XM5 Headphones"></div>
            <div style="font-size:0.65rem; color:var(--primary); font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-bottom:12px;">Travel Tech</div>
            <h3 class="name">Sony WH-1000XM5 Headphones</h3>
            <div class="btn">Acquire Essential</div>
        </a>
        <a href="https://www.amazon.com/s?k=Anker+737+Power+Bank&tag=priscadezigns-20" class="card" target="_blank">
            <div class="img-box"><img src="https://m.media-amazon.com/images/I/81-8S8hVXL._AC_SL1000_.jpg" alt="Anker 737 Power Bank"></div>
            <div style="font-size:0.65rem; color:var(--primary); font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-bottom:12px;">Travel Tech</div>
            <h3 class="name">Anker 737 Power Bank</h3>
            <div class="btn">Acquire Essential</div>
        </a>
    </main>
    <footer>&copy; 2026 THE ESCAPIST // PRISCA DEZIGNS</footer>
</body>
</html>
