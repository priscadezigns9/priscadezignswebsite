<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Sanctuary Scout | The Escapist</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2DD4BF; --bg: #fff; --text: #1A1A1A; --border: #eee; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.8; }

        header { position: fixed; top: 0; width: 100%; padding: 25px 8%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; text-decoration: none; color: #000; font-style: italic; }
        
        .hero { min-height: 100vh; padding: 180px 8% 100px; max-width: 1100px; margin: 0 auto; text-align: center; }
        .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 5px; color: #888; font-weight: 900; margin-bottom: 20px; display: block; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 7vw, 5rem); font-style: italic; line-height: 1; margin-bottom: 60px; }

        .scout-box { background: #fafafa; border: 1px solid var(--border); padding: 60px; border-radius: 2px; }
        .input-group { display: flex; gap: 20px; margin-top: 20px; }
        input { flex: 1; padding: 20px; border: 1px solid var(--border); font-family: inherit; font-size: 1.1rem; }
        .run-btn { padding: 0 40px; background: #000; color: #fff; border: none; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }

        #ai-result { margin-top: 60px; }
        .sanctuary-report { text-align: left; animation: fadeIn 1s ease; border-top: 2px solid #000; padding-top: 50px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .destination-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 50px; margin-top: 30px; }
        .feat-list { list-style: none; margin-top: 20px; }
        .feat-list li { font-size: 0.9rem; color: #666; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; display: flex; justify-content: space-between; }
        .feat-list li b { color: #000; }

        .acq-box { background: rgba(45,212,191,0.05); border: 1px solid var(--accent); padding: 40px; }
        .acq-btn { display: inline-block; width: 100%; text-align: center; background: #000; color: #fff; text-decoration: none; padding: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; margin-top: 20px; }

        footer { padding: 100px 8% 50px; text-align: center; border-top: 1px solid var(--border); opacity: 0.3; }
    </style>
</head>
<body>
    <header>
        <a href="../" class="logo">The Escapist</a>
        <nav><a href="../" style="color:#000; text-decoration:none; font-weight:700; font-size:0.7rem; text-transform:uppercase; letter-spacing:1px;">Journal</a></nav>
    </header>

    <main class="hero">
        <span class="label">Neural Sanctuary Scout V1.0</span>
        <h1>Destination Intelligence.</h1>

        <div class="scout-box">
            <p style="color:#888; margin-bottom:40px; text-transform:uppercase; letter-spacing:3px; font-size:0.8rem;">Define your Sanctuary aesthetic or desired isolation level</p>
            <div class="input-group">
                <input type="text" id="ai-input" placeholder="e.g. Minimalist concrete villa in Swiss Alps, Brutalist desert..." autocomplete="off">
                <button class="run-btn" onclick="runScout()">Analyze</button>
            </div>
            <div id="ai-result"></div>
        </div>
    </main>

    <footer>© 2026 THE ESCAPIST // ARCHIVAL TRAVEL INTELLIGENCE</footer>

    <script>
    function runScout() {
        const input = document.getElementById('ai-input').value.trim();
        const res = document.getElementById('ai-result');
        if(!input) return;

        res.innerHTML = '<p style="text-align:center; font-weight:700; letter-spacing:4px; margin-top:40px;">SIMULATING ISOLATION PARAMETERS...</p>';

        setTimeout(() => {
            const query = input.toLowerCase(); const tag = "priscadezigns-20";
            let destination = "Universal Sanctuary"; let score = "94/100";
            
            if(query.includes('alp') || query.includes('mountain')) { destination = "Engadin Elevation"; score = "98/100"; }
            if(query.includes('desert') || query.includes('brutalist')) { destination = "Amangiri Archival"; score = "97/100"; }

            res.innerHTML = `
                <div class="sanctuary-report">
                    <span class="label" style="font-size:0.6rem;">Scan Complete // Intelligence Verdict: High-Fidelity Sanctuary</span>
                    <h2 style="font-family:'Cormorant Garamond'; font-size:2.5rem; font-style:italic; margin:10px 0 40px;">${destination}</h2>
                    
                    <div class="destination-grid">
                        <div>
                            <p style="color:#666; font-size:0.95rem;">Intelligence confirms this location as a premier node for high-fidelity escapism. Aesthetic resonance matches your input with a ${score} precision rating.</p>
                            <ul class="feat-list">
                                <li>Isolation Level<b>Absolute</b></li>
                                <li>Architectural Integrity<b>Elite</b></li>
                                <li>Neural Reset Potential<b>Optimal</b></li>
                            </ul>
                        </div>
                        <div class="acq-box">
                            <span style="font-size:0.65rem; font-weight:900; text-transform:uppercase; letter-spacing:2px; color:var(--accent);">Empire Travel Gear</span>
                            <p style="font-size:0.8rem; margin-top:10px; color:#333;">Prepare for sanctuary with archival luggage and high-fidelity travel essentials.</p>
                            <a href="https://www.amazon.com/s?k=luxury+travel+essentials&tag=${tag}" target="_blank" class="acq-btn">Acquire Essentials →</a>
                        </div>
                    </div>
                </div>
            `;
        }, 1800);
    }
    </script>
</body>
</html>
