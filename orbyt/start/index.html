<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Start Your App — Orbyt</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#03030A;color:#EEEAF8;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:60px 24px 80px}
a{text-decoration:none;color:inherit}
:root{--neon:#7B61FF;--neon2:#A78BFF;--dim:#4A4560;--border:rgba(123,97,255,0.15);--surface:#07060F}

.top{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:540px;margin-bottom:48px}
.nav-logo{font-family:'DM Mono',monospace;font-size:1rem;font-weight:500;color:var(--neon);letter-spacing:1px}
.back{font-size:0.8rem;color:var(--dim);transition:color 0.2s}
.back:hover{color:#EEEAF8}

.card{width:100%;max-width:540px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:44px 40px}
.card-eyebrow{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--neon);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.card-eyebrow::before{content:'';width:20px;height:1px;background:var(--neon)}
.card h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-1px;margin-bottom:8px;line-height:1.1}
.card h1 span{color:var(--neon)}
.card p.sub{color:var(--dim);font-size:0.88rem;margin-bottom:36px;line-height:1.65}

.field{margin-bottom:20px}
label{display:block;font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:7px}
input,textarea,select{width:100%;background:#0A0918;border:1px solid var(--border);border-radius:6px;padding:12px 14px;color:#EEEAF8;font-family:'Inter',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--neon)}
textarea{resize:vertical;min-height:100px;line-height:1.6}
select option{background:#07060F}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.divider{height:1px;background:var(--border);margin:28px 0}

.submit{width:100%;background:var(--neon);color:#03030A;border:none;padding:16px;border-radius:6px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all 0.2s;margin-top:8px}
.submit:hover{background:var(--neon2);transform:translateY(-1px)}
.note{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--dim);text-align:center;margin-top:14px;line-height:1.6}
</style>
</head>
<body>

<div class="top">
  <div class="nav-logo">orbyt_</div>
  <a class="back" href="/orbyt/">← Back</a>
</div>

<div class="card">
  <div class="card-eyebrow">App Project Brief</div>
  <h1>Build something<br/><span>great.</span></h1>
  <p class="sub">Tell us about your idea — we'll send you a free scope + estimate within 24 hours. No commitment.</p>

  <div class="row">
    <div class="field"><label>Name *</label><input type="text" placeholder="Full name"/></div>
    <div class="field"><label>WhatsApp *</label><input type="tel" placeholder="+1 868 000 0000"/></div>
  </div>
  <div class="field"><label>Email *</label><input type="email" placeholder="you@example.com"/></div>
  <div class="field">
    <label>What are you building? *</label>
    <select>
      <option value="">Select type...</option>
      <option>Mobile App (iOS + Android)</option>
      <option>Web Application / SaaS</option>
      <option>E-Commerce Platform</option>
      <option>AI-powered Product</option>
      <option>Dashboard / Admin Panel</option>
      <option>API / Backend only</option>
      <option>Not sure yet</option>
    </select>
  </div>
  <div class="field">
    <label>Budget Range</label>
    <select>
      <option value="">Select range...</option>
      <option>Under $2,000</option>
      <option>$2,000 – $5,000</option>
      <option>$5,000 – $15,000</option>
      <option>$15,000+</option>
      <option>Not sure yet</option>
    </select>
  </div>
  <div class="field"><label>Describe your idea *</label><textarea placeholder="What does your app do? Who is it for? What problem does it solve? Include any features, platforms, or integrations you need."></textarea></div>
  <div class="field"><label>Timeline</label><select><option value="">Select...</option><option>ASAP</option><option>1–3 months</option><option>3–6 months</option><option>Flexible</option></select></div>
  <div class="field"><label>How did you find us?</label><select><option value="">Select...</option><option>Facebook</option><option>Instagram</option><option>Google</option><option>Referral</option><option>Other</option></select></div>

  <div class="divider"></div>
  <button class="submit">Submit My Brief →</button>
  <p class="note">// free estimate · no commitment · 24h response</p>
</div>

</body>
</html>
