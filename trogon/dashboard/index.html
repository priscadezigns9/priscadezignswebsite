<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trogon — Dashboard</title>
<link rel="manifest" href="/trogon/manifest.json">
<meta name="theme-color" content="#58CC02">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e8eaf6;min-height:100vh}
/* PIN SCREEN */
#pin-screen{position:fixed;inset:0;background:#0f1117;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:1.5rem}
#pin-screen h2{font-size:1.4rem;color:#58CC02;letter-spacing:1px}
#pin-screen .bird{font-size:4rem;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.pin-dots{display:flex;gap:12px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #58CC02;background:transparent;transition:background .2s}
.pin-dot.filled{background:#58CC02}
.pin-keypad{display:grid;grid-template-columns:repeat(3,72px);gap:10px}
.pin-btn{width:72px;height:72px;border-radius:50%;border:2px solid #2a2d3a;background:#1a1d2e;color:#e8eaf6;font-size:1.4rem;font-weight:600;cursor:pointer;transition:all .15s}
.pin-btn:active{background:#58CC02;color:#0f1117;transform:scale(.95)}
.pin-error{color:#ff4757;font-size:.9rem;height:1.2rem}
/* MAIN APP */
#app{display:none}
/* NAV */
nav{background:#1a1d2e;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid #2a2d3a}
.nav-brand{display:flex;align-items:center;gap:.75rem}
.nav-brand img{width:36px;height:36px;object-fit:contain}
.nav-brand span{font-size:1.3rem;font-weight:800;color:#58CC02;letter-spacing:.5px}
.nav-right{display:flex;align-items:center;gap:1rem}
#refresh-btn{background:#58CC02;color:#0f1117;border:none;padding:.5rem 1rem;border-radius:20px;font-weight:700;cursor:pointer;font-size:.85rem}
#last-updated{font-size:.75rem;color:#6b7280}
/* STATS BAR */
.stats{display:flex;gap:1rem;padding:1rem 1.5rem;background:#1a1d2e;border-bottom:1px solid #2a2d3a;overflow-x:auto}
.stat{text-align:center;min-width:80px}
.stat-num{font-size:1.4rem;font-weight:800;color:#58CC02}
.stat-label{font-size:.7rem;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px}
/* FILTERS */
.filters{padding:.75rem 1.5rem;display:flex;gap:.5rem;overflow-x:auto;border-bottom:1px solid #2a2d3a}
.filter-btn{padding:.4rem .9rem;border-radius:20px;border:1px solid #2a2d3a;background:transparent;color:#9ca3af;font-size:.8rem;cursor:pointer;white-space:nowrap;transition:all .2s}
.filter-btn.active{background:#58CC02;color:#0f1117;border-color:#58CC02;font-weight:700}
/* FEED */
.feed{padding:1rem 1.5rem;display:flex;flex-direction:column;gap:1rem;max-width:720px;margin:0 auto}
/* POST CARD */
.post-card{background:#1a1d2e;border-radius:16px;overflow:hidden;border:1px solid #2a2d3a;transition:transform .2s}
.post-card:hover{transform:translateY(-2px)}
.card-header{display:flex;align-items:center;gap:.75rem;padding:1rem;border-bottom:1px solid #2a2d3a}
.page-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;flex-shrink:0}
.card-meta{flex:1;min-width:0}
.page-name{font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-time{font-size:.75rem;color:#9ca3af;margin-top:2px}
.post-link{color:#58CC02;text-decoration:none;font-size:.75rem;font-weight:600}
.card-image{width:100%;max-height:300px;object-fit:cover;display:block}
.card-body{padding:1rem}
.post-text{font-size:.9rem;line-height:1.6;color:#d1d5db;white-space:pre-wrap;word-break:break-word}
.post-text.truncated{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.read-more{color:#58CC02;font-size:.8rem;cursor:pointer;font-weight:600;margin-top:.25rem;display:inline-block}
.card-footer{display:flex;gap:1.5rem;padding:.75rem 1rem;border-top:1px solid #2a2d3a}
.stat-item{display:flex;align-items:center;gap:.35rem;font-size:.8rem;color:#9ca3af}
.stat-item span{font-weight:700;color:#e8eaf6}
/* LOADING */
.loading{text-align:center;padding:3rem;color:#9ca3af}
.spinner{width:40px;height:40px;border:3px solid #2a2d3a;border-top-color:#58CC02;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:3rem;color:#6b7280;font-size:.9rem}
/* PAGE COLORS */
.c0{background:#58CC02;color:#0f1117}
.c1{background:#1cb0f6;color:#0f1117}
.c2{background:#ff4b4b;color:#fff}
.c3{background:#ffc800;color:#0f1117}
.c4{background:#ce82ff;color:#fff}
.c5{background:#ff9600;color:#fff}
.c6{background:#2dc653;color:#fff}
.c7{background:#ea2b2b;color:#fff}
.c8{background:#00bcd4;color:#fff}
.c9{background:#8bc34a;color:#fff}
.c10{background:#ff5722;color:#fff}
.c11{background:#9c27b0;color:#fff}

.c14{background:#009688;color:#fff}
.c15{background:#ff9800;color:#fff}
.c16{background:#607d8b;color:#fff}
.c17{background:#795548;color:#fff}
@media(max-width:600px){
  nav{padding:.75rem 1rem}
  .feed{padding:.75rem 1rem}
  .stats{padding:.75rem 1rem}
}
</style>
</head>

<!-- MAIN APP -->

  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="filterPosts('all',this)">All Pages</button>
  </div>

  <div class="feed" id="feed">
    <div class="loading"><div class="spinner"></div>Loading posts from all pages...</div>
  </div>
</div>

const PIN = '1984';
let pinEntry = '';
let allPosts = [];
let activeFilter = 'all';

// ── PIN ────────────────────────────────────────────────────────
if (sessionStorage.getItem('trogon_auth') === '1') unlock();

function enterPin(n) {
  if (pinEntry.length >= 4) return;
  pinEntry += n;
  updateDots();
  if (pinEntry.length === 4) {
    if (pinEntry === PIN) {
      sessionStorage.setItem('trogon_auth','1');
      unlock();
    } else {
      document.getElementById('pin-error').textContent = 'Incorrect PIN';
      setTimeout(() => { pinEntry=''; updateDots(); document.getElementById('pin-error').textContent=''; }, 800);
    }
  }
}

function clearPin(full) {
  pinEntry = full ? '' : pinEntry.slice(0,-1);
  updateDots();
  document.getElementById('pin-error').textContent = '';
}

function updateDots() {
  for(let i=0;i<4;i++) {
    document.getElementById('d'+i).classList.toggle('filled', i < pinEntry.length);
  }
}

function unlock() {
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadAllPosts();
}

// ── FETCH ──────────────────────────────────────────────────────
async function fetchPage(page, idx) {
  const url = `https://graph.facebook.com/v19.0/${page.id}/posts?fields=message,story,created_time,full_picture,likes.summary(true),comments.summary(true),permalink_url&limit=6&access_token=${page.token}`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    if (d.error) { console.warn(page.name, d.error.message); return []; }
    return (d.data || []).map(p => ({...p, _page: page.name, _idx: idx}));
  } catch(e) { console.warn(page.name, e); return []; }
}

async function loadAllPosts() {
  document.getElementById('feed').innerHTML = '<div class="loading"><div class="spinner"></div>Fetching posts from all 18 pages...</div>';
  document.getElementById('refresh-btn').textContent = '⟳ Loading...';

  const results = await Promise.all(PAGES.map((p,i) => fetchPage(p,i)));
  allPosts = results.flat().sort((a,b) => new Date(b.created_time) - new Date(a.created_time));

  // Update stats
  const likes = allPosts.reduce((s,p) => s + (p.likes?.summary?.total_count||0), 0);
  const comments = allPosts.reduce((s,p) => s + (p.comments?.summary?.total_count||0), 0);
  document.getElementById('stat-posts').textContent = allPosts.length;
  document.getElementById('stat-likes').textContent = likes > 999 ? (likes/1000).toFixed(1)+'k' : likes;
  document.getElementById('stat-comments').textContent = comments > 999 ? (comments/1000).toFixed(1)+'k' : comments;
  document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  document.getElementById('refresh-btn').textContent = '↻ Refresh';

  // Build filter buttons
  const filters = document.getElementById('filters');
  filters.innerHTML = '<button class="filter-btn active" onclick="filterPosts('all',this)">All Pages</button>';
  PAGES.forEach((p,i) => {
    filters.innerHTML += `<button class="filter-btn" onclick="filterPosts('${p.name}',this)">${p.name}</button>`;
  });

  renderFeed(allPosts);
  // Auto-refresh every 5 mins
  setTimeout(loadAllPosts, 5*60*1000);
}

function filterPosts(name, btn) {
  activeFilter = name;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = name === 'all' ? allPosts : allPosts.filter(p => p._page === name);
  renderFeed(filtered);
}

function renderFeed(posts) {
  const feed = document.getElementById('feed');
  if (!posts.length) { feed.innerHTML = '<div class="empty">No posts found.</div>'; return; }
  feed.innerHTML = posts.map(p => postCard(p)).join('');
}

function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function initials(name) {
  return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

function postCard(p) {
  const text = p.message || p.story || '';
  const likes = p.likes?.summary?.total_count || 0;
  const comments = p.comments?.summary?.total_count || 0;
  const img = p.full_picture ? `<img class="card-image" src="${p.full_picture}" loading="lazy" onerror="this.style.display='none'">` : '';
  const link = p.permalink_url ? `<a class="post-link" href="${p.permalink_url}" target="_blank">View on FB ↗</a>` : '';
  const truncated = text.length > 200;
  const displayText = truncated ? text.slice(0,200)+'…' : text;
  return `
  <div class="post-card">
    <div class="card-header">
      <div class="page-avatar c${p._idx % 18}">${initials(p._page)}</div>
      <div class="card-meta">
        <div class="page-name">${p._page}</div>
        <div class="post-time">${timeAgo(p.created_time)} · ${new Date(p.created_time).toLocaleDateString()}</div>
      </div>
      ${link}
    </div>
    ${img}
    ${text ? `<div class="card-body"><div class="post-text">${displayText}</div></div>` : ''}
    <div class="card-footer">
      <div class="stat-item">👍 <span>${likes}</span></div>
      <div class="stat-item">💬 <span>${comments}</span></div>
    </div>
  </div>`;
}

// PWA
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/trogon/sw.js');
</script>
</body>
</html>
