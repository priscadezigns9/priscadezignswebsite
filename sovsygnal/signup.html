<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVSYGNAL | Intelligence Placement</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8B0000; --bg: #F9F9F9; --text: #1A1A1A; --font-heading: 'Playfair Display', serif; --font-body: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; width: 100%; text-align: center; border-top: 5px solid var(--primary); }
        h1 { font-family: var(--font-heading); margin-bottom: 10px; }
        p { margin-bottom: 30px; font-size: 0.9rem; color: #666; }
        input[type="email"] { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: 600; text-decoration: none; display: block; }
        .back-link { margin-top: 20px; display: block; font-size: 0.8rem; color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>SOVSYGNAL</h1>
        <p>Subscribe to our intelligence placement network to receive exclusive advertising opportunities.</p>
        <form action="https://script.google.com/macros/s/AKfycbz_Placeholder/exec" method="POST">
            <input type="email" name="email" placeholder="Institutional Email" required>
            <button type="submit" class="btn">Join the Signal</button>
        </form>
        <a href="index.html" class="back-link">Return to Headlines</a>
    </div>
</body>
</html>
