<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVSYGNAL | Intelligence Placement</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8B0000; --bg: #F9F9F9; --text: #1A1A1A; --font-heading: 'Playfair Display', serif; --font-body: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; width: 100%; text-align: center; border-top: 5px solid var(--primary); }
        h1 { font-family: var(--font-heading); margin-bottom: 10px; font-size: 2rem; }
        .pricing-grid { display: flex; justify-content: space-around; margin-bottom: 25px; background: #fdfdfd; padding: 15px; border-radius: 4px; border: 1px solid #eee; }
        .price-box { flex: 1; }
        .price-tag { font-size: 1.2rem; font-weight: 700; color: var(--primary); display: block; }
        .price-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #666; }
        .save-badge { font-size: 0.6rem; background: #E8F5E9; color: #2E7D32; padding: 2px 6px; border-radius: 10px; font-weight: 700; margin-top: 4px; display: inline-block; }
        p { margin-bottom: 25px; font-size: 0.95rem; color: #444; line-height: 1.5; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: var(--font-body); }
        .btn { background: var(--primary); color: white; border: none; padding: 15px 24px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: 600; text-decoration: none; display: block; font-size: 1rem; transition: background 0.2s; }
        .btn:hover { background: #660000; }
        .back-link { margin-top: 25px; display: block; font-size: 0.8rem; color: var(--primary); text-decoration: none; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>SOVSYGNAL</h1>
        <div class="pricing-grid">
            <div class="price-box" style="border-right: 1px solid #eee;">
                <span class="price-label">Monthly</span>
                <span class="price-tag">$500</span>
            </div>
            <div class="price-box">
                <span class="price-label">Yearly</span>
                <span class="price-tag">$5,000</span>
                <span class="save-badge">Save $1,000</span>
            </div>
        </div>
        <p>Target institutional intelligence professionals with high-fidelity placements across the SOVSYGNAL network.</p>
        
        <form action="https://script.google.com/macros/s/AKfycbz_Placeholder/exec" method="POST">
            <input type="hidden" name="source" value="SOVSYGNAL_ADS">
            
            <div class="form-group">
                <label>Institutional Email</label>
                <input type="email" name="email" placeholder="email@firm.com" required>
            </div>

            <div class="form-group">
                <label>Business Type</label>
                <select name="business_type" required>
                    <option value="" disabled selected>Select Sector</option>
                    <option value="Hedge Fund / VC">Hedge Fund / VC</option>
                    <option value="Crypto / Web3">Crypto / Web3</option>
                    <option value="Luxury Retail">Luxury Retail</option>
                    <option value="Intelligence / Tech">Intelligence / Tech</option>
                    <option value="Real Estate">Real Estate</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Placement Duration</label>
                <select name="duration" required>
                    <option value="Monthly ($500)">Monthly ($500)</option>
                    <option value="Yearly ($5,000)">Yearly ($5,000) - Save $1,000</option>
                </select>
            </div>

            <div class="form-group">
                <label>Phone Number (WhatsApp Required)</label>
                <input type="tel" name="phone" placeholder="+1 (555) 000-0000" required>
            </div>

            <button type="submit" class="btn">Request Placement</button>
        </form>
        
        <a href="index.html" class="back-link">Return to Headlines</a>
    </div>
</body>
</html>
