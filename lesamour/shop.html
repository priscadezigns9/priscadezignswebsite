        * { margin: 0; padding: 0; box-sizing: border-box; }

        header { padding: 25px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--header-bg); }
        .logo img { height: 50px; width: auto; object-fit: contain; mix-blend-mode: multiply; }
        nav ul { display: flex; list-style: none; gap: 30px; }

        nav a:hover { color: var(--gold); }
        .hero { padding: 80px 6%; text-align: center; max-width: 900px; margin: 0 auto; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin-bottom: 20px; line-height: 1.2; }
        .hero p { color: var(--muted); font-size: 1.1rem; margin-bottom: 30px; }
        .btn { display: inline-block; background: var(--gold); color: var(--btn-text); padding: 12px 25px; text-decoration: none; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; border-radius: 2px; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        footer { padding: 60px 6%; text-align: center; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); letter-spacing: 2px; }
        footer img { height: 40px; margin-bottom: 15px; mix-blend-mode: multiply; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; padding: 40px 6%; }
        .card { border: 1px solid var(--border); padding: 20px; transition: 0.4s; background: var(--header-bg); display: flex; flex-direction: column; justify-content: space-between; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(158,27,50,0.05); }
        .p-img { aspect-ratio: 1/1; margin-bottom: 15px; overflow: hidden; }
        .p-img img { width: 100%; height: 100%; object-fit: contain; background: #fff; }
        .p-info h3 { font-family: 'Playfair Display', serif; font-size: 1rem; margin-bottom: 8px; min-height: 2.4em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .p-info .category { font-size: 0.65rem; text-transform: uppercase; color: var(--gold); letter-spacing: 1px; margin-bottom: 5px; display: block; }
