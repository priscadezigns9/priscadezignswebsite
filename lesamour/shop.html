<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shop | LESAMOUR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFFFFF; --text: #1A0D1A; --muted: #6B4F6B; --gold: #9E1B32; --border: rgba(158,27,50,0.08); --btn-text: #FFFFFF; --header-bg: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }
        header { padding: 25px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--header-bg); position: sticky; top: 0; z-index: 100; }
        .logo img { height: 50px; width: auto; object-fit: contain; mix-blend-mode: multiply; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text); transition: 0.3s; }
        nav a:hover { color: var(--gold); }
        
        .hero { padding: 60px 6% 40px; text-align: center; max-width: 900px; margin: 0 auto; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin-bottom: 20px; line-height: 1.2; }
        .hero p { color: var(--muted); font-size: 1.1rem; }

        .categories-nav { display: flex; justify-content: center; gap: 20px; padding: 20px 6%; flex-wrap: wrap; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
        .cat-btn { background: none; border: 1px solid var(--border); padding: 8px 20px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; cursor: pointer; transition: 0.3s; color: var(--muted); }
        .cat-btn.active, .cat-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(158,27,50,0.02); }

        .section-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; padding: 0 6%; margin-bottom: 30px; display: none; }
        .section-title.visible { display: block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 30px; padding: 0 6% 60px; }
        .card { border: 1px solid var(--border); padding: 20px; transition: 0.4s; background: var(--header-bg); display: none; flex-direction: column; justify-content: space-between; }
        .card.visible { display: flex; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(158,27,50,0.05); }
        .p-img { aspect-ratio: 1/1; margin-bottom: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .p-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .p-info h3 { font-family: 'Playfair Display', serif; font-size: 1rem; margin-bottom: 8px; min-height: 2.4em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .p-info .category { font-size: 0.65rem; text-transform: uppercase; color: var(--gold); letter-spacing: 1px; margin-bottom: 5px; display: block; }
        .p-info .price { color: var(--text); font-weight: 700; font-size: 1rem; display: block; margin-bottom: 15px; }
        .btn { display: inline-block; background: var(--gold); color: var(--btn-text); padding: 12px 25px; text-decoration: none; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; border-radius: 2px; transition: 0.3s; width: 100%; text-align: center; }
        .btn:hover { opacity: 0.9; }

        footer { padding: 60px 6%; text-align: center; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); letter-spacing: 2px; margin-top: 40px; }
        footer img { height: 40px; margin-bottom: 15px; mix-blend-mode: multiply; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html"><img src="../logos/LES_AMOUR_NEW_2026.png" alt="lesamour"></a></div>
        <nav><ul><li><a href="index.html">Home</a></li><li><a href="shop.html" style="color: var(--gold);">Shop</a></li><li><a href="blog.html">Blog</a></li></ul></nav>
    </header>

    <section class="hero">
        <h1>Intimate Collection</h1>
        <p>Curated essentials for every stage of love—from playful discovery to deep, lasting enrichment.</p>
    </section>

    <div class="categories-nav">
        <button class="cat-btn active" onclick="filter('All')">All Collection</button>
        <button class="cat-btn" onclick="filter('Adult Toys')">Adult Toys</button>
        <button class="cat-btn" onclick="filter('Marriage Enrichment')">Marriage Enrichment</button>
        <button class="cat-btn" onclick="filter('Relationship Essentials')">Relationship Essentials</button>
    </div>

    <div id="shop-grid" class="grid"></div>

    <script>
        const products = [
            { id: 1, cat: "Adult Toys", name: "Ava Upgraded Rose Vibrator - 10 Modes", price: "$29.99", img: "https://m.media-amazon.com/images/I/71ibbU+OxdL._AC_SL1500_.jpg", link: "https://www.amazon.com/Rose-Toy-Women-Stimulator-Vibrating/dp/B0BB1VX77W?tag=priscadezigns-20" },
            { id: 2, cat: "Adult Toys", name: "App-Controlled Wearable Panty Vibrator", price: "$34.99", img: "https://m.media-amazon.com/images/I/61hGkTRkCLL._AC_SL1500_.jpg", link: "https://www.amazon.com/Wearable-Vibrator-Distance-Stimulator-Healexcer/dp/B0DYNHF69W?tag=priscadezigns-20" },
            { id: 3, cat: "Adult Toys", name: "PlusOne Rechargeable Bullet Vibrator", price: "$14.99", img: "https://m.media-amazon.com/images/I/61xedFnFwLL._AC_SL1500_.jpg", link: "https://www.amazon.com/Vibrator-Body-Safe-Waterproof-Rechargeable-Vibration/dp/B0FYKHC327?tag=priscadezigns-20" },
            { id: 4, cat: "Adult Toys", name: "Tracy's Dog Rabbit Vibrator G-Spot Stimulator", price: "$32.99", img: "https://m.media-amazon.com/images/I/61db-JVPhJL._AC_UL600_SR600,400_.jpg", link: "https://www.amazon.com/Spot-Vibrator-Wand-Bullet-Set/dp/B0D8T58JRG?tag=priscadezigns-20" },
            { id: 5, cat: "Adult Toys", name: "TENGA Spinner Spiral Stroker for Men", price: "$25.69", img: "https://m.media-amazon.com/images/I/719cyAbcKSL._AC_SL1500_.jpg", link: "https://www.amazon.com/TENGA-Spinner-Spiral-Motion-Spn-006/dp/B0869WV78N?tag=priscadezigns-20" },
            { id: 6, cat: "Marriage Enrichment", name: "{THE AND} Long Term Couples Edition", price: "$29.00", img: "https://m.media-amazon.com/images/I/71O3vW3S6XL._AC_SL1500_.jpg", link: "https://www.amazon.com/Long-Term-Couples-Human-Experience-Adults/dp/B09D17K38B?tag=priscadezigns-20" },
            { id: 7, cat: "Marriage Enrichment", name: "Aromatherapy Sensual Massage Oil - Lavender", price: "$16.95", img: "https://m.media-amazon.com/images/I/719n9mK6oQL._AC_SL1500_.jpg", link: "https://www.amazon.com/Sensual-Massage-Relaxing-Lavender-Almond/dp/B019FW8PA0?tag=priscadezigns-20" },
            { id: 8, cat: "Marriage Enrichment", name: "The Couple's Toolkit by Kevin Clayton", price: "$14.95", img: "https://m.media-amazon.com/images/I/61f23P0R1HL._AC_SL1500_.jpg", link: "https://www.amazon.com/couples-toolkit-Essential-relationship-relationships/dp/B0BRHHPFZX?tag=priscadezigns-20" },
            { id: 9, cat: "Marriage Enrichment", name: "Higher Level Love: Hearts-Centered Marriage", price: "$18.50", img: "https://m.media-amazon.com/images/I/41D8O7-Y1cL.jpg", link: "https://www.amazon.com/Higher-Level-Love-Couples-Toolkit/dp/1500515183?tag=priscadezigns-20" },
            { id: 10, cat: "Relationship Essentials", name: "The Adventure Challenge: Couples Edition", price: "$59.99", img: "https://m.media-amazon.com/images/I/71YtLOnXg5L._AC_SL1500_.jpg", link: "https://www.amazon.com/dp/B087Q6NV9V?tag=priscadezigns-20" },
            { id: 11, cat: "Relationship Essentials", name: "BestSelf Intimacy Deck - 170 Prompts", price: "$24.99", img: "https://m.media-amazon.com/images/I/71ZunpYfDVL._AC_SL1500_.jpg", link: "https://www.amazon.com/Intimacy-Deck-BestSelf-Conversation-Vulnerability/dp/B07W1PVNFC?tag=priscadezigns-20" },
            { id: 12, cat: "Relationship Essentials", name: "Talking Point Cards: Relationship Edition", price: "$19.95", img: "https://m.media-amazon.com/images/I/71W87fU+sXL._AC_SL1500_.jpg", link: "https://www.amazon.com/Relationship-Talking-Point-Cards-Conversation/dp/B07P7X5BXL?tag=priscadezigns-20" },
            { id: 13, cat: "Relationship Essentials", name: "Lilexo Our Story: Connection Starters", price: "$19.99", img: "https://m.media-amazon.com/images/I/61X-N1f9FpL._AC_SL1500_.jpg", link: "https://www.amazon.com/Lilexo-Conversation-Connection-Strengthen-Relationships/dp/B0DLL93M3D?tag=priscadezigns-20" },
            { id: 14, cat: "Relationship Essentials", name: "Date Night Scratch-Off Adventure Cards", price: "$24.99", img: "https://m.media-amazon.com/images/I/51esnoQ6YHL._AC_SL1000_.jpg", link: "https://www.amazon.com/dp/B087Q6NV9V?tag=priscadezigns-20" }
        ];

        const grid = document.getElementById('shop-grid');

        function render() {
            grid.innerHTML = products.map(p => `
                <div class="card visible" data-cat="${p.cat}">
                    <div class="p-img"><img src="${p.img}" alt="${p.name}"></div>
                    <div class="p-info">
                        <span class="category">${p.cat}</span>
                        <h3>${p.name}</h3>
                        <span class="price">${p.price}</span>
                        <a href="${p.link}" target="_blank" class="btn">Buy on Amazon</a>
                    </div>
                </div>
            `).join('');
        }

        function filter(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.toggle('active', b.innerText.includes(cat));
            });
            document.querySelectorAll('.card').forEach(c => {
                const pCat = c.getAttribute('data-cat');
                c.style.display = (cat === 'All' || pCat === cat) ? 'flex' : 'none';
            });
        }

        render();
    </script>

    <footer>
        <img src="../logos/LES_AMOUR_NEW_2026.png"><br>
        © 2026 LESAMOUR · QUALITY INTIMACY
    </footer>
</body>
</html>
