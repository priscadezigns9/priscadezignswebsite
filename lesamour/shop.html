        .card { border: 1px solid var(--border); padding: 20px; transition: 0.4s; background: var(--header-bg); display: flex; flex-direction: column; justify-content: space-between; }

        .btn { display: inline-block; background: var(--gold); color: var(--btn-text); padding: 10px 15px; text-decoration: none; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; border-radius: 2px; transition: 0.3s; width: 100%; text-align: center; }

        const grid = document.getElementById('shop-grid');

        function render() {
            grid.innerHTML = products.map(p => `
                <div class="card" data-cat="${p.cat}">
                    <div class="p-img"><img src="${p.img}" alt="${p.name}" loading="lazy"></div>
                    <div class="p-info">
                        <span class="category">${p.cat}</span>
                        <h3>${p.name}</h3>
                        <span class="price">${p.price}</span>
                        <a href="${p.link}" target="_blank" class="btn">Buy on Amazon</a>
                    </div>
                </div>
            `).join('');
            filter('All');
        }

        function filter(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.toggle('active', b.innerText.includes(cat));
            });
            document.querySelectorAll('.card').forEach(c => {
                const pCat = c.getAttribute('data-cat');
                c.style.display = (cat === 'All' || pCat === cat) ? 'flex' : 'none';
            });
        }

        render();
