<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shop | LESAMOUR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFFFFF; --text: #1A0D1A; --muted: #6B4F6B; --gold: #9E1B32; --border: rgba(158,27,50,0.08); --btn-text: #FFFFFF; --header-bg: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }
        header { padding: 25px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--header-bg); }
        .logo img { height: 50px; width: auto; object-fit: contain; mix-blend-mode: multiply; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text); transition: 0.3s; }
        nav a:hover { color: var(--gold); }
        .hero { padding: 100px 6%; text-align: center; max-width: 900px; margin: 0 auto; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3.2rem; margin-bottom: 25px; line-height: 1.2; }
        .hero p { color: var(--muted); font-size: 1.15rem; margin-bottom: 40px; }
        .btn { display: inline-block; background: var(--gold); color: var(--btn-text); padding: 14px 40px; text-decoration: none; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; border-radius: 2px; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        footer { padding: 80px 6%; text-align: center; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); letter-spacing: 2px; }
        footer img { height: 50px; margin-bottom: 20px; mix-blend-mode: multiply; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px; 1fr)); gap: 40px; padding: 60px 6%; }
        .card { border: 1px solid var(--border); padding: 30px; transition: 0.4s; background: var(--header-bg); }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .p-img { aspect-ratio: 1/1; margin-bottom: 25px; overflow: hidden; }
        .p-img img { width: 100%; height: 100%; object-fit: contain; background: #fff; }
        .p-info h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 10px; }
        .p-info .price { color: var(--gold); font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 20px; }
    
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html"><img src="../logos/LES_AMOUR_NEW_2026.png" alt="lesamour"></a></div>
        <nav><ul><li><a href="index.html" style="color: var(--text);">Home</a></li><li><a href="shop.html" style="color: var(--gold);">Shop</a></li><li><a href="blog.html" style="color: var(--text);">Blog</a></li></ul></nav>
    </header>
    <section class='hero' style='padding: 60px 6% 20px;'><h1>The Shop</h1><p>Vetted products for the modern lifestyle.</p></section>
    <div class='grid' id='g'></div>
    <script>
        const data = [
  {
    "name": "The Adventure Challenge Couples Edition",
    "category": "Connection Tools",
    "price": "$59.99",
    "image": "https://m.media-amazon.com/images/I/71Vf1R-xxDL._SY500_.jpg",
    "link": "https://www.amazon.com/dp/B087Q6NV9V?tag=priscadezigns-20"
  },
  {
    "name": "Mini Dates - Date Night Ideas",
    "category": "Connection Tools",
    "price": "$24.95",
    "image": "https://m.media-amazon.com/images/I/61HU05kmvxL._AC_SS115_.jpg",
    "link": "https://www.amazon.com/dp/B0BX4SQHW5?tag=priscadezigns-20"
  },
  {
    "name": "Date Night Adventure Scrapbook",
    "category": "Connection Tools",
    "price": "$35.00",
    "image": "https://m.media-amazon.com/images/I/61U3az-jt4L._AC_SS115_.jpg",
    "link": "https://www.amazon.com/dp/B0BTKCS2J6?tag=priscadezigns-20"
  },
  {
    "name": "Interactive Date Night Scrapbook",
    "category": "Connection Tools",
    "price": "$29.99",
    "image": "https://m.media-amazon.com/images/I/61VwLoSNM7L._SY500_.jpg",
    "link": "https://www.amazon.com/dp/B087Q6NV9V?tag=priscadezigns-20"
  },
  {
    "name": "The Adventure Challenge Recipes",
    "category": "Connection Tools",
    "price": "$39.99",
    "image": "https://m.media-amazon.com/images/I/718iaQ1YtKL._SY500_.jpg",
    "link": "https://www.amazon.com/dp/B087Q6NV9V?tag=priscadezigns-20"
  },
  {
    "name": "50 Scratch-Off Date Night Ideas",
    "category": "Connection Tools",
    "price": "$24.99",
    "image": "https://m.media-amazon.com/images/I/51esnoQ6YHL._SY500_.jpg",
    "link": "https://www.amazon.com/dp/B087Q6NV9V?tag=priscadezigns-20"
  }
];
        const g = document.getElementById('g');
        data.forEach(p => {
            g.innerHTML += `
                <div class='card'>
                    <div class='p-img'><img src='${p.image}'></div>
                    <div class='p-info'>
                        <h3>${p.name}</h3>
                        <span class='price'>${p.price}</span>
                        <a href='${p.link}' target='_blank' class='btn' style='width:100%;text-align:center'>Buy on Amazon</a>
                    </div>
                </div>
            `;
        });
    </script>
    <footer style='background: var(--header-bg);'>
        <img src='../logos/LES_AMOUR_NEW_2026.png'><br>
        © 2026 LESAMOUR · AUTHENTIC QUALITY
    </footer>
</body>
</html>
