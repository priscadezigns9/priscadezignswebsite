            { cat: "Relationship Essentials", name: "Truth or Dare for Couples Card Game", price: "$14.99", img: "https://m.media-amazon.com/images/I/61C+W7I9GBL._AC_SL1500_.jpg", link: "https://www.amazon.com/Truth-Dare-Couples-Game-Romantic/dp/B091L2LJDS?tag=priscadezigns-20" }
        ];

        const grid = document.getElementById('shop-grid');

        function render() {
            grid.innerHTML = products.map(p => `
                <div class="card" data-cat="${p.cat}">
                    <div class="p-img"><img src="${p.img}" alt="${p.name}" onerror="this.src='https://res.cloudinary.com/davvgg5sy/image/fetch/f_auto,q_auto/https://m.media-amazon.com/images/G/01/apparel/rcxgs/tile._CB483369110_.gif'"></div>
                    <div class="p-info">
                        <span class="category">${p.cat}</span>
                        <h3>${p.name}</h3>
                        <span class="price">${p.price}</span>
                        <a href="${p.link}" target="_blank" class="btn">Buy on Amazon</a>
                    </div>
                </div>
            `).join('');
            filter('All');
        }

        function filter(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.toggle('active', b.innerText.includes(cat));
            });
            document.querySelectorAll('.card').forEach(c => {
                const pCat = c.getAttribute('data-cat');
                c.style.display = (cat === 'All' || pCat === cat) ? 'flex' : 'none';
            });
        }

        render();
    </script>
