    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFFFFF; --text: #1A0D1A; --muted: #6B4F6B; --gold: #9E1B32; --border: rgba(158,27,50,0.08); --btn-text: #FFFFFF; --header-bg: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }
        header { padding: 25px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--header-bg); position: sticky; top: 0; z-index: 100; }
        .logo img { height: 50px; width: auto; object-fit: contain; mix-blend-mode: multiply; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text); transition: 0.3s; }
        nav a:hover { color: var(--gold); }
        .hero { padding: 60px 6% 40px; text-align: center; max-width: 900px; margin: 0 auto; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin-bottom: 20px; line-height: 1.2; }
        .hero p { color: var(--muted); font-size: 1.1rem; }
        .categories-nav { display: flex; justify-content: center; gap: 20px; padding: 20px 6%; flex-wrap: wrap; border-bottom: 1px solid var(--border); margin-bottom: 40px; position: sticky; top: 101px; background: white; z-index: 90; }
        .cat-btn { background: none; border: 1px solid var(--border); padding: 8px 20px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; cursor: pointer; transition: 0.3s; color: var(--muted); }
        .cat-btn.active, .cat-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(158,27,50,0.02); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; padding: 0 6% 60px; }
        .card { border: 1px solid var(--border); padding: 20px; transition: 0.4s; background: var(--header-bg); display: flex; flex-direction: column; justify-content: space-between; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(158,27,50,0.05); }
        .p-img { aspect-ratio: 1/1; margin-bottom: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #fff; }
        .p-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .p-info h3 { font-family: 'Playfair Display', serif; font-size: 0.85rem; margin-bottom: 8px; min-height: 2.4em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: var(--text); }
        .p-info .category { font-size: 0.6rem; text-transform: uppercase; color: var(--gold); letter-spacing: 1px; margin-bottom: 5px; display: block; }
        .p-info .price { color: var(--text); font-weight: 700; font-size: 0.95rem; display: block; margin-bottom: 15px; }
        .btn { display: inline-block; background: var(--gold); color: var(--btn-text); padding: 10px 15px; text-decoration: none; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; border-radius: 2px; transition: 0.3s; width: 100%; text-align: center; }
        .btn:hover { opacity: 0.9; }
        footer { padding: 60px 6%; text-align: center; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); letter-spacing: 2px; margin-top: 40px; }
        footer img { height: 40px; margin-bottom: 15px; mix-blend-mode: multiply; }
    </style>
</head>

                        <span class="price">${p.price}</span>
                        <a href="${p.link}" target="_blank" class="btn">Buy on Amazon</a>
                    </div>
                </div>
            `).join('');
            filter('All');
        }

        function filter(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.toggle('active', b.innerText.includes(cat));
            });
            document.querySelectorAll('.card').forEach(c => {
                const pCat = c.getAttribute('data-cat');
