<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LES AMOUR | The Art of Connection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FCF9F7; --text: #1C1C1C; --muted: #7A7A7A; --gold: #C5A059; --white: #FFFFFF;
            --font-heading: 'Playfair Display', serif; --font-body: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); line-height: 1.6; }
        header { padding: 50px 6%; text-align: center; }
        .logo-img { height: 60px; }
        .hero { padding: 120px 6%; text-align: center; max-width: 900px; margin: 0 auto; }
        .hero span { text-transform: uppercase; letter-spacing: 5px; font-size: 0.75rem; color: var(--gold); font-weight: 700; display: block; margin-bottom: 20px; }
        .hero h1 { font-family: var(--font-heading); font-size: 5rem; font-style: italic; font-weight: 400; line-height: 1.1; margin-bottom: 30px; }
        .hero p { font-size: 1.2rem; color: var(--muted); margin-bottom: 50px; font-weight: 300; }
        .btn-luxury { padding: 22px 60px; background: var(--text); color: white; text-decoration: none; border-radius: 2px; text-transform: uppercase; font-size: 0.8rem; font-weight: 700; letter-spacing: 2px; transition: 0.3s; }
        .btn-luxury:hover { background: var(--gold); }
        .gallery-preview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 6% 120px; }
        .gallery-item { aspect-ratio: 4/5; background: #EEE; overflow: hidden; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .gallery-item:hover img { transform: scale(1.05); }
        footer { padding: 80px 6%; text-align: center; font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; border-top: 1px solid #EEE; }
    </style>
</head>
<body>
    <header><img src="/logos/LESAMOUR_LOGO.png" alt="Les Amour Logo" class="logo-img"></header>
    <section class="hero">
        <span>The High-Fidelity Heart</span>
        <h1>The Art of Eternal Connection.</h1>
        <p>Bespoke luxury experiences and high-fidelity archival signals designed for those who value the depth of connection over the noise of the world.</p>
        <a href="#" class="btn-luxury">Enter Archive</a>
    </section>
    <section class="gallery-preview">
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1518131394553-8d960bf0f34a?q=80&w=2070&auto=format&fit=crop" alt="Luxury 1"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1511714561081-309d9361099f?q=80&w=2070&auto=format&fit=crop" alt="Luxury 2"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1501196354995-cbb51c65aaea?q=80&w=2071&auto=format&fit=crop" alt="Luxury 3"></div>
    </section>
    <footer>© 2026 LES AMOUR · A PRISCA DEZIGNS NETWORK SANCTUARY</footer>
</body>
</html>
