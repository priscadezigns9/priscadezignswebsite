<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Excellence | LESAMOUR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFFFFF; --text: #1A0D1A; --muted: #6B4F6B; --gold: #9E1B32; --border: rgba(158,27,50,0.08); --btn-text: #FFFFFF; --header-bg: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }
        header { padding: 25px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--header-bg); }
        .logo img { height: 50px; width: auto; object-fit: contain; mix-blend-mode: multiply; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text); transition: 0.3s; }
        nav a:hover { color: var(--gold); }
        .hero { padding: 100px 6%; text-align: center; max-width: 900px; margin: 0 auto; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3.2rem; margin-bottom: 25px; line-height: 1.2; }
        .hero p { color: var(--muted); font-size: 1.15rem; margin-bottom: 40px; }
        .btn { display: inline-block; background: var(--gold); color: var(--btn-text); padding: 14px 40px; text-decoration: none; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; border-radius: 2px; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        footer { padding: 80px 6%; text-align: center; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); letter-spacing: 2px; }
        footer img { height: 50px; margin-bottom: 20px; mix-blend-mode: multiply; }
        
        .feat { padding: 100px 6%; display: flex; gap: 60px; align-items: center; background: var(--bg); }
        .feat-txt { flex: 1; }
        .feat-txt h2 { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin-bottom: 20px; }
        .feat-img { flex: 1; aspect-ratio: 16/9; overflow: hidden; border-radius: 4px; }
        .feat-img img { width: 100%; height: 100%; object-fit: cover; }
    
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html"><img src="/logos/LES_AMOUR_NEW_2026.png" alt="lesamour"></a></div>
        <nav><ul><li><a href="index.html" style="color: var(--gold);">Home</a></li><li><a href="shop.html" style="color: var(--text);">Shop</a></li><li><a href="blog.html" style="color: var(--text);">Blog</a></li></ul></nav>
    </header>
    <section class='hero'><h1>Intimate Excellence & Relationship Mastery. Curating the tools for deep connection and adult wellness.</h1><p>Curated collections designed to elevate your life and connections.</p><a href='shop.html' class='btn'>Explore the Collection</a></section><footer style='background: var(--header-bg);'><img src='/logos/LES_AMOUR_NEW_2026.png'><br>© 2026 LESAMOUR · AUTHENTIC QUALITY</footer></body></html>
