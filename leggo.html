<!DOCTYPE html><html><head><meta charset="UTF-8"><title>LEGGO Hub</title><style>body{background:#000;color:#fff;font-family:sans-serif;margin:0;overflow:hidden}.os{display:flex;height:100vh}.nav{width:60px;border-right:1px solid #111;display:flex;flex-direction:column;align-items:center;padding:20px}.nav-btn{cursor:pointer;color:#444;margin-bottom:30px}.main{flex:1;display:flex;flex-direction:column}.top{height:60px;border-bottom:1px solid #111;display:flex;align-items:center;padding:0 20px}.dash{flex:1;padding:40px;overflow-y:auto}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:20px}.tile{background:#0A0A0A;padding:20px;border-radius:20px;text-align:center;cursor:pointer}.viewport{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:#000;z-index:50}iframe{width:100%;height:100%;border:none}.sidebar{position:fixed;right:-420px;top:0;width:400px;height:100vh;background:#050505;border-left:1px solid #222;transition:0.5s;z-index:10000}.sidebar.active{right:0}</style></head><body><div class="os"><nav class="nav"><div class="nav-btn" onclick="closeNode()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><div class="nav-btn" onclick="toggleSidebar()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div></nav><div class="main"><header class="top"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/p-logo.png" style="width:30px"></header><div class="dash"><div class="viewport" id="viewport"><iframe id="frame"></iframe></div><div class="grid" id="grid"></div></div></div></div><div id="sidebar" class="sidebar"></div><script src="wallet-core.js"></script><script>const nodes=[{name:"Anime",handle:".pri",icon:"⛩️"},{name:"Nurasen",handle:".pri",icon:"🛡️"},{name:"Gaming",handle:".pri",icon:"🎮"}];function renderGrid(){document.getElementById('grid').innerHTML=nodes.map(n=>'<div class="tile" onclick="openNode('' + n.handle + '')"><div>' + n.icon + '</div><div>' + n.name + '</div></div>').join('')}function openNode(h){const p=h.replace('$','').replace('.pri','');document.getElementById('viewport').style.display='block';document.getElementById('frame').src='/'+p+'/'}function closeNode(){document.getElementById('viewport').style.display='none'}function toggleSidebar(){document.getElementById('sidebar').classList.toggle('active');if(document.getElementById('sidebar').classList.contains('active'))initializeWallet('sidebar')}window.onload=renderGrid;</script></body></html>
