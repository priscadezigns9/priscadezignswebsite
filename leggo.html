<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGGO | High-Fidelity Neural Explorer</title>
    <link rel="manifest" href="leggo-manifest.json">
    <meta name="theme-color" content="#050505">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@400;600;800;900&family=Space+Mono:wght@700&display=swap">
    <style>
        :root { 
            --accent: #7B35D4; 
            --bg: #000; 
            --glass: rgba(15, 15, 15, 0.7); 
        }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden;
            background: radial-gradient(circle at top right, #1a0b2e 0%, #000 60%);
        }

        /* Modern Layout */
        .leggo-os { display: flex; height: 100vh; }
        
        .sidebar-nav { 
            width: 70px; 
            background: rgba(5,5,5,0.8); 
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.05); 
            display: flex; flex-direction: column; align-items: center; padding: 25px 0;
            z-index: 1000;
        }
        
        .nav-brand-img { width: 35px; height: 35px; border-radius: 8px; margin-bottom: 50px; cursor: pointer; transition: 0.3s; }
        .nav-brand-img:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--accent); }
        
        .nav-item { margin-bottom: 35px; cursor: pointer; opacity: 0.6; transition: 0.3s; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }
        .nav-item img { width: 100%; height: 100%; object-fit: contain; }
        .nav-item:hover, .nav-item.active { opacity: 1; filter: drop-shadow(0 0 8px var(--accent)); }

        .main-workspace { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* Top Status Bar */
        .top-bar {
            height: 40px; background: rgba(5,5,5,0.5); border-bottom: 1px solid rgba(255,255,255,0.03);
            display: flex; align-items: center; justify-content: flex-end; padding: 0 30px; gap: 20px;
        }
        .vpn-status { display: flex; align-items: center; gap: 8px; color: #00ff88; font-size: 0.6rem; font-weight: 800; }
        .vpn-dot { width: 6px; height: 6px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 8px #00ff88; }
        .privacy-label { color: #555; text-transform: uppercase; letter-spacing: 1px; font-size: 0.55rem; }

        /* Dashboard View */
        .dashboard { 
            flex: 1; 
            padding: 60px 8%; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stats-bar {
            display: flex;
            gap: 40px;
            margin-bottom: 80px;
            width: 100%;
            justify-content: center;
        }
        .stat-card { text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: 900; color: var(--accent); }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-top: 5px; }

        .clock-hero { text-align: center; margin-bottom: 60px; }
        .time { font-family: 'Playfair Display', serif; font-size: 5rem; font-weight: 900; margin: 0; line-height: 1; }
        .greeting { font-family: 'Space Mono'; font-size: 0.8rem; letter-spacing: 5px; color: #aaa; margin-top: 15px; }

        .search-container {
            width: 100%;
            max-width: 700px;
            margin-bottom: 80px;
        }
        .search-bar {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 100px;
            padding: 18px 35px;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }
        .search-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 30px rgba(123,53,212,0.2); }
        .search-bar input {
            background: none; border: none; color: white; width: 100%; padding: 0 20px;
            font-size: 1.2rem; outline: none; font-weight: 400;
        }

        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 900px;
        }
        .fav-tile {
            display: flex; flex-direction: column; align-items: center; text-decoration: none;
            transition: 0.3s; cursor: pointer;
        }
        .fav-tile:hover { transform: translateY(-8px); }
        .fav-icon {
            width: 65px; height: 65px; background: var(--glass); border-radius: 20px;
            display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 12px;
            backdrop-filter: blur(10px);
        }
        .fav-name { font-size: 0.65rem; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        /* Mobile Optimization v5.0 */
        @media (max-width: 768px) {
            .leggo-os { flex-direction: column-reverse; }
            .sidebar-nav { 
                width: 100%; height: 70px; flex-direction: row; 
                padding: 0 20px; border-right: none; border-top: 1px solid rgba(255,255,255,0.05); 
                justify-content: space-around; position: fixed; bottom: 0; left: 0;
            }
            .nav-brand-img { display: none; }
            .nav-item { margin-bottom: 0; }
            .nav-item img { width: 24px; height: 24px; }
            .main-workspace { padding-bottom: 70px; height: 100vh; overflow-y: auto; }
            .top-bar { padding: 0 15px; }
            .dashboard { padding: 40px 5%; }
            .stats-bar { grid-template-columns: 1fr; width: 100%; }
            .clock-hero .time { font-size: 4rem; }
            .clock-hero .greeting { font-size: 0.6rem; letter-spacing: 2px; }
            .search-container { width: 100%; margin: 20px 0; }
            .sidebar { width: 100%; right: -100%; }
            .sidebar.active { right: 0; }
        }

        /* Wallet Integration Override (Modern Sidebar) */
        .sidebar {
            position: fixed; top: 0; right: -420px; width: 420px; height: 100vh;
            background: rgba(5,5,5,0.95); backdrop-filter: blur(30px);
            border-left: 1px solid rgba(255,255,255,0.1);
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000;
            display: flex; flex-direction: column;
        }
        .sidebar.active { right: 0; }
        .sidebar-header { padding: 30px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-tabs { display: flex; border-bottom: 1px solid #111; }
        .sidebar-tabs button { 
            flex: 1; background: none; border: none; color: #444; padding: 15px; 
            font-size: 0.6rem; font-weight: 800; text-transform: uppercase; cursor: pointer;
        }
        .sidebar-content { flex: 1; overflow-y: auto; }
        .close-btn { background: none; border: none; color: #555; font-size: 2rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="leggo-os">
        <div class="sidebar-nav">
            <img src="assets/p-logo.png" class="nav-brand-img" onclick="window.location.href='/'">
            <div class="nav-item active" onclick="window.location.href='/leggo.html'"><img src="assets/p-logo.png" alt="Home"></div>
            <div class="nav-item"><img src="assets/icons/vault_icon.png" alt="Vault"></div>
            <div class="nav-item"><img src="assets/icons/nodes_icon.png" alt="Nodes"></div>
            <div class="nav-item" style="margin-top:auto;" onclick="toggleSidebar()"><img src="assets/icons/wallet_icon.png" alt="Wallet"></div>
        </div>

        <div class="main-workspace">
            <div class="top-bar">
                <div class="vpn-status">
                    <span class="privacy-label">Jello Privacy Layer:</span>
                    <span class="vpn-dot"></span>
                    <span>NURASEN ACTIVE</span>
                </div>
                <div style="color: #333; font-size: 0.6rem; font-weight: 800;">UK-EDGE-NODE-01</div>
            </div>
            <div class="dashboard">
                <div class="stats-bar">
                    <div class="stat-card">
                        <div class="stat-value">2.4k</div>
                        <div class="stat-label">Trackers Blocked</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">120mb</div>
                        <div class="stat-label">Bandwidth Saved</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">4.2h</div>
                        <div class="stat-label">Time Saved</div>
                    </div>
                </div>

                <div class="clock-hero">
                    <h1 class="time" id="clock">00:00</h1>
                    <div class="greeting">GM ARCHITECT. THE EMPIRE IS ONLINE // $JELLO ACTIVE</div>
                </div>

                <div class="search-container">
                    <div class="search-bar">
                        <span>🔍</span>
                        <input type="text" placeholder="Search Sovereign Ledger or Web..." onkeyup="handleSearch(event)">
                    </div>
                </div>

                <div class="favorites-grid" id="favorites">
                    <!-- Top Sites -->
                    <a href="/" class="fav-tile">
                        <div class="fav-icon">🏯</div>
                        <div class="fav-name">Sovereign Node</div>
                    </a>
                    <a href="/ateliagaming/" class="fav-tile">
                        <div class="fav-icon">🎮</div>
                        <div class="fav-name">Atelia</div>
                    </a>
                    <a href="/dreaminganime/" class="fav-tile">
                        <div class="fav-icon">⛩️</div>
                        <div class="fav-name">Dreaming</div>
                    </a>
                    <a href="/riddiim/" class="fav-tile">
                        <div class="fav-icon">🎵</div>
                        <div class="fav-name">Riddiim</div>
                    </a>
                    <a href="/calalloo/" class="fav-tile">
                        <div class="fav-icon">🍲</div>
                        <div class="fav-name">Calalloo</div>
                    </a>
                    <a href="/nurasen/index.html" class="fav-tile">
                        <div class="fav-icon">🛡️</div>
                        <div class="fav-name">Nurasen</div>
                    </a>
                    <a href="/rowcell/" class="fav-tile">
                        <div class="fav-icon">🌹</div>
                        <div class="fav-name">Rowcell</div>
                    </a>
                    <a href="/cupyx/" class="fav-tile">
                        <div class="fav-icon">☕</div>
                        <div class="fav-name">Cupyx</div>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Wallet Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2 style="font-family:'Playfair Display'; font-size:1.1rem; letter-spacing:1px; margin:0;">PRISCION WALLET</h2>
            <button onclick="toggleSidebar()" class="close-btn">&times;</button>
        </div>
        <div class="sidebar-tabs">
            <button id="tab-assets" onclick="switchWalletTabCore('assets')">Assets</button>
            <button id="tab-vault" onclick="switchWalletTabCore('vault')">Vault</button>
            <button id="tab-shop" onclick="switchWalletTabCore('shop')">Hub</button>
            <button id="tab-sync" onclick="switchWalletTabCore('sync')">Security</button>
        </div>
        <div class="sidebar-content" id="wallet-main-view"></div>
    </div>

    <script src="wallet-core.js"></script>
    <script>
        // GEOLOCATION SHIELD v5.0 (Masks Trinidad Signal for Paybis/Coinbase)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition = function(success, error, options) {
                success({
                    coords: { latitude: 51.5074, longitude: -0.1278, accuracy: 10 },
                    timestamp: Date.now()
                });
            };
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('active');
            if(sb.classList.contains('active')) {
                initializeWallet('sidebar');
                switchWalletTabCore('assets');
            }
        }

        function switchWalletTabCore(tab) {
            const view = document.getElementById('wallet-main-view');
            if(!view) return;
            
            ['tab-assets', 'tab-vault', 'tab-shop', 'tab-sync'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.style.color = '#444';
            });
            if(document.getElementById('tab-' + tab)) document.getElementById('tab-' + tab).style.color = '#7B35D4';

            if(tab === 'vault') {
                view.innerHTML = '<div style="padding:40px; color:#444; font-size:0.65rem; text-align:center;">VAULT SYNCHRONIZING...</div>';
                fetch('vault_manifest.json').then(r => r.json()).then(data => {
                    view.innerHTML = '<div style="padding:20px;">' + data.map(i => `
                        <div style="background:#080808; padding:15px; border-radius:12px; margin-bottom:10px; border:1px solid #222;">
                            <div style="color:white; font-weight:800; font-size:0.75rem;">${i.name}</div>
                            <div style="color:#00FF88; font-size:0.5rem; font-weight:900; text-transform:uppercase; margin-top:5px;">${i.ledger_status}</div>
                        </div>
                    `).join('') + '</div>';
                });
            } else if(tab === 'assets') {
                initializeWallet('sidebar'); // Re-init core asset view
            }
        }

        function handleSearch(e) {
            if(e.key === 'Enter') {
                const val = e.target.value;
                if(val.startsWith('$') && val.endsWith('.prn')) {
                    window.location.href = '/' + val.replace('$', '').replace('.prn', '') + '/';
                } else {
                    window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(val);
                }
            }
        }
    </script>
</body>
</html>
