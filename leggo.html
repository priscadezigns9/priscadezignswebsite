<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HUB | Priscion OS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap">
    <style>
        :root { --accent: #7B35D4; --bg: #000; --surface: #080808; --border: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .os { display: flex; height: 100vh; }
        .nav { width: 70px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; background: #030303; }
        .nav-btn { cursor: pointer; color: #333; margin-bottom: 35px; font-size: 1.5rem; transition: 0.3s; }
        .nav-btn:hover { color: var(--accent); }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top { height: 75px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 25px; background: #000; }
        .p-logo { height: 32px; cursor: pointer; }
        .lego-logo-img { height: 24px; margin-left: 20px; }
        .search-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; color: #fff; flex: 1; max-width: 400px; font-size: 0.8rem; outline: none; margin-left: 20px; }
        .dash { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, rgba(123, 53, 212, 0.05), transparent); scrollbar-width: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
        .tile { background: var(--surface); border: 1px solid var(--border); padding: 25px 10px; border-radius: 28px; text-align: center; cursor: pointer; transition: 0.4s; }
        .tile:hover { border-color: var(--accent); transform: translateY(-5px); background: #0A0A0A; }
        .tile svg { color: var(--accent); margin-bottom: 15px; }
        .tile-name { font-weight: 900; font-size: 0.65rem; letter-spacing: 2px; color: #444; text-transform: uppercase; }
        .tile:hover .tile-name { color: #fff; }
        .viewport { position: fixed; top: 0; left: 70px; right: 0; bottom: 0; background: #000; z-index: 500; display: none; flex-direction: column; }
        .vp-header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; background: #000; }
        #if { flex: 1; border: none; width: 100%; height: 100%; }
        .sidebar { position: fixed; right: -420px; top: 0; width: 400px; height: 100vh; background: #000; z-index: 1000; border-left: 1px solid var(--border); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .sidebar.active { right: 0; }
        @media(max-width: 600px) {
            .nav { width: 60px; }
            .top { padding: 0 15px; }
            .lego-logo-img { display: none; }
            .dash { padding: 20px; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .sidebar { width: 100%; right: -100%; }
            .viewport { left: 0; }
        }
    </style>
</head>
<body>
    <div class="os">
        <nav class="nav">
            <div class="nav-btn" onclick="location.href='index.html'"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></div>
            <div class="nav-btn" onclick="renderGrid()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></div>
            <div class="nav-btn" onclick="toggleSidebar()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></div>
        </nav>
        <div class="main">
            <header class="top">
                <img src="assets/p-logo.png" class="p-logo" onclick="location.href='index.html'">
                <img src="assets/leggo-logo.png" class="lego-logo-img">
                <input type="text" class="search-bar" placeholder="Enter Handle (e.g. $atelia.pri)...">
            </header>
            <div class="dash">
                <div class="viewport" id="vp">
                    <div class="vp-header">
                        <span id="vp-name" style="font-weight:900; letter-spacing:3px; font-size:0.7rem; color:var(--accent);">NODE</span>
                        <button onclick="closeNode()" style="background:none; border:none; color:#444; font-size:1.5rem; cursor:pointer;">✕</button>
                    </div>
                    <iframe id="if"></iframe>
                </div>
                <h1 style="font-weight:900; font-size:2rem; margin-bottom:30px; letter-spacing:2px;">Priscion Hub</h1>
                <div class="grid" id="grid"></div>
            </div>
        </div>
    </div>
    <div id="sidebar" class="sidebar"></div>
    <script src="wallet-core.js"></script>
    <script>
        const nodes = [
            { n: 'Jello', h: 'messenger', i: '<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-14 8.38 8.38 0 0 1 3.8.9L21 3z"></path>' },
            { n: 'Anime', h: '$dreaminganime.pri', i: '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>' },
            { n: 'Nurasen', h: '$nurasen.pri', i: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>' },
            { n: 'Atelia', h: '$atelia.pri', i: '<rect x="2" y="6" width="20" height="12" rx="2"></rect><path d="M6 12h.01M10 12h.01M15 11l2 2m0-2l-2 2"></path>' },
            { n: 'TWMK', h: '$twmk.pri', i: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>' },
            { n: 'Drum', h: '$dpanyard.pri', i: '<circle cx="12" cy="12" r="9"></circle><path d="M7 12h10M12 7v10"></path>' },
            { n: 'Riddiim', h: '$riddiim.pri', i: '<path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle>' },
            { n: 'Glow', h: '$glow.pri', i: '<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>' },
            { n: 'Peak', h: '$peakfit.pri', i: '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>' }
        ];

        const nodeMap = {
            'dreaminganime': 'dreaminganime',
            'nurasen': 'nurasen',
            'atelia': 'ateliagaming',
            'twmk': 'thewaymadeknown',
            'glow': 'glowprotocol',
            'peakfit': 'peakfit',
            'dpanyard': 'dpanyard',
            'riddiim': 'riddiim'
        };

        function renderGrid() {
            const g = document.getElementById('grid');
            if(!g) return;
            g.innerHTML = nodes.map(n => `
                <div class="tile" onclick="openNode('${n.h}', '${n.n}')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${n.i}</svg>
                    <div class="tile-name">${n.n}</div>
                </div>
            `).join('');
        }

        function openNode(h, name) {
            if(h === 'messenger') { toggleSidebar(); if(typeof renderChat === 'function') renderChat(); return; }
            const key = h.replace('$','').replace('.pri','');
            const p = nodeMap[key] || key;
            document.getElementById('vp-name').innerText = name.toUpperCase() + ' NODE';
            document.getElementById('vp').style.display = 'flex';
            document.getElementById('if').src = p + '/index.html';
        }

        function closeNode() { document.getElementById('vp').style.display='none'; document.getElementById('if').src=''; }

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            if(!s) return;
            s.classList.toggle('active');
            if(s.classList.contains('active')) {
                if(typeof initializeWallet === 'function') initializeWallet('sidebar');
            }
        }

        window.onload = renderGrid;
    </script>
</body>
</html>
