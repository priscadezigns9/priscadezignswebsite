<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HUB | Priscion OS</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap">
    <style>
        :root { --accent: #7B35D4; --bg: #000; --surface: #050505; --border: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .os { display: flex; height: 100vh; }
        .nav { width: 70px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; background: #030303; }
        .nav-btn { cursor: pointer; color: #333; margin-bottom: 35px; transition: 0.3s; font-size: 1.5rem; }
        .nav-btn:hover { color: var(--accent); }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top { height: 75px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 30px; background: #000; }
        .p-logo { height: 28px; cursor: pointer; transition: 0.3s; }
        .p-logo:hover { opacity: 0.7; }
        .search-wrap { margin-left: 20px; display: flex; align-items: center; gap: 15px; }
        .lego-logo { font-weight: 900; letter-spacing: 3px; font-size: 0.75rem; color: #333; }
        .search-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; color: #fff; width: 350px; font-size: 0.8rem; outline: none; transition: 0.3s; }
        .search-bar:focus { border-color: var(--accent); width: 400px; }
        .dash { flex: 1; padding: 50px; overflow-y: auto; background: radial-gradient(circle at top right, rgba(123, 53, 212, 0.03), transparent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 25px; }
        .tile { background: var(--surface); border: 1px solid var(--border); padding: 30px 10px; border-radius: 28px; text-align: center; cursor: pointer; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; }
        .tile:hover { border-color: var(--accent); transform: translateY(-8px); background: #080808; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .tile svg { color: var(--accent); margin-bottom: 15px; stroke-width: 2; transition: 0.4s; }
        .tile:hover svg { transform: scale(1.1); }
        .tile-name { font-size: 0.55rem; font-weight: 900; color: #444; letter-spacing: 1.5px; text-transform: uppercase; }
        .viewport { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 500; }
        .vp-header { height: 60px; border-bottom: 1px solid #111; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; background: #050505; }
        iframe { width: 100%; height: calc(100% - 60px); border: none; }
        .sidebar { position: fixed; right: -420px; top: 0; width: 400px; height: 100vh; background: #000; z-index: 1000; border-left: 1px solid var(--border); transition: 0.5s; }
        .sidebar.active { right: 0; }
    </style>
</head>
<body>
    <div class="os">
        <nav class="nav">
            <div class="nav-btn" onclick="window.location.href='/'">🏠</div>
            <div class="nav-btn" onclick="toggleSidebar()">👤</div>
        </nav>
        <div class="main">
            <header class="top">
                <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/p-logo.png" class="p-logo" onclick="window.location.href='/'">
                <div class="search-wrap">
                    <span class="lego-logo">LEGGO</span>
                    <input type="text" class="search-bar" placeholder="Enter Sovereign Handle ($name.pri)...">
                </div>
            </header>
            <div class="dash">
                <div class="viewport" id="vp">
                    <div class="vp-header">
                        <span id="vp-name" style="font-weight:900; letter-spacing:2px; font-size:0.7rem; color:var(--accent);">NODE</span>
                        <button onclick="closeNode()" style="background:none; border:none; color:#555; font-size:1.2rem; cursor:pointer;">✕</button>
                    </div>
                    <iframe id="if"></iframe>
                </div>
                <h1 style="font-weight:900; font-size:2.2rem; margin-bottom:40px; letter-spacing:-1px;">Priscion Hub</h1>
                <div class="grid" id="grid"></div>
            </div>
        </div>
    </div>
    <div id="sidebar" class="sidebar"></div>
    <script src="wallet-core.js"></script>
    <script>
        const nodes = [
            { n: "Anime", h: "$dreaminganime.pri", i: '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>' },
            { n: "Nurasen", h: "$nurasen.pri", i: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>' },
            { n: "Atelia", h: "$atelia.pri", i: '<rect x="2" y="6" width="20" height="12" rx="2"></rect><path d="M6 12h.01M10 12h.01M15 11l2 2m0-2l-2 2"></path>' },
            { n: "TWMK", h: "$twmk.pri", i: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>' },
            { n: "Drum", h: "$dpanyard.pri", i: '<circle cx="12" cy="12" r="9"></circle><path d="M7 12h10"></path><path d="M12 7v10"></path>' },
            { n: "Riddiim", h: "$riddiim.pri", i: '<path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle>' },
            { n: "Glow", h: "$glow.pri", i: '<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>' },
            { n: "Peak", h: "$peakfit.pri", i: '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>' },
            { n: "Tech", h: "$techscout.pri", i: '<circle cx="12" cy="12" r="2"></circle><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path>' },
            { n: "Estate", h: "$primeland.pri", i: '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle>' },
            { n: "Luxury", h: "$quietluxury.pri", i: '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>' },
            { n: "Autodrome", h: "$autodrome.pri", i: '<circle cx="7" cy="17" r="2"></circle><circle cx="17" cy="17" r="2"></circle><path d="M5 17h-2v-6l2-5h9l4 5h1a2 2 0 0 1 2 2v4h-2"></path>' },
            { n: "Couture", h: "$couturegallery.pri", i: '<rect x="3" y="7" width="18" height="13" rx="2"></rect><path d="M16 7V5a4 4 0 0 0-8 0v2"></path>' },
            { n: "Pantriq", h: "$pantriq.pri", i: '<path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line>' },
            { n: "Paw", h: "$pawvault.pri", i: '<path d="M11 20a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v15Z"></path><path d="M11 5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v15a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V5Z"></path>' },
            { n: "Essence", h: "$essenceelite.pri", i: '<path d="M4.5 3h15"></path><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"></path><path d="M6 14h12"></path>' },
            { n: "Escapist", h: "$theescapist.pri", i: '<path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-1.2-.3-2.4.3-2.8 1.5-.3 1.2.3 2.4 1.5 2.8L12 13l-4 4-3-1-2 2 4 1 1 4 2-2-1-3 4-4 8.2 1.8c1.2.3 2.4-.3 2.8-1.5.3-1.2-.3-2.4-1.5-2.8Z"></path>' },
            { n: "Watch", h: "$thewatchlist.pri", i: '<circle cx="12" cy="12" r="7"></circle><polyline points="12 9 12 12 13.5 13.5"></polyline><path d="M16.51 7.35l3.02-6.24"></path><path d="M16.51 16.65l3.02 6.24"></path><path d="M7.49 16.65l-3.02 6.24"></path><path d="M7.49 7.35l-3.02-6.24"></path>' },
            { n: "Verdant", h: "$verdantco.pri", i: '<path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 1.08 11.16"></path><path d="M9.5 21.3A2.4 2.4 0 0 0 12 19c0-1.2-.9-2-2-2"></path>' },
            { n: "Seamrite", h: "$seamrite.pri", i: '<circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20"></path><path d="M12 2a14.5 14.5 0 0 1 0 20"></path><path d="M2 12h20"></path>' },
            { n: "Dumpling", h: "$mybabydumpling.pri", i: '<path d="M9 12h.01"></path><path d="M15 12h.01"></path><path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"></path><path d="M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 5 6.3"></path><path d="M12 2.1a5 5 0 0 1 5 5"></path>' }
        ];

        function renderGrid() {
            document.getElementById('grid').innerHTML = nodes.map(n => `
                <div class="tile" onclick="openNode('${n.h}', '${n.n}')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">${n.i}</svg>
                    <div class="tile-name">${n.n}</div>
                </div>
            `).join('');
        }

        function openNode(h, name) {
            const p = h.replace('$','').replace('.pri','');
            document.getElementById('vp-name').innerText = name.toUpperCase();
            document.getElementById('vp').style.display='block';
            document.getElementById('if').src='/'+p+'/';
        }

        function closeNode() {
            document.getElementById('vp').style.display='none';
            document.getElementById('if').src='';
        }

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            if(!s) return;
            s.classList.toggle('active');
            if(s.classList.contains('active')) {
                if(typeof initializeWallet === 'function') initializeWallet('sidebar');
            }
        }
        window.onload = renderGrid;
    </script>
</body>
</html>
