<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LEGGO Hub | Priscion OS</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap">
    <style>
        :root { --accent: #7B35D4; --bg: #000; --surface: #0A0A0A; --border: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .os { display: flex; height: 100vh; }
        .nav { width: 70px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 25px 0; background: #050505; }
        .nav-btn { cursor: pointer; color: #444; margin-bottom: 35px; transition: 0.3s; }
        .nav-btn:hover { color: var(--accent); }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .top { height: 70px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 30px; background: #030303; }
        .p-logo { width: 30px; margin-right: 25px; }
        .search-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 20px; color: #fff; width: 350px; font-size: 0.8rem; outline: none; }
        .dash { flex: 1; padding: 50px; overflow-y: auto; background: radial-gradient(circle at top right, rgba(123, 53, 212, 0.05), transparent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
        .tile { background: var(--surface); border: 1px solid var(--border); padding: 30px 15px; border-radius: 24px; text-align: center; cursor: pointer; transition: 0.4s; }
        .tile:hover { transform: translateY(-5px); border-color: var(--accent); }
        .tile svg { color: var(--accent); margin-bottom: 12px; }
        .tile-name { font-size: 0.6rem; font-weight: 900; color: #666; letter-spacing: 1px; text-transform: uppercase; }
        .viewport { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; }
        .sidebar { position: fixed; right: -420px; top: 0; width: 400px; height: 100vh; background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(30px); border-left: 1px solid var(--border); transition: 0.5s; z-index: 1000; }
        .sidebar.active { right: 0; box-shadow: -20px 0 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="os">
        <nav class="nav">
            <div class="nav-btn" onclick="window.location.href='/'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </div>
            <div class="nav-btn" onclick="toggleSidebar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
        </nav>
        <div class="main">
            <header class="top">
                <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/p-logo.png" class="p-logo">
                <input type="text" class="search-bar" placeholder="Enter Sovereign Handle ($name.pri)...">
            </header>
            <div class="dash">
                <div class="viewport" id="viewport"><iframe id="f"></iframe></div>
                <h1 style="font-weight:900; font-size:2.5rem; margin-bottom:40px;">Priscion Hub</h1>
                <div class="grid" id="grid"></div>
            </div>
        </div>
    </div>
    <div id="sidebar" class="sidebar"></div>
    <script src="wallet-core.js"></script>
    <script>
        const nodes = [
            { n: "Anime", h: "$dreaminganime.pri", i: '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>' },
            { n: "Nurasen", h: "$nurasen.pri", i: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>' },
            { n: "Atelia", h: "$atelia.pri", i: '<rect x="2" y="6" width="20" height="12" rx="2"></rect><path d="M6 12h.01M10 12h.01M15 11l2 2m0-2l-2 2"></path>' },
            { n: "TWMK", h: "$twmk.pri", i: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>' },
            { n: "Drum", h: "$dpanyard.pri", i: '<circle cx="12" cy="12" r="9"></circle><path d="m16 7-4 5-4-5"></path>' },
            { n: "Riddiim", h: "$riddiim.pri", i: '<path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle>' },
            { n: "Glow", h: "$glow.pri", i: '<path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>' },
            { n: "Peak", h: "$peak.pri", i: '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>' },
            { n: "Tech", h: "$techscout.pri", i: '<circle cx="12" cy="12" r="2"></circle><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path>' }
        ];
        function renderGrid() {
            document.getElementById('grid').innerHTML = nodes.map(n => `
                <div class="tile" onclick="openNode('${n.h}')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${n.i}</svg>
                    <div class="tile-name">${n.n}</div>
                </div>
            `).join('');
        }
        function openNode(h) {
            const p = h.replace('$','').replace('.pri','');
            document.getElementById('viewport').style.display='block';
            document.getElementById('f').src='/'+p+'/';
        }
        function closeNode() { document.getElementById('viewport').style.display='none'; document.getElementById('f').src=''; }
        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            s.classList.toggle('active');
            if(s.classList.contains('active') && typeof initializeWallet === 'function') initializeWallet('sidebar');
        }
        window.onload = renderGrid;
    </script>
</body>
</html>
