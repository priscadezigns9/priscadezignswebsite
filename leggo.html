<!DOCTYPE html><html><head><meta charset="UTF-8"><title>HUB</title><style>
:root{--accent:#7B35D4}body{background:#000;color:#fff;font-family:sans-serif;margin:0;overflow:hidden}.os{display:flex;height:100vh}.nav{width:70px;border-right:1px solid #111;display:flex;flex-direction:column;align-items:center;padding:30px 0;background:#050505}.nav-btn{cursor:pointer;color:#444;margin-bottom:35px;font-size:1.5rem}.main{flex:1;display:flex;flex-direction:column;position:relative}.top{height:70px;border-bottom:1px solid #111;display:flex;align-items:center;padding:0 30px}.p-logo{width:30px;margin-right:25px;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:20px;padding:50px;overflow-y:auto}.tile{background:#0A0A0A;border:1px solid #111;padding:25px 10px;border-radius:24px;text-align:center;cursor:pointer;transition:0.3s}.tile:hover{border-color:var(--accent);transform:translateY(-5px)}.tile-name{font-size:.55rem;font-weight:900;color:#666;text-transform:uppercase;margin-top:10px}.viewport{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:#000;z-index:100}iframe{width:100%;height:100%;border:none}.sidebar{position:fixed;right:-420px;top:0;width:400px;height:100vh;background:#000;transition:.5s;z-index:1000;border-left:1px solid #111}.sidebar.active{right:0}</style></head><body><div class="os"><nav class="nav"><div class="nav-btn" onclick="window.location.href='/'">🏠</div><div class="nav-btn" onclick="toggleSidebar()">👤</div></nav><div class="main"><header class="top"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/p-logo.png" class="p-logo" onclick="window.location.href='/'"><input type="text" style="background:#0A0A0A;border:1px solid #111;color:#fff;padding:10px;border-radius:10px;width:300px;outline:none;" placeholder="Search handles..."></header><div class="grid" id="grid"></div><div class="viewport" id="vp"><iframe id="if"></iframe></div></div></div><div id="sidebar" class="sidebar"></div><script src="wallet-core.js"></script><script>const nodes=[{n:"Anime",h:"$dreaminganime.pri",i:"⛩️"},{n:"Nurasen",h:"$nurasen.pri",i:"🛡️"},{n:"Atelia",h:"$atelia.pri",i:"🎮"},{n:"TWMK",h:"$twmk.pri",i:"📖"},{n:"Drum",h:"$dpanyard.pri",i:"🥁"},{n:"Riddiim",h:"$riddiim.pri",i:"🎵"},{n:"Glow",h:"$glow.pri",i:"✨"},{n:"Peak",h:"$peakfit.pri",i:"⚡"},{n:"Tech",h:"$techscout.pri",i:"📡"},{n:"Estate",h:"$primeland.pri",i:"🗺️"},{n:"Luxury",h:"$quietluxury.pri",i:"🏡"},{n:"Autodrome",h:"$autodrome.pri",i:"🏎️"},{n:"Couture",h:"$couturegallery.pri",i:"👜"},{n:"Pantriq",h:"$pantriq.pri",i:"🍳"},{n:"Paw",h:"$pawvault.pri",i:"🐾"},{n:"Essence",h:"$essenceelite.pri",i:"🧪"},{n:"Escapist",h:"$theescapist.pri",i:"✈️"},{n:"Watch",h:"$thewatchlist.pri",i:"⌚"},{n:"Verdant",h:"$verdantco.pri",i:"🌿"},{n:"Seamrite",h:"$seamrite.pri",i:"🧵"},{n:"Dumpling",h:"$mybabydumpling.pri",i:"👶"}];function render(){document.getElementById('grid').innerHTML=nodes.map(n=>`<div class="tile" onclick="openNode('${n.h}')"><div>${n.i}</div><div class="tile-name">${n.n}</div></div>`).join('')}function openNode(h){const p=h.replace('$','').replace('.pri','');document.getElementById('vp').style.display='block';document.getElementById('if').src='/'+p+'/'}function toggleSidebar(){const s=document.getElementById('sidebar');s.classList.toggle('active');if(s.classList.contains('active'))initializeWallet('sidebar')}window.onload=render;</script></body></html>
