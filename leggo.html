<!DOCTYPE html>
<html lang="en">
<!-- LEGGO OS v3.1 [Sovereign Neural Explorer] -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LEGGO | Sovereign Neural Explorer</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://drive.google.com/uc?export=view&id=193pUxHOFUbhIikKeER5I3LlUF9473feh">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --text: #FFFFFF;
            --muted: #888888;
            --accent: #7B35D4;
            --gold: #D4AF37;
            --border: rgba(255, 255, 255, 0.1);
            --neural-glow: rgba(123, 53, 212, 0.2);
            --safe-green: #00ff88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

        .browser-container {
            display: grid; grid-template-rows: auto 1fr;
            height: 100vh; width: 100vw;
        }

        header {
            background: var(--surface); padding: 12px 3%;
            display: flex; align-items: center; gap: 20px;
            border-bottom: 1px solid var(--border); z-index: 1000;
        }

        .browser-controls { display: flex; gap: 15px; color: var(--muted); font-size: 1rem; cursor: pointer; }
        
        .address-bar {
            flex: 1; background: #000; border-radius: 40px; padding: 8px 20px;
            display: flex; align-items: center; gap: 12px; border: 1px solid var(--border); transition: 0.3s;
        }
        .address-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 15px var(--neural-glow); }
        
        .handle-indicator { color: var(--accent); font-weight: 800; font-size: 0.65rem; letter-spacing: 2px; }
        .address-bar input { flex: 1; border: none; background: transparent; font-size: 0.9rem; font-weight: 600; outline: none; color: #fff; }
        
        .wallet-trigger {
            display: flex; align-items: center; gap: 10px; background: rgba(123, 53, 212, 0.1);
            padding: 6px 15px; border-radius: 40px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s;
        }
        .wallet-trigger:hover { background: var(--accent); }
        .wallet-trigger img { width: 22px; height: 22px; border-radius: 50%; border: 1px solid white; }
        .wallet-trigger span { font-weight: 800; font-size: 0.65rem; letter-spacing: 1px; color: #fff; }

        main {
            position: relative;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center;
            overflow-y: auto; padding-top: 15vh;
        }

        .hero-logo { width: 100px; margin-bottom: 25px; filter: drop-shadow(0 0 40px var(--neural-glow)); }
        .tagline { color: var(--accent); font-size: 0.65rem; letter-spacing: 8px; text-transform: uppercase; font-weight: 900; margin-bottom: 30px; }

        .search-container { width: 90%; max-width: 650px; position: relative; z-index: 10; margin-bottom: 60px; }
        #mainSearch {
            width: 100%; padding: 20px 35px; border-radius: 50px; border: 1px solid var(--border);
            background: rgba(15, 15, 15, 0.8); color: #fff; font-size: 1.1rem; outline: none;
            backdrop-filter: blur(10px); box-shadow: 0 15px 40px rgba(0,0,0,0.5); transition: 0.3s;
        }
        #mainSearch:focus { border-color: var(--accent); box-shadow: 0 0 30px var(--neural-glow); }
        .search-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: var(--accent); border: none; padding: 12px 25px; border-radius: 40px;
            color: white; font-weight: 800; cursor: pointer; letter-spacing: 1px; font-size: 0.8rem;
        }

        /* Affiliate Hub In-Browser */
        .app-hub { width: 90%; max-width: 1000px; padding-bottom: 100px; }
        .hub-title { font-family: 'Playfair Display'; font-size: 1.5rem; margin-bottom: 30px; text-align: center; letter-spacing: 1px; }
        .hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .hub-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 25px;
            text-align: center; transition: 0.3s; cursor: pointer; text-decoration: none; color: inherit;
        }
        .hub-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .hub-card img { width: 50px; height: 50px; border-radius: 50%; margin-bottom: 15px; border: 1px solid var(--border); }

        /* Nurasen Shield - FIXED Position */
        .nurasen-shield {
            position: fixed; bottom: 100px; right: 30px;
            display: flex; align-items: center; gap: 10px;
            background: rgba(0, 255, 136, 0.1); border: 1px solid var(--safe-green);
            padding: 10px 20px; border-radius: 30px; z-index: 2000; cursor: pointer; transition: 0.3s;
        }

        /* Floating Nav Bar */
        .node-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.8); border: 1px solid var(--border);
            padding: 10px 25px; border-radius: 50px; display: flex; gap: 20px;
            backdrop-filter: blur(20px); z-index: 1000;
        }
        .dock-item { width: 44px; height: 44px; border-radius: 50%; cursor: pointer; transition: 0.3s; overflow: hidden; border: 1px solid var(--border); }
        .dock-item img { width: 100%; height: 100%; object-fit: cover; }
        .dock-item:hover { transform: translateY(-10px) scale(1.2); border-color: var(--accent); }

        /* Settings & Wallet Sidebar */
        .wallet-sidebar {
            position: fixed; top: 0; right: 0; width: 400px; height: 100%;
            background: var(--surface); border-left: 1px solid var(--border);
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 2000; display: flex; flex-direction: column; box-shadow: -20px 0 60px rgba(0,0,0,0.8);
        }
        .wallet-sidebar.active { transform: translateX(0); }

    </style>
</head>
<body>

    <div class="nurasen-shield" onclick="window.location.href='nurasen/index.html'">
        <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/nurasen_icon.jpg" style="width:20px; border-radius:50%;">
        <span style="font-size:0.6rem; font-weight:900; color:var(--safe-green); letter-spacing:1px;">NURASEN PROTECTED</span>
    </div>

    <div class="browser-container">
        <header>
            <div class="browser-controls">
                <span onclick="history.back()">◀</span> <span onclick="location.reload()">↻</span>
            </div>
            <div class="address-bar">
                <span class="handle-indicator">LEGGO://</span>
                <input type="text" id="urlInput" placeholder="Enter .prn handle..." value="$priscion.prn">
            </div>
            <div class="wallet-trigger" onclick="toggleSidebar()">
                <img src="https://drive.google.com/uc?export=view&id=193pUxHOFUbhIikKeER5I3LlUF9473feh">
                <span>$PRISCA.PRN</span>
            </div>
            <div style="cursor:pointer;" onclick="toggleSettings()">⚙️</div>
        </header>

        <main>
            <img src="https://drive.google.com/uc?export=view&id=193pUxHOFUbhIikKeER5I3LlUF9473feh" class="hero-logo">
            <div class="tagline">Neural Explorer v3.1</div>
            
            <div class="search-container">
                <input type="text" id="mainSearch" placeholder="Search the Sovereign Ledger or the Web...">
                <button class="search-btn" onclick="resolve()">EXPLORE</button>
            </div>

            <div class="app-hub">
                <h2 class="hub-title">Sovereign App Ecosystem</h2>
                <div class="hub-grid">
                    <a href="ateliagaming/index.html" class="hub-card">
                        <img src="https://drive.google.com/uc?export=view&id=11BZOAz1dm9ALneaf-gOA3aGx0pGKM5gd">
                        <h3>Atelia Gaming</h3>
                        <p style="font-size:0.65rem; color:var(--muted); margin-top:5px;">Hardware & Play</p>
                    </a>
                    <a href="dreaminganime/index.html" class="hub-card">
                        <img src="https://drive.google.com/uc?export=view&id=1LKlvVSg4UJB0T0Qb1fyVPs6COTmtDSko">
                        <h3>Dreaming Anime</h3>
                        <p style="font-size:0.65rem; color:var(--muted); margin-top:5px;">Media & Culture</p>
                    </a>
                    <a href="calalloo/index.html" class="hub-card">
                        <img src="https://drive.google.com/uc?export=view&id=1MOdc4fha-Guqo1X3Y8l9JdlBuMdDuuzB">
                        <h3>Calalloo</h3>
                        <p style="font-size:0.65rem; color:var(--muted); margin-top:5px;">Heritage Social</p>
                    </a>
                    <a href="riddiim/index.html" class="hub-card">
                        <img src="https://drive.google.com/uc?export=view&id=1EPmsqgYmNoom_B1ptQ4Hghu5HPDg4xmL">
                        <h3>Riddiim Studio</h3>
                        <p style="font-size:0.65rem; color:var(--muted); margin-top:5px;">Audio Engine</p>
                    </a>
                </div>
            </div>
        </main>
    </div>

    <!-- Node Dock -->
    <div class="node-dock">
        <div class="dock-item" onclick="window.location.href='ateliagaming/index.html'"><img src="https://drive.google.com/uc?export=view&id=11BZOAz1dm9ALneaf-gOA3aGx0pGKM5gd"></div>
        <div class="dock-item" onclick="window.location.href='dreaminganime/index.html'"><img src="https://drive.google.com/uc?export=view&id=1LKlvVSg4UJB0T0Qb1fyVPs6COTmtDSko"></div>
        <div class="dock-item" onclick="window.location.href='calalloo/index.html'"><img src="https://drive.google.com/uc?export=view&id=1MOdc4fha-Guqo1X3Y8l9JdlBuMdDuuzB"></div>
        <div class="dock-item" onclick="window.location.href='riddiim/index.html'"><img src="https://drive.google.com/uc?export=view&id=1EPmsqgYmNoom_B1ptQ4Hghu5HPDg4xmL"></div>
    </div>

    <div class="wallet-sidebar" id="sidebar">
        <!-- Unified Sidebar Content same as index.html -->
        <div style="padding:25px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;">
            <h2 style="font-family:'Playfair Display';">Neural Vault</h2>
            <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:1.5rem;">&times;</button>
        </div>
        <div style="flex:1; padding:25px; overflow-y:auto;" id="wallet-view">
            <!-- Asset rendering via JS -->
        </div>
    </div>

    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); renderWallet(); }
        function toggleSettings() { alert('Settings Hub initialized. Choose Engine: Brave/Google/DuckDuckGo'); }
        
        function resolve() {
            const input = document.getElementById('mainSearch').value;
            if(input.includes('.prn')) {
                const handle = input.replace('$', '').replace('.prn', '');
                const routes = {'ateliagaming':'ateliagaming/index.html', 'dreaminganime':'dreaminganime/index.html'};
                if(routes[handle]) { window.location.href = routes[handle]; return; }
            }
            window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(input);
        }

        function renderWallet() {
            const view = document.getElementById('wallet-view');
            const savedPFP = localStorage.getItem('user_pfp') || '';
            view.innerHTML = `
                <div style="text-align:center; margin-bottom:30px;">
                    <div style="width:70px; height:70px; border-radius:50%; border:2px solid var(--accent); margin:0 auto 10px; overflow:hidden; background:#111; display:flex; align-items:center; justify-content:center;">
                        ${savedPFP ? `<img src="${savedPFP}" style="width:100%; height:100%; object-fit:cover;">` : `<span style="font-size:1.5rem;">👤</span>`}
                    </div>
                    <div style="font-weight:900;">$prisca.prn</div>
                </div>
                <div style="background:#000; border:1px solid var(--border); border-radius:15px; padding:15px; margin-bottom:10px; display:flex; align-items:center; gap:12px;">
                    <img src="https://drive.google.com/uc?export=view&id=1Q3xqSqxA5QciLWWAXEXzDSUTWNiJzeI4" style="width:30px; border-radius:50%;">
                    <div><div style="font-weight:800; font-size:0.75rem;">$PRN</div><div style="font-size:0.6rem; color:var(--muted);">2,540.00</div></div>
                </div>
            `;
        }

        document.getElementById('mainSearch').addEventListener('keypress', (e) => { if(e.key === 'Enter') resolve(); });
    </script>
</body>
</html>
