<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGGO OS | Sovereign Neural Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;700;900&family=Space+Mono&display=swap">
    <style>
        :root { --pr-purple: #7B35D4; --pr-black: #000; --pr-dark: #050505; }
        body { background: var(--pr-black); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .explorer-container { display: flex; height: 100vh; }
        .sidebar-nav { width: 80px; background: var(--pr-dark); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        .nav-icon { width: 40px; height: 40px; margin-bottom: 25px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .nav-icon:hover { opacity: 1; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .search-bar-container { padding: 40px 10%; background: var(--pr-black); }
        .search-bar { background: #111; border: 1px solid #222; border-radius: 50px; padding: 15px 30px; display: flex; align-items: center; }
        .search-bar input { background: none; border: none; color: white; width: 100%; padding-left: 15px; font-size: 1.1rem; outline: none; }
        .results-grid { flex: 1; overflow-y: auto; padding: 20px 10%; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .node-tile { background: #050505; border: 1px solid rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; }
        .node-tile:hover { border-color: var(--pr-purple); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(123,53,212,0.1); }
        .node-icon { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--pr-purple); margin-bottom: 15px; }
        .node-name { font-weight: 900; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .node-handle { font-size: 0.5rem; color: var(--pr-purple); margin-top: 5px; font-weight: 800; }
        .saas-badge { position: absolute; top: 10px; right: 10px; font-size: 0.4rem; background: var(--pr-purple); color: white; padding: 2px 6px; border-radius: 10px; font-weight: 900; }
    </style>
</head>
<body>
    <div class="explorer-container">
        <div class="sidebar-nav">
            <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/priscion_primary_small.jpg" style="width:30px; margin-bottom:40px;">
            <div class="nav-icon" title="Explorer">🌐</div>
            <div class="nav-icon" title="Shield">🛡️</div>
            <div class="nav-icon" onclick="toggleSidebar()" title="Wallet">💳</div>
        </div>
        <div class="main-content">
            <div class="search-bar-container">
                <div class="search-bar">
                    <span>🔍</span>
                    <input type="text" id="search-input" placeholder="Enter Sovereign Handle (e.g. $atelia.prn)..." onkeyup="handleSearch(event)">
                </div>
            </div>
            <div class="results-grid" id="node-grid"></div>
        </div>
    </div>

    <!-- Sovereign Wallet Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2 id="sidebar-title">PRISCION WALLET</h2>
            <button onclick="toggleSidebar()" class="close-btn">&times;</button>
        </div>
        <div class="sidebar-tabs">
            <button id="tab-assets" onclick="switchWalletTabCore('assets')">Assets</button>
            <button id="tab-vault" onclick="switchWalletTabCore('vault')">Vault</button>
            <button id="tab-shop" onclick="switchWalletTabCore('shop')">Hub</button>
            <button id="tab-sync" onclick="switchWalletTabCore('sync')">Settings</button>
        </div>
        <div class="sidebar-content" id="wallet-main-view"></div>
    </div>

    <script src="wallet-core.js"></script>
    <script>
        const nodes = [
            { name: 'ATELIA GAMING', handle: '$atelia.prn', url: '/ateliagaming/', logo: 'https://drive.google.com/uc?export=view&id=11BZOAz1dm9ALneaf-gOA3aGx0pGKM5gd' },
            { name: 'DREAMING ANIME', handle: '$dreaming.prn', url: '/dreaminganime/', logo: 'https://drive.google.com/uc?export=view&id=1LKlvVSg4UJB0T0Qb1fyVPs6COTmtDSko' },
            { name: 'RIDDIIM STUDIO', handle: '$riddiim.prn', url: '/riddiim/', logo: 'https://drive.google.com/uc?export=view&id=1gDFu34kqiGtiFqqgXR9bplqipa0QkJVT' },
            { name: 'CALALLOO HUB', handle: '$calalloo.prn', url: '/calalloo/', logo: 'https://drive.google.com/uc?export=view&id=1MOdc4fha-Guqo1X3Y8l9JdlBuMdDuuzB' },
            { name: 'NURASEN SECURITY', handle: '$nurasen.prn', url: '/nurasen/', logo: 'https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/nurasen_icon.jpg' },
            { name: 'VERDANT CO', handle: '$verdant.prn', url: '/verdantco/', icon: '🌱' },
            { name: 'GLOW PROTOCOL', handle: '$glow.prn', url: '/glowprotocol/', icon: '🧴' },
            { name: 'SOLE PRESTIGE', handle: '$sole.prn', url: '/soleprestige/', icon: '👟' },
            { name: 'CUPYX', handle: '$cupyx.prn', url: '/cupyx/', icon: '☕', isSaaS: true },
            { name: 'MOBLYNC', handle: '$moblync.prn', url: '/moblync/', icon: '📱', isSaaS: true },
            { name: 'KARJOV', handle: '$karjov.prn', url: '/karjov/', icon: '⚔️', isSaaS: true },
            { name: 'ROWCELL', handle: '$rowcell.prn', url: '/rowcell/', icon: '🌹', isSaaS: true },
            { name: 'VELLOQ', handle: '$velloq.prn', url: '/velloq/', icon: '⚡', isSaaS: true }
        ];

        function renderGrid(list) {
            const grid = document.getElementById('node-grid');
            grid.innerHTML = list.map(n => `
                <div class="node-tile" onclick="window.location.href='${n.url}'">
                    ${n.isSaaS ? '<span class="saas-badge">SAAS</span>' : ''}
                    ${n.logo ? \`<img src="${n.logo}" class="node-icon">\` : \`<div style="font-size:2.5rem; margin-bottom:15px;">\${n.icon}</div>\`}
                    <div class="node-name">${n.name}</div>
                    <div class="node-handle">${n.handle}</div>
                </div>
            `).join('');
        }

        function handleSearch(e) {
            const val = e.target.value.toLowerCase();
            if (e.key === 'Enter' && val.startsWith('$') && val.endsWith('.prn')) {
                const node = nodes.find(n => n.handle === val);
                if (node) window.location.href = node.url;
                else alert("Sovereign Handle not resolved on current Ledger.");
            } else {
                const filtered = nodes.filter(n => n.name.toLowerCase().includes(val) || n.handle.includes(val));
                renderGrid(filtered);
            }
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('active');
            if(sb.classList.contains('active')) initializeWallet('sidebar');
        }

        renderGrid(nodes);
    </script>
</body>
</html>
