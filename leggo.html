<!DOCTYPE html><html><head><meta charset="UTF-8"><title>LEGGO Hub</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@400;900&family=Space+Mono:wght@700&display=swap"><style>:root{--accent:#7B35D4;--bg:#000}body{background:var(--bg);color:#fff;font-family:Inter,sans-serif;margin:0;overflow:hidden}.os{display:flex;height:100vh}.nav{width:70px;border-right:1px solid #111;display:flex;flex-direction:column;align-items:center;padding:20px}.main{flex:1;display:flex;flex-direction:column}.top{height:60px;border-bottom:1px solid #111;display:flex;align-items:center;padding:0 20px}.dash{flex:1;padding:40px;position:relative;overflow-y:auto}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:20px}.tile{background:rgba(255,255,255,0.05);padding:20px;border-radius:20px;text-align:center;cursor:pointer;border:1px solid #222}.viewport{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:#fff;z-index:10}iframe{width:100%;height:100%;border:none}.addt{background:#111;color:var(--accent);padding:5px 15px;border-radius:5px;font-family:Space Mono;font-size:.7rem;display:none;align-items:center;gap:10px}.sidebar{position:fixed;right:-400px;top:0;width:400px;height:100vh;background:rgba(5,5,5,0.98);backdrop-filter:blur(25px);border-left:1px solid #222;z-index:10000;transition:.5s;padding:20px}.sidebar.active{right:0}</style></head><body><div class="os"><nav class="nav"><div onclick="closeNode()" style="cursor:pointer;font-size:1.5rem">🏠</div><div onclick="toggleSidebar()" style="cursor:pointer;margin-top:20px"><img src="assets/p-logo.png" style="width:25px; opacity:0.5; transition:0.3s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.5"></div></nav><div class="main"><header class="top"><input type="text" onkeydown="h(event)" placeholder="Search Sovereign Handles..." style="background:#0d0d0d; border:1px solid #222; border-radius:100px; padding:10px 25px; color:white; width:300px; font-size:0.8rem; outline:none; font-family:Inter; margin-left:20px;"><div id="addr" class="addr"><span id="ind"></span><span onclick="closeNode()" style="cursor:pointer;margin-left:10px">✕</span></div><div style="margin-left:auto;display:flex;gap:20px;font-family:Space Mono;font-size:.7rem;color:#444">PRN: <span id="top-prn-balance" style="color:#00FF88">0</span></div></header><div class="dash" id="dash"><div class="viewport" id="v"><iframe id="f"></iframe></div><h2 style="font-family:Playfair Display;font-size:2.5rem">Welcome, Architect.</h2><div class="grid" id="g"></div></div></div></div><div id="sidebar" class="sidebar"><h2 style="color:#fff;font-family:Playfair Display">PRISCION WALLET</h2><div id="wallet-main-view"></div></div><script src="wallet-core.js"></script><script>function toggleSidebar(){document.getElementById('sidebar').classList.toggle('active')}async function load(){const r=await fetch('vault_manifest.json');const d=await r.json();const n=d.filter(i=>i.type==="Empire/Node");const icons={"dreaminganime":"⛩️","ateliagaming":"🎮","nurasen":"🛡️","thewaymadeknown":"📖","dpanyard":"🥁","riddiim":"🎵","glowprotocol":"✨","peakfit":"⚡","soleprestige":"👟","essenceelite":"🧪","theescapist":"🌴","thetechscouthq":"📡","quietluxury":"🏡","primeland":"🗺️","autodrome":"🏎️","pawvault":"🐾","pantriq":"🍳","mybabydumpling":"👶","thewatchlist":"⌚","shelfly":"📚","deskwell":"🖥️","thegenplay":"🧸","seamritedesigns":"🪡","couturegallery":"👜","verdantco":"🌿","priscion":"🏯"};document.getElementById('g').innerHTML=n.map(n=>{const b=n.id.replace('node_','');return `<div onclick="go('${n.handle}')" class="tile"><div style="font-size:1.5rem">${icons[b]||'💠'}</div><div style="font-size:.5rem;font-weight:800;color:#888;text-transform:uppercase;margin-top:10px">${n.name}</div></div>`}).join('')}function go(h){const p=h.replace('$','').replace('.prn','');const v=document.getElementById('v'),f=document.getElementById('f'),a=document.getElementById('addr'),t=document.getElementById('ind');v.style.display='block';if(p==='dreaminganime'){f.src='/dreaminganime/cinema.html';}else{f.src='/'+p+'/';}t.innerText=h;a.style.display='flex';history.pushState(null,'','?node='+h);if(typeof recordSearch==='function')recordSearch()}function closeNode(){document.getElementById('v').style.display='none';document.getElementById('addr').style.display='none';history.pushState(null,'','/leggo.html')}function h(e){if(e.key==='Enter'){const v=e.target.value;if(v.startsWith('$')&&v.endsWith('.prn')){go(v)}else{if(typeof recordSearch==='function')recordSearch();window.location.href='search.html?q='+encodeURIComponent(v)}}}window.onload=()=>{load();if(typeof initializeWallet==="function")initializeWallet("sidebar");}</script></body></html>
