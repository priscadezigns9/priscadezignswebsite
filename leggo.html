<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGGO Hub | Priscion OS</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap">
    <style>
        :root { --accent: #7B35D4; --bg: #000; --surface: #0A0A0A; --border: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .os { display: flex; height: 100vh; }
        .nav { width: 70px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 25px 0; background: #050505; }
        .nav-btn { cursor: pointer; color: #444; margin-bottom: 35px; transition: 0.3s; }
        .nav-btn:hover { color: var(--accent); }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .top { height: 70px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 30px; background: #030303; }
        .p-logo { width: 30px; margin-right: 25px; }
        .search-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 20px; color: #fff; width: 350px; font-size: 0.8rem; outline: none; }
        .dash { flex: 1; padding: 50px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
        .tile { background: var(--surface); border: 1px solid var(--border); padding: 25px 15px; border-radius: 24px; text-align: center; cursor: pointer; transition: 0.4s; }
        .tile:hover { transform: translateY(-5px); border-color: var(--accent); }
        .tile svg { color: var(--accent); margin-bottom: 12px; }
        .tile-name { font-size: 0.6rem; font-weight: 900; color: #666; letter-spacing: 1px; text-transform: uppercase; }
        .viewport { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; }
        .sidebar { position: fixed; right: -420px; top: 0; width: 400px; height: 100vh; background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(30px); border-left: 1px solid var(--border); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; }
        .sidebar.active { right: 0; }
    </style>
</head>
<body>
    <div class="os">
        <nav class="nav">
            <div class="nav-btn" onclick="closeNode()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </div>
            <div class="nav-btn" onclick="toggleSidebar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
        </nav>
        <div class="main">
            <header class="top">
                <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/p-logo.png" class="p-logo">
                <input type="text" class="search-bar" placeholder="Enter Sovereign Handle ($name.pri)..." onkeydown="if(event.key==='Enter')openNode(this.value)">
            </header>
            <div class="dash">
                <div class="viewport" id="viewport"><iframe id="node-frame"></iframe></div>
                <h1 style="font-weight:900; font-size:2rem; margin-bottom:40px;">Priscion Hub</h1>
                <div class="grid" id="grid"></div>
            </div>
        </div>
    </div>
    <div id="sidebar" class="sidebar"></div>
    <script src="wallet-core.js"></script>
    <script>
        const nodes = [
            { name: "Dreaming Anime", handle: "$dreaminganime.pri" },
            { name: "Nurasen", handle: "$nurasen.pri" },
            { name: "Atelia Gaming", handle: "$atelia.pri" },
            { name: "TWMK", handle: "$twmk.pri" },
            { name: "D'Panyard", handle: "$dpanyard.pri" },
            { name: "Riddiim", handle: "$riddiim.pri" }
        ];
        function renderGrid() {
            document.getElementById('grid').innerHTML = nodes.map(n => `
                <div class="tile" onclick="openNode('${n.handle}')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                    <div class="tile-name">${n.name}</div>
                </div>
            `).join('');
        }
        function openNode(h) {
            const p = h.replace('$','').replace('.pri','');
            document.getElementById('viewport').style.display='block';
            document.getElementById('node-frame').src='/'+p+'/';
        }
        function closeNode() {
            document.getElementById('viewport').style.display='none';
            document.getElementById('node-frame').src='';
        }
        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            s.classList.toggle('active');
            if(s.classList.contains('active')) {
                if(typeof initializeWallet === 'function') initializeWallet('sidebar');
            }
        }
        window.onload = renderGrid;
    </script>
</body>
</html>
