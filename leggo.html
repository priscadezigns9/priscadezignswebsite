<!DOCTYPE html>
<html lang="en">
<!-- LEGGO OS v3.3 [Sovereign Neural Explorer] -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LEGGO | Sovereign Neural Explorer</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://drive.google.com/uc?export=view&id=1YMkt8FVv4RwG3zLmEw-DfycGg7G9S-7E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="wallet-core.js"></script>
    
    <style>
        :root {
            --bg: #050505; --surface: #0f0f0f; --text: #FFFFFF; --muted: #888888; --accent: #7B35D4; --border: rgba(255, 255, 255, 0.1); --glow: rgba(123, 53, 212, 0.2); --safe-green: #00ff88;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
        .browser-container { display: grid; grid-template-rows: auto 1fr; height: 100vh; width: 100vw; }
        header { background: var(--surface); padding: 12px 3%; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid var(--border); z-index: 1000; }
        .browser-controls { display: flex; gap: 15px; color: var(--muted); font-size: 1rem; cursor: pointer; }
        .address-bar { flex: 1; background: #000; border-radius: 40px; padding: 8px 20px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border); transition: 0.3s; }
        .address-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 15px var(--glow); }
        .handle-indicator { color: var(--accent); font-weight: 800; font-size: 0.65rem; letter-spacing: 2px; }
        .address-bar input { flex: 1; border: none; background: transparent; font-size: 0.9rem; font-weight: 600; outline: none; color: #fff; }
        .wallet-trigger { display: flex; align-items: center; gap: 10px; background: rgba(123, 53, 212, 0.1); padding: 6px 15px; border-radius: 40px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; }
        .wallet-trigger img { width: 22px; height: 22px; border-radius: 50%; border: 1px solid white; }
        main { position: relative; background: radial-gradient(circle at center, #111 0%, #000 100%); display: flex; flex-direction: column; align-items: center; overflow-y: auto; padding-top: 10vh; }
        .hero-logo { width: 100px; margin-bottom: 25px; filter: drop-shadow(0 0 40px var(--glow)); }
        .search-container { width: 90%; max-width: 650px; position: relative; z-index: 10; margin-bottom: 60px; }
        #mainSearch { width: 100%; padding: 20px 35px; border-radius: 50px; border: 1px solid var(--border); background: rgba(15, 15, 15, 0.8); color: #fff; font-size: 1.1rem; outline: none; backdrop-filter: blur(10px); box-shadow: 0 15px 40px rgba(0,0,0,0.5); transition: 0.3s; }
        .search-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--accent); border: none; padding: 12px 25px; border-radius: 40px; color: white; font-weight: 800; cursor: pointer; font-size: 0.8rem; }
        .app-hub { width: 90%; max-width: 1000px; padding-bottom: 150px; }
        .hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .hub-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 30px; text-align: center; transition: 0.3s; cursor: pointer; text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hub-card img { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 15px; border: 1px solid var(--border); object-fit: cover; }
        .nurasen-shield { position: fixed; bottom: 100px; right: 30px; display: flex; align-items: center; gap: 10px; background: rgba(0, 255, 136, 0.1); border: 1px solid var(--safe-green); padding: 10px 20px; border-radius: 30px; z-index: 2000; cursor: pointer; transition: 0.3s; }
        .node-dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(15, 15, 15, 0.8); border: 1px solid var(--border); padding: 10px 25px; border-radius: 50px; display: flex; gap: 20px; backdrop-filter: blur(20px); z-index: 1000; }
        .dock-item { width: 44px; height: 44px; border-radius: 50%; cursor: pointer; transition: 0.3s; overflow: hidden; border: 1px solid var(--border); }
        .dock-item img { width: 100%; height: 100%; object-fit: cover; }
        .wallet-sidebar { position: fixed; top: 0; right: 0; width: 420px; height: 100%; background: var(--surface); border-left: 1px solid var(--border); transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1); z-index: 2000; display: flex; flex-direction: column; box-shadow: -20px 0 60px rgba(0,0,0,0.8); }
        .wallet-sidebar.active { transform: translateX(0); }
        .sidebar-header { padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-content { flex: 1; padding: 25px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="nurasen-shield" onclick="window.location.href='nurasen/index.html'">
        <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/nurasen_icon.jpg" style="width:20px; border-radius:50%;">
        <span style="font-size:0.6rem; font-weight:900; color:var(--safe-green); letter-spacing:1px;">NURASEN PROTECTED</span>
    </div>

    <div class="browser-container">
        <header>
            <div class="browser-controls"><span onclick="history.back()">◀</span> <span onclick="location.reload()">↻</span></div>
            <div class="address-bar">
                <span class="handle-indicator">LEGGO://</span>
                <input type="text" id="urlInput" placeholder="Enter .prn handle..." value="$priscion.prn">
            </div>
            <div class="wallet-trigger" onclick="toggleSidebar()">
                <img src="https://drive.google.com/uc?export=view&id=1YMkt8FVv4RwG3zLmEw-DfycGg7G9S-7E">
                <span style="font-weight:800; font-size:0.65rem; color:#fff;">$PRISCA.PRN</span>
            </div>
            <div style="cursor:pointer;" onclick="alert('Settings Hub: Neural v3.3')">⚙️</div>
        </header>

        <main>
            <img src="https://drive.google.com/uc?export=view&id=1YMkt8FVv4RwG3zLmEw-DfycGg7G9S-7E" class="hero-logo">
            <div style="color:var(--accent); font-size:0.65rem; letter-spacing:8px; text-transform:uppercase; font-weight:900; margin-bottom:30px;">Neural Explorer v3.3</div>
            <div class="search-container">
                <input type="text" id="mainSearch" placeholder="Search the Sovereign Ledger or the Web...">
                <button class="search-btn" onclick="resolve()">EXPLORE</button>
            </div>
            <div class="app-hub">
                <div class="hub-grid">
                    <a href="ateliagaming/index.html" class="hub-card"><img src="https://drive.google.com/uc?export=view&id=1d0RGyRxGX4K-tK-KrWofcduDRB-SYrCE"><h3>Atelia</h3></a>
                    <a href="dreaminganime/index.html" class="hub-card"><img src="https://drive.google.com/uc?export=view&id=1LKlvVSg4UJB0T0Qb1fyVPs6COTmtDSko"><h3>Dreaming</h3></a>
                    <a href="calalloo/index.html" class="hub-card"><img src="https://drive.google.com/uc?export=view&id=1MOdc4fha-Guqo1X3Y8l9JdlBuMdDuuzB"><h3>Calalloo</h3></a>
                    <a href="riddiim/index.html" class="hub-card"><img src="https://drive.google.com/uc?export=view&id=1EPmsqgYmNoom_B1ptQ4Hghu5HPDg4xmL"><h3>Riddiim</h3></a>
                </div>
            </div>
        </main>
    </div>

    <div class="node-dock">
        <div class="dock-item" onclick="window.location.href='ateliagaming/index.html'"><img src="https://drive.google.com/uc?export=view&id=1d0RGyRxGX4K-tK-KrWofcduDRB-SYrCE"></div>
        <div class="dock-item" onclick="window.location.href='dreaminganime/index.html'"><img src="https://drive.google.com/uc?export=view&id=1LKlvVSg4UJB0T0Qb1fyVPs6COTmtDSko"></div>
        <div class="dock-item" onclick="window.location.href='calalloo/index.html'"><img src="https://drive.google.com/uc?export=view&id=1MOdc4fha-Guqo1X3Y8l9JdlBuMdDuuzB"></div>
        <div class="dock-item" onclick="window.location.href='riddiim/index.html'"><img src="https://drive.google.com/uc?export=view&id=1EPmsqgYmNoom_B1ptQ4Hghu5HPDg4xmL"></div>
    </div>

    <div class="wallet-sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 style="font-family:'Playfair Display'; font-size:1.2rem;">Neural Vault</h2>
            <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;">&times;</button>
        </div>
        <div class="sidebar-content" id="wallet-main-view"></div>
        <div style="display:grid; grid-template-columns:repeat(4, 1fr); border-top:1px solid var(--border);">
            <button onclick="switchWalletTabCore('assets')" id="tab-assets" style="padding:15px; background:none; border:none; color:var(--accent); font-weight:900; font-size:0.6rem; border-top:2px solid var(--accent);">ASSETS</button>
            <button onclick="switchWalletTabCore('vault')" id="tab-vault" style="padding:15px; background:none; border:none; color:var(--muted); font-weight:800; font-size:0.6rem;">VAULT</button>
            <button onclick="switchWalletTabCore('shop')" id="tab-shop" style="padding:15px; background:none; border:none; color:var(--muted); font-weight:800; font-size:0.6rem;">HUB</button>
            <button onclick="switchWalletTabCore('sync')" id="tab-sync" style="padding:15px; background:none; border:none; color:var(--muted); font-weight:800; font-size:0.6rem;">SYNC</button>
        </div>
    </div>
    <input type="file" id="pfp-upload-core" style="display:none;" onchange="handlePFPCore(event)">

    <script>
        function toggleSidebar() { 
            const s = document.getElementById('sidebar');
            s.classList.toggle('active'); 
            if(s.classList.contains('active')) initializeWallet('sidebar');
        }
        function resolve() {
            const input = document.getElementById('mainSearch').value;
            if(input.includes('.prn')) {
                const handle = input.replace('$', '').replace('.prn', '');
                const routes = {'ateliagaming':'ateliagaming/index.html', 'dreaminganime':'dreaminganime/index.html', 'calalloo':'calalloo/index.html', 'riddiim':'riddiim/index.html', 'nurasen':'nurasen/index.html'};
                if(routes[handle]) { window.location.href = routes[handle]; return; }
            }
            window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(input);
        }
        document.getElementById('mainSearch').addEventListener('keypress', (e) => { if(e.key === 'Enter') resolve(); });
    </script>
</body>
</html>
