<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREAMING ANIME | Seasonal Sanctuary</title>
    <style>
        :root { --accent: #f56565; --bg: #0b0e14; --panel: #161b22; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        header { padding: 60px; background: var(--panel); border-bottom: 5px solid var(--accent); }
        h1 { margin: 0; font-size: 3rem; font-weight: 900; }
        .hero { padding: 80px 20px; background: linear-gradient(180deg, var(--panel), var(--bg)); }
        .main-video { max-width: 1000px; margin: 0 auto; aspect-ratio: 16/9; background: #000; border-radius: 30px; overflow: hidden; border: 4px solid #333; }
        .section-title { color: var(--accent); margin: 60px 0 40px; font-size: 2rem; font-weight: 800; text-transform: uppercase; }
        .trending-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; padding: 0 5%; max-width: 1400px; margin: 0 auto; }
        .video-card { background: var(--panel); border-radius: 20px; overflow: hidden; border: 1px solid #333; }
        .video-card iframe { width: 100%; aspect-ratio: 16/9; border: none; }
        .video-card h3 { padding: 20px; margin: 0; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 0 5%; max-width: 1400px; margin: 0 auto; }
        .anime-card { background: var(--panel); border-radius: 20px; overflow: hidden; border: 1px solid #444; }
        .anime-card img { width: 100%; height: 400px; object-fit: cover; }
        .anime-card h4 { padding: 20px; margin: 0; color: var(--accent); }
        footer { padding: 80px; background: #080a0f; border-top: 1px solid #333; margin-top: 100px; }
        footer a { color: #888; margin: 0 20px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <header>
        <h1>DREAMING ANIME</h1>
        <p style="color:var(--accent); font-weight:bold;">Empire Sanctuary v8.1 (Global Reset)</p>
    </header>
    
    <div class="hero">
        <h2 class="section-title">Main Feature: Frieren Season 2</h2>
        <div class="main-video">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/EOMVXqH9DSg" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <h2 class="section-title">Trending Videos</h2>
    <div class="trending-grid">
        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/byJ7pxxhaDY"></iframe>
            <h3>Solo Leveling S2</h3>
        </div>
        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/OAcohp3MMYI"></iframe>
            <h3>Oshi no Ko S2</h3>
        </div>
        <div class="video-card">
            <iframe src="https://www.youtube.com/embed/V8mRlsL043k"></iframe>
            <h3>Kaiju No. 8</h3>
        </div>
    </div>

    <h2 class="section-title">Seasonal Highlights</h2>
    <div class="anime-grid">
        <div class="anime-card"><img src="https://i0.wp.com/upload.wikimedia.org/wikipedia/en/thumb/d/d6/Oshi_no_Ko_key_visual.jpg/800px-Oshi_no_Ko_key_visual.jpg"><h4>Oshi no Ko</h4></div>
        <div class="anime-card"><img src="https://i0.wp.com/img.youtube.com/vi/byJ7pxxhaDY/maxresdefault.jpg"><h4>Solo Leveling</h4></div>
        <div class="anime-card"><img src="https://i0.wp.com/img.youtube.com/vi/n6HZo_33YaQ/maxresdefault.jpg"><h4>Frieren S2</h4></div>
        <div class="anime-card"><img src="https://i0.wp.com/img.youtube.com/vi/V8mRlsL043k/maxresdefault.jpg"><h4>Kaiju No. 8</h4></div>
    </div>

    <footer>
        <p>&copy; 2026 Prisca Dezigns</p>
        <a href="/legal/privacy/">Privacy Policy</a>
        <a href="/legal/terms/">Terms of Use</a>
        <a href="/legal/affiliate-disclosure/">Affiliate Disclosure</a>
    </footer>
</body>
</html>
