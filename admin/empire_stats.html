<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Intelligence | Admin Node</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@900&family=Inter:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --green: #2D5A27; --gold: #E87722; --dark: #0B0E14; --white: #FFFFFF; --font-display: 'Fraunces', serif; }
        body { background: var(--dark); color: var(--white); font-family: 'Inter', sans-serif; padding: 40px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; margin-top: 40px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-val { font-family: 'Space Mono', monospace; font-size: 3rem; font-weight: 800; color: var(--gold); }
        .stat-label { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6; }
        h1 { font-family: var(--font-display); font-size: 2.5rem; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 50px; background: var(--gold); color: white; font-size: 10px; font-weight: 800; vertical-align: middle; }
    </style>
</head>
<body>

<div style="display:flex; justify-content:space-between; align-items:center;">
    <h1>Empire Global Intelligence <span class="badge">✓ Verified Admin</span></h1>
    <button onclick="fetchStats()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:10px 20px; border-radius:50px; font-weight:800; cursor:pointer;">REFRESH HUB</button>
</div>

<p style="opacity:0.6; margin-top:10px;">Monitoring User Nodes across Calalloo & dpanyard Ecosystems.</p>

<div class="stats-grid" id="stats-container">
    <div class="stat-card">
        <div class="stat-label">Total Empire Nodes</div>
        <div class="stat-val" id="total-users">--</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Calalloo Culinary Nodes</div>
        <div class="stat-val" id="cal-users">--</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">dpanyard Professional Nodes</div>
        <div class="stat-val" id="panyard-users">--</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Growth (Last 24h)</div>
        <div class="stat-val" id="new-users" style="color:var(--green);">--</div>
    </div>
</div>

<script>
    const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', '{{credential:supabase-anon-key}}');

    async function fetchStats() {
        const { data, error } = await sb.from('global_empire_stats').select('*');
        if(!error && data) {
            let total = 0;
            let calCount = 0;
            let panCount = 0;
            let newToday = 0;

            data.forEach(s => {
                total += parseInt(s.total_users);
                newToday += parseInt(s.new_today);
                if(s.origin_platform === 'Calalloo') calCount = s.total_users;
                if(s.origin_platform === 'dpanyard') panCount = s.total_users;
            });

            document.getElementById('total-users').innerText = total;
            document.getElementById('cal-users').innerText = calCount;
            document.getElementById('panyard-users').innerText = panCount;
            document.getElementById('new-users').innerText = "+" + newToday;
        }
    }

    window.onload = fetchStats;
</script>
</body>
</html>
