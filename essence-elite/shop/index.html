<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESSENCE ELITE | Official Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #B794F4;
            --bg: #000000;
            --text: #ffffff;
            --card-bg: #000000;
            --border: rgba(255,255,255,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        nav { position: fixed; top: 0; width: 100%; padding: 20px 6%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        .nav-brand { font-family: 'Playfair Display', sans-serif; font-weight: 900; text-transform: uppercase; text-decoration: none; color: #fff; }
        .hero { padding: 140px 6% 60px; border-bottom: 1px solid var(--border); }
        .hero h1 { font-family: 'Playfair Display', sans-serif; font-size: clamp(3rem, 8vw, 5rem); font-weight: 900; line-height: 1; letter-spacing: -2px; }
        .hero em { color: var(--accent); font-style: normal; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1px; background: var(--border); }
        .card { background: var(--bg); padding: 40px; text-decoration: none; color: inherit; transition: 0.3s; height: 550px; display: flex; flex-direction: column; position: relative; }
        .card:hover { background: rgba(255,255,255,0.03); }
        .category-tag { position: absolute; top: 30px; right: 30px; font-size: 10px; text-transform: uppercase; color: var(--accent); font-weight: 700; }
        .img-box { height: 250px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; overflow: hidden; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; transition: 0.5s; }
        .card:hover img { transform: scale(1.05); }
        .product-title { font-family: 'Playfair Display', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; }
        .action-btn { margin-top: auto; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--accent); border-top: 1px solid var(--border); padding-top: 20px; }
    </style>
</head>
<body>
    <nav><a href="/" class="nav-brand">ESSENCE ELITE</a></nav>
    <main>
        <section class="hero"><h1>Official <em>ESSENCE ELITE</em> Shop</h1></section>
        <section class="shop-grid">
        <a href="https://www.amazon.com/dp/B0BHTR7L81/?tag=priscadezigns-20" class="card" target="_blank">
            <div class="category-tag">Asset</div>
            <div class="img-box">
                <img src="https://m.media-amazon.com/images/I/71rI89e9n6L._AC_UY218_.jpg" alt="Maison Francis Kurkdjian Baccarat Rouge 540" loading="lazy">
            </div>
            <div class="card-content">
                <div class="product-id">ID: ID-0</div>
                <h3 class="product-title">Maison Francis Kurkdjian Baccarat Rouge 540</h3>
                <div class="action-btn">View Product →</div>
            </div>
        </a></section>
    </main>
</body>
</html>
