<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Businesses | D'Panyard</title>
    <link rel="stylesheet" href="../shared/dpanyard.css">
    <link rel="stylesheet" href="directory.css">
</head>
<body>
    <header class="dir-header">
        <div class="container header-content">
            <a href="../landing/index.html" class="logo">D'Panyard</a>
            <div class="header-search">
                <input type="text" id="searchInput" placeholder="Search categories...">
                <select id="districtFilter">
                    <option value="">All Districts</option>
                    <option>Port of Spain</option>
                    <option>San Fernando</option>
                    <option>Chaguanas</option>
                    <option>Arima</option>
                    <option>Siparia</option>
                    <option>Tobago</option>
                </select>
                <button id="searchBtn">Search</button>
            </div>
        </div>
    </header>

    <main class="container main-layout">
        <aside class="sidebar">
            <div class="filter-group">
                <h3>Filters</h3>
                <label><input type="checkbox" id="verifiedFilter"> Verified Only</label>
                <label><input type="checkbox" id="openFilter"> Open Now</label>
            </div>
            <div class="filter-group">
                <h3>Rating</h3>
                <label><input type="radio" name="rating" value="4"> 4+ Stars</label>
                <label><input type="radio" name="rating" value="3"> 3+ Stars</label>
            </div>
            <div class="filter-group">
                <h3>Sort By</h3>
                <select id="sortBy">
                    <option>Nearest</option>
                    <option>Highest Rated</option>
                    <option>Most Reviewed</option>
                    <option>Newest</option>
                </select>
            </div>
        </aside>

        <section class="results-area">
            <div id="theYard" class="yard-layout">
                <!-- Business cards will be injected here by JS -->
            </div>
        </section>

        <section class="map-panel">
            <div class="map-placeholder">
                <p>Google Maps View</p>
                <span>(Interactive Map Area)</span>
            </div>
        </section>
    </main>

    <script src="directory.js"></script>
</body>
</html>
