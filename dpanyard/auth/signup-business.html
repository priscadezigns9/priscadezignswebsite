<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Business Account Sign Up | D' PanYard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #E01B24;
            --navy-deep: #0D1B2A;
            --white: #FFFFFF;
            --bg-light: #F8FAFC;
            --border-color: #E2E8F0;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--navy-deep); height: 100vh; display: flex; align-items: center; justify-content: center; }

        .auth-card { background: var(--white); border-radius: 24px; padding: 40px; width: 100%; max-width: 440px; border: 1px solid var(--border-color); box-shadow: 0 10px 40px rgba(13, 27, 42, 0.05); }
        h1 { font-family: 'Sora', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 24px; text-align: center; }

        .field { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--navy-deep); }
        input { width: 100%; padding: 14px 18px; border-radius: 12px; border: 1.5px solid var(--border-color); font-size: 15px; transition: all 0.3s; outline: none; }
        input:focus { border-color: var(--primary-red); box-shadow: 0 0 0 4px rgba(224, 27, 36, 0.08); }

        .btn-submit { background: var(--navy-deep); color: var(--white); width: 100%; padding: 16px; border-radius: 50px; border: none; font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: all 0.3s; }
        .btn-submit:hover { background: var(--primary-red); transform: translateY(-2px); }

        .back { display: block; text-align: center; margin-top: 24px; font-size: 14px; text-decoration: none; color: #64748B; font-weight: 600; }
        .hint { display: block; text-align: center; margin-bottom: 20px; font-size: 14px; color: #64748B; }
    </style>
</head>
<body>

<div class="auth-card">
    <h1>Sign Up (Business)</h1>
    <span class="hint">Step 1: Account Credentials</span>
    <form onsubmit="event.preventDefault(); window.location.href='../providers/register.html';">
        <div class="field">
            <label>Business Owner Name</label>
            <input type="text" placeholder="Your name" required>
        </div>
        <div class="field">
            <label>Work Email</label>
            <input type="email" placeholder="business@example.com" required>
        </div>
        <div class="field">
            <label>Create Password</label>
            <input type="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit">Next: Business Details →</button>
    </form>
    <a href="index.html" class="back">← Back to account type</a>
</div>

</body>
</html>
