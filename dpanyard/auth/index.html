<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Sign Up | D' PanYard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #E01B24;
            --navy-deep: #0D1B2A;
            --white: #FFFFFF;
            --bg-light: #F8FAFC;
            --border-color: #E2E8F0;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--navy-deep); height: 100vh; display: flex; align-items: center; justify-content: center; }

        .auth-card { background: var(--white); border-radius: 24px; padding: 48px; width: 100%; max-width: 500px; text-align: center; border: 1px solid var(--border-color); box-shadow: 0 10px 40px rgba(13, 27, 42, 0.05); }
        .logo { font-family: 'Sora', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 32px; text-decoration: none; color: var(--navy-deep); display: block; }
        .logo span { color: var(--primary-red); }

        h1 { font-family: 'Sora', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 12px; }
        p { color: #64748B; font-size: 15px; margin-bottom: 32px; }

        .choice-btns { display: grid; gap: 16px; }
        .btn-choice { display: flex; align-items: center; justify-content: space-between; padding: 24px; border-radius: 16px; border: 2px solid var(--border-color); text-decoration: none; color: var(--navy-deep); transition: all 0.3s; text-align: left; }
        .btn-choice:hover { border-color: var(--primary-red); background: rgba(224, 27, 36, 0.02); transform: translateY(-2px); }
        
        .btn-choice .icon { font-size: 24px; }
        .btn-choice .text h3 { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 800; }
        .btn-choice .text span { font-size: 13px; color: #64748B; }

        .footer-link { margin-top: 32px; font-size: 14px; color: #64748B; }
        .footer-link a { color: var(--primary-red); font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="../index.html" class="logo">D'<span>Pan</span>Yard</a>
    <h1>Create your account</h1>
    <p>Select the type of profile you want to create.</p>

    <div class="choice-btns">
        <a href="signup-personal.html" class="btn-choice">
            <div class="text">
                <h3>Personal Account</h3>
                <span>I'm looking for local services</span>
            </div>
            <div class="icon">👤</div>
        </a>
        <a href="signup-business.html" class="btn-choice">
            <div class="text">
                <h3>Business Account</h3>
                <span>I want to list my professional services</span>
            </div>
            <div class="icon">💼</div>
        </a>
    </div>

    <div class="footer-link">
        Already have an account? <a href="signin.html">Sign In</a>
    </div>
</div>

</body>
</html>
