<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>dpanyard | Your neighbourhood, at your fingertips.</title>
    <meta name="description" content="Discover and connect with your neighbourhood's best service providers. High-fidelity local discovery for the Caribbean.">
    <meta name="geo.region" content="TT" />
    <meta name="geo.placename" content="Trinidad and Tobago" />
    <meta name="geo.position" content="10.66;-61.51" />
    <meta name="ICBM" content="10.66, -61.51" />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/dpanyard/favicon.ico">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary-red: #E01B24;
            --navy-deep: #0D1B2A;
            --white: #FFFFFF;
            --bg-light: #F4F4F4;
            --border-color: #EEEEEE;
            --grey-mid: #666666;
            --grey-light: #888888;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--navy-deep); line-height: 1.6; }

        nav { background: var(--white); border-bottom: 2px solid var(--primary-red); padding: 0 5%; display: flex; align-items: center; justify-content: space-between; height: 80px; position: sticky; top: 0; z-index: 1000; }
        .brand img { height: 45px; display: block; }
        
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a { color: #555; text-decoration: none; font-size: 14px; font-weight: 600; }
        .nav-cta { background: var(--primary-red); color: var(--white) !important; padding: 10px 24px; border-radius: 50px; font-weight: 800 !important; transition: 0.3s; }
        .nav-cta:hover { transform: scale(1.05); }

        .hero { background: linear-gradient(135deg, var(--navy-deep) 0%, #1B263B 100%); padding: 100px 5%; text-align: center; color: var(--white); }
        .hero h1 { font-family: 'Sora', sans-serif; font-size: 56px; font-weight: 800; margin-bottom: 20px; }
        .hero h1 span { color: var(--primary-red); }
        .hero p { font-size: 19px; opacity: 0.9; max-width: 600px; margin: 0 auto 40px; }

        .search-box { background: var(--white); padding: 8px; border-radius: 50px; display: flex; max-width: 700px; margin: 0 auto; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .search-box input { border: none; padding: 16px 24px; font-size: 16px; width: 100%; border-radius: 50px; outline: none; }
        .search-box button { background: var(--primary-red); color: var(--white); border: none; padding: 16px 36px; border-radius: 50px; font-weight: 800; cursor: pointer; }

        .stats { background: var(--white); padding: 40px 5%; display: flex; justify-content: center; gap: 80px; border-bottom: 1px solid var(--border-color); }
        .stat { text-align: center; }
        .stat-n { font-family: 'Sora', sans-serif; font-size: 36px; font-weight: 800; color: var(--primary-red); }
        .stat-l { font-size: 12px; color: var(--grey-light); font-weight: 800; text-transform: uppercase; }

        .sec { padding: 80px 5%; max-width: 1400px; margin: 0 auto; }
        .sec-h { font-family: 'Sora', sans-serif; font-size: 42px; font-weight: 800; margin-bottom: 40px; text-align: center; }

        .prov-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .prov { background: var(--white); border-radius: 24px; padding: 30px; border: 1px solid var(--border-color); transition: 0.3s; }
        .prov:hover { transform: translateY(-5px); border-color: var(--primary-red); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .av { width: 60px; height: 60px; border-radius: 50%; background: var(--navy-deep); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 24px; margin-bottom: 20px; }
        .pn { font-family: Sora; font-size: 20px; font-weight: 800; margin-bottom: 5px; }
        .pb { display: inline-block; background: rgba(224, 27, 36, 0.1); color: var(--primary-red); padding: 4px 12px; border-radius: 50px; font-size: 10px; font-weight: 800; text-transform: uppercase; }

        footer { background: var(--navy-deep); color: white; padding: 60px 5%; text-align: center; }
        .footer-logo { height: 40px; margin-bottom: 20px; }

        /* Auth UI states */
        #auth-guest { display: none; }
        #auth-user { display: none; }
    </style>
</head>
<body>

<nav>
    <a href="/dpanyard/index.html" class="brand"><img src="/dpanyard/assets/logos/website_logo.png" alt="dpanyard"></a>
    
    <!-- Dynamic Auth Links -->
    <div class="nav-links" id="auth-guest">
        <a href="login/index.html">Sign In</a>
        <a href="signup/index.html" class="nav-cta">Sign Up</a>
    </div>
    <div class="nav-links" id="auth-user">
        <a href="dashboard/business.html" class="nav-cta">Go to Dashboard</a>
        <a href="#" onclick="handleSignOut()" style="color: var(--grey-light); font-size: 12px;">Sign Out</a>
    </div>
</nav>

<div class="hero">
    <h1>The Service Network.<br><span>Verified & Local.</span></h1>
    <p>Connecting you with the best professional nodes in your neighbourhood.</p>
    <div class="search-box">
        <input type="text" id="main-search" placeholder="Search by niche (e.g. Beauty, Tech, Chef)..." oninput="liveSearch(this.value)">
        <button onclick="liveSearch()">Discover</button>
    </div>
</div>

<div class="stats">
    <div class="stat"><div class="stat-n" id="stat-nodes">10k+</div><div class="stat-l">Global Nodes</div></div>
    <div class="stat"><div class="stat-n">24/7</div><div class="stat-l">Network Uptime</div></div>
    <div class="stat"><div class="stat-n">TT</div><div class="stat-l">Region Hub</div></div>
</div>

<div class="sec">
    <h2 class="sec-h" id="results-title">Featured Professionals</h2>
    <div class="prov-grid" id="provider-grid">
        <!-- Live Data from Supabase -->
    </div>
</div>

<footer>
    <img src="/dpanyard/assets/logos/website_logo.png" alt="dpanyard" class="footer-logo">
    <p style="opacity: 0.5; font-size: 12px;">© 2026 dpanyard | Neural Brand Architecture by Prisca Dezigns</p>
</footer>

<script>
    const SB_URL = 'https://sktpjacowqaedddtrhuz.supabase.co';
    const SB_KEY = '{{credential:supabase-anon-key}}'; // Uses existing verified credential
    const sb = supabase.createClient(SB_URL, SB_KEY);

    // 1. Auth Persistence Management
    async function checkAuth() {
        const { data: { session } } = await sb.auth.getSession();
        const guestDiv = document.getElementById('auth-guest');
        const userDiv = document.getElementById('auth-user');

        if (session) {
            // User is signed in (persists across tab/browser close)
            guestDiv.style.display = 'none';
            userDiv.style.display = 'flex';
        } else {
            // No active session
            guestDiv.style.display = 'flex';
            userDiv.style.display = 'none';
        }
    }

    async function handleSignOut() {
        await sb.auth.signOut();
        window.location.reload();
    }

    // 2. Data Fetching
    async function loadProviders(query = '') {
        const grid = document.getElementById('provider-grid');
        const title = document.getElementById('results-title');
        
        let dbQuery = sb.from('profiles').select('*').limit(12);
        
        if(query) {
            dbQuery = dbQuery.ilike('niche', `%${query}%`);
            title.innerText = `Searching for: ${query}`;
        } else {
            title.innerText = "Featured Professionals";
        }

        const { data: providers, error } = await dbQuery;

        if(!error && providers) {
            grid.innerHTML = providers.map(p => `
                <div class="prov">
                    <div class="av">${p.full_name ? p.full_name[0] : 'U'}</div>
                    <div class="pn">${p.full_name || 'Anonymous Node'}</div>
                    <span class="pb">${p.niche || 'Professional'}</span>
                    <p style="font-size:13px; color:var(--grey-mid); margin-top:15px;">${p.bio ? p.bio.substring(0, 100) : 'Verified member of the dpanyard network.'}...</p>
                    <button style="margin-top:20px; width:100%; padding:12px; border-radius:50px; border:1.5px solid var(--navy-deep); background:none; font-family:Sora; font-weight:800; font-size:12px; cursor:pointer;">VIEW NODE</button>
                </div>
            `).join('');
        }
    }

    async function syncStats() {
        const { data } = await sb.from('profiles').select('id', { count: 'exact' });
        if(data) document.getElementById('stat-nodes').innerText = (data.length + 2400) + "+";
    }

    let searchTimeout;
    function liveSearch(val) {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            loadProviders(val);
        }, 300);
    }

    window.onload = () => {
        checkAuth(); // Check persistence on load
        loadProviders();
        syncStats();
    };
</script>
</body>
</html>
