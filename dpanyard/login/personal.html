<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personal Login | dpanyard</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #E87722;
            --white: #FFFFFF;
            --bg-light: #F8FAFC;
            --text-dark: #0F172A;
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: var(--bg-light); color: var(--text-dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .auth-card { background: var(--white); border-radius: 32px; padding: 48px; width: 100%; max-width: 440px; text-align: center; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08); border: 1px solid #f1f5f9; }
        .logo { font-family: var(--font-display); font-size: 32px; color: var(--primary); text-decoration: none; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 32px; }
        .logo-d { background: var(--primary); color: white; width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        h1 { font-family: var(--font-display); font-size: 28px; margin-bottom: 12px; }
        p { color: #64748B; margin-bottom: 32px; line-height: 1.5; }

        .btn-google { width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 16px; background: white; border: 2px solid #E2E8F0; border-radius: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-size: 16px; margin-bottom: 24px; }
        .btn-google:hover { background: #F8FAFC; border-color: #CBD5E1; transform: translateY(-1px); }
        .btn-google img { width: 24px; height: 24px; }

        .divider { display: flex; align-items: center; gap: 16px; color: #94A3B8; margin-bottom: 24px; font-size: 14px; font-weight: 600; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #E2E8F0; }

        .field { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; color: #475569; }
        input { width: 100%; padding: 14px 18px; border-radius: 14px; border: 2px solid #E2E8F0; font-size: 16px; outline: none; transition: all 0.2s; font-family: inherit; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(232, 119, 34, 0.1); }

        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 16px; font-weight: 800; font-size: 16px; cursor: pointer; transition: all 0.2s; }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(232, 119, 34, 0.2); }

        .back { display: block; margin-top: 32px; text-decoration: none; color: #64748B; font-weight: 600; font-size: 14px; transition: color 0.2s; }
        .back:hover { color: var(--primary); }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="../index.html" class="logo">
        <div class="logo-d">D</div>
        dpanyard
    </a>
    <h1>Personal Login</h1>
    <p>Access your saved services, community nodes, and neighbourhood bookings.</p>

    <button class="btn-google" onclick="loginWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Continue with Google
    </button>

    <div class="divider">or use email</div>

    <form id="login-form">
        <div class="field">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="email@example.com" required>
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">Sign In</button>
    </form>

    <a href="./index.html" class="back">← Back to selection</a>
</div>

<script>
    const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', '{{credential:supabase-callaloo-dpanyard}}');

    async function loginWithGoogle() {
        localStorage.setItem('dpanyard_role', 'personal');
        const { error } = await sb.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: window.location.origin + '/dpanyard/dashboard/personal'
            }
        });
        if (error) alert("Error: " + error.message);
    }

    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('submit-btn');
        
        btn.innerText = 'Signing in...';
        const { error } = await sb.auth.signInWithPassword({ email, password });
        
        if (error) {
            alert(error.message);
            btn.innerText = 'Sign In';
        } else {
            localStorage.setItem('dpanyard_role', 'personal');
            window.location.href = '../dashboard/personal';
        }
    };

    async function checkSession() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            localStorage.setItem('dpanyard_role', 'personal');
            window.location.href = '../dashboard/personal';
        }
    }
    checkSession();
</script>

</body>
</html>
