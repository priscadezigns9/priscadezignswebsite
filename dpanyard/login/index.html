<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In | dpanyard</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #E87722;
            --white: #FFFFFF;
            --bg-light: #F8FAFC;
            --text-dark: #0F172A;
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: var(--bg-light); color: var(--text-dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .auth-card { background: var(--white); border-radius: 32px; padding: 48px; width: 100%; max-width: 500px; text-align: center; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08); border: 1px solid #f1f5f9; }
        .logo { font-family: var(--font-display); font-size: 32px; color: var(--primary); text-decoration: none; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 32px; }
        .logo-d { background: var(--primary); color: white; width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        h1 { font-family: var(--font-display); font-size: 28px; margin-bottom: 12px; }
        p { color: #64748B; margin-bottom: 32px; line-height: 1.5; }

        .choice-btns { display: grid; gap: 16px; text-align: left; }
        .btn-choice { display: flex; align-items: center; justify-content: space-between; padding: 24px; border-radius: 20px; border: 2px solid #E2E8F0; text-decoration: none; color: var(--text-dark); transition: all 0.2s; background: white; }
        .btn-choice:hover { border-color: var(--primary); background: #FFF7ED; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(232, 119, 34, 0.05); }
        
        .btn-choice h3 { font-family: var(--font-display); font-size: 18px; margin-bottom: 4px; }
        .btn-choice span { font-size: 14px; color: #64748B; }
        .btn-choice .icon { font-size: 24px; color: var(--primary); }

        .footer-link { margin-top: 32px; font-size: 14px; color: #64748B; }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="../index.html" class="logo">
        <div class="logo-d">D</div>
        dpanyard
    </a>
    <h1>Welcome back</h1>
    <p>Sign in to your dpanyard account to access your neighbourhood dashboard.</p>
    
    <div class="choice-btns">
        <a href="./personal.html" class="btn-choice">
            <div class="text">
                <h3>Personal Login</h3>
                <span>Access saved services & community</span>
            </div>
            <div class="icon"><i data-lucide="user"></i></div>
        </a>
        <a href="./business.html" class="btn-choice">
            <div class="text">
                <h3>Business Login</h3>
                <span>Manage listings & provider tools</span>
            </div>
            <div class="icon"><i data-lucide="briefcase"></i></div>
        </a>
    </div>

    <div class="footer-link">
        Don't have an account? <a href="../signup/index.html">Join the Panyard</a>
    </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
