<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Back | D' PanYard</title>
    <style>
        body{margin:0;font-family:Arial,sans-serif;background:#F8FAFC;color:#0D1B2A;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{width:100%;max-width:440px;background:#fff;border:1px solid #e2e8f0;border-radius:24px;box-shadow:0 20px 50px rgba(13,27,42,.08);padding:40px;text-align:center}
        img{height:52px;display:block;margin:0 auto 28px}
        h1{margin:0 0 10px;font-size:26px;font-weight:800}
        p{margin:0 0 24px;color:#64748B;font-size:14px;line-height:1.6}
        .btn{display:block;width:100%;padding:16px 18px;border-radius:14px;text-decoration:none;text-align:center;font-weight:800;font-size:15px;margin-bottom:12px;box-sizing:border-box}
        .red{background:#E01B24;color:#fff}
        .navy{background:#0D1B2A;color:#fff}
        .foot{margin-top:18px;font-size:13px;color:#64748B}
        .foot a{color:#E01B24;text-decoration:none;font-weight:700}
    </style>
</head>
<body>
    <div class="card">
        <img src="/dpanyard/assets/img/dpanyard-logo.png" alt="D' PanYard">
        <h1>Welcome Back</h1>
        <p>Select your account type to continue.</p>
        <a href="personal.html" class="btn red">Personal Account</a>
        <a href="business.html" class="btn navy">Business Account</a>
        <div class="foot">Don’t have an account? <a href="/dpanyard/signup/">Sign up</a></div>
    </div>
</body>
</html>
