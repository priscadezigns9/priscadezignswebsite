<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Business Admin | dpanyard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/dpanyard/favicon.ico">
    <style>
        :root {
            --primary-red: #E01B24;
            --navy-deep: #0D1B2A;
            --white: #FFFFFF;
            --bg-light: #F8FAFC;
            --border-color: #E2E8F0;
            --text-muted: #64748B;
            --success: #065F46;
            --success-bg: #D1FAE5;
        }

        body.dark-mode {
            --bg-light: #0B0E14;
            --white: #1A1F26;
            --navy-deep: #F8FAFC;
            --border-color: #2D3748;
            --text-muted: #A0AEC0;
            color: white;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--navy-deep); transition: background 0.3s, color 0.3s; }

        nav { background: var(--white); border-bottom: 2px solid var(--primary-red); padding: 0 5%; display: flex; align-items: center; justify-content: space-between; height: 72px; position: sticky; top: 0; z-index: 1000; }
        .brand img { height: 40px; }
        
        .layout { display: flex; min-height: calc(100vh - 72px); }
        .sidebar { width: 280px; background: var(--white); border-right: 1px solid var(--border-color); padding: 32px 16px; }
        .side-link { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 12px; text-decoration: none; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; transition: all 0.3s; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-size: 15px; }
        .side-link:hover, .side-link.active { background: rgba(224, 27, 36, 0.08); color: var(--primary-red); }
        .side-link svg { width: 20px; height: 20px; }

        .main { flex: 1; padding: 40px 5%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--white); border-radius: 24px; padding: 32px; border: 1px solid var(--border-color); margin-bottom: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); position: relative; }
        .card h2 { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 24px; }

        /* Pro Feature Overlay */
        .pro-locked::after {
            content: "Panyard Pro Feature";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            font-family: Sora; font-weight: 800; color: var(--primary-red);
            z-index: 10;
        }
        body.dark-mode .pro-locked::after { background: rgba(26, 31, 38, 0.8); }
        .is-pro .pro-locked::after { display: none; }

        .btn-p { background: var(--primary-red); color: white; padding: 14px 28px; border-radius: 50px; border: none; font-weight: 800; font-family: Sora; cursor: pointer; transition: 0.3s; display: inline-block; text-align: center; }
        .btn-p:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(224, 27, 36, 0.2); }

        .form-input { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid var(--border-color); font-family: 'Inter'; font-size: 15px; margin-bottom: 20px; background: transparent; color: inherit; }
        
        .pricing { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .plan { border: 2px solid var(--border-color); padding: 32px; border-radius: 24px; text-align: center; display: flex; flex-direction: column; }
        .plan.featured { border-color: var(--primary-red); background: rgba(224, 27, 36, 0.02); }
        .plan h3 { font-family: Sora; font-size: 20px; margin-bottom: 12px; }
        .price { font-size: 32px; font-weight: 800; margin-bottom: 20px; }

        /* Modal styling for Payment */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: var(--white); border-radius: 24px; padding: 40px; width: 90%; max-width: 500px; color: var(--navy-deep); }
        
        .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-red); }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body id="app-body">

<nav>
    <a href="/dpanyard/index.html" class="brand"><img src="../assets/logos/website_logo.png" alt="dpanyard"></a>
    <div id="pro-badge" style="display:none; background:var(--primary-red); color:white; padding:4px 12px; border-radius:50px; font-size:10px; font-weight:800; font-family:Sora;">PRO ACTIVE</div>
</nav>

<div class="layout">
    <div class="sidebar">
        <button class="side-link active" onclick="showTab('dash', this)">Dashboard</button>
        <button class="side-link" onclick="showTab('analytics', this)">Advanced Analytics</button>
        <button class="side-link" onclick="showTab('pro', this)">Panyard Pro</button>
        <button class="side-link" onclick="showTab('settings', this)">Settings</button>
    </div>

    <div class="main">
        <div id="dash" class="tab-content active">
            <h1 style="font-family: Sora; margin-bottom: 32px;">Business Admin</h1>
            
            <div class="card">
                <h2>Standard Profile</h2>
                <input type="text" id="biz-name" class="form-input" placeholder="Business Name">
                <textarea id="biz-bio" class="form-input" placeholder="Bio"></textarea>
                <button class="btn-p" onclick="saveData()">Save Profile</button>
            </div>

            <div class="card pro-locked" id="ai-card">
                <h2>✨ AI Profile Architect</h2>
                <p style="margin-bottom:20px;">Let AI craft your high-fidelity bio.</p>
                <button class="btn-p" onclick="alert('AI Engine generating...')">Run AI Architect</button>
            </div>
        </div>

        <div id="analytics" class="tab-content">
            <h1 style="font-family: Sora; margin-bottom: 32px;">Performance Analytics</h1>
            <div class="card pro-locked" id="analytics-card" style="height:300px;">
                <h2>Weekly Profile Traffic</h2>
                <!-- Chart Mockup -->
                <div style="height:150px; background:rgba(0,0,0,0.05); border-radius:12px; display:flex; align-items:flex-end; gap:10px; padding:20px;">
                    <div style="flex:1; height:40%; background:var(--primary-red);"></div>
                    <div style="flex:1; height:70%; background:var(--primary-red);"></div>
                    <div style="flex:1; height:55%; background:var(--primary-red);"></div>
                    <div style="flex:1; height:90%; background:var(--primary-red);"></div>
                </div>
            </div>
        </div>

        <div id="pro" class="tab-content">
            <h1 style="font-family: Sora; margin-bottom: 32px;">Upgrade to Panyard Pro</h1>
            <div class="pricing">
                <div class="plan">
                    <h3>Monthly</h3>
                    <div class="price">$10.00</div>
                    <button class="btn-p" onclick="openPayment('Monthly', 10)">Select Plan</button>
                </div>
                <div class="plan featured">
                    <h3>Yearly</h3>
                    <div class="price">$100.00</div>
                    <button class="btn-p" onclick="openPayment('Yearly', 100)">Select Plan</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Payment Modal -->
<div id="pay-modal" class="modal">
    <div class="modal-content">
        <h2 style="font-family: Sora; margin-bottom: 24px;">Complete Subscription</h2>
        <p id="pay-desc" style="margin-bottom:24px;"></p>
        <div style="background:#f8f9fa; padding:20px; border-radius:12px; margin-bottom:24px;">
            <div style="margin-bottom:12px;"><b>Empire Standard Checkout</b></div>
            <input type="text" class="form-input" style="margin-bottom:12px;" placeholder="Card Number">
            <div style="display:flex; gap:10px;">
                <input type="text" class="form-input" placeholder="MM/YY">
                <input type="text" class="form-input" placeholder="CVC">
            </div>
        </div>
        <button class="btn-p" style="width:100%;" onclick="processPayment()">Authorize & Upgrade</button>
        <button onclick="document.getElementById('pay-modal').style.display='none'" style="background:none; border:none; width:100%; margin-top:16px; cursor:pointer;">Cancel</button>
    </div>
</div>

<script>
    let currentPlan = null;

    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.side-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function openPayment(plan, price) {
        currentPlan = plan;
        document.getElementById('pay-desc').innerText = `You are subscribing to the Panyard Pro ${plan} plan for $${price}.00 USD.`;
        document.getElementById('pay-modal').style.display = 'flex';
    }

    function processPayment() {
        alert('Payment Authorized via Empire Standard Gateway!');
        localStorage.setItem('panyard_is_pro', 'true');
        applyProState();
        document.getElementById('pay-modal').style.display = 'none';
        showTab('dash', document.querySelector('.side-link'));
    }

    function applyProState() {
        if(localStorage.getItem('panyard_is_pro') === 'true') {
            document.getElementById('app-body').classList.add('is-pro');
            document.getElementById('pro-badge').style.display = 'block';
        }
    }

    function saveData() {
        localStorage.setItem('panyard_name', document.getElementById('biz-name').value);
        alert('Data Saved Locally.');
    }

    window.onload = function() {
        applyProState();
        document.getElementById('biz-name').value = localStorage.getItem('panyard_name') || '';
    };
</script>
</body>
</html>
