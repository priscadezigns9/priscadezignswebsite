<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Permissions | dpanyard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #E01B24;
            --navy-deep: #0D1B2A;
            --white: #FFFFFF;
            --bg-light: #F4F4F4;
            --border-color: #EEEEEE;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--navy-deep); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .perm-card { background: var(--white); border-radius: 24px; padding: 48px; width: 100%; max-width: 500px; border: 1px solid var(--border-color); box-shadow: 0 10px 40px rgba(13, 27, 42, 0.05); }
        .perm-header { text-align: center; margin-bottom: 40px; }
        .perm-header h1 { font-family: 'Sora', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        .perm-header p { color: #64748B; font-size: 14px; }
        
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border-color); }
        .toggle-row:last-child { border-bottom: none; }
        .toggle-label { display: flex; flex-direction: column; gap: 4px; }
        .toggle-label h3 { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 800; }
        .toggle-label span { font-size: 13px; color: #64748B; }
        
        .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #cbd5e1; border-radius: 24px; transition: 0.3s; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: var(--white); border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background: var(--primary-red); }
        input:checked + .slider:before { transform: translateX(20px); }
        
        .perm-footer { display: flex; gap: 12px; margin-top: 32px; }
        .btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 800; cursor: pointer; transition: all 0.3s; }
        .btn-secondary { background: var(--bg-light); color: var(--navy-deep); }
        .btn-secondary:hover { background: #e2e8f0; }
        .btn-primary { background: var(--primary-red); color: var(--white); }
        .btn-primary:hover { background: #C0151D; }
    </style>
</head>
<body>
<div class="perm-card">
    <div class="perm-header">
        <h1>App Permissions</h1>
        <p>Grant permissions to get the best experience</p>
    </div>

    <form onsubmit="handleSubmit(event)">
        <div class="toggle-row">
            <div class="toggle-label">
                <h3>📁 Files & Photos</h3>
                <span>Access your documents</span>
            </div>
            <label class="toggle-switch">
                <input type="checkbox" id="files-perm">
                <span class="slider"></span>
            </label>
        </div>

        <div class="toggle-row">
            <div class="toggle-label">
                <h3>📍 Location</h3>
                <span>Find services near you</span>
            </div>
            <label class="toggle-switch">
                <input type="checkbox" id="location-perm">
                <span class="slider"></span>
            </label>
        </div>

        <div class="toggle-row">
            <div class="toggle-label">
                <h3>🔔 Notifications</h3>
                <span>Get appointment reminders</span>
            </div>
            <label class="toggle-switch">
                <input type="checkbox" id="notif-perm">
                <span class="slider"></span>
            </label>
        </div>

        <div class="toggle-row">
            <div class="toggle-label">
                <h3>📞 Contacts</h3>
                <span>Quick access to services</span>
            </div>
            <label class="toggle-switch">
                <input type="checkbox" id="contacts-perm">
                <span class="slider"></span>
            </label>
        </div>

        <div class="perm-footer">
            <button type="button" class="btn btn-secondary" onclick="skipPermissions()">Skip</button>
            <button type="submit" class="btn btn-primary">Confirm</button>
        </div>
    </form>
</div>

<script>
    function handleSubmit(event) {
        event.preventDefault();
        savePermissions();
    }

    function savePermissions() {
        const perms = {
            files: document.getElementById('files-perm').checked,
            location: document.getElementById('location-perm').checked,
            notifications: document.getElementById('notif-perm').checked,
            contacts: document.getElementById('contacts-perm').checked
        };
        localStorage.setItem('dpanyard_permissions', JSON.stringify(perms));
        redirectToDashboard();
    }

    function skipPermissions() {
        redirectToDashboard();
    }

    function redirectToDashboard() {
        const role = localStorage.getItem('dpanyard_role') || 'personal';
        window.location.href = './' + role + '.html';
    }

    window.addEventListener('load', function() {
        const saved = localStorage.getItem('dpanyard_permissions');
        if(saved) {
            const perms = JSON.parse(saved);
            document.getElementById('files-perm').checked = perms.files || false;
            document.getElementById('location-perm').checked = perms.location || false;
            document.getElementById('notif-perm').checked = perms.notifications || false;
            document.getElementById('contacts-perm').checked = perms.contacts || false;
        }
    });
</script>
</body>
</html>
