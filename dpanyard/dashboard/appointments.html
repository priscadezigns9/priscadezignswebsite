<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>My Appointments | dpanyard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/dpanyard/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #E01B24;
            --navy-deep: #0D1B2A;
            --white: #FFFFFF;
            --bg-light: #F4F4F4;
            --border-color: #EEEEEE;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--navy-deep); }

        nav { background: var(--white); border-bottom: 2px solid var(--primary-red); padding: 0 5%; display: flex; align-items: center; justify-content: space-between; height: 72px; position: sticky; top: 0; z-index: 1000; }
        .brand { font-family: 'Sora', sans-serif; font-size: 24px; font-weight: 800; color: var(--navy-deep); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .brand span { color: var(--primary-red); }
        .pro-badge { background: linear-gradient(135deg, var(--navy-deep), #2c3e50); color: #FFD700; padding: 4px 12px; border-radius: 50px; font-size: 10px; font-weight: 800; text-transform: uppercase; border: 1px solid #FFD700; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        h1 { font-family: Sora; font-size: 32px; margin-bottom: 32px; }

        .appt-card { background: white; border-radius: 20px; padding: 24px; border: 1px solid var(--border-color); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .appt-card:hover { transform: scale(1.01); box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .appt-info h3 { font-family: Sora; font-size: 18px; margin-bottom: 4px; }
        .appt-info p { font-size: 14px; color: #64748B; }
        .appt-status { padding: 8px 16px; border-radius: 50px; font-size: 12px; font-weight: 800; }
        .status-confirmed { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-pending { background: rgba(245, 166, 35, 0.1); color: #f5a623; }

        .btn-back { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; color: var(--navy-deep); font-weight: 700; margin-bottom: 24px; }
    </style>
</head>
<body>

<nav>
    <a href="/dpanyard/index.html" class="brand">
        D'<span>Pan</span>Yard <div class="pro-badge">Panyard Pro</div>
    </a>
</nav>

<div class="container">
    <a href="personal.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    <h1>My Appointments</h1>

    <div id="appointments-list">
        <div class="appt-card">
            <div class="appt-info">
                <h3>Marcus Electric Solutions</h3>
                <p><i class="far fa-calendar"></i> June 15, 2026 · 10:00 AM</p>
                <p><i class="fas fa-wrench"></i> Service: Electrical Installation</p>
            </div>
            <div class="appt-status status-confirmed">Confirmed</div>
        </div>

        <div class="appt-card">
            <div class="appt-info">
                <h3>Kayla's Hair Studio</h3>
                <p><i class="far fa-calendar"></i> June 20, 2026 · 2:00 PM</p>
                <p><i class="fas fa-cut"></i> Service: Hair Braiding</p>
            </div>
            <div class="appt-status status-pending">Pending Approval</div>
        </div>
    </div>
</div>

</body>
</html>
