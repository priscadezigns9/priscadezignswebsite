<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Verify Business | dpanyard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #E01B24;
            --navy-deep: #0D1B2A;
            --white: #FFFFFF;
            --bg-light: #F4F4F4;
            --border-color: #EEEEEE;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--navy-deep); line-height: 1.6; }

        nav { background: var(--white); border-bottom: 2px solid var(--primary-red); padding: 0 5%; display: flex; align-items: center; justify-content: space-between; height: 72px; }
        .brand { font-family: 'Sora', sans-serif; font-size: 24px; font-weight: 800; color: var(--navy-deep); text-decoration: none; }
        .brand span { color: var(--primary-red); }

        .container { max-width: 650px; margin: 60px auto; padding: 0 20px; }
        .card { background: var(--white); border-radius: 24px; padding: 48px; border: 1px solid var(--border-color); box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        
        h1 { font-family: 'Sora', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 12px; }
        p { color: #64748B; margin-bottom: 32px; font-size: 15px; }

        .v-step { margin-bottom: 40px; padding-bottom: 32px; border-bottom: 1px solid var(--border-color); }
        .v-step:last-child { border: none; }
        .v-step h3 { font-family: Sora; font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; color: var(--navy-deep); }
        .step-num { background: var(--navy-deep); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; }

        label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--navy-deep); }
        
        .upload-box { position: relative; width: 100%; margin-bottom: 20px; }
        .upload-box input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 2; }
        .upload-label { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; border: 2px dashed var(--border-color); border-radius: 16px; background: #fafafa; transition: 0.3s; }
        .upload-box:hover .upload-label { border-color: var(--primary-red); background: rgba(224, 27, 36, 0.02); }
        .upload-label i { font-size: 24px; color: #94A3B8; margin-bottom: 10px; }
        .upload-label span { font-size: 13px; color: #64748B; font-weight: 500; }
        .file-name { font-size: 12px; color: var(--primary-red); margin-top: 5px; font-weight: 700; display: none; }

        input[type="text"] { width: 100%; padding: 16px; border-radius: 12px; border: 1.5px solid var(--border-color); font-size: 15px; outline: none; margin-bottom: 20px; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary-red); }

        .btn-v { background: var(--primary-red); color: white; width: 100%; padding: 20px; border-radius: 50px; border: none; font-family: Sora; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 20px; box-shadow: 0 4px 12px rgba(224, 27, 36, 0.2); }
        .btn-v:hover { background: #C0151D; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(224, 27, 36, 0.3); }
        .btn-v:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; transform: none; }
        
        .status-msg { margin-top: 20px; text-align: center; font-size: 14px; font-weight: 600; display: none; }
        .status-success { color: #10b981; }
        .status-error { color: var(--primary-red); }
    </style>
</head>
<body>

<nav>
    <a href="/dpanyard/index.html" class="brand">D'<span>Pan</span>Yard</a>
</nav>

<div class="container">
    <div class="card">
        <h1>Business Verification</h1>
        <p>Submit your documents to verify your business and increase your reach to 10,000+ local users.</p>

        <form id="verify-form">
            <div class="v-step">
                <h3><span class="step-num">1</span> Identity Verification</h3>
                <label>Valid Photo ID (Passport/National ID)</label>
                <div class="upload-box">
                    <input type="file" id="id-file" accept="image/*,.pdf" required onchange="showFileName(this)">
                    <div class="upload-label">
                        <i class="fas fa-id-card"></i>
                        <span>Click or drag to upload ID</span>
                        <div class="file-name" id="name-id-file"></div>
                    </div>
                </div>

                <label style="margin-top: 24px;">Business Owner Selfie</label>
                <div class="upload-box">
                    <input type="file" id="selfie-file" accept="image/*" required onchange="showFileName(this)">
                    <div class="upload-label">
                        <i class="fas fa-camera"></i>
                        <span>Take a selfie holding your ID</span>
                        <div class="file-name" id="name-selfie-file"></div>
                    </div>
                </div>
            </div>

            <div class="v-step">
                <h3><span class="step-num">2</span> Business Credentials</h3>
                <label>BIR Number (Board of Inland Revenue)</label>
                <input type="text" id="bir-number" placeholder="Enter 10-digit BIR Number" required maxlength="10">

                <label>Business Registration Certificate</label>
                <div class="upload-box">
                    <input type="file" id="cert-file" accept="image/*,.pdf" required onchange="showFileName(this)">
                    <div class="upload-label">
                        <i class="fas fa-certificate"></i>
                        <span>Upload Business Certificate</span>
                        <div class="file-name" id="name-cert-file"></div>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-v" id="submit-btn">Submit for Verification</button>
            <div id="status-msg" class="status-msg"></div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-config.js"></script>
<script>
    function showFileName(input) {
        const nameEl = document.getElementById('name-' + input.id);
        if (input.files && input.files.length > 0) {
            nameEl.innerText = input.files[0].name;
            nameEl.style.display = 'block';
        }
    }

    const form = document.getElementById('verify-form');
    const statusMsg = document.getElementById('status-msg');
    const submitBtn = document.getElementById('submit-btn');

    form.onsubmit = async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        
        try {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) throw new Error("Please sign in first");

            const userId = session.user.id;
            const bir = document.getElementById('bir-number').value;

            // 1. Update Profile in Supabase
            const { error: updateError } = await sb.from('profiles').update({
                bir_number: bir,
                verification_status: 'pending',
                submitted_at: new Date().toISOString()
            }).eq('id', userId);

            if (updateError) throw updateError;

            // 2. Note on File Storage
            // In a production environment, we would use sb.storage.from('verification-docs').upload(...)
            // For this demo/v1.5, we acknowledge the files are ready for sync.
            
            statusMsg.innerText = "✓ Verification submitted! Redirecting...";
            statusMsg.className = "status-msg status-success";
            statusMsg.style.display = "block";

            setTimeout(() => {
                window.location.href = 'business.html';
            }, 2000);

        } catch (error) {
            statusMsg.innerText = "Error: " + error.message;
            statusMsg.className = "status-msg status-error";
            statusMsg.style.display = "block";
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Submit for Verification';
        }
    };
</script>
</body>
</html>
