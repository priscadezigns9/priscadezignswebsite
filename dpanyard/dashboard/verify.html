<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Verify Business | D' PanYard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #E01B24;
            --navy-deep: #0D1B2A;
            --white: #FFFFFF;
            --bg-light: #F8FAFC;
            --border-color: #E2E8F0;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--navy-deep); line-height: 1.6; }

        nav { background: var(--white); border-bottom: 2px solid var(--primary-red); padding: 0 5%; display: flex; align-items: center; justify-content: space-between; height: 72px; }
        .brand { font-family: 'Sora', sans-serif; font-size: 24px; font-weight: 800; color: var(--navy-deep); text-decoration: none; }
        .brand span { color: var(--primary-red); }

        .container { max-width: 600px; margin: 60px auto; padding: 0 20px; }
        .card { background: var(--white); border-radius: 24px; padding: 40px; border: 1px solid var(--border-color); box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        
        h1 { font-family: 'Sora', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 12px; }
        p { color: #64748B; margin-bottom: 32px; }

        .v-step { margin-bottom: 40px; padding-bottom: 32px; border-bottom: 1px solid var(--border-color); }
        .v-step:last-child { border: none; }
        .v-step h3 { font-family: Sora; font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
        .step-num { background: var(--navy-deep); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }

        label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 12px; }
        input[type="file"] { width: 100%; padding: 20px; border: 2px dashed var(--border-color); border-radius: 16px; cursor: pointer; transition: all 0.3s; }
        input[type="file"]:hover { border-color: var(--primary-red); background: rgba(224, 27, 36, 0.02); }

        .btn-v { background: var(--primary-red); color: white; width: 100%; padding: 18px; border-radius: 50px; border: none; font-family: Sora; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-v:hover { background: #C0151D; transform: translateY(-2px); }
        
        .hint { font-size: 13px; color: #64748B; margin-top: 8px; display: block; }
    </style>
</head>
<body>

<nav>
    <a href="../index.html" class="brand">dpanyard</a>
</nav>

<div class="container">
    <div class="card">
        <h1>Verify Your Business</h1>
        <p>Complete these steps to earn your high-fidelity verification tick.</p>

        <form onsubmit="event.preventDefault(); alert('Verification documents submitted for review!'); window.location.href='business.html';">
            <div class="v-step">
                <h3><span class="step-num">1</span> Identity Verification</h3>
                <label>Upload ID (National ID, Passport, or Driver's License)</label>
                <input type="file" required>
                <label style="margin-top: 20px;">Upload a Selfie (Holding your ID)</label>
                <input type="file" required>
                <span class="hint">Ensure your face and ID details are clearly visible.</span>
            </div>

            <div class="v-step">
                <h3><span class="step-num">2</span> Business Credentials</h3>
                <label>BIR Number</label>
                <input type="text" placeholder="Enter BIR Number" style="width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid var(--border-color); margin-bottom: 20px;" required>
                <label>Business Certificate / Registration Document</label>
                <input type="file" required>
                <span class="hint">Upload a high-fidelity scan of your registration.</span>
            </div>

            <button type="submit" class="btn-v">Submit for Verification</button>
        </form>
    </div>
</div>

</body>
</html>
