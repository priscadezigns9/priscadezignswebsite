<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Provider Profile | dpanyard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/dpanyard/favicon.ico">
    <style>
        :root { --primary-red: #E01B24; --navy-deep: #0D1B2A; --white: #FFFFFF; --bg-light: #F8FAFC; --border-color: #E2E8F0; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--navy-deep); }
        nav { background: var(--white); border-bottom: 2px solid var(--primary-red); padding: 0 5%; display: flex; align-items: center; justify-content: space-between; height: 72px; }
        .brand img { height: 40px; }
        .profile-hero { background: var(--navy-deep); color: var(--white); padding: 80px 5%; display: flex; gap: 40px; align-items: center; }
        .av-large { width: 120px; height: 120px; border-radius: 24px; background: var(--primary-red); color: white; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: 800; font-family: Sora; }
        .p-badge { background: var(--primary-red); color: white; padding: 6px 16px; border-radius: 50px; font-size: 12px; font-weight: 800; }
        .main-content { padding: 60px 5%; display: grid; grid-template-columns: 2fr 1fr; gap: 40px; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--white); border-radius: 24px; padding: 40px; border: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .btn-book { background: var(--primary-red); color: white; width: 100%; padding: 20px; border-radius: 50px; border: none; font-weight: 800; font-family: Sora; cursor: pointer; transition: 0.3s; margin-top: 24px; }
    </style>
</head>
<body>
<nav><a href="/dpanyard/index.html" class="brand"><img src="../assets/logos/website_logo.png" alt="dpanyard"></a></nav>
<div class="profile-hero">
    <div class="av-large" id="profile-av">?</div>
    <div class="p-info">
        <div style="display: flex; gap: 10px; margin-bottom: 12px;"><span class="p-badge">Verified ✓</span></div>
        <h1 id="profile-name">Loading...</h1>
    </div>
</div>
<div class="main-content">
    <div class="card">
        <h2>About Business</h2>
        <p id="profile-bio" style="line-height: 1.8; margin-top: 16px; color: #444;">No bio provided.</p>
    </div>
    <div class="card" style="height: fit-content;">
        <h2>Quick Actions</h2>
        <button class="btn-book" onclick="alert('Appointment request sent to provider!')">Book Appointment</button>
        <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-color); text-align: center;">
            <a href="https://priscadezigns.org/agency/" style="display: block; color: var(--primary-red); font-weight: 800; text-decoration: none; font-size: 14px;">Apply for a Website →</a>
        </div>
    </div>
</div>
<script>
    window.onload = function() {
        const saved = JSON.parse(localStorage.getItem('panyard_biz_data') || '{}');
        if(saved.name) {
            document.getElementById('profile-name').innerText = saved.name;
            document.getElementById('profile-av').innerText = saved.name[0].toUpperCase();
            document.getElementById('profile-bio').innerText = saved.bio || 'High-fidelity service provider.';
        } else {
            document.getElementById('profile-name').innerText = "Marcus Electric Solutions";
            document.getElementById('profile-av').innerText = "M";
            document.getElementById('profile-bio').innerText = "High-fidelity electrical services for the neighbourhood.";
        }
    }
</script>
</body>
</html>
