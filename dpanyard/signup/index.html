<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Panyard | dpanyard</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #E87722;
            --bg: #FFFFFF;
            --text: #0F172A;
            --grey: #64748B;
            --border: #F1F5F9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .auth-card { width: 100%; max-width: 400px; text-align: center; }
        .logo { font-family: 'Fraunces', serif; font-size: 2.5rem; color: var(--primary); margin-bottom: 8px; text-decoration: none; display: block; }
        h1 { font-family: 'Fraunces', serif; font-size: 1.5rem; color: var(--text); margin-bottom: 8px; }
        p { color: var(--grey); margin-bottom: 32px; font-size: 0.95rem; }

        .btn-google { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid var(--border); background: white; color: var(--text); font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.2s; margin-bottom: 24px; }
        .btn-google:hover { background: var(--border); transform: translateY(-1px); }

        .divider { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; color: var(--grey); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .input-group { text-align: left; margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--grey); margin-bottom: 8px; letter-spacing: 0.5px; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: #F8FAFC; outline: none; font-size: 0.95rem; transition: 0.2s; }
        input:focus { border-color: var(--primary); background: white; }

        .btn-submit { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--primary); color: white; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 20px rgba(232, 119, 34, 0.2); margin-top: 8px; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(232, 119, 34, 0.3); }

        .footer-link { margin-top: 24px; font-size: 0.9rem; color: var(--grey); }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

    <div class="auth-card">
        <a href="../dpanyard_index.html" class="logo">dpanyard</a>
        <h1>Create Account</h1>
        <p>Join the professional network of the future</p>

        <button class="btn-google" onclick="signInWithGoogle()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20" alt="Google">
            Sign up with Google
        </button>

        <div class="divider">or use email</div>

        <form id="signup-form">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="name@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit" id="submit-btn">Create Account</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="../login/">Sign In</a>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdHBqYWNvd3FhZWRkZHRyaHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDk5MzEsImV4cCI6MjA5NDIyNTkzMX0.FK4N_ATFTaUuGXrYu_7OBn3qCdlo0rOzxk-E6TxJxqs');

        async function signInWithGoogle() {
            const { data, error } = await sb.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/dpanyard/dashboard/personal'
                }
            });
            if (error) alert("Google Sign-In Error: " + error.message);
        }

        document.getElementById('signup-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submit-btn');
            
            btn.innerText = 'Creating account...';
            const { error } = await sb.auth.signUp({ email, password });
            
            if (error) {
                alert(error.message);
                btn.innerText = 'Create Account';
            } else {
                alert("Account created! Please check your email for verification.");
                window.location.href = '../login/';
            }
        };

        // Check if already logged in
        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) window.location.href = '../dashboard/personal';
        }
        checkSession();
    </script>
</body>
</html>
