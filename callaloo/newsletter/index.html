<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Callaloo | The Alpha Signal Intercept</title>
  <meta property="og:image" content="../ai_concept_39_neo_alpha.png" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container { max-width: 560px; width: 100%; text-align: center; }
    .eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #FF6B00;
      margin-bottom: 24px;
      display: block;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.4rem, 8vw, 4rem);
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: -2px;
      margin-bottom: 20px;
    }
    .sub {
      color: #aaa;
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 40px;
      max-width: 460px;
      margin-left: auto;
      margin-right: auto;
    }
    form { display: flex; flex-direction: column; gap: 16px; }
    input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      padding: 16px 20px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    input::placeholder { color: #666; }
    input:focus { border-color: #FF6B00; }
    button {
      background: #FF6B00;
      border: none;
      border-radius: 6px;
      color: #000;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 4px;
      padding: 18px;
      text-transform: uppercase;
      transition: opacity 0.2s;
      width: 100%;
    }
    button:hover { opacity: 0.85; }
    .back-link {
      display: inline-block;
      margin-top: 36px;
      color: #555;
      font-size: 0.85rem;
      text-decoration: none;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back-link:hover { color: #FF6B00; }
    .success-msg {
      display: none;
      color: #FF6B00;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-top: 20px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="eyebrow">Alpha Intercept</span>
    <h1>Callaloo<br>Newsletter</h1>
    <p class="sub">Intercept the latest signals, drops, and elite intel before it reaches the mass market. The Alpha Signal starts here.</p>
    <form id="newsletter-form">
      <input type="hidden" name="_subject" value="New Newsletter Subscriber — Callaloo">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="?subscribed=1">
      <input type="text" name="name" placeholder="Your Name" required autocomplete="name">
      <input type="email" name="email" placeholder="Your Email Address" required autocomplete="email">
      <button type="submit">Subscribe Now</button>
    </form>
    <p class="success-msg" id="success-msg">You're in. Welcome to the inner circle.</p>
    <a href="../" class="back-link">Back to Callaloo</a>
  </div>
  <script>
    const p = new URLSearchParams(window.location.search);
    if (p.get('subscribed') === '1') {
      document.getElementById('newsletter-form').style.display = 'none';
      document.getElementById('success-msg').style.display = 'block';
    }
  </script>

  <script>
    document.getElementById('newsletter-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const form = e.target;
      const btn = form.querySelector('button');
      const email = form.querySelector('input[name="email"]').value;
      const nameInput = form.querySelector('input[name="name"]');
      const name = nameInput ? nameInput.value : '';
      
      btn.disabled = true;
      btn.textContent = 'Subscribing...';
      
      const formData = new URLSearchParams();
      formData.append('email', email);
      formData.append('name', name);
      formData.append('brand', 'Callaloo');
      formData.append('source', 'Newsletter Page');
      
      fetch('https://script.google.com/macros/s/AKfycbwQx48DZ41k1d9nAVwE0MRqy3X33ZLOb8ThUR6LpMt8INMV2rxpo_OUQ5HyDLqq3dEQ/exec', {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData
      }).then(() => {
        form.style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
      }).catch(err => {
        btn.disabled = false;
        btn.textContent = 'Subscribe Now';
      });
    });
  </script>
</body>
</html>
