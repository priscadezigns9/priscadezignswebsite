<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captio AI Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Captio AI Settings</h1>
    </header>

    <div class="section">
      <h2>API Configuration</h2>
      <p class="description">Enter your OpenAI API key to use GPT-4o-mini for better captions. Without a key, the extension uses a high-quality template engine.</p>
      
      <div class="input-group">
        <label for="apiKey">OpenAI API Key</label>
        <div class="password-wrapper">
          <input type="password" id="apiKey" placeholder="sk-...">
          <button id="toggleVisible" class="text-btn">Show</button>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Defaults</h2>
      <div class="input-group">
        <label for="defaultPlatform">Default Platform</label>
        <select id="defaultPlatform">
          <option value="Instagram">Instagram</option>
          <option value="Threads">Threads</option>
          <option value="Facebook">Facebook</option>
          <option value="Twitter">Twitter</option>
          <option value="LinkedIn">LinkedIn</option>
        </select>
      </div>

      <div class="input-group">
        <label for="defaultTone">Default Tone</label>
        <select id="defaultTone">
          <option value="Professional">Professional</option>
          <option value="Hype">Hype</option>
          <option value="Inspirational">Inspirational</option>
          <option value="Luxury">Luxury</option>
          <option value="Spiritual">Spiritual</option>
        </select>
      </div>
    </div>

    <div class="section">
      <h2>Account Status</h2>
      <div class="status-card">
        <div class="status-row">
          <span>Daily Usage</span>
          <span id="usageCount">0 / 5</span>
        </div>
        <div class="status-row">
          <span>Plan</span>
          <span class="plan-badge">Free</span>
        </div>
        <a href="https://priscadezigns.org/captio-ai/pro" target="_blank" class="upgrade-btn">Upgrade to Pro</a>
      </div>
    </div>

    <div class="footer-actions">
      <button id="saveBtn" class="primary-btn">Save Settings</button>
      <span id="saveStatus" class="status-msg"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
