<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>404 | Tech Scout HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=JetBrains+Mono:wght@400&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --blue: #0A84FF; 
            --cyan: #00E5FF;
            --bg: #050508; 
            --text: #F0F0F5; 
            --border: rgba(10,132,255,0.2); 
            --font-main: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-main); height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
        
        .content { position: relative; z-index: 10; }
        h1 { font-size: 10rem; line-height: 1; margin: 0; color: var(--blue); letter-spacing: -5px; }
        .error-code { font-family: var(--font-mono); color: var(--cyan); font-size: 1.5rem; margin-bottom: 20px; }
        h2 { font-size: 2.5rem; margin-bottom: 30px; text-transform: uppercase; }
        p { color: #888; font-size: 1.1rem; margin-bottom: 40px; }
        
        .home-btn { display: inline-block; padding: 18px 40px; background: #FF9900; color: #000; text-decoration: none; border-radius: 4px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .home-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,153,0,0.3); }
        
        .glitch-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.05; pointer-events: none; }
    </style>
</head>
<body>
    <div class="content">
        <div class="error-code">ERROR_CODE: [NULL_PATH]</div>
        <h1>404</h1>
        <h2>Signal Lost in Deep Space</h2>
        <p>The tech you're scouting doesn't exist in this sector.</p>
        <a href="/" class="home-btn">Return to Base</a>
    </div>
    <div class="glitch-bg" id="particles-js"></div>
</body>
</html>
