<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="header">
        <span class="brand">Priscion</span>
        <span class="scout">Price Scout</span>
    </div>
    
    <div class="tagline">"Never Overpay. Sovereign Savings."</div>

    <div class="container">
        <div id="product-info">
            <div class="row">
                <span>Current Price:</span>
                <span id="current-price" class="gold">Loading...</span>
            </div>
            <div class="row">
                <span>Deal Score:</span>
                <span id="deal-score" class="score">?</span>
            </div>
        </div>

        <div class="section-title">Price History</div>
        <div id="price-history">
            <!-- Embed CamelCamelCamel if Amazon -->
            <div id="history-container" class="placeholder">
                Chart loading...
            </div>
        </div>

        <div class="actions">
            <button id="set-alert-btn" class="btn">Set Price Alert</button>
            <a id="shop-btn" href="#" target="_blank" class="btn gold-btn">Shop Priscion Empire</a>
        </div>

        <div class="pro-banner">
            Upgrade to <span class="gold">Price Scout Pro</span> for auto-coupons and AI alerts.
            <a href="https://priscadezigns.org/pricescout/pro" target="_blank" class="upgrade-link">Upgrade Now</a>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
