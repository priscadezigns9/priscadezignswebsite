<!DOCTYPE html>
<html>
<head>
    <title>Price Scout Settings</title>
    <style>
        body { font-family: Inter, sans-serif; background: #000; color: #fff; padding: 40px; }
        .card { background: #0A0A0A; border: 1px solid #333; padding: 20px; border-radius: 8px; max-width: 600px; margin: 0 auto; }
        h1 { color: #FFD700; }
        .setting { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="text"] { background: #111; border: 1px solid #444; color: #fff; padding: 10px; width: 100%; border-radius: 4px; box-sizing: border-box; }
        .save-btn { background: #FFD700; color: #000; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .save-btn:hover { background: #e6c200; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Priscion Price Scout Settings</h1>
        
        <div class="setting">
            <label>Affiliate Tag (Amazon)</label>
            <input type="text" id="affiliate-tag" value="priscadezigns-20" disabled>
            <p style="font-size: 12px; color: #666;">Locked to Sovereign ID: priscadezigns-20</p>
        </div>

        <div class="setting">
            <label>Active Price Alerts</label>
            <div id="alerts-list" style="font-size: 14px; color: #aaa;">No active alerts.</div>
        </div>

        <button class="save-btn" id="save-btn">Save Preferences</button>
    </div>
    <script src="options.js"></script>
</body>
</html>
