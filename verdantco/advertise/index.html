<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advertise with Verdant Co</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; padding: 6%; }
        form { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; }
        input, textarea { margin-bottom: 20px; padding: 15px; background: #111; border: 1px solid #333; color: #fff; border-radius: 4px; }
        button { padding: 15px; background: #1D6F42; color: #fff; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        h1 { text-align: center; font-size: 2.5rem; margin-bottom: 40px; }
    </style>
</head>
<body>
    <h1>Advertise with Us</h1>
    <p style="text-align:center; margin-bottom:60px;">Partner with the Sovereign Network's premier sustainability hub.</p>
    <form action="#" method="POST">
        <input type="text" name="company" placeholder="Company Name" required>
        <input type="email" name="email" placeholder="Business Email" required>
        <input type="text" name="phone" placeholder="Contact Number">
        <textarea name="message" placeholder="Briefly describe your brand and mission" rows="5"></textarea>
        <button type="submit">Submit Proposal</button>
    </form>
</body>
</html>
