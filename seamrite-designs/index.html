<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seamrite Designs | The Empire Network</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FDF8F2;
            --text: #1A1A1A;
            --muted: #666666;
            --accent: #7B35D4;
            --border: rgba(0,0,0,0.1);
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 80px 6%;
        }

        header {
            max-width: 900px;
            margin-bottom: 80px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 24px;
            text-decoration: none;
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: clamp(3rem, 8vw, 5rem);
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .lead {
            font-size: 1.4rem;
            color: var(--muted);
            max-width: 700px;
        }

        .content-section {
            margin-top: 60px;
            border-top: 1px solid var(--border);
            padding-top: 60px;
        }

        .brand-logo-hero {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/9;
            background: #FFF;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            overflow: hidden;
            border-radius: 12px;
        }

        .brand-logo-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        footer {
            margin-top: 100px;
            padding-top: 40px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .copyright {
            color: var(--muted);
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            body { padding: 40px 6%; }
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="back-link">← The Empire Network</a>
        <h1>Seamrite Designs</h1>
        <p class="lead">Bespoke tailoring and AI fashion fit.</p>
    </header>

    <div class="content-section">
        <div class="brand-logo-hero">
            <img src="/logos/seamritedesigns.jpg" alt="Seamrite Designs">
        </div>
        
        <div style="max-width: 700px;">
            <h2 style="font-family: var(--font-heading); margin-bottom: 20px;">Network Insight</h2>
            <p style="margin-bottom: 20px;">Bespoke tailoring and AI fashion fit. Seamrite Designs is part of the Empire Network's high-fidelity curation cycle for 2026.</p>
            <a href="https://wa.me/447576505652" style="color: var(--accent); text-decoration: none; font-weight: 600;">Contact for Collaboration →</a>
        </div>
    </div>

    <footer>
        <p class="copyright">© 2026 PRISCA DEZIGNS · THE EMPIRE NETWORK</p>
    </footer>

</body>
</html>
