<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Empire Ebook Collection | Prisca Dezigns AI Labs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FDF8F2; --text: #1A1A1A; --accent: #7B35D4; --font-heading: 'Cormorant Garamond', serif; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 80px 6%; text-align: center; }
        h1 { font-family: var(--font-heading); font-size: 3.5rem; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 40px; border: 1px solid rgba(0,0,0,0.1); border-radius: 4px; transition: 0.3s; text-decoration: none; color: inherit; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card h2 { font-family: var(--font-heading); font-size: 1.8rem; margin-bottom: 15px; }
        .price { color: var(--accent); font-weight: 700; margin-bottom: 20px; }
        .btn { display: inline-block; padding: 12px 30px; background: var(--text); color: white; text-decoration: none; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body>
    <h1>The Ebook Collection</h1>
    <div class="grid">
        <a href="/ebooks/neural-compendium.html" class="card">
            <h2>The Neural Compendium</h2>
            <p>Ivory Manifesto & 20 Neural Prompts</p>
            <div class="price">$49.00</div>
            <span class="btn">View Ebook</span>
        </a>
        <a href="/ebooks/peakfit.html" class="card">
            <h2>Peak Fit</h2>
            <p>The Neural Protocol for Elite Fitness</p>
            <div class="price">$49.00</div>
            <span class="btn">View Ebook</span>
        </a>
    </div>
</body>
</html>
