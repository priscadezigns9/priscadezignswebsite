<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PricePulse Options</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>PricePulse Settings</h1>
    </header>

    <section>
      <h2>Affiliate Configuration</h2>
      <div class="setting">
        <label>Active Affiliate Tag:</label>
        <input type="text" value="priscadezigns-20" readonly>
        <p class="hint">Links automatically support the Priscion Ecosystem.</p>
      </div>
    </section>

    <section>
      <h2>Alert Preferences</h2>
      <div class="setting">
        <label>Notification Email:</label>
        <input type="email" id="alert-email" placeholder="email@example.com">
      </div>
      <div class="setting">
        <label>Check Frequency:</label>
        <select disabled>
          <option>Every 6 Hours (Standard)</option>
          <option>Every 1 Hour (Pro)</option>
        </select>
      </div>
    </section>

    <section>
      <h2>Supported Sites</h2>
      <div class="site-toggles">
        <label><input type="checkbox" checked disabled> amazon.com</label>
        <label><input type="checkbox" checked disabled> amazon.co.uk</label>
        <label><input type="checkbox" checked disabled> amazon.ca</label>
        <label><input type="checkbox" checked disabled> amazon.com.au</label>
      </div>
    </section>

    <section class="pro-section">
      <h2>PricePulse Pro</h2>
      <p>Unlock real-time price tracking, multi-region alerts, and priority brand recommendations.</p>
      <button class="pro-btn">$3.99 / month - Upgrade Now</button>
    </section>

    <button id="save-btn" class="save-btn">Save Settings</button>
  </div>
  <script src="options.js"></script>
</body>
</html>
