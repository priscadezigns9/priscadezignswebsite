<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PricePulse</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="container">
    <div id="header">
      <img src="icons/icon48.png" alt="PricePulse" class="logo">
      <h1>PricePulse</h1>
    </div>

    <div id="amazon-view" style="display:none;">
      <div class="deal-section">
        <div class="gauge-container">
          <div id="deal-score-gauge" class="gauge">
            <span id="deal-score-value">0</span>
          </div>
          <div class="gauge-label">Deal Score</div>
        </div>
        <div class="price-info">
          <div id="product-title">Loading...</div>
          <div class="prices">
            <span id="current-price"></span>
            <span id="original-price"></span>
          </div>
          <div id="savings-badge" class="badge"></div>
        </div>
      </div>

      <div class="actions">
        <button id="view-history-btn" class="primary-btn">View Price History</button>
      </div>

      <div class="alert-section">
        <h3>Price Alert</h3>
        <div class="alert-input">
          <input type="number" id="target-price" placeholder="Target Price">
          <button id="set-alert-btn">Alert Me</button>
        </div>
      </div>

      <div id="recommendation-section" class="brand-box" style="display:none;">
        <p>Recommended for you:</p>
        <a id="brand-link" href="#" target="_blank">
          <div class="brand-name"></div>
          <div class="brand-shop">Shop Now &rarr;</div>
        </a>
      </div>

      <div class="footer">
        <p>Links support Prisca Dezigns via affiliate partnership</p>
      </div>
    </div>

    <div id="non-amazon-view">
      <p class="notice">Visit an Amazon product page to activate PricePulse</p>
      <button id="go-to-amazon" class="primary-btn">Go to Amazon</button>
    </div>
  </div>
  <script src="shop_map.js"></script>
  <script src="popup.js"></script>
</body>
</html>
