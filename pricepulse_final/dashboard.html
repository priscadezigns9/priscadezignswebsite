<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPTISCOUT | Neural Dashboard</title>
    <style>
        :root {
            --bg: #FFFFFF; --text: #1A1A1A; --muted: #666; --accent: #FF6600; --border: rgba(0,0,0,0.1);
            --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #F5F5F5; color: var(--text); font-family: var(--font-body); }
        nav { background: #FFF; padding: 20px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo img { height: 40px; }
        .container { padding: 40px 6%; max-width: 1400px; margin: 0 auto; }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: #FFF; padding: 30px; border-radius: 12px; border: 1px solid var(--border); }
        .card .val { font-size: 2rem; font-weight: 800; }
        .search-area { background: #FFF; padding: 40px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 40px; }
        .search-flex { display: flex; gap: 15px; }
        input { flex: 1; padding: 18px; border: 1px solid var(--border); border-radius: 8px; }
        button { padding: 18px 40px; background: var(--accent); color: #FFF; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .table-container { background: #FFF; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; background: #FAFAFA; border-bottom: 1px solid var(--border); }
        td { padding: 20px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>
    <nav>
        <div class="logo"><img src="../logos/OPTISCOUT_DEFINITIVE_2026.png" alt="OptiScout"></div>
    </nav>
    <div class="container">
        <h1>Sovereign Scout Dashboard</h1>
        <div class="grid-stats">
            <div class="card"><h4>Monitored Assets</h4><div class="val">1,284</div></div>
            <div class="card"><h4>Active Signals</h4><div class="val">42,901</div></div>
            <div class="card"><h4>Scout Savings</h4><div class="val">$14,280</div></div>
        </div>
        <div class="search-area">
            <h3>Initialize New Scout</h3>
            <div class="search-flex">
                <input type="text" placeholder="Enter Amazon Product URL or ASIN...">
                <button onclick="alert('Scout Active')">Add Asset</button>
            </div>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>Asset Name</th><th>Price</th><th>Signal</th><th>Status</th></tr></thead>
                <tbody>
                    <tr><td>Neural Processing Unit</td><td>$499.00</td><td style="color:#FF6600;">-15% Deal</td><td>Active</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
