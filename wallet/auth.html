<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRISCION WALLET | Sovereign Identity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --accent: #7B35D4;
            --text: #FFFFFF;
            --muted: #888888;
            --border: rgba(255, 255, 255, 0.1);
            --neural-glow: rgba(123, 53, 212, 0.2);
            --gold: #D4AF37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .neural-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1; opacity: 0.15;
        }

        .auth-container {
            width: 95%;
            max-width: 480px;
            background: var(--surface);
            border-radius: 40px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
            z-index: 10;
        }

        .screen { display: none; animation: fadeIn 0.4s ease-out; }
        .screen.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .logo-header { text-align: center; margin-bottom: 40px; }
        .logo-header img { height: 80px; border-radius: 50%; border: 1px solid var(--accent); margin-bottom: 15px; }
        .logo-header h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; letter-spacing: 1px; }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { transform: scale(1.02); filter: brightness(1.1); box-shadow: 0 0 20px var(--neural-glow); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: white; }
        .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: var(--accent); }

        .btn-secondary { background: #111; color: var(--muted); border: 1px solid var(--border); }

        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; font-weight: 800; }
        .input-group input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--accent); }

        .seed-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }
        .seed-word {
            background: #000;
            padding: 10px;
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            text-align: center;
            border: 1px solid var(--border);
            color: var(--muted);
        }

        .dashboard {
            height: 100vh; width: 100vw;
            display: grid;
            grid-template-columns: 280px 1fr 380px;
            background: var(--bg);
        }

        .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 30px; }
        .side-nav { margin-top: 50px; }
        .side-item {
            padding: 15px 20px;
            border-radius: 12px;
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }
        .side-item:hover, .side-item.active { background: rgba(123, 53, 212, 0.1); color: var(--accent); }

        .main-col { padding: 40px; overflow-y: auto; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 30px; }
        .stat-val { font-size: 2rem; font-weight: 900; margin-top: 10px; }

        .wallet-panel { background: #000; border-left: 1px solid var(--border); padding: 30px; display: flex; flex-direction: column; }
        .handle-nft {
            aspect-ratio: 1;
            background: linear-gradient(45deg, #111, var(--surface));
            border-radius: 24px;
            border: 1px solid var(--accent);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px var(--neural-glow);
        }
        .handle-nft h3 { position: relative; font-size: 1.5rem; letter-spacing: 1px; color: var(--accent); }

    </style>
</head>
<body>

    <div class="neural-grid"></div>

    <div id="authContainer" class="auth-container">
        
        <div id="screen-start" class="screen active">
            <div class="logo-header">
                <img src="https://drive.google.com/uc?export=view&id=1D4We-G4I_M3cjBKyPHbVTa9W5abinD8v">
                <h1>PRISCION WALLET</h1>
                <p style="color:var(--muted); font-size:0.8rem; margin-top:10px;">Sovereign Ledger v1.1</p>
            </div>
            <button class="btn btn-primary" onclick="showScreen('create-choice')">Create New Wallet</button>
            <button class="btn btn-outline" onclick="showScreen('recover')">Recover Wallet</button>
        </div>

        <div id="screen-create-choice" class="screen">
            <div class="logo-header">
                <h2>Choose Protection</h2>
            </div>
            <button class="btn btn-outline" onclick="generateSeed(12)">12 Words (Standard)</button>
            <button class="btn btn-outline" onclick="generateSeed(24)">24 Words (High-Fidelity)</button>
            <button class="btn btn-secondary" onclick="showScreen('start')" style="margin-top:20px;">Back</button>
        </div>

        <div id="screen-seed" class="screen">
            <div class="logo-header">
                <h2>Your Recovery Phrase</h2>
                <p style="color:var(--muted); font-size:0.7rem; font-weight:800; margin-top:10px;">NEVER DISCLOSE THESE WORDS</p>
            </div>
            <div id="seedDisplay" class="seed-grid"></div>
            <button class="btn btn-primary" onclick="verifySeed()">I have stored them safely</button>
        </div>

        <div id="screen-verify" class="screen">
            <div class="logo-header">
                <h2>Security Check</h2>
            </div>
            <div class="input-group">
                <label id="verifyLabel">Enter word #7</label>
                <input type="text" id="verifyInput" placeholder="Enter word...">
            </div>
            <button class="btn btn-primary" onclick="confirmVerify()">Verify Phrase</button>
        </div>

        <div id="screen-password" class="screen">
            <div class="logo-header">
                <h2>Set PIN</h2>
                <p style="color:var(--muted); font-size:0.8rem; margin-top:10px;">Secure your identity locally</p>
            </div>
            <div class="input-group">
                <label>Create PIN</label>
                <input type="password" id="pass1" placeholder="••••">
            </div>
            <div class="input-group">
                <label>Confirm PIN</label>
                <input type="password" id="pass2" placeholder="••••">
            </div>
            <button class="btn btn-primary" onclick="setupComplete()">Finalize Identity</button>
        </div>

        <div id="screen-handle-login" class="screen">
            <div class="logo-header">
                <img src="https://drive.google.com/uc?export=view&id=1D4We-G4I_M3cjBKyPHbVTa9W5abinD8v">
                <h2>Identity Handshake</h2>
            </div>
            <div class="input-group">
                <label>Handle</label>
                <input type="text" id="loginHandle" placeholder="$prisca.prn" value="$prisca.prn">
            </div>
            <div class="input-group">
                <label>PIN Code</label>
                <input type="password" id="loginPass" placeholder="••••">
            </div>
            <button class="btn btn-primary" onclick="dashboardMode()">Sign In</button>
        </div>
    </div>

    <div id="dashboard" class="dashboard" style="display:none;">
        <div class="sidebar">
            <div class="logo-header" style="text-align:left; margin-bottom:20px;">
                <img src="https://drive.google.com/uc?export=view&id=1D4We-G4I_M3cjBKyPHbVTa9W5abinD8v" style="width:40px;">
                <h1 style="font-size:1.2rem;">PRISCION</h1>
            </div>
            <div class="side-nav">
                <div class="side-item active" onclick="switchTab('home')">Overview</div>
                <div class="side-item" onclick="location.href='vault.html'">Vault</div>
                <div class="side-item" onclick="location.href='../leggo.html'">Explorer</div>
            </div>
        </div>

        <div id="main-content" class="main-col">
            <div id="tab-home">
                <h1 style="font-size:2.5rem; font-family:'Playfair Display';">Sovereign Overview</h1>
                <div class="stats-grid">
                    <div class="stat-card">
                        <label style="font-size:0.65rem; color:var(--muted); font-weight:800; letter-spacing:1px;">TOTAL BALANCE</p>
                        <div class="stat-val">$4,240.50</div>
                    </div>
                </div>

                <h2 style="margin-top:50px; font-size:1rem; letter-spacing:2px; font-weight:900;">ASSETS</h2>
                <div id="asset-list" style="margin-top:20px;"></div>
            </div>
        </div>

        <div class="wallet-panel">
            <div class="handle-nft">
                <h3 id="displayHandle">$prisca.prn</h3>
            </div>
            <button class="btn btn-primary" onclick="location.href='../index.html'">Exit to Hub</button>
        </div>
    </div>

    <script>
        let currentSeed = [];
        let verifyIndex = 0;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
        }

        function generateSeed(length) {
            const words = ["neural", "sovereign", "ledgex", "mustard", "empire", "architect", "fidelity", "priscion", "blockchain", "node", "pulse", "terminal"];
            currentSeed = [];
            for(let i=0; i<length; i++) { currentSeed.push(words[Math.floor(Math.random() * words.length)]); }
            const display = document.getElementById('seedDisplay');
            display.innerHTML = currentSeed.map((w, i) => `<div class="seed-word">${i+1}. ${w}</div>`).join('');
            showScreen('seed');
        }

        function verifySeed() {
            verifyIndex = Math.floor(Math.random() * currentSeed.length);
            document.getElementById('verifyLabel').innerText = `Enter word #${verifyIndex + 1}`;
            showScreen('verify');
        }

        function confirmVerify() {
            if(document.getElementById('verifyInput').value.trim().toLowerCase() === currentSeed[verifyIndex]) showScreen('password');
            else alert('Verification failed.');
        }

        function setupComplete() {
            if(document.getElementById('pass1').value === document.getElementById('pass2').value) {
                localStorage.setItem('priscion_pin', document.getElementById('pass1').value);
                showScreen('handle-login');
            } else alert('PINs must match.');
        }

        function dashboardMode() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'grid';
            loadAssets();
        }

        function loadAssets() {
            const list = document.getElementById('asset-list');
            const assets = [
                { name: 'PRISCION ($PRN)', balance: '2,540.00', usd: '$2,540.00', logo: 'https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/priscion_primary_small.jpg' },
                { name: 'NEURAL ($NRL)', balance: '15,000', usd: '$15,000', logo: 'https://drive.google.com/uc?export=view&id=1To_XBjrXDO6ZRoQ2YzTleweTg6sEHgOL' },
                { name: 'ATELIA ($ATLR)', balance: '82,400', usd: '$2,472.00', logo: 'https://drive.google.com/uc?export=view&id=1DJqBy1SThRorrgD87rbkDCQ8W4ygyGC-' },
                { name: 'MUSTARD ($MUSD)', balance: '867.85', usd: '$867.85', logo: 'https://drive.google.com/uc?export=view&id=1RJfigGY8p5kg0-4WV8_DExrDd4Hj2mtz' }
            ];
            list.innerHTML = assets.map(a => `
                <div style="background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px; display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <img src="${a.logo}" style="width:40px; border-radius:50%; border:1px solid var(--accent);">
                        <div><div style="font-weight:800; font-size:0.85rem;">${a.name}</div><div style="font-size:0.65rem; color:var(--muted);">${a.balance}</div></div>
                    </div>
                    <div style="text-align:right;"><div style="font-weight:900;">${a.usd}</div></div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
