
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRISCION SOVEREIGN v2.9</title>
    <style>
        :root { --bg: #0B0E11; --card: #1E2329; --accent: #F0B90B; --p: #7B35D4; --text: #EAECEF; --text-dim: #707A8A; --g: #02C076; --r: #F6465D; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui; overflow: hidden; }
        .app { height: 100%; display: flex; flex-direction: column; }
        .hdr { padding: 20px; border-bottom: 1px solid #2B2F36; display: flex; justify-content: space-between; align-items: center; }
        .brand img { height: 20px; width: auto; }
        .main { flex: 1; overflow-y: auto; padding: 20px; }
        .view { display: none; }
        .view.active { display: block; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid #2B3139; margin-bottom: 15px; }
        .nav { height: 80px; background: var(--card); border-top: 1px solid #2B3139; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { text-align: center; color: var(--text-dim); font-size: 0.6rem; font-weight: 800; text-transform: uppercase; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--p); }
        .asset-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #2B3139; }
        .asset-img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .browser-bar { background: #2B3139; border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .browser-bar input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 0.9rem; }
        .brand-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .brand-item { background: var(--card); border: 1px solid #2B3139; padding: 15px 10px; border-radius: 15px; text-align: center; text-decoration: none; color: inherit; }
        .brand-item img { height: 30px; margin-bottom: 8px; }
        .btn-pay { background: linear-gradient(90deg, #0070BA, #1546a1); border: none; padding: 16px; border-radius: 14px; color: #fff; font-weight: 900; text-decoration: none; display: block; text-align: center; margin-top: 10px; }
        .swap-box { background: #2B3139; border-radius: 16px; padding: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="hdr">
            <div class="brand"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/priscion_wordmark.png"></div>
            <div style="font-size:0.7rem; font-weight:900; color:var(--accent);">SOVEREIGN NODE</div>
        </div>
        <div class="main">
            <div id="assets" class="view active">
                <div class="card"><div style="font-size:0.7rem; color:var(--text-dim);">Portfolio</div><div style="font-size:1.8rem; font-weight:900; margin:5px 0;">2.4M</div></div>
                <div class="card">
                    <div class="asset-row"><div style="display:flex;align-items:center;gap:10px"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/prn_icon_new.jpg" class="asset-img"><strong>PRN</strong></div><div>0.2M</div></div>
                    <div class="asset-row"><div style="display:flex;align-items:center;gap:10px"><img src="https://priscadezigns.org/calalloo/assets/logo.png" class="asset-img"><strong>CLL</strong></div><div>Calalloo</div></div>
                    <div class="asset-row"><div style="display:flex;align-items:center;gap:10px"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/riddiim_wordmark.png" class="asset-img"><strong>RDM</strong></div><div>Riddiim</div></div>
                    <div class="asset-row"><div style="display:flex;align-items:center;gap:10px"><img src="https://raw.githubusercontent.com/snek-coin/snek-assets/main/snek_logo.png" class="asset-img"><strong>SNEK</strong></div><div>0.00</div></div>
                </div>
            </div>
            <div id="browser" class="view">
                <div class="browser-bar"><span>🔍</span><input type="text" placeholder="Search or enter URL..." onkeydown="if(event.key==='Enter') window.location.href='https://google.com/search?q=' + this.value"></div>
                <h4 style="font-size:0.6rem; color:var(--text-dim); text-transform:uppercase; margin-bottom:10px;">Empire Nodes</h4>
                <div class="brand-grid">
                    <a href="https://priscadezigns.org/calalloo/" class="brand-item"><img src="https://priscadezigns.org/calalloo/assets/logo.png"><div>CLL</div></a>
                    <a href="https://priscadezigns.org/riddiim/" class="brand-item"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/riddiim_wordmark.png"><div>RDM</div></a>
                    <a href="https://priscadezigns.org/ateliagaming/" class="brand-item"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/atelia_gaming_hf.png"><div>ATLR</div></a>
                </div>
            </div>
            <div id="swap" class="view">
                <div class="card"><h3 style="margin:0; color:var(--accent);">Universal Swap</h3><div class="swap-box"><label style="font-size:0.6rem;color:var(--text-dim)">From</label><input type="number" value="1000" style="background:transparent;border:none;color:#fff;width:100%;font-size:1.2rem;outline:none;"><strong>PRN</strong></div><div style="text-align:center;margin:10px 0;">⇅</div><div class="swap-box"><label style="font-size:0.6rem;color:var(--text-dim)">To (SNEK, ADA, etc)</label><input type="text" value="SNEK" style="background:transparent;border:none;color:#fff;width:100%;font-size:1.2rem;outline:none;"></div><button style="background:var(--p); border:none; padding:15px; border-radius:12px; width:100%; color:#fff; font-weight:900;">CONVERT</button></div>
            </div>
            <div id="pay" class="view">
                <div class="card"><h3 style="margin:0; color:var(--accent);">Imperial On-Ramp</h3><p style="font-size:0.7rem; color:var(--text-dim);">Purchase PRN with Visa or PayPal.</p><a href="https://paypal.me/priscadezigns" class="btn-pay" target="_blank">PAY WITH VISA / PAYPAL</a></div>
            </div>
        </div>
        <div class="nav">
            <div class="nav-item active" onclick="switchTab('assets', this)">Assets</div>
            <div class="nav-item" onclick="switchTab('browser', this)">Browser</div>
            <div class="nav-item" onclick="switchTab('swap', this)">Swap</div>
            <div class="nav-item" onclick="switchTab('pay', this)">Pay</div>
        </div>
    </div>
    <script>function switchTab(id, el) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.getElementById(id).classList.add('active'); if(el) el.classList.add('active'); }</script>
</body>
</html>
