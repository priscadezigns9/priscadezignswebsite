
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRISCION WALLET</title>
    <link rel="manifest" href="/ledger/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/media/1780709319613.jpg">
    <style>
        :root { --p: #7B35D4; --g: #00FF88; --bg: #FDFDFF; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
        .app { height: 100%; display: flex; flex-direction: column; }
        .hdr { padding: 25px 20px; border-bottom: 1px solid #F0F0F0; display: flex; justify-content: space-between; align-items: center; background: #FFF; }
        .lbl { font-weight: 900; color: var(--p); letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; }
        .status-dot { width: 8px; height: 8px; background: var(--g); border-radius: 50%; box-shadow: 0 0 8px var(--g); }
        .main { flex: 1; padding: 20px; overflow-y: auto; text-align: center; }
        .box { background: #FFFBE6; border: 2px dashed #FFE58F; padding: 25px; border-radius: 24px; margin-bottom: 25px; }
        .btn { background: var(--p); color: #FFF; border: none; padding: 14px; border-radius: 16px; font-weight: 800; cursor: pointer; width: 100%; font-size: 0.85rem; text-transform: uppercase; box-shadow: 0 8px 20px rgba(123,53,212,0.25); }
        .card { background: #FFF; border-radius: 28px; padding: 25px; text-align: left; border: 1px solid #F0F0F0; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .card-title { font-weight: 900; font-size: 0.75rem; color: #333; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; display: block; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid #F8F8F8; }
        .sym { display: flex; align-items: center; gap: 10px; }
        .sym-lbl { font-weight: 800; color: #333; font-size: 1rem; }
        .sym-sub { font-size: 0.65rem; color: var(--p); font-weight: 700; display: block; }
        .val { font-family: 'SF Mono', 'Roboto Mono', monospace; font-weight: 700; color: #333; font-size: 0.95rem; }
        
        .nav { height: 70px; background: #FFF; border-top: 1px solid #F0F0F0; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { text-align: center; color: #AAA; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; cursor: pointer; flex: 1; padding: 10px; }
        .nav-active { color: var(--p); }
    </style>
</head>
<body>
    <div class="app">
        <div class="hdr"><span class="lbl">Priscion Wallet</span><div class="status-dot"></div></div>
        <div class="main">
            <div class="box">
                <div style="font-size:0.65rem; color:#856404; font-weight:800; margin-bottom:12px; text-transform:uppercase;">⚠️ Genesis Required</div>
                <button onclick="window.location.href='/ledger/'" class="btn">Sign Genesis</button>
            </div>
            <div class="card">
                <span class="card-title">Sovereign Assets</span>
                <div class="row">
                    <div class="sym"><div style="width:32px; height:32px; background:rgba(123,53,212,0.1); border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--p); font-weight:900; font-size:0.7rem;">P</div><div><span class="sym-lbl"></span><span class="sym-sub">Native</span></div></div>
                    <span class="val">1,000,000,000</span>
                </div>
                <div class="row">
                    <div class="sym"><div style="width:32px; height:32px; background:rgba(123,53,212,0.1); border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--p); font-weight:900; font-size:0.7rem;">$</div><div><span class="sym-lbl"></span><span class="sym-sub">Reserve</span></div></div>
                    <span class="val">500,000</span>
                </div>
                <div class="row" style="border-bottom:none;">
                    <div class="sym"><div style="width:32px; height:32px; background:rgba(123,53,212,0.1); border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--p); font-weight:900; font-size:0.7rem;">N</div><div><span class="sym-lbl"></span><span class="sym-sub">Neural</span></div></div>
                    <span class="val">750,000</span>
                </div>
            </div>
        </div>
        <div class="nav">
            <div class="nav-item nav-active">Assets</div>
            <div class="nav-item" onclick="window.location.href='/ledger/'">Swap</div>
            <div class="nav-item" onclick="window.location.href='/ledger/'">Explorer</div>
        </div>
    </div>
</body>
</html>
