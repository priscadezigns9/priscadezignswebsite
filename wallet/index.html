<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRX TERMINAL | Priscion Sovereign Exchange</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --accent: #7B35D4;
            --gold: #D4AF37;
            --green: #00ff88;
            --red: #ff4b2b;
            --border: rgba(255, 255, 255, 0.1);
            --neural-glow: rgba(123, 53, 212, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; min-height: 100vh; }

        .neural-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1; opacity: 0.2;
        }

        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(10,10,10,0.8);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-wrap { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
        .logo-img { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--accent); }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 800; letter-spacing: 2px; }

        .nav-links { display: flex; gap: 30px; }
        .nav-item { color: #888; text-decoration: none; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: var(--accent); }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            padding: 30px 5%;
            max-width: 1600px;
            margin: 0 auto;
        }

        .terminal-core {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            position: relative;
        }

        .live-price h2 { font-size: 2rem; color: var(--green); margin-bottom: 5px; }

        .chart-mock {
            height: 350px;
            background: #000;
            border-radius: 16px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .chart-mock svg { width: 100%; height: 100%; }

        .trade-sidebar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            height: fit-content;
        }

        .trade-tabs {
            display: flex;
            background: #000;
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 25px;
        }
        .trade-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--muted);
            cursor: pointer;
            border-radius: 8px;
        }
        .trade-tab.active-buy { background: var(--green); color: #000; }

        .input-wrap {
            background: #000;
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .input-wrap input { background: transparent; border: none; color: white; font-size: 1.1rem; font-weight: 700; width: 60%; outline: none; }
        .unit { font-weight: 900; font-size: 0.75rem; color: var(--muted); }

        .btn-trade {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        @media (max-width: 1000px) {
            .main-layout { grid-template-columns: 1fr; }
            .trade-sidebar { order: -1; }
        }
    </style>
</head>
<body>

    <div class="neural-grid"></div>

    <header>
        <a href="/" class="logo-wrap">
            <img src="https://drive.google.com/uc?export=view&id=1D4We-G4I_M3cjBKyPHbVTa9W5abinD8v" class="logo-img">
            <div class="logo-text">PRISCION</div>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-item">Web2 Hub</a>
            <a href="auth.html" class="nav-item">Wallet</a>
            <a href="vault.html" class="nav-item">Vault</a>
            <a href="../leggo.html" class="nav-item">Explorer</a>
        </div>
        <button onclick="location.href='auth.html'" style="background:var(--accent); color:white; border:none; padding:10px 20px; border-radius:30px; font-weight:800; font-size:0.7rem; cursor:pointer;">CONNECT WALLET</button>
    </header>

    <div class="main-layout">
        
        <div class="terminal-core">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:30px;">
                <div>
                    <h1 style="font-family:'Playfair Display'; font-size:2rem;">$PRN / $MUSD</h1>
                    <p style="color:var(--muted); font-family:'Space Mono'; font-size:0.8rem;">Sovereign Reserve Pairing</p>
                </div>
                <div style="text-align:right;">
                    <h2 style="font-size:2rem; color:var(--green);">$1.4242</h2>
                    <p style="font-size:0.8rem; color:var(--muted);">+12.84% (24H)</p>
                </div>
            </div>

            <div class="chart-mock">
                <svg viewBox="0 0 800 350">
                    <defs>
                        <linearGradient id="chartGradient" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="rgba(123, 53, 212, 0.4)"/>
                            <stop offset="100%" stop-color="rgba(123, 53, 212, 0)"/>
                        </linearGradient>
                    </defs>
                    <path d="M0,300 L50,280 L100,290 L150,220 L200,240 L250,180 L300,200 L350,150 L400,160 L450,100 L500,120 L550,80 L600,90 L650,40 L700,60 L800,20" fill="none" stroke="var(--accent)" stroke-width="3" />
                    <path d="M0,300 L50,280 L100,290 L150,220 L200,240 L250,180 L300,200 L350,150 L400,160 L450,100 L500,120 L550,80 L600,90 L650,40 L700,60 L800,20 L800,350 L0,350 Z" fill="url(#chartGradient)" />
                </svg>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:40px; font-family:'Space Mono';">
                <div>
                    <h3 style="font-size:0.7rem; color:var(--muted); margin-bottom:15px; text-transform:uppercase;">Sell Orders</h3>
                    <div style="display:flex; justify-content:space-between; color:var(--red); font-size:0.8rem; margin-bottom:5px;"><span>1.4260</span><span>15,200</span></div>
                    <div style="display:flex; justify-content:space-between; color:var(--red); font-size:0.8rem;"><span>1.4255</span><span>8,900</span></div>
                </div>
                <div>
                    <h3 style="font-size:0.7rem; color:var(--muted); margin-bottom:15px; text-transform:uppercase;">Buy Orders</h3>
                    <div style="display:flex; justify-content:space-between; color:var(--green); font-size:0.8rem; margin-bottom:5px;"><span>1.4240</span><span>22,500</span></div>
                    <div style="display:flex; justify-content:space-between; color:var(--green); font-size:0.8rem;"><span>1.4235</span><span>14,200</span></div>
                </div>
            </div>
        </div>

        <div class="trade-sidebar">
            <div class="trade-tabs">
                <div class="trade-tab active-buy">BUY</div>
                <div class="trade-tab">SELL</div>
            </div>

            <div style="margin-bottom:20px;">
                <label style="display:block; font-size:0.65rem; color:var(--muted); margin-bottom:8px; text-transform:uppercase;">Input Amount</label>
                <div class="input-wrap">
                    <input type="number" value="1.4242">
                    <img src="https://drive.google.com/uc?export=view&id=1RJfigGY8p5kg0-4WV8_DExrDd4Hj2mtz" style="width:20px; border-radius:50%;">
                </div>
            </div>

            <div style="margin-bottom:20px;">
                <label style="display:block; font-size:0.65rem; color:var(--muted); margin-bottom:8px; text-transform:uppercase;">Receive ($PRN)</label>
                <div class="input-wrap">
                    <input type="number" placeholder="0.00">
                    <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/priscion_primary_small.jpg" style="width:20px; border-radius:50%;">
                </div>
            </div>

            <button class="btn-trade" style="background:var(--green); color:#000;">EXECUTE SWAP</button>
        </div>

    </div>

    <footer style="padding:40px; text-align:center; border-top:1px solid var(--border); margin-top:50px; color:var(--muted); font-size:0.75rem;">
        &copy; 2026 PRISCION SOVEREIGN LEDGER. ANCHORED TO THE NEURAL CORE.
    </footer>

</body>
</html>
