<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"><title>PRISCION WALLET</title><style> :root { --bg: #0B0E11; --card: #1E2329; --accent: #F0B90B; --p: #7B35D4; --text: #EAECEF; --text-dim: #707A8A; --g: #00FF88; } body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui; overflow: hidden; } .app { height: 100%; display: flex; flex-direction: column; } .hdr { padding: 25px 20px; border-bottom: 1px solid #2B2F36; display: flex; justify-content: space-between; align-items: center; } .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1rem; } .brand img { width: 30px; height: 30px; border-radius: 50%; } .main { flex: 1; overflow-y: auto; padding: 25px; } .view { display: none; } .view.active { display: block; } .card { background: var(--card); border-radius: 28px; padding: 25px; border: 1px solid #2B3139; box-shadow: 0 10px 30px rgba(0,0,0,0.2); } .asset-row { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #2B3139; } .asset-img { width: 48px; height: 48px; border-radius: 14px; object-fit: cover; border: 1px solid #333; } .val-main { font-family: monospace; font-weight: 700; font-size: 1.1rem; text-align: right; } .val-sub { font-size: 0.75rem; color: var(--accent); margin-top: 5px; text-align: right; } .nav { height: 90px; background: var(--card); border-top: 1px solid #2B3139; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); } .nav-item { text-align: center; color: var(--text-dim); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; cursor: pointer; flex: 1; } .nav-item.active { color: var(--p); } .nft-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; } .nft-card { background: var(--card); border-radius: 24px; overflow: hidden; border: 1px solid #2B3139; } .nft-img { width: 100%; aspect-ratio: 1; object-fit: cover; } </style></head><body><div class="app"><div class="hdr"><div class="brand"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/logo_icon.jpg"> PRISCION</div><div style="color:var(--g); font-size:0.7rem; font-weight:900;">● NODE ACTIVE</div></div><div class="main"><div id="assets" class="view active"><div class="card"><div class="asset-row"><div style="display:flex; align-items:center; gap:15px;"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/prn_icon.jpg" class="asset-img"><div><strong>PRN</strong><br><small style="color:var(--text-dim);">Sovereign Native</small></div></div><div><div class="val-main">1,000M</div><div class="val-sub">0.2M</div></div></div><div class="asset-row"><div style="display:flex; align-items:center; gap:15px;"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/musd_icon.jpg" class="asset-img"><div><strong>MUSD</strong><br><small style="color:var(--text-dim);">Imperial Reserve</small></div></div><div><div class="val-main">500K</div><div class="val-sub">00K</div></div></div><div class="asset-row" style="border-bottom:none;"><div style="display:flex; align-items:center; gap:15px;"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/nrl_icon.jpg" class="asset-img"><div><strong>NRL</strong><br><small style="color:var(--text-dim);">Neural Fuel</small></div></div><div><div class="val-main">750K</div><div class="val-sub">Sovereign Core</div></div></div></div></div><div id="vault" class="view"><div class="nft-grid"><div class="nft-card"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/logo_icon.jpg" class="nft-img"><div style="padding:12px; font-size:0.7rem; font-weight:800; color:var(--p);">MUSTARD TREE #001</div></div><div class="nft-card"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/nurasen_icon.jpg" class="nft-img"><div style="padding:12px; font-size:0.7rem; font-weight:800; color:var(--p);">NURASEN PRIME #042</div></div></div></div></div><div class="nav"><div class="nav-item active" onclick="switchTab('assets', this)">Assets</div><div class="nav-item" onclick="switchTab('vault', this)">Vault</div></div></div><script> function switchTab(id, el) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); } </script></body></html>
