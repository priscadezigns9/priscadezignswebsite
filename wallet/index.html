<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>PRISCION WALLET</title><style>:root{--bg:#0B0E11;--card:#1E2329;--accent:#F0B90B;--p:#7B35D4;--text:#EAECEF;--text-dim:#707A8A;--g:#00FF88}body,html{margin:0;padding:0;width:100%;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,system-ui;overflow:hidden}.app{height:100%;display:flex;flex-direction:column}.hdr{padding:20px;border-bottom:1px solid #2B2F36;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;align-items:center;gap:10px}.brand img{height:22px;width:auto}.main{flex:1;overflow-y:auto;padding:20px}.view{display:none}.view.active{display:block}.card{background:var(--card);border-radius:24px;padding:20px;border:1px solid #2B3139}.asset-row{display:flex;justify-content:space-between;align-items:center;padding:15px 0;border-bottom:1px solid #2B3139}.asset-img{width:44px;height:44px;border-radius:12px;object-fit:cover;border:1px solid #333}.val-main{font-family:monospace;font-weight:700;font-size:1.1rem;text-align:right}.val-sub{font-size:.7rem;color:var(--accent);margin-top:4px;text-align:right}.nav{height:80px;background:var(--card);border-top:1px solid #2B3139;display:flex;justify-content:space-around;align-items:center;padding-bottom:env(safe-area-inset-bottom)}.nav-item{text-align:center;color:var(--text-dim);font-size:.65rem;font-weight:700;text-transform:uppercase;cursor:pointer;flex:1}.nav-item.active{color:var(--p)}.nft-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}.nft-card{background:var(--card);border-radius:20px;overflow:hidden;border:1px solid #2B3139}.nft-img{width:100%;aspect-ratio:1;object-fit:cover}</style></head><body><div class="app"><div class="hdr"><div class="brand"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/priscion_wordmark.png"></div><div style="color:var(--g);font-size:.6rem;font-weight:900">● NODE ACTIVE</div></div><div class="main"><div id="assets" class="view active"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px"><button onclick="switchTab('buy',this)" style="background:var(--p);border:none;padding:12px;border-radius:12px;font-weight:900;color:#fff">BUY</button><button onclick="alert('RECV Mode')" style="background:var(--g);border:none;padding:12px;border-radius:12px;font-weight:900;color:#000">REC</button><button onclick="alert('SEND Mode')" style="background:var(--accent);border:none;padding:12px;border-radius:12px;font-weight:900;color:#000">SEND</button></div><div class="card"><div class="asset-row"><div style="display:flex;align-items:center;gap:12px"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/prn_icon_new.jpg" class="asset-img"><div><strong>PRN</strong></div></div><div><div class="val-main">1,000M</div><div class="val-sub">0.2M</div></div></div><div class="asset-row" style="border-bottom:none"><div style="display:flex;align-items:center;gap:12px"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/musd_icon.jpg" class="asset-img"><div><strong>MUSD</strong></div></div><div><div class="val-main">500K</div><div class="val-sub">00K</div></div></div></div></div><div id="vault" class="view"><div style="margin-bottom:15px;display:flex;justify-content:space-between;align-items:center"><h4>Imperial Vault</h4><span style="background:rgba(123,53,212,.2);color:var(--p);padding:4px 10px;border-radius:10px;font-size:.55rem;font-weight:900">MARKET ACTIVE</span></div><div class="nft-grid"><div class="nft-card" onclick="alert('Market: Genesis MT')"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/logo_icon.jpg" class="nft-img"><div style="padding:10px;font-size:.6rem;font-weight:900;color:var(--p)">MUSTARD TREE</div></div><div class="nft-card" onclick="alert('Market: Nurasen Prime')"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/nurasen_icon.jpg" class="nft-img"><div style="padding:10px;font-size:.6rem;font-weight:900;color:var(--p)">NURASEN PRIME</div></div></div></div><div id="buy" class="view"><div class="card"><h3 style="margin-top:0;color:var(--accent)">Imperial On-Ramp</h3><p style="font-size:.75rem;color:var(--text-dim)">Card / Visa / Debit secured by Priscion Business</p><button onclick="alert('Initiating Card Checkout...')" style="width:100%;background:var(--p);border:none;padding:15px;border-radius:12px;font-weight:900;color:#fff;margin-top:20px">PAY WITH CARD</button></div></div><div id="browser" class="view"><div class="nft-grid"><a href="/" style="text-decoration:none"><div class="nft-card"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/logo_icon.jpg" class="nft-img"><div style="padding:12px;text-align:center;font-weight:900;color:var(--text)">HUB</div></div></a><a href="/ateliagaming/" style="text-decoration:none"><div class="nft-card"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/prn_icon_new.jpg" class="nft-img"><div style="padding:12px;text-align:center;font-weight:900;color:var(--text)">ATELIA</div></div></a></div></div></div><div class="nav"><div class="nav-item active" onclick="switchTab('assets',this)">Assets</div><div class="nav-item" onclick="switchTab('vault',this)">Vault</div><div class="nav-item" onclick="switchTab('buy',this)">Buy</div><div class="nav-item" onclick="switchTab('browser',this)">Browser</div></div></div><script>function switchTab(id,el){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.getElementById(id).classList.add('active');el.classList.add('active')}</script></body></html>
