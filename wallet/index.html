<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"><title>PRISCION WALLET v2.6</title><style>:root { --bg: #0B0E11; --card: #1E2329; --accent: #F0B90B; --p: #7B35D4; --text: #EAECEF; --text-dim: #707A8A; --g: #00FF88; }body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui; overflow: hidden; }.app { height: 100%; display: flex; flex-direction: column; }.hdr { padding: 25px 20px; border-bottom: 1px solid #2B2F36; display: flex; justify-content: space-between; align-items: center; }.brand img { height: 22px; width: auto; }.main { flex: 1; overflow-y: auto; padding: 25px; }.view { display: none; }.view.active { display: block; }.card { background: var(--card); border-radius: 28px; padding: 20px; border: 1px solid #2B3139; margin-bottom: 20px; }.asset-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #2B3139; }.asset-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }.val-main { font-family: monospace; font-weight: 700; font-size: 1rem; text-align: right; }.val-sub { font-size: 0.7rem; color: var(--accent); text-align: right; }.nav { height: 90px; background: var(--card); border-top: 1px solid #2B3139; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }.nav-item { text-align: center; color: var(--text-dim); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; cursor: pointer; flex: 1; }.nav-item.active { color: var(--p); }.browser-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }.browser-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #2B3139; text-align: center; padding: 20px 10px; text-decoration: none; color: inherit; }.browser-card img { height: 40px; width: auto; margin-bottom: 12px; }.btn-p { background: var(--p); border: none; padding: 15px; border-radius: 12px; font-weight: 900; color: #fff; cursor: pointer; width: 100%; text-decoration: none; display: block; text-align: center; }.swap-input { background: #2B3139; border-radius: 16px; padding: 15px; margin-bottom: 10px; }.swap-input label { display: block; font-size: 0.65rem; color: var(--text-dim); margin-bottom: 5px; }.swap-input div { display: flex; justify-content: space-between; align-items: center; }.swap-input input { background: transparent; border: none; color: #fff; font-size: 1.2rem; font-weight: 800; width: 100%; outline: none; }</style></head><body><div class="app"><div class="hdr"><div class="brand"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/priscion_wordmark.png"></div><div style="color:var(--g); font-size:0.6rem; font-weight:900;">● LEDGER v2.6 ACTIVE</div></div><div class="main"><div id="assets" class="view active"><div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px;"><button onclick="switchTab('buy')" style="background:var(--p); border:none; padding:12px; border-radius:12px; font-weight:900; color:#fff;">BUY</button><button onclick="switchTab('swap')" style="background:var(--accent); border:none; padding:12px; border-radius:12px; font-weight:900; color:#000;">SWAP</button><button onclick="alert('ADDR: 0xPRN_NODE')" style="background:var(--g); border:none; padding:12px; border-radius:12px; font-weight:900; color:#000;">REC</button></div><div class="card"><div class="asset-row"><div style="display:flex;align-items:center;gap:12px"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/prn_icon_new.jpg" class="asset-img"><div><strong>PRN</strong></div></div><div><div class="val-main">1,000M</div><div class="val-sub">0.2M</div></div></div><div class="asset-row"><div style="display:flex;align-items:center;gap:12px"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/musd_icon.jpg" class="asset-img"><div><strong>MUSD</strong></div></div><div><div class="val-main">500K</div><div class="val-sub">00K</div></div></div><div class="asset-row"><div style="display:flex;align-items:center;gap:12px"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/nrl_icon.jpg" class="asset-img"><div><strong>NRL</strong></div></div><div><div class="val-main">750K</div><div class="val-sub">Core</div></div></div><div class="asset-row"><div style="display:flex;align-items:center;gap:12px"><img src="https://priscadezigns.org/ateliagaming/assets/coins/atlr_coin_separate.webp" class="asset-img"><div><strong>ATLR</strong></div></div><div><div class="val-main">0.00</div><div class="val-sub">Atelia</div></div></div><div class="asset-row"><div style="display:flex;align-items:center;gap:12px"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/riddiim_wordmark.png" class="asset-img" style="border-radius:8px;"><div><strong>RDM</strong></div></div><div><div class="val-main">0.00</div><div class="val-sub">Riddiim</div></div></div><div class="asset-row"><div style="display:flex;align-items:center;gap:12px"><img src="https://priscadezigns.org/calalloo/assets/logo.png" class="asset-img" style="border-radius:8px;"><div><strong>CLL</strong></div></div><div><div class="val-main">0.00</div><div class="val-sub">Calalloo</div></div></div></div></div><div id="swap" class="view"><div class="card"><h3 style="margin-top:0; color:var(--accent);">Sovereign Swap</h3><div class="swap-input"><label>From</label><div><input type="number" id="swapFrom" value="1000" oninput="calcSwap()"> <strong>PRN</strong></div></div><div style="text-align:center; margin:-15px 0 5px; font-size:1.2rem;">↓</div><div class="swap-input"><label>To</label><div><input type="number" id="swapTo" value="10.2" readonly> <strong>MUSD</strong></div></div><button class="btn-p" onclick="alert('Swap Executed. 10% Tithe to TWMK.')">EXECUTE SWAP</button></div></div><div id="buy" class="view"><div class="card"><h3 style="margin-top:0; color:var(--accent);">Imperial On-Ramp</h3><div style="margin-bottom:20px;"><label style="font-size:0.65rem; color:var(--text-dim); font-weight:800;">BUY PRISCION TOKEN (USD)</label><input type="number" id="buyAmt" value="100" style="background:transparent; border:none; color:#fff; font-size:2rem; font-weight:800; width:100%; outline:none; margin-top:10px;" oninput="updatePayUrl()"></div><a id="payBtn" href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=QXE9PL58QPU9L&item_name=PRN+Sovereign+Token&currency_code=USD&amount=100" class="btn-p" target="_blank">PAY WITH CARD / DEBIT</a><div style="margin-top:20px; text-align:center; opacity:0.6;"><img src="https://www.paypalobjects.com/webstatic/mktg/logo/AM_mc_vs_dc_ae.jpg" style="height:24px;"></div></div></div><div id="browser" class="view"><div class="browser-grid"><a href="/ateliagaming/" class="browser-card"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/atelia_gaming_hf.png"><div><strong>ATELIA</strong></div></a><a href="/riddiim/" class="browser-card"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/riddiim_wordmark.png"><div><strong>RIDDIIM</strong></div></a><a href="/calalloo/" class="browser-card"><img src="https://priscadezigns.org/calalloo/assets/logo.png" style="height:30px;"><div><strong>CALALLOO</strong></div></a></div></div></div><div class="nav"><div class="nav-item active" onclick="switchTab('assets', this)">Assets</div><div class="nav-item" onclick="switchTab('swap', this)">Swap</div><div class="nav-item" onclick="switchTab('buy', this)">Buy</div><div class="nav-item" onclick="switchTab('browser', this)">Browser</div></div></div><script>function switchTab(id, el) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.getElementById(id).classList.add('active'); if(el) el.classList.add('active'); }function updatePayUrl() { const amt = document.getElementById('buyAmt').value; document.getElementById('payBtn').href = ; }function calcSwap() { const val = document.getElementById('swapFrom').value; document.getElementById('swapTo').value = (val * 0.0102).toFixed(2); }</script></body></html>
