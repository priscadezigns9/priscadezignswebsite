<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"><title>PRX TERMINAL</title><style>:root { --bg: #0B0E11; --card: #1E2329; --accent: #F0B90B; --p: #7B35D4; --text: #EAECEF; --text-dim: #707A8A; --g: #02C076; --r: #F6465D; } body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; } .terminal { height: 100%; display: flex; flex-direction: column; } .hdr { padding: 15px; border-bottom: 1px solid #2B2F36; display: flex; justify-content: space-between; align-items: center; } .main { flex: 1; display: flex; flex-direction: column; } .chart { height: 35%; background: #161A1E; border-bottom: 1px solid #2B3139; padding: 15px; } .ob { height: 30%; display: grid; grid-template-columns: 1fr 1fr; background: #2B3139; gap: 1px; } .side { background: var(--bg); padding: 10px; font-family: monospace; font-size: 0.7rem; } .trade { padding: 20px; background: var(--card); } .input { background: #2B3139; border-radius: 8px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; } .btn { background: var(--g); color: #fff; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 900; }</style></head><body><div class="terminal"><div class="hdr"><strong>PRX TERMINAL</strong><div style="color:var(--accent)">v3.0 LIVE</div></div><div class="main"><div class="chart"><div style="font-size:1.5rem;color:var(--g)">0.010248</div><div style="font-size:0.6rem;color:var(--text-dim)">PRN/MUSD</div></div><div class="ob"><div class="side"><div style="color:var(--r)">ASKS</div><div id="asks"></div></div><div class="side"><div style="color:var(--g)">BIDS</div><div id="bids"></div></div></div><div class="trade"><div class="input"><label>Price</label><input type="number" value="0.010248" style="background:none;border:none;color:#fff;text-align:right"></div><button class="btn" onclick="alert('Order Placed on Priscion Ledger.')">BUY PRN</button></div></div></div><script>function u(){const a=document.getElementById('asks'),b=document.getElementById('bids');a.innerHTML=b.innerHTML='';for(let i=0;i<5;i++){a.innerHTML+='<div>'+(0.01025+i/1000).toFixed(5)+'</div>';b.innerHTML+='<div>'+(0.01024-i/1000).toFixed(5)+'</div>';}}setInterval(u,1000);u();</script></body></html>
