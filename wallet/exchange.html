
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRISCION EXCHANGE (PRX)</title>
    <style>
        :root { --bg: #0B0E11; --card: #1E2329; --accent: #F0B90B; --p: #7B35D4; --text: #EAECEF; --text-dim: #707A8A; --g: #02C076; --r: #F6465D; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui; overflow: hidden; }
        .app { height: 100%; display: flex; flex-direction: column; }
        .hdr { padding: 15px 20px; border-bottom: 1px solid #2B2F36; display: flex; justify-content: space-between; align-items: center; }
        .brand img { height: 18px; width: auto; }
        .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        
        /* Terminal Layout */
        .chart-area { height: 200px; background: #161A1E; margin-bottom: 2px; position: relative; border-bottom: 1px solid #2B3139; }
        .order-book { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #2B3139; font-size: 0.7rem; }
        .ob-side { background: var(--bg); padding: 10px; }
        .ob-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-family: monospace; }
        
        .trade-panel { background: var(--card); padding: 20px; border-top: 1px solid #2B3139; }
        .tab-grp { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; }
        .tab-buy { background: var(--g); color: #fff; }
        .tab-sell { background: transparent; border: 1px solid var(--text-dim); color: var(--text-dim); }
        
        .input-box { background: #2B3139; border-radius: 8px; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .input-box input { background: transparent; border: none; color: #fff; font-weight: 800; width: 60%; outline: none; }
        
        .nav { height: 70px; background: var(--card); border-top: 1px solid #2B3139; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { text-align: center; color: var(--text-dim); font-size: 0.6rem; font-weight: 800; text-transform: uppercase; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--p); }
    </style>
</head>
<body>
    <div class="app">
        <div class="hdr">
            <div class="brand"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/media/priscion_wordmark.png"></div>
            <div style="color:var(--g); font-size:0.6rem; font-weight:900;">PRX TERMINAL LIVE</div>
        </div>
        <div class="main">
            <!-- Chart Area -->
            <div class="chart-area" id="chart">
                <div style="padding:15px;">
                    <div style="font-size:0.6rem; color:var(--text-dim);">PRN/MUSD</div>
                    <div style="font-size:1.5rem; font-weight:900; color:var(--g);" id="livePrice">/bin/bash.010248</div>
                    <div style="font-size:0.6rem; color:var(--g);">+12.45% (24h)</div>
                </div>
                <canvas id="tradeCanvas" style="position:absolute; bottom:0; left:0; width:100%; height:80px;"></canvas>
            </div>

            <!-- Order Book -->
            <div class="order-book">
                <div class="ob-side">
                    <div style="color:var(--r); margin-bottom:8px; font-weight:800; font-size:0.6rem;">SELL ORDERS</div>
                    <div class="ob-row"><span style="color:var(--r)">0.010250</span><span>45,000</span></div>
                    <div class="ob-row"><span style="color:var(--r)">0.010249</span><span>12,800</span></div>
                    <div class="ob-row"><span style="color:var(--r)">0.010248</span><span>5,200</span></div>
                </div>
                <div class="ob-side">
                    <div style="color:var(--g); margin-bottom:8px; font-weight:800; font-size:0.6rem;">BUY ORDERS</div>
                    <div class="ob-row"><span style="color:var(--g)">0.010245</span><span>100,000</span></div>
                    <div class="ob-row"><span style="color:var(--g)">0.010244</span><span>12,000</span></div>
                    <div class="ob-row"><span style="color:var(--g)">0.010242</span><span>85,400</span></div>
                </div>
            </div>

            <!-- Trade Panel -->
            <div class="trade-panel">
                <div class="tab-grp">
                    <button class="tab-btn tab-buy">BUY</button>
                    <button class="tab-btn tab-sell">SELL</button>
                </div>
                <div class="input-box"><label style="font-size:0.6rem; color:var(--text-dim)">Price</label><input type="number" value="0.010248"> <span style="font-size:0.6rem;">MUSD</span></div>
                <div class="input-box"><label style="font-size:0.6rem; color:var(--text-dim)">Amount</label><input type="number" placeholder="0.00"> <span style="font-size:0.6rem;">PRN</span></div>
                <button style="background:var(--p); color:#fff; border:none; padding:15px; border-radius:12px; width:100%; font-weight:900; margin-top:10px;" onclick="alert('Order Placed on Priscion Ledger.')">BUY PRN</button>
            </div>
        </div>
        <div class="nav">
            <div class="nav-item" onclick="window.location.href='index.html'">Wallet</div>
            <div class="nav-item active">Markets</div>
            <div class="nav-item">Trade</div>
            <div class="nav-item">Earn</div>
        </div>
    </div>
    <script>
        // Simple Chart Visualization
        const ctx = document.getElementById('tradeCanvas').getContext('2d');
        function drawChart() {
            ctx.clearRect(0,0,800,200);
            ctx.strokeStyle = '#02C076';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 80);
            for(let i=0; i<400; i+=20) {
                ctx.lineTo(i, 40 + Math.random() * 40);
            }
            ctx.stroke();
        }
        setInterval(drawChart, 2000);
        drawChart();
    </script>
</body>
</html>
