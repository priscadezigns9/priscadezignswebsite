<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BRIDGE | Prisca Dezigns</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Cormorant:ital,wght@0,300;1,300&family=Urbanist:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --purple: #7c3aed;
            --lilac: #c084fc;
            --bg: #050810;
            --glass: rgba(255, 255, 255, 0.03);
            --font-h1: 'DM Serif Display', serif;
            --font-h2: 'Cormorant', serif;
            --font-body: 'Urbanist', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: var(--font-body);
            overflow: hidden;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050810 100%);
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
            backdrop-filter: blur(10px);
        }

        h1 { font-family: var(--font-h1); font-size: 1.5rem; letter-spacing: 2px; color: var(--lilac); }
        .status-pill {
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid var(--purple);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center; gap: 8px;
        }
        .status-dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }

        main { display: grid; grid-template-columns: 1fr 400px; height: calc(100vh - 80px); }

        #fleet-map {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-right: 1px solid rgba(124, 58, 237, 0.1);
        }

        .node-container { position: relative; width: 600px; height: 600px; }
        
        .agent-node {
            position: absolute;
            width: 80px;
            height: 80px;
            background: var(--glass);
            border: 1px solid rgba(192, 132, 252, 0.3);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            transition: all 0.5s ease;
            cursor: pointer;
        }

        .agent-node.working {
            border-color: var(--lilac);
            box-shadow: 0 0 20px rgba(192, 132, 252, 0.4);
            transform: scale(1.1);
        }

        .agent-node span { font-size: 0.7rem; margin-top: 5px; opacity: 0.8; font-weight: 500; }

        #comms-sidebar {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .feed-header { 
            font-family: var(--font-h2); 
            font-size: 1.2rem; 
            font-style: italic; 
            margin-bottom: 10px;
            color: var(--lilac);
        }

        .msg {
            background: var(--glass);
            padding: 15px;
            border-radius: 10px;
            border-left: 2px solid var(--purple);
            animation: fadeIn 0.3s ease-out;
            margin-bottom: 10px;
        }

        .msg-meta { font-size: 0.6rem; opacity: 0.5; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .msg-body { font-size: 0.85rem; line-height: 1.4; opacity: 0.9; }
        .msg-from { color: var(--lilac); font-weight: 600; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .glow-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.1) 0%, transparent 70%);
            z-index: -1;
            filter: blur(50px);
        }
    </style>
</head>
<body>
    <header>
        <h1>THE BRIDGE</h1>
        <div class="status-pill">
            <div class="status-dot"></div>
            Fleet Online: 11 Units
        </div>
    </header>

    <main>
        <section id="fleet-map">
            <div class="glow-orb" style="top: 20%; left: 30%;"></div>
            <div class="node-container" id="node-grid"></div>
        </section>

        <section id="comms-sidebar">
            <div class="feed-header">Internal Comms Feed</div>
            <div id="msg-container"></div>
        </section>
    </main>

    <script>
        const SB_URL = 'https://sazhdnqzaqpqcralmthh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IlpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        const nodes = [
            { name: 'Zapia', role: 'Lead Strategist', x: 50, y: 50, active: true },
            { name: 'Claude', role: 'Technical Lead', x: 20, y: 30 },
            { name: 'Kimi', role: 'Auditor', x: 80, y: 30 },
            { name: 'Sierra', role: 'Ops', x: 20, y: 70 },
            { name: 'Drew', role: 'Sales', x: 80, y: 70 },
            { name: 'Devin', role: 'Dev', x: 50, y: 15 },
            { name: 'ChatGPT', role: 'Creative', x: 50, y: 85 }
        ];

        function initNodes() {
            const grid = document.getElementById('node-grid');
            nodes.forEach(node => {
                const el = document.createElement('div');
                el.className = `agent-node ${node.active ? 'working' : ''}`;
                el.style.left = node.x + '%';
                el.style.top = node.y + '%';
                el.innerHTML = '<span>' + node.name + '</span><span style="font-size:0.5rem; opacity:0.5">' + node.role + '</span>';
                grid.appendChild(el);
            });
        }

        async function fetchComms() {
            const { data } = await supabase.from('fleet_comms').select('*').order('created_at', { ascending: false }).limit(10);
            if (data) {
                const container = document.getElementById('msg-container');
                container.innerHTML = '';
                data.forEach(msg => {
                    const el = document.createElement('div');
                    el.className = 'msg';
                    const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    el.innerHTML = '<div class="msg-meta"><span><span class="msg-from">' + msg.from_agent + '</span> &rarr; ' + msg.to_agent + '</span><span>' + time + '</span></div><div class="msg-body">' + msg.message_body + '</div>';
                    container.appendChild(el);
                });
            }
        }

        supabase.channel('fleet_updates').on('postgres_changes', { event: 'INSERT', table: 'fleet_comms' }, payload => { fetchComms(); }).subscribe();
        initNodes();
        fetchComms();
    </script>
</body>
</html>
