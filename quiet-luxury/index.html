<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiet Luxury | Prisca Dezigns</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0F;
            --card: #12121A;
            --text: #F0F0F8;
            --muted: rgba(240,240,248,0.5);
            --primary: #7B35D4;
            --border: rgba(123,53,212,0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Plus Jakarta Sans", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        header { padding: 40px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: "Space Grotesk", sans-serif; font-size: 1.5rem; font-weight: 700; text-decoration: none; color: inherit; }
        nav a { margin-left: 24px; text-decoration: none; color: inherit; font-size: 0.9rem; font-weight: 600; opacity: 0.7; transition: opacity 0.2s; }
        nav a:hover { opacity: 1; color: var(--primary); }
        .hero { flex: 1; padding: 120px 6%; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hero h1 { font-family: "Space Grotesk", sans-serif; font-size: clamp(3rem, 8vw, 5rem); margin-bottom: 24px; line-height: 1; }
        .hero p { font-size: 1.2rem; color: var(--muted); max-width: 600px; margin-bottom: 40px; }
        .btn { display: inline-block; padding: 16px 40px; background: var(--primary); color: white; text-decoration: none; border-radius: 50px; font-weight: 700; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-3px); }
        footer { padding: 40px 6%; border-top: 1px solid var(--border); text-align: center; font-size: 0.8rem; color: var(--muted); }
    </style>
</head>
<body>
    <header>
        <a href="/brands/" class="logo">Quiet Luxury</a>
        <nav>
            <a href="shop/">Shop</a>
            <a href="blog/">Blogs</a>
        </nav>
    </header>
    <main class="hero">
        <h1>Quiet Luxury</h1>
        <p>Minimalist home decor and elevated everyday essentials.</p>
        <a href="blog/" class="btn">Explore Blogs</a>
    </main>
    <footer>
        <p>© 2026 Quiet Luxury · A PRISCA DEZIGNS PROPERTY</p>
    </footer>
</body>
</html>
