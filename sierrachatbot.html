<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Sierra AI | Prisca Dezigns</title>
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap' rel='stylesheet'>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        #sierra-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a0b2e 0%, #000 100%); z-index: 1; }
        #pd-chat-window { 
            position: fixed !important; top: 0 !important; left: 0 !important; bottom: 0 !important; right: 0 !important; 
            width: 100% !important; height: 100% !important; max-width: none !important; max-height: none !important;
            opacity: 1 !important; visibility: visible !important; pointer-events: all !important; 
            transform: none !important; border-radius: 0 !important; border: none !important;
            z-index: 9999 !important; box-shadow: none !important; display: flex !important; flex-direction: column !important;
        }
        #pd-chat-bubble { display: none !important; }
        .chat-hdr { border-radius: 0 !important; }
    </style>
</head>
<body>
    <div id='sierra-bg'></div>
    <script src='/chatbot.js?v=2.9'></script>
    <script>
        (function() {
            function forceOpen() {
                const win = document.getElementById('pd-chat-window');
                if (win) {
                    win.style.display = 'flex'; win.style.opacity = '1'; win.style.visibility = 'visible'; win.style.transform = 'none';
                    win.classList.add('active');
                } else { setTimeout(forceOpen, 100); }
            }
            window.addEventListener('load', forceOpen);
            setTimeout(forceOpen, 500);
            setTimeout(forceOpen, 2000);
        })();
    </script>
</body>
</html>
