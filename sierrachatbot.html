<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Sierra AI | Prisca Dezigns</title>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap' rel='stylesheet'>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #ffffff; font-family: 'Inter', sans-serif; }
        #pd-chat-window { 
            position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; 
            opacity: 1 !important; visibility: visible !important; pointer-events: all !important; 
            z-index: 9999 !important; box-shadow: none !important; display: flex !important; flex-direction: column !important;
            transform: none !important; border-radius: 0 !important; border: none !important;
            background: #ffffff !important;
        }
        #pd-chat-bubble { display: none !important; }
        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #743089; font-weight: 800; letter-spacing: 0.1em; }
    </style>
</head>
<body>
    <div id='loader'>BOOTING SIERRA...</div>
    <script src='/chatbot.js?v=3.1.6'></script>
    <script>
        (function() {
            function forceEngine() {
                const win = document.getElementById('pd-chat-window');
                const loader = document.getElementById('loader');
                if (win) {
                    if (loader) loader.style.display = 'none';
                    win.classList.add('open');
                    win.style.setProperty('display', 'flex', 'important');
                    win.style.setProperty('opacity', '1', 'important');
                    win.style.setProperty('visibility', 'visible', 'important');
                    win.style.setProperty('transform', 'none', 'important');
                    win.style.setProperty('width', '100vw', 'important');
                    win.style.setProperty('height', '100vh', 'important');
                    win.style.setProperty('border-radius', '0px', 'important');
                } else { setTimeout(forceEngine, 50); }
            }
            window.addEventListener('load', forceEngine);
            setInterval(forceEngine, 500); 
        })();
    </script>
</body>
</html>
