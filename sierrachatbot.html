<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Sierra AI | Prisca Dezigns</title>
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap' rel='stylesheet'>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #301934; font-family: 'Inter', sans-serif; color: white; }
        #sierra-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #743089 0%, #301934 100%); z-index: 1; }
        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2; text-align: center; font-weight: 700; letter-spacing: 0.1em; opacity: 0.5; }
        #pd-chat-window { 
            position: fixed !important; top: 0 !important; left: 0 !important; bottom: 0 !important; right: 0 !important; 
            width: 100% !important; height: 100% !important; max-width: none !important; max-height: none !important;
            opacity: 1 !important; visibility: visible !important; pointer-events: all !important; 
            transform: none !important; border-radius: 0 !important; border: none !important;
            z-index: 9999 !important; box-shadow: none !important; display: flex !important; flex-direction: column !important;
            background: #fff !important;
        }
        #pd-chat-bubble { display: none !important; }
        .chat-msgs { flex-grow: 1 !important; height: auto !important; }
        @media (max-width: 768px) { #pd-chat-window { height: 100dvh !important; } }
    </style>
</head>
<body>
    <div id='sierra-bg'></div>
    <div id='loader'>INITIALIZING SIERRA...</div>
    <script src='/chatbot.js?v=3.1.5'></script>
    <script>
        (function() {
            function forceEngine() {
                const win = document.getElementById('pd-chat-window');
                const loader = document.getElementById('loader');
                if (win) {
                    if (loader) loader.style.display = 'none';
                    win.style.display = 'flex'; win.style.opacity = '1'; win.style.visibility = 'visible'; win.style.transform = 'none';
                    win.classList.add('active'); win.classList.add('open');
                    win.style.setProperty('background', '#ffffff', 'important');
                } else { setTimeout(forceEngine, 100); }
            }
            window.addEventListener('load', forceEngine);
            setTimeout(forceEngine, 500);
            setTimeout(forceEngine, 2000);
        })();
    </script>
</body>
</html>
