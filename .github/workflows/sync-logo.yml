name: Sync Logo
on:
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Download Logo
        run: |
          mkdir -p logos
          curl -L "https://drive.google.com/uc?export=download&id=1B_7vIUocUTp1l4L7y2ayEAxanUW3uJuz" -o logos/atelier-gaming.png
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add logos/atelier-gaming.png
          git commit -m "Update Atelier Gaming logo via GitHub Action" || exit 0
          git push
