name: Inject Google AdSense (site/)

on:
  workflow_dispatch: {}

jobs:
  inject:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Inject AdSense into all site/ niche hubs
        run: |
          ADSENSE='<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7468056855295045" crossorigin="anonymous"></script>'
          PAGES=(
            "site/index.html"
            "site/dreaming-anime/index.html"
            "site/atelier-gaming/index.html"
            "site/sole-prestige/index.html"
            "site/glow-protocol/index.html"
            "site/essence-elite/index.html"
            "site/peak-fit/index.html"
            "site/quiet-luxury/index.html"
            "site/the-watch-list/index.html"
            "site/the-autodrome/index.html"
            "site/the-escapist/index.html"
            "site/verdant-co/index.html"
            "site/paw-vault/index.html"
            "site/couture-gallery/index.html"
          )
          for page in "${PAGES[@]}"; do
            if [ -f "$page" ]; then
              if ! grep -q "ca-pub-7468056855295045" "$page"; then
                sed -i "s|<head>|<head>\n  ${ADSENSE}|" "$page"
                echo "Injected: $page"
              else
                echo "Already has AdSense: $page"
              fi
            else
              echo "Not found: $page"
            fi
          done
      - name: Commit changes
        run: |
          git config user.name "Zapia"
          git config user.email "zapia@priscadezigns.org"
          git add -A
          git diff --staged --quiet || git commit -m "Add Google AdSense to all site/ niche hubs"
          git push
