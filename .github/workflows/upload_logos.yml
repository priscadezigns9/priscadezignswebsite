name: Upload High Fidelity Logos

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Logos
        run: |
          mkdir -p logos
          curl -L https://share.zapia.com/b5wof2oaechorqj7x647m6 -o logos/AXORIA_DEFINITIVE_HF.png
          curl -L https://share.zapia.com/cb3fzv2ob9h0l4zd5bybhe -o logos/LES_AMOUR_DEFINITIVE_HF.png
          curl -L https://share.zapia.com/edb3133ntc6midulp8dstv -o logos/ORNALIS_DEFINITIVE_HF.png

      - name: Commit and Push
        run: |
          git config --global user.name "Zapia Architect"
          git config --global user.email "architect@zapia.com"
          git add logos/AXORIA_DEFINITIVE_HF.png logos/LES_AMOUR_DEFINITIVE_HF.png logos/ORNALIS_DEFINITIVE_HF.png
          git commit -m "Upload High Fidelity Logos via Zapia Subagent"
          git push
