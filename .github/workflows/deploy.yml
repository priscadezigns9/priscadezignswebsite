name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync assets into site/
        run: |
          # ── EMPIRE HUB ──────────────────────────────────────────────────────
          mkdir -p site
          # Always copy root index.html into site/ as the empire hub homepage
          if [ -f "index.html" ]; then
            cp -f index.html site/index.html
          fi

          # Copy root logos into site/logos/
          mkdir -p site/logos
          # Sync priority root folders into site/
          for app in velloq moblync rowcell cupyx karjov callaloo calalloo dpanyard the-watch-list dreaming-anime the-escapist tech-scout-hq deskwell pantriq prime-land-network peak-fit atelier-gaming couture-gallery glow-protocol lure-and-luster quiet-luxury sole-prestige the-autodrome verdant-co riddim shelfly; do
            if [ -d "$app" ]; then
              mkdir -p "site/$app"
              cp -rn "$app/." "site/$app/" 2>/dev/null || true
            fi
          done
          cp -rn logos/. site/logos/ 2>/dev/null || true
          # Copy favicon
          cp -n favicon.png site/favicon.png 2>/dev/null || true
          # Copy product logos into each app subfolder
          for app in velloq moblync rowcell cupyx karjov callaloo calalloo dpanyard the-watch-list dreaming-anime the-escapist tech-scout-hq deskwell pantriq prime-land-network peak-fit atelier-gaming couture-gallery glow-protocol lure-and-luster quiet-luxury sole-prestige the-autodrome verdant-co riddim shelfly; do
            if [ -d "$app" ] && [ -d "site/$app" ]; then
              find "$app" -maxdepth 1 -name "*.png" -o -name "*.jpg" -o -name "*.svg" | xargs -I{} cp -n {} "site/$app/" 2>/dev/null || true
            fi
          done
          # Copy assets/logos if exists
          if [ -d "assets/logos" ]; then
            mkdir -p site/assets/logos
            cp -rn assets/logos/. site/assets/logos/ 2>/dev/null || true
          fi
          # Copy nehneh images into site
          if [ -d "nehneh/img" ]; then
            mkdir -p site/nehneh/img
            cp -rn nehneh/img/. site/nehneh/img/ 2>/dev/null || true
          fi
          if [ -d "nehneh/shop" ]; then
            mkdir -p site/nehneh/shop
            cp -rn nehneh/shop/. site/nehneh/shop/ 2>/dev/null || true
          fi
          # Copy seamritedesigns assets
          if [ -d "seamritedesigns" ]; then
            mkdir -p site/seamritedesigns
            find seamritedesigns -name "*.jpg" -o -name "*.png" -o -name "*.svg" -o -name "*.webp" | xargs -I{} cp -n {} site/seamritedesigns/ 2>/dev/null || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deploy failed at $(date)" >> deploy_errors.log

