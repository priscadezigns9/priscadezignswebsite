
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Twin - Casio F91W-1</title>
    <style>
        :root {
            --bg: #0A0A0B;
            --accent: #C9A84C;
            --text: #F1FAEE;
            --font: 'Cormorant Garamond', serif;
        }
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: var(--font); }
        .certificate { width: 400px; height: 600px; background: var(--bg); border: 1px solid rgba(255,255,255,0.1); position: relative; padding: 40px; box-sizing: border-box; color: var(--text); text-align: center; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        .brand-logo { font-size: 3rem; font-weight: 900; color: var(--accent); margin-bottom: 20px; position: relative; z-index: 1; }
        .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 4px; color: var(--accent); margin-bottom: 40px; display: block; position: relative; z-index: 1; }
        .product-name { font-size: 1.8rem; margin-bottom: 10px; position: relative; z-index: 1; }
        .product-asin { font-size: 0.9rem; color: rgba(255,255,255,0.4); margin-bottom: 60px; position: relative; z-index: 1; }
        .cert-id { position: absolute; bottom: 40px; left: 40px; font-family: monospace; font-size: 0.8rem; color: rgba(255,255,255,0.3); }
        .stamp { position: absolute; bottom: 40px; right: 40px; width: 60px; height: 60px; border: 2px solid var(--accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.6rem; color: var(--accent); transform: rotate(-20deg); font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="certificate">
        <div class="brand-logo">W</div>
        <span class="label">Verified Alpha Signal</span>
        <h1 class="product-name">Casio F91W-1</h1>
        <div class="product-asin">ASIN: B000GAWSDG</div>
        <div class="cert-id">#3D4EE8F0C9B0</div>
        <div class="stamp">Authentic<br>Signal</div>
    </div>
</body>
</html>
