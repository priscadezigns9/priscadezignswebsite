<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You | Lintro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #E85C1E;
      --orange-light: #FF7A3D;
      --black: #1A1A1A;
      --white: #FFFFFF;
      --off-white: #FAFAFA;
      --text-muted: #6B6B6B;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--off-white);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      overflow: hidden;
    }

    /* Animated background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }
    .blob1 { width: 500px; height: 500px; background: var(--orange); top: -150px; right: -100px; animation-delay: 0s; }
    .blob2 { width: 350px; height: 350px; background: var(--orange-light); bottom: -100px; left: -80px; animation-delay: 3s; }
    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Card */
    .card {
      position: relative;
      background: var(--white);
      border-radius: 32px;
      padding: 60px 48px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 24px 80px rgba(232,92,30,0.12), 0 4px 16px rgba(0,0,0,0.06);
      animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Icon circle */
    .icon-wrap {
      width: 88px;
      height: 88px;
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      animation: popIn 0.6s 0.3s cubic-bezier(0.16,1,0.3,1) both;
      box-shadow: 0 12px 32px rgba(232,92,30,0.35);
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    .icon-wrap svg { width: 44px; height: 44px; fill: #fff; }

    /* Tag */
    .tag {
      display: inline-block;
      background: rgba(232,92,30,0.1);
      color: var(--orange);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      color: var(--black);
      line-height: 1.2;
      margin-bottom: 16px;
    }
    h1 span { color: var(--orange); font-style: italic; }

    p {
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.75;
      margin-bottom: 36px;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, var(--orange), var(--orange-light));
      border-radius: 2px;
      margin: 0 auto 28px;
    }

    /* Buttons */
    .btn-group { display: flex; flex-direction: column; gap: 12px; }
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      color: #fff; text-decoration: none;
      padding: 14px 28px; border-radius: 50px;
      font-weight: 700; font-size: 0.95rem;
      box-shadow: 0 8px 24px rgba(232,92,30,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(232,92,30,0.4); }
    .btn-secondary {
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--orange); text-decoration: none;
      font-weight: 600; font-size: 0.9rem;
      transition: opacity 0.2s;
    }
    .btn-secondary:hover { opacity: 0.7; }

    /* Footer logo */
    .footer-logo {
      margin-top: 48px;
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
    .footer-logo span { color: var(--orange); font-weight: 700; }

    @media (max-width: 480px) {
      .card { padding: 44px 28px; border-radius: 24px; }
    }
  </style>
</head>
<body>

  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>

  <div class="card">
    <div class="icon-wrap">
      <!-- House checkmark icon -->
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </div>

    <span class="tag">Lintro Real Estate</span>

    <h1>Thank You for <span>Joining Us</span></h1>

    <div class="divider"></div>

    <p>
      Your inquiry has been received and a member of the Lintro team will be in touch with you shortly.<br><br>
      We look forward to helping you find your perfect property.<br>
      <strong>See you next time.</strong>
    </p>

    <div class="btn-group">
      <a href="/lintro/" class="btn-primary">
        ← Back to Lintro
      </a>
      <a href="/portfolio/" class="btn-secondary">View Our Portfolio →</a>
    </div>
  </div>

  <div class="footer-logo"><span>Lintro</span> · Powered by Prisca Dezigns</div>

</body>
</html>
