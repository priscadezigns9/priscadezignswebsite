<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISCION MINT LIVE | Neural Asset Stream</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;800;900&display=swap">
    <style>
        :root { --pr-purple: #7B35D4; --bg: #000; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .header { padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 100; }
        .logo { font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; }
        .live-indicator { display: flex; align-items: center; gap: 10px; font-family: 'Space Mono'; font-size: 0.7rem; color: #ff4444; }
        .dot { width: 8px; height: 8px; background: #ff4444; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .mint-feed { padding: 40px 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .mint-card { background: #050505; border: 1px solid #111; border-radius: 20px; overflow: hidden; transition: 0.3s; }
        .mint-card:hover { border-color: var(--pr-purple); transform: scale(1.02); }
        .asset-preview { width: 100%; height: 280px; background: #111; display: flex; align-items: center; justify-content: center; font-size: 4rem; }
        .asset-info { padding: 20px; }
        .asset-name { font-weight: 800; font-size: 0.9rem; margin-bottom: 5px; }
        .asset-handle { font-family: 'Space Mono'; font-size: 0.6rem; color: var(--pr-purple); }
        .mint-meta { display: flex; justify-content: space-between; margin-top: 15px; font-size: 0.55rem; color: #444; text-transform: uppercase; font-weight: 700; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">PRISCION MINT LIVE</div>
        <div class="live-indicator">
            <div class="dot"></div>
            NEURAL FEED ACTIVE
        </div>
    </div>

    <div class="mint-feed" id="feed">
        <!-- Mock Live Mints -->
        <div class="mint-card">
            <div class="asset-preview">🧩</div>
            <div class="asset-info">
                <div class="asset-name">Generation Play #0842</div>
                <div class="asset-handle">$thegenplay.prn</div>
                <div class="mint-meta"><span>1m ago</span><span>Minted</span></div>
            </div>
        </div>
        <div class="mint-card">
            <div class="asset-preview">👟</div>
            <div class="asset-info">
                <div class="asset-name">Sole Prestige Genesis</div>
                <div class="asset-handle">$sole.prn</div>
                <div class="mint-meta"><span>4m ago</span><span>Anchored</span></div>
            </div>
        </div>
        <div class="mint-card">
            <div class="asset-preview">🍲</div>
            <div class="asset-info">
                <div class="asset-name">Calalloo Heritage #01</div>
                <div class="asset-handle">$calalloo.prn</div>
                <div class="mint-meta"><span>12m ago</span><span>Minted</span></div>
            </div>
        </div>
        <div class="mint-card">
            <div class="asset-preview">🛡️</div>
            <div class="asset-info">
                <div class="asset-name">Nurasen Neural Node</div>
                <div class="asset-handle">$nurasen.prn</div>
                <div class="mint-meta"><span>20m ago</span><span>Secured</span></div>
            </div>
        </div>
    </div>

    <script>
        // Simulate real-time minting
        const icons = ['🧩', '👟', '🍲', '🛡️', '🏎️', '🎮', '✨', '🏝️'];
        const names = ['Gen Play Alpha', 'Luxury Sole', 'Recipe NFT', 'Neural Shield', 'Supercar Bond', 'Atelia Gear', 'Essence Fragrance', 'Escapist Pass'];
        const handles = ['$genplay.prn', '$sole.prn', '$calalloo.prn', '$nurasen.prn', '$autodrome.prn', '$atelia.prn', '$essence.prn', '$escapist.prn'];

        setInterval(() => {
            const feed = document.getElementById('feed');
            const i = Math.floor(Math.random() * icons.length);
            const card = document.createElement('div');
            card.className = 'mint-card';
            card.style.opacity = '0';
            card.innerHTML = `
                <div class="asset-preview">${icons[i]}</div>
                <div class="asset-info">
                    <div class="asset-name">${names[i]} #${Math.floor(Math.random()*9000)}</div>
                    <div class="asset-handle">${handles[i]}</div>
                    <div class="mint-meta"><span>Just Now</span><span>Minted</span></div>
                </div>
            `;
            feed.prepend(card);
            setTimeout(() => card.style.opacity = '1', 50);
            if(feed.children.length > 20) feed.lastChild.remove();
        }, 10000);
    </script>
</body>
</html>
