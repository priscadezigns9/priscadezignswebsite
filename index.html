<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prisca Dezigns | Global Visual Identity & AI Architecture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FDF8F2;
            --text: #1A1A1A;
            --muted: #666666;
            --accent: #7B35D4;
            --border: rgba(0,0,0,0.1);
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            padding: 40px 6%;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: inherit;
        }

        .logo span { color: var(--accent); }

        nav a {
            margin-left: 24px;
            text-decoration: none;
            color: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        nav a:hover { opacity: 1; color: var(--accent); }

        .hero {
            padding: 160px 6% 120px;
            text-align: center;
        }

        .hero h1 {
            font-family: var(--font-heading);
            font-size: clamp(3.5rem, 10vw, 7rem);
            margin-bottom: 24px;
            line-height: 0.9;
            letter-spacing: -2px;
        }

        .hero p {
            font-size: 1.3rem;
            color: var(--muted);
            max-width: 700px;
            margin: 0 auto 48px;
        }

        .cta-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            display: inline-block;
            padding: 18px 48px;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-outline { border: 1px solid var(--border); color: var(--text); }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(123,53,212,0.2); }

        footer {
            padding: 80px 6%;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .footer-logo {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: block;
        }

        .copyright {
            color: var(--muted);
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">Prisca<span>Dezigns</span></a>
        <nav>
            <a href="/prisca-dezigns/blog/">Editorial</a>
            <a href="/brands/">The Alpha Signal</a>
        </nav>
    </header>

    <main class="hero">
        <h1>Global Identity Architecture.</h1>
        <p>The Laboratory. Architecting the next generation of global brand empires through AI-driven visual intelligence.</p>
        <div class="cta-group">
            <a href="/brands/" class="btn btn-primary">The Alpha Signal</a>
            <a href="/prisca-dezigns/blog/" class="btn btn-outline">Read Editorial</a>
        </div>
    </main>

    <footer>
        <span class="footer-logo">Prisca Dezigns</span>
        <p class="copyright">© 2026 PRISCA DEZIGNS · AI-POWERED BRAND ARCHITECTURE</p>
    </footer>

</body>
</html>
