@font-face { font-family: 'Gistesy'; src: url('https://cdn.jsdelivr.net/gh/priscadezigns9/priscadezignswebsite@main/assets/fonts/Gistesy.woff') format('woff'); }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── Brand Fonts ── */
  --font-prisca: 'Gistesy', cursive;
  --font-dezigns: 'Belliza', sans-serif;

  --bg:#FDF8F2;--card:#FFFFFF;--primary:#C8A84B;--primary-light:#E5C467;
  --primary-dim:rgba(200,168,75,0.1);--text:#1A1A1A;--text-dim:#666666;
  --gold:#C8A84B;--border:rgba(0,0,0,0.1);--green:#25D366;
  --baby-blue: #89CFF0;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;line-height:1.6;position:relative}

/* FABRIC OVERLAY */
body::after {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: url("https://www.transparenttextures.com/patterns/linen.png");
    opacity: 0.05;
    pointer-events: none;
    z-index: 9999;
}

/* FALLING LEAVES (V25) */
.leaf-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }


    10% { opacity: 0.3; }
    90% { opacity: 0.3; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(100px); opacity: 0; }
}








h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif}
a{color:inherit;text-decoration:none}

/* WHATSAPP FLOAT */
.wa-float{position:fixed;bottom:28px;right:28px;z-index:9999;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.wa-btn{width:56px;height:56px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,0.45);cursor:pointer;transition:transform 0.2s;text-decoration:none}
.wa-btn:hover{transform:scale(1.08)}
.wa-btn svg{width:28px;height:28px;fill:#fff}
.wa-tooltip{background:#FFFFFF;color:#fff;font-size:0.78rem;font-weight:600;padding:7px 13px;border-radius:8px;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,0.3);animation:fadeInRight 0.3s ease}
@keyframes fadeInRight{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}

/* STICKY TOP BAR */

.promo-bar a{color:#fff;text-decoration:underline;margin-left:8px}
.promo-bar 

/* PLATFORMS SECTION */
.platforms-section{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:0 24px 80px;max-width:1100px;margin:0 auto}
.platform-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;display:flex;flex-direction:column;gap:12px;transition:transform 0.2s,border-color 0.2s;text-decoration:none;color:var(--text)}
.platform-card:hover{transform:translateY(-4px);border-color:var(--primary)}
.platform-icon-wrap{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:4px}
.platform-card h3{font-size:1rem;font-weight:700;margin-bottom:2px}
.platform-card p{font-size:0.8rem;color:var(--text-dim);line-height:1.5;flex:1}
.platform-tag{font-size:0.68rem;font-weight:700;color:var(--primary-light);letter-spacing:1px;text-transform:uppercase}
.platform-arrow{font-size:0.8rem;color:var(--primary-light);font-weight:600;margin-top:4px}

/* PORTFOLIO SECTION */
.portfolio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;padding:0 24px 80px;max-width:1100px;margin:0 auto}
.portfolio-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:transform 0.2s,border-color 0.2s;position:relative}
.portfolio-card:hover{transform:translateY(-4px);border-color:var(--primary)}
.portfolio-preview{width:100%;height:200px;object-fit:cover;display:block;background:var(--primary-dim)}
.portfolio-preview-placeholder{width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:3rem;background:linear-gradient(135deg,var(--primary-dim),rgba(229,196,103,0.05))}
.portfolio-body{padding:20px}
.portfolio-tag{font-size:0.68rem;font-weight:700;color:var(--primary-light);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.portfolio-card h3{font-size:1rem;font-weight:700;margin-bottom:6px}
.portfolio-card p{font-size:0.82rem;color:var(--text-dim);line-height:1.5;margin-bottom:14px}
.portfolio-link{display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;font-weight:600;color:var(--primary-light);transition:gap 0.2s}
.portfolio-link:hover{gap:10px}
.portfolio-private{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#fff;font-size:0.65rem;font-weight:700;padding:3px 8px;border-radius:20px;backdrop-filter:blur(4px)}

/* TESTIMONIALS */
.testimonials-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;padding:0 24px 80px;max-width:1100px;margin:0 auto}
.testi-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px}
.testi-stars{color:#C8A84B;font-size:1rem;margin-bottom:12px;letter-spacing:2px}
.testi-text{font-size:0.88rem;line-height:1.7;color:var(--text-dim);margin-bottom:16px;font-style:italic}
.testi-author{display:flex;align-items:center;gap:12px}
.testi-avatar{width:38px;height:38px;border-radius:50%;background:var(--primary-dim);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:var(--primary-light);flex-shrink:0}
.testi-name{font-weight:700;font-size:0.88rem}
.testi-role{font-size:0.75rem;color:var(--text-dim)}

/* NAV */
.topnav{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;background:var(--bg);backdrop-filter:blur(12px)}
.topnav-logo{display:flex;align-items:center;min-width:fit-content}
.topnav-logo span{color:var(--primary-light)}
.topnav-links{display:flex;gap:28px;font-size:0.9rem;color:var(--text-dim)}
.topnav-links a:hover{color:var(--text)}
.topnav-cta{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:0.88rem;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:opacity 0.2s}
.topnav-cta:hover{opacity:0.85}


/* HERO */
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,168,75,0.35)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:14px 30px;font-size:0.95rem;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px}
.btn-outline:hover{border-color:var(--primary-light);color:var(--primary-light)}
.btn-wa{background:#25D366;color:#fff;border:none;border-radius:10px;padding:14px 30px;font-size:0.95rem;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px}
.btn-wa:hover{opacity:0.88;transform:translateY(-2px)}

/* SALE BANNER */
.sale-banner{background:linear-gradient(135deg,var(--primary),#C8A84B);padding:13px 24px;text-align:center;font-size:0.92rem;font-weight:500}
.sale-banner strong{font-weight:700}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.stat{padding:32px 24px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-number{font-family:'Space Grotesk',sans-serif;font-size:2.2rem;font-weight:800;color:var(--primary-light)}
.stat-label{font-size:0.82rem;color:var(--text-dim);margin-top:4px;letter-spacing:0.3px}

/* SECTION HEADERS */
.section-header{text-align:center;padding:70px 24px 48px}
.section-label{font-size:0.78rem;letter-spacing:2.5px;color:var(--primary-light);text-transform:uppercase;margin-bottom:14px;display:block}
.section-header h2{font-family:'Belleza',sans-serif;letter-spacing:1px;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;line-height:1.2}
.section-header p{font-size:1rem;color:var(--text-dim);max-width:500px;margin:14px auto 0;line-height:1.7}

/* SERVICES GRID */
.service-card:hover{border-color:rgba(200,168,75,0.5);transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,0.3)}
.service-card:hover::before{opacity:1}
.service-icon{font-size:1.8rem;margin-bottom:14px}
.service-card h3{font-size:1.05rem;font-weight:700;margin-bottom:10px}
.service-card p{font-size:0.87rem;color:var(--text-dim);line-height:1.65}
.service-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.tag{background:var(--primary-dim);color:var(--primary-light);font-size:0.74rem;padding:4px 10px;border-radius:20px;border:1px solid var(--border)}

/* PRICING */
.price-tier{font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--primary-light);margin-bottom:10px}
.price-card h3{font-size:1.3rem;font-weight:800;margin-bottom:4px}
.price-card .price{font-size:2rem;font-weight:800;color:var(--primary-light);margin:14px 0 4px;font-family:'Space Grotesk',sans-serif}
.price-card .price span{font-size:0.9rem;font-weight:400;color:var(--text-dim)}
.price-desc{font-size:0.83rem;color:var(--text-dim);margin-bottom:20px;line-height:1.5}
.price-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.price-features{list-style:none;flex:1;display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.price-features li{font-size:0.86rem;color:var(--text-dim);display:flex;align-items:flex-start;gap:10px;line-height:1.4}
.price-features li::before{content:'✓';color:var(--primary-light);font-weight:700;flex-shrink:0;margin-top:1px}
.price-features li.na{color:#444}
.price-features li.na::before{content:'–';color:#444}
.price-btn{display:block;text-align:center;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:13px;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:0.9rem;font-weight:600;transition:all 0.2s;border:none;cursor:pointer;width:100%}
.price-btn:hover{opacity:0.88;transform:translateY(-1px)}
.price-btn.outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.price-btn.outline:hover{border-color:var(--primary-light);color:var(--primary-light)}

/* À LA CARTE */
.custom-section h2{font-family:'Belleza',sans-serif;letter-spacing:0.5px;font-size:1.8rem;font-weight:800;margin-bottom:14px}
.custom-section p{color:var(--text-dim);margin-bottom:28px;line-height:1.7}

/* PROCESS */

<script>
(function(){
  var btn=document.getElementById('pdHamburger');
  var drawer=document.getElementById('pdDrawer');
  function toggle(){
    btn.classList.toggle('open');
    if(drawer.style.display==='flex'){
      drawer.classList.remove('open');
      setTimeout(function(){drawer.style.display='none';},350);
    } else {
      drawer.style.display='flex';
      setTimeout(function(){drawer.classList.add('open');},10);

  window.pdCloseDrawer=function(){
    btn.classList.remove('open');
    drawer.classList.remove('open');
    setTimeout(function(){drawer.style.display='none';},350);
  };
  btn.addEventListener('click',toggle);
})();
</script>
