<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prisca Dezigns | The Rubik's Globe</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/site/logos/prisca-dezigns-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        :root {
            --ivory: #FFFFF0;
            --lilac: #C8A2C8;
            --purple: #301934;
            --text: #1a1a1a;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: var(--font-body); 
            background: var(--ivory); 
            color: var(--text); 
            overflow: hidden;
            height: 100vh;
        }

        #ui-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: auto;
        }

        .logo-container {
            display: flex; align-items: center; gap: 15px;
        }

        .logo-img {
            width: 40px; height: 40px;
            object-fit: contain;
        }

        .logo { 
            font-family: var(--font-heading); 
            font-size: 2.2rem; font-weight: 900; letter-spacing: -1.5px;
            color: var(--purple);
            text-transform: lowercase;
        }

        main {
            text-align: left;
            pointer-events: auto;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .brand-visual-container {
            display: flex;
            align-items: center;
            gap: 35px;
        }

        .dynamic-brand-logo {
            width: 140px;
            height: 140px;
            object-fit: contain;
            mix-blend-mode: multiply;
            filter: drop-shadow(0 10px 25px rgba(48, 25, 52, 0.15));
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .brand-text-content {
            display: flex;
            flex-direction: column;
        }

        .brand-label {
            font-weight: 900; font-size: 0.75rem;
            letter-spacing: 6px; text-transform: uppercase;
            color: var(--lilac);
            margin-bottom: 12px;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: clamp(2.5rem, 6vw, 5rem);
            line-height: 0.9;
            color: var(--purple);
            letter-spacing: -3px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .view-cta {
            display: inline-block;
            padding: 14px 40px;
            border: 1px solid var(--purple);
            color: var(--purple);
            text-decoration: none;
            font-weight: 900;
            font-size: 0.75rem;
            letter-spacing: 2.5px;
            transition: all 0.3s ease;
            width: fit-content;
            text-transform: uppercase;
        }

        .view-cta:hover {
            background: var(--purple);
            color: var(--ivory);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(48, 25, 52, 0.2);
        }

        footer {
            display: flex; justify-content: space-between; align-items: flex-end;
            pointer-events: auto;
        }

        .footer-info { 
            font-family: var(--font-heading);
            font-style: italic;
            font-size: 1.1rem; 
            color: var(--lilac);
            max-width: 400px;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        #scroll-indicator {
            position: fixed;
            right: 50px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 11;
        }

        .dot {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--lilac);
            opacity: 0.2;
        }

        .dot.active {
            opacity: 1;
            background: var(--purple);
            transform: scale(2.5);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <header>
            <div class="logo-container">
                <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/site/logos/prisca-dezigns-logo.png" alt="Prisca Dezigns" class="logo-img">
                <div class="logo">prisca dezigns.</div>
            </div>
            <div style="font-weight: 900; font-size: 0.7rem; letter-spacing: 3px; color: var(--purple);">EMPIRE V.2.2</div>
        </header>

        <main>
            <div class="brand-visual-container">
                <img id="dynamic-logo" src="" alt="Brand Logo" class="dynamic-brand-logo">
                <div class="brand-text-content">
                    <div class="brand-label" id="current-sector">SYSTEM ENTRY</div>
                    <h1 id="current-brand">BRAND SCAN</h1>
                    <a href="scan/" id="brand-url" target="_blank" class="view-cta">ENTER DOMAIN</a>
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-info">
                Architecting Private Digital Networks for the Sovereign Individual.
            </div>
            <div id="interaction-guide" style="font-size: 0.6rem; letter-spacing: 3px; color: var(--lilac); font-weight: 900;">
                SCROLL TO NAVIGATE SLICES
            </div>
        </footer>
    </div>

    <div id="scroll-indicator"></div>

    <div id="canvas-container"></div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        const globeGeo = new THREE.IcosahedronGeometry(2.8, 3);
        const globeMat = new THREE.MeshPhongMaterial({ 
            color: 0xC8A2C8, 
            wireframe: true,
            transparent: true,
            opacity: 0.25
        });
        const globe = new THREE.Mesh(globeGeo, globeMat);
        scene.add(globe);

        camera.position.z = 6.5;

        const base = "https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/";
        const siteLogos = base + "site/logos/";
        const prodLogos = base + "site/assets/logos/";
        
        const brands = [
            { name: "BRAND SCAN", sector: "SYSTEM ENTRY", logo: "", url: "scan/" },
            { name: "PRISICON", sector: "CORE NETWORK", logo: base + "assets/priscion_logo.png", url: "https://priscion.com" },
            { name: "ESSENCE ELITE", sector: "FRAGRANCE", logo: "", url: "essenceelite/" },
            { name: "THE AUTODROME", sector: "AUTOMOTIVE", logo: base + "the-autodrome/logo.png", url: "theautodrome/" },
            { name: "DESKWELL", sector: "OFFICE SOLUTIONS", logo: base + "deskwell/logo.png", url: "deskwell/" },
            { name: "THE GEN PLAY", sector: "TOYS & COLLECTIBLES", logo: "", url: "thegenplay/" },
            { name: "LES AMOUR", sector: "RELATIONSHIPS", logo: "", url: "lesamour/" },
            { name: "ORNALIS LIGHTING", sector: "ARCHITECTURAL", logo: "", url: "ornalis/" },
            { name: "AVORIA FRAMES", sector: "EYEWEAR", logo: "", url: "axoria/" },
            { name: "SHELFLY", sector: "SMART STORAGE", logo: base + "shelfly/logo.png", url: "shelfly/" },
            { name: "PANTRIQ", sector: "SMART KITCHEN", logo: base + "pantriq/logo.png", url: "pantriq/" },
            { name: "VERDANT CO", sector: "SUSTAINABILITY", logo: base + "verdant-co/logo.png", url: "verdantco/" },
            { name: "SEAMRITE DESIGNS", sector: "CLIENTS", logo: siteLogos + "seamritedesigns.jpg", url: "seamritedesigns-/" },
            { name: "QUIET LUXURY", sector: "HOME DECOR", logo: siteLogos + "quiet-luxury.svg", url: "quietluxury/" },
            { name: "COUTURE GALLERY", sector: "LUXURY RETAIL", logo: "", url: "couturegallery/" },
            { name: "PAW VAULT", sector: "PET CARE", logo: siteLogos + "paw-vault.jpg", url: "pawvault/" },
            { name: "THE WATCH LIST", sector: "HOROLOGY", logo: siteLogos + "the-watch-list.png", url: "thewatchlist/" },
            { name: "THE ESCAPIST", sector: "TRAVEL", logo: siteLogos + "the-escapist.png", url: "theescapist/" },
            { name: "GLOW PROTOCOL", sector: "SKINCARE", logo: "", url: "glowprotocol/" },
            { name: "SOLE PRESTIGE", sector: "FOOTWEAR", logo: base + "sole-prestige/logo.png", url: "soleprestige/" },
            { name: "PRIME LAND NETWORK", sector: "REAL ESTATE", logo: siteLogos + "prime-land-network.jpg", url: "primelandnetwork/" },
            { name: "ATELIA GAMING", sector: "MEDIA & TECH", logo: siteLogos + "atelier-gaming.jpg", url: "ateliagaming/" },
            { name: "THE WAY MADE KNOWN", sector: "MISSION", logo: "", url: "https://thewaymadeknown.com" },
            { name: "DREAMING ANIME", sector: "ANIME MEDIA", logo: siteLogos + "dreaming-anime.jpg", url: "https://dreaminganime.com" },
            { name: "THE TECH SCOUT HQ", sector: "INNOVATION", logo: siteLogos + "tech-scout.png", url: "thetechscouthq/" },
            { name: "PEAK FIT", sector: "BIOHACKING", logo: base + "peak-fit/logo.png", url: "peakfit/" },
            { name: "CUPYX", sector: "PRODUCT", logo: prodLogos + "cupyx.png", url: "#" },
            { name: "KARJOV", sector: "PRODUCT", logo: prodLogos + "karjov.png", url: "#" },
            { name: "VELLOQ", sector: "PRODUCT", logo: prodLogos + "velloq.png", url: "#" },
            { name: "STABLE", sector: "FINANCE", logo: base + "assets/stable_logo.png", url: "#" }
        ];

        const dotsContainer = document.getElementById('scroll-indicator');
        brands.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'dot' + (i === 0 ? ' active' : '');
            dotsContainer.appendChild(dot);
        });

        let currentIndex = 0;
        let isAnimating = false;

        function updateUI(index) {
            const brand = brands[index];
            
            gsap.to(".brand-visual-container", { opacity: 0, y: 30, duration: 0.3, onComplete: () => {
                document.getElementById('current-brand').innerText = brand.name;
                document.getElementById('current-sector').innerText = brand.sector;
                document.getElementById('brand-url').href = brand.url;
                
                const logoImg = document.getElementById('dynamic-logo');
                if (brand.logo === "") {
                    logoImg.style.visibility = "hidden";
                } else {
                    logoImg.style.visibility = "visible";
                    logoImg.src = brand.logo;
                    logoImg.onerror = function() {
                        this.style.visibility = "hidden";
                    };
                }
                
                const dots = document.querySelectorAll('.dot');
                dots.forEach((dot, i) => dot.classList.toggle('active', i === index));

                gsap.to(".brand-visual-container", { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" });
            }});
        }

        window.addEventListener('wheel', (e) => {
            if (isAnimating) return;
            isAnimating = true;

            const direction = e.deltaY > 0 ? 1 : -1;
            currentIndex = (currentIndex + direction + brands.length) % brands.length;

            gsap.to(globe.rotation, { 
                y: globe.rotation.y + (Math.PI / 2.5 * direction), 
                duration: 1.5, 
                ease: "expo.out",
                onComplete: () => { isAnimating = false; }
            });

            updateUI(currentIndex);
        }, { passive: true });

        function animate() {
            requestAnimationFrame(animate);
            globe.rotation.y += 0.0015;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
