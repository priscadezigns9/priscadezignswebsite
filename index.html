<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prisca Dezigns | The Rubik's Globe</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/priscion_logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        :root {
            --ivory: #FFFFF0;
            --lilac: #C8A2C8;
            --purple: #301934;
            --text: #1a1a1a;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: var(--font-body); 
            background: var(--ivory); 
            color: var(--text); 
            overflow: hidden;
            height: 100vh;
        }

        /* UI Overlays */
        #ui-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: auto;
        }

        .logo { 
            font-family: var(--font-heading); 
            font-size: 2.2rem; font-weight: 900; letter-spacing: -1.5px;
            color: var(--purple);
            text-transform: lowercase;
        }

        .nav-trigger {
            font-weight: 900; font-size: 0.7rem; letter-spacing: 3px;
            color: var(--purple); cursor: pointer;
        }

        main {
            text-align: left;
            pointer-events: auto;
            max-width: 800px;
        }

        .brand-label {
            font-weight: 900; font-size: 0.75rem;
            letter-spacing: 6px; text-transform: uppercase;
            color: var(--lilac);
            margin-bottom: 10px;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: clamp(4rem, 10vw, 8rem);
            line-height: 0.85;
            color: var(--purple);
            letter-spacing: -5px;
            font-weight: 900;
        }

        .view-cta {
            margin-top: 30px;
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid var(--purple);
            color: var(--purple);
            text-decoration: none;
            font-weight: 900;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .view-cta:hover {
            background: var(--purple);
            color: var(--ivory);
        }

        footer {
            display: flex; justify-content: space-between; align-items: flex-end;
            pointer-events: auto;
        }

        .footer-info { 
            font-family: var(--font-heading);
            font-style: italic;
            font-size: 1.2rem; 
            color: var(--lilac);
            max-width: 400px;
        }

        /* 3D Container */
        #canvas-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        #scroll-indicator {
            position: fixed;
            right: 50px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 11;
        }

        .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--lilac);
            opacity: 0.3;
        }

        .dot.active {
            opacity: 1;
            background: var(--purple);
            transform: scale(2);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <header>
            <div class="logo">prisca dezigns.</div>
            <div class="nav-trigger">INDEX</div>
        </header>

        <main>
            <div class="brand-label" id="current-sector">DESIGN & STRATEGY</div>
            <h1 id="current-brand">PRISCION HUB</h1>
            <a href="#" id="brand-url" class="view-cta">ENTER DOMAIN</a>
        </main>

        <footer>
            <div class="footer-info">
                Solving the puzzle of the digital empire.
            </div>
            <div id="interaction-guide" style="font-size: 0.6rem; letter-spacing: 3px; color: var(--lilac); font-weight: 900;">
                SCROLL TO ROTATE SLICES
            </div>
        </footer>
    </div>

    <div id="scroll-indicator">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        // The Rubik's Globe (Geodesic Wireframe)
        const geometry = new THREE.IcosahedronGeometry(2.5, 3);
        const material = new THREE.MeshPhongMaterial({ 
            color: 0xC8A2C8, 
            wireframe: true,
            transparent: true,
            opacity: 0.4
        });
        const globe = new THREE.Mesh(geometry, material);
        scene.add(globe);

        // Rotating Rings (Rubik's Slices)
        const ringGeo = new THREE.TorusGeometry(2.6, 0.01, 16, 100);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x301934, transparent: true, opacity: 0.2 });
        const ringX = new THREE.Mesh(ringGeo, ringMat);
        const ringY = new THREE.Mesh(ringGeo, ringMat);
        ringY.rotation.x = Math.PI / 2;
        scene.add(ringX, ringY);

        camera.position.z = 6;

        const brands = [
            { name: "BRAND SCAN", sector: "SYSTEM ENTRY", url: "#" },
            { name: "PRISCION HUB", sector: "CORE NETWORK", url: "https://priscion.com" },
            { name: "COUTURE GALLERY", sector: "LUXURY RETAIL", url: "https://priscadezigns.org/couturegallery/" },
            { name: "ATELIA GAMING", sector: "MEDIA & TECH", url: "https://priscadezigns.org/ateliagaming/" },
            { name: "CALALLOO", sector: "CULTURAL HERITAGE", url: "https://priscadezigns.org/calalloo/" },
            { name: "CUPYX", sector: "PRODUCT", url: "#" },
            { name: "VELLOQ", sector: "PRODUCT", url: "#" },
            { name: "KARJOV", sector: "PRODUCT", url: "#" },
            { name: "ROWCELL", sector: "PRODUCT", url: "#" },
            { name: "SEAMRITE DESIGNS", sector: "CLIENTS", url: "https://priscadezigns.org/seamritedesigns-/" },
            { name: "EVOLVE MOBILITY", sector: "PARTNERS", url: "https://priscadezigns.org/theautodrome/" },
            { name: "EMPIRE BLOG", sector: "INTELLIGENCE", url: "#" },
            { name: "A LA CARTE", sector: "SERVICES", url: "#" },
            { name: "FACEBOOK", sector: "SOCIAL", url: "https://facebook.com/priscilla.narine" },
            { name: "INSTAGRAM", sector: "SOCIAL", url: "https://www.instagram.com/priscillanarine/" },
            { name: "THREADS", sector: "SOCIAL", url: "https://www.threads.net/@priscillanarine" }
        ];

        let currentIndex = 0;
        let isAnimating = false;

        window.addEventListener('wheel', (e) => {
            if (isAnimating) return;
            isAnimating = true;

            const direction = e.deltaY > 0 ? 1 : -1;
            currentIndex = (currentIndex + direction + brands.length) % brands.length;

            // Rotate Globe like a Rubik's Slice
            gsap.to(globe.rotation, { 
                y: globe.rotation.y + (Math.PI / 2 * direction), 
                x: globe.rotation.x + (Math.PI / 8 * direction),
                duration: 1.2, 
                ease: "expo.inOut",
                onComplete: () => { isAnimating = false; }
            });

            // Update UI with GSAP for high-fidelity feel
            gsap.to("main", { opacity: 0, x: -20, duration: 0.3, onComplete: () => {
                document.getElementById('current-brand').innerText = brands[currentIndex].name;
                document.getElementById('current-sector').innerText = brands[currentIndex].sector;
                document.getElementById('brand-url').href = brands[currentIndex].url;
                
                // Update dots
                const dots = document.querySelectorAll('.dot');
                dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));

                gsap.to("main", { opacity: 1, x: 0, duration: 0.5 });
            }});
        });

        function animate() {
            requestAnimationFrame(animate);
            globe.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
