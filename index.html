<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISCA DEZIGNS | Empire Hub</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .hero { padding: 40px; }
        h1 { font-size: clamp(2rem, 8vw, 4rem); letter-spacing: -2px; margin-bottom: 20px; }
        p { font-size: 1.2rem; opacity: 0.7; max-width: 600px; line-height: 1.6; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 50px; width: 100%; max-width: 1000px; padding: 20px; }
        .brand-card { border: 1px solid rgba(255,255,255,0.1); padding: 30px; transition: 0.3s; text-decoration: none; color: inherit; }
        .brand-card:hover { background: rgba(255,255,255,0.05); border-color: red; }
        .brand-card h2 { margin: 0 0 10px 0; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>PRISCA DEZIGNS</h1>
        <p>The sovereign network of high-fidelity brands. From the Autodrome to Peak Fit, the empire is now restored.</p>
    </div>
    <div class="grid">
        <a href="https://calalloo.com" class="brand-card"><h2>Calalloo</h2></a>
        <a href="https://dreaminganime.com" class="brand-card"><h2>Dreaming Anime</h2></a>
        <a href="/autodrome/" class="brand-card"><h2>The Autodrome</h2></a>
        <a href="/peakfit/" class="brand-card"><h2>Peak Fit</h2></a>

</body>
