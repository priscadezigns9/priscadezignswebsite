<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prisca Dezigns | The Rubik's Globe</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/prisca-dezigns/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        :root {
            --ivory: #FFFFF0;
            --lilac: #C8A2C8;
            --purple: #301934;
            --text: #1a1a1a;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: var(--font-body); 
            background: var(--ivory); 
            color: var(--text); 
            overflow: hidden;
            height: 100vh;
        }

        #ui-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: auto;
        }

        .logo-container {
            display: flex; align-items: center; gap: 15px;
        }

        .logo-img {
            width: 40px; height: 40px;
            object-fit: contain;
        }

        .logo { 
            font-family: var(--font-heading); 
            font-size: 2.2rem; font-weight: 900; letter-spacing: -1.5px;
            color: var(--purple);
            text-transform: lowercase;
        }

        main {
            text-align: left;
            pointer-events: auto;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .brand-visual-container {
            display: flex;
            align-items: center;
            gap: 35px;
        }

        .dynamic-brand-logo {
            width: 140px;
            height: 140px;
            object-fit: contain;
            mix-blend-mode: multiply;
            filter: drop-shadow(0 10px 25px rgba(48, 25, 52, 0.15));
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .brand-text-content {
            display: flex;
            flex-direction: column;
        }

        .brand-label {
            font-weight: 900; font-size: 0.75rem;
            letter-spacing: 6px; text-transform: uppercase;
            color: var(--lilac);
            margin-bottom: 12px;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: clamp(2.5rem, 6vw, 5rem);
            line-height: 0.9;
            color: var(--purple);
            letter-spacing: -3px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .brand-description {
            font-size: 1rem;
            color: var(--text);
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 20px;
            font-style: italic;
        }

        .view-cta {
            display: inline-block;
            padding: 14px 40px;
            border: 1px solid var(--purple);
            color: var(--purple);
            text-decoration: none;
            font-weight: 900;
            font-size: 0.75rem;
            letter-spacing: 2.5px;
            transition: all 0.3s ease;
            width: fit-content;
            text-transform: uppercase;
        }

        .view-cta:hover {
            background: var(--purple);
            color: var(--ivory);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(48, 25, 52, 0.2);
        }

        footer {
            display: flex; justify-content: space-between; align-items: flex-end;
            pointer-events: auto;
        }

        .footer-info { 
            font-family: var(--font-heading);
            font-style: italic;
            font-size: 1.1rem; 
            color: var(--lilac);
            max-width: 400px;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        #scroll-indicator {
            position: fixed;
            right: 50px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 11;
        }

        .dot {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--lilac);
            opacity: 0.2;
        }

        .dot.active {
            opacity: 1;
            background: var(--purple);
            transform: scale(2.5);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <header>
            <div class="logo-container">
                <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/prisca-dezigns/logo.png" alt="Prisca Dezigns" class="logo-img">
                <div class="logo">prisca dezigns.</div>
            </div>
            <div style="font-weight: 900; font-size: 0.7rem; letter-spacing: 3px; color: var(--purple);">EMPIRE V.2.2</div>
        </header>

        <main>
            <div class="brand-visual-container">
                <img id="dynamic-logo" src="" alt="Brand Logo" class="dynamic-brand-logo">
                <div class="brand-text-content">
                    <div class="brand-label" id="current-sector">SYSTEM ENTRY</div>
                    <h1 id="current-brand">BRAND SCAN</h1>
                    <div class="brand-description" id="current-desc"></div>
                    <a href="scan/" id="brand-url" target="_blank" class="view-cta">ENTER DOMAIN</a>
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-info">
                Architecting Private Digital Networks for the Sovereign Individual.
            </div>
            <div id="interaction-guide" style="font-size: 0.6rem; letter-spacing: 3px; color: var(--lilac); font-weight: 900;">
                SCROLL TO NAVIGATE SLICES
            </div>
        </footer>
    </div>

    <div id="scroll-indicator"></div>

    <div id="canvas-container"></div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        const globeGeo = new THREE.IcosahedronGeometry(2.8, 3);
        const globeMat = new THREE.MeshPhongMaterial({ 
            color: 0xC8A2C8, 
            wireframe: true,
            transparent: true,
            opacity: 0.25
        });
        const globe = new THREE.Mesh(globeGeo, globeMat);
        scene.add(globe);

        camera.position.z = 6.5;

        const base = "https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/";
        
        const brands = [
            // 1. BRAND SCAN
            { name: "BRAND SCAN", sector: "SYSTEM ENTRY", logo: "", desc: "Real-time diagnostic analysis of digital identity and brand footprint.", url: "scan/" },
            
            // 2. PACKAGES
            { name: "STARTER PKG", sector: "PACKAGES", logo: "", desc: "Core digital foundation. Branding, single landing page, and basic SEO mapping.", url: "packages/#starter" },
            { name: "GROWTH PKG", sector: "PACKAGES", logo: "", desc: "Scaling network. Multi-page architecture, CRM integration, and 3 months of AI analytics.", url: "packages/#growth" },
            { name: "TRUSTED PKG", sector: "PACKAGES", logo: "", desc: "The Sovereign Standard. Full automation, Web3 integration, and deep data vaulting.", url: "packages/#trusted" },
            
            // 3. A LA CARTE
            { name: "AI COPYWRITING", sector: "A LA CARTE", logo: "", desc: "Neural-optimized messaging for high-fidelity audience engagement.", url: "services/#copy" },
            { name: "LOGO DESIGN", sector: "A LA CARTE", logo: "", desc: "Minimalist, symbolic identity engineering for luxury and tech niches.", url: "services/#logo" },
            { name: "SEO ARCHITECTURE", sector: "A LA CARTE", logo: "", desc: "Technical structural alignment for maximum visibility across the global signal.", url: "services/#seo" },
            
            // 4. INDIVIDUAL PRODUCTS
            { name: "ROWCELL", sector: "PRODUCT", logo: "", desc: "Advanced cellular logistics and data management node.", url: "rowcell/" },
            { name: "KARJOV", sector: "PRODUCT", logo: "", desc: "High-performance operational engine for private networks.", url: "karjov/" },
            { name: "VELLOQ", sector: "PRODUCT", logo: "", desc: "Next-gen communication and encryption protocol.", url: "velloq/" },
            { name: "MOBLYNC", sector: "PRODUCT", logo: "", desc: "Mobile-first synchronization for multi-device brand ecosystems.", url: "moblync/" },
            { name: "CUPYX", sector: "PRODUCT", logo: "", desc: "Digital resource containerization and distribution utility.", url: "cupyx/" },
            
            // 5. THE BRANDS
            { name: "ESSENCE ELITE", sector: "BRAND", logo: "", desc: "Artisanal olfactory science and scent-layering mastery.", url: "essenceelite/" },
            { name: "THE AUTODROME", sector: "BRAND", logo: "", desc: "Engineering-grade supercar culture and automotive performance.", url: "theautodrome/" },
            { name: "DESKWELL", sector: "BRAND", logo: "", desc: "High-fidelity ergonomic environments for peak productivity.", url: "deskwell/" },
            { name: "THE GEN PLAY", sector: "BRAND", logo: "", desc: "Generational toys and high-fidelity collectible engineering.", url: "thegenplay/" },
            { name: "LES AMOUR", sector: "BRAND", logo: "", desc: "AI-powered emotional intelligence and relationship coaching.", url: "lesamour/" },
            { name: "ORNALIS LIGHTING", sector: "BRAND", logo: "", desc: "Architectural illumination and sanctuary atmosphere engineering.", url: "ornalis/" },
            { name: "AVORIA FRAMES", sector: "BRAND", logo: "", desc: "Sovereign eyewear and architectural vision design.", url: "axoria/" },
            { name: "SHELFLY", sector: "BRAND", logo: "", desc: "Intelligent storage logistics for modern living spaces.", url: "shelfly/" },
            { name: "PANTRIQ", sector: "BRAND", logo: "", desc: "Automated culinary logistics and smart kitchen tech.", url: "pantriq/" },
            { name: "VERDANT CO", sector: "BRAND", logo: "", desc: "Regenerative sustainability and circular economy infrastructure.", url: "verdantco/" },
            { name: "QUIET LUXURY", sector: "BRAND", logo: "", desc: "Minimalist luxury and sanctuary-focused home decor.", url: "quietluxury/" },
            { name: "COUTURE GALLERY", sector: "BRAND", logo: "", desc: "Archival fashion craftsmanship and luxury accessories.", url: "couturegallery/" },
            { name: "PAW VAULT", sector: "BRAND", logo: "", desc: "High-fidelity pet care and smart nutrition technology.", url: "pawvault/" },
            { name: "THE WATCH LIST", sector: "BRAND", logo: "", desc: "Elite horological engineering and archival timepiece intelligence.", url: "thewatchlist/" },
            { name: "THE ESCAPIST", sector: "BRAND", logo: "", desc: "Sanctuary travel experiences and luxury destination intelligence.", url: "theescapist/" },
            { name: "GLOW PROTOCOL", sector: "BRAND", logo: "", desc: "Regenerative beauty tech and longevity skin diagnostics.", url: "glowprotocol/" },
            { name: "SOLE PRESTIGE", sector: "BRAND", logo: "", desc: "Bespoke footwear design and elite streetwear culture.", url: "soleprestige/" },
            { name: "PRIME LAND NETWORK", sector: "BRAND", logo: "", desc: "Global property investment and luxury real estate logistics.", url: "primelandnetwork/" },
            { name: "ATELIA GAMING", sector: "BRAND", logo: "", desc: "High-fidelity gaming media and tech hardware engineering.", url: "ateliagaming/" },
            { name: "THE WAY MADE KNOWN", sector: "MISSION", logo: "", desc: "Analytical faith evidence and historical gospel proclamation.", url: "https://thewaymadeknown.com" },
            { name: "DREAMING ANIME", sector: "BRAND", logo: "", desc: "High-fidelity animation media and studio production news.", url: "https://dreaminganime.com" },
            { name: "THE TECH SCOUT HQ", sector: "BRAND", logo: "", desc: "Innovation news and emerging neural technology signals.", url: "thetechscouthq/" },
            { name: "PEAK FIT", sector: "BRAND", logo: "", desc: "Biohacking recovery science and elite fitness performance.", url: "peakfit/" },

            // 6. CLIENTS
            { name: "SEAMRITE DESIGNS", sector: "CLIENT", logo: "", desc: "Modern artistic sewing and ancestral Caribbean authenticity.", url: "seamritedesigns-/" },

            // 7. PRISCION
            { name: "PRISICON", sector: "CORE NETWORK", logo: "", desc: "The high-fidelity migration hub for the Web3 transition.", url: "https://priscion.com" },

            // 8. PARTNERS
            { name: "EVOLVE", sector: "PARTNER", logo: "", desc: "Caribbean-wide corporate mobility and fleet sales logistics.", url: "partners/#evolve" },

            // 9. BLOG
            { name: "THE BLOG", sector: "INTELLIGENCE", logo: "", desc: "Deep-dives into product news and digital agency evolution.", url: "blog/" },

            // 10. SOCIALS
            { name: "FACEBOOK", sector: "SOCIAL", logo: "", desc: "Connect with our community on the Meta landscape.", url: "https://facebook.com/priscilla.narine" },
            { name: "INSTAGRAM", sector: "SOCIAL", logo: "", desc: "Visual storytelling and luxury brand signals.", url: "https://instagram.com/priscillanarine" },
            { name: "THREADS", sector: "SOCIAL", logo: "", desc: "Real-time discussion on the affiliate engine.", url: "https://threads.net/@priscillanarine" }
        ];

        const dotsContainer = document.getElementById('scroll-indicator');
        brands.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'dot' + (i === 0 ? ' active' : '');
            dotsContainer.appendChild(dot);
        });

        let currentIndex = 0;
        let isAnimating = false;

        function updateUI(index) {
            const brand = brands[index];
            
            gsap.to(".brand-visual-container", { opacity: 0, y: 30, duration: 0.3, onComplete: () => {
                document.getElementById('current-brand').innerText = brand.name;
                document.getElementById('current-sector').innerText = brand.sector;
                document.getElementById('current-desc').innerText = brand.desc;
                document.getElementById('brand-url').href = brand.url;
                
                const logoImg = document.getElementById('dynamic-logo');
                if (brand.logo === "") {
                    logoImg.style.visibility = "hidden";
                    logoImg.style.display = "none";
                } else {
                    logoImg.style.display = "block";
                    logoImg.style.visibility = "visible";
                    logoImg.src = brand.logo;
                    logoImg.onerror = function() {
                        this.style.display = "none";
                    };
                }
                
                const dots = document.querySelectorAll('.dot');
                dots.forEach((dot, i) => dot.classList.toggle('active', i === index));

                gsap.to(".brand-visual-container", { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" });
            }});
        }

        window.addEventListener('wheel', (e) => {
            if (isAnimating) return;
            isAnimating = true;

            const direction = e.deltaY > 0 ? 1 : -1;
            currentIndex = (currentIndex + direction + brands.length) % brands.length;

            gsap.to(globe.rotation, { 
                y: globe.rotation.y + (Math.PI / 2.5 * direction), 
                duration: 1.5, 
                ease: "expo.out",
                onComplete: () => { isAnimating = false; }
            });

            updateUI(currentIndex);
        }, { passive: true });

        function animate() {
            requestAnimationFrame(animate);
            globe.rotation.y += 0.0015;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize first state
        updateUI(0);
    </script>
</body>
</html>
