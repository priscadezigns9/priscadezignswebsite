<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prisca Dezigns | The Rubik's Globe</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/priscion_logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        :root {
            --ivory: #FFFFF0;
            --lilac: #C8A2C8;
            --purple: #301934;
            --text: #1a1a1a;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: var(--font-body); 
            background: var(--ivory); 
            color: var(--text); 
            overflow: hidden;
            height: 100vh;
        }

        #ui-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: auto;
        }

        .logo-container {
            display: flex; align-items: center; gap: 15px;
        }

        .logo-img {
            width: 40px; height: 40px;
            object-fit: contain;
        }

        .logo { 
            font-family: var(--font-heading); 
            font-size: 2.2rem; font-weight: 900; letter-spacing: -1.5px;
            color: var(--purple);
            text-transform: lowercase;
        }

        main {
            text-align: left;
            pointer-events: auto;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .brand-visual-container {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .dynamic-brand-logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(48, 25, 52, 0.1));
            transition: all 0.5s ease;
        }

        .brand-text-content {
            display: flex;
            flex-direction: column;
        }

        .brand-label {
            font-weight: 900; font-size: 0.75rem;
            letter-spacing: 6px; text-transform: uppercase;
            color: var(--lilac);
            margin-bottom: 10px;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: clamp(2.5rem, 6vw, 5rem);
            line-height: 0.9;
            color: var(--purple);
            letter-spacing: -3px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .view-cta {
            margin-top: 10px;
            display: inline-block;
            padding: 12px 35px;
            border: 1px solid var(--purple);
            color: var(--purple);
            text-decoration: none;
            font-weight: 900;
            font-size: 0.75rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            width: fit-content;
        }

        .view-cta:hover {
            background: var(--purple);
            color: var(--ivory);
        }

        footer {
            display: flex; justify-content: space-between; align-items: flex-end;
            pointer-events: auto;
        }

        .footer-info { 
            font-family: var(--font-heading);
            font-style: italic;
            font-size: 1.1rem; 
            color: var(--lilac);
            max-width: 400px;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        #scroll-indicator {
            position: fixed;
            right: 50px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 11;
        }

        .dot {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--lilac);
            opacity: 0.2;
        }

        .dot.active {
            opacity: 1;
            background: var(--purple);
            transform: scale(2.5);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <header>
            <div class="logo-container">
                <img src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/priscion_logo.png" alt="Prisca Dezigns" class="logo-img">
                <div class="logo">prisca dezigns.</div>
            </div>
            <div style="font-weight: 900; font-size: 0.7rem; letter-spacing: 3px; color: var(--purple);">EMPIRE V.2.0</div>
        </header>

        <main>
            <div class="brand-visual-container">
                <img id="dynamic-logo" src="https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/priscion_logo.png" alt="Brand Logo" class="dynamic-brand-logo">
                <div class="brand-text-content">
                    <div class="brand-label" id="current-sector">SYSTEM ENTRY</div>
                    <h1 id="current-brand">BRAND SCAN</h1>
                    <a href="#" id="brand-url" class="view-cta">ENTER DOMAIN</a>
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-info">
                Architecting Private Digital Networks for the Sovereign Individual.
            </div>
            <div id="interaction-guide" style="font-size: 0.6rem; letter-spacing: 3px; color: var(--lilac); font-weight: 900;">
                SCROLL TO NAVIGATE SLICES
            </div>
        </footer>
    </div>

    <div id="scroll-indicator"></div>

    <div id="canvas-container"></div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const globeGeo = new THREE.IcosahedronGeometry(2.5, 3);
        const globeMat = new THREE.MeshPhongMaterial({ 
            color: 0xC8A2C8, 
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const globe = new THREE.Mesh(globeGeo, globeMat);
        scene.add(globe);

        camera.position.z = 6;

        const baseAssets = "https://raw.githubusercontent.com/priscadezigns9/priscion/main/assets/";
        const brands = [
            { name: "BRAND SCAN", sector: "SYSTEM ENTRY", logo: baseAssets + "priscion_logo.png", url: "#" },
            { name: "PRISCION HUB", sector: "CORE NETWORK", logo: baseAssets + "priscion_logo.png", url: "https://priscion.com" },
            { name: "DESKWELL", sector: "OFFICE SOLUTIONS", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/deskwell/" },
            { name: "PANTRIQ", sector: "SMART KITCHEN", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/pantriq/" },
            { name: "SHELFLY", sector: "SMART STORAGE", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/shelfly/" },
            { name: "ESSENCE ELITE", sector: "FRAGRANCE", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/essenceelite/" },
            { name: "GLOW PROTOCOL", sector: "SKINCARE", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/glowprotocol/" },
            { name: "PRIME LAND NETWORK", sector: "REAL ESTATE", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/primelandnetwork/" },
            { name: "THE WATCH LIST", sector: "HOROLOGY", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/thewatchlist/" },
            { name: "SOLE PRESTIGE", sector: "FOOTWEAR", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/soleprestige/" },
            { name: "ATELIA GAMING", sector: "MEDIA & TECH", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/ateliagaming/" },
            { name: "DREAMING ANIME", sector: "ANIME MEDIA", logo: baseAssets + "priscion_logo.png", url: "https://dreaminganime.com" },
            { name: "PEAK FIT", sector: "BIOHACKING", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/peakfit/" },
            { name: "VERDANT CO", sector: "SUSTAINABILITY", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/verdantco/" },
            { name: "RIDDIIM", sector: "MUSIC STUDIO", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/riddiim/" },
            { name: "THE AUTODROME", sector: "AUTOMOTIVE", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/theautodrome/" },
            { name: "THE ESCAPIST", sector: "TRAVEL", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/theescapist/" },
            { name: "THE TECH SCOUT HQ", sector: "INNOVATION", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/thetechscouthq/" },
            { name: "QUIET LUXURY", sector: "HOME DECOR", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/quietluxury/" },
            { name: "COUTURE GALLERY", sector: "LUXURY RETAIL", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/couturegallery/" },
            { name: "PAW VAULT", sector: "PET CARE", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/pawvault/" },
            { name: "LES AMOUR", sector: "RELATIONSHIPS", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/lesamour/" },
            { name: "ORNALIS LIGHTING", sector: "ARCHITECTURAL", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/ornalis/" },
            { name: "AXORIA FRAMES", sector: "EYEWEAR", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/axoria/" },
            { name: "SEAMRITE DESIGNS", sector: "CLIENTS", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/seamritedesigns-/" },
            { name: "EVOLVE MOBILITY", sector: "PARTNERS", logo: baseAssets + "priscion_logo.png", url: "https://priscadezigns.org/theautodrome/" },
            { name: "FACEBOOK", sector: "SOCIAL", logo: baseAssets + "priscion_logo.png", url: "https://facebook.com/priscilla.narine" }
        ];

        const dotsContainer = document.getElementById('scroll-indicator');
        brands.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'dot' + (i === 0 ? ' active' : '');
            dotsContainer.appendChild(dot);
        });

        let currentIndex = 0;
        let isAnimating = false;

        window.addEventListener('wheel', (e) => {
            if (isAnimating) return;
            isAnimating = true;

            const direction = e.deltaY > 0 ? 1 : -1;
            currentIndex = (currentIndex + direction + brands.length) % brands.length;

            gsap.to(globe.rotation, { 
                y: globe.rotation.y + (Math.PI / 3 * direction), 
                duration: 1.2, 
                ease: "expo.out",
                onComplete: () => { isAnimating = false; }
            });

            gsap.to(".brand-visual-container", { opacity: 0, y: 20, duration: 0.3, onComplete: () => {
                document.getElementById('current-brand').innerText = brands[currentIndex].name;
                document.getElementById('current-sector').innerText = brands[currentIndex].sector;
                document.getElementById('brand-url').href = brands[currentIndex].url;
                document.getElementById('dynamic-logo').src = brands[currentIndex].logo;
                
                const dots = document.querySelectorAll('.dot');
                dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));

                gsap.to(".brand-visual-container", { opacity: 1, y: 0, duration: 0.5 });
            }});
        }, { passive: true });

        function animate() {
            requestAnimationFrame(animate);
            globe.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
