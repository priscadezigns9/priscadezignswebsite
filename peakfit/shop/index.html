<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEAK FIT | Official Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00FF00;
            --bg: #ffffff;
            --text: #000000;
            --card-bg: #ffffff;
            --border: rgba(0,0,0,0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        nav { padding: 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; padding: 4rem 2rem; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: transform 0.3s ease; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card-image { width: 100%; aspect-ratio: 1; background: #f9f9f9; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-image img { width: 100%; height: 100%; object-fit: cover; }
        .card-content { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 1.1rem; margin-bottom: 1rem; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { font-weight: 700; font-size: 1.2rem; color: var(--accent); }
        .shop-btn { background: #000; color: #fff; padding: 0.8rem 1.5rem; border-radius: 6px; text-decoration: none; font-size: 0.8rem; font-weight: 700; transition: 0.3s; }
        .shop-btn:hover { background: var(--accent); }
        footer { padding: 4rem 2rem; border-top: 1px solid var(--border); text-align: center; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">PEAK FIT</div>
    </nav>

    <main>
        <section class="shop-grid" id="grid">
            <!-- Dynamic Injection -->
        </section>
    </main>

    <footer>
        &copy; 2026 Peak Fit. Part of the Prisca Dezigns Empire.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            const SB_URL = 'https://sktpjacowqaedddtrhuz.supabase.co';
            const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdHBqYWNvd3FhZWRkZHRyaHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDk5MzEsImV4cCI6MjA5NDIyNTkzMX0.FK4N_ATFTaUuGXrYu_7OBn3qCdlo0rOzxk-E6TxJxqs';
            const sb = supabase.createClient(SB_URL, SB_KEY);

            async function loadInventory() {
                const { data, error } = await sb
                    .from('empire_inventory')
                    .select('*')
                    .eq('brand', 'Peak Fit')
                    .order('created_at', { ascending: false });
                
                if (error) {
                    console.error('Inventory Sync Error:', error);
                    return;
                }
                
                const grid = document.getElementById('grid');
                if (!grid) return;
                
                grid.innerHTML = '';
                data.forEach(p => {
                    grid.innerHTML += `
                        <div class="card">
                            <div class="card-image"><img src="${p.image_url}" loading="lazy"></div>
                            <div class="card-content">
                                <h3 class="card-title">${p.title}</h3>
                                <div class="card-footer">
                                    <span class="price">${p.price}</span>
                                    <a href="${p.affiliate_link}" class="shop-btn" target="_blank">OPTIMIZE</a>
                                </div>
                            </div>
                        </div>`;
                });
            }
            document.addEventListener('DOMContentLoaded', loadInventory);
        })();
    </script>
</body>
</html>
