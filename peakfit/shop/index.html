<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Gear | Peak Fit</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --black: #0A0A0A; --white: #FFFFFF; --accent: #FF3C00; }
        body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--white); margin: 0; }
        nav { height: 80px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: #fff; text-decoration: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 40px 5%; }
        .card { background: #111; padding: 30px; border-radius: 8px; text-align: center; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: contain; background: #fff; border-radius: 4px; margin-bottom: 20px; }
        .btn { display: block; background: #fff; color: #000; padding: 12px; text-decoration: none; font-weight: 700; margin-top: 15px; }
    </style>
</head>
<body>
    <nav><a href="../" class="logo">PEAK FIT</a></nav>
    <div style="padding: 60px 5%;"><h1>The Gear</h1></div>
    <main class="grid">
        <div class="card">
            <img src="https://m.media-amazon.com/images/I/818+AiwCClL.jpg" alt="Neural Foam Roller">
            <h3>Neural Recovery Roller</h3>
            <a href="https://www.amazon.com/s?k=foam+roller&tag=priscadezigns-20" class="btn">Shop Now</a>
        </div>
        <div class="card">
            <img src="https://m.media-amazon.com/images/I/71hXpZ8v4zL.jpg" alt="Performance Bands">
            <h3>High-Resistance Bands</h3>
            <a href="https://www.amazon.com/s?k=resistance+bands&tag=priscadezigns-20" class="btn">Shop Now</a>
        </div>
    </main>
</body>
</html>
