<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Neural Bio-Scanner | Peak Fit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FF3B3F; --bg: #000; --text: #fff; --border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }

        header { position: fixed; top: 0; width: 100%; padding: 25px 8%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 4px; text-decoration: none; color: #fff; }
        
        .hero { min-height: 100vh; padding: 180px 8% 100px; text-align: center; }
        .tag { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 5px; color: var(--accent); font-weight: 900; margin-bottom: 20px; }
        h1 { font-size: clamp(3rem, 10vw, 7rem); font-weight: 900; line-height: 0.9; margin-bottom: 60px; }

        .scanner-box { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 60px; max-width: 900px; margin: 0 auto; position: relative; }
        .scanner-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--accent); animation: scan 3s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .input-group { display: flex; gap: 20px; margin-top: 20px; }
        input { flex: 1; padding: 20px; background: transparent; border: 1px solid var(--border); color: #fff; font-family: inherit; font-size: 1.1rem; }
        .run-btn { padding: 0 40px; background: var(--accent); color: #fff; border: none; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }

        #ai-result { margin-top: 60px; }
        .bio-report { text-align: left; border-top: 1px solid var(--accent); padding-top: 40px; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 30px; }
        .metric-box { padding: 25px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); }
        .m-label { font-size: 0.6rem; text-transform: uppercase; color: #888; margin-bottom: 10px; }
        .m-val { font-size: 1.4rem; font-weight: 900; color: #fff; }

        .acq-btn { display: inline-block; width: 100%; text-align: center; background: #fff; color: #000; text-decoration: none; padding: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; margin-top: 40px; }

        footer { padding: 100px 8% 50px; text-align: center; border-top: 1px solid var(--border); opacity: 0.3; }
    </style>
</head>
<body>
    <header>
        <a href="../" class="logo">PEAK FIT</a>
        <nav><a href="../" style="color:#fff; text-decoration:none; font-weight:700; font-size:0.7rem; text-transform:uppercase; letter-spacing:2px;">Systems</a></nav>
    </header>

    <main class="hero">
        <span class="tag">Neural Bio-Scanner V2.4</span>
        <h1>Protocol Synthesis.</h1>

        <div class="scanner-box">
            <div class="scanner-line"></div>
            <p style="color:#666; margin-bottom:40px; text-transform:uppercase; letter-spacing:3px; font-size:0.8rem;">Define Bio-Goal or Performance Objective</p>
            <div class="input-group">
                <input type="text" id="ai-input" placeholder="e.g. Optimize HRV, Muscle Hypertrophy, Mental Clarity..." autocomplete="off">
                <button class="run-btn" onclick="runScan()">Execute</button>
            </div>
            <div id="ai-result"></div>
        </div>
    </main>

    <footer>© 2026 PEAK FIT // HUMAN PERFORMANCE ARCHIVE</footer>

    <script>
    function runScan() {
        const input = document.getElementById('ai-input').value.trim();
        const res = document.getElementById('ai-result');
        if(!input) return;

        res.innerHTML = '<p style="color:var(--accent); font-weight:900; letter-spacing:8px; margin-top:40px;">ANALYZING BIOMETRIC DATASETS...</p>';

        setTimeout(() => {
            const query = input.toLowerCase(); const tag = "priscadezigns-20";
            let protocol = "General Optimization"; let intensity = "Balanced";
            
            if(query.includes('hrv') || query.includes('recovery')) { protocol = "Parasympathetic Reset"; intensity = "High Focus"; }
            if(query.includes('muscle') || query.includes('strength')) { protocol = "Hypertrophic Axis"; intensity = "Peak Performance"; }

            res.innerHTML = `
                <div class="bio-report">
                    <span class="tag" style="font-size:0.6rem;">Scan Complete // Protocol: ${protocol}</span>
                    <h2 style="font-size:2.5rem; margin:10px 0 30px;">System Readout</h2>
                    
                    <div class="metric-grid">
                        <div class="metric-box"><div class="m-label">Metabolic Delta</div><div class="m-val">+14.2%</div></div>
                        <div class="metric-box"><div class="m-label">Intensity Core</div><div class="m-val">${intensity}</div></div>
                        <div class="metric-box"><div class="m-label">Cellular Sync</div><div class="m-val">Optimal</div></div>
                    </div>

                    <p style="color:#888; font-size:0.9rem;">Intelligence confirms the proposed protocol as the high-fidelity path for "${input}". Bio-sync is recommended at 06:00 and 21:00 cycles.</p>

                    <a href="https://www.amazon.com/s?k=${encodeURIComponent(input)}+supplements&tag=${tag}" target="_blank" class="acq-btn">Acquire Protocol Bio-Fuels →</a>
                </div>
            `;
        }, 2000);
    }
    </script>
</body>
</html>
