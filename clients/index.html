<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prisca Dezigns | Clients</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap">
    <style>
        :root { --ivory: #FFFFF0; --dark: #1a1a1a; --gold: #D4AF37; }
        body { background: var(--ivory); color: var(--dark); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        header { padding: 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin: 0; }
        .back-btn { padding: 12px 24px; background: var(--dark); color: white; text-decoration: none; border-radius: 30px; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .back-btn:hover { background: var(--gold); }
        main { max-width: 1000px; margin: 60px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .client-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); text-align: center; }
        .client-card h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 15px; }
        .client-card p { color: #666; font-size: 0.9rem; line-height: 1.5; margin-bottom: 25px; }
        .view-btn { display: inline-block; padding: 10px 20px; border: 1px solid var(--dark); color: var(--dark); text-decoration: none; border-radius: 5px; font-size: 0.8rem; font-weight: 600; transition: 0.3s; }
        .view-btn:hover { background: var(--dark); color: white; }
    </style>
</head>
<body>
    <header>
        <h1>Our Clients</h1>
        <a href="../index.html" class="back-btn">BACK TO GLOBE</a>
    </header>
    <main>
        <div class="client-card">
            <h2>Seamrite Designs</h2>
            <p>Bespoke tailoring and editorial fashion node. The first client in the Prisca Dezigns ecosystem.</p>
            <a href="../seamritedesigns/" class="view-btn">VIEW CASE STUDY</a>
        </div>
    </main>
</body>
</html>
