<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#B06AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B35D4;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer Ring -->
  <circle cx="200" cy="200" r="180" fill="url(#grad)" stroke="white" stroke-width="8" filter="url(#glow)"/>
  <circle cx="200" cy="200" r="160" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="10 5"/>
  <!-- Neural Mark -->
  <path d="M200 100 L280 180 L200 260 L120 180 Z" fill="white" opacity="0.9"/>
  <path d="M200 130 L250 180 L200 230 L150 180 Z" fill="#7B35D4"/>
  <!-- Text -->
  <text x="200" y="320" font-family="'Inter', sans-serif" font-weight="900" font-size="42" text-anchor="middle" fill="white" style="letter-spacing:2px">NEURAL</text>
  <text x="200" y="350" font-family="'Inter', sans-serif" font-weight="600" font-size="18" text-anchor="middle" fill="rgba(255,255,255,0.7)" style="letter-spacing:4px">$NRL</text>
</svg>
