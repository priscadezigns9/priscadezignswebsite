<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0077B5"/>
      <stop offset="100%" stop-color="#00A8E6"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0077B5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00A8E6" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#020D18"/>

  <!-- Subtle ring -->
  <circle cx="100" cy="100" r="87" fill="none" stroke="#0077B5" stroke-width="1" opacity="0.2"/>

  <!-- Left person silhouette -->
  <!-- Head -->
  <circle cx="74" cy="75" r="12" fill="url(#lg)"/>
  <!-- Body -->
  <path d="M58 115 Q58 95 74 95 Q90 95 90 115" fill="url(#lg)"/>

  <!-- Right person silhouette -->
  <!-- Head -->
  <circle cx="126" cy="75" r="12" fill="url(#lg)"/>
  <!-- Body -->
  <path d="M110 115 Q110 95 126 95 Q142 95 142 115" fill="url(#lg)"/>

  <!-- Connection line / link between them -->
  <path d="M90 85 Q100 78 110 85" fill="none" stroke="url(#lg)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Dot at center of connection -->
  <circle cx="100" cy="80" r="4" fill="#00A8E6"/>

  <!-- Wordmark -->
  <text x="100" y="143" text-anchor="middle"
        font-family="'Arial',sans-serif"
        font-size="13" font-weight="700"
        fill="#0077B5" letter-spacing="2">LINKUP</text>
</svg>
