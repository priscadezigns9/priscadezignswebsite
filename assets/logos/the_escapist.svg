<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Deep ocean navy — travel/luxury -->
  <rect width="400" height="400" fill="#09111F"/>
  <!-- Compass rose icon -->
  <circle cx="200" cy="155" r="50" fill="none" stroke="#6BB8D4" stroke-width="1.5" opacity="0.6"/>
  <!-- North pointer (filled, teal) -->
  <polygon points="200,108 207,148 193,148" fill="#6BB8D4"/>
  <!-- South pointer (outline) -->
  <polygon points="200,202 207,162 193,162" fill="#6BB8D4" opacity="0.35"/>
  <!-- East pointer -->
  <polygon points="247,155 207,148 207,162" fill="#6BB8D4" opacity="0.5"/>
  <!-- West pointer -->
  <polygon points="153,155 193,148 193,162" fill="#6BB8D4" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="200" cy="155" r="4" fill="#6BB8D4"/>
  <!-- N label -->
  <text x="200" y="105" font-family="Arial, sans-serif" font-size="11" fill="#6BB8D4" text-anchor="middle" letter-spacing="1">N</text>
  <!-- Brand name -->
  <text x="200" y="242" font-family="Georgia, serif" font-size="13" fill="#6BB8D4" text-anchor="middle" letter-spacing="6" opacity="0.8">THE</text>
  <text x="200" y="266" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#6BB8D4" text-anchor="middle" letter-spacing="4">ESCAPIST</text>
  <line x1="128" y1="280" x2="272" y2="280" stroke="#6BB8D4" stroke-width="0.8" opacity="0.4"/>
  <text x="200" y="298" font-family="Arial, sans-serif" font-size="10" fill="#6BB8D4" text-anchor="middle" letter-spacing="3" opacity="0.6">LUXURY TRAVEL DEALS</text>
</svg>
