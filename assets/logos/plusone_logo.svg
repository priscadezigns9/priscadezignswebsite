<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C0512"/>
      <stop offset="100%" stop-color="#2A0A1C"/>
    </linearGradient>
  </defs>

  <!-- Deep wine/burgundy background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Two bold minimal person silhouettes — icon language like iOS contacts -->
  <!-- Left figure -->
  <!-- Head -->
  <circle cx="155" cy="128" r="34" fill="#7A1840"/>
  <!-- Shoulders / torso -->
  <path d="M 80 248 Q 80 180 155 180 Q 195 180 200 210 L 200 252 L 80 252 Z" fill="#7A1840"/>

  <!-- Right figure — overlapping slightly, slightly lighter -->
  <!-- Head -->
  <circle cx="242" cy="128" r="34" fill="#A02458"/>
  <!-- Shoulders / torso -->
  <path d="M 200 210 Q 200 180 245 180 Q 320 180 320 248 L 320 252 L 200 252 Z" fill="#A02458"/>

  <!-- Overlap line — subtle shadow between them showing they're two people -->
  <line x1="200" y1="162" x2="200" y2="252" stroke="#1C0512" stroke-width="3" opacity="0.6"/>

  <!-- "+1" badge — strong, top-right, its own element -->
  <circle cx="290" cy="82" r="34" fill="#8B1A4A"/>
  <circle cx="290" cy="82" r="34" fill="none" stroke="#F0C0D8" stroke-width="1.5" opacity="0.4"/>
  <text x="290" y="92" font-family="'Arial Black', Arial, sans-serif" font-size="26" font-weight="900" fill="#F5D0E0" text-anchor="middle">+1</text>

  <!-- Subtle glow -->
  <ellipse cx="200" cy="190" rx="130" ry="70" fill="#8B1A4A" opacity="0.06"/>

  <!-- Brand name -->
  <text x="200" y="310" font-family="'Arial Black', Arial, sans-serif" font-size="46" font-weight="900" fill="#EAC8D8" text-anchor="middle" letter-spacing="2">PlusOne</text>

  <!-- Tagline -->
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="11" fill="#7A1840" text-anchor="middle" letter-spacing="3.5" opacity="0.9">NEVER SHOW UP ALONE</text>

  <line x1="110" y1="355" x2="290" y2="355" stroke="#7A1840" stroke-width="0.8" opacity="0.4"/>
</svg>
