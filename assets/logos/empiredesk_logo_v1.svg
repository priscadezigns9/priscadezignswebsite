<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3D1A70" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0A0510" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B06AFF"/>
      <stop offset="100%" stop-color="#7B35D4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  
  <!-- Icon: Abstract E formed by dashboard grid lines -->
  <!-- Main frame / command center shape -->
  <rect x="108" y="88" width="184" height="148" rx="12" fill="none" stroke="url(#iconGrad)" stroke-width="3"/>
  
  <!-- Dashboard grid lines inside frame -->
  <!-- Horizontal dividers -->
  <line x1="108" y1="130" x2="292" y2="130" stroke="#7B35D4" stroke-width="1.5" opacity="0.7"/>
  <line x1="108" y1="172" x2="292" y2="172" stroke="#7B35D4" stroke-width="1.5" opacity="0.7"/>
  <line x1="108" y1="214" x2="292" y2="214" stroke="#7B35D4" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Vertical divider -->
  <line x1="188" y1="88" x2="188" y2="236" stroke="#7B35D4" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Widget blocks (filled cells to form "E" shape) -->
  <!-- Top row - full width -->
  <rect x="114" y="94" width="68" height="30" rx="5" fill="#7B35D4" opacity="0.9"/>
  <rect x="188" y="94" width="98" height="30" rx="5" fill="#7B35D4" opacity="0.9"/>
  
  <!-- Middle row - left + middle only (E horizontal bar) -->
  <rect x="114" y="136" width="68" height="30" rx="5" fill="#B06AFF" opacity="0.85"/>
  <rect x="188" y="136" width="70" height="30" rx="5" fill="#B06AFF" opacity="0.85"/>
  
  <!-- Third row - left only -->
  <rect x="114" y="178" width="68" height="30" rx="5" fill="#7B35D4" opacity="0.7"/>
  <rect x="188" y="178" width="40" height="30" rx="5" fill="#7B35D4" opacity="0.4"/>
  
  <!-- Bottom row - full width (E base) -->
  <rect x="114" y="208" width="68" height="22" rx="5" fill="#7B35D4" opacity="0.9"/>
  <rect x="188" y="208" width="98" height="22" rx="5" fill="#7B35D4" opacity="0.9"/>
  
  <!-- Accent dots -->
  <circle cx="200" cy="262" r="3" fill="#B06AFF" opacity="0.8"/>
  <circle cx="212" cy="262" r="3" fill="#7B35D4" opacity="0.6"/>
  <circle cx="188" cy="262" r="3" fill="#7B35D4" opacity="0.6"/>
  
  <!-- Brand text -->
  <text x="200" y="308" font-family="'Arial Black', 'Arial', sans-serif" font-size="32" font-weight="900" fill="#F0EEFF" text-anchor="middle" letter-spacing="1">EmpireDesk</text>
  
  <!-- Tagline -->
  <text x="200" y="334" font-family="'Arial', sans-serif" font-size="11" fill="#B06AFF" text-anchor="middle" letter-spacing="3" opacity="0.8">COMMAND YOUR EMPIRE</text>
  
  <!-- Bottom decorative line -->
  <line x1="100" y1="346" x2="300" y2="346" stroke="#7B35D4" stroke-width="0.8" opacity="0.5"/>
</svg>
