  <line x1="100" y1="100" x2="100" y2="58" stroke="#E5571A" stroke-width="1" opacity="0.35"/>
  <line x1="100" y1="100" x2="138" y2="79" stroke="#E5571A" stroke-width="1" opacity="0.35"/>
  <line x1="100" y1="100" x2="138" y2="121" stroke="#E5571A" stroke-width="1" opacity="0.35"/>
