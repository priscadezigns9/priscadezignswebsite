  <circle cx="138" cy="79" r="5.5" fill="url(#pyg)" opacity="0.75"/>
  <circle cx="138" cy="121" r="5.5" fill="url(#pyg)" opacity="0.75"/>
  <circle cx="100" cy="142" r="7" fill="url(#pyg)" opacity="0.9"/>
  <circle cx="62" cy="121" r="5.5" fill="url(#pyg)" opacity="0.75"/>
