<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="pyg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5571A"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="#0D0D0D"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#E5571A" stroke-width="1" opacity="0.2"/>
  <!-- Network hexagon nodes -->
