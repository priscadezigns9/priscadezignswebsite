  <line x1="100" y1="100" x2="62" y2="79" stroke="#E5571A" stroke-width="1" opacity="0.35"/>
  <!-- Wordmark -->
  <text x="100" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="10.5" font-weight="800" fill="#F5A623" letter-spacing="2">D' PANYARD</text>
