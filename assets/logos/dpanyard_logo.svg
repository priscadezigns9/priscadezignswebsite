  <line x1="100" y1="58" x2="138" y2="79" stroke="#F5A623" stroke-width="1.5" opacity="0.4"/>
  <line x1="138" y1="79" x2="138" y2="121" stroke="#F5A623" stroke-width="1.5" opacity="0.4"/>
  <line x1="138" y1="121" x2="100" y2="142" stroke="#F5A623" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="142" x2="62" y2="121" stroke="#F5A623" stroke-width="1.5" opacity="0.4"/>
  <line x1="62" y1="121" x2="62" y2="79" stroke="#F5A623" stroke-width="1.5" opacity="0.4"/>
  <line x1="62" y1="79" x2="100" y2="58" stroke="#F5A623" stroke-width="1.5" opacity="0.4"/>
