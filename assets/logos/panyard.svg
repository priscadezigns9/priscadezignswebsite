<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#FFC85A"/>
    </linearGradient>
    <radialGradient id="prg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#110A00"/>

  <!-- Subtle ring -->
  <circle cx="100" cy="100" r="87" fill="none" stroke="#F5A623" stroke-width="1" opacity="0.2"/>

  <!-- Steel pan — outer rim -->
  <circle cx="100" cy="97" r="46" fill="none" stroke="url(#pg)" stroke-width="3.5"/>

  <!-- Steel pan — inner glow fill -->
  <circle cx="100" cy="97" r="43" fill="url(#prg)"/>

  <!-- Steel pan — inner rim -->
  <circle cx="100" cy="97" r="30" fill="none" stroke="url(#pg)" stroke-width="1.5" opacity="0.5"/>

  <!-- Pan divider lines (top-down view of a steel pan) -->
  <!-- These represent the note sections of a steel drum -->
  <!-- Horizontal divider -->
  <line x1="54" y1="97" x2="146" y2="97" stroke="#F5A623" stroke-width="1.2" opacity="0.5"/>
  <!-- Vertical divider -->
  <line x1="100" y1="51" x2="100" y2="143" stroke="#F5A623" stroke-width="1.2" opacity="0.5"/>
  <!-- Diagonal dividers -->
  <line x1="67" y1="64" x2="133" y2="130" stroke="#F5A623" stroke-width="1.2" opacity="0.5"/>
  <line x1="133" y1="64" x2="67" y2="130" stroke="#F5A623" stroke-width="1.2" opacity="0.5"/>

  <!-- Note bumps (ellipses around the pan sections) -->
  <ellipse cx="100" cy="68" rx="10" ry="7" fill="none" stroke="url(#pg)" stroke-width="1.8"/>
  <ellipse cx="124" cy="82" rx="10" ry="7" fill="none" stroke="url(#pg)" stroke-width="1.8" transform="rotate(60 124 82)"/>
  <ellipse cx="124" cy="112" rx="10" ry="7" fill="none" stroke="url(#pg)" stroke-width="1.8" transform="rotate(120 124 112)"/>
  <ellipse cx="100" cy="126" rx="10" ry="7" fill="none" stroke="url(#pg)" stroke-width="1.8"/>
  <ellipse cx="76" cy="112" rx="10" ry="7" fill="none" stroke="url(#pg)" stroke-width="1.8" transform="rotate(60 76 112)"/>
  <ellipse cx="76" cy="82" rx="10" ry="7" fill="none" stroke="url(#pg)" stroke-width="1.8" transform="rotate(120 76 82)"/>

  <!-- Center note -->
  <circle cx="100" cy="97" r="8" fill="none" stroke="url(#pg)" stroke-width="1.8"/>
  <circle cx="100" cy="97" r="3" fill="#F5A623"/>

  <!-- Wordmark -->
  <text x="100" y="161" text-anchor="middle"
        font-family="'Arial',sans-serif"
        font-size="12" font-weight="700"
        fill="#F5A623" letter-spacing="2.5">PANYARD</text>
</svg>
