<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Matte dark background — flat, no gradients -->
  <rect width="400" height="400" fill="#130D20"/>

  <!-- Main dashboard frame — flat matte purple stroke -->
  <rect x="108" y="88" width="184" height="148" rx="12" fill="none" stroke="#5C2A9E" stroke-width="3"/>

  <!-- Dashboard grid lines -->
  <line x1="108" y1="130" x2="292" y2="130" stroke="#5C2A9E" stroke-width="1.5" opacity="0.6"/>
  <line x1="108" y1="172" x2="292" y2="172" stroke="#5C2A9E" stroke-width="1.5" opacity="0.6"/>
  <line x1="108" y1="214" x2="292" y2="214" stroke="#5C2A9E" stroke-width="1.5" opacity="0.6"/>
  <line x1="188" y1="88" x2="188" y2="236" stroke="#5C2A9E" stroke-width="1.5" opacity="0.6"/>

  <!-- Widget blocks — flat matte fill, no shine -->
  <rect x="114" y="94" width="68" height="30" rx="5" fill="#5C2A9E"/>
  <rect x="188" y="94" width="98" height="30" rx="5" fill="#5C2A9E"/>
  <rect x="114" y="136" width="68" height="30" rx="5" fill="#7040B8"/>
  <rect x="188" y="136" width="70" height="30" rx="5" fill="#7040B8"/>
  <rect x="114" y="178" width="68" height="30" rx="5" fill="#5C2A9E" opacity="0.8"/>
  <rect x="188" y="178" width="40" height="30" rx="5" fill="#5C2A9E" opacity="0.4"/>
  <rect x="114" y="208" width="68" height="22" rx="5" fill="#5C2A9E"/>
  <rect x="188" y="208" width="98" height="22" rx="5" fill="#5C2A9E"/>

  <!-- Accent dots -->
  <circle cx="200" cy="262" r="3" fill="#7040B8" opacity="0.7"/>
  <circle cx="212" cy="262" r="3" fill="#5C2A9E" opacity="0.5"/>
  <circle cx="188" cy="262" r="3" fill="#5C2A9E" opacity="0.5"/>

  <!-- Brand text — matte off-white -->
  <text x="200" y="308" font-family="'Arial Black', 'Arial', sans-serif" font-size="32" font-weight="900" fill="#D8D0E8" text-anchor="middle" letter-spacing="1">EmpireDesk</text>

  <!-- Tagline — muted -->
  <text x="200" y="334" font-family="'Arial', sans-serif" font-size="11" fill="#5C2A9E" text-anchor="middle" letter-spacing="3" opacity="0.9">COMMAND YOUR EMPIRE</text>

  <line x1="100" y1="346" x2="300" y2="346" stroke="#5C2A9E" stroke-width="0.8" opacity="0.5"/>
</svg>
