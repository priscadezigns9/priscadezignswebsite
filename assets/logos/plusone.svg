<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="plg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E535AB"/>
      <stop offset="100%" stop-color="#FF6FCF"/>
    </linearGradient>
    <radialGradient id="plrg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E535AB" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#E535AB" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#110009"/>

  <!-- Subtle ring -->
  <circle cx="100" cy="100" r="87" fill="none" stroke="#E535AB" stroke-width="1" opacity="0.2"/>

  <!-- Subtle glow behind icon -->
  <circle cx="100" cy="93" r="42" fill="url(#plrg)"/>

  <!-- Plus sign — vertical bar -->
  <rect x="89" y="60" width="22" height="66" rx="11" fill="url(#plg)" filter="url(#glow)"/>
  <!-- Plus sign — horizontal bar -->
  <rect x="67" y="82" width="66" height="22" rx="11" fill="url(#plg)" filter="url(#glow)"/>

  <!-- Heart shape layered over the center intersection -->
  <!-- Heart path centered at 100,93 -->
  <path d="M100 115 C84 103 70 96 70 84 C70 74 78 68 86 70 C91 71 96 76 100 80 C104 76 109 71 114 70 C122 68 130 74 130 84 C130 96 116 103 100 115Z"
        fill="#110009" opacity="0.9"/>
  <path d="M100 113 C85 102 72 95 72 84 C72 75 79 70 87 72 C92 73 97 78 100 82 C103 78 108 73 113 72 C121 70 128 75 128 84 C128 95 115 102 100 113Z"
        fill="url(#plg)" opacity="0.85"/>

  <!-- +1 label inside heart -->
  <text x="100" y="93" text-anchor="middle"
        font-family="'Arial',sans-serif"
        font-size="15" font-weight="900"
        fill="white" opacity="0.95">+1</text>

  <!-- Wordmark -->
  <text x="100" y="150" text-anchor="middle"
        font-family="'Arial',sans-serif"
        font-size="13" font-weight="700"
        fill="#E535AB" letter-spacing="2">PLUSONE</text>
</svg>
