<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1000"/>
      <stop offset="100%" stop-color="#261800"/>
    </linearGradient>
    <linearGradient id="panMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A2A00"/>
      <stop offset="100%" stop-color="#1E1600"/>
    </linearGradient>
  </defs>

  <!-- Warm dark amber/saffron background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Steel pan SIDE VIEW — much more recognizable and distinctive -->
  <!-- Pan bowl (the deep concave drum shape, seen from side) -->
  <!-- Outer drum cylinder -->
  <rect x="90" y="140" width="220" height="100" rx="8" fill="url(#panMetal)" stroke="#C8A84B" stroke-width="2.5"/>

  <!-- Pan skirt (the lower cylindrical body — longer than tenor) -->
  <rect x="105" y="200" width="190" height="52" rx="4" fill="#1A1200" stroke="#C8A84B" stroke-width="1.5" opacity="0.8"/>

  <!-- Pan playing surface — the concave top, shown as a slightly inset ellipse -->
  <ellipse cx="200" cy="142" rx="108" ry="22" fill="#2E2200" stroke="#C8A84B" stroke-width="2"/>
  <!-- Inner surface highlight — showing the curved dish -->
  <ellipse cx="200" cy="142" rx="88" ry="16" fill="#1A1200" stroke="#C8A84B" stroke-width="1" opacity="0.5"/>

  <!-- Note sections on playing surface — carved domes, seen as arcs -->
  <!-- Inner note ring -->
  <ellipse cx="200" cy="142" rx="44" ry="9" fill="none" stroke="#C8A84B" stroke-width="1.5" opacity="0.55"/>
  <!-- Radial lines dividing note sections on face -->
  <line x1="200" y1="126" x2="200" y2="158" stroke="#C8A84B" stroke-width="1" opacity="0.4"/>
  <line x1="157" y1="131" x2="243" y2="153" stroke="#C8A84B" stroke-width="1" opacity="0.4"/>
  <line x1="157" y1="153" x2="243" y2="131" stroke="#C8A84B" stroke-width="1" opacity="0.4"/>

  <!-- Horizontal bands on skirt (barrel rings) -->
  <line x1="105" y1="218" x2="295" y2="218" stroke="#C8A84B" stroke-width="1" opacity="0.35"/>
  <line x1="105" y1="232" x2="295" y2="232" stroke="#C8A84B" stroke-width="1" opacity="0.25"/>

  <!-- Pan stick — right side, angled -->
  <line x1="292" y1="120" x2="256" y2="155" stroke="#8B6820" stroke-width="7" stroke-linecap="round"/>
  <!-- Rubber tip on stick -->
  <circle cx="292" cy="118" r="7" fill="#C8A84B" opacity="0.8"/>

  <!-- Second stick — left side -->
  <line x1="108" y1="120" x2="144" y2="155" stroke="#8B6820" stroke-width="7" stroke-linecap="round"/>
  <circle cx="108" cy="118" r="7" fill="#C8A84B" opacity="0.8"/>

  <!-- Musical note — subtle top right -->
  <text x="308" y="108" font-family="Arial, sans-serif" font-size="30" fill="#C8A84B" opacity="0.3">♪</text>

  <!-- Brand name -->
  <text x="200" y="315" font-family="'Arial Black', Arial, sans-serif" font-size="40" font-weight="900" fill="#E8C060" text-anchor="middle" letter-spacing="5">PANYARD</text>

  <!-- Tagline -->
  <text x="200" y="344" font-family="Arial, sans-serif" font-size="11" fill="#C8A84B" text-anchor="middle" letter-spacing="3" opacity="0.7">COOK CARIBBEAN. SPEND SMART.</text>

  <line x1="110" y1="358" x2="290" y2="358" stroke="#C8A84B" stroke-width="0.8" opacity="0.3"/>
</svg>
