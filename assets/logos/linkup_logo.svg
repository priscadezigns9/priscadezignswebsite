<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A0A"/>
      <stop offset="100%" stop-color="#2D0808"/>
    </linearGradient>
  </defs>

  <!-- Rich dark red background with subtle warmth -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Bold interlocking chain links — geometric, thick, confident -->
  <!-- Left link ring -->
  <rect x="72" y="148" width="136" height="72" rx="36" fill="none" stroke="#E8232A" stroke-width="20"/>
  <!-- Right link ring — overlapping -->
  <rect x="192" y="148" width="136" height="72" rx="36" fill="none" stroke="#E8232A" stroke-width="20"/>

  <!-- The overlap mask — covers part of right ring to create interlock illusion -->
  <rect x="192" y="156" width="30" height="56" fill="#200A0A"/>

  <!-- Subtle glow behind icon -->
  <ellipse cx="200" cy="184" rx="110" ry="55" fill="#E8232A" opacity="0.07"/>

  <!-- Brand name -->
  <text x="200" y="298" font-family="'Arial Black', Arial, sans-serif" font-size="52" font-weight="900" fill="#F5ECEC" text-anchor="middle" letter-spacing="1">LinkUp</text>

  <!-- Tagline -->
  <text x="200" y="328" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#E8232A" text-anchor="middle" letter-spacing="3.5" opacity="0.8">CONNECT. DISCOVER. SHARE.</text>

  <!-- Thin rule -->
  <line x1="110" y1="342" x2="290" y2="342" stroke="#E8232A" stroke-width="0.8" opacity="0.3"/>
</svg>
