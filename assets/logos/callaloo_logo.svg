<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8F0"/>
      <stop offset="100%" stop-color="#FFE8CC"/>
    </linearGradient>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E87722"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="url(#bgg)"/>

  <!-- LEAF — centred, large -->
  <!-- Main leaf body -->
  <path d="M88,22 C72,22 60,36 60,56 C60,78 74,100 92,108 C96,110 100,108 100,104 C100,88 108,72 116,60 C120,52 120,38 112,30 C107,24 98,22 88,22 Z"
        fill="url(#lg)" opacity="0.95"/>
  <!-- Second lobe -->
  <path d="M94,28 C94,28 122,32 124,58 C126,76 114,104 102,110 C98,112 94,110 94,106 C94,90 84,74 74,62 C70,54 70,38 78,30 Z"
        fill="url(#lg)" opacity="0.5"/>
  <!-- Centre vein -->
  <path d="M91,106 Q96,80 100,48" stroke="#1A0D00" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.2"/>
  <!-- Side veins -->
  <path d="M91,88 Q82,82 74,80" stroke="#1A0D00" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.15"/>
  <path d="M94,74 Q86,68 78,66" stroke="#1A0D00" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.15"/>
  <!-- Curled stem -->
  <path d="M91,108 Q86,124 78,130 Q70,136 74,122" stroke="url(#lg)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark below leaf -->
  <text x="100" y="164"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-weight="900"
        font-size="26"
        fill="#1A0D00"
        letter-spacing="-0.5">Callaloo</text>
  <text x="100" y="180"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-weight="700"
        font-size="8"
        fill="#E87722"
        letter-spacing="2.5">FOOD &amp; RECIPES</text>
</svg>
