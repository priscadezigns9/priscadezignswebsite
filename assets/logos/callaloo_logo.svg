<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="clg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#FFC85A"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="#110A00"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#F5A623" stroke-width="1" opacity="0.18"/>
  <!-- Pot body -->
  <path d="M62,112 Q60,148 100,152 Q140,148 138,112 Z" fill="url(#clg)" opacity="0.85"/>
  <!-- Pot rim/lid -->
  <ellipse cx="100" cy="112" rx="38" ry="10" fill="#F5A623" opacity="0.7"/>
  <ellipse cx="100" cy="110" rx="32" ry="7" fill="#0D0500" opacity="0.4"/>
  <!-- Lid knob -->
  <ellipse cx="100" cy="103" rx="8" ry="4" fill="url(#clg)"/>
  <!-- Handles -->
  <path d="M62,118 Q50,118 50,126 Q50,134 62,134" fill="none" stroke="url(#clg)" stroke-width="3" stroke-linecap="round"/>
  <path d="M138,118 Q150,118 150,126 Q150,134 138,134" fill="none" stroke="url(#clg)" stroke-width="3" stroke-linecap="round"/>
  <!-- Steam wisps (3 curling lines) -->
  <path d="M82,100 Q77,90 82,82 Q87,74 82,64" fill="none" stroke="url(#clg)" stroke-width="2.2" stroke-linecap="round" opacity="0.75"/>
  <path d="M100,98 Q95,88 100,80 Q105,72 100,61" fill="none" stroke="url(#clg)" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>
  <path d="M118,100 Q113,90 118,82 Q123,74 118,64" fill="none" stroke="url(#clg)" stroke-width="2.2" stroke-linecap="round" opacity="0.75"/>
  <!-- Green leaf garnish on top -->
  <ellipse cx="92" cy="113" rx="9" ry="4.5" fill="#1A5C1A" opacity="0.95" transform="rotate(-25 92 113)"/>
  <ellipse cx="108" cy="115" rx="11" ry="4" fill="#0F4A0F" opacity="0.9" transform="rotate(20 108 115)"/>
  <!-- Wordmark -->
  <text x="100" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="#F5A623" letter-spacing="2">CALLALOO</text>
</svg>