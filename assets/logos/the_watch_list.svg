<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Dark charcoal — luxury watch feel -->
  <rect width="400" height="400" fill="#131210"/>
  <!-- Watch face icon — clean circle with hour marks -->
  <circle cx="200" cy="158" r="52" fill="none" stroke="#C8A84B" stroke-width="2"/>
  <circle cx="200" cy="158" r="44" fill="none" stroke="#C8A84B" stroke-width="0.8" opacity="0.4"/>
  <!-- Hour marks at 12, 3, 6, 9 -->
  <line x1="200" y1="110" x2="200" y2="118" stroke="#C8A84B" stroke-width="2.5"/>
  <line x1="248" y1="158" x2="240" y2="158" stroke="#C8A84B" stroke-width="2.5"/>
  <line x1="200" y1="206" x2="200" y2="198" stroke="#C8A84B" stroke-width="2.5"/>
  <line x1="152" y1="158" x2="160" y2="158" stroke="#C8A84B" stroke-width="2.5"/>
  <!-- Watch hands -->
  <line x1="200" y1="158" x2="200" y2="130" stroke="#C8A84B" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="158" x2="224" y2="168" stroke="#C8A84B" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="200" cy="158" r="3" fill="#C8A84B"/>
  <!-- Brand name -->
  <text x="200" y="242" font-family="Georgia, serif" font-size="13" fill="#C8A84B" text-anchor="middle" letter-spacing="6" opacity="0.8">THE</text>
  <text x="200" y="265" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#C8A84B" text-anchor="middle" letter-spacing="4">WATCHLIST</text>
  <line x1="128" y1="278" x2="272" y2="278" stroke="#C8A84B" stroke-width="0.8" opacity="0.4"/>
  <text x="200" y="296" font-family="Arial, sans-serif" font-size="10" fill="#C8A84B" text-anchor="middle" letter-spacing="3" opacity="0.6">LUXURY TIMEPIECES</text>
</svg>
