<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1FAB89"/>
      <stop offset="100%" stop-color="#4FDAB4"/>
    </linearGradient>
    <radialGradient id="drg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1FAB89" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1FAB89" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#020F0B"/>

  <!-- Subtle ring -->
  <circle cx="100" cy="100" r="87" fill="none" stroke="#1FAB89" stroke-width="1" opacity="0.2"/>

  <!-- Coin circle -->
  <circle cx="100" cy="96" r="40" fill="url(#drg)" stroke="url(#dg)" stroke-width="3"/>

  <!-- Motion lines (speed lines to the left — coin moving right) -->
  <line x1="44" y1="88" x2="57" y2="88" stroke="#1FAB89" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="40" y1="96" x2="56" y2="96" stroke="#1FAB89" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="44" y1="104" x2="57" y2="104" stroke="#1FAB89" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="49" y1="80" x2="59" y2="80" stroke="#1FAB89" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="49" y1="112" x2="59" y2="112" stroke="#1FAB89" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Dollar sign inside coin -->
  <!-- Vertical bar of $ -->
  <line x1="100" y1="66" x2="100" y2="76" stroke="url(#dg)" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="116" x2="100" y2="126" stroke="url(#dg)" stroke-width="3" stroke-linecap="round"/>

  <!-- S curve of dollar sign -->
  <path d="M112 76 Q112 69 100 69 Q88 69 88 78 Q88 87 100 91 Q112 95 112 104 Q112 113 100 113 Q88 113 88 106"
        fill="none" stroke="url(#dg)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="100" y="153" text-anchor="middle"
        font-family="'Arial',sans-serif"
        font-size="13" font-weight="700"
        fill="#1FAB89" letter-spacing="3">DOLLO</text>
</svg>
