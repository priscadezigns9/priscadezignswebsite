<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050D1F"/>
      <stop offset="100%" stop-color="#0A1830"/>
    </linearGradient>
    <linearGradient id="coinFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1400"/>
      <stop offset="100%" stop-color="#2A1E04"/>
    </linearGradient>
  </defs>

  <!-- Deep midnight blue background — premium fintech feel -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Coin body -->
  <circle cx="200" cy="175" r="105" fill="url(#coinFill)"/>
  <!-- Coin outer ring -->
  <circle cx="200" cy="175" r="105" fill="none" stroke="#C8A84B" stroke-width="3.5"/>
  <!-- Coin inner ring -->
  <circle cx="200" cy="175" r="90" fill="none" stroke="#C8A84B" stroke-width="1" opacity="0.35"/>

  <!-- Dollar sign — large, flat, centered, owns the space -->
  <text x="200" y="213" font-family="'Arial Black', Georgia, serif" font-size="110" font-weight="900" fill="#C8A84B" text-anchor="middle" opacity="0.92">$</text>

  <!-- Upward arrow — top right, punchy, integrated -->
  <!-- Arrow shaft -->
  <line x1="280" y1="108" x2="280" y2="80" stroke="#C8A84B" stroke-width="4" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polygon points="270,92 280,70 290,92" fill="#C8A84B"/>

  <!-- Brand name -->
  <text x="200" y="325" font-family="'Arial Black', Arial, sans-serif" font-size="58" font-weight="900" fill="#E8D898" text-anchor="middle" letter-spacing="5">Dollo</text>

  <!-- Tagline -->
  <text x="200" y="354" font-family="Arial, sans-serif" font-size="11" fill="#C8A84B" text-anchor="middle" letter-spacing="3.5" opacity="0.7">SPEND SMART. SAVE SMARTER.</text>

  <line x1="110" y1="368" x2="290" y2="368" stroke="#C8A84B" stroke-width="0.8" opacity="0.25"/>
</svg>
