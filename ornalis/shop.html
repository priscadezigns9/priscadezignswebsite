    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0A0A0A; --text: #F5F5F5; --muted: #999999; --gold: #D4AF37; --border: rgba(255,255,255,0.05); --btn-text: #000000; --header-bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }
        header { padding: 25px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--header-bg); position: sticky; top: 0; z-index: 100; }
        .logo img { height: 50px; width: auto; object-fit: contain; mix-blend-mode: multiply; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text); transition: 0.3s; }
        nav a:hover { color: var(--gold); }
        .hero { padding: 80px 6% 20px; text-align: center; max-width: 900px; margin: 0 auto; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3.2rem; margin-bottom: 25px; line-height: 1.2; }
        .hero p { color: var(--muted); font-size: 1.15rem; margin-bottom: 40px; }
        .btn { display: inline-block; background: var(--gold); color: var(--btn-text); padding: 14px 40px; text-decoration: none; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; border-radius: 2px; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; padding: 60px 6%; }
        .card { border: 1px solid var(--border); padding: 30px; transition: 0.4s; background: var(--header-bg); display: flex; flex-direction: column; height: 100%; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .p-img { aspect-ratio: 1/1; margin-bottom: 25px; overflow: hidden; }
        .p-img img { width: 100%; height: 100%; object-fit: contain; background: #fff; }
        .p-info { flex-grow: 1; display: flex; flex-direction: column; }
        .p-info h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 15px; min-height: 3em; }
        .p-info .price { color: var(--gold); font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 25px; }
        .p-info .btn { margin-top: auto; }

        footer { padding: 80px 6%; text-align: center; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); letter-spacing: 2px; background: var(--header-bg); }
        footer img { height: 50px; margin-bottom: 20px; mix-blend-mode: multiply; }
    </style>
</head>
