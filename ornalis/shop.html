<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shop | ORNALIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        
        :root {
            --bg: #0A0A0A; --text: #F5F5F5; --muted: #777777; --gold: #D4AF37; --border: rgba(255,255,255,0.05); --btn-text: #000000;
        }
    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }
        header { padding: 30px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo img { height: 50px; width: auto; object-fit: contain; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { text-decoration: none; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .hero { padding: 120px 6%; text-align: center; max-width: 800px; margin: 0 auto; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-bottom: 20px; }
        .hero p { color: var(--muted); font-size: 1.1rem; margin-bottom: 40px; }
        .btn { display: inline-block; background: var(--gold); color: var(--btn-text); padding: 15px 35px; text-decoration: none; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn:hover { opacity: 0.9; }
        footer { padding: 60px 6%; text-align: center; border-top: 1px solid var(--border); font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
        footer img { height: 40px; margin-bottom: 20px; opacity: 0.7; }
        
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; padding: 40px 6% 120px; max-width: 1400px; margin: 0 auto; }
        .product-card { background: var(--bg); border: 1px solid var(--border); padding: 25px; transition: 0.3s; }
        .product-card:hover { border-color: var(--gold); }
        .product-img { aspect-ratio: 1/1; background: #EEE; overflow: hidden; margin-bottom: 20px; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-info h3 { font-family: 'Playfair Display', serif; font-size: 1.15rem; margin-bottom: 5px; }
        .product-info p { font-size: 0.8rem; color: var(--muted); margin-bottom: 15px; }
        .product-info .price { font-weight: 700; color: var(--gold); display: block; margin-bottom: 20px; }
        .shop-header { text-align: center; padding: 60px 6% 20px; }
        .shop-header h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px; }
    
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html"><img src="/logos/ORNALIS_LOGO.png" alt="ornalis"></a></div>
        <nav><ul><li><a href="index.html" style="color: var(--text);">Home</a></li><li><a href="shop.html" style="color: var(--gold);">Shop</a></li><li><a href="blog.html" style="color: var(--text);">Blog</a></li></ul></nav>
    </header>
    
    <section class="shop-header">
        <h1>Our Collection</h1>
        <p>Browse our curated selection of high-end ornalis products.</p>
    </section>
    <div class="shop-grid" id="product-grid"></div>
    
    <script>
        fetch('../ornalis_products.json')
            .then(res => res.json())
            .then(products => {
                const grid = document.getElementById('product-grid');
                products.forEach(p => {
                    grid.innerHTML += `
                        <div class="product-card">
                            <div class="product-img"><img src="${p.image}" alt="${p.name}"></div>
                            <div class="product-info">
                                <h3>${p.name}</h3>
                                <p>Premium luxury product with exquisite detail and high-end design.</p>
                                <span class="price">${p.price}</span>
                                <a href="${p.link}" target="_blank" class="btn" style="width: 100%; text-align: center; padding: 12px; font-size: 0.75rem;">Buy on Amazon</a>
                            </div>
                        </div>
                    `;
                });
            });
    </script>
    <footer>
        <img src="/logos/ORNALIS_LOGO.png" alt="ornalis"><br>
        © 2026 ORNALIS · ALL RIGHTS RESERVED
    </footer>
</body>
</html>
