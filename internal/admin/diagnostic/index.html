<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTODROME | Internal Diagnostic Link</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Urbanist:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #2dd4bf;
            --red: #ef4444;
            --black: #0a0a0a;
            --dark-grey: #171717;
            --font-h1: "DM Serif Display", serif;
            --font-body: "Urbanist", sans-serif;
        }
        body { background: var(--black); color: #fff; font-family: var(--font-body); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { padding: 40px; text-align: center; border-bottom: 2px solid var(--red); width: 100%; background: var(--dark-grey); }
        h1 { font-family: var(--font-h1); color: var(--teal); font-size: 2rem; margin: 0; letter-spacing: 2px; }
        .subtitle { text-transform: uppercase; letter-spacing: 5px; font-size: 0.6rem; color: var(--red); margin-top: 5px; font-weight: 600; }
        .main-card { background: var(--dark-grey); border: 1px solid #333; padding: 40px; border-radius: 10px; width: 90%; max-width: 500px; text-align: center; margin-top: 50px; }
        .status-box { border: 1px solid var(--teal); padding: 20px; margin-bottom: 30px; font-family: monospace; background: rgba(45, 212, 191, 0.05); color: var(--teal); font-size: 0.8rem; text-align: left; }
        .action-btn { background: transparent; color: var(--red); border: 2px solid var(--red); padding: 15px 40px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; width: 100%; }
        .action-btn:hover { background: var(--red); color: white; }
    </style>
</head>
<body>
    <header>
        <h1>AUTODROME</h1>
        <div class="subtitle">NEURAL DIAGNOSTIC (INTERNAL ONLY)</div>
    </header>
    <div class="main-card">
        <div class="status-box">> INITIALIZING SECURE LINK...<br>> AWAITING SIGNAL...<br>> SYSTEM READY.</div>
        <button class="action-btn">EXECUTE FULL SCAN</button>
    </div>
</body>
</html>
