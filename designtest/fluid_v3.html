<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluidCAD Mercury Core — Prisca Dezigns</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; outline: none; }
        .instructions {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 3px;
            opacity: 0.5; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="instructions">Scroll to morph the volume</div>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uMorph;
        varying vec3 vNormal;
        varying vec3 vPosition;

        // FluidCAD Parametric Noise
        float hash(float n) { return fract(sin(n) * 43758.5453123); }
        float noise(vec3 x) {
            vec3 p = floor(x);
            vec3 f = fract(x);
            f = f*f*(3.0-2.0*f);
            float n = p.x + p.y*57.0 + 113.0*p.z;
            return mix(mix(mix( hash(n+0.0), hash(n+1.0),f.x),
                           mix( hash(n+57.0), hash(n+58.0),f.x),f.y),
                       mix(mix( hash(n+113.0), hash(n+114.0),f.x),
                           mix( hash(n+57.0+113.0), hash(n+58.0+113.0),f.x),f.y),f.z);
        }

        void main() {
            vNormal = normal;
            vec3 pos = position;

            // Parametric Shape Targets (FluidCAD Logic)
            // 0: Sphere (Default)
            // 1: Lofted Rect (Phone)
            vec3 phonePos = vec3(
                pos.x * (1.2 + uMorph * 0.5), 
                pos.y * (1.0 + uMorph * 1.5), 
                pos.z * (1.0 - uMorph * 0.8)
            );
            
            // Apply Morphing - The globe itself stretches
            vec3 morphedPos = mix(pos, phonePos, uMorph);

            // Digital Mercury surface tension
            float tension = noise(pos * 2.0 + uTime * 0.5) * 0.15;
            morphedPos += normal * tension;

            vPosition = morphedPos;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(morphedPos, 1.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vNormal;
        varying vec3 vPosition;
        uniform float uTime;

        void main() {
            vec3 viewDir = normalize(cameraPosition - vPosition);
            float fresnel = pow(1.0 - dot(viewDir, vNormal), 3.0);
            
            vec3 deepPurple = vec3(0.188, 0.098, 0.204); // #301934
            vec3 mercurySilver = vec3(0.784, 0.635, 0.784); // #C8A2C8
            
            vec3 color = mix(deepPurple, mercurySilver, fresnel);
            gl_FragColor = vec4(color, 0.9);
        }
    </script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // High poly count for smooth mercury flow
        const geometry = new THREE.IcosahedronGeometry(2, 128);
        const uniforms = {
            uTime: { value: 0 },
            uMorph: { value: 0 }
        };

        const material = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            transparent: true
        });

        const mercuryGlobe = new THREE.Mesh(geometry, material);
        scene.add(mercuryGlobe);
        camera.position.z = 6;

        function animate() {
            requestAnimationFrame(animate);
            uniforms.uTime.value += 0.01;
            mercuryGlobe.rotation.y += 0.003;
            renderer.render(scene, camera);
        }
        animate();

        // Listen for scroll to morph the SAME globe
        window.addEventListener('wheel', (e) => {
            let targetMorph = uniforms.uMorph.value + (e.deltaY * 0.001);
            targetMorph = Math.max(0, Math.min(1, targetMorph));
            
            gsap.to(uniforms.uMorph, {
                value: targetMorph,
                duration: 0.8,
                ease: "power2.out"
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
