<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Morph — Prisca Dezigns</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; outline: none; }
        .section { height: 100vh; position: relative; display: flex; align-items: center; padding-left: 10vw; pointer-events: none; z-index: 10; }
        .label { font-size: 3rem; font-weight: bold; text-transform: uppercase; letter-spacing: 5px; opacity: 0.3; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="section" id="core"><div class="label">The Core</div></div>
    <div class="section" id="phone"><div class="label">Mobile AI</div></div>
    <div class="section" id="car"><div class="label">Evolve Mobility</div></div>
    <div class="section" id="fashion"><div class="label">NehNeh</div></div>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uMorph;
        uniform float uShape; // 0: Sphere, 1: Box (Phone), 2: Torus (Car), 3: Knot (Fashion)
        varying vec3 vNormal;
        varying vec3 vPosition;

        // Simple Noise for the "Mercury" effect
        float hash(float n) { return fract(sin(n) * 43758.5453123); }
        float noise(vec3 x) {
            vec3 p = floor(x);
            vec3 f = fract(x);
            f = f*f*(3.0-2.0*f);
            float n = p.x + p.y*57.0 + 113.0*p.z;
            return mix(mix(mix( hash(n+0.0), hash(n+1.0),f.x),
                           mix( hash(n+57.0), hash(n+58.0),f.x),f.y),
                       mix(mix( hash(n+113.0), hash(n+114.0),f.x),
                           mix( hash(n+170.0), hash(n+171.0),f.x),f.y),f.z);
        }

        void main() {
            vNormal = normal;
            vec3 pos = position;
            
            // Shape 1: Phone (Boxy-ish)
            vec3 phonePos = clamp(pos, vec3(-1.2, -2.0, -0.2), vec3(1.2, 2.0, 0.2));
            
            // Shape 2: Car/Wheel (Torus-like)
            float angle = atan(pos.y, pos.x);
            vec3 carPos = vec3(cos(angle) * 2.0, sin(angle) * 2.0, pos.z * 0.5);

            // Shape 3: Fashion/Art (Abstract Knot)
            vec3 fashionPos = pos + sin(pos.y * 3.0 + uTime) * 0.5;

            // Morph logic based on uShape
            vec3 target = pos;
            if(uShape < 1.0) target = mix(pos, phonePos, uShape);
            else if(uShape < 2.0) target = mix(phonePos, carPos, uShape - 1.0);
            else if(uShape < 3.0) target = mix(carPos, fashionPos, uShape - 2.0);

            // Add Mercury "Vibration"
            float displacement = noise(pos + uTime * 0.5) * 0.15;
            target += normal * displacement;

            vPosition = target;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(target, 1.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vNormal;
        varying vec3 vPosition;
        uniform float uTime;
        
        void main() {
            vec3 viewDirection = normalize(cameraPosition - vPosition);
            float fresnel = pow(1.0 - dot(viewDirection, vNormal), 3.0);
            
            vec3 baseColor = vec3(0.188, 0.098, 0.204); // #301934
            vec3 highlightColor = vec3(0.784, 0.635, 0.784); // #C8A2C8
            
            vec3 finalColor = mix(baseColor, highlightColor, fresnel);
            finalColor += step(0.98, fresnel) * 0.5; // Shine edge

            gl_FragColor = vec4(finalColor, 1.0);
        }
    </script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const geometry = new THREE.IcosahedronGeometry(2, 64);
        const uniforms = { 
            uTime: { value: 0 },
            uShape: { value: 0 }
        };
        
        const material = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            wireframe: false
        });

        const core = new THREE.Mesh(geometry, material);
        scene.add(core);
        camera.position.z = 6;

        function animate() {
            requestAnimationFrame(animate);
            uniforms.uTime.value += 0.02;
            core.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        // Scroll mapping
        window.addEventListener('scroll', () => {
            const scrollPercent = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
            // Map scroll 0-1 to shape 0-3
            gsap.to(uniforms.uShape, { value: scrollPercent * 3, duration: 0.5 });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
