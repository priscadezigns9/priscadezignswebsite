<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercury Morph Master — Prisca Dezigns</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
        canvas { position: fixed; top: 0; left: 0; outline: none; }
        .ui {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }
        .status { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.3rem; opacity: 0.5; margin-bottom: 10px; }
        .label { font-size: 1.5rem; font-weight: 300; letter-spacing: 0.1rem; }
    </style>
</head>
<body>
    <div class="ui">
        <div class="status">System State</div>
        <div class="label" id="stateLabel">Core Globe</div>
    </div>

    <script id="vertexShader" type="x-shader/x-vertex">
        varying vec2 vUv;
        varying vec3 vNormal;
        varying vec3 vPosition;
        uniform float uTime;
        
        // Morph Targets
        uniform float uMorphDress;
        uniform float uMorphCar;

        // Simplex Noise
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
        float snoise(vec3 v) {
            const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
            const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
            vec3 i  = floor(v + dot(v, C.yyy) );
            vec3 x0 =   v - i + dot(i, C.xxx) ;
            vec3 g = step(x0.yzx, x0.xyz);
            vec3 l = 1.0 - g;
            vec3 i1 = min( g.xyz, l.zxy );
            vec3 i2 = max( g.xyz, l.zxy );
            vec3 x1 = x0 - i1 + C.xxx;
            vec3 x2 = x0 - i2 + C.yyy;
            vec3 x3 = x0 - D.yyy;
            i = mod289(i);
            vec4 p = permute( permute( permute(
                    i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                    + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
                    + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
            float n_ = 0.142857142857;
            vec3  ns = n_ * D.wyz - D.xzx;
            vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
            vec4 x_ = floor(j * ns.z);
            vec4 y_ = floor(j - 7.0 * x_ );
            vec4 x = x_ *ns.x + ns.yyyy;
            vec4 y = y_ *ns.x + ns.yyyy;
            vec4 h = 1.0 - abs(x) - abs(y);
            vec4 b0 = vec4( x.xy, y.xy );
            vec4 b1 = vec4( x.zw, y.zw );
            vec4 s0 = floor(b0)*2.0 + 1.0;
            vec4 s1 = floor(b1)*2.0 + 1.0;
            vec4 sh = -step(h, vec4(0.0));
            vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
            vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
            vec3 p0 = vec3(a0.xy,h.x);
            vec3 p1 = vec3(a0.zw,h.y);
            vec3 p2 = vec3(a1.xy,h.z);
            vec3 p3 = vec3(a1.zw,h.w);
            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
            p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
            m = m * m;
            return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
        }

        void main() {
            vUv = uv;
            vNormal = normal;
            vec3 pos = position;

            // DRESS Target
            float dFlare = smoothstep(0.5, -1.0, pos.y) * 2.5;
            float dCinch = 1.0 - (smoothstep(-0.2, 0.2, abs(pos.y)) * 0.3);
            vec3 dressPos = pos;
            dressPos.xz *= (1.0 + dFlare);
            dressPos.xz *= dCinch;
            dressPos.y *= 1.5;

            // CAR Target (Aero-Slab)
            vec3 carPos = pos;
            carPos.x *= 2.5; // Length
            carPos.y *= 0.4; // Height
            carPos.z *= 1.2; // Width
            carPos.y += sin(pos.x * 2.0) * 0.2; // Aero curve

            // Blend
            vec3 morphed = pos;
            morphed = mix(morphed, dressPos, uMorphDress);
            morphed = mix(morphed, carPos, uMorphCar);

            // Mercury Noise (Always active)
            float noise = snoise(vec3(morphed * 1.5 + uTime * 0.4));
            morphed += normal * noise * 0.08;

            vPosition = morphed;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(morphed, 1.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vNormal;
        varying vec3 vPosition;
        
        void main() {
            vec3 viewDir = normalize(cameraPosition - vPosition);
            float fresnel = pow(1.0 - dot(viewDir, vNormal), 3.0);
            vec3 color = mix(vec3(0.05, 0.0, 0.1), vec3(0.7, 0.6, 0.9), fresnel);
            gl_FragColor = vec4(color, 1.0);
        }
    </script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.IcosahedronGeometry(2, 64);
        const uniforms = {
            uTime: { value: 0 },
            uMorphDress: { value: 0 },
            uMorphCar: { value: 0 }
        };

        const material = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent
        });

        const mercury = new THREE.Mesh(geometry, material);
        scene.add(mercury);
        camera.position.z = 6;

        // Discrete States
        const states = [
            { name: 'Core Globe', dress: 0, car: 0 },
            { name: 'AI Fashion', dress: 1, car: 0 },
            { name: 'Evolve Mobility', dress: 0, car: 1 }
        ];
        let currentState = 0;
        let isAnimating = false;

        function transitionTo(index) {
            if (isAnimating || index === currentState) return;
            isAnimating = true;
            const target = states[index];
            
            document.getElementById('stateLabel').innerText = target.name;

            gsap.to(uniforms.uMorphDress, { value: target.dress, duration: 1.5, ease: "expo.inOut" });
            gsap.to(uniforms.uMorphCar, { value: target.car, duration: 1.5, ease: "expo.inOut" });
            
            setTimeout(() => { 
                currentState = index;
                isAnimating = false; 
            }, 1500);
        }

        // Discrete Scroll Trigger
        window.addEventListener('wheel', (e) => {
            if (isAnimating) return;
            if (e.deltaY > 20) { // Scroll Down
                if (currentState < states.length - 1) transitionTo(currentState + 1);
            } else if (e.deltaY < -20) { // Scroll Up
                if (currentState > 0) transitionTo(currentState - 1);
            }
        });

        function animate(time) {
            uniforms.uTime.value = time * 0.001;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
