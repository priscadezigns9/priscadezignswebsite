<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercury Morph Master — Prisca Dezigns</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; background: #110022; color: white; height: 100vh; overflow: hidden; font-family: sans-serif; }
        canvas { position: fixed; top: 0; left: 0; }
        #status {
            position: absolute; top: 20px; left: 20px; color: #cc66ff; font-family: monospace; z-index: 100;
        }
        #label {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            font-size: 1rem; text-transform: uppercase; letter-spacing: 0.5rem;
            opacity: 0.8; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="status">System: Initializing Core...</div>
    <div id="label">Globe</div>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uTargetState; 
        varying vec3 vNormal;
        varying vec3 vPosition;

        void main() {
            vNormal = normal;
            vec3 pos = position;
            
            // State 1: Fashion (Dress)
            float flare = pow(max(0.0, -pos.y + 0.5), 2.0) * 1.5;
            float cinch = 1.0 - (exp(-pow(pos.y - 0.2, 2.0) * 10.0) * 0.5);
            vec3 dressPos = pos;
            dressPos.xz *= (1.0 + flare) * cinch;
            dressPos.y *= 1.3;

            // State 2: Automotive (Car)
            vec3 carPos = pos;
            carPos.y *= 0.45;
            carPos.z *= 2.3;
            carPos.x *= 1.3;
            float roof = smoothstep(0.5, -0.4, abs(pos.z)) * smoothstep(-0.1, 0.2, pos.y);
            carPos.y += roof * 0.4;

            // Simple Blending
            vec3 finalPos = pos;
            if (uTargetState <= 1.0) {
                finalPos = mix(pos, dressPos, uTargetState);
            } else {
                finalPos = mix(dressPos, carPos, uTargetState - 1.0);
            }

            // Subtle Pulse
            finalPos += normal * sin(pos.y * 5.0 + uTime * 2.0) * 0.03;

            vPosition = finalPos;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(finalPos, 1.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vNormal;
        varying vec3 vPosition;
        uniform float uTime;

        void main() {
            vec3 viewDir = normalize(vec3(0.0, 0.0, 6.0) - vPosition);
            float fresnel = pow(1.0 - dot(vNormal, viewDir), 2.5);
            vec3 color = mix(vec3(0.2, 0.05, 0.3), vec3(0.9, 0.8, 1.0), fresnel);
            gl_FragColor = vec4(color, 1.0);
        }
    </script>

    <script>
        const status = document.getElementById('status');
        try {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x050011, 1);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.SphereGeometry(1.5, 64, 64);
            const uniforms = {
                uTime: { value: 0 },
                uTargetState: { value: 0 }
            };

            const material = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent
            });

            const mercury = new THREE.Mesh(geometry, material);
            scene.add(mercury);
            camera.position.z = 6;

            const states = ["Globe", "Fashion", "Automotive"];
            let currentStateIndex = 0;
            let isTransitioning = false;
            const label = document.getElementById('label');

            function updateMorph(index) {
                if (isTransitioning || index < 0 || index >= states.length) return;
                isTransitioning = true;
                
                gsap.to(uniforms.uTargetState, {
                    value: index,
                    duration: 1.5,
                    ease: "power2.inOut",
                    onStart: () => { label.style.opacity = 0.2; },
                    onComplete: () => {
                        isTransitioning = false;
                        label.textContent = states[index];
                        label.style.opacity = 0.8;
                    }
                });
                currentStateIndex = index;
            }

            window.addEventListener('wheel', (e) => {
                if (isTransitioning) return;
                if (e.deltaY > 20) updateMorph(currentStateIndex + 1);
                else if (e.deltaY < -20) updateMorph(currentStateIndex - 1);
            }, { passive: true });

            // Touch support for mobile
            let touchStartY = 0;
            window.addEventListener('touchstart', e => touchStartY = e.touches[0].clientY);
            window.addEventListener('touchend', e => {
                const deltaY = touchStartY - e.changedTouches[0].clientY;
                if (Math.abs(deltaY) > 50) {
                    if (deltaY > 0) updateMorph(currentStateIndex + 1);
                    else updateMorph(currentStateIndex - 1);
                }
            });

            function animate(time) {
                uniforms.uTime.value = time * 0.001;
                mercury.rotation.y += 0.005;
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
            
            status.textContent = "System: Core Active";
            setTimeout(() => status.style.opacity = 0, 3000);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        } catch (e) {
            status.textContent = "System Error: " + e.message;
            status.style.color = "red";
        }
    </script>
</body>
</html>
