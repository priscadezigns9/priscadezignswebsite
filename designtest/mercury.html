<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercury Morph Master — Prisca Dezigns</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
        canvas { position: fixed; top: 0; left: 0; outline: none; }
        #label {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            font-size: 1.2rem; text-transform: uppercase; letter-spacing: 0.8rem;
            opacity: 0.5; transition: opacity 0.5s; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="label">Globe</div>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uTargetState; 
        uniform float uFlare;
        uniform float uCinch;
        varying vec3 vNormal;
        varying vec3 vPosition;

        vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
        float snoise(vec2 v){
          const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
          vec2 i  = floor(v + dot(v, C.yy) );
          vec2 x0 = v -   i + dot(i, C.xx);
          vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
          vec4 x12 = x0.xyxy + C.xxzz;
          x12.xy -= i1;
          i = mod(i, 289.0);
          vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
          vec3 m = max(0.5 - vec4(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw), 0.0), 0.0);
          m = m*m*m*m;
          vec3 x = 2.0 * fract(p * C.www) - 1.0;
          vec3 h = abs(x) - 0.5;
          vec3 ox = floor(x + 0.5);
          vec3 a0 = x - ox;
          m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
          vec3 g;
          g.x  = a0.x  * x0.x  + h.x  * x0.y;
          g.yz = a0.yz * x12.xz + h.yz * x12.yw;
          return 130.0 * dot(m, g);
        }

        void main() {
            vNormal = normal;
            vec3 pos = position;
            
            // STATE 0: GLOBE
            vec3 globePos = pos;

            // STATE 1: DRESS
            float flare = pow(max(0.0, -pos.y + 0.5), 2.0) * uFlare;
            float cinch = 1.0 - (exp(-pow(pos.y - 0.2, 2.0) * 10.0) * (1.0 - uCinch));
            vec3 dressPos = pos;
            dressPos.xz *= (1.0 + flare) * cinch;
            dressPos.y *= 1.4;

            // STATE 2: CAR (Sleek Sedan/EV Profile)
            vec3 carPos = pos;
            carPos.y *= 0.4;  // Low profile
            carPos.z *= 2.5;  // Long chassis
            carPos.x *= 1.4;  // Wide stance
            // Cab/Roof logic
            float roof = smoothstep(0.6, -0.4, abs(pos.z)) * smoothstep(-0.2, 0.3, pos.y);
            carPos.y += roof * 0.45;
            // Aerodynamic taper
            float taper = 1.0 - pow(abs(pos.z), 3.0) * 0.3;
            carPos.xy *= taper;

            // BLENDING
            vec3 finalPos = globePos;
            float t1 = clamp(uTargetState, 0.0, 1.0);
            finalPos = mix(globePos, dressPos, t1);
            float t2 = clamp(uTargetState - 1.0, 0.0, 1.0);
            finalPos = mix(finalPos, carPos, t2);

            // Mercury Ripple
            float noise = snoise(pos.xy * 1.5 + uTime * 0.4) * 0.08;
            finalPos += normal * noise;

            vPosition = finalPos;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(finalPos, 1.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vNormal;
        varying vec3 vPosition;
        uniform float uTime;

        void main() {
            vec3 viewDir = normalize(cameraPosition - vPosition);
            float fresnel = pow(1.0 - dot(vNormal, viewDir), 3.0);
            
            vec3 baseColor = vec3(0.18, 0.09, 0.2); // Deep Purple
            vec3 chromeColor = vec3(0.8, 0.8, 0.9); // Chrome
            
            vec3 color = mix(baseColor, chromeColor, fresnel);
            gl_FragColor = vec4(color, 1.0);
        }
    </script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.SphereGeometry(1.5, 128, 128);
        const uniforms = {
            uTime: { value: 0 },
            uTargetState: { value: 0 },
            uFlare: { value: 1.5 },
            uCinch: { value: 0.5 }
        };

        const material = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent
        });

        const mercury = new THREE.Mesh(geometry, material);
        scene.add(mercury);
        camera.position.z = 6;

        const states = ["Globe", "Fashion", "Automotive"];
        let currentStateIndex = 0;
        let isTransitioning = false;
        const label = document.getElementById('label');

        function updateMorph(index) {
            if (isTransitioning || index < 0 || index >= states.length) return;
            isTransitioning = true;
            
            label.style.opacity = 0;
            
            gsap.to(uniforms.uTargetState, {
                value: index,
                duration: 1.8,
                ease: "expo.inOut",
                onComplete: () => {
                    isTransitioning = false;
                    label.textContent = states[index];
                    label.style.opacity = 0.5;
                }
            });
            currentStateIndex = index;
        }

        window.addEventListener('wheel', (e) => {
            if (isTransitioning) return;
            if (e.deltaY > 30) updateMorph(currentStateIndex + 1);
            else if (e.deltaY < -30) updateMorph(currentStateIndex - 1);
        }, { passive: true });

        function animate(time) {
            uniforms.uTime.value = time * 0.001;
            mercury.rotation.y += 0.002;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
