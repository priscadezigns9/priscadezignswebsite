<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surgical Mercury Core — Prisca Dezigns</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/api/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; background: #05000a; color: white; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
        canvas { position: fixed; top: 0; left: 0; }
        #label { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); font-size: 0.8rem; letter-spacing: 0.4em; text-transform: uppercase; opacity: 0.5; pointer-events: none; }
        #status { position: fixed; top: 20px; left: 20px; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: #7d52b5; }
    </style>
</head>
<body>
    <div id="status">System: Surgical Precision Active</div>
    <div id="label">Scroll to Morph</div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // High-Density Geometry for precise sculpting
        const geometry = new THREE.IcosahedronGeometry(2, 64);
        
        const vertexShader = `
            varying vec3 vNormal;
            varying vec3 vPosition;
            uniform float uTime;
            uniform float uState; // 0: Globe, 1: Dress, 2: Car
            
            void main() {
                vNormal = normal;
                vec3 pos = position;
                
                // STATE 1: FASHION (DRESS)
                // Distinct waist cinch + bell flare
                float waistCinch = 1.0 - smoothstep(-0.5, 0.5, pos.y) * 0.6;
                float flare = 1.0 + smoothstep(-2.0, -0.5, pos.y) * 1.5;
                vec3 dressPos = pos;
                dressPos.xz *= waistCinch;
                dressPos.xz *= flare;
                
                // STATE 2: AUTOMOTIVE (CAR)
                // Flat chassis + Greenhouse cockpit
                vec3 carPos = pos;
                carPos.y *= 0.35; // Flatten into chassis
                carPos.z *= 2.5;  // Stretch length
                carPos.x *= 1.2;  // Wide stance
                
                // Add the Cockpit/Roof
                float cockpit = smoothstep(0.0, 1.5, carPos.z) * smoothstep(3.0, 1.5, carPos.z);
                cockpit *= smoothstep(1.5, 0.0, abs(carPos.x));
                carPos.y += cockpit * 0.8;

                // BLENDING LOGIC
                float s1 = clamp(uState, 0.0, 1.0);
                float s2 = clamp(uState - 1.0, 0.0, 1.0);
                
                vec3 finalPos = mix(pos, dressPos, s1);
                finalPos = mix(finalPos, carPos, s2);
                
                // Subtle Mercury Ripple (Keep structure dominant)
                finalPos += normal * sin(pos.y * 10.0 + uTime * 2.0) * 0.03;

                vPosition = finalPos;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(finalPos, 1.0);
            }
        `;

        const fragmentShader = `
            varying vec3 vNormal;
            varying vec3 vPosition;
            void main() {
                vec3 viewDir = normalize(vec3(0,0,5) - vPosition);
                float fresnel = pow(1.0 - dot(vNormal, viewDir), 3.0);
                vec3 color = mix(vec3(0.11, 0.05, 0.13), vec3(0.8, 0.8, 1.0), fresnel);
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: { uTime: { value: 0 }, uState: { value: 0 } }
        });

        const core = new THREE.Mesh(geometry, material);
        scene.add(core);

        camera.position.z = 6;

        let scrollTarget = 0;
        let currentScroll = 0;

        window.addEventListener('wheel', (e) => {
            scrollTarget += e.deltaY * 0.002;
            scrollTarget = Math.max(0, Math.min(2, scrollTarget));
        });

        // Touch support
        let touchY = 0;
        window.addEventListener('touchstart', e => touchY = e.touches[0].clientY);
        window.addEventListener('touchmove', e => {
            const delta = touchY - e.touches[0].clientY;
            scrollTarget += delta * 0.005;
            scrollTarget = Math.max(0, Math.min(2, scrollTarget));
            touchY = e.touches[0].clientY;
        });

        function animate() {
            material.uniforms.uTime.value += 0.01;
            currentScroll += (scrollTarget - currentScroll) * 0.1;
            material.uniforms.uState.value = currentScroll;
            
            core.rotation.y += 0.005;
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
