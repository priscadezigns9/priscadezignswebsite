    <title>The Shop | AVORIA</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFFFFF; --text: #111111; --muted: #777777; --gold: #D4AF37; --border: rgba(0,0,0,0.06); --btn-text: #FFFFFF; --header-bg: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }
        header { padding: 25px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--header-bg); position: sticky; top: 0; z-index: 100; }
        .logo img { height: 50px; width: auto; object-fit: contain; mix-blend-mode: multiply; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text); transition: 0.3s; }
        nav a:hover { color: var(--gold); }
        .hero { padding: 60px 6% 20px; text-align: center; max-width: 900px; margin: 0 auto; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3.2rem; margin-bottom: 25px; line-height: 1.2; }
        .hero p { color: var(--muted); font-size: 1.15rem; margin-bottom: 40px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 40px 6%; }
        .card { border: 1px solid var(--border); padding: 20px; transition: 0.4s; background: var(--header-bg); display: flex; flex-direction: column; height: 100%; border-radius: 4px; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .p-img { aspect-ratio: 1/1; margin-bottom: 20px; overflow: hidden; }
        .p-img img { width: 100%; height: 100%; object-fit: contain; background: #fff; }
        .p-info { flex-grow: 1; display: flex; flex-direction: column; }
        .p-info h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 10px; min-height: 2.4em; color: var(--text); }
        .p-info .price { color: var(--gold); font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 20px; }
        .btn { display: inline-block; background: var(--gold); color: var(--btn-text); padding: 12px 20px; text-decoration: none; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; border-radius: 2px; transition: 0.3s; text-align: center; }
        .btn:hover { opacity: 0.9; }

        footer { padding: 60px 6%; text-align: center; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); letter-spacing: 2px; background: var(--header-bg); }
        footer img { height: 50px; margin-bottom: 20px; mix-blend-mode: multiply; }
    </style>
</head>
