<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shop | AVORIA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFFFFF; --text: #111111; --muted: #777777; --gold: #D4AF37; --border: rgba(0,0,0,0.06); --btn-text: #FFFFFF; --header-bg: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }
        header { padding: 25px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--header-bg); position: sticky; top: 0; z-index: 100; }
        .logo img { height: 50px; width: auto; object-fit: contain; mix-blend-mode: multiply; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text); transition: 0.3s; }
        nav a:hover { color: var(--gold); }
        .hero { padding: 60px 6% 20px; text-align: center; max-width: 900px; margin: 0 auto; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3.2rem; margin-bottom: 25px; line-height: 1.2; }
        .hero p { color: var(--muted); font-size: 1.15rem; margin-bottom: 40px; }
        .btn { display: inline-block; background: var(--gold); color: var(--btn-text); padding: 14px 40px; text-decoration: none; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; border-radius: 2px; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; padding: 60px 6%; }
        .card { border: 1px solid var(--border); padding: 30px; transition: 0.4s; background: var(--header-bg); display: flex; flex-direction: column; height: 100%; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .p-img { aspect-ratio: 1/1; margin-bottom: 25px; overflow: hidden; }
        .p-img img { width: 100%; height: 100%; object-fit: contain; background: #fff; }
        .p-info { flex-grow: 1; display: flex; flex-direction: column; }
        .p-info h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 15px; min-height: 2em; }
        .p-info .price { color: var(--gold); font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 25px; }
        .p-info .btn { margin-top: auto; }

        footer { padding: 80px 6%; text-align: center; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); letter-spacing: 2px; background: var(--header-bg); }
        footer img { height: 50px; margin-bottom: 20px; mix-blend-mode: multiply; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html"><img src="/logos/AXORIA_NEW_2026.png" alt="avoria"></a></div>
        <nav><ul><li><a href="index.html">Home</a></li><li><a href="shop.html" style="color: var(--gold);">Shop</a></li><li><a href="blog.html">Blog</a></li></ul></nav>
    </header>
    <section class="hero">
        <h1>The Shop</h1>
        <p>Vetted products for the modern lifestyle. Precision frames meets artisanal luxury.</p>
    </section>
    <div class="grid" id="g"></div>
    <script>
        const data = [
  {
    "name": "Prada Minimalist Square Frames",
    "price": "$199.48",
    "image": "https://m.media-amazon.com/images/I/41NHuNxS8JL._AC_SL1500_.jpg",
    "link": "https://www.amazon.com/dp/B0FFHKBV62?tag=priscadezigns-20"
  },
  {
    "name": "Gucci Aviator Titanium Frames",
    "price": "$289.00",
    "image": "https://m.media-amazon.com/images/I/51kTpVshwfL._AC_SL1500_.jpg",
    "link": "https://www.amazon.com/dp/B09HTQSNKD?tag=priscadezigns-20"
  },
  {
    "name": "Tom Ford Blue Block Eyewear",
    "price": "$146.56",
    "image": "https://m.media-amazon.com/images/I/51vMqMydaYL._AC_SL1500_.jpg",
    "link": "https://www.amazon.com/dp/B0D83NNX2J?tag=priscadezigns-20"
  },
  {
    "name": "Ray-Ban Classic Wayfarer",
    "price": "$160.00",
    "image": "https://m.media-amazon.com/images/I/61S1vC9xSXL._AC_SL1500_.jpg",
    "link": "https://www.amazon.com/dp/B001GNBJQ8?tag=priscadezigns-20"
  }
];
        const g = document.getElementById('g');
        data.forEach(p => {
            const proxiedImg = `https://images.weserv.nl/?url=${encodeURIComponent(p.image)}&w=600&h=600&fit=contain&default=https://via.placeholder.com/600x600?text=Avoria+Excellence`;
            g.innerHTML += `
                <div class='card'>
                    <div class='p-img'><img src='${proxiedImg}' loading="lazy"></div>
                    <div class='p-info'>
                        <h3>${p.name}</h3>
                        <span class='price'>${p.price}</span>
                        <a href='${p.link}' target='_blank' class='btn' style='width:100%;text-align:center'>Buy on Amazon</a>
                    </div>
                </div>
            `;
        });
    </script>
    <footer>
        <img src='/logos/AXORIA_NEW_2026.png'><br>
        © 2026 AVORIA · AUTHENTIC QUALITY
    </footer>
</body>
</html>
