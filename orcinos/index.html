<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORCINOS | Apex Intelligence Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --text: #E0E0E0; --muted: #888; --accent: #2E5BBA; --card: #0D0D0D;
            --font-heading: 'Playfair Display', serif; --font-body: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); line-height: 1.6; }
        header { padding: 40px 6%; display: flex; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-img { height: 40px; }
        .hero { padding: 120px 6%; text-align: center; }
        .hero h1 { font-family: var(--font-heading); font-size: 4.5rem; letter-spacing: -1px; margin-bottom: 20px; }
        .hero p { font-size: 1.1rem; color: var(--muted); max-width: 700px; margin: 0 auto 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; padding: 0 6% 120px; }
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); padding: 40px; border-radius: 12px; transition: 0.4s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .card span { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; display: block; margin-bottom: 10px; }
        .card h3 { font-family: var(--font-heading); font-size: 1.8rem; margin-bottom: 15px; }
        .card p { font-size: 0.95rem; color: var(--muted); margin-bottom: 30px; min-height: 80px; flex-grow: 1; }
        .btn-launch { text-decoration: none; color: white; border-bottom: 2px solid var(--accent); padding-bottom: 5px; font-size: 0.8rem; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; width: fit-content; }
        footer { padding: 80px 6%; text-align: center; font-size: 0.7rem; color: #444; letter-spacing: 2px; text-transform: uppercase; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <nav style="display: flex; justify-content: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 30px;">
        <a href="/" style="color: #888; text-decoration: none; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;">Main Hub</a>
        <a href="/orcinos/" style="color: #fff; text-decoration: none; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid #2E5BBA;">Orcinos</a>
        <a href="/orcinos/about/" style="color: #888; text-decoration: none; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;">About</a>
    </nav>
    
    <header><img src="..../logos/ORCINOS_DEFINITIVE_2026.png" alt="Orcinos" class="logo-img"></header>
    <section class="hero">
        <h1>Sovereign Software Suite.</h1>
        <p>Apex intelligence modules engineered for autonomous operation, decentralized commerce, and neural performance.</p>
    </section>
    <div class="grid" id="product-grid"></div>
    <script>
        const products = [
            { name: "Captio AI", cat: "AI Marketing", desc: "AI-powered social media caption generator for creators and managers.", url: "/captio_ai_final/landing/" },
            { name: "OptiScout", cat: "Shopping", desc: "High-fidelity Amazon price tracker and deal scouting engine.", url: "/pricepulse_final/landing/" },
            { name: "Nurasen", cat: "Security", desc: "Next-generation neural cybersecurity and antivirus defense.", url: "/nurasen/" },
            { name: "Titan TraderX", cat: "Trading", desc: "AI-powered trading strategy notepad, alerts, and backtesting.", url: "/titantraderx/" },
            { name: "PrayerBlock", cat: "Spiritual", desc: "Distraction-free environment for prayer and meditation.", url: "/prayerblock/landing/" },
            { name: "PawDX", cat: "Veterinary AI", desc: "AI-driven pet health symptom analyzer and tracking.", url: "/pawdx/landing/" },
            { name: "Slumber", cat: "Sleep Tech", desc: "AI-powered sleep science and coaching platform.", url: "/slumber/landing/" },
            { name: "Skillbit", cat: "Education", desc: "Micro-learning platform for rapid skill acquisition.", url: "/skillbit/landing/" },
            { name: "Clausify", cat: "Legal AI", desc: "Legal automation and contract generation for creators.", url: "/clausify/landing/" },
            { name: "Syla", cat: "Logistics", desc: "Intelligent logistics and asset management dashboard.", url: "/syla/landing/" },
            { name: "Hartaly", cat: "Wellness", desc: "AI-powered mental wellness coach — Your 2 AM Calm.", url: "/hartaly/landing/" },
            { name: "D'Panyard", cat: "Heritage", desc: "Global home for Steelpan music and culture.", url: "/dpanyard/landing/" },
            { name: "Riddiim", cat: "Music Tech", desc: "Music super-app for production and distribution.", url: "/riddiim/landing/" },
            { name: "Dricil", cat: "Agency", desc: "Fully autonomous AI-powered digital marketing agency.", url: "/dricil/landing/" }
        ];
        const grid = document.getElementById('product-grid');
        products.forEach(p => {
            grid.innerHTML += `<div class="card"><span>${p.cat}</span><h3>${p.name}</h3><p>${p.desc}</p><a href="${p.url}" class="btn-launch">Launch App →</a></div>`;
        });
    </script>
    <footer>© 2026 ORCINOS · A PRISCA DEZIGNS EMPIRE DIVISION</footer>
</body>
</html>
