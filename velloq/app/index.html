<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velloq | Laboratory Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050508; --card: #0F172A; --primary: #0EA5E9; --accent: #00B4A6; --text: #F8FAFC; --dim: #94A3B8; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        .app-container { display: flex; height: 100vh; }
        .app-sidebar { width: 280px; background: var(--card); border-right: 1px solid rgba(255,255,255,0.05); padding: 2rem; }
        .app-main { flex: 1; padding: 3rem; overflow-y: auto; }
        .brand { font-weight: 800; font-size: 1.4rem; color: var(--primary); margin-bottom: 3rem; text-transform: uppercase; letter-spacing: -1px; }
        .nav-item { display: block; color: var(--dim); text-decoration: none; padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; transition: all 0.2s; font-size: 0.9rem; font-weight: 600; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: var(--text); }
        .workflow-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 2.5rem; max-width: 800px; }
        .workflow-header { margin-bottom: 2rem; }
        .workflow-header h2 { font-size: 1.8rem; margin: 0 0 0.5rem 0; }
        .workflow-header p { color: var(--dim); margin: 0; }
        .input-group { margin-bottom: 2rem; }
        label { display: block; margin-bottom: 12px; font-weight: 600; font-size: 0.9rem; }
        textarea { width: 100%; background: #1E293B; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1rem; color: #fff; font-family: inherit; font-size: 0.95rem; }
        .btn-action { background: var(--primary); color: #fff; border: none; padding: 14px 28px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: transform 0.2s; }
        .btn-action:hover { transform: scale(1.02); }
        .workflow-steps { list-style: none; padding: 0; margin: 2rem 0 0 0; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 2rem; }
        .workflow-steps li { display: flex; align-items: center; gap: 16px; color: var(--dim); font-size: 0.85rem; margin-bottom: 16px; }
        .step-num { width: 24px; height: 24px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 800; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-sidebar">
            <div class="brand">Velloq</div>
            <a href="#" class="nav-item active">Operational Node</a>
            <a href="#" class="nav-item">Ecosystem Data</a>
            <a href="#" class="nav-item">Deployments</a>
            <a href="/laboratory/" class="nav-item" style="margin-top: 4rem; color: var(--accent);">← Lab Dashboard</a>
        </div>
        <div class="app-main">
            <div class="workflow-card">
                <div class="workflow-header">
                    <h2>Deploy Neural Workflow</h2>
                    <p>Laboratory Logic Active</p>
                </div>
                <div class="input-group">
                    <label>Neural Brief / Instructions</label>
                    <textarea rows="6" placeholder="Describe the outcome you want to achieve..."></textarea>
                </div>
                <button class="btn-action" onclick="alert('The Laboratory Agent has received your brief and is now architecting the workflow.')">Initiate Process</button>
                <ul class="workflow-steps"><li><span class="step-num">1</span> Map Brand DNA</li><li><span class="step-num">2</span> Initialize Framework</li><li><span class="step-num">3</span> Deploy Node</li></ul>
            </div>
        </div>
    </div>
</body>
</html>
