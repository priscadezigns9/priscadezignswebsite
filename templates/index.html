<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Template Shop — Coming Soon | Prisca Dezigns</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:#0a0a0a;
  font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  position:relative;
}

/* ── BACKGROUND GRID ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(102,0,204,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(102,0,204,0.07) 1px, transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
}

/* ── GLOW ── */
.glow{
  position:fixed;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(102,0,204,0.18) 0%, transparent 70%);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  animation:pulse 4s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.8}
  50%{transform:translate(-50%,-50%) scale(1.15);opacity:1}
}

/* ── CARD ── */
.card{
  position:relative;z-index:10;
  text-align:center;
  padding:0 24px;
  max-width:700px;
  width:100%;
}

/* ── EYEBROW ── */
.eyebrow{
  display:inline-flex;align-items:center;gap:10px;
  font-size:10px;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;color:#6600CC;
  margin-bottom:28px;
}
.eyebrow::before,.eyebrow::after{
  content:'';display:block;
  width:32px;height:1px;background:#6600CC;opacity:.5;
}

/* ── LOGO ── */
.brand{
  font-family:'Syne',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:4px;
  text-transform:uppercase;color:rgba(255,255,255,0.3);
  margin-bottom:20px;
}

/* ── HEADLINE ── */
h1{
  font-family:'Syne',sans-serif;
  font-size:clamp(2.6rem,7vw,5.2rem);
  font-weight:800;
  line-height:1.0;
  color:#ffffff;
  margin-bottom:16px;
  letter-spacing:-0.02em;
}
h1 span{
  background:linear-gradient(135deg,#6600CC,#b580ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

/* ── TAGLINE ── */
.tagline{
  font-family:'Syne',sans-serif;
  font-size:clamp(1rem,2.5vw,1.35rem);
  font-weight:600;
  color:rgba(255,255,255,0.55);
  margin-bottom:36px;
  line-height:1.4;
}

/* ── AUDIENCE PILLS ── */
.pills{
  display:flex;flex-wrap:wrap;gap:10px;
  justify-content:center;
  margin-bottom:44px;
}
.pill{
  font-size:10px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.6);
  border:1px solid rgba(102,0,204,0.4);
  border-radius:100px;
  padding:8px 18px;
  background:rgba(102,0,204,0.06);
  transition:border-color .25s,color .25s,background .25s;
}
.pill:hover{
  border-color:rgba(102,0,204,0.9);
  color:#fff;
  background:rgba(102,0,204,0.15);
}

/* ── GET READY ── */
.get-ready{
  font-family:'Syne',sans-serif;
  font-size:clamp(1.1rem,2.8vw,1.6rem);
  font-weight:700;
  color:#6600CC;
  letter-spacing:0.04em;
  animation:flicker 3s ease-in-out infinite;
}
@keyframes flicker{
  0%,100%{opacity:1}
  45%{opacity:1}
  50%{opacity:0.4}
  55%{opacity:1}
  85%{opacity:1}
  90%{opacity:0.6}
  95%{opacity:1}
}

/* ── BACK LINK ── */
.back{
  position:fixed;top:24px;left:28px;
  font-size:10px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:rgba(255,255,255,0.25);
  text-decoration:none;
  transition:color .2s;
  display:flex;align-items:center;gap:8px;
  z-index:20;
}
.back:hover{color:rgba(255,255,255,0.7)}
.back::before{content:'←'}

/* ── LOGO TOP RIGHT ── */
.logo-mark{
  position:fixed;top:22px;right:28px;
  font-family:'Syne',sans-serif;font-size:13px;font-weight:800;
  letter-spacing:1px;color:rgba(255,255,255,0.2);
  text-decoration:none;z-index:20;
  transition:color .2s;
}
.logo-mark:hover{color:rgba(255,255,255,0.5)}

/* ── BOTTOM LINE ── */
.bottom-line{
  position:fixed;bottom:24px;
  width:100%;text-align:center;
  font-size:10px;font-weight:500;letter-spacing:1px;
  color:rgba(255,255,255,0.12);
  z-index:20;
}

/* ── MOBILE ── */
@media(max-width:480px){
  body{overflow:auto}
  html,body{height:auto;min-height:100vh}
  .card{padding:60px 20px 80px}
  .pills{gap:8px}
  .pill{font-size:9px;padding:7px 14px}
}
</style>
</head>
<body>

<div class="glow"></div>

<a href="/" class="back">Home</a>
<a href="/" class="logo-mark">Prisca Dezigns</a>

<div class="card">
  <div class="brand">Prisca Dezigns</div>
  <div class="eyebrow">Coming Soon</div>
  <h1>Template<br/><span>Shop</span></h1>
  <p class="tagline">Professional websites, built and live in 24 hours.</p>
  <div class="pills">
    <span class="pill">Professionals</span>
    <span class="pill">Artists</span>
    <span class="pill">Photographers</span>
    <span class="pill">Small Online Businesses</span>
  </div>
  <div class="get-ready">Get Ready ✦</div>
</div>

<div class="bottom-line">priscadezigns.org</div>

</body>
</html>
