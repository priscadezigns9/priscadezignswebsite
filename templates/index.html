/* Thumbnail preview - lazy WebP, replaces iframe */
.t-iframe-wrap{position:relative;overflow:hidden;aspect-ratio:16/10;background:#050a0f;}
.t-thumb-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:top center;
  display:block;border:none;
  transition:transform 0.4s ease;
}
.t-iframe-placeholder{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:transparent;
  cursor:pointer;z-index:2;pointer-events:all;
  transition:background 0.25s;
}
.t-iframe-placeholder:hover{background:rgba(102,0,204,0.18);}
.t-iframe-placeholder:hover .t-thumb-img{transform:scale(1.04);}
.t-ph-label{
  font-size:11px;font-weight:700;letter-spacing:0.12em;
  text-transform:uppercase;color:rgba(200,160,255,0.9);
  pointer-events:none;
  background:rgba(10,0,20,0.6);
  padding:6px 14px;border-radius:20px;
  border:1px solid rgba(160,100,255,0.3);
  backdrop-filter:blur(6px);
  opacity:1;transition:opacity 0.25s;
}
.t-iframe-placeholder:hover .t-ph-label{opacity:1;}
/* Fallback bg when image not yet uploaded */
.t-thumb-fallback{
  position:absolute;inset:0;z-index:0;
  background:linear-gradient(90deg,#0d0018 0%,#1e0040 40%,#2a0060 50%,#1e0040 60%,#0d0018 100%);
  background-size:300% 100%;
  animation:shimmer 2s infinite linear;
}
@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
/* Ensure label is visible if image fails */
.t-ph-label { opacity: 0.9 !important; z-index: 3; }
.t-iframe-live { pointer-events: none; }
/* Force preview height */
.t-iframe-wrap { position: relative; width: 100%; aspect-ratio: 16/10; background: #050a0f; overflow: hidden; }
.t-preview { display: block; position: relative; width: 100%; overflow: hidden; }

/* ── Marquee-style Cursor Follower ── */
.cursor-img {
  position: fixed;
  pointer-events: none;
  z-index: 10000;
  width: 320px;
  aspect-ratio: 16/10;
  overflow: hidden;
  opacity: 0;
  border-radius: 6px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  transform: translate(-50%, -50%) scale(0.8) rotate(-2deg);
  transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  will-change: transform, opacity;
  background: #050a0f;
  border: 1px solid rgba(255,255,255,0.1);
}
.cursor-img.visible {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1) rotate(0deg);
}
.cursor-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
@media (max-width: 1024px) {
  .cursor-img { display: none !important; }
}
</style>
<div id="cursorImg" class="cursor-img"><img id="cursorImgSrc" src="" alt="Preview"></div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    function loadPreview(ph) {
        var src = ph.getAttribute('data-src');
        if (src && !ph.querySelector('.t-iframe-live')) {
            var iframe = document.createElement('iframe');
            iframe.src = src;
            iframe.className = 't-iframe-live';
            iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;z-index:1;background:#050a0f;opacity:0;transition:opacity 0.6s ease;';
            iframe.onload = function() {
                iframe.style.opacity = '1';
                var img = ph.querySelector('.t-thumb-img');
                if (img) img.style.opacity = '0';
                var fb = ph.querySelector('.t-thumb-fallback');
                if (fb) fb.style.display = 'none';
            };
            ph.appendChild(iframe);
        }
    }
    // Faster Warm-up: Load interactive preview when entering the Card (Tile) area
    document.querySelectorAll('.t-card').forEach(function(card) {
        var ph = card.querySelector('.t-iframe-placeholder');
        if (!ph) return;
        card.addEventListener('mouseenter', function() { loadPreview(ph); }, {once: true});
        card.addEventListener('touchstart', function() { loadPreview(ph); }, {once: true, passive: true});
    });

    // ── Marquee Hover Feature (Cursor Following Image) ──
    (function() {
        var cursorImg = document.getElementById('cursorImg');
        var cursorImgSrc = document.getElementById('cursorImgSrc');
        var cards = document.querySelectorAll('.t-card');
        var mx = 0, my = 0;
        var cx = 0, cy = 0;
        var raf;
        var active = false;

        function lerp(a, b, t) { return a + (b - a) * t; }
        function tick() {
            cx = lerp(cx, mx, 0.1);
            cy = lerp(cy, my, 0.1);
            cursorImg.style.left = cx + 'px';
            cursorImg.style.top = cy + 'px';
            raf = requestAnimationFrame(tick);
        }

        document.addEventListener('mousemove', function(e) {
            mx = e.clientX;
            my = e.clientY;
        });

        cards.forEach(function(card) {
            card.addEventListener('mouseenter', function() {
                var img = card.querySelector('.t-thumb-img');
                if (img && img.src) {
                    cursorImgSrc.src = img.src;
                    cursorImg.classList.add('visible');
                    if (!active) { active = true; tick(); }
                }
            });
            card.addEventListener('mouseleave', function() {
                cursorImg.classList.remove('visible');
            });
        });
    })();
});
</script>
