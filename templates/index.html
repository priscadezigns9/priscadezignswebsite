<style>
/* ── Chatbot — master styles (synced from main site) ── */

        /* ── Chatbot Bubble ── */
        #pd-chat-bubble {
            position:fixed; bottom:28px; right:28px; z-index:9999;
            width:64px; height:64px; border-radius:50%;
            background:var(--purple); border:2px solid var(--lilac);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; box-shadow:0 8px 32px rgba(48,25,52,0.30);
            transition:transform 0.2s, box-shadow 0.2s;
        }
        #pd-chat-bubble:hover { transform:scale(1.08); box-shadow:0 12px 40px rgba(48,25,52,0.40); }
        #pd-chat-bubble svg { width:28px; height:28px; fill:var(--lilac); }
        #pd-chat-bubble .chat-x { display:none; font-size:1.6rem; color:var(--lilac); font-weight:700; line-height:1; }
        #pd-chat-bubble.open svg { display:none; }
        #pd-chat-bubble.open .chat-x { display:block; }
        /* ── Chat Window ── */
        #pd-chat-window {
            position:fixed; bottom:108px; right:28px; z-index:9998;
            width:480px;
            background:var(--ivory);
            border:1px solid rgba(48,25,52,0.12);
            box-shadow:0 28px 70px rgba(48,25,52,0.22);
            display:flex; flex-direction:column;
            opacity:0; pointer-events:none;
            transform:translateY(18px);
            transition:opacity 0.28s, transform 0.28s;
            max-height:720px;
            border-radius:4px;
        }
        #pd-chat-window.open { opacity:1; pointer-events:all; transform:translateY(0); }
        /* ── Header ── */
        .chat-hdr { background:var(--purple); padding:20px 22px; display:flex; align-items:center; gap:14px; flex-shrink:0; }
        .chat-avatar { width:44px; height:44px; border-radius:50%; background:var(--lilac); display:flex; align-items:center; justify-content:center; font-size:1.2rem; font-weight:900; color:var(--purple); font-family:var(--font-heading); flex-shrink:0; }
        .chat-hdr-name { font-size:0.95rem; font-weight:700; letter-spacing:0.08em; color:var(--ivory); }
        .chat-hdr-status { font-size:0.72rem; color:var(--lilac); display:flex; align-items:center; gap:6px; margin-top:3px; }
        .chat-hdr-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
        /* Voice toggle button */
        #chat-voice-toggle {
            background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.25);
            color:var(--lilac); border-radius:100px;
            font-size:0.62rem; font-weight:700; letter-spacing:0.1em;
            padding:5px 10px; cursor:pointer; display:flex; align-items:center; gap:5px;
            transition:background 0.2s; white-space:nowrap;
        }
        #chat-voice-toggle:hover { background:rgba(255,255,255,0.22); }
        #chat-voice-toggle.voice-on { background:rgba(74,222,128,0.2); border-color:#4ade80; color:#4ade80; }
        .chat-sdot { width:7px; height:7px; border-radius:50%; background:#4ade80; animation:pgr 2s infinite; }
        @keyframes pgr { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        /* ── Back bar ── */
        #chat-back-bar { display:none; align-items:center; gap:8px; padding:10px 18px; border-bottom:1px solid rgba(48,25,52,0.08); background:rgba(200,162,200,0.07); cursor:pointer; flex-shrink:0; }
        #chat-back-bar.vis { display:flex; }
        #chat-back-bar span { font-size:0.72rem; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:var(--purple); opacity:0.6; }
        #chat-back-bar:hover span { opacity:1; }
        /* ── Messages ── */
        .chat-msgs { flex:1; overflow-y:auto; padding:18px 16px; display:flex; flex-direction:column; gap:14px; min-height:160px; max-height:420px; }
        .chat-msgs::-webkit-scrollbar { width:3px; }
        .chat-msgs::-webkit-scrollbar-thumb { background:var(--lilac); border-radius:3px; }
        .cmsg { max-width:85%; font-size:0.95rem; line-height:1.65; padding:13px 17px; animation:cfUp 0.22s ease; }
        @keyframes cfUp { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
        .cmsg.bot { background:var(--purple); color:var(--ivory); align-self:flex-start; border-radius:0 14px 14px 14px; }
        .cmsg.usr { background:var(--lilac); color:var(--purple); align-self:flex-end; border-radius:14px 0 14px 14px; font-weight:600; }
        /* Typing dots */
        .cmsg.typing { background:var(--purple); align-self:flex-start; border-radius:0 14px 14px 14px; padding:16px 20px; }
        .typing-dots { display:flex; gap:5px; }
        .typing-dots span { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.5); animation:tdot 1.2s infinite; }
        .typing-dots span:nth-child(2){animation-delay:0.2s;}
        .typing-dots span:nth-child(3){animation-delay:0.4s;}
        @keyframes tdot{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
        /* ── Package cards ── */
        .cpkg-grid { display:flex; flex-direction:column; gap:8px; width:100%; align-self:stretch; }
        .cpkg-card { background:#fff; border:1px solid rgba(48,25,52,0.1); padding:13px 15px; cursor:pointer; transition:border-color 0.2s,background 0.2s; border-radius:4px; }
        .cpkg-card:hover { border-color:var(--lilac); background:rgba(200,162,200,0.05); }
        .cpkg-name { font-size:0.9rem; font-weight:900; color:var(--purple); letter-spacing:0.05em; }
        .cpkg-price { font-size:0.78rem; font-weight:700; color:var(--lilac); margin-top:3px; }
        .cpkg-desc { font-size:0.76rem; color:var(--purple); opacity:0.5; margin-top:5px; line-height:1.5; }
        /* ── Quick replies ── */
        .chat-qr { padding:10px 14px 12px; display:flex; flex-wrap:wrap; gap:8px; flex-shrink:0; }
        .qrb { font-size:0.78rem; font-weight:700; letter-spacing:0.05em; padding:9px 16px; border:1px solid rgba(48,25,52,0.22); background:transparent; cursor:pointer; color:var(--purple); border-radius:100px; transition:background 0.2s,color 0.2s,border-color 0.2s; font-family:var(--font-body); }
        .qrb:hover { background:var(--purple); color:var(--ivory); border-color:var(--purple); }
        .qrb.wa { background:var(--lilac); color:var(--purple); border-color:var(--lilac); display:inline-flex; align-items:center; gap:7px; text-decoration:none; }
        .qrb.wa:hover { background:var(--purple); color:var(--ivory); border-color:var(--purple); }
        /* ── Input row ── */
        .chat-inp-row { display:flex; border-top:1px solid rgba(48,25,52,0.1); flex-shrink:0; align-items: center; }
        #chat-inp { flex:1; border:none; background:transparent; padding:16px 16px; font-size:0.95rem; font-family:var(--font-body); color:var(--purple); outline:none; }
        #chat-inp::placeholder { color:rgba(48,25,52,0.35); }
        #chat-mic { background: transparent; border: none; cursor: pointer; padding: 0 10px; color: var(--purple); opacity: 0.5; transition: opacity 0.2s, color 0.2s; display: flex; align-items: center; }
        #chat-mic:hover { opacity: 1; color: var(--lilac); }
        #chat-mic.recording { color: #ff4d4d; opacity: 1; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        #chat-snd { background:var(--purple); border:none; cursor:pointer; padding:16px 20px; color:var(--lilac); font-size:1.2rem; transition:background 0.2s; height: 100%; }
        #chat-snd:hover { background:var(--lilac); color:var(--purple); }
        @media(max-width:520px){
            #pd-chat-window{width:calc(100vw - 16px);right:8px;bottom:96px;max-height:80vh;}
            .cmsg{font-size:0.92rem;}
            #chat-inp{font-size:0.92rem;}
        }
