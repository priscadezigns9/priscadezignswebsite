<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Templates for Consultants, Coaches & Freelancers — Done in 24 Hours | Prisca Dezigns</title>
    <link rel="stylesheet" href="/templates/shop_main.css?v=marquee-final">
    <style>
        .t-grid { display: grid !important; grid-template-columns: repeat(4, 1fr) !important; gap: 16px; padding: 32px; background: #fff; }
        @media (max-width: 1100px) { .t-grid { grid-template-columns: repeat(3, 1fr) !important; } }
        @media (max-width: 800px) { .t-grid { grid-template-columns: repeat(2, 1fr) !important; } }
        @media (max-width: 500px) { .t-grid { grid-template-columns: 1fr !important; } }
        
        .t-iframe-placeholder { position: relative !important; aspect-ratio: 16/10; overflow: hidden !important; cursor: pointer; background: #f0f0f0; }
        .cinematic-overlay {
            position: absolute; inset: 0; pointer-events: none; z-index: 5;
            background: radial-gradient(circle 180px at var(--x, 50%) var(--y, 50%), rgba(102, 0, 204, 0.7) 0%, transparent 100%);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .t-iframe-placeholder:hover .cinematic-overlay { opacity: 1; }
        .cinematic-label {
            position: absolute; top: 50%; left: 50%; z-index: 10; pointer-events: none;
            transform: translate(-50%, -50%) scale(0.8);
            background: #fff; color: #6600CC; padding: 12px 24px; border-radius: 100px;
            font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 800; letter-spacing: 2.5px;
            text-transform: uppercase; opacity: 0; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4); white-space: nowrap;
        }
        .t-iframe-placeholder:hover .cinematic-label { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .t-ph-label { display: none !important; }
    </style>
</head>
<body>
    <header>
        <a href="https://priscadezigns.org" class="nav-logo"><img src="https://share.zapia.com/57sonyoar08flg9xz5v667" alt="Prisca Dezigns"></a>
        <nav class="nav-links">
            <a href="#templates">Templates</a>
            <a href="#pricing">Pricing</a>
            <a href="#faq">FAQ</a>
            <button id="cart-btn" onclick="openCart()">Cart</button>
        </nav>
    </header>

    <div class="cat-pills" id="cat-pills">
        <button class="cat-pill active" data-cat="all">✦ All</button>
        <button class="cat-pill" data-cat="coach">Coaches</button>
        <button class="cat-pill" data-cat="consultant">Consultants</button>
        <button class="cat-pill" data-cat="ecommerce">Online Store</button>
    </div>

    <div class="t-grid" id="t-grid">
        <!-- Template cards go here -->
    </div>

    <div class="features">
        <!-- Features section -->
    </div>

    <script src="/templates/chatbot.js?v=conv61"></script>
    <script>
        (function() {
            // Load templates
            const templates = [
                { name: 'Consult', id: '06', cat: 'consultant', preview: '/template_previews/consult.webp', url: '/templates/consult/' },
                { name: 'Craft', id: '07', cat: 'artist', preview: '/template_previews/craft.webp', url: '/templates/craft/' },
                { name: 'Launch', id: '08', cat: 'ecommerce', preview: '/template_previews/launch.webp', url: '/templates/launch/' },
                { name: 'Pulse', id: '23', cat: 'consultant', preview: '/template_previews/pulse.webp', url: '/templates/pulse/' },
                { name: 'Obvious', id: '11', cat: 'coach', preview: '/template_previews/obvious.webp', url: '/templates/obvious/' },
                { name: 'Sol', id: '16', cat: 'coach', preview: '/template_previews/sol.webp', url: '/templates/sol/' },
                { name: 'Vivid', id: '40', cat: 'ecommerce', preview: '/template_previews/vivid.webp', url: '/templates/vivid/' }
            ];

            const grid = document.getElementById('t-grid');
            templates.forEach(t => {
                const card = document.createElement('div');
                card.className = 't-card';
                card.innerHTML = `
                    <div class="t-iframe-placeholder" onclick="window.open('${t.url}', '_blank')">
                        <img class="t-thumb-img" src="${t.preview}" alt="${t.name}" style="width:100%;height:100%;object-fit:cover;transition:transform 0.6s ease;">
                    </div>
                    <div class="t-info" style="padding:16px;">
                        <div class="t-name" style="font-weight:700;font-family:Syne;">${t.name}</div>
                        <div class="t-tag" style="font-size:12px;color:#888;">#${t.id} · ${t.cat}</div>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Cinematic Hover
            function initCin() {
                document.querySelectorAll('.t-iframe-placeholder').forEach(ph => {
                    if (ph.dataset.cin) return; ph.dataset.cin = '1';
                    const o = document.createElement('div'); o.className = 'cinematic-overlay'; ph.appendChild(o);
                    const l = document.createElement('div'); l.className = 'cinematic-label'; l.textContent = 'View Preview'; ph.appendChild(l);
                    ph.onmousemove = e => {
                        const r = ph.getBoundingClientRect();
                        ph.style.setProperty('--x', ((e.clientX - r.left) / r.width) * 100 + '%');
                        ph.style.setProperty('--y', ((e.clientY - r.top) / r.height) * 100 + '%');
                    };
                    ph.onmouseenter = () => {
                        const img = ph.querySelector('img');
                        if (img) img.style.transform = 'scale(1.1)';
                    };
                    ph.onmouseleave = () => {
                        const img = ph.querySelector('img');
                        if (img) img.style.transform = 'scale(1)';
                    };
                });
            }
            initCin();
            new MutationObserver(initCin).observe(grid, { childList: true });
        })();
    </script>
</body>
</html>
