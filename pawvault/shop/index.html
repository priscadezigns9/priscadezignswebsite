<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>The Vault | Paw Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FF8C00; --bg: #050508; --text: #FFFFFF; --border: rgba(255,255,255,0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        nav { padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { display: flex; align-items: center; text-decoration: none; color: #fff; }
        .logo img { height: 40px; margin-right: 15px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 80px 5%; }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 3rem; margin-bottom: 50px; text-align: center; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; }
        .card { background: #0D0D14; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; padding: 25px; transition: 0.3s; text-decoration: none; color: inherit; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .img-box { aspect-ratio: 1/1; background: #fff; margin-bottom: 25px; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 25px; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .item-category { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); font-weight: 700; margin-bottom: 10px; }
        .item-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; margin-bottom: 10px; font-size: 1.2rem; line-height: 1.2; }
        .item-price { font-weight: 700; font-size: 1.1rem; color: #fff; margin-bottom: 20px; }
        .btn { display: inline-block; width: 100%; text-align: center; background: var(--accent); color: #fff; padding: 12px; border-radius: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav>
        <a href="../" class="logo">
            <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/logos/paw-vault-logo.png" alt="Paw Vault">
            <span style="font-family:'Space Grotesk'; font-weight:700; letter-spacing:1px;">PAW VAULT</span>
        </a>
    </nav>
    <div class="container">
        <h1>THE VAULT</h1>
        <div class="grid">
            <a href="https://www.amazon.com/dp/B00V3E7C64?tag=priscadezigns-20" class="card" target="_blank">
                <div class="item-category">Nutrition</div>
                <div class="img-box"><img src="https://m.media-amazon.com/images/I/81B-8tM+xPL._AC_SL1500_.jpg" alt="Pet Food"></div>
                <div class="item-title">Orijen Amazing Grains Adult Dry Dog Food</div>
                <div class="item-price">$94.99</div>
                <div class="btn">Secure Item</div>
            </a>
            <a href="https://www.amazon.com/dp/B07P7L9M9K?tag=priscadezigns-20" class="card" target="_blank">
                <div class="item-category">Smart Home</div>
                <div class="img-box"><img src="https://m.media-amazon.com/images/I/71RoxAM5DVL._AC_SL1500_.jpg" alt="Furbo Camera"></div>
                <div class="item-title">Furbo 360° Dog Camera</div>
                <div class="item-price">$210.00</div>
                <div class="btn">Secure Item</div>
            </a>
            <a href="https://www.amazon.com/dp/B00XPX6S16?tag=priscadezigns-20" class="card" target="_blank">
                <div class="item-category">Hygiene</div>
                <div class="img-box"><img src="https://m.media-amazon.com/images/I/61PQSiTkywL._AC_SL1500_.jpg" alt="Pet Fountain"></div>
                <div class="item-title">PetSafe Drinkwell Multi-Tier Pet Fountain</div>
                <div class="item-price">$29.99</div>
                <div class="btn">Secure Item</div>
            </a>
        </div>
    </div>
</body>
</html>
