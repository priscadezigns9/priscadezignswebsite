<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupyx | Context-Aware AI Writing</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap">
    <style>
        :root { --primary: #00FFAA; --bg: #000; --card: #111; --border: #333; }
        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: #fff; margin:0; line-height:1.6; }
        header { padding: 40px 6%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 12px 24px; border-radius: 8px; font-weight: 700; text-decoration: none; cursor: pointer; border: none; }
        .btn-primary { background: var(--primary); color: #000; }
        .hero { padding: 100px 6%; text-align: center; }
        .hero h1 { font-size: 4rem; color: var(--primary); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 0 6% 100px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 40px; border-radius: 12px; }
        .pay-modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:2000; backdrop-filter:blur(5px); }
        .pay-modal-overlay.open { display:flex; }
        .pay-modal-box { background:#fff; color:#000; padding:40px; border-radius:16px; width:90%; max-width:450px; position:relative; }
    </style>
</head>
<body>
    <header>
        <a href="https://priscadezigns.org"><img src="/logos/PRISCA_ICON_LOGO.png" height="50"></a>
        <a href="javascript:void(0)" onclick="openPayModal('Cupyx Access', 'Custom')" class="btn btn-primary">Request Access</a>
    </header>
    <section class="hero">
        <h1>Cupyx</h1>
        <p>Strategic AI Writing for Digital Empires.</p>
    </section>
    <div class="grid">
        <div class="card">
            <h3>Starter</h3>
            <p>$297/mo</p>
            <button onclick="openPayModal('Cupyx Starter', '$297/mo')" class="btn btn-primary">Select</button>
        </div>
        <div class="card">
            <h3>Scale</h3>
            <p>$597/mo</p>
            <button onclick="openPayModal('Cupyx Scale', '$597/mo')" class="btn btn-primary">Select</button>
        </div>
    </div>

    <div class="pay-modal-overlay" id="payModal">
      <div class="pay-modal-box">
        <button onclick="closePayModal()" style="position:absolute; top:20px; right:20px; border:none; background:none; font-size:1.5rem; cursor:pointer;">✕</button>
        <h3 id="pay-plan-title">Request Access</h3>
        <p id="pay-plan-price" style="font-weight:700; color:#00FFAA;"></p>
        <form id="leadForm" onsubmit="submitLead(event)">
            <input type="hidden" id="selectedPackage">
            <input type="text" id="leadName" placeholder="Name" required style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
            <input type="email" id="leadEmail" placeholder="Email" required style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
            <textarea id="leadDetail" placeholder="Briefly describe your goals" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; height:100px;"></textarea>
            <button type="submit" id="submitBtn" style="width:100%; padding:14px; background:#000; color:#00FFAA; border:none; border-radius:8px; font-weight:700; cursor:pointer;">Send Request</button>
        </form>
        <div id="successMsg" style="display:none; text-align:center;">
            <h3>Request Sent</h3>
            <p>We'll reach out to start your automated writing workflow.</p>
        </div>
      </div>
    </div>

    <script>
    function openPayModal(plan, price) {
      document.getElementById('pay-plan-title').textContent = plan;
      document.getElementById('pay-plan-price').textContent = price;
      document.getElementById('selectedPackage').value = plan + ' (' + price + ')';
      document.getElementById('payModal').classList.add('open');
    }
    function closePayModal() { document.getElementById('payModal').classList.remove('open'); }
    async function submitLead(event) {
        event.preventDefault();
        const btn = document.getElementById('submitBtn');
        const name = document.getElementById('leadName').value;
        const email = document.getElementById('leadEmail').value;
        const details = document.getElementById('leadDetail').value;
        const pack = document.getElementById('selectedPackage').value;
        btn.disabled = true; btn.textContent = 'Sending...';
        try {
            const response = await fetch('https://sktpjacowqaedddtrhuz.supabase.co/rest/v1/leads', {
                method: 'POST',
                headers: {
                    'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdHBqYWNvd3FhZWRkZHRyaHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDk5MzEsImV4cCI6MjA5NDIyNTkzMX0.FK4N_ATFTaUuGXrYu_7OBn3qCdlo0rOzxk-E6TxJxqs',
                    'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdHBqYWNvd3FhZWRkZHRyaHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDk5MzEsImV4cCI6MjA5NDIyNTkzMX0.FK4N_ATFTaUuGXrYu_7OBn3qCdlo0rOzxk-E6TxJxqs',
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({ name: name, email: email, package: pack, category: 'Cupyx Writing', details: details })
            });
            if (response.ok) { document.getElementById('leadForm').style.display = 'none'; document.getElementById('successMsg').style.display = 'block'; }
            else { alert('Try again.'); btn.disabled = false; btn.textContent = 'Send Request'; }
        } catch (err) { alert('Connection error.'); btn.disabled = false; }
    }
    </script>
</body>
</html>
