<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupyx Onboarding | Relationship Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050508; --text: #F8FAFC; --accent: #14B8A6; --card: #0F172A; --border: rgba(20, 184, 166, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Plus Jakarta Sans", sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { width: 100%; max-width: 450px; background: var(--card); padding: 60px 40px; border-radius: 40px; border: 1px solid var(--border); box-shadow: 0 40px 100px rgba(0,0,0,0.5); text-align: center; }
        h1 { font-size: 2.2rem; margin-bottom: 10px; font-weight: 800; }
        p { color: #94A3B8; font-size: 0.9rem; margin-bottom: 40px; }
        .field { text-align: left; margin-bottom: 25px; }
        label { font-weight: 800; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; display: block; color: var(--accent); }
        input, select { width: 100%; padding: 20px; border-radius: 16px; border: 1px solid var(--border); background: #080C14; font-size: 1rem; outline: none; color: white; }
        input:focus { border-color: var(--accent); background: #0F172A; }
        .btn-submit { width: 100%; background: var(--accent); color: #fff; padding: 20px; border-radius: 100px; font-weight: 800; font-size: 0.8rem; letter-spacing: 3px; border: none; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit:disabled { background: #334155; cursor: not-allowed; }
        #msg { margin-top: 20px; font-weight: 800; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Cupyx Lab</h1>
        <p>Submit your details to activate your Intelligence Package.</p>
        <form id="signup-form">
            <div class="field">
                <label>Name</label>
                <input type="text" id="name" placeholder="Your Name" required>
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" id="contact" placeholder="email@example.com" required>
            </div>
            <div class="field">
                <label>Selected Package</label>
                <select id="package" required>
                    <option value="Narrative Flow">Narrative Flow - $89/mo</option>
                    <option value="Deep Research">Deep Research - $249/mo</option>
                </select>
            </div>
            <button type="submit" class="btn-submit" id="submit-btn">ACTIVATE INTELLIGENCE</button>
        </form>
        <div id="msg"></div>
    </div>

    <script>
        const SB_URL = "https://sktpjacowqaedddtrhuz.supabase.co";
        const SB_KEY = "{{credential:supabase-anon-key}}"; 
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const form = document.getElementById("signup-form");
        const btn = document.getElementById("submit-btn");
        const msg = document.getElementById("msg");

        const urlParams = new URLSearchParams(window.location.search);
        const pkg = urlParams.get("pkg");
        if (pkg) {
            document.getElementById("package").value = pkg;
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "SYNCHRONIZING...";
            msg.innerText = "";

            const data = {
                name: document.getElementById("name").value,
                email: document.getElementById("contact").value,
                package: document.getElementById("package").value,
                brand: "Cupyx",
                created_at: new Date().toISOString()
            };

            const { error } = await supabaseClient.from("client_leads").insert([data]);

            if (error) {
                console.error(error);
                msg.style.color = "#EF4444";
                msg.innerText = "ERROR: CONNECTION FAILED";
                btn.disabled = false;
                btn.innerText = "RETRY ACTIVATION";
            } else {
                msg.style.color = "var(--accent)";
                msg.innerText = "INTELLIGENCE ANCHORED. WE WILL CONTACT YOU SHORTLY.";
                form.reset();
                btn.innerText = "SUCCESS";
            }
        };
    </script>
</body>
</html>
