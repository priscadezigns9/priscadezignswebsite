<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>The Sage | Dreaming Anime</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FF3E81; --bg: #fff; --text: #111; --border: #eee; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }

        header { position: fixed; top: 0; width: 100%; padding: 25px 8%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; color: #000; }
        
        .hero { min-height: 100vh; padding: 180px 8% 100px; text-align: center; }
        .tag { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 4px; color: var(--accent); font-weight: 900; margin-bottom: 20px; }
        h1 { font-size: clamp(3rem, 10vw, 7rem); font-weight: 900; line-height: 0.9; margin-bottom: 60px; }

        .interface { background: #fafafa; border: 1px solid var(--border); padding: 60px; max-width: 900px; margin: 0 auto; border-radius: 4px; }
        .input-group { display: flex; gap: 20px; margin-top: 20px; }
        input { flex: 1; padding: 20px; border: 1px solid var(--border); font-family: inherit; font-size: 1.1rem; }
        .run-btn { padding: 0 40px; background: #000; color: #fff; border: none; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }

        #ai-result { margin-top: 60px; }
        .report { text-align: left; animation: fadeIn 1s; border-top: 2px solid #000; padding-top: 40px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 30px; }
        .metric-box { padding: 25px; border: 1px solid var(--border); background: #fff; }
        .m-label { font-size: 0.6rem; text-transform: uppercase; color: #888; margin-bottom: 10px; font-weight: 900; }
        .m-val { font-size: 1.2rem; font-weight: 700; }

        .acq-btn { display: inline-block; width: 100%; text-align: center; background: #000; color: #fff; text-decoration: none; padding: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; margin-top: 40px; }

        footer { padding: 100px 8% 50px; text-align: center; border-top: 1px solid var(--border); opacity: 0.3; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; }
    </style>
</head>
<body>
    <header>
        <a href="../" class="logo">DREAMING ANIME</a>
        <nav><a href="../shop/" style="color:#000; text-decoration:none; font-weight:700; font-size:0.7rem; text-transform:uppercase; letter-spacing:1px;">Market</a></nav>
    </header>

    <main class="hero">
        <span class="tag">Neural Otaku Sage V1.0</span>
        <h1>Cultural Intelligence.</h1>

        <div class="interface">
            <p style="color:#888; margin-bottom:40px; text-transform:uppercase; letter-spacing:3px; font-size:0.8rem;">Identify Series or Character for Archival Analysis</p>
            <div class="input-group">
                <input type="text" id="ai-input" placeholder="e.g. Neon Genesis Evangelion, unit-01, aesthetic..." autocomplete="off">
                <button class="run-btn" onclick="runSage()">Analyze</button>
            </div>
            <div id="ai-result"></div>
        </div>
    </main>

    <footer>© 2026 DREAMING ANIME // ARCHIVAL ANIME INTELLIGENCE</footer>

    <script>
    function runSage() {
        const input = document.getElementById('ai-input').value.trim();
        const res = document.getElementById('ai-result');
        if(!input) return;

        res.innerHTML = '<p style="text-align:center; font-weight:700; letter-spacing:4px; margin-top:40px; color:var(--accent);">ANALYZING CULTURAL RESONANCE...</p>';

        setTimeout(() => {
            const query = input.toLowerCase(); const tag = "priscadezigns-20";
            let rank = "High-Fidelity"; let significance = "Tier 1";
            
            res.innerHTML = `
                <div class="report">
                    <span class="tag" style="font-size:0.6rem;">Scan Complete // Mimi Analysis Active</span>
                    <h2 style="font-size:2.5rem; margin:10px 0 30px;">Intelligence Readout</h2>
                    
                    <div class="metric-grid">
                        <div class="metric-box"><div class="m-label">Aesthetic Rank</div><div class="m-val">${rank}</div></div>
                        <div class="metric-box"><div class="m-label">Cultural Signif.</div><div class="m-val">${significance}</div></div>
                        <div class="metric-box"><div class="m-label">Longevity</div><div class="m-val">Archival</div></div>
                    </div>

                    <p style="color:#666; font-size:0.9rem;">Intelligence confirms "${input}" as a foundational node in modern anime culture. The aesthetic signals are stable and highly recommended for archival collection.</p>

                    <a href="https://www.amazon.com/s?k=${encodeURIComponent(input)}+anime+merchandise&tag=${tag}" target="_blank" class="acq-btn">Acquire Sourced Artifacts →</a>
                </div>
            `;
        }, 1800);
    }
    </script>
</body>
</html>
