        .hero { padding: 80px 20px; text-align: center; background: #1a202c; }
        .section { padding: 50px 5%; border-top: 1px solid #333; }

        footer a { color: #666; margin: 0 15px; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        footer a:hover { color: #f56565; }
    </style>
</head>
