<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreaming Anime — The Sovereign Hub</title>
    <link rel="icon" type="image/png" href="/logos/dreaming-anime-logo-round.png">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    
<style>
    :root { 
        --accent: #FF6B00; 
        --bg: #FFFFFF; 
        --text: #000000;
        --border: #000000;
    }
    
    body { 
        background: var(--bg); 
        color: var(--text); 
        font-family: 'Inter', sans-serif; 
        margin: 0; 
        overflow-x: hidden; 
    }

    nav { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        padding: 25px 5%; 
        background: #fff; 
        border-bottom: 2px solid #eee;
    }
    .nav-logo { 
        font-weight: 900; 
        font-size: 1.2rem; 
        text-transform: uppercase; 
        text-decoration: none; 
        color: #000; 
        display: flex; 
        align-items: center; 
        gap: 10px;
    }
    .nav-logo img { height: 30px; }
    .nav-links { display: flex; gap: 30px; align-items: center; }
    .nav-links a { 
        text-decoration: none; 
        color: #000; 
        font-weight: 700; 
        font-size: 0.8rem; 
        text-transform: uppercase; 
    }
    .nav-links .watch-btn { 
        background: #000; 
        color: #fff; 
        padding: 8px 20px; 
        border-radius: 100px; 
    }

    .hero { 
        padding: 80px 5%;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
    }
    .hero-container-box {
        border: 10px solid #000;
        padding: 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 1200px;
        width: 100%;
        background: #fff;
    }
    .hero-content { flex: 1; }
    .hero-content h1 { 
        font-size: 7rem; 
        line-height: 0.8; 
        font-weight: 900; 
        margin: 0; 
        letter-spacing: -4px;
        text-transform: uppercase;
    }
    .hero-content h1 span { color: var(--accent); display: block; }
    .mimi-side { width: 450px; margin-right: -40px; }
    .mimi-hero { width: 100%; height: auto; display: block; filter: drop-shadow(0 0 30px rgba(0,0,0,0.1)); }
    .btn-wrap { display: flex; gap: 20px; margin-top: 50px; }
    .btn-main { background: #000; color: #fff; padding: 18px 40px; text-decoration: none; font-weight: 900; font-size: 0.9rem; text-transform: uppercase; }
    .btn-secondary { background: transparent; color: #000; padding: 18px 40px; text-decoration: none; font-weight: 900; font-size: 0.9rem; text-transform: uppercase; border: 3px solid #000; }

    .grid-section { padding: 80px 5%; background: #f9f9f9; }
    .grid-section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px; }
    .section-title { font-size: 2.5rem; font-weight: 900; margin: 0; text-transform: uppercase; }
    .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; }
    .anime-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border: 4px solid #000; transition: 0.3s; }
    .anime-card:hover img { transform: translate(-5px, -5px); box-shadow: 10px 10px 0 #000; }
    .anime-card-info h3 { font-size: 0.9rem; font-weight: 900; margin: 15px 0 5px 0; text-transform: uppercase; }

    footer { padding: 60px 5%; text-align: center; border-top: 4px solid #000; font-weight: 900; text-transform: uppercase; font-size: 0.7rem; }
    
    .sidebar { position: fixed; right: -400px; top: 0; width: 400px; height: 100vh; background: rgba(5,5,5,0.98); backdrop-filter: blur(25px); border-left: 1px solid #222; transition: 0.5s; z-index: 10000; overflow-y: auto; color: white; }
    .sidebar.active { right: 0; }
    .close-btn { background: none; border: none; color: #555; font-size: 2rem; cursor: pointer; }
    </style></head>
<body>

    <!-- NAV -->
    <nav>
        <a class="nav-logo" href="/dreaminganime/">
            <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/dreaminganime_logo.png" alt="Dreaming Anime" onerror="this.style.display='none'">
            Dreaming Anime
        </a>
        <div class="nav-links">
            <a href="manga.html">Manga</a>
            <a href="/dreaminganime/shop/">Shop</a>
            <a href="cinema.html" class="watch-btn">▶ Watch</a>
        </div>
    </nav>

    <!-- HERO -->
    
    
    
    <section class="hero">
        <div class="hero-container-box">
            <div class="hero-content">
                <h1>LIVE THE<br><span>ANIME</span><br>LIFE.</h1>
                <div class="btn-wrap">
                    <a href="cinema.html" class="btn-main">Watch Now</a>
                    <a href="manga.html" class="btn-secondary">Manga Vault</a>
                </div>
            </div>
            <div class="mimi-side">
                <img src="../assets/mimi-hero.webp" class="mimi-hero" alt="Mimi">
            </div>
        </div>
    </section>
    
    


    <!-- NOW AIRING GRID -->
    <section class="grid-section">
        <div class="grid-section-header">
            <div>
                <p class="section-label">This Season</p>
                <h2 class="section-title">Now Airing</h2>
            </div>
            <a href="cinema.html" class="see-all">Full Cinema →</a>
        </div>
        <div class="anime-grid" id="anime-grid">
            <div class="loading-state">LOADING SOVEREIGN SIGNAL...</div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 <a href="/">Priscion</a> · Dreaming Anime · All rights reserved.</p>
    </footer>

    <script>
        // Load seasonal anime from Jikan API into the grid
        async function loadSeasonalAnime() {
            const grid = document.getElementById('anime-grid');
            try {
                const res = await fetch('https://api.jikan.moe/v4/seasons/now?limit=12');
                const data = await res.json();
                if (!data.data || !data.data.length) throw new Error('No data');
                grid.innerHTML = data.data.map(a => `
                    <a class="anime-card" href="cinema.html" title="${a.title}">
                        <img src="${a.images.jpg.large_image_url}" alt="${a.title}" loading="lazy">
                        <div class="anime-card-info">
                            <h3>${a.title}</h3>
                            <span>${a.type || 'TV'} · ★ ${a.score || 'N/A'}</span>
                        </div>
                    </a>
                `).join('');
            } catch(e) {
                grid.innerHTML = '<div class="loading-state">TUNE IN AT MIMI\'S THEATER</div>';
            }
        }
        loadSeasonalAnime();
    </script>

<div id="sidebar" class="sidebar"><div class="sidebar-header"><h2 style="font-family:'Playfair Display'; font-size:1.1rem; color:white; margin:0;">PRISCION WALLET</h2><button onclick="toggleSidebar()" class="close-btn">&times;</button></div><div class="sidebar-tabs"><button id="tab-assets" onclick="switchWalletTabCore('assets')">Assets</button><button id="tab-vault" onclick="switchWalletTabCore('vault')">Vault</button><button id="tab-shop" onclick="switchWalletTabCore('shop')">Hub</button><button id="tab-sync" onclick="switchWalletTabCore('sync')">Security</button></div><div id="wallet-main-view"></div></div><script src="../wallet-core.js"></script><script>function toggleSidebar(){ const s=document.getElementById('sidebar'); s.classList.toggle('active'); if(s.classList.contains('active')){ if(typeof initializeWallet==='function') initializeWallet('sidebar'); } }</script></body>
</html>
