<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreaming Anime | Sovereign Cinema Node</title>
    <link rel="icon" type="image/png" href="/logos/dreaming-anime-logo-round.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@400;600;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FF6B00; --bg: #000; --text: #fff; --card-bg: #050505; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 5%; border-bottom: 1px solid #111; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; }
        .nav-logo { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; text-decoration: none; color: #fff; display: flex; align-items: center; gap: 10px; }
        .nav-logo img { height: 30px; }
        
        .hero { padding: 80px 5% 40px; text-align: center; background: radial-gradient(circle at center, #1a0b2e 0%, #000 70%); }
        .hero h1 { font-family: 'Playfair Display'; font-size: 5rem; font-weight: 900; margin: 0; line-height: 0.9; letter-spacing: -3px; text-transform: uppercase; }
        .hero p { font-weight: 700; opacity: 0.7; margin-top: 20px; font-size: 1.2rem; }

        .theater-wrap { margin: 60px auto; width: 90%; max-width: 1200px; aspect-ratio: 16/9; border: 4px solid #fff; position: relative; background: #111; display: flex; align-items: center; justify-content: center; }
        .theater-wrap::before { content: 'SOVEREIGN SIGNAL: ARCHIVED'; position: absolute; top: -25px; right: 20px; background: var(--accent); color: #fff; padding: 5px 15px; font-family: 'Space Mono'; font-size: .6rem; font-weight: 900; z-index: 10; }
        .theater-wrap video { width: 100%; height: 100%; object-fit: cover; }

        .grid-section { padding: 60px 5%; }
        .section-header { margin-bottom: 40px; border-left: 5px solid var(--accent); padding-left: 20px; }
        .section-label { font-family: 'Space Mono'; font-size: 0.7rem; text-transform: uppercase; color: var(--accent); margin: 0; }
        .section-title { font-family: 'Playfair Display'; font-size: 2.5rem; margin: 5px 0 0; text-transform: uppercase; }

        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { border: 4px solid #222; padding: 20px; cursor: pointer; transition: 0.3s; background: var(--card-bg); position: relative; overflow: hidden; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card .id { font-family: 'Space Mono'; font-size: .6rem; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; }
        .card .title { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; }
        
        footer { padding: 60px 5%; border-top: 1px solid #111; text-align: center; font-size: 0.8rem; opacity: 0.5; font-family: 'Space Mono'; }
        a { color: var(--accent); text-decoration: none; }
        
        @media (max-width: 768px) { .hero h1 { font-size: 3rem; } }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">
            <img src="../assets/p-logo.png" alt="P">
            <span>Dreaming Anime</span>
        </a>
        <div style="font-family:'Space Mono'; font-size:0.7rem; color:var(--accent);">HANDLE: $dreaminganime.prn</div>
    </nav>

    <section class="hero">
        <h1>Unstoppable<br>Cinema.</h1>
        <p>The First Fully Sovereign Anime Node. Powered by the Priscion Ledger.</p>
    </section>

    <div class="theater-wrap" id="theater">
        [ SELECT NEURAL SIGNAL TO START STREAMING ]
    </div>

    <section class="grid-section">
        <div class="section-header">
            <p class="section-label">Archive Registry</p>
            <h2 class="section-title">Sovereign Episodes</h2>
        </div>
        <div class="anime-grid" id="manifest">
            <!-- Dynamic Content -->
        </div>
    </section>

    <footer>
        © 2026 PRISCION EMPIRE · ANCHORED TO LEDGER · GLOBAL SIGNAL
    </footer>

    <script src="../wallet-core.js"></script>
    <script>
        async function load(){
            try {
                const r = await fetch('../vault_manifest.json');
                const d = await r.json();
                const eps = d.filter(i => i.type === "Cinema/Episode");
                const grid = document.getElementById('manifest');
                if(eps.length === 0) {
                    grid.innerHTML = '<div style="font-family:Space Mono; opacity:0.5;">NO SIGNALS DETECTED ON LEDGER</div>';
                    return;
                }
                grid.innerHTML = eps.map(e => `
                    <div class="card" onclick="play('${e.url}','${e.name}')">
                        <div class="id">${e.handle}</div>
                        <div class="title">${e.name}</div>
                    </div>
                `).join('');
            } catch(e) { console.error("Ledger Sync Error:", e); }
        }

        function play(u, n){
            const t = document.getElementById('theater');
            t.innerHTML = `
                <video controls autoplay poster="../assets/p-logo.png">
                    <source src="${u}" type="video/mp4">
                    Signal blocked by Web2. Use LEGGO.
                </video>
                <div style="position:absolute; bottom:20px; left:20px; font-family:'Space Mono'; font-size:.7rem; background:rgba(0,0,0,0.8); padding:10px; border:1px solid var(--accent); z-index:100;">
                    NOW STREAMING: ${n}
                </div>
            `;
            t.scrollIntoView({ behavior: 'smooth' });
            if(typeof recordSearch === 'function') recordSearch();
        }

        window.onload = () => {
            load();
            if(typeof initializeWallet === "function") initializeWallet("sidebar");
        };
    </script>
</body>
</html>
