<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreaming Anime | Sovereign Gateway</title>
    <link rel="icon" type="image/png" href="/logos/dreaming-anime-logo-round.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@400;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FF6B00; --bg: #ffffff; --text: #000000; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .grid-container { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; padding: 5%; }
        .header { grid-column: span 12; border: 4px solid #000; padding: 40px; background: #fff; position: relative; text-align: center; }
        .header h1 { font-family: 'Playfair Display'; font-size: 5rem; font-weight: 900; margin: 0; text-transform: uppercase; line-height: 0.9; letter-spacing: -3px; }
        .handle { font-family: 'Space Mono'; color: var(--accent); font-size: 1.2rem; margin-top: 10px; }
        
        .mimi-hero { grid-column: span 12; display: flex; justify-content: center; align-items: center; padding: 40px 0; }
        .mimi-hero img { width: 300px; height: auto; filter: drop-shadow(10px 10px 0px #000); }

        .gateways { grid-column: span 12; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .gateway-card { border: 4px solid #000; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; background: #fff; text-decoration: none; color: inherit; }
        .gateway-card:hover { transform: translate(-5px, -5px); box-shadow: 10px 10px 0px var(--accent); background: #f9f9f9; }
        .gateway-card .icon { font-size: 3rem; margin-bottom: 20px; }
        .gateway-card .title { font-weight: 900; font-size: 2rem; text-transform: uppercase; margin-bottom: 10px; }
        .gateway-card .desc { font-family: 'Space Mono'; font-size: 0.7rem; opacity: 0.6; text-transform: uppercase; }

        footer { grid-column: span 12; padding: 40px; border-top: 4px solid #000; text-align: center; font-family: 'Space Mono'; font-size: 0.8rem; }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 3rem; }
            .gateways { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <header class="header">
            <h1>Dreaming Anime</h1>
            <div class="handle">$dreaminganime.prn</div>
            <div style="position:absolute; top:20px; right:20px; font-family:'Space Mono'; font-size:0.7rem; font-weight:900;">PRISCION LEDGER VERIFIED</div>
        </header>

        <div class="mimi-hero">
            <img src="../assets/mimi-hero.webp" alt="Mimi">
        </div>

        <div class="gateways">
            <a href="cinema.html" class="gateway-card">
                <div class="icon">⛩️</div>
                <div class="title">Cinema</div>
                <div class="desc">Sovereign Signal & Archival Hosting</div>
            </a>
            <a href="manga.html" class="gateway-card">
                <div class="icon">📖</div>
                <div class="title">Vault</div>
                <div class="desc">High-Fidelity Manga Archive</div>
            </a>
            <a href="shop.html" class="gateway-card">
                <div class="icon">🛍️</div>
                <div class="title">Laboratory</div>
                <div class="desc">Limited Edition Apparel & Gear</div>
            </a>
        </div>

        <footer>
            © 2026 PRISCION EMPIRE · THE ONE EMPIRE RULE · BEYOND CONTROL
        </footer>
    </div>
    <script src="../wallet-core.js"></script>
    <script>
        window.onload = () => {
            if(typeof recordSearch === 'function') recordSearch();
            if(typeof initializeWallet === "function") initializeWallet("sidebar");
        };
    </script>
</body>
</html>
