<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Dreaming Cinema</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@400;900&display=swap"><style>body{background:#000;color:#fff;font-family:Inter,sans-serif;margin:0;padding:5%;overflow-x:hidden}h1{font-family:Playfair Display;font-size:3rem;margin-bottom:10px}.theater{width:100%;aspect-ratio:16/9;background:#111;border:4px solid #7B35D4;margin-top:40px;display:flex;align-items:center;justify-content:center;position:relative}.theater::after{content:"DREAMING CINEMA: SECURE SIGNAL";position:absolute;top:-20px;left:20px;background:#7B35D4;padding:5px 15px;font-size:.6rem;font-weight:900}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-top:40px}.card{border:2px solid #222;padding:15px;cursor:pointer;transition:.3s}.card:hover{border-color:#7B35D4;transform:translateY(-5px)}</style></head><body><h1>⛩️ Dreaming Cinema</h1><p>High-Fidelity Sovereign Hosting. Uncensored. Unstoppable.</p><div class="theater" id="player"> [ ARCHITECT SIGNAL: SELECT EPISODE ] </div><div class="grid" id="episodes"></div><script>const eps=[{t:"Solo Leveling S2 - EP 01",u:"https://archive.org/download/solo-leveling-s2-e1/solo.mp4"},{t:"Re:Zero S4 - EP 01",u:"https://archive.org/download/rezero-s4-e1/rezero.mp4"}];document.getElementById("episodes").innerHTML=eps.map(e=>`<div class="card" onclick="play('${e.u}')"><div style="font-weight:900">${e.t}</div><div style="font-size:.6rem;color:#444;margin-top:5px">${e.u}</div></div>`).join("");function play(u){document.getElementById("player").innerHTML='<video controls width="100%" src="'+u+'" autoplay></video>';}</script></body></html>
