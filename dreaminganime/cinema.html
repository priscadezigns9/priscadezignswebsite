<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Dreaming Cinema | Sovereign Signal</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@400;700;900&family=Space+Mono:wght@700&display=swap"><style>:root{--accent:#7B35D4;--bg:#000}body{background:var(--bg);color:#fff;font-family:Inter,sans-serif;margin:0;padding:5%;overflow-x:hidden}h1{font-family:Playfair Display;font-size:4rem;margin-bottom:10px;letter-spacing:-2px}p{font-weight:700;opacity:0.7}.theater-wrap{margin-top:40px;border:4px solid #fff;position:relative;background:#111;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center}.theater-wrap::before{content:'SOVEREIGN SIGNAL: ARCHIVED';position:absolute;top:-25px;right:20px;background:#7B35D4;color:#fff;padding:5px 15px;font-family:'Space Mono';font-size:.6rem;font-weight:900;z-index:10}.theater-wrap video{width:100%;height:100%;object-fit:cover}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:50px}.card{border:4px solid #222;padding:20px;cursor:pointer;transition:.3s;background:#050505}.card:hover{border-color:var(--accent);transform:translateY(-5px)}.card .id{font-family:'Space Mono';font-size:.6rem;color:var(--accent);margin-bottom:10px;text-transform:uppercase}.card .title{font-weight:900;font-size:1.2rem;text-transform:uppercase}</style></head><body><h1>⛩️ DREAMING CINEMA</h1><p>High-Fidelity Neural Hosting. Beyond Crunchyroll. Beyond Control.</p><div class="theater-wrap" id="theater"> [ SELECT NEURAL SIGNAL ] </div><div class="grid" id="manifest"></div><script>async function load(){const r=await fetch('../vault_manifest.json');const d=await r.json();const eps=d.filter(i=>i.type==="Cinema/Episode");document.getElementById('manifest').innerHTML=eps.map(e=>`<div class="card" onclick="play('${e.url}','${e.name}')"><div class="id">${e.handle}</div><div class="title">${e.name}</div></div>`).join('')}function play(u,n){document.getElementById('theater').innerHTML=`<video controls autoplay poster="../assets/p-logo.png"><source src="${u}" type="video/mp4">Your signal is blocked by Web2.</video><div style="position:absolute;bottom:20px;left:20px;font-family:'Space Mono';font-size:.7rem;background:rgba(0,0,0,0.8);padding:10px;border:1px solid var(--accent);">NOW STREAMING: ${n}</div>`}window.onload=load</script></body></html>
