<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreaming Cinema | Sovereign Signal Hub</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@400;700;900&family=Space+Mono:wght@700&display=swap">
    <style>
        :root { --accent: #FF6B00; --bg: #000; --text: #fff; --card-bg: #0a0a0a; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 5%; border-bottom: 1px solid #111; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; }
        .nav-logo { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; text-decoration: none; color: #fff; display: flex; align-items: center; gap: 10px; }
        .nav-logo img { height: 30px; }

        .cinema-container { padding: 40px 5%; max-width: 1400px; margin: 0 auto; }
        .header-section { margin-bottom: 60px; text-align: center; }
        .header-section h1 { font-family: 'Playfair Display'; font-size: 4rem; margin: 0; letter-spacing: -2px; text-transform: uppercase; }
        .header-section p { opacity: 0.6; font-weight: 700; margin-top: 10px; }

        .theater-viewport { width: 100%; aspect-ratio: 16/9; background: #050505; border: 4px solid #fff; position: relative; margin-bottom: 60px; display: flex; align-items: center; justify-content: center; }
        .theater-viewport::before { content: 'SOVEREIGN NEURAL SIGNAL'; position: absolute; top: -25px; left: 20px; background: var(--accent); padding: 5px 15px; font-family: 'Space Mono'; font-size: .6rem; font-weight: 900; z-index: 10; }
        .theater-viewport video { width: 100%; height: 100%; object-fit: contain; }

        .browser-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; }
        .series-card { border: 4px solid #222; background: var(--card-bg); padding: 20px; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .series-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .series-card img { width: 100%; height: 150px; object-fit: cover; border: 1px solid #111; margin-bottom: 15px; }
        .series-card .title { font-weight: 900; font-size: 1.1rem; text-transform: uppercase; margin-bottom: 5px; }
        .series-card .count { font-family: 'Space Mono'; font-size: 0.6rem; color: var(--accent); text-transform: uppercase; }

        .episodes-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; padding: 5%; overflow-y: auto; box-sizing: border-box; }
        .overlay-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .overlay-header h2 { font-family: 'Playfair Display'; font-size: 3rem; margin: 0; }
        .close-btn { font-size: 3rem; cursor: pointer; color: #444; transition: 0.3s; }
        .close-btn:hover { color: #fff; }

        .seasons-nav { display: flex; gap: 20px; margin-bottom: 40px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        .season-tab { font-family: 'Space Mono'; font-size: 0.8rem; font-weight: 900; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .season-tab.active { opacity: 1; color: var(--accent); }

        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .ep-card { border: 2px solid #222; padding: 15px; background: #080808; cursor: pointer; transition: 0.3s; }
        .ep-card:hover { border-color: var(--accent); background: #111; }
        .ep-card .n { font-family: 'Space Mono'; font-size: .6rem; color: var(--accent); margin-bottom: 5px; }
        .ep-card .t { font-weight: 900; font-size: 0.9rem; text-transform: uppercase; }

        footer { text-align: center; padding: 60px 0; border-top: 1px solid #111; font-family: 'Space Mono'; font-size: 0.7rem; opacity: 0.5; margin-top: 60px; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">
            <img src="../assets/p-logo.png" alt="P">
            <span>Dreaming Anime</span>
        </a>
        <div style="font-family:'Space Mono'; font-size:0.7rem; color:var(--accent);">SOVEREIGN SIGNAL HUB</div>
    </nav>

    <div class="cinema-container">
        <header class="header-section">
            <h1>Dreaming Cinema</h1>
            <p>Archive Mastery. All Episodes. All Seasons. No Takedowns.</p>
        </header>

        <div class="theater-viewport" id="theater">
            [ SELECT A SERIES AND EPISODE TO BEGIN NEURAL STREAM ]
        </div>

        <div class="browser-grid" id="series-grid">
            <!-- Dynamic Series Grid -->
        </div>
    </div>

    <div id="episodes-overlay" class="episodes-overlay">
        <div class="overlay-header">
            <div>
                <h2 id="current-series-name">Series Name</h2>
                <div id="current-series-handle" style="font-family:'Space Mono'; color:var(--accent); font-size:0.8rem; margin-top:10px;">$handle.prn</div>
            </div>
            <div class="close-btn" onclick="closeOverlay()">×</div>
        </div>
        <div class="seasons-nav" id="seasons-nav"></div>
        <div class="ep-grid" id="ep-grid"></div>
    </div>

    <footer>
        © 2026 PRISCION EMPIRE · THE ONE EMPIRE RULE · BEYOND CONTROL
    </footer>

    <script src="../wallet-core.js"></script>
    <script>
        let DATA = [];
        let currentSeries = null;
        let currentSeason = 1;

        async function load(){
            try {
                const r = await fetch('../vault_manifest.json');
                DATA = await r.json();
                renderSeries();
            } catch(e) { console.error("Ledger Sync Error:", e); }
        }

        function renderSeries(){
            const grid = document.getElementById('series-grid');
            // Group episodes by brand/series name
            const seriesMap = {};
            DATA.filter(i => i.type === "Cinema/Episode").forEach(ep => {
                const sName = ep.series || ep.name.split(' - ')[0] || "Unknown Series";
                if(!seriesMap[sName]) seriesMap[sName] = { name: sName, eps: [], handle: ep.handle.split('.')[0] + '.series.prn' };
                seriesMap[sName].eps.push(ep);
            });

            grid.innerHTML = Object.values(seriesMap).map(s => `
                <div class="series-card" onclick="openSeries('${s.name}')">
                    <img src="../assets/p-logo.png" style="object-fit:contain; padding:20px; opacity:0.2;">
                    <div class="title">${s.name}</div>
                    <div class="count">${s.eps.length} Episodes Minted</div>
                </div>
            `).join('');
        }

        function openSeries(name){
            currentSeries = name;
            const seriesData = DATA.filter(i => (i.series === name || i.name.startsWith(name)) && i.type === "Cinema/Episode");
            
            document.getElementById('current-series-name').innerText = name;
            document.getElementById('episodes-overlay').style.display = 'block';
            
            // Extract Seasons
            const seasons = [...new Set(seriesData.map(e => e.season || 1))].sort((a,b)=>a-b);
            const nav = document.getElementById('seasons-nav');
            nav.innerHTML = seasons.map(s => `<div class="season-tab ${s===currentSeason?'active':''}" onclick="setSeason(${s})">SEASON ${s}</div>`).join('');
            
            renderEpisodes(seriesData, currentSeason);
        }

        function setSeason(s){
            currentSeason = s;
            const seriesData = DATA.filter(i => (i.series === currentSeries || i.name.startsWith(currentSeries)) && i.type === "Cinema/Episode");
            renderEpisodes(seriesData, s);
            
            const tabs = document.querySelectorAll('.season-tab');
            tabs.forEach((t, i) => {
                t.classList.toggle('active', (i+1) === s);
            });
        }

        function renderEpisodes(data, season){
            const grid = document.getElementById('ep-grid');
            const eps = data.filter(e => (e.season || 1) === season);
            grid.innerHTML = eps.map(e => `
                <div class="ep-card" onclick="play('${e.url}','${e.name}')">
                    <div class="n">SIGNAL: ${e.handle}</div>
                    <div class="t">${e.name}</div>
                </div>
            `).join('');
        }

        function play(u, n){
            const v = document.getElementById('theater');
            v.innerHTML = `<video controls autoplay poster="../assets/p-logo.png"><source src="${u}" type="video/mp4"></video><div style="position:absolute;bottom:20px;left:20px;font-family:'Space Mono';font-size:.7rem;background:rgba(0,0,0,0.8);padding:10px;border:1px solid var(--accent);z-index:100;">NOW STREAMING: ${n}</div>`;
            closeOverlay();
            v.scrollIntoView({ behavior: 'smooth' });
            if(typeof recordSearch === 'function') recordSearch();
        }

        function closeOverlay(){ document.getElementById('episodes-overlay').style.display = 'none'; }

        window.onload = () => {
            load();
            if(typeof initializeWallet === "function") initializeWallet("sidebar");
        };
    </script>
</body>
</html>
