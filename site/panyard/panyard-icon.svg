<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Steelpan outer rim (viewed from above) -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#FF6B2B" stroke-width="3.5"/>
  <!-- Steelpan inner rim / playing surface edge -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="#FF6B2B" stroke-width="2"/>

  <!-- Note dents on the pan surface - arranged in a ring, minimal circles -->
  <ellipse cx="50" cy="22" rx="5" ry="4" fill="none" stroke="#FF6B2B" stroke-width="1.5"/>
  <ellipse cx="66" cy="29" rx="5" ry="4" fill="none" stroke="#FF6B2B" stroke-width="1.5" transform="rotate(45 66 29)"/>
  <ellipse cx="74" cy="46" rx="5" ry="4" fill="none" stroke="#FF6B2B" stroke-width="1.5" transform="rotate(90 74 46)"/>
  <ellipse cx="68" cy="63" rx="5" ry="4" fill="none" stroke="#FF6B2B" stroke-width="1.5" transform="rotate(135 68 63)"/>
  <ellipse cx="52" cy="72" rx="5" ry="4" fill="none" stroke="#FF6B2B" stroke-width="1.5"/>
  <ellipse cx="34" cy="66" rx="5" ry="4" fill="none" stroke="#FF6B2B" stroke-width="1.5" transform="rotate(45 34 66)"/>
  <ellipse cx="26" cy="50" rx="5" ry="4" fill="none" stroke="#FF6B2B" stroke-width="1.5" transform="rotate(90 26 50)"/>
  <ellipse cx="32" cy="33" rx="5" ry="4" fill="none" stroke="#FF6B2B" stroke-width="1.5" transform="rotate(135 32 33)"/>

  <!-- Crossed cooking spoons (ladles) -->
  <!-- Spoon 1: top-left to bottom-right -->
  <!-- Handle -->
  <line x1="20" y1="20" x2="57" y2="57" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
  <!-- Spoon bowl -->
  <ellipse cx="17" cy="17" rx="7" ry="5.5" fill="none" stroke="#F59E0B" stroke-width="2.5" transform="rotate(-45 17 17)"/>

  <!-- Spoon 2: top-right to bottom-left -->
  <!-- Handle -->
  <line x1="80" y1="20" x2="43" y2="57" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
  <!-- Spoon bowl -->
  <ellipse cx="83" cy="17" rx="7" ry="5.5" fill="none" stroke="#F59E0B" stroke-width="2.5" transform="rotate(45 83 17)"/>
</svg>
