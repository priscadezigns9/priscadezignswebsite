<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Trovrix — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07070F;color:#EEECf8;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.bg-glow{position:fixed;top:-30%;left:-10%;width:700px;height:700px;background:radial-gradient(circle,#6C63FF14 0%,transparent 65%);pointer-events:none}
.bg-glow2{position:fixed;bottom:-20%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,#6C63FF08 0%,transparent 65%);pointer-events:none}
.login-wrap{position:relative;z-index:1;width:100%;max-width:400px;padding:20px}
.brand{text-align:center;margin-bottom:32px}
.brand-logo{font-size:1.9rem;font-weight:700;color:#6C63FF;letter-spacing:-1px}
.brand-tag{font-size:0.68rem;color:#EEECf855;letter-spacing:3px;text-transform:uppercase;margin-top:3px}
.card{background:#0D0D18;border:1px solid #6C63FF20;padding:36px;border-radius:8px;box-shadow:0 0 60px #6C63FF08}
.card-title{font-size:1.25rem;font-weight:700;margin-bottom:4px}
.card-sub{font-size:0.82rem;color:#EEECf855;margin-bottom:26px}
.demo-hint{background:#6C63FF10;border:1px solid #6C63FF28;padding:10px 14px;border-radius:4px;font-size:0.79rem;color:#6C63FF;text-align:center;margin-bottom:18px}
.field{margin-bottom:15px}
label{display:block;font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:#6C63FF;margin-bottom:6px;font-weight:600}
input{width:100%;background:#07070F;border:1px solid #6C63FF20;color:#EEECf8;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:0.9rem;border-radius:5px;outline:none;transition:border-color 0.2s}
input:focus{border-color:#6C63FF}
input::placeholder{color:#EEECf828}
.btn{width:100%;background:#6C63FF;color:#fff;border:none;padding:12px;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;border-radius:5px;transition:all 0.2s;margin-top:6px}
.btn:hover{background:#8B84FF;transform:translateY(-1px)}
.error{color:#FF6B6B;font-size:0.78rem;margin-top:5px;display:none}
.footer-link{text-align:center;margin-top:16px;font-size:0.78rem;color:#EEECf844}
.footer-link a{color:#6C63FF}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">Trovrix</div>
    <div class="brand-tag">HR & People Management</div>
  </div>
  <div class="card">
    <div class="card-title">Sign in to Trovrix</div>
    <div class="card-sub">Your HR workspace awaits</div>
    <div class="demo-hint">hr@trovrix.io / demo1234</div>
    <form id="loginForm">
      <div class="field">
        <label>Work Email</label>
        <input type="email" id="email" placeholder="you@company.com" value="hr@trovrix.io"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" value="demo1234"/>
        <div class="error" id="err">Invalid credentials.</div>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
  <div class="footer-link">New here? <a href="#">Book a Demo</a></div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit',function(e){
  e.preventDefault();
  if(document.getElementById('email').value==='hr@trovrix.io'&&document.getElementById('password').value==='demo1234'){
    localStorage.setItem('trovrix_auth','true');
    window.location.href='dashboard/';
  } else {document.getElementById('err').style.display='block';}
});
</script>
</body>
</html>
