<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Covrel — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050810;color:#E8EFF8;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.bg-glow{position:fixed;top:-30%;left:50%;transform:translateX(-50%);width:800px;height:600px;background:radial-gradient(ellipse,#2563EB10 0%,transparent 65%);pointer-events:none}
.login-wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:20px}
.brand{text-align:center;margin-bottom:34px}
.brand-shield{width:46px;height:46px;background:#2563EB15;border:1px solid #2563EB35;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin:0 auto 12px}
.brand-logo{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:700;color:#2563EB;letter-spacing:-0.5px}
.brand-tag{font-size:0.68rem;color:#E8EFF855;letter-spacing:3px;text-transform:uppercase;margin-top:2px}
.card{background:#090D18;border:1px solid #2563EB20;padding:38px;border-radius:6px;box-shadow:0 20px 60px #0000040}
.card-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;margin-bottom:4px;letter-spacing:-0.3px}
.card-sub{font-size:0.82rem;color:#E8EFF855;margin-bottom:26px}
.demo-hint{background:#2563EB10;border:1px solid #2563EB28;padding:10px 14px;border-radius:4px;font-size:0.79rem;color:#60A5FA;text-align:center;margin-bottom:18px}
.field{margin-bottom:15px}
label{display:block;font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:#60A5FA;margin-bottom:6px;font-weight:600}
input{width:100%;background:#050810;border:1px solid #2563EB22;color:#E8EFF8;padding:11px 14px;font-family:'Inter',sans-serif;font-size:0.9rem;border-radius:4px;outline:none;transition:border-color 0.2s}
input:focus{border-color:#2563EB}
input::placeholder{color:#E8EFF828}
.btn{width:100%;background:#2563EB;color:#fff;border:none;padding:12px;font-family:'Inter',sans-serif;font-size:0.92rem;font-weight:600;cursor:pointer;border-radius:4px;transition:all 0.2s;margin-top:6px;letter-spacing:0.3px}
.btn:hover{background:#3B82F6;transform:translateY(-1px)}
.error{color:#FF6B6B;font-size:0.78rem;margin-top:5px;display:none}
.footer-link{text-align:center;margin-top:16px;font-size:0.78rem;color:#E8EFF844}
.footer-link a{color:#60A5FA}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-shield">🛡️</div>
    <div class="brand-logo">Covrel</div>
    <div class="brand-tag">Insurance Management</div>
  </div>
  <div class="card">
    <div class="card-title">Secure Sign In</div>
    <div class="card-sub">Access your policy management portal</div>
    <div class="demo-hint">agent@covrel.io / demo1234</div>
    <form id="loginForm">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@agency.com" value="agent@covrel.io"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" value="demo1234"/>
        <div class="error" id="err">Invalid credentials.</div>
      </div>
      <button type="submit" class="btn">Sign In Securely</button>
    </form>
  </div>
  <div class="footer-link">Need access? <a href="#">Contact your administrator</a></div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit',function(e){
  e.preventDefault();
  if(document.getElementById('email').value==='agent@covrel.io'&&document.getElementById('password').value==='demo1234'){
    localStorage.setItem('covrel_auth','true');
    window.location.href='dashboard/';
  } else {document.getElementById('err').style.display='block';}
});
</script>
</body>
</html>
