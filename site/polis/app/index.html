<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polis — Government Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#05080F;color:#dbeafe;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 30% 40%,rgba(29,78,216,0.1) 0%,transparent 60%);}
.login-wrap{width:100%;max-width:420px;padding:24px;}
.logo{text-align:center;margin-bottom:40px;}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#1D4ED8,#1e40af);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 32px rgba(29,78,216,0.3);}
.logo-icon svg{width:30px;height:30px;fill:white;}
.logo h1{font-size:28px;font-weight:400;color:#93c5fd;font-family:'DM Serif Display',serif;letter-spacing:0.5px;}
.logo p{font-size:13px;color:#2d4f7a;margin-top:4px;}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(29,78,216,0.2);border-radius:20px;padding:36px;}
.card h2{font-size:20px;font-weight:600;font-family:'DM Serif Display',serif;margin-bottom:8px;color:#dbeafe;}
.card .sub{font-size:13px;color:#2d4f7a;margin-bottom:28px;}
.field{margin-bottom:20px;}
.field label{display:block;font-size:11px;font-weight:600;color:#60a5fa;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
.field input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(29,78,216,0.25);border-radius:10px;padding:13px 16px;font-family:'Inter',sans-serif;font-size:14px;color:#dbeafe;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:#1D4ED8;}
.field input::placeholder{color:#1e3a5f;}
.btn{width:100%;background:linear-gradient(135deg,#1D4ED8,#1e40af);color:white;border:none;border-radius:10px;padding:14px;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.2s;margin-top:8px;}
.btn:hover{opacity:0.9;}
.hint{text-align:center;margin-top:20px;font-size:12px;color:#1e3a5f;}
.hint span{color:#60a5fa;cursor:pointer;}
.demo-note{background:rgba(29,78,216,0.08);border:1px solid rgba(29,78,216,0.2);border-radius:10px;padding:12px 16px;margin-top:24px;font-size:12px;color:#3b82f6;text-align:center;}
.gov-seal{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;font-size:11px;color:#2d4f7a;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="gov-seal">⚖️ Government of the Republic</div>
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <h1>Polis</h1>
    <p>Government Management Platform</p>
  </div>
  <div class="card">
    <h2>Staff Portal Login</h2>
    <p class="sub">Access restricted to authorised government personnel</p>
    <div class="field">
      <label>Government Email</label>
      <input type="email" id="email" placeholder="officer@polis.gov.tt" value="officer@polis.gov.tt">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pass" placeholder="••••••••" value="demo1234">
    </div>
    <button class="btn" onclick="doLogin()">Sign In to Portal</button>
    <p class="hint">Forgot password? <span>IT Support Desk</span></p>
    <div class="demo-note">🏛️ Demo credentials pre-filled — click Sign In</div>
  </div>
</div>
<script>
function doLogin(){
  const email=document.getElementById('email').value;
  const pass=document.getElementById('pass').value;
  if(email&&pass){
    localStorage.setItem('polis_auth','true');
    localStorage.setItem('polis_user',email);
    window.location.href='dashboard/';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
