<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Drovon — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#F0ECE8;font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg-lines{position:fixed;inset:0;background-image:repeating-linear-gradient(90deg,#FF6B3508 0,#FF6B3508 1px,transparent 0,transparent 50%);background-size:60px 100%;pointer-events:none}
.bg-glow{position:fixed;bottom:-20%;left:-10%;width:600px;height:600px;background:radial-gradient(circle,#FF6B3514 0%,transparent 65%);pointer-events:none}
.login-wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:20px}
.brand{text-align:center;margin-bottom:36px}
.brand-icon{width:50px;height:50px;background:#FF6B3520;border:1px solid #FF6B3540;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin:0 auto 12px}
.brand-logo{font-size:1.8rem;font-weight:700;color:#FF6B35;letter-spacing:-1px}
.brand-tag{font-size:0.72rem;color:#F0ECE855;letter-spacing:3px;text-transform:uppercase;margin-top:3px;font-family:'Inter',sans-serif}
.card{background:#101010;border:1px solid #FF6B3520;padding:38px;border-radius:6px}
.card-title{font-size:1.3rem;font-weight:700;margin-bottom:4px}
.card-sub{font-size:0.83rem;color:#F0ECE855;font-family:'Inter',sans-serif;margin-bottom:28px}
.demo-hint{background:#FF6B3510;border:1px solid #FF6B3528;padding:11px 14px;border-radius:4px;font-size:0.79rem;color:#FF6B35;font-family:'Inter',sans-serif;margin-bottom:18px;text-align:center}
.field{margin-bottom:16px}
label{display:block;font-size:0.72rem;text-transform:uppercase;letter-spacing:2px;color:#FF6B35;margin-bottom:7px;font-weight:600;font-family:'Inter',sans-serif}
input{width:100%;background:#080808;border:1px solid #FF6B3525;color:#F0ECE8;padding:11px 14px;font-family:'Inter',sans-serif;font-size:0.91rem;border-radius:4px;outline:none;transition:border-color 0.2s}
input:focus{border-color:#FF6B35}
input::placeholder{color:#F0ECE830}
.btn{width:100%;background:#FF6B35;color:#080808;border:none;padding:13px;font-family:'Space Grotesk',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;border-radius:4px;transition:all 0.2s;margin-top:6px;letter-spacing:0.3px}
.btn:hover{background:#FF8A5E;transform:translateY(-1px)}
.error{color:#FF6B6B;font-size:0.79rem;margin-top:5px;display:none}
.footer-link{text-align:center;margin-top:18px;font-size:0.79rem;color:#F0ECE844;font-family:'Inter',sans-serif}
.footer-link a{color:#FF6B35}
</style>
</head>
<body>
<div class="bg-lines"></div>
<div class="bg-glow"></div>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">🚛</div>
    <div class="brand-logo">Drovon</div>
    <div class="brand-tag">Fleet & Logistics Management</div>
  </div>
  <div class="card">
    <div class="card-title">Sign in</div>
    <div class="card-sub">Access your fleet dashboard</div>
    <div class="demo-hint">admin@drovon.io / demo1234</div>
    <form id="loginForm">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@fleet.com" value="admin@drovon.io"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" value="demo1234"/>
        <div class="error" id="err">Incorrect credentials.</div>
      </div>
      <button type="submit" class="btn">Sign In →</button>
    </form>
  </div>
  <div class="footer-link">New to Drovon? <a href="#">Request a Demo</a></div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit',function(e){
  e.preventDefault();
  const email=document.getElementById('email').value;
  const pass=document.getElementById('password').value;
  if(email==='admin@drovon.io'&&pass==='demo1234'){
    localStorage.setItem('drovon_auth','true');
    window.location.href='dashboard/';
  } else {
    document.getElementById('err').style.display='block';
  }
});
</script>
</body>
</html>
