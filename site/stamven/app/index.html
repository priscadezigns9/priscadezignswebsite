<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Stamven — Log In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#F5F5F5;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(#E6394608 1px,transparent 1px),linear-gradient(90deg,#E6394608 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.bg-glow{position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:800px;height:400px;background:radial-gradient(ellipse,#E6394614 0%,transparent 70%);pointer-events:none}
.card{position:relative;width:100%;max-width:420px;background:#141414;border:1px solid #E6394622;padding:48px 40px;margin:20px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:#E63946;letter-spacing:2px;margin-bottom:2px;line-height:1}
.tagline{font-size:0.72rem;color:#F5F5F544;text-transform:uppercase;letter-spacing:3px;margin-bottom:36px}
.form-label{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#F5F5F566;margin-bottom:8px;display:block}
.form-input{width:100%;background:#080808;border:1px solid #E6394622;color:#F5F5F5;padding:13px 16px;font-family:'Inter',sans-serif;font-size:0.92rem;outline:none;transition:border-color 0.2s;margin-bottom:20px}
.form-input:focus{border-color:#E6394655}
.form-input::placeholder{color:#F5F5F533}
.btn-login{width:100%;background:#E63946;color:#F5F5F5;border:none;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;cursor:pointer;transition:opacity 0.2s;margin-top:4px}
.btn-login:hover{opacity:0.88}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:#F5F5F533;font-size:0.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#E6394618}
.signup-link{text-align:center;font-size:0.83rem;color:#F5F5F555}
.signup-link a{color:#E63946;text-decoration:none;font-weight:600}
.demo-note{background:#E6394611;border:1px solid #E6394633;padding:12px 16px;font-size:0.78rem;color:#E6394699;margin-top:20px;text-align:center}
.status-bar{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#E63946,#FF6B6B)}
@media(max-width:480px){.card{padding:36px 24px;margin:16px}}
</style>
</head>
<body>
<div class="status-bar"></div>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="card">
  <div class="logo">Stamven</div>
  <div class="tagline">Gym & Fitness Management</div>
  <form onsubmit="handleLogin(event)">
    <label class="form-label">Email Address</label>
    <input class="form-input" type="email" placeholder="manager@gym.com" value="admin@stamven.fit"/>
    <label class="form-label">Password</label>
    <input class="form-input" type="password" placeholder="••••••••" value="demo1234"/>
    <button class="btn-login" type="submit">Enter Dashboard</button>
  </form>
  <div class="divider">or</div>
  <div class="signup-link">New gym? <a href="#">Book a Demo</a></div>
  <div class="demo-note">💪 Demo Mode — click Enter Dashboard to continue</div>
</div>
<script>
function handleLogin(e){
  e.preventDefault();
  localStorage.setItem('stamven_user', JSON.stringify({name:'Kyle Baptiste', role:'Gym Manager', gym:'Stamven Fitness POS'}));
  window.location.href='/stamven/app/dashboard/';
}
</script>
</body>
</html>
