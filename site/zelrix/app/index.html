<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zelrix — Agriculture Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#060C06;color:#e8f5e9;font-family:'Nunito',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 20% 50%,rgba(93,187,99,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(93,187,99,0.05) 0%,transparent 50%);}
.login-wrap{width:100%;max-width:420px;padding:24px;}
.logo{text-align:center;margin-bottom:40px;}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#5DBB63,#3d9943);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 32px rgba(93,187,99,0.3);}
.logo-icon svg{width:32px;height:32px;fill:white;}
.logo h1{font-size:28px;font-weight:800;color:#5DBB63;letter-spacing:-0.5px;}
.logo p{font-size:13px;color:#6b8f6e;margin-top:4px;}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(93,187,99,0.15);border-radius:20px;padding:36px;backdrop-filter:blur(10px);}
.card h2{font-size:20px;font-weight:700;margin-bottom:8px;}
.card .sub{font-size:13px;color:#6b8f6e;margin-bottom:28px;}
.field{margin-bottom:20px;}
.field label{display:block;font-size:12px;font-weight:600;color:#5DBB63;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.field input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(93,187,99,0.2);border-radius:10px;padding:13px 16px;font-family:'Nunito',sans-serif;font-size:14px;color:#e8f5e9;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:#5DBB63;}
.field input::placeholder{color:#4a6b4e;}
.btn{width:100%;background:linear-gradient(135deg,#5DBB63,#3d9943);color:white;border:none;border-radius:10px;padding:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.2s;margin-top:8px;}
.btn:hover{opacity:0.9;}
.hint{text-align:center;margin-top:20px;font-size:12px;color:#4a6b4e;}
.hint span{color:#5DBB63;cursor:pointer;}
.demo-note{background:rgba(93,187,99,0.1);border:1px solid rgba(93,187,99,0.2);border-radius:10px;padding:12px 16px;margin-top:24px;font-size:12px;color:#8fc992;text-align:center;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 21h2.27l1-2.3A4.49 4.49 0 0 0 8 19c8 0 15-5 15-10 0-2.5-2-4-6-1zm-2.5 8.5c-1.24.24-2.63-.07-4.07-.93l7.07-7.07c.24.46.36.97.36 1.5 0 2-1.5 4-3.36 6.5z"/></svg>
    </div>
    <h1>Zelrix</h1>
    <p>Agriculture Management Platform</p>
  </div>
  <div class="card">
    <h2>Welcome back</h2>
    <p class="sub">Sign in to your farm dashboard</p>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="manager@zelrix.app" value="manager@zelrix.app">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pass" placeholder="••••••••" value="demo1234">
    </div>
    <button class="btn" onclick="doLogin()">Sign In to Dashboard</button>
    <p class="hint">Forgot password? <span>Reset it</span></p>
    <div class="demo-note">🌿 Demo credentials are pre-filled — just click Sign In</div>
  </div>
</div>
<script>
function doLogin(){
  const email=document.getElementById('email').value;
  const pass=document.getElementById('pass').value;
  if(email&&pass){
    localStorage.setItem('zelrix_auth','true');
    localStorage.setItem('zelrix_user',email);
    window.location.href='dashboard/';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
