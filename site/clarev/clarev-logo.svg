<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600&amp;display=swap');
      .logo-text {
        font-family: 'Plus Jakarta Sans', 'DM Sans', 'Nunito', Arial, sans-serif;
        font-weight: 600;
        font-size: 28px;
        fill: #00B4A6;
        letter-spacing: -0.5px;
      }
    </style>
  </defs>

  <!-- Medical cross icon (left of text) -->
  <g transform="translate(4, 10)">
    <!-- Cross shape: horizontal bar + vertical bar -->
    <rect x="7" y="12" width="16" height="6" rx="1.5" fill="#00B4A6"/>
    <rect x="12" y="7" width="6" height="16" rx="1.5" fill="#00B4A6"/>
  </g>

  <!-- "Clarev" wordmark -->
  <text x="38" y="36" class="logo-text">Clarev</text>
</svg>
