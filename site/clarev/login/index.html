<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clarev — Sign In</title>
<meta name="description" content="Sign in to your Clarev client portal to track your Prisca Dezigns project.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0F1A;--surface:#111827;--border:#1f2937;--teal:#00D4C8;--teal-dim:rgba(0,212,200,0.12);--text:#f9fafb;--dim:#6b7280;--error:#ef4444}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-wrap{width:100%;max-width:420px}
.logo{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:500;color:var(--teal);letter-spacing:-0.5px;text-align:center;margin-bottom:8px}
.logo span{color:rgba(0,212,200,0.4)}>_</span>
.tagline{text-align:center;color:var(--dim);font-size:0.83rem;margin-bottom:36px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px}
.card h1{font-size:1.3rem;font-weight:600;margin-bottom:6px}
.card p{color:var(--dim);font-size:0.85rem;margin-bottom:28px}
.form-group{margin-bottom:18px}
label{display:block;font-size:0.78rem;font-weight:500;color:var(--dim);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:7px}
input{width:100%;background:#0d0f1a;border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:0.93rem;font-family:'Inter',sans-serif;transition:border-color 0.2s,box-shadow 0.2s;outline:none}
input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,212,200,0.1)}
input::placeholder{color:var(--dim)}
.btn-primary{width:100%;background:var(--teal);color:#0D0F1A;border:none;border-radius:8px;padding:13px;font-size:0.93rem;font-weight:700;cursor:pointer;transition:opacity 0.2s,transform 0.1s;margin-top:8px;font-family:'Inter',sans-serif}
.btn-primary:hover{opacity:0.9}
.btn-primary:active{transform:scale(0.99)}
.btn-primary.loading{opacity:0.7;cursor:not-allowed}
.forgot{display:block;text-align:center;margin-top:16px;color:var(--dim);font-size:0.82rem;text-decoration:none;transition:color 0.2s}
.forgot:hover{color:var(--teal)}
.divider{height:1px;background:var(--border);margin:24px 0}
.footer-text{text-align:center;color:var(--dim);font-size:0.75rem}
.footer-text a{color:var(--teal);text-decoration:none}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">Clarev</div>
  <p class="tagline">Your project. Always in view.</p>
  <div class="card">
    <h1>Welcome back</h1>
    <p>Sign in to access your project portal</p>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="signInBtn">Sign In</button>
      <a href="#" class="forgot">Forgot password?</a>
    </form>
    <div class="divider"></div>
    <p class="footer-text">A <a href="https://priscadezigns.org/prisca-dezigns/">Prisca Dezigns</a> product</p>
  </div>
</div>
<script>
function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('signInBtn');
  btn.textContent = 'Signing in...';
  btn.classList.add('loading');
  btn.disabled = true;
  setTimeout(() => { window.location.href = '/clarev/dashboard/'; }, 1200);
}
</script>
</body>
</html>
