<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Clarev — Log In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050F0A;color:#E8F5F0;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(#2ECC8A06 1px,transparent 1px),linear-gradient(90deg,#2ECC8A06 1px,transparent 1px);background-size:44px 44px;pointer-events:none}
.bg-glow{position:fixed;top:-200px;right:-100px;width:600px;height:600px;background:radial-gradient(ellipse,#2ECC8A14 0%,transparent 70%);pointer-events:none}
.card{position:relative;width:100%;max-width:420px;background:#0A1F14;border:1px solid #2ECC8A22;padding:48px 40px;margin:20px}
.logo{font-family:'DM Serif Display',serif;font-size:2rem;color:#2ECC8A;margin-bottom:4px;letter-spacing:-0.5px}
.tagline{font-size:0.75rem;color:#E8F5F044;text-transform:uppercase;letter-spacing:2px;margin-bottom:36px}
.form-label{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#E8F5F066;margin-bottom:8px;display:block}
.form-input{width:100%;background:#050F0A;border:1px solid #2ECC8A22;color:#E8F5F0;padding:13px 16px;font-family:'Inter',sans-serif;font-size:0.92rem;outline:none;transition:border-color 0.2s;margin-bottom:20px;border-radius:2px}
.form-input:focus{border-color:#2ECC8A55}
.form-input::placeholder{color:#E8F5F033}
.btn-login{width:100%;background:#2ECC8A;color:#050F0A;border:none;padding:14px;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s;margin-top:4px;border-radius:2px}
.btn-login:hover{opacity:0.88}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:#E8F5F033;font-size:0.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#2ECC8A18}
.signup-link{text-align:center;font-size:0.83rem;color:#E8F5F055}
.signup-link a{color:#2ECC8A;text-decoration:none;font-weight:600}
.demo-note{background:#2ECC8A11;border:1px solid #2ECC8A33;padding:12px 16px;font-size:0.78rem;color:#2ECC8A99;margin-top:20px;text-align:center;border-radius:2px}
.status-bar{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#2ECC8A,#1A8C5B)}
@media(max-width:480px){.card{padding:36px 24px;margin:16px}}
</style>
</head>
<body>
<div class="status-bar"></div>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="card">
  <div class="logo">Clarev</div>
  <div class="tagline">Clinic Management System</div>
  <form onsubmit="handleLogin(event)">
    <label class="form-label">Email Address</label>
    <input class="form-input" type="email" placeholder="doctor@clinic.com" id="email" value="admin@clarev.health"/>
    <label class="form-label">Password</label>
    <input class="form-input" type="password" placeholder="••••••••" id="password" value="demo1234"/>
    <button class="btn-login" type="submit">Access Dashboard</button>
  </form>
  <div class="divider">or</div>
  <div class="signup-link">New practice? <a href="#">Request Access</a></div>
  <div class="demo-note">🩺 Demo Mode — click Access Dashboard to continue</div>
</div>
<script>
function handleLogin(e){
  e.preventDefault();
  localStorage.setItem('clarev_user', JSON.stringify({name:'Dr. Anisa Ramsaran', role:'Clinic Director', clinic:'Caribbean Medical Centre'}));
  window.location.href='/clarev/app/dashboard/';
}
</script>
</body>
</html>
