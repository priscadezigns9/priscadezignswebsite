<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Builven — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600;700&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D0A05;color:#F5EDD8;font-family:'Barlow',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(#F5A62308 1px,transparent 1px),linear-gradient(90deg,#F5A62308 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.bg-glow{position:fixed;top:-30%;right:-20%;width:700px;height:700px;background:radial-gradient(circle,#F5A62318 0%,transparent 65%);pointer-events:none}
.login-wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:20px}
.brand{text-align:center;margin-bottom:40px}
.brand-logo{font-family:'Barlow Condensed',sans-serif;font-size:2.2rem;font-weight:800;color:#F5A623;letter-spacing:-1px;text-transform:uppercase}
.brand-tag{font-size:0.72rem;color:#F5EDD866;letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.card{background:#161008;border:1px solid #F5A62322;padding:40px;border-radius:4px}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;color:#F5EDD8}
.card-sub{font-size:0.83rem;color:#F5EDD855;margin-bottom:30px}
.field{margin-bottom:18px}
label{display:block;font-size:0.73rem;text-transform:uppercase;letter-spacing:2px;color:#F5A623;margin-bottom:8px;font-weight:600}
input{width:100%;background:#0D0A05;border:1px solid #F5A62330;color:#F5EDD8;padding:12px 16px;font-family:'Barlow',sans-serif;font-size:0.92rem;border-radius:3px;outline:none;transition:border-color 0.2s}
input:focus{border-color:#F5A623}
input::placeholder{color:#F5EDD833}
.btn{width:100%;background:#F5A623;color:#0D0A05;border:none;padding:14px;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;border-radius:3px;transition:all 0.2s;margin-top:8px}
.btn:hover{background:#FFB84D;transform:translateY(-1px)}
.divider{text-align:center;color:#F5EDD833;font-size:0.75rem;margin:20px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:#F5A62322}
.divider::before{left:0}.divider::after{right:0}
.demo-hint{background:#F5A62310;border:1px solid #F5A62330;padding:12px 16px;border-radius:3px;font-size:0.8rem;color:#F5A623;text-align:center;margin-bottom:18px}
.demo-hint strong{display:block;margin-bottom:2px}
.footer-link{text-align:center;margin-top:20px;font-size:0.8rem;color:#F5EDD844}
.footer-link a{color:#F5A623}
.error{color:#FF6B6B;font-size:0.8rem;margin-top:6px;display:none}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">Builven</div>
    <div class="brand-tag">Construction Management</div>
  </div>
  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to your workspace</div>
    <div class="demo-hint"><strong>Demo Credentials</strong>admin@builven.com / demo1234</div>
    <form id="loginForm">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@company.com" value="admin@builven.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" value="demo1234"/>
        <div class="error" id="err">Invalid email or password.</div>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
  <div class="footer-link">Don't have an account? <a href="#">Request Access</a></div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit',function(e){
  e.preventDefault();
  const email=document.getElementById('email').value;
  const pass=document.getElementById('password').value;
  const err=document.getElementById('err');
  if(email==='admin@builven.com'&&pass==='demo1234'){
    localStorage.setItem('builven_auth','true');
    window.location.href='dashboard/';
  } else {
    err.style.display='block';
  }
});
</script>
</body>
</html>
