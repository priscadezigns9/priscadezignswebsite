<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Velloq — Web Presence Command</title>
<link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap' rel='stylesheet'>
<style>
:root{--primary:#0EA5E9;--dark:#020617;--card-bg:#0F172A;--border:rgba(255,255,255,0.05)}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--dark);color:white;font-family:'Plus Jakarta Sans',sans-serif;display:flex;min-height:100vh}
.sidebar{width:280px;background:var(--card-bg);border-right:1px solid var(--border);padding:30px;display:flex;flex-direction:column}
.main-content{flex:1;padding:40px;overflow-y:auto}
.logo{font-size:1.5rem;font-weight:800;color:var(--primary);margin-bottom:40px;display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-item{padding:12px 16px;border-radius:12px;color:rgba(255,255,255,0.5);text-decoration:none;font-weight:600;margin-bottom:8px;transition:0.3s;display:flex;align-items:center;gap:12px}
.nav-item:hover, .nav-item.active{background:rgba(14,165,233,0.1);color:var(--primary)}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px}
.site-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));gap:25px}
.site-card{background:var(--card-bg);border:1px solid var(--border);border-radius:24px;padding:25px;transition:0.3s}
.site-card:hover{border-color:var(--primary);transform:translateY(-5px)}
.status-tag{font-size:0.65rem;text-transform:uppercase;font-weight:800;padding:4px 10px;border-radius:100px;background:rgba(16,185,129,0.1);color:#10B981}
.btn-primary{background:var(--primary);color:white;padding:12px 24px;border-radius:12px;border:none;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class='sidebar'>
<a href='#' class='logo'><span>🌀</span>VELLOQ</a>
<a href='#' class='nav-item active'>🌐 My Websites</a>
<a href='#' class='nav-item'>🎨 Component Lab</a>
<a href='#' class='nav-item'>📈 SEO Pulse</a>
<a href='#' class='nav-item'>⚙️ Settings</a>
</div>
<div class='main-content'>
<div class='header'>
<div><h1 style='font-size:2.5rem;font-weight:800'>Web Presence Hub</h1><p style='color:rgba(255,255,255,0.4)'>Managing 43 autonomous architectures</p></div>
<button class='btn-primary'>+ New Website</button>
</div>
<div class='site-grid'>
<div class='site-card'>
<div style='display:flex;justify-content:space-between;margin-bottom:20px'><span class='status-tag'>Live & Optimized</span><span style='font-size:1.2rem'>🔥</span></div>
<h3>Calalloo Main</h3>
<p style='font-size:0.9rem;color:rgba(255,255,255,0.4);margin-top:8px'>priscadezigns.org/calalloo/</p>
<div style='margin-top:20px;display:flex;gap:10px'><button style='flex:1;background:rgba(255,255,255,0.05);border:none;color:white;padding:10px;border-radius:8px;font-size:0.8rem;font-weight:600'>Edit Architecture</button></div>
</div>
<div class='site-card'>
<div style='display:flex;justify-content:space-between;margin-bottom:20px'><span class='status-tag' style='background:rgba(245,158,11,0.1);color:#F59E0B'>Asset Alert</span><span style='font-size:1.2rem'>⚠️</span></div>
<h3>The Escapist</h3>
<p style='font-size:0.9rem;color:rgba(255,255,255,0.4);margin-top:8px'>priscadezigns.org/the-escapist/</p>
<div style='margin-top:20px;display:flex;gap:10px'><button style='flex:1;background:var(--primary);border:none;color:white;padding:10px;border-radius:8px;font-size:0.8rem;font-weight:600'>Healing Protocol</button></div>
</div>
</div>
</div>
</body>
</html>
