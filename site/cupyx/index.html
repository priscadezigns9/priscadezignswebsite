<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>Cupyx — AI Creative Studio & Content Engine</title>
    <link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap' rel='stylesheet'>
    <style>
        :root{--primary:#E879A0;--dark:#050505;--card:#111;--border:rgba(255,255,255,0.05)}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--dark);color:white;font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh}
        nav{padding:40px 6%;display:flex;justify-content:space-between;align-items:center}
        .logo{font-size:1.6rem;font-weight:800;letter-spacing:-1px;display:flex;align-items:center;gap:10px}
        .logo .dot{width:12px;height:12px;background:var(--primary);border-radius:50%}
        .hero{padding:120px 6% 100px;text-align:center}
        h1{font-size:clamp(3.5rem, 10vw, 7.5rem);font-weight:800;letter-spacing:-4px;line-height:0.9;margin-bottom:30px}
        .hero p{max-width:600px;margin:0 auto 50px;color:rgba(255,255,255,0.4);font-size:1.1rem;line-height:1.6}
        .btn-cp{background:white;color:black;padding:20px 50px;border-radius:100px;text-decoration:none;font-weight:800;font-size:1.1rem;transition:0.3s;display:inline-block}
        .btn-cp:hover{background:var(--primary);color:white;transform:scale(1.05)}
        .studio-preview{margin-top:100px;background:var(--card);border:1px solid var(--border);border-radius:40px;padding:60px;max-width:1200px;margin-left:auto;margin-right:auto;text-align:left}
        .stat-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:40px}
        .stat-item h4{font-size:0.7rem;text-transform:uppercase;color:rgba(255,255,255,0.3);letter-spacing:2px;margin-bottom:15px}
        .stat-item .val{font-size:3rem;font-weight:800;color:var(--primary)}
    </style>
</head>
<body>
    <nav><div class='logo'><div class='dot'></div>CUPYX</div></nav>
    <div class='hero'>
        <span style='color:var(--primary);font-weight:800;letter-spacing:5px;font-size:0.75rem;text-transform:uppercase;display:block;margin-bottom:20px'>AI-Powered Creative Studio</span>
        <h1>CONTENT<br>ENGINEERING.</h1>
        <p>The SaaS engine for high-fidelity copywriting, luxury editorial generation, and automated creative workflows. Powering the Empire's media architecture.</p>
        <a href='/site/cupyx/dashboard/' class='btn-cp'>Open Studio Dashboard</a>
        <div class='studio-preview'>
            <div class='stat-grid'>
                <div class='stat-item'><h4>Tokens Processed</h4><div class='val'>24M</div></div>
                <div class='stat-item'><h4>Active Models</h4><div class='val'>Agentic</div></div>
                <div class='stat-item'><h4>Output Quality</h4><div class='val'>98%</div></div>
            </div>
        </div>
    </div>
</body>
</html>
