<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Cupyx AI — Creative Studio</title>
<link href='https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap' rel='stylesheet'>
<style>
:root{--rose:#E879A0;--rose2:#BE185D;--dark:#0A0006;--surface:#0D0009;--border:rgba(232,121,160,0.1)}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--dark);color:#F5EEF8;font-family:'DM Sans',sans-serif;display:flex;height:100vh;overflow:hidden}
.nav-side{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:40px 20px;display:flex;flex-direction:column}
.main-view{flex:1;display:flex;flex-direction:column}
.editor-container{flex:1;padding:60px;display:flex;gap:40px}
.editor-main{flex:2;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px;position:relative}
.ai-sidebar{flex:1;background:rgba(255,255,255,0.02);border-radius:24px;padding:30px;border:1px solid var(--border)}
.logo{font-family:'DM Serif Display', serif;font-size:1.8rem;color:var(--rose);margin-bottom:50px}
.nav-item{padding:12px 16px;color:var(--muted);text-decoration:none;font-weight:500;border-radius:12px;margin-bottom:8px;transition:0.3s;display:block}
.nav-item:hover, .nav-item.active{background:rgba(232,121,160,0.1);color:var(--rose)}
.btn-rose{background:var(--rose);color:var(--dark);border:none;padding:14px 28px;border-radius:100px;font-weight:700;cursor:pointer}
textarea{width:100%;height:300px;background:transparent;border:none;color:white;font-size:1.2rem;line-height:1.6;outline:none;resize:none;margin-top:30px}
.studio-header{padding:40px 60px 0;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div class='nav-side'>
<div class='logo'>Cupyx</div>
<a href='#' class='nav-item active'>Studio</a>
<a href='#' class='nav-item'>Drafts</a>
<a href='#' class='nav-item'>Campaigns</a>
<a href='#' class='nav-item'>Voice Kits</a>
</div>
<div class='main-view'>
<div class='studio-header'>
<h1 style='font-family:"DM Serif Display", serif;font-size:2.2rem'>AI Creative Studio</h1>
<button class='btn-rose'>Export Copy</button>
</div>
<div class='editor-container'>
<div class='editor-main'>
<div style='display:flex;gap:15px;color:rgba(255,255,255,0.3);font-size:0.8rem;text-transform:uppercase;font-weight:700'><span>Heading</span><span>Body</span><span>Ad Copy</span></div>
<textarea placeholder='Start writing, or ask Cupyx to generate content...'></textarea>
<div style='position:absolute;bottom:40px;left:40px;right:40px;background:var(--dark);padding:15px;border-radius:12px;border:1px solid var(--rose);display:flex;gap:10px'>
<input type='text' style='flex:1;background:transparent;border:none;color:white;outline:none' placeholder='Command Cupyx (e.g. "Make this sound more luxury")'>
<button style='background:var(--rose);border:none;padding:8px 15px;border-radius:6px;font-weight:700;font-size:0.8rem'>Execute</button>
</div>
</div>
<div class='ai-sidebar'>
<p style='font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--rose);font-weight:700;margin-bottom:20px'>AI Suggestions</p>
<div style='padding:15px;background:rgba(255,255,255,0.03);border-radius:12px;margin-bottom:15px'>
<p style='font-size:0.85rem;line-height:1.5'>Try starting with: "Experience the intersection of heritage and precision..."</p>
</div>
<div style='padding:15px;background:rgba(255,255,255,0.03);border-radius:12px'>
<p style='font-size:0.85rem;line-height:1.5'>Sentiment Analysis: High Luxury / Professional.</p>
</div>
</div>
</div>
</div>
</body>
</html>
