<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Get Started — Verdra</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@300;400;500;600&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080604;color:#F5F0E8;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:60px 24px 80px}
a{text-decoration:none;color:inherit}
:root{--accent:#8B5E3C;--bg:#080604;--text:#F5F0E8;--muted:#F5F0E899;--border:#8B5E3C22;--card:#100E08}

.top{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:560px;margin-bottom:48px}
.nav-logo{font-family:'Cormorant Garamond',sans-serif;font-size:1.1rem;font-weight:700;color:var(--accent)}
.back{font-size:0.8rem;color:var(--muted);transition:color 0.2s}
.back:hover{color:var(--text)}

.card{width:100%;max-width:560px;background:var(--card);border:1px solid var(--border);padding:44px 40px}
.card-eyebrow{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--accent);margin-bottom:14px}
.card h1{font-family:'Cormorant Garamond',sans-serif;font-size:2rem;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.1}
.card p.sub{color:var(--muted);font-size:0.88rem;margin-bottom:36px;line-height:1.65}

.field{margin-bottom:20px}
label{display:block;font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px}
input,textarea,select{width:100%;background:#080604;border:1px solid var(--border);padding:12px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;-webkit-appearance:none;border-radius:0}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:100px;line-height:1.6}
select option{background:#080604}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.divider{height:1px;background:var(--border);margin:28px 0}

.submit{width:100%;background:var(--accent);color:#080604;border:none;padding:16px;font-family:'Cormorant Garamond',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.3px;margin-top:8px}
.submit:hover{opacity:0.88;transform:translateY(-1px)}

.note{font-size:0.75rem;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6}

@media(max-width:480px){.card{padding:28px 20px}.row{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="top">
  <a class="nav-logo" href="/verdra/">Verdra</a>
  <a class="back" href="/verdra/">← Back</a>
</div>

<div class="card">
  <div class="card-eyebrow">Legal Platform</div>
  <h1>Your practice, under control.</h1>
  <p class="sub">Set up Verdra for your firm — case management, client billing, and document management built for Caribbean law.</p>

  <div class="row">
    <div class="field"><label>Your Name *</label><input type="text" placeholder="Full name"/></div>
    <div class="field"><label>WhatsApp *</label><input type="tel" placeholder="+1 868 000 0000"/></div>
  </div>
  <div class="field"><label>Email Address *</label><input type="email" placeholder="you@example.com"/></div>
  <div class="field"><label>Organisation / Business Name</label><input type="text" placeholder="Optional"/></div>
  <div class="field">
    <label>Plan *</label>
    <select><option value=''>Select a plan...</option><option>Solo — $99/mo</option><option>Firm — $299/mo (up to 10 attorneys)</option><option>Enterprise — Custom</option><option>Just exploring</option></select>
  </div>
  <div class="field"><label>Practice Type</label>
    <select><option value="">Select...</option><option>Solo Practitioner</option><option>Small Firm (2–10)</option><option>Medium Firm (11–50)</option><option>Corporate Legal Team</option></select></div>
  <div class="field"><label>Specialisation</label>
    <select><option value="">Select...</option><option>Commercial / Corporate</option><option>Family Law</option><option>Criminal</option><option>Property / Conveyancing</option><option>Mixed / General Practice</option></select></div>
  <div class="field"><label>Top Need</label>
    <textarea placeholder="e.g. Case tracking, document management, time billing, client portal, court deadlines, compliance..."></textarea></div>
  <div class="field"><label>How did you find us?</label>
    <select><option value="">Select...</option><option>Facebook</option><option>Instagram</option><option>Google</option><option>Referral</option><option>Other</option></select>
  </div>

  <div class="divider"></div>
  <button class="submit">Submit →</button>
  <p class="note">We'll reach out within 2 hours to confirm your details and get you set up.</p>
</div>

</body>
</html>
