<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verdra — Legal Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080604;color:#f5ede0;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 50% 40%,rgba(139,94,60,0.08) 0%,transparent 60%);}
.login-wrap{width:100%;max-width:420px;padding:24px;}
.logo{text-align:center;margin-bottom:40px;}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#8B5E3C,#6b4520);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 32px rgba(139,94,60,0.3);}
.logo-icon svg{width:28px;height:28px;fill:white;}
.logo h1{font-size:32px;font-weight:500;color:#c4956a;font-family:'Cormorant Garamond',serif;letter-spacing:2px;}
.logo p{font-size:13px;color:#5c3d24;margin-top:4px;}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(139,94,60,0.2);border-radius:20px;padding:36px;}
.card h2{font-size:22px;font-weight:500;font-family:'Cormorant Garamond',serif;margin-bottom:8px;letter-spacing:0.5px;}
.card .sub{font-size:13px;color:#5c3d24;margin-bottom:28px;}
.field{margin-bottom:20px;}
.field label{display:block;font-size:11px;font-weight:600;color:#8B5E3C;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
.field input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(139,94,60,0.2);border-radius:10px;padding:13px 16px;font-family:'Inter',sans-serif;font-size:14px;color:#f5ede0;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:#8B5E3C;}
.field input::placeholder{color:#3d2810;}
.btn{width:100%;background:linear-gradient(135deg,#8B5E3C,#6b4520);color:#f5ede0;border:none;border-radius:10px;padding:14px;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:1px;transition:opacity 0.2s;margin-top:8px;}
.btn:hover{opacity:0.9;}
.hint{text-align:center;margin-top:20px;font-size:12px;color:#3d2810;}
.hint span{color:#8B5E3C;cursor:pointer;}
.demo-note{background:rgba(139,94,60,0.08);border:1px solid rgba(139,94,60,0.2);border-radius:10px;padding:12px 16px;margin-top:24px;font-size:12px;color:#8B5E3C;text-align:center;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6L23 9 12 3zm0 12.4L6 12.22V9l6 3.27L18 9v3.22L12 15.4z"/></svg>
    </div>
    <h1>VERDRA</h1>
    <p>Legal Practice Management Platform</p>
  </div>
  <div class="card">
    <h2>Solicitor Login</h2>
    <p class="sub">Access your legal practice dashboard</p>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="solicitor@verdra.law" value="solicitor@verdra.law">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pass" placeholder="••••••••" value="demo1234">
    </div>
    <button class="btn" onclick="doLogin()">Enter Practice Portal</button>
    <p class="hint">Forgot password? <span>Reset via email</span></p>
    <div class="demo-note">⚖️ Demo credentials pre-filled — click Enter Practice Portal</div>
  </div>
</div>
<script>
function doLogin(){
  const email=document.getElementById('email').value;
  const pass=document.getElementById('pass').value;
  if(email&&pass){
    localStorage.setItem('verdra_auth','true');
    localStorage.setItem('verdra_user',email);
    window.location.href='dashboard/';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
