<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Varen — Log In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0A0A;color:#F0EDE8;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(#C9A96E06 1px,transparent 1px),linear-gradient(90deg,#C9A96E06 1px,transparent 1px);background-size:50px 50px;pointer-events:none}
.bg-glow{position:fixed;bottom:-100px;left:50%;transform:translateX(-50%);width:700px;height:400px;background:radial-gradient(ellipse,#C9A96E14 0%,transparent 70%);pointer-events:none}
.card{position:relative;width:100%;max-width:420px;background:#141410;border:1px solid #C9A96E22;padding:48px 40px;margin:20px}
.logo{font-family:'Playfair Display',serif;font-size:2.2rem;color:#C9A96E;margin-bottom:4px;letter-spacing:-0.5px}
.tagline{font-size:0.75rem;color:#F0EDE844;text-transform:uppercase;letter-spacing:2.5px;margin-bottom:36px}
.form-label{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#F0EDE866;margin-bottom:8px;display:block}
.form-input{width:100%;background:#0A0A0A;border:1px solid #C9A96E22;color:#F0EDE8;padding:13px 16px;font-family:'Inter',sans-serif;font-size:0.92rem;outline:none;transition:border-color 0.2s;margin-bottom:20px}
.form-input:focus{border-color:#C9A96E55}
.form-input::placeholder{color:#F0EDE833}
.btn-login{width:100%;background:#C9A96E;color:#0A0A0A;border:none;padding:14px;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s;margin-top:4px}
.btn-login:hover{opacity:0.88}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:#F0EDE833;font-size:0.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#C9A96E18}
.signup-link{text-align:center;font-size:0.83rem;color:#F0EDE855}
.signup-link a{color:#C9A96E;text-decoration:none;font-weight:600}
.demo-note{background:#C9A96E11;border:1px solid #C9A96E33;padding:12px 16px;font-size:0.78rem;color:#C9A96E99;margin-top:20px;text-align:center}
.status-bar{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#C9A96E,#8B6914)}
@media(max-width:480px){.card{padding:36px 24px;margin:16px}}
</style>
</head>
<body>
<div class="status-bar"></div>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="card">
  <div class="logo">Varen</div>
  <div class="tagline">Real Estate Platform</div>
  <form onsubmit="handleLogin(event)">
    <label class="form-label">Email Address</label>
    <input class="form-input" type="email" placeholder="agent@realty.com" value="admin@varenrealty.com"/>
    <label class="form-label">Password</label>
    <input class="form-input" type="password" placeholder="••••••••" value="demo1234"/>
    <button class="btn-login" type="submit">Enter Platform</button>
  </form>
  <div class="divider">or</div>
  <div class="signup-link">New agency? <a href="#">Schedule Onboarding</a></div>
  <div class="demo-note">🏡 Demo Mode — click Enter Platform to continue</div>
</div>
<script>
function handleLogin(e){
  e.preventDefault();
  localStorage.setItem('varen_user', JSON.stringify({name:'Sandra Maharaj', role:'Senior Agent', agency:'Varen Realty TT'}));
  window.location.href='/varen/app/dashboard/';
}
</script>
</body>
</html>
