<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreaming Anime — Live the Anime Life</title>
<meta name="description" content="Curated anime merch, figures, apparel and collectibles. The anime fan lifestyle hub.">
<link rel="canonical" href="https://priscadezigns.org/dreaming-anime/">
<meta property="og:title" content="Dreaming Anime — Live the Anime Life">
<meta property="og:description" content="Curated anime merch, figures, apparel and collectibles. The anime fan lifestyle hub.">
<meta property="og:url" content="https://priscadezigns.org/dreaming-anime/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; overflow-x: hidden; }
body {
  font-family: 'Inter', sans-serif;
  background: #FFFFFF;
  color: #0A0A0A;
  overflow-x: hidden;
}
:root {
  --black: #0A0A0A;
  --white: #FFFFFF;
  --orange: #FF6B00;
  --grey: #f5f5f5;
  --border: 3px solid #0A0A0A;
  --border-thick: 4px solid #0A0A0A;
}

/* ===== FONTS ===== */
.font-bangers { font-family: 'Bangers', cursive; letter-spacing: 0.03em; }
.font-space { font-family: 'Space Mono', monospace; }
.font-inter { font-family: 'Inter', sans-serif; }

/* ===== PANEL ANIMATION ===== */
.panel-slam {
  opacity: 0;
  transform: translateX(-100%);
  transition: opacity 0.6s cubic-bezier(0.22,1,0.36,1), transform 0.6s cubic-bezier(0.22,1,0.36,1);
}
.panel-slam.from-right {
  transform: translateX(100%);
}
.panel-slam.visible {
  opacity: 1;
  transform: translateX(0);
}

/* ===== SPEED LINES MIXIN ===== */
.speed-lines::before {
  content: '';
  position: absolute;
  inset: -60px;
  background: repeating-conic-gradient(
    from 0deg at 50% 50%,
    transparent 0deg,
    transparent 8.9deg,
    rgba(255,107,0,0.13) 8.9deg,
    rgba(255,107,0,0.13) 9deg
  );
  pointer-events: none;
  z-index: 0;
  border-radius: 50%;
}
.speed-lines-white::before {
  content: '';
  position: absolute;
  inset: -80px;
  background: repeating-conic-gradient(
    from 0deg at 50% 50%,
    transparent 0deg,
    transparent 8.9deg,
    rgba(255,255,255,0.08) 8.9deg,
    rgba(255,255,255,0.08) 9deg
  );
  pointer-events: none;
  z-index: 0;
}

/* ===== NAV ===== */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: #FFFFFF;
  border-bottom: 2px solid #0A0A0A;
  padding: 0 2rem;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: #0A0A0A;
}
.nav-logo {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid #0A0A0A;
  object-fit: cover;
  display: block;
}
.nav-logo-fallback {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid #0A0A0A;
  background: #0A0A0A;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #FF6B00;
  font-family: 'Bangers', cursive;
  font-size: 14px;
  letter-spacing: 0.03em;
  flex-shrink: 0;
}
.nav-title {
  font-family: 'Bangers', cursive;
  font-size: 22px;
  letter-spacing: 0.03em;
  color: #0A0A0A;
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}
.nav-links a {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  color: #0A0A0A;
  text-decoration: none;
  letter-spacing: 0.08em;
  transition: color 0.2s;
}
.nav-links a:hover { color: #FF6B00; }
.btn-nav-shop {
  font-family: 'Bangers', cursive;
  font-size: 16px;
  letter-spacing: 0.05em;
  background: #FF6B00;
  color: #FFFFFF;
  border: none;
  padding: 8px 18px;
  border-radius: 0;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.2s, color 0.2s;
  border: 2px solid #0A0A0A;
}
.btn-nav-shop:hover { background: #0A0A0A; color: #FF6B00; }

/* Hamburger */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
}
.hamburger span {
  width: 26px;
  height: 3px;
  background: #0A0A0A;
  display: block;
  transition: all 0.3s;
}

/* Mobile Drawer */
.nav-drawer {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #0A0A0A;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
}
.nav-drawer.open { transform: translateX(0); }
.nav-drawer a {
  font-family: 'Bangers', cursive;
  font-size: 48px;
  letter-spacing: 0.05em;
  color: #FFFFFF;
  text-decoration: none;
  transition: color 0.2s;
}
.nav-drawer a:hover { color: #FF6B00; }
.nav-drawer-close {
  position: absolute;
  top: 20px;
  right: 24px;
  background: none;
  border: none;
  color: #FFFFFF;
  font-size: 36px;
  cursor: pointer;
  font-family: 'Bangers', cursive;
  letter-spacing: 0.03em;
}

/* ===== HERO — PANEL 1 ===== */
#hero {
  min-height: 100vh;
  background: #FFFFFF;
  display: flex;
  align-items: center;
  padding-top: 64px;
  position: relative;
  overflow: hidden;
}
.hero-panel-wrap {
  width: calc(100% - 80px);
  max-width: 1200px;
  margin: 40px auto;
  border: 4px solid #0A0A0A;
  transform: rotate(-0.5deg);
  padding: 60px 64px;
  position: relative;
  background: #FFFFFF;
  min-height: 75vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  overflow: hidden;
}
.hero-speedlines {
  position: absolute;
  top: 50%;
  left: 40%;
  transform: translate(-50%, -50%);
  width: 900px;
  height: 900px;
  background: repeating-conic-gradient(
    from 0deg at 50% 50%,
    transparent 0deg,
    transparent 8.9deg,
    rgba(255,107,0,0.13) 8.9deg,
    rgba(255,107,0,0.13) 9.3deg
  );
  pointer-events: none;
  z-index: 0;
  border-radius: 50%;
}
.hero-content { position: relative; z-index: 1; }
.hero-headline-line1 {
  font-family: 'Bangers', cursive;
  font-size: clamp(80px, 12vw, 160px);
  letter-spacing: 0.03em;
  line-height: 0.9;
  color: #0A0A0A;
  display: block;
}
.hero-headline-anime {
  font-family: 'Bangers', cursive;
  font-size: clamp(120px, 18vw, 240px);
  letter-spacing: 0.03em;
  line-height: 0.85;
  color: #FF6B00;
  display: block;
}
.hero-headline-line3 {
  font-family: 'Bangers', cursive;
  font-size: clamp(80px, 12vw, 160px);
  letter-spacing: 0.03em;
  line-height: 0.9;
  color: #0A0A0A;
  display: block;
}
.hero-sfx {
  position: absolute;
  top: 24px;
  right: 32px;
  font-family: 'Bangers', cursive;
  font-size: 36px;
  letter-spacing: 0.05em;
  color: #FF6B00;
  transform: rotate(12deg);
  z-index: 2;
  text-shadow: 2px 2px 0 #0A0A0A;
}
.hero-ctas {
  display: flex;
  gap: 20px;
  margin-top: 48px;
  flex-wrap: wrap;
}
.btn-primary {
  font-family: 'Bangers', cursive;
  font-size: 22px;
  letter-spacing: 0.05em;
  background: #0A0A0A;
  color: #FFFFFF;
  padding: 14px 32px;
  border: 2px solid #0A0A0A;
  border-radius: 0;
  text-decoration: none;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  display: inline-block;
}
.btn-primary:hover { background: #FF6B00; border-color: #FF6B00; color: #FFFFFF; }
.btn-secondary {
  font-family: 'Bangers', cursive;
  font-size: 22px;
  letter-spacing: 0.05em;
  background: #FFFFFF;
  color: #0A0A0A;
  padding: 14px 32px;
  border: 2px solid #0A0A0A;
  border-radius: 0;
  text-decoration: none;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  display: inline-block;
}
.btn-secondary:hover { background: #FF6B00; border-color: #FF6B00; color: #FFFFFF; }

/* ===== TICKER ===== */
.ticker {
  background: #0A0A0A;
  padding: 14px 0;
  overflow: hidden;
  width: 100%;
  position: relative;
}
.ticker-track {
  display: flex;
  white-space: nowrap;
  animation: ticker-scroll 20s linear infinite;
  width: max-content;
}
.ticker-track span {
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  color: #FFFFFF;
  letter-spacing: 0.08em;
  padding: 0 12px;
}
@keyframes ticker-scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* ===== SECTION LABELS ===== */
.section-label {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  color: #FF6B00;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 16px;
  display: block;
}
.section-headline {
  font-family: 'Bangers', cursive;
  font-size: clamp(48px, 7vw, 96px);
  letter-spacing: 0.03em;
  line-height: 0.95;
  color: #0A0A0A;
  margin-bottom: 48px;
}

/* ===== MERCH — PANEL 2 ===== */
#merch {
  background: #FFFFFF;
  padding: 80px 0;
  overflow: hidden;
}
.merch-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 60px;
  border: var(--border);
  transform: rotate(0.3deg);
  background: #FFFFFF;
  position: relative;
}
.merch-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
.merch-card {
  border: 3px solid #0A0A0A;
  padding: 28px 24px;
  background: #FFFFFF;
  transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), box-shadow 0.3s, border-color 0.3s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.merch-card:hover {
  transform: translateY(-8px);
  border-color: #FF6B00;
  box-shadow: 0 12px 40px rgba(255,107,0,0.3), 4px 4px 0 #0A0A0A;
}
.merch-card-series {
  font-family: 'Bangers', cursive;
  font-size: 28px;
  letter-spacing: 0.03em;
  color: #0A0A0A;
  margin-bottom: 8px;
  line-height: 1;
}
.merch-card-tag {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  color: #FF6B00;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 20px;
  display: block;
}
.merch-card-cta {
  font-family: 'Bangers', cursive;
  font-size: 18px;
  letter-spacing: 0.05em;
  color: #0A0A0A;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.merch-card-cta:hover { color: #FF6B00; border-bottom-color: #FF6B00; }
.merch-card-icon {
  font-size: 40px;
  margin-bottom: 16px;
  display: block;
}

/* ===== GENRES — PANEL 3 ===== */
#genres {
  background: #f5f5f5;
  padding: 80px 0;
  overflow: hidden;
}
.genres-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 60px;
  border: var(--border);
  transform: rotate(-0.5deg);
  background: #f5f5f5;
}
.genres-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.genre-card {
  background: #0A0A0A;
  border: 3px solid #0A0A0A;
  padding: 48px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  min-height: 160px;
}
.genre-card::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 0;
  background: rgba(255,107,0,0.9);
  transition: height 0.35s cubic-bezier(0.22,1,0.36,1);
  z-index: 1;
}
.genre-card:hover::after { height: 100%; }
.genre-name {
  font-family: 'Bangers', cursive;
  font-size: clamp(32px, 4vw, 52px);
  letter-spacing: 0.05em;
  color: #FFFFFF;
  position: relative;
  z-index: 2;
  text-align: center;
  transition: color 0.2s;
}
.genre-card:hover .genre-name { color: #0A0A0A; }

/* ===== BLOG — PANEL 4 ===== */
#blog {
  background: #FFFFFF;
  padding: 80px 0;
  overflow: hidden;
}
.blog-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 60px;
  border: var(--border);
  transform: rotate(0.4deg);
  background: #FFFFFF;
}
.blog-spread {
  display: grid;
  grid-template-columns: 1.6fr 1fr;
  gap: 24px;
}
.blog-card {
  border: 3px solid #0A0A0A;
  padding: 36px 28px;
  background: #FFFFFF;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: box-shadow 0.3s, transform 0.3s;
}
.blog-card:hover {
  box-shadow: 6px 6px 0 #0A0A0A;
  transform: translate(-3px, -3px);
}
.blog-card-tag {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  color: #FF6B00;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.blog-card-title {
  font-family: 'Bangers', cursive;
  letter-spacing: 0.03em;
  color: #0A0A0A;
  line-height: 1;
}
.blog-card-title.large { font-size: clamp(28px, 4vw, 48px); }
.blog-card-title.small { font-size: clamp(22px, 3vw, 32px); }
.blog-card-excerpt {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: #444;
  line-height: 1.6;
}
.blog-card-date {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: #888;
  margin-top: auto;
}
.blog-right {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* ===== QUIZ CTA — PANEL 5 ===== */
#quiz-cta {
  background: #0A0A0A;
  padding: 120px 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.quiz-speedlines {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 1400px;
  height: 1400px;
  background: repeating-conic-gradient(
    from 0deg at 50% 50%,
    transparent 0deg,
    transparent 8.9deg,
    rgba(255,255,255,0.06) 8.9deg,
    rgba(255,255,255,0.06) 9.2deg
  );
  pointer-events: none;
  z-index: 0;
  border-radius: 50%;
}
.quiz-content { position: relative; z-index: 1; }
.quiz-line1 {
  font-family: 'Bangers', cursive;
  font-size: clamp(48px, 8vw, 80px);
  letter-spacing: 0.03em;
  color: #FFFFFF;
  display: block;
  line-height: 1;
}
.quiz-line2 {
  font-family: 'Bangers', cursive;
  font-size: clamp(80px, 14vw, 160px);
  letter-spacing: 0.03em;
  color: #FF6B00;
  display: block;
  line-height: 0.9;
}
.quiz-line3 {
  font-family: 'Bangers', cursive;
  font-size: clamp(48px, 8vw, 80px);
  letter-spacing: 0.03em;
  color: #FFFFFF;
  display: block;
  line-height: 1;
  margin-bottom: 48px;
}
.btn-quiz-cta {
  font-family: 'Bangers', cursive;
  font-size: 28px;
  letter-spacing: 0.05em;
  background: #FF6B00;
  color: #FFFFFF;
  padding: 18px 48px;
  border: 3px solid #FF6B00;
  border-radius: 0;
  text-decoration: none;
  display: inline-block;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}
.btn-quiz-cta:hover { background: #FFFFFF; color: #0A0A0A; border-color: #FFFFFF; }

/* ===== NEWSLETTER — PANEL 6 ===== */
#newsletter {
  background: #FFFFFF;
  padding: 80px 0;
  overflow: hidden;
}
.newsletter-inner {
  max-width: 800px;
  margin: 0 auto;
  padding: 60px;
  border: var(--border);
  transform: rotate(-0.3deg);
  background: #FFFFFF;
  text-align: center;
}
.newsletter-headline {
  font-family: 'Bangers', cursive;
  font-size: clamp(48px, 8vw, 96px);
  letter-spacing: 0.03em;
  color: #0A0A0A;
  margin-bottom: 16px;
}
.newsletter-sub {
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  color: #444;
  line-height: 1.6;
  margin-bottom: 40px;
  max-width: 460px;
  margin-left: auto;
  margin-right: auto;
}
.newsletter-form {
  display: flex;
  gap: 0;
  max-width: 480px;
  margin: 0 auto;
  border: 3px solid #0A0A0A;
}
.newsletter-input {
  flex: 1;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  padding: 14px 18px;
  border: none;
  outline: none;
  background: #FFFFFF;
  color: #0A0A0A;
}
.newsletter-input::placeholder { color: #aaa; }
.newsletter-btn {
  font-family: 'Bangers', cursive;
  font-size: 20px;
  letter-spacing: 0.05em;
  background: #FF6B00;
  color: #FFFFFF;
  border: none;
  padding: 14px 28px;
  cursor: pointer;
  border-left: 3px solid #0A0A0A;
  transition: background 0.2s;
  border-radius: 0;
}
.newsletter-btn:hover { background: #0A0A0A; }

/* ===== FOOTER ===== */
footer {
  background: #0A0A0A;
  color: #FFFFFF;
  padding: 60px 80px 40px;
}
.footer-top {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 40px;
  margin-bottom: 48px;
  padding-bottom: 48px;
  border-bottom: 1px solid rgba(255,255,255,0.15);
}
.footer-brand {
  font-family: 'Bangers', cursive;
  font-size: 36px;
  letter-spacing: 0.05em;
  color: #FFFFFF;
  margin-bottom: 12px;
}
.footer-tagline {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.08em;
}
.footer-col-title {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  color: #FF6B00;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 20px;
  display: block;
}
.footer-links {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.footer-links a {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  transition: color 0.2s;
}
.footer-links a:hover { color: #FF6B00; }
.footer-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
.footer-copy {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.06em;
}
.footer-amazon-disclaimer {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  max-width: 500px;
  line-height: 1.5;
}

/* ===== FLOAT STACK ===== */
.float-stack {
  position: fixed;
  bottom: 28px;
  right: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 900;
  align-items: center;
}
.float-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  border: 2px solid #0A0A0A;
  transition: transform 0.2s, box-shadow 0.2s;
  font-size: 22px;
  box-shadow: 3px 3px 0 #0A0A0A;
}
.float-btn:hover { transform: translateY(-3px); box-shadow: 5px 5px 0 #0A0A0A; }
.float-whatsapp { background: #25D366; }

<script>
/* ===== PANEL SLAM — IntersectionObserver ===== */
(function() {
  var panels = document.querySelectorAll('.panel-slam');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12 });
  panels.forEach(function(panel) {
    observer.observe(panel);
  });
})();

/* ===== HAMBURGER / DRAWER ===== */
(function() {
  var btn = document.getElementById('hamburgerBtn');
  var drawer = document.getElementById('navDrawer');
  var closeBtn = document.getElementById('drawerClose');
  function openDrawer() { drawer.classList.add('open'); document.body.style.overflow = 'hidden'; }
  function closeDrawer() { drawer.classList.remove('open'); document.body.style.overflow = ''; }
  btn.addEventListener('click', openDrawer);
  closeBtn.addEventListener('click', closeDrawer);
  drawer.querySelectorAll('a').forEach(function(a) { a.addEventListener('click', closeDrawer); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeDrawer(); });
})();

/* ===== BACK TO TOP ===== */
(function() {
  var topBtn = document.getElementById('backToTop');
  topBtn.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  topBtn.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  });
})();

(function() {

    a.onmouseout = function(){ this.style.background=""; this.style.color="#0A0A0A"; };
    dropdown.appendChild(a);
  });
  document.body.appendChild(dropdown);
  btn.addEventListener("click", function(e){ e.stopPropagation(); dropdown.style.display = dropdown.style.display==="none" ? "block" : "none"; });
  document.addEventListener("click", function(){ dropdown.style.display="none"; });
})();
</script>

</style><style>
.at-focus-btn{font-family:'Inter',sans-serif;font-size:0.78rem;font-weight:600;padding:6px 14px;border:2px solid #0A0A0A;background:none;color:#0A0A0A;cursor:pointer;transition:all 0.15s;}

.at-active{background:#FF6B00!important;color:#fff!important;border-color:#FF6B00!important;}
#at-genre-input:focus{border-color:#FF6B00!important;}
#at-find-btn{width:100%;padding:16px 32px;font-family:'Bangers',cursive;font-size:1.4rem;letter-spacing:3px;background:#FF6B00;color:#fff;border:3px solid #0A0A0A;cursor:pointer;transition:all 0.15s;box-shadow:4px 4px 0 #0A0A0A;}
#at-find-btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #0A0A0A;}
#at-find-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:4px 4px 0 #0A0A0A;}
#at-copy-btn:hover{background:#0A0A0A;color:#fff;}
</style>

<script>
(function(){
var atFocus='trends';
function getKey(){return localStorage.getItem('pd_groq_key')||'';}
window.atSaveKey=function(){
  var k=document.getElementById('at-api-key-input').value.trim();
  if(!k){document.getElementById('at-key-status').textContent='Please enter a key.';return;}
  localStorage.setItem('pd_groq_key',k);
  document.getElementById('at-key-status').innerHTML='<span style="color:#FF6B00;font-weight:600">&#10003; Key saved in your browser.</span>';
  document.getElementById('at-api-key-input').value='';
};
(function initStatus(){
  if(getKey()) document.getElementById('at-key-status').innerHTML='<span style="color:#FF6B00;font-weight:600">&#10003; API key ready.</span>';
})();
window.atSetFocus=function(btn,f){
  atFocus=f;
  document.querySelectorAll('.at-focus-btn').forEach(function(b){b.classList.remove('at-active');});
  btn.classList.add('at-active');
};
window.atFindTrends=function(){
  var genre=document.getElementById('at-genre-input').value.trim();
  var key=getKey();
  var btn=document.getElementById('at-find-btn');
  var btnTxt=document.getElementById('at-btn-text');
  var output=document.getElementById('at-output');
  var result=document.getElementById('at-result');
  var err=document.getElementById('at-error');
  err.style.display='none'; output.style.display='none';
  if(!key){err.textContent='Please save your Groq API key first (see setup above).';err.style.display='block';return;}
  if(!genre){err.textContent='Please enter an anime genre or topic first.';err.style.display='block';return;}
  var focusMap={
    trends:'List the top 5-7 currently trending topics, shows, characters, or themes within this genre. Include what is driving each trend.',
    content:'Generate 8 specific, creative content ideas (posts, videos, reviews, lists) for creators or shops in this anime genre. Make them actionable.',
    audience:'Describe the typical audience for this anime genre: demographics, what they love, what they buy, what content they engage with most, and how to reach them.',
    all:'Provide a full trend report covering: (1) What is trending now, (2) Top content ideas, (3) Audience profile and what drives them to buy or engage. Be thorough.'
  };
  btn.disabled=true; btnTxt.textContent='SCANNING TRENDS...';
  fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({
      model:'llama-3.1-8b-instant',
      messages:[
        {role:'system',content:'You are an anime industry analyst and content strategist. You know everything about anime trends, fandom culture, merchandise, and audience behaviour. Respond in structured plain text with emoji headers. Be specific, enthusiastic, and actionable. Max 500 words.'},
        {role:'user',content:'Anime genre/topic: '+genre+'\n\nTask: '+focusMap[atFocus]}
      ],
      max_tokens:700,temperature:0.7
    })
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.choices&&d.choices[0]&&d.choices[0].message){
      result.textContent=d.choices[0].message.content;
      output.style.display='block';
      output.scrollIntoView({behavior:'smooth',block:'start'});
    } else {throw new Error(d.error?d.error.message:'Unexpected AI response');}
  })
  .catch(function(e){err.textContent='Error: '+(e.message||'Please try again.');err.style.display='block';})
  .finally(function(){btn.disabled=false;btnTxt.textContent='> FIND TRENDS';});
};
window.atCopy=function(){
  var t=document.getElementById('at-result').textContent;
  var b=document.getElementById('at-copy-btn');
  if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){b.textContent='[ COPIED! ]';setTimeout(function(){b.textContent='[ COPY ]';},2000);});}
};
})();
</script>
