<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Moblync — App Dev Command</title>
<link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap' rel='stylesheet'>
<style>
:root{--primary:#8B5CF6;--dark:#0F0A1C;--border:rgba(255,255,255,0.08);--card:rgba(30,27,75,0.4)}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--dark);color:white;font-family:'Plus Jakarta Sans',sans-serif;display:flex;min-height:100vh}
.sidebar{width:260px;background:rgba(0,0,0,0.2);border-right:1px solid var(--border);padding:40px 25px;display:flex;flex-direction:column}
.main{flex:1;padding:50px;overflow-y:auto}
.nav-link{padding:12px 16px;color:rgba(255,255,255,0.4);text-decoration:none;font-weight:600;border-radius:12px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.nav-link.active{background:rgba(139,92,246,0.1);color:var(--primary)}
.project-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:30px;margin-bottom:30px}
.build-status{display:flex;align-items:center;gap:10px;font-size:0.75rem;font-weight:700;text-transform:uppercase;color:var(--primary);margin-bottom:15px}
.btn-purple{background:var(--primary);color:white;border:none;padding:12px 24px;border-radius:12px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class='sidebar'>
<div style='font-size:1.5rem;font-weight:800;color:var(--primary);margin-bottom:40px'>MOBLYNC</div>
<a href='#' class='nav-link active'>📱 My Apps</a>
<a href='#' class='nav-link'>🚀 Build & Deploy</a>
<a href='#' class='nav-link'>🔌 API Connectors</a>
<a href='#' class='nav-link'>📊 App Analytics</a>
</div>
<div class='main'>
<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:40px'>
<div><h1 style='font-size:2.5rem;font-weight:800'>App Development</h1><p style='color:rgba(255,255,255,0.4)'>Agentic development pipeline v2.0</p></div>
<button class='btn-purple'>+ Create New App</button>
</div>
<div class='project-card'>
<div class='build-status'>🔵 Build In Progress (84%)</div>
<h2 style='font-size:1.8rem;margin-bottom:10px'>Calalloo iOS/Android</h2>
<p style='color:rgba(255,255,255,0.5);margin-bottom:25px'>Pushing heritage recipe nodes to native mobile environment. Syncing with local grocery APIs.</p>
<div style='height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;margin-bottom:30px'>
<div style='width:84%;height:100%;background:var(--primary)'></div>
</div>
<div style='display:flex;gap:15px'><button class='btn-purple' style='font-size:0.8rem'>View Simulator</button><button style='background:transparent;border:1px solid var(--border);color:white;padding:10px 20px;border-radius:12px;font-size:0.8rem'>Native Debugger</button></div>
</div>
</div>
</body>
</html>
