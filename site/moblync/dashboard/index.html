<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Moblync — AI Design Canvas</title>
<link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap' rel='stylesheet'>
<style>
:root{--primary:#8B5CF6;--dark:#0F0A1C;--canvas:#1E1B4B;--card-bg:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08)}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--dark);color:white;font-family:'Plus Jakarta Sans',sans-serif;display:flex;height:100vh;overflow:hidden}
.sidebar{width:70px;background:rgba(0,0,0,0.3);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:20px 0}
.toolbar{width:280px;background:rgba(15,10,28,0.8);border-right:1px solid var(--border);padding:24px;display:flex;flex-direction:column}
.canvas-area{flex:1;background:var(--canvas);background-image:radial-gradient(var(--border) 1px, transparent 1px);background-size:30px 30px;display:flex;align-items:center;justify-content:center;position:relative;overflow:auto}
.logo-icon{width:40px;height:40px;background:var(--primary);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;margin-bottom:40px;box-shadow:0 0 20px rgba(139,92,246,0.3)}
.tool-btn{width:44px;height:44px;border-radius:10px;color:rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;margin-bottom:15px;cursor:pointer;transition:0.3s}
.tool-btn:hover, .tool-btn.active{background:rgba(139,92,246,0.1);color:var(--primary)}
.phone-frame{width:320px;height:650px;background:#000;border:12px solid #222;border-radius:45px;box-shadow:0 50px 100px rgba(0,0,0,0.5);position:relative;overflow:hidden}
.app-screen{padding:20px;height:100%;background:linear-gradient(135deg, #1e1b4b 0%, #0f0a1c 100%)}
.ai-badge{background:var(--primary);color:white;font-size:0.65rem;font-weight:800;padding:4px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:1px}
.panel-title{font-size:0.8rem;text-transform:uppercase;color:rgba(255,255,255,0.3);font-weight:700;letter-spacing:1.5px;margin-bottom:20px}
.component-card{background:var(--card-bg);border:1px solid var(--border);padding:15px;border-radius:12px;margin-bottom:12px;cursor:grab;transition:0.3s}
.component-card:hover{background:rgba(255,255,255,0.06);border-color:var(--primary)}
.prompt-box{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);width:600px;background:rgba(15,10,28,0.9);backdrop-filter:blur(20px);padding:12px;border-radius:100px;border:1px solid var(--primary);display:flex;gap:10px;box-shadow:0 20px 40px rgba(0,0,0,0.4)}
.prompt-input{flex:1;background:transparent;border:none;color:white;padding:0 20px;outline:none;font-size:0.95rem}
.gen-btn{background:var(--primary);color:white;border:none;padding:12px 24px;border-radius:100px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class='sidebar'>
<div class='logo-icon'>M</div>
<div class='tool-btn active'>🎨</div>
<div class='tool-btn'>🧱</div>
<div class='tool-btn'>📁</div>
<div class='tool-btn'>⚡️</div>
<div style='margin-top:auto' class='tool-btn'>⚙️</div>
</div>
<div class='toolbar'>
<div class='panel-title'>UI Components</div>
<div class='component-card'>📱 App Bar</div>
<div class='component-card'>🖼 Hero Image</div>
<div class='component-card'>📋 Card List</div>
<div class='component-card'>🔘 Action Button</div>
<div style='margin-top:40px' class='panel-title'>Project Stats</div>
<p style='font-size:0.9rem;color:rgba(255,255,255,0.6)'>Current Build: v1.0.4</p>
<div style='background:rgba(5,150,105,0.1);color:#10B981;padding:8px 12px;border-radius:8px;font-size:0.75rem;font-weight:700;margin-top:10px'>✓ Ready for Deployment</div>
</div>
<div class='canvas-area'>
<div class='phone-frame'>
<div class='app-screen'>
<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:30px'>
<div class='ai-badge'>AI Prototype</div>
<div style='font-size:0.8rem;opacity:0.5'>9:41</div>
</div>
<h2 style='font-size:2rem;margin-bottom:15px'>Smart Home</h2>
<div style='height:120px;background:rgba(255,255,255,0.05);border-radius:20px;margin-bottom:20px'></div>
<div style='display:grid;grid-template-columns:1fr 1fr;gap:15px'>
<div style='height:100px;background:rgba(139,92,246,0.1);border-radius:20px;border:1px solid rgba(139,92,246,0.2)'></div>
<div style='height:100px;background:rgba(255,255,255,0.05);border-radius:20px'></div>
</div>
</div>
</div>
<div class='prompt-box'>
<input type='text' class='prompt-input' placeholder='Describe your mobile UI... (e.g. "A luxury fragrance shop app bar")'>
<button class='gen-btn'>✨ Generate UI</button>
</div>
</div>
</body>
</html>
