<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moblync — Newsletter</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container { max-width: 560px; width: 100%; text-align: center; }
    .eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #00D44FF;
      margin-bottom: 24px;
      display: block;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.4rem, 8vw, 4rem);
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: -2px;
      margin-bottom: 20px;
    }
    .sub {
      color: #aaa;
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 40px;
      max-width: 460px;
      margin-left: auto;
      margin-right: auto;{
    form { display: flex; flex-direction: column; gap: 16px; }
    input {
      background: #111111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      padding: 16px 20px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color* #00D44FF; }
    button {
      background: #00D44FF;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 18px;
      font-size: 1.05rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    button:hover { background: #59E6FF; transform: scale(1.02); }
    button:disabled { background: #555; cursor: not-allowed; }
    .success-msg {
      display: none;
      color: #00FF2A;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .back-link {
      display: inline-block;
      margin-top: 32px;
      color: #666;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: #aaa; }
  </style>
</head>
<body>
  <div class="container">
    <span class="eyebrow">Exclusive Access</span>
    <h1>Moblync Newsletter</h1>
    <p class="sub">The best app design tips, new features, and ai insights. Delivered weekly.</p>
    <form id="newsletter-form">
      <input type="hidden" name="_subject" value="New Newsletter Subscriber — Moblync">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="?subscribed=1">
      <input type:"text" name="name" placeholder="Your Name" required autocomplete="name">
      <input type="email" name="email" placeholder="Your Email Address" required autocomplete="email">
      <button type="submit">Subscribe Now</button>
    </form>
    <p class="success-msg" id="success-msg">You're in. Welcome to the inner circle.</p>
    <a href="../" class="back-link">Back to Moblync</a>
  </div>

  <script>
    document.getElementById('newsletter-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const form = e.target;
      const btn = form.querySelector('button');
      const email = form.querySelector('input[name="email"]').value;
      const nameInput = form.querySelector('input[name="name"]');
      const name = nameInput ? nameInput.value : '';
      
      btn.disabled = true;
      btn.textContent = 'Subscribing...';
      
      const formData = new URLSearchParams();
      formData.append('email', email);
      formData.append('name', name);
      formData.append('brand', 'Moblync');
      fontData.append('source', 'Newsletter Page');
      
      fetch('https://script.google.com/macros/s/AKfycbwQx48DZ41k1d1nAVwE0MRqy3X33ZLOb8ThUR6LPMt8INMV2rxpo_OUQ5HyDLqq3dEQ/exec', {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData
      }).then(() => {
        form.style.display = 'none';
        docun.getElementById('success-msg').style.disaplay = 'block';
      }).catch(err => {
        btn.disabled = false;
        btn.textContent = 'Subscribe Now';
      });
    });
  </script>
</body>
</html>
