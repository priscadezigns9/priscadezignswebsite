<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Hub | dpanyard</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAACXBIWXMAAAsTAAALEwEAmpwYAAABy0lEQVRYhe2Xv0sCYRjHPw9SCDNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSByCHNoCILAnBocGhpCInALCiIisSB6Ab4Bf0K6C83mF2EAAAAASUVORK5CYII=">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #E87722; --primary-soft: #FFF7ED;
            --bg: #FFFFFF; --text: #0F172A; --text-muted: #64748B;
            --grey-light: #F8FAFC; --border: #F1F5F9;
            --font-display: 'Fraunces', serif; --font-sans: 'Inter', sans-serif;
            --white: #FFFFFF;
        }

        [data-theme="dark"] {
            --bg: #0F172A; --text: #F1F5F9; --text-muted: #94A3B8;
            --grey-light: #1E293B; --border: #334155; --white: #1E293B;
            --primary-soft: rgba(232, 119, 34, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body { font-family: var(--font-sans); background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }

        .sidebar { width: 280px; border-right: 1px solid var(--border); padding: 40px 24px; display: flex; flex-direction: column; gap: 40px; background: var(--white); z-index: 10; }
        .logo { font-family: var(--font-display); font-size: 26px; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 12px; font-weight: 900; }
        .logo-d { background: var(--primary); color: white; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        .nav-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 12px; }
        .nav-list { display: flex; flex-direction: column; gap: 4px; }
        .nav-item { padding: 12px 16px; border-radius: 12px; cursor: pointer; transition: 0.2s; font-weight: 600; font-size: 14px; color: var(--text-muted); display: flex; align-items: center; gap: 12px; }
        .nav-item:hover { background: var(--grey-light); color: var(--text); }
        .nav-item.active { background: var(--primary-soft); color: var(--primary); }

        .main { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }
        .topbar { height: 80px; background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; flex-shrink: 0; }
        
        .section { padding: 40px; display: none; height: calc(100vh - 80px); overflow-y: auto; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .discovery-grid { display: flex; height: 100%; overflow: hidden; }
        .list-view { width: 420px; padding: 32px; overflow-y: auto; background: var(--white); border-right: 1px solid var(--border); }
        .map-view { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }

        .card { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .input-group label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        input, select, textarea { padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--grey-light); color: var(--text); outline: none; width: 100%; }

        .btn-main { padding: 14px 24px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232, 119, 34, 0.2); }
        .btn-secondary { background: var(--grey-light); color: var(--text); border: 1px solid var(--border); }

        .wallet-balance { font-size: 48px; font-weight: 900; font-family: var(--font-display); color: var(--primary); margin: 20px 0; }
        
        #detail-overlay { position: fixed; top: 0; right: 0; width: 500px; height: 100%; background: var(--white); z-index: 1000; box-shadow: -20px 0 60px rgba(0,0,0,0.1); transform: translateX(100%); transition: 0.4s ease; padding: 48px; overflow-y: auto; }
        #detail-overlay.active { transform: translateX(0); }

        #error-log { position: fixed; bottom: 20px; right: 20px; background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 8px; font-size: 12px; display: none; z-index: 9999; }
    </style>
</head>
<body data-theme="light">

    <div id="error-log"></div>

    <aside class="sidebar">
        <a href="../index.html" class="logo">
            <div class="logo-d">D</div>
            dpanyard
        </a>
        
        <div>
            <div class="nav-label">Navigation</div>
            <div class="nav-list">
                <div class="nav-item active" onclick="showSection('discovery', this)"><i data-lucide="layout-dashboard"></i> Dashboard</div>
                <div class="nav-item" onclick="showSection('discovery', this)"><i data-lucide="map-pin"></i> My Neighborhood</div>
                <div class="nav-item" onclick="showSection('appointments', this)"><i data-lucide="calendar-days"></i> My Appointments</div>
                <div class="nav-item" onclick="showSection('profile', this)"><i data-lucide="user"></i> My Profile</div>
            </div>
        </div>

        <div style="margin-top: auto;">
            <div class="nav-label">System</div>
            <div class="nav-list">
                <div class="nav-item" onclick="showSection('settings', this)"><i data-lucide="settings"></i> Settings</div>
                <div class="nav-item" onclick="signOut()"><i data-lucide="log-out"></i> Log Out</div>
            </div>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <h2 id="header-title" style="font-family: var(--font-display);">Dashboard</h2>
            <div id="user-display" style="display: flex; align-items: center; gap: 12px; font-weight: 800;">
                <div id="user-avatar" style="width: 40px; height: 40px; border-radius: 12px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; overflow: hidden;">U</div>
                <span id="user-name">Loading...</span>
            </div>
        </div>

        <section id="discovery" class="section active" style="padding: 0;">
            <div class="discovery-grid">
                <div class="list-view">
                    <div style="position: relative; margin-bottom: 24px;">
                        <input type="text" id="biz-search" placeholder="Search professionals..." style="padding-left: 45px;" oninput="handleSearch(this.value)">
                        <i data-lucide="search" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);" size="18"></i>
                    </div>
                    <div id="biz-list"></div>
                </div>
                <div class="map-view"><div id="map"></div></div>
            </div>
        </section>

        <section id="appointments" class="section">
            <h1 style="font-family: var(--font-display); margin-bottom: 30px;">Upcoming Events</h1>
            <div id="apt-list">
                <p style="color: var(--text-muted);">No upcoming events scheduled yet.</p>
            </div>
        </section>

        <section id="profile" class="section">
            <h1 style="font-family: var(--font-display); margin-bottom: 30px;">My Profile</h1>
            <div class="card">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="p-name" placeholder="Enter your name">
                </div>
                <div class="input-group">
                    <label>WhatsApp Number</label>
                    <input type="text" id="p-phone" placeholder="+1 868 ...">
                </div>
                <div class="input-group">
                    <label>Profile Picture (Avatar)</label>
                    <input type="file" id="p-avatar-file" onchange="uploadAvatar(this)">
                </div>
                <button class="btn-main btn-primary" onclick="saveProfile(event)"><i data-lucide="save"></i> Save Details</button>
            </div>
        </section>

        <section id="settings" class="section">
            <h1 style="font-family: var(--font-display); margin-bottom: 30px;">Settings</h1>
            <div class="card">
                <h3 style="margin-bottom: 20px;">UI Preferences</h3>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <span>Dark Mode</span>
                    <button class="btn-main" id="dark-toggle" onclick="toggleDark()"><i data-lucide="moon"></i> Enable</button>
                </div>
                <hr style="border: none; border-top: 1px solid var(--border); margin: 20px 0;">
                <h3 style="margin-bottom: 20px;">Privacy & Permissions</h3>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <span>Location Services</span>
                    <button class="btn-main" style="background: #eee;" onclick="requestPermission('location', event)">Request Permission</button>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span>Camera Access</span>
                    <button class="btn-main" style="background: #eee;" onclick="requestPermission('camera', event)">Request Permission</button>
                </div>
            </div>
        </section>
    </main>

    <div id="detail-overlay">
        <button onclick="closeDetail()" style="border:none; background:none; font-size:24px; cursor:pointer; color: var(--text-muted);">&times;</button>
        <div id="detail-content"></div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key={{credential:google-maps-api-key}}&callback=initMap" async defer></script>
    <script>
        function logError(msg) {
            const el = document.getElementById('error-log');
            el.innerText = msg;
            el.style.display = 'block';
            console.error(msg);
        }

        let sb, map, user, businesses = [], markers = [];

        try {
            sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', '{{credential:supabase-callaloo-dpanyard}}');
        } catch(e) { logError("Supabase Config Error"); }

        async function init() {
            try {
                const { data, error } = await sb.auth.getUser();
                if(error || !data.user) return window.location.href = '../login/';
                user = data.user;
                document.getElementById('user-name').innerText = user.email.split('@')[0];
                document.getElementById('user-avatar').innerText = user.email[0].toUpperCase();
                loadProfile();
                lucide.createIcons();
            } catch(e) { logError("Init Error: " + e.message); }
        }

        async function initMap() {
            try {
                map = new google.maps.Map(document.getElementById("map"), { 
                    zoom: 12, 
                    center: { lat: 10.65, lng: -61.51 }, 
                    disableDefaultUI: true,
                    styles: [
                        { "featureType": "all", "elementType": "labels.text.fill", "stylers": [{ "color": "#7c93a3" }, { "lightness": "-10" }] },
                        { "featureType": "administrative.country", "elementType": "geometry", "stylers": [{ "visibility": "on" }] },
                        { "featureType": "landscape", "elementType": "geometry", "stylers": [{ "color": "#f5f5f5" }, { "lightness": "20" }] },
                        { "featureType": "poi", "elementType": "geometry", "stylers": [{ "color": "#f5f5f5" }, { "lightness": "21" }] },
                        { "featureType": "road.highway", "elementType": "geometry.fill", "stylers": [{ "color": "#ffffff" }, { "lightness": "17" }] },
                        { "featureType": "road.highway", "elementType": "geometry.stroke", "stylers": [{ "color": "#ffffff" }, { "lightness": "29" }, { "weight": "0.2" }] }
                    ]
                });
                loadBusinesses();
            } catch(e) { logError("Map Error"); }
        }

        function showSection(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            if(el) el.classList.add('active');
            document.getElementById('header-title').innerText = el ? el.innerText.trim() : id.charAt(0).toUpperCase() + id.slice(1);
            if(id === 'discovery' && map) {
                setTimeout(() => google.maps.event.trigger(map, 'resize'), 300);
            }
            lucide.createIcons();
        }

        async function loadProfile() {
            try {
                const { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
                if(data) {
                    document.getElementById('p-name').value = data.full_name || '';
                    document.getElementById('p-phone').value = data.bio?.split('WA:')[1] || '';
                    if(data.avatar_url) {
                        document.getElementById('user-avatar').innerHTML = `<img src="${data.avatar_url}" style="width:100%; height:100%; object-fit:cover; border-radius:12px;">`;
                    }
                }
            } catch(e) {}
        }

        async function saveProfile(e) {
            const name = document.getElementById('p-name').value;
            const wa = document.getElementById('p-phone').value;
            const btn = e.currentTarget;
            btn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Saving...';
            lucide.createIcons();
            await sb.from('profiles').upsert({ id: user.id, full_name: name, bio: `WA:${wa}` });
            btn.innerHTML = '<i data-lucide="check"></i> Profile Saved';
            setTimeout(() => { btn.innerHTML = '<i data-lucide="save"></i> Save Details'; lucide.createIcons(); }, 2000);
            lucide.createIcons();
        }

        async function handleSearch(val) {
            const filtered = businesses.filter(b => 
                b.full_name.toLowerCase().includes(val.toLowerCase()) || 
                (b.niche && b.niche.toLowerCase().includes(val.toLowerCase()))
            );
            renderList(filtered);
        }

        async function requestPermission(type, e) {
            const btn = e.currentTarget;
            btn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Requesting...';
            lucide.createIcons();
            try {
                if(type === 'location') {
                    navigator.geolocation.getCurrentPosition(() => {
                        btn.innerHTML = '<i data-lucide="check"></i> Enabled';
                        btn.style.background = '#dcfce7';
                    }, (err) => {
                        btn.innerHTML = '<i data-lucide="x"></i> Denied';
                        btn.style.background = '#fee2e2';
                    });
                } else if(type === 'camera') {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    stream.getTracks().forEach(track => track.stop());
                    btn.innerHTML = '<i data-lucide="check"></i> Enabled';
                    btn.style.background = '#dcfce7';
                }
            } catch(err) {
                btn.innerHTML = '<i data-lucide="x"></i> Error';
                btn.style.background = '#fee2e2';
            }
            lucide.createIcons();
        }

        async function uploadAvatar(el) {
            const file = el.files[0];
            if(!file) return;
            const btn = document.querySelector('button[onclick*="saveProfile"]');
            btn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Uploading...';
            lucide.createIcons();
            const path = `avatars/${user.id}_${Date.now()}.jpg`;
            const { error } = await sb.storage.from('avatars').upload(path, file);
            if(!error) {
                const { data: { publicUrl } } = sb.storage.from('avatars').getPublicUrl(path);
                await sb.from('profiles').update({ avatar_url: publicUrl }).eq('id', user.id);
                document.getElementById('user-avatar').innerHTML = `<img src="${publicUrl}" style="width:100%; height:100%; object-fit:cover; border-radius:12px;">`;
            }
            btn.innerHTML = '<i data-lucide="save"></i> Save Details';
            lucide.createIcons();
        }

        async function loadBusinesses() {
            try {
                const { data } = await sb.from('profiles').select('*').not('niche', 'is', null);
                businesses = data || [];
                renderList(businesses);
            } catch(e) {}
        }

        function renderList(list) {
            const container = document.getElementById('biz-list');
            container.innerHTML = list.map(b => `
                <div style="padding: 20px; border-bottom: 1px solid var(--border); cursor: pointer;" onclick="openDetail('${b.id}')">
                    <div style="font-weight: 800; font-family: var(--font-display);">${b.full_name}</div>
                    <div style="font-size: 13px; color: var(--primary); font-weight: 700;">${b.niche || 'Professional Node'}</div>
                </div>
            `).join('');
            markers.forEach(m => m.setMap(null));
            markers = list.map(b => {
                const m = new google.maps.Marker({ position: { lat: parseFloat(b.location_lat) || 10.65, lng: parseFloat(b.location_lng) || -61.51 }, map });
                m.addListener('click', () => openDetail(b.id));
                return m;
            });
        }

        function openDetail(id) {
            const b = businesses.find(item => item.id === id);
            document.getElementById('detail-content').innerHTML = `
                <h2 style="font-family: var(--font-display); font-size: 28px;">${b.full_name}</h2>
                <div style="color: var(--primary); font-weight: 800; margin-bottom: 20px;">${b.niche || 'Professional Node'}</div>
                <button class="btn-main btn-primary" style="width: 100%;" onclick="bookApt()">Book Appointment</button>
            `;
            document.getElementById('detail-overlay').classList.add('active');
        }

        function closeDetail() { document.getElementById('detail-overlay').classList.remove('active'); }

        function toggleDark() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('dark-toggle').innerHTML = isDark ? '<i data-lucide="moon"></i> Enable' : '<i data-lucide="sun"></i> Disable';
            lucide.createIcons();
        }

        function signOut() { sb.auth.signOut(); window.location.href = '../login/'; }
        function bookApt() { alert("Booking request sent."); }

        init();
    </script>
</body>
</html>
