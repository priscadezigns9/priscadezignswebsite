    <style>
        :root {
            --primary: #E87722;
            --white: #FFFFFF;
            --bg-light: #F8FAFC;
            --text-dark: #0F172A;
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: var(--bg-light); color: var(--text-dark); -webkit-font-smoothing: antialiased; }
        
        nav { padding: 30px 60px; display: flex; justify-content: space-between; align-items: center; background: var(--white); border-bottom: 1px solid #eee; }
        .logo { font-family: var(--font-display); font-size: 28px; color: var(--primary); text-decoration: none; font-weight: 900; display: flex; align-items: center; gap: 12px; }
        .logo-d { background: var(--primary); color: white; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 22px; }

        .hero { padding: 100px 60px; text-align: center; }
        .hero h1 { font-family: var(--font-display); font-size: 4rem; margin-bottom: 20px; line-height: 1.1; }
        .hero span { color: var(--primary); }
        .hero p { font-size: 1.25rem; color: #64748B; max-width: 600px; margin: 0 auto 40px; }

        .search-box { display: flex; max-width: 700px; margin: 0 auto; background: white; padding: 10px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .search-box input { flex: 1; border: none; padding: 20px; outline: none; font-size: 1.1rem; border-radius: 15px; }
        .search-box button { background: var(--primary); color: white; border: none; padding: 20px 40px; border-radius: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px; }

        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-dark); font-weight: 600; }
        .nav-cta { background: var(--primary); color: white !important; padding: 12px 24px; border-radius: 12px; }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">
        <div class="logo-d">D</div>
        dpanyard
    </a>
    <div class="nav-links">
        <a href="login/">Sign In</a>
        <a href="signup/" class="nav-cta">Join the Panyard</a>
    </div>
</nav>

<div class="hero">
    <h1>The Service Network.<br><span>Verified & Local.</span></h1>
    <p>Connecting you with the best professional nodes in your neighbourhood.</p>
    <div class="search-box">
        <input type="text" placeholder="What are you looking for? (e.g. Plumber, Tech, Beauty)">
        <button><i data-lucide="search"></i> Discover</button>
    </div>
</div>

<script>
    lucide.createIcons();
    // Check session to update CTA
    const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', '{{credential:supabase-callaloo-dpanyard}}');
    async function checkAuth() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            document.querySelector('.nav-links').innerHTML = `
                <a href="dashboard/personal">Dashboard</a>
                <a href="#" onclick="sb.auth.signOut(); location.reload();">Sign Out</a>
            `;
        }
    }
    checkAuth();
</script>
</body>
