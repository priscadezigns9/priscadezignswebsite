<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Confirmed | Calalloo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #FFF8F0;
            --primary: #E87722;
            --dark: #1A0D00;
            --mid: #8B4A1E;
            --white: #FFFFFF;
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--dark); font-family: var(--font-sans); line-height: 1.6; -webkit-font-smoothing: antialiased; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        
        .success-card { max-width: 600px; padding: 4rem; background: var(--white); border-radius: 48px; border: 1px solid rgba(26,13,0,0.05); box-shadow: 0 40px 80px rgba(0,0,0,0.05); }
        .success-card h1 { font-family: var(--font-display); font-size: 3.5rem; margin-bottom: 1rem; color: var(--primary); }
        .success-card p { font-size: 1.2rem; color: var(--mid); margin-bottom: 3rem; }
        
        .btn-home { display: inline-block; background: var(--dark); color: var(--white); text-decoration: none; padding: 1.2rem 3rem; border-radius: 100px; font-weight: 700; transition: transform 0.3s ease; }
        .btn-home:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="success-card">
        <h1>You're In.</h1>
        <p>Check your inbox for your first "The Signal Network" recipe. Welcome to the future of Caribbean performance nutrition.</p>
        <a href="/" class="btn-home">Return Home</a>
    </div>

</body>
</html>
