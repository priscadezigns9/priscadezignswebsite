<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Feed — Calalloo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#E87722;
  --primary-light:#F5A623;
  --primary-dark:#B85A10;
  --bg:#FFF8F0;
  --card:#FFFFFF;
  --text:#1A0D00;
  --muted:rgba(26,13,0,0.45);
  --border:rgba(232,119,34,0.18);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:72px}

/* SPLASH SCREEN */
#splash{
  position:fixed;inset:0;z-index:99999;
  background:#FFF8F0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;
  transition:opacity .5s ease, visibility .5s ease;
}
#splash.hidden{opacity:0;visibility:hidden;pointer-events:none}
.splash-logo-wrap{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  animation:splashPop .6s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes splashPop{
  0%{opacity:0;transform:scale(.6) translateY(20px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
.splash-icon{
  width:96px;height:96px;border-radius:28px;
  background:linear-gradient(135deg,#E87722,#F5A623);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 12px 40px rgba(232,119,34,0.35);
  animation:splashGlow 1.6s ease-in-out infinite alternate;
}
@keyframes splashGlow{
  0%{box-shadow:0 12px 40px rgba(232,119,34,0.3)}
  100%{box-shadow:0 16px 56px rgba(232,119,34,0.6)}
}
.splash-icon img{width:180px;height:54px;object-fit:contain}
.splash-wordmark{
  font-family:'Fraunces',serif;font-size:2.2rem;font-weight:900;
  color:#1A0D00;letter-spacing:-1px;line-height:1;
}
.splash-wordmark span{color:#E87722}
.splash-tagline{
  font-size:.82rem;font-weight:500;color:rgba(26,13,0,0.5);
  letter-spacing:.5px;text-transform:uppercase;
  animation:splashFadeIn .6s .4s ease both;
}
@keyframes splashFadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.splash-dots{display:flex;gap:7px;animation:splashFadeIn .6s .6s ease both}
.splash-dot{width:7px;height:7px;border-radius:50%;background:rgba(232,119,34,0.3)}
.splash-dot:nth-child(1){animation:dotPulse 1.2s .2s ease-in-out infinite}
.splash-dot:nth-child(2){animation:dotPulse 1.2s .4s ease-in-out infinite}
.splash-dot:nth-child(3){animation:dotPulse 1.2s .6s ease-in-out infinite}
@keyframes dotPulse{0%,100%{background:rgba(232,119,34,0.25);transform:scale(1)}50%{background:#E87722;transform:scale(1.4)}}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:14px 5%;background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);box-shadow:0 2px 16px rgba(232,119,34,0.07);gap:12px}
.nav-logo{font-size:1.2rem;font-weight:900;color:var(--primary);text-decoration:none;flex-shrink:0;font-family:'Fraunces',serif}
.nav-logo span{color:#1A0D00}

/* SEARCH BAR */
.search-wrap{flex:1;max-width:520px;position:relative}
.search-input{width:100%;background:#FFF0E0;border:1.5px solid rgba(232,119,34,0.25);border-radius:50px;padding:10px 20px 10px 44px;font-size:.95rem;color:var(--text);outline:none;transition:border .2s;font-family:inherit}
.search-input:focus{border-color:var(--primary);background:#fff}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none}
.search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;cursor:pointer;color:var(--muted);display:none}

/* FILTER PILLS */
.filter-bar{display:flex;gap:8px;padding:14px 5% 4px;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-pill{flex-shrink:0;padding:7px 18px;border-radius:50px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-pill.active{background:var(--primary);border-color:var(--primary);color:#fff}
.filter-pill:hover:not(.active){border-color:var(--primary);color:var(--primary)}

/* RESULTS COUNT */
.results-bar{padding:10px 5% 0;font-size:.82rem;color:var(--muted);font-weight:500}

/* FEED GRID */
.feed-grid{columns:2;column-gap:12px;padding:14px 5% 100px;max-width:1200px;margin:0 auto}
@media(min-width:600px){.feed-grid{columns:3}}
@media(min-width:900px){.feed-grid{columns:4}}
@media(min-width:1100px){.feed-grid{columns:5}}

/* RECIPE CARD */
.recipe-card{break-inside:avoid;margin-bottom:12px;background:var(--card);border-radius:18px;overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 12px rgba(232,119,34,0.06);transition:all .22s;cursor:pointer;display:block;text-decoration:none;color:inherit;position:relative}
.recipe-card:hover{transform:translateY(-4px);box-shadow:0 10px 32px rgba(232,119,34,0.18);border-color:rgba(232,119,34,0.4)}
.card-img{width:100%;aspect-ratio:4/3;position:relative;overflow:hidden;background:linear-gradient(135deg,#E87722,#F5A623);display:flex;align-items:center;justify-content:center;font-size:3rem}
.card-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .3s}
.recipe-card:hover .card-img img{transform:scale(1.05)}
.card-badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);color:#fff;font-size:.65rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px;z-index:2}
.save-btn{position:absolute;top:8px;right:8px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.9);border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,0.15);z-index:2}
.save-btn:hover{transform:scale(1.15)}
.save-btn.saved{background:var(--primary);color:#fff}
.card-body{padding:12px}
.card-title{font-weight:700;font-size:.9rem;line-height:1.3;margin-bottom:6px;color:var(--text)}
.card-meta{display:flex;gap:8px;align-items:center;font-size:.73rem;color:var(--muted);flex-wrap:wrap}
.card-dot{color:rgba(232,119,34,0.4)}
.card-rating{color:var(--primary);font-weight:700}
.card-view{display:inline-block;margin-top:8px;font-size:.75rem;font-weight:700;color:var(--primary);text-decoration:none}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A0D00;color:#fff;padding:10px 22px;border-radius:50px;font-size:.85rem;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:200;box-shadow:0 -4px 20px rgba(232,119,34,0.08)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;min-height:56px;text-decoration:none;color:var(--muted);font-size:.65rem;font-weight:600;gap:4px;transition:color .2s;cursor:pointer;border:none;background:none;font-family:inherit}
.bnav-item.active{color:var(--primary)}
.bnav-item .icon{font-size:22px;line-height:1}

/* FLOAT BUTTONS */
.std-float-wa{position:fixed;bottom:76px;right:16px;z-index:9999;width:46px;height:46px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,0.4);transition:transform .2s;text-decoration:none;font-size:20px}
.std-float-bt{position:fixed;bottom:130px;right:16px;z-index:9999;width:40px;height:40px;border-radius:50%;background:var(--primary);border:none;color:#fff;cursor:pointer;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;font-size:16px}
.std-float-bt.visible{opacity:1;transform:translateY(0)}

/* NO RESULTS */
#noResults{display:none;text-align:center;padding:60px 20px;color:var(--muted)}

/* LOADING SKELETONS */
.skeleton-card{break-inside:avoid;margin-bottom:12px;border-radius:18px;overflow:hidden;background:var(--card);border:1px solid var(--border)}
.skeleton-img{width:100%;aspect-ratio:4/3;background:linear-gradient(90deg,#f0e8dc 25%,#ffe8cc 50%,#f0e8dc 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
.skeleton-body{padding:12px}
.skeleton-line{height:12px;border-radius:6px;background:linear-gradient(90deg,#f0e8dc 25%,#ffe8cc 50%,#f0e8dc 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;margin-bottom:8px}
.skeleton-line.short{width:60%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL = 'https://sktpjacowqaedddtrhuz.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdHBqYWNvd3FhZWRkZHRyaHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDcxNTY1NzIsImV4cCI6MjA2MjczMjU3Mn0.oEYHPGkIoYiMIqXM7JSNFkBnlr8FMM5lXBJLFuFtEzI';
var _sb=null,_user=null,_savedSlugs=new Set(),_currentFilter='all',_currentSearch='',_recipes=[];


// ── Demo Caribbean recipe dataset (shown when Supabase DB is empty) ─────────
var DEMO_RECIPES = [
  {id:"doubles",slug:"doubles",name:"Doubles",badge:"Street Food",photo:"",time:"30 min",rating:"4.9",category:"street food snacks",emoji:"🫓",gradient:"linear-gradient(135deg,#E87722,#F5A623)"},
  {id:"callaloo-soup",slug:"callaloo-soup",name:"Calalloo Soup",badge:"Soup",photo:"",time:"45 min",rating:"4.8",category:"soup mains",emoji:"🍲",gradient:"linear-gradient(135deg,#f7971e,#ffd200)"},
  {id:"pelau",slug:"pelau",name:"Chicken Pelau",badge:"Mains",photo:"",time:"60 min",rating:"4.9",category:"mains rice chicken",emoji:"🍗",gradient:"linear-gradient(135deg,#E87722,#F5A623)"},
  {id:"stewed-chicken",slug:"stewed-chicken",name:"Stewed Chicken",badge:"Mains",photo:"",time:"55 min",rating:"4.8",category:"mains chicken",emoji:"🍗",gradient:"linear-gradient(135deg,#E87722,#F5A623)"},
  {id:"pholourie",slug:"pholourie",name:"Pholourie",badge:"Snacks",photo:"",time:"35 min",rating:"4.7",category:"snacks street food",emoji:"🥜",gradient:"linear-gradient(135deg,#E87722,#F5A623)"},
  {id:"roti",slug:"roti",name:"Dhalpuri Roti",badge:"Bread",photo:"",time:"90 min",rating:"4.9",category:"bread mains",emoji:"🫓",gradient:"linear-gradient(135deg,#E87722,#F5A623)"},
  {id:"shark-bake",slug:"shark-bake",name:"Shark & Bake",badge:"Street Food",photo:"",time:"40 min",rating:"4.9",category:"street food mains seafood",emoji:"🐟",gradient:"linear-gradient(135deg,#43b89c,#3ab0e0)"},
  {id:"curry-chicken",slug:"curry-chicken",name:"Curry Chicken",badge:"Mains",photo:"",time:"60 min",rating:"4.8",category:"mains chicken curry",emoji:"🍛",gradient:"linear-gradient(135deg,#E87722,#F5A623)"},
  {id:"oildown",slug:"oildown",name:"Oildown",badge:"Mains",photo:"",time:"120 min",rating:"4.9",category:"mains stew",emoji:"🍲",gradient:"linear-gradient(135deg,#f7971e,#ffd200)"},
  {id:"black-cake",slug:"black-cake",name:"Black Cake",badge:"Desserts",photo:"",time:"180 min",rating:"5.0",category:"desserts baking",emoji:"🍰",gradient:"linear-gradient(135deg,#f093fb,#f5576c)"},
  {id:"sorrel",slug:"sorrel",name:"Sorrel Drink",badge:"Drinks",photo:"",time:"20 min",rating:"4.8",category:"drinks desserts",emoji:"🥤",gradient:"linear-gradient(135deg,#4facfe,#00f2fe)"},
  {id:"macaroni-pie",slug:"macaroni-pie",name:"Macaroni Pie",badge:"Sides",photo:"",time:"50 min",rating:"4.8",category:"sides baking",emoji:"🥗",gradient:"linear-gradient(135deg,#E87722,#F5A623)"},
  {id:"buljol",slug:"buljol",name:"Buljol",badge:"Breakfast",photo:"",time:"20 min",rating:"4.7",category:"breakfast sides seafood",emoji:"🍽",gradient:"linear-gradient(135deg,#43b89c,#3ab0e0)"},
  {id:"fried-bake",slug:"fried-bake",name:"Fried Bake",badge:"Bread",photo:"",time:"30 min",rating:"4.8",category:"bread breakfast",emoji:"🫓",gradient:"linear-gradient(135deg,#E87722,#F5A623)"},
  {id:"pepper-sauce",slug:"pepper-sauce",name:"Pepper Sauce",badge:"Condiments",photo:"",time:"15 min",rating:"4.9",category:"condiments",emoji:"🫙",gradient:"linear-gradient(135deg,#f7971e,#ffd200)"},
  {id:"stew-peas",slug:"stew-peas",name:"Stew Peas",badge:"Mains",photo:"",time:"75 min",rating:"4.7",category:"mains",emoji:"🍽",gradient:"linear-gradient(135deg,#E87722,#F5A623)"},
  {id:"geera-pork",slug:"geera-pork",name:"Geera Pork",badge:"Mains",photo:"",time:"50 min",rating:"4.8",category:"mains pork",emoji:"🍽",gradient:"linear-gradient(135deg,#E87722,#F5A623)"},
  {id:"provisions",slug:"provisions",name:"Boiled Provisions",badge:"Sides",photo:"",time:"25 min",rating:"4.6",category:"sides",emoji:"🥗",gradient:"linear-gradient(135deg,#E87722,#F5A623)"},
  {id:"kurma",slug:"kurma",name:"Kurma",badge:"Desserts",photo:"",time:"45 min",rating:"4.7",category:"desserts snacks",emoji:"🍰",gradient:"linear-gradient(135deg,#f093fb,#f5576c)"},
  {id:"coconut-sweet-bread",slug:"coconut-sweet-bread",name:"Coconut Sweet Bread",badge:"Desserts",photo:"",time:"70 min",rating:"4.8",category:"desserts baking bread",emoji:"🍰",gradient:"linear-gradient(135deg,#f093fb,#f5576c)"},
  {id:"corn-soup",slug:"corn-soup",name:"Corn Soup",badge:"Soup",photo:"",time:"90 min",rating:"4.9",category:"soup mains street food",emoji:"🍲",gradient:"linear-gradient(135deg,#f7971e,#ffd200)"},
  {id:"buss-up-shut",slug:"buss-up-shut",name:"Buss Up Shut",badge:"Bread",photo:"",time:"60 min",rating:"4.8",category:"bread mains",emoji:"🫓",gradient:"linear-gradient(135deg,#E87722,#F5A623)"},
  {id:"shadow-beni-sauce",slug:"shadow-beni-sauce",name:"Shadow Beni Sauce",badge:"Condiments",photo:"",time:"10 min",rating:"4.9",category:"condiments",emoji:"🫙",gradient:"linear-gradient(135deg,#f7971e,#ffd200)"},
  {id:"trinidad-ponche-de-creme",slug:"ponche-de-creme",name:"Ponche de Creme",badge:"Drinks",photo:"",time:"20 min",rating:"4.9",category:"drinks desserts",emoji:"🥤",gradient:"linear-gradient(135deg,#4facfe,#00f2fe)"}
];

function getSB(){if(!_sb&&window.supabase)_sb=window.supabase.createClient(SB_URL,SB_KEY);return _sb;}

function hideSplash(){
  var s=document.getElementById('splash');
  if(s){s.classList.add('hidden');setTimeout(function(){if(s)s.remove();},600);}
}

window.addEventListener('DOMContentLoaded',async function(){
  var ls=localStorage.getItem('callaloo_saved');
  if(ls){try{_savedSlugs=new Set(JSON.parse(ls));}catch(e){}}
  var sb=getSB();
  if(sb){var r=await sb.auth.getSession();if(r.data.session){_user=r.data.session.user;await loadSavedFromDB();}}
  await loadRecipes();
  setTimeout(hideSplash,1400);
  window.addEventListener('scroll',function(){
    var btn=document.getElementById('backTop');
    btn.classList.toggle('visible',window.scrollY>400);
  },{passive:true});
});

async function loadRecipes(){
  var sb=getSB();
  if(!sb){return;}
  try{
    var res=await sb.from('recipes').select('id,title,cover_photo_url,prep_time,cook_time,difficulty,tags').order('title',{ascending:true}).limit(200);
    if(res.error||!res.data||res.data.length===0){
      // No DB data yet — show demo Caribbean recipes
      _recipes=DEMO_RECIPES;
      renderFeed();
      return;
    }
    _recipes=res.data.map(function(r){
      var tags=r.tags||[];
      var badge=tags.length>0?tags[0]:'';
      var totalTime=(parseInt(r.prep_time)||0)+(parseInt(r.cook_time)||0);
      return{id:r.id,slug:r.id,name:r.title,badge:badge,photo:r.cover_photo_url||'',emoji:getBadgeEmoji(badge),gradient:getBadgeGradient(badge),time:totalTime?totalTime+' min':'',rating:(4.5+Math.random()*0.5).toFixed(1),category:tags.join(' ').toLowerCase()};
    });
    renderFeed();
  }catch(e){}
}

function getBadgeEmoji(b){b=(b||'').toLowerCase();if(b.includes('dessert')||b.includes('sweet'))return'🍰';if(b.includes('drink')||b.includes('juice'))return'🥤';if(b.includes('soup')||b.includes('stew'))return'🍲';if(b.includes('rice'))return'🍚';if(b.includes('chicken'))return'🍗';if(b.includes('fish')||b.includes('seafood'))return'🐟';if(b.includes('bread')||b.includes('roti')||b.includes('bake'))return'🫓';if(b.includes('curry'))return'🍛';return'🍽';}
function getBadgeGradient(b){b=(b||'').toLowerCase();if(b.includes('dessert'))return'linear-gradient(135deg,#f093fb,#f5576c)';if(b.includes('drink'))return'linear-gradient(135deg,#4facfe,#00f2fe)';if(b.includes('soup')||b.includes('stew'))return'linear-gradient(135deg,#f7971e,#ffd200)';if(b.includes('fish')||b.includes('seafood'))return'linear-gradient(135deg,#43b89c,#3ab0e0)';return'linear-gradient(135deg,#E87722,#F5A623)';}

async function loadSavedFromDB(){var sb=getSB();if(!sb||!_user)return;var r=await sb.from('saved_recipes').select('slug').eq('user_id',_user.id);if(r.data){r.data.forEach(function(x){_savedSlugs.add(x.slug);});localStorage.setItem('callaloo_saved',JSON.stringify([..._savedSlugs]));}}

async function toggleSave(slug,btn,e){
  e.preventDefault();e.stopPropagation();
  var was=_savedSlugs.has(slug);was?_savedSlugs.delete(slug):_savedSlugs.add(slug);
  localStorage.setItem('callaloo_saved',JSON.stringify([..._savedSlugs]));
  btn.classList.toggle('saved',!was);btn.textContent=_savedSlugs.has(slug)?'❤️':'🤍';
  showToast(_savedSlugs.has(slug)?'Saved!':'Removed');
  var sb=getSB();
  if(sb&&_user){if(!was){await sb.from('saved_recipes').upsert({user_id:_user.id,slug:slug,saved_at:new Date().toISOString()});}else{await sb.from('saved_recipes').delete().eq('user_id',_user.id).eq('slug',slug);}}
  if(_currentFilter==='saved')renderFeed();
}

function renderFeed(){
  var search=_currentSearch.toLowerCase().trim(),filter=_currentFilter;
  var filtered=_recipes.filter(function(r){
    var ms=!search||r.name.toLowerCase().includes(search)||r.badge.toLowerCase().includes(search)||r.category.includes(search);
    var mf=filter==='all'||(filter==='saved'&&_savedSlugs.has(r.slug))||r.category.includes(filter)||r.badge.toLowerCase().includes(filter);
    return ms&&mf;
  });
  var grid=document.getElementById('feedGrid'),noRes=document.getElementById('noResults'),bar=document.getElementById('resultsBar');
  if(filtered.length===0){grid.innerHTML='';noRes.style.display='block';bar.textContent='';return;}
  noRes.style.display='none';
  bar.textContent=filtered.length+' recipe'+(filtered.length!==1?'s':'');
  grid.innerHTML=filtered.map(function(r){
    var saved=_savedSlugs.has(r.slug);
    var img=r.photo?'<img src="'+r.photo+'" alt="'+r.name+'" loading="lazy" onerror="this.style.display=\'none\'">':'<span style="font-size:2.8rem">'+(r.emoji||'🍽')+'</span>';
    return '<a class="recipe-card" href="/calalloo/recipe/?r='+r.slug+'">'+
      '<div class="card-img" style="background:'+(r.gradient||'linear-gradient(135deg,#E87722,#F5A623)')+'">'+img+
      '<span class="card-badge">'+r.badge+'</span>'+
      '<button class="save-btn'+(saved?' saved':'')+'" onclick="toggleSave(\''+r.slug+'\',this,event)">'+(saved?'❤️':'🤍')+'</button>'+
      '</div><div class="card-body">'+
      '<div class="card-title">'+r.name+'</div>'+
      '<div class="card-meta">'+(r.time?'<span>⏱ '+r.time+'</span><span class="card-dot">·</span>':'')+
      '<span class="card-rating">★ '+r.rating+'</span></div>'+
      '<span class="card-view">View Recipe →</span></div></a>';
  }).join('');
}

function handleSearch(v){_currentSearch=v;document.getElementById('searchClear').style.display=v?'block':'none';renderFeed();}
function clearSearch(){document.getElementById('searchInput').value='';_currentSearch='';document.getElementById('searchClear').style.display='none';renderFeed();}
function setFilter(f,el){_currentFilter=f;document.querySelectorAll('.filter-pill').forEach(function(p){p.classList.remove('active');});el.classList.add('active');renderFeed();}

var _tt;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},2200);}
</script>
