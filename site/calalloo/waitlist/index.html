<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waitlist | Calalloo Discovery Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900;9..144,1,900&family=Inter:wght@400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0A0A0B;
            --primary: #E87722;
            --dark: #FFFFFF;
            --mid: #A0A0A5;
            --white: #141416;
            --accent: rgba(232, 119, 34, 0.1);
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--dark); font-family: var(--font-sans); line-height: 1.6; -webkit-font-smoothing: antialiased; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03;
            pointer-events: none;
            z-index: 9999;
        }

        .waitlist-container { max-width: 600px; padding: 4rem; text-align: center; border: 1px solid rgba(255,255,255,0.05); background: var(--white); border-radius: 4px; position: relative; }
        
        .lab-tag { font-family: var(--font-mono); font-size: 0.7rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.3em; margin-bottom: 2rem; display: block; }
        
        h1 { font-family: var(--font-display); font-size: 4rem; line-height: 0.9; margin-bottom: 1.5rem; letter-spacing: -0.04em; }
        p { color: var(--mid); font-size: 1.1rem; margin-bottom: 3rem; }
        
        form { display: flex; flex-direction: column; gap: 1rem; }
        input { background: transparent; border: 1px solid rgba(255,255,255,0.1); padding: 1.2rem; color: var(--dark); font-family: var(--font-mono); border-radius: 2px; outline: none; }
        input:focus { border-color: var(--primary); }
        
        .btn-join { background: var(--primary); color: #000; border: none; padding: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.8rem; cursor: pointer; border-radius: 2px; margin-top: 1rem; }
        
        .nav-back { position: absolute; top: -4rem; left: 0; color: var(--mid); text-decoration: none; font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; }
        .nav-back:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="waitlist-container">
        <a href="../index.html" class="nav-back">← Back to Hub</a>
        <span class="lab-tag">System Entry: Waitlist</span>
        <h1>Secure Early Access.</h1>
        <p>Phase 1 deployment is scaling. Register your identity to join the initial performance provision network.</p>
        
        <form action="success.html">
            <input type="email" placeholder="EMAIL_ADDRESS" required>
            <input type="text" placeholder="DISCOVERY_NODE (LOCATION)" required>
            <button type="submit" class="btn-join">Initialize Access</button>
        </form>
    </div>

</body>
</html>
