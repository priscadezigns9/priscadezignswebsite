<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waitlist Confirmed | Calalloo Discovery Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900;9..144,1,900&family=Inter:wght@400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0A0A0B;
            --primary: #E87722;
            --dark: #FFFFFF;
            --mid: #A0A0A5;
            --white: #141416;
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--dark); font-family: var(--font-sans); line-height: 1.6; -webkit-font-smoothing: antialiased; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03;
            pointer-events: none;
            z-index: 9999;
        }

        .success-card { max-width: 600px; padding: 6rem 4rem; border: 1px solid rgba(255,255,255,0.05); background: var(--white); border-radius: 4px; }
        
        .lab-tag { font-family: var(--font-mono); font-size: 0.7rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.3em; margin-bottom: 2rem; display: block; }
        
        h1 { font-family: var(--font-display); font-size: 5rem; line-height: 0.8; margin-bottom: 1.5rem; color: var(--primary); font-style: italic; }
        p { color: var(--mid); font-size: 1.2rem; margin-bottom: 3rem; font-family: var(--font-mono); }
        
        .btn-home { display: inline-block; border: 1px solid var(--primary); color: var(--primary); text-decoration: none; padding: 1rem 3rem; font-weight: 800; font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.3s ease; }
        .btn-home:hover { background: var(--primary); color: #000; }
    </style>
</head>
<body>

    <div class="success-card">
        <span class="lab-tag">Status: Registered</span>
        <h1>You're In.</h1>
        <p>[IDENTITY_VERIFIED]<br>Check your frequency for the first Alpha signal.</p>
        <a href="../index.html" class="btn-home">Return to Hub</a>
    </div>

</body>
</html>
