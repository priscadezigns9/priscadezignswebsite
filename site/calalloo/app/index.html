<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Calalloo</title>
<link rel="manifest" href="/calalloo/manifest.json">
<meta name="theme-color" content="#E87722">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calalloo">
<link rel="apple-touch-icon" href="/calalloo/icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow:hidden}

/* SPLASH */
#splash{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s ease}
#splash.hide{opacity:0;pointer-events:none}
.splash-icon{width:120px;height:120px;border-radius:28px;overflow:hidden;margin-bottom:20px;animation:splashPop .6s cubic-bezier(.175,.885,.32,1.275) .3s both}
.splash-icon img{width:100%;height:100%;object-fit:cover}
.splash-wordmark{font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,#E87722,#F5A623);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:splashFade .5s ease .6s both}
.splash-tagline{color:#666;font-size:0.85rem;margin-top:6px;animation:splashFade .5s ease .8s both}
@keyframes splashPop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes splashFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;opacity:0;transition:opacity .4s ease}
#login-screen.show{opacity:1}
.login-logo{margin-bottom:32px;text-align:center}
.login-logo svg{display:block;margin:0 auto 8px}
.login-logo p{color:#888;font-size:0.85rem}
.login-card{width:100%;max-width:380px;background:#141414;border:1px solid #2a2a2a;border-radius:20px;padding:32px 28px}
.login-card h2{font-size:1.3rem;font-weight:700;margin-bottom:6px}
.login-card p{color:#888;font-size:0.85rem;margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:0.78rem;color:#aaa;margin-bottom:6px;font-weight:500}
.field input{width:100%;background:#1e1e1e;border:1px solid #333;border-radius:10px;padding:12px 14px;color:#fff;font-size:0.95rem;outline:none;transition:border-color .2s}
.field input:focus{border-color:#E87722}
.btn-login{width:100%;background:linear-gradient(135deg,#E87722,#F5A623);color:#fff;border:none;border-radius:10px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s}
.btn-login:hover{opacity:.9}
.login-divider{text-align:center;color:#555;font-size:0.8rem;margin:16px 0;position:relative}
.login-divider::before,.login-divider::after{content:"";position:absolute;top:50%;width:42%;height:1px;background:#2a2a2a}
.login-divider::before{left:0}.login-divider::after{right:0}
.btn-google{width:100%;background:#1e1e1e;border:1px solid #333;border-radius:10px;padding:12px;font-size:0.9rem;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .2s}
.btn-google:hover{border-color:#E87722}
.login-footer{text-align:center;margin-top:20px;font-size:0.8rem;color:#666}
.login-footer a{color:#E87722;text-decoration:none}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-icon">
    <img src="/calalloo/icon-192.png" alt="Calalloo">
  </div>
  <div class="splash-wordmark">Calalloo</div>
  <div class="splash-tagline">Caribbean food, beautifully.</div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 70" width="160" height="47">
      <defs><linearGradient id="clg2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#E87722"/><stop offset="100%" style="stop-color:#F5A623"/></linearGradient></defs>
      <text x="8" y="52" font-family="Georgia,serif" font-size="52" font-weight="700" fill="url(#clg2)">Calalloo</text>
    </svg>
    <p>Caribbean food, beautifully.</p>
  </div>
  <div class="login-card">
    <h2>Welcome back 👋</h2>
    <p>Sign in to your Calalloo account</p>
    <div class="field">
      <label>Email</label>
      <input type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="handleLogin()">Sign In</button>
    <div class="login-divider">or</div>
    <button class="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
      Continue with Google
    </button>
    <div class="login-footer">
      No account? <a href="/calalloo/waitlist/">Join the waitlist</a>
    </div>
  </div>
</div>

<script>
// Splash → Login transition
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    setTimeout(() => {
      document.getElementById('login-screen').classList.add('show');
    }, 500);
  }, 2000);
});

function handleLogin() {
  // Redirect to feed after login (demo)
  window.location.href = '/calalloo/feed/';
}

// If already "logged in" (sessionStorage flag), go straight to feed
if (sessionStorage.getItem('calalloo_authed')) {
  window.location.replace('/calalloo/feed/');
}
</script>
</body>
</html>
