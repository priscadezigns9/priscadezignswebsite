<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Orange background -->
  <rect width="512" height="512" rx="100" fill="#E87722"/>
  <!-- Leaf shape - main body -->
  <ellipse cx="256" cy="230" rx="110" ry="145" fill="#FFF3E0" transform="rotate(-15 256 230)"/>
  <!-- Leaf vein -->
  <line x1="220" y1="110" x2="290" y2="360" stroke="#E87722" stroke-width="8" stroke-linecap="round"/>
  <!-- Side veins -->
  <line x1="240" y1="175" x2="195" y2="210" stroke="#E87722" stroke-width="4" stroke-linecap="round"/>
  <line x1="248" y1="215" x2="195" y2="245" stroke="#E87722" stroke-width="4" stroke-linecap="round"/>
  <line x1="255" y1="255" x2="205" y2="280" stroke="#E87722" stroke-width="4" stroke-linecap="round"/>
  <line x1="244" y1="190" x2="280" y2="200" stroke="#E87722" stroke-width="4" stroke-linecap="round"/>
  <line x1="251" y1="230" x2="290" y2="235" stroke="#E87722" stroke-width="4" stroke-linecap="round"/>
  <line x1="258" y1="270" x2="295" y2="265" stroke="#E87722" stroke-width="4" stroke-linecap="round"/>
  <!-- Stem -->
  <line x1="256" y1="360" x2="256" y2="400" stroke="#C45A00" stroke-width="10" stroke-linecap="round"/>
  <!-- CALLALOO wordmark -->
  <text x="256" y="455" text-anchor="middle" fill="#FFF3E0" font-family="Arial Black,sans-serif" font-weight="900" font-size="72" letter-spacing="-1">CALLALOO</text>
</svg>
