<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIET LUXURY | Sanctuary Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand-color: #44403c; --bg-dark: #0a0a0a; --card-bg: #141414; --text-light: #f0f0f0; --border-color: #222; }
        body { margin:0; font-family:'Inter', sans-serif; background:var(--bg-dark); color:var(--text-light); line-height:1.6; }
        nav { background:var(--bg-dark); padding:20px 5%; border-bottom:3px solid var(--brand-color); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; box-shadow:0 2px 20px rgba(0,0,0,0.5); }
        .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:40px; padding:40px 5%; }
        .card { background:var(--card-bg); border:1px solid var(--border-color); border-radius:20px; padding:30px; text-align:center; transition:0.4s; display:flex; flex-direction:column; position:relative; min-height: 450px; }
        .img-box { height:300px; display:flex; align-items:center; justify-content:center; margin-bottom:20px; background:#fff; border-radius:12px; overflow:hidden; }
        img.product-img { max-width:90%; max-height:90%; object-fit:contain; }
        h3 { font-size:1rem; margin:0 0 15px; font-weight:800; color:var(--text-light); height: 3em; overflow: hidden; }
        .price { color:var(--brand-color); font-weight:900; font-size:1.5rem; margin-bottom:20px; }
        .btn { display:block; background:var(--brand-color); color:#fff; padding:18px; border-radius:12px; text-decoration:none; font-weight:900; text-transform:uppercase; margin-top:auto; }
        #loader { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-dark); z-index:1000; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .hidden { display:none !important; }
    </style>
</head>
<body>
    <div id="loader"><h1 style="color:var(--brand-color); font-weight:900;">RESTORING SANCTUARY</h1></div>
    <nav><h1 style="margin:0; font-weight:900; color:var(--brand-color);">QUIET LUXURY</h1></nav>
    <div class="grid" id="grid"></div>
    <script>
        const sb = supabase.createClient("https://sazhdnqzaqpqcralmthh.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc");
        async function load() {
            try {
                const { data, error } = await sb.from("empire_inventory").select("*").eq("brand", "Quiet Luxury");
                if (error) throw error;
                const grid = document.getElementById("grid");
                grid.innerHTML = data.map(p => `
                    <div class="card">
                        <div class="img-box"><img class="product-img" src="${p.image_url}" onerror="this.src='https://priscadezigns.org/logos/pd_mark_sq.png'"></div>
                        <h3>${p.title}</h3>
                        <div class="price">${p.price}</div>
                        <a href="${p.affiliate_link}" class="btn" target="_blank">Acquire Sanctuary</a>
                    </div>
                `).join("");
            } catch (e) {
                document.getElementById("grid").innerHTML = "<h3>Vault Connection Error</h3>";
            } finally {
                document.getElementById("loader").classList.add("hidden");
            }
        }
        window.onload = load;
    </script>
</body>
</html>
