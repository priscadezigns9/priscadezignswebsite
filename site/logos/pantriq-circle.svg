<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="navyGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#0D1F3C"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#C49A10"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="100" cy="100" r="96" fill="url(#navyGold)"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#goldShine)" stroke-width="3" opacity="0.8"/>

  <!-- Pantry jar / cube icon (gold) -->
  <!-- Jar body -->
  <rect x="72" y="78" width="56" height="52" rx="6" fill="url(#goldShine)"/>
  <!-- Jar lid -->
  <rect x="68" y="68" width="64" height="14" rx="4" fill="#D4AF37" opacity="0.85"/>
  <!-- Jar lid top bar -->
  <rect x="78" y="63" width="44" height="7" rx="3.5" fill="#C49A10"/>
  <!-- Jar shine/highlight -->
  <rect x="80" y="85" width="8" height="28" rx="4" fill="white" opacity="0.15"/>
  <!-- Small line details on jar -->
  <line x1="72" y1="98" x2="128" y2="98" stroke="white" stroke-width="1" opacity="0.12"/>

  <!-- PANTRIQ text -->
  <text x="100" y="156" font-family="Playfair Display,Georgia,serif" font-weight="700" font-size="20" fill="#D4AF37" text-anchor="middle" letter-spacing="3">PANTRIQ</text>

  <!-- Tagline -->
  <text x="100" y="172" font-family="Inter,Arial,sans-serif" font-weight="300" font-size="8" fill="rgba(212,175,55,0.65)" text-anchor="middle" letter-spacing="3">KITCHEN ESSENTIALS</text>

  <!-- Decorative gold dots -->
  <circle cx="44" cy="100" r="2.5" fill="#D4AF37" opacity="0.4"/>
  <circle cx="156" cy="100" r="2.5" fill="#D4AF37" opacity="0.4"/>
</svg>
