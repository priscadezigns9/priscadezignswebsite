<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Protocol — Product Showcase</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0008;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Georgia', serif;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 420px;
    height: 520px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Ambient glow background */
  .glow-bg {
    position: absolute;
    width: 340px;
    height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,180,220,0.18) 0%, rgba(200,100,200,0.12) 40%, transparent 70%);
    animation: pulseGlow 4s ease-in-out infinite;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .glow-bg2 {
    position: absolute;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,220,180,0.14) 0%, rgba(255,150,100,0.08) 50%, transparent 70%);
    animation: pulseGlow2 5s ease-in-out infinite;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  @keyframes pulseGlow {
    0%, 100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
  }

  @keyframes pulseGlow2 {
    0%, 100% { opacity: 0.4; transform: translate(-50%,-50%) scale(1.1); }
    50% { opacity: 0.8; transform: translate(-50%,-50%) scale(0.9); }
  }

  /* Floating particles */
  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(255,180,220,0.7);
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) translateX(0); }
    20% { opacity: 1; }
    80% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-180px) translateX(var(--drift)); }
  }

  /* Product carousel */
  .product-track {
    position: relative;
    width: 240px;
    height: 300px;
  }

  .product-card {
    position: absolute;
    width: 240px;
    height: 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.85) translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    pointer-events: none;
  }

  .product-card.active {
    opacity: 1;
    transform: scale(1) translateY(0);
    pointer-events: auto;
  }

  .product-card.exit {
    opacity: 0;
    transform: scale(1.05) translateY(-20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .product-img-wrap {
    position: relative;
    width: 200px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: floatProduct 3s ease-in-out infinite;
  }

  @keyframes floatProduct {
    0%, 100% { transform: translateY(0px) rotate(-1deg); }
    50% { transform: translateY(-12px) rotate(1deg); }
  }

  .product-img-wrap::before {
    content: '';
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 20px;
    background: radial-gradient(ellipse, rgba(200,100,200,0.4) 0%, transparent 70%);
    border-radius: 50%;
    animation: shadowPulse 3s ease-in-out infinite;
  }

  @keyframes shadowPulse {
    0%, 100% { opacity: 0.5; transform: translateX(-50%) scaleX(1); }
    50% { opacity: 0.8; transform: translateX(-50%) scaleX(0.85); }
  }

  .product-img {
    max-width: 180px;
    max-height: 180px;
    object-fit: contain;
    filter: drop-shadow(0 8px 32px rgba(255,150,200,0.5)) drop-shadow(0 0 16px rgba(200,100,255,0.3));
    border-radius: 12px;
  }

  /* Shine sweep */
  .shine-sweep {
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.12) 50%, transparent 60%);
    animation: shineSweep 4s ease-in-out infinite;
    pointer-events: none;
    border-radius: 12px;
  }

  @keyframes shineSweep {
    0%, 70% { left: -100%; opacity: 0; }
    71% { opacity: 1; }
    100% { left: 150%; opacity: 0; }
  }

  .product-info {
    margin-top: 24px;
    text-align: center;
  }

  .brand-tag {
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,180,220,0.7);
    margin-bottom: 6px;
  }

  .product-name {
    font-size: 0.88rem;
    color: #fff;
    font-weight: 400;
    line-height: 1.4;
    max-width: 200px;
    text-shadow: 0 0 20px rgba(255,150,200,0.4);
  }

  /* Bottom dots */
  .dots {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,180,220,0.3);
    transition: all 0.4s ease;
  }

  .dot.active {
    background: rgba(255,180,220,0.9);
    transform: scale(1.3);
    box-shadow: 0 0 8px rgba(255,150,200,0.6);
  }

  /* Top brand label */
  .brand-header {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }

  .brand-header span {
    font-size: 0.72rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,180,220,0.5);
  }

  /* Corner sparkles */
  .sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(255,220,180,0.8);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    animation: sparklePop ease-in-out infinite;
  }

  @keyframes sparklePop {
    0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
    50% { opacity: 1; transform: scale(1) rotate(180deg); }
  }
</style>
</head>
<body>

<div class="scene">

  <!-- Ambient glow -->
  <div class="glow-bg"></div>
  <div class="glow-bg2"></div>

  <!-- Brand header -->
  <div class="brand-header">
    <span>Glow Protocol</span>
  </div>

  <!-- Sparkles -->
  <div class="sparkle" style="top:60px;left:30px;animation-duration:2.8s;animation-delay:0s"></div>
  <div class="sparkle" style="top:80px;right:25px;animation-duration:3.4s;animation-delay:0.8s;width:5px;height:5px"></div>
  <div class="sparkle" style="bottom:100px;left:20px;animation-duration:4s;animation-delay:1.4s;width:4px;height:4px"></div>
  <div class="sparkle" style="bottom:120px;right:30px;animation-duration:2.5s;animation-delay:0.4s"></div>
  <div class="sparkle" style="top:160px;left:10px;animation-duration:3.8s;animation-delay:1.9s;width:3px;height:3px"></div>

  <!-- Particles -->
  <div class="particle" style="bottom:80px;left:80px;animation-duration:5s;animation-delay:0s;--drift:20px"></div>
  <div class="particle" style="bottom:80px;left:160px;animation-duration:6s;animation-delay:1.5s;--drift:-15px;width:3px;height:3px"></div>
  <div class="particle" style="bottom:80px;left:220px;animation-duration:4.5s;animation-delay:0.8s;--drift:10px;width:2px;height:2px"></div>
  <div class="particle" style="bottom:80px;left:120px;animation-duration:7s;animation-delay:2.5s;--drift:-25px;width:3px;height:3px"></div>

  <!-- Product carousel -->
  <div class="product-track">

    <div class="product-card active" data-brand="Medicube" data-name="Zero Pore Pads 2.0">
      <div class="product-img-wrap">
        <img class="product-img" src="https://m.media-amazon.com/images/I/71Mcspt-6AL._SL1500_.jpg" alt="Medicube Zero Pore Pads">
        <div class="shine-sweep"></div>
      </div>
      <div class="product-info">
        <div class="brand-tag">Medicube</div>
        <div class="product-name">Zero Pore Pads 2.0</div>
      </div>
    </div>

    <div class="product-card" data-brand="The Ordinary" data-name="Glycolic Acid 7% Toner">
      <div class="product-img-wrap">
        <img class="product-img" src="https://m.media-amazon.com/images/I/51bC4vVdkOL._SL1240_.jpg" alt="The Ordinary Toner">
        <div class="shine-sweep"></div>
      </div>
      <div class="product-info">
        <div class="brand-tag">The Ordinary</div>
        <div class="product-name">Glycolic Acid 7% Toner</div>
      </div>
    </div>

    <div class="product-card" data-brand="Neutrogena" data-name="Ultra Sheer SPF 70">
      <div class="product-img-wrap">
        <img class="product-img" src="https://m.media-amazon.com/images/I/416kUGx2rQL._SL1024_.jpg" alt="Neutrogena SPF 70">
        <div class="shine-sweep"></div>
      </div>
      <div class="product-info">
        <div class="brand-tag">Neutrogena</div>
        <div class="product-name">Ultra Sheer SPF 70</div>
      </div>
    </div>

    <div class="product-card" data-brand="COSRX" data-name="Advanced Snail 96 Serum">
      <div class="product-img-wrap">
        <img class="product-img" src="https://m.media-amazon.com/images/I/61EidjXUBrL._SL1000_.jpg" alt="COSRX Serum">
        <div class="shine-sweep"></div>
      </div>
      <div class="product-info">
        <div class="brand-tag">COSRX</div>
        <div class="product-name">Advanced Snail 96 Serum</div>
      </div>
    </div>

    <div class="product-card" data-brand="CeraVe" data-name="Moisturizing Cream 19oz">
      <div class="product-img-wrap">
        <img class="product-img" src="https://m.media-amazon.com/images/I/51bC4vVdkOL._SL1240_.jpg" alt="CeraVe Cream">
        <div class="shine-sweep"></div>
      </div>
      <div class="product-info">
        <div class="brand-tag">CeraVe</div>
        <div class="product-name">Moisturizing Cream 19oz</div>
      </div>
    </div>

  </div>

  <!-- Navigation dots -->
  <div class="dots" id="dots"></div>

</div>

<script>
  const cards = document.querySelectorAll('.product-card');
  const dotsEl = document.getElementById('dots');
  let current = 0;
  let timer;

  // Build dots
  cards.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(d);
  });

  function goTo(idx) {
    clearTimeout(timer);
    const prev = current;
    current = idx;

    cards[prev].classList.remove('active');
    cards[prev].classList.add('exit');
    setTimeout(() => cards[prev].classList.remove('exit'), 600);

    cards[current].classList.add('active');

    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });

    scheduleNext();
  }

  function scheduleNext() {
    timer = setTimeout(() => {
      goTo((current + 1) % cards.length);
    }, 3500);
  }

  scheduleNext();
</script>

</body>
</html>
