<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Protocol — Advanced Serum</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #020008;
  }
  #canvas-container {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: radial-gradient(ellipse at center, #0D0520 0%, #020008 100%);
  }
  #canvas-container canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  /* ── Overlay UI ── */
  #overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    opacity: 0;
    animation: fadeIn 2s ease forwards 0.3s;
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .top-brand {
    position: absolute;
    top: 5%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }
  .top-brand h1 {
    font-family: 'Cormorant Garamond', 'Didot', 'Big Caslon', serif;
    font-weight: 300;
    font-size: clamp(1.6rem, 3vw, 2.5rem);
    letter-spacing: 10px;
    color: #C8A84B;
    text-transform: uppercase;
    text-shadow: 0 0 40px rgba(200,168,75,0.6), 0 0 80px rgba(200,168,75,0.2);
  }
  .top-brand .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #C8A84B, transparent);
    margin: 8px auto 0;
  }

  .bottom-info {
    position: absolute;
    bottom: 6%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .bottom-info .tagline-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.85rem, 1.2vw, 1rem);
    font-weight: 300;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.85);
    text-transform: uppercase;
  }
  .bottom-info .tagline-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.8rem, 1vw, 0.9rem);
    font-style: italic;
    font-weight: 300;
    letter-spacing: 2px;
    color: #C8A84B;
    text-shadow: 0 0 20px rgba(200,168,75,0.5);
  }
  .bottom-info .hint {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* Corner accent lines */
  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
  }
  .corner-tl { top: 20px; left: 20px; border-top: 1px solid rgba(200,168,75,0.4); border-left: 1px solid rgba(200,168,75,0.4); }
  .corner-tr { top: 20px; right: 20px; border-top: 1px solid rgba(200,168,75,0.4); border-right: 1px solid rgba(200,168,75,0.4); }
  .corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid rgba(200,168,75,0.4); border-left: 1px solid rgba(200,168,75,0.4); }
  .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid rgba(200,168,75,0.4); border-right: 1px solid rgba(200,168,75,0.4); }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="overlay">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="top-brand">
    <h1>Glow Protocol</h1>
    <div class="divider"></div>
  </div>

  <div class="bottom-info">
    <div class="tagline-main">Advanced Serum Formula</div>
    <div class="tagline-sub">Luminous skin begins here.</div>
    <div class="hint">Open fullscreen &nbsp;·&nbsp; Screen record 15 seconds</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  'use strict';

  // ── Renderer ──────────────────────────────────────────────
  const container = document.getElementById('canvas-container');
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.physicallyCorrectLights = true;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  container.appendChild(renderer.domElement);

  // ── Scene ─────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050010, 0.08);

  // Environment map (simple PMREMGenerator from a neutral env)
  const pmremGenerator = new THREE.PMREMGenerator(renderer);
  pmremGenerator.compileEquirectangularShader();

  // Build a simple neutral env cube for reflections
  const envScene = new THREE.Scene();
  envScene.background = new THREE.Color(0x111133);
  const envRT = pmremGenerator.fromScene(new THREE.RoomEnvironment ? new THREE.RoomEnvironment() : envScene);
  scene.environment = envRT.texture;

  // ── Camera ────────────────────────────────────────────────
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0.3, 12); // starts far — intro pulls to z=5
  camera.lookAt(0, 0.3, 0);

  // ── Lights ────────────────────────────────────────────────
  const ambientLight = new THREE.AmbientLight(0x111122, 0.4);
  scene.add(ambientLight);

  const keyLight = new THREE.DirectionalLight(0xFFEEDD, 3.0);
  keyLight.position.set(3, 5, 3);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.set(1024, 1024);
  scene.add(keyLight);

  const rimLight = new THREE.DirectionalLight(0x4466FF, 2.0);
  rimLight.position.set(-3, 2, -2);
  scene.add(rimLight);

  const bottomFill = new THREE.PointLight(0xAA44FF, 1.5, 10);
  bottomFill.position.set(0, -3, 1);
  scene.add(bottomFill);

  const spotlight = new THREE.SpotLight(0xFFCC44, 4.0, 15, Math.PI / 6, 0.3, 1);
  spotlight.position.set(3, 4, 0);
  spotlight.target.position.set(0, 0, 0);
  spotlight.castShadow = true;
  scene.add(spotlight);
  scene.add(spotlight.target);

  // Intro flash
  const flashLight = new THREE.PointLight(0xFFFFFF, 10, 20);
  flashLight.position.set(0, 0, 4);
  scene.add(flashLight);

  // ── Label Canvas Texture ──────────────────────────────────
  function makeLabelTexture() {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 512;
    const ctx = c.getContext('2d');

    // Background
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, 256, 512);

    // Subtle border
    ctx.strokeStyle = 'rgba(200,168,75,0.3)';
    ctx.lineWidth = 2;
    ctx.strokeRect(6, 6, 244, 500);

    // "GLOW"
    ctx.fillStyle = '#C8A84B';
    ctx.font = 'bold 72px serif';
    ctx.textAlign = 'center';
    ctx.letterSpacing = '4px';
    ctx.shadowColor = 'rgba(200,168,75,0.8)';
    ctx.shadowBlur = 20;
    ctx.fillText('GLOW', 128, 190);
    ctx.shadowBlur = 0;

    // Thin gold line
    ctx.strokeStyle = '#C8A84B';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(40, 210);
    ctx.lineTo(216, 210);
    ctx.stroke();

    // "PROTOCOL"
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '300 28px serif';
    ctx.letterSpacing = '6px';
    ctx.fillText('PROTOCOL', 128, 260);

    // Reset letter spacing
    ctx.letterSpacing = '0px';

    // Thin line below
    ctx.strokeStyle = 'rgba(200,168,75,0.4)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(60, 278);
    ctx.lineTo(196, 278);
    ctx.stroke();

    // "Advanced Serum"
    ctx.fillStyle = '#C8A84B';
    ctx.font = 'italic 22px serif';
    ctx.fillText('Advanced Serum', 128, 310);

    // Diamond
    ctx.fillStyle = '#C8A84B';
    ctx.font = '18px serif';
    ctx.fillText('◆', 128, 345);

    // Bottom bar
    const grad = ctx.createLinearGradient(0, 460, 256, 460);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(0.5, 'rgba(200,168,75,0.15)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 455, 256, 40);

    const tex = new THREE.CanvasTexture(c);
    return tex;
  }

  // ── Bottle Group ──────────────────────────────────────────
  const bottleGroup = new THREE.Group();
  scene.add(bottleGroup);
  bottleGroup.scale.set(0, 0, 0); // starts at 0 for intro

  const glassMat = new THREE.MeshPhysicalMaterial({
    color: 0xC8E8F0,
    metalness: 0.1,
    roughness: 0.05,
    transmission: 0.92,
    thickness: 0.5,
    transparent: true,
    opacity: 0.85,
    envMapIntensity: 2.0,
    side: THREE.FrontSide,
  });

  // Body
  const bodyGeo = new THREE.CylinderGeometry(0.35, 0.38, 2.2, 64, 1, false);
  const bodyMesh = new THREE.Mesh(bodyGeo, glassMat);
  bodyMesh.position.y = 0;
  bodyMesh.castShadow = true;
  bottleGroup.add(bodyMesh);

  // Neck
  const neckGeo = new THREE.CylinderGeometry(0.18, 0.35, 0.4, 64, 1, false);
  const neckMesh = new THREE.Mesh(neckGeo, glassMat);
  neckMesh.position.y = 1.3; // sits on top of body
  neckMesh.castShadow = true;
  bottleGroup.add(neckMesh);

  // Cap
  const capMat = new THREE.MeshPhysicalMaterial({
    color: 0xC8A84B,
    metalness: 0.85,
    roughness: 0.12,
    envMapIntensity: 2.5,
  });
  const capGeo = new THREE.CylinderGeometry(0.22, 0.2, 0.7, 64, 1, false);
  const capMesh = new THREE.Mesh(capGeo, capMat);
  capMesh.position.y = 1.85; // on top of neck
  capMesh.castShadow = true;
  bottleGroup.add(capMesh);

  // Cap top ring
  const ringGeo = new THREE.TorusGeometry(0.21, 0.015, 16, 64);
  const ringMesh = new THREE.Mesh(ringGeo, capMat);
  ringMesh.position.y = 2.2;
  ringMesh.rotation.x = Math.PI / 2;
  bottleGroup.add(ringMesh);

  // Label plane
  const labelTex = makeLabelTexture();
  const labelMat = new THREE.MeshBasicMaterial({
    map: labelTex,
    transparent: true,
    depthWrite: false,
  });
  const labelGeo = new THREE.PlaneGeometry(0.55, 1.0);
  const labelMesh = new THREE.Mesh(labelGeo, labelMat);
  labelMesh.position.set(0, 0, 0.39); // just in front of bottle center
  bottleGroup.add(labelMesh);

  // ── Floor ─────────────────────────────────────────────────
  const floorMat = new THREE.MeshPhysicalMaterial({
    color: 0x111122,
    metalness: 0.9,
    roughness: 0.1,
    envMapIntensity: 1.5,
  });
  const floorGeo = new THREE.PlaneGeometry(10, 10);
  const floorMesh = new THREE.Mesh(floorGeo, floorMat);
  floorMesh.rotation.x = -Math.PI / 2;
  floorMesh.position.y = -1.1;
  floorMesh.receiveShadow = true;
  scene.add(floorMesh);

  // ── Particles ─────────────────────────────────────────────
  const PARTICLE_COUNT = 200;
  const particleGroup = new THREE.Group();
  scene.add(particleGroup);

  const particleGeo = new THREE.SphereGeometry(0.015, 6, 6);
  const particleMat = new THREE.MeshBasicMaterial({ color: 0xC8A84B });

  const particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const mesh = new THREE.Mesh(particleGeo, particleMat);
    const angle = Math.random() * Math.PI * 2;
    const radius = 0.5 + Math.random() * 1.2;
    mesh.position.set(
      Math.cos(angle) * radius,
      -1.1 + Math.random() * 4.0,
      Math.sin(angle) * radius
    );
    mesh.userData.speed = 0.002 + Math.random() * 0.004;
    mesh.userData.drift = (Math.random() - 0.5) * 0.001;
    mesh.userData.initialY = mesh.position.y;
    mesh.userData.angle = angle;
    mesh.userData.radius = radius;
    particleGroup.add(mesh);
    particles.push(mesh);
  }

  // ── Resize ────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── Intro easing ─────────────────────────────────────────
  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

  // ── Animation Loop ────────────────────────────────────────
  const clock = new THREE.Clock();
  let introDone = false;

  function animate() {
    requestAnimationFrame(animate);

    const elapsed = clock.getElapsedTime();
    const delta = clock.getDelta ? 0.016 : 0.016; // fixed delta fallback

    // ── Intro sequence (first 3 seconds) ──
    if (elapsed < 1.5) {
      // Bottle scale 0 → 1 over 1.5s
      const s = easeOutCubic(elapsed / 1.5);
      bottleGroup.scale.set(s, s, s);
    } else if (!introDone) {
      bottleGroup.scale.set(1, 1, 1);
      introDone = true;
    }

    if (elapsed < 2.0) {
      // Camera z: 12 → 5 over 2s
      camera.position.z = 12 - (7 * easeOutCubic(elapsed / 2.0));
    }

    if (elapsed < 0.5) {
      // Flash: intensity 10 → 0
      flashLight.intensity = 10 * (1 - elapsed / 0.5);
    } else {
      flashLight.intensity = 0;
    }

    // ── Continuous animations ──
    const t = elapsed;

    // 1. Bottle Y rotation — 8s per full rotation
    bottleGroup.rotation.y = (t / 8) * Math.PI * 2;

    // 2. Bottle float
    bottleGroup.position.y = Math.sin(t * 0.8) * 0.15;

    // 3. Spotlight sweep — orbits every 6s
    const spotAngle = (t / 6) * Math.PI * 2;
    spotlight.position.x = Math.cos(spotAngle) * 4;
    spotlight.position.z = Math.sin(spotAngle) * 4;
    spotlight.position.y = 4;

    // 4. Camera subtle orbit
    if (elapsed >= 2.0) {
      camera.position.x = Math.sin(t * 0.15) * 0.8;
      camera.position.z = 5 + Math.cos(t * 0.15) * 0.5;
    }
    camera.lookAt(0, 0.3, 0);

    // 5. Rim light pulse
    rimLight.intensity = 2.5 + Math.sin(t * 1.2) * 1.0; // oscillates ~1.5–3.5

    // 6. Bottom fill subtle pulse
    bottomFill.intensity = 1.5 + Math.sin(t * 0.7 + 1) * 0.4;

    // 7. Particles — float upward, random drift
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.position.y += p.userData.speed;
      p.position.x += p.userData.drift;
      // Reset when too high
      if (p.position.y > 3.0) {
        p.position.y = -1.1;
        p.userData.drift = (Math.random() - 0.5) * 0.001;
      }
      // Subtle opacity/scale pulse
      const pulse = 0.7 + 0.3 * Math.sin(t * 2 + i);
      p.scale.setScalar(pulse);
    }

    // 8. Key light subtle color shift
    const warmPulse = Math.sin(t * 0.3) * 0.05;
    keyLight.intensity = 3.0 + warmPulse * 10;

    renderer.render(scene, camera);
  }

  animate();

})();
</script>
</body>
</html>
