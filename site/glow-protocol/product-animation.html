<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Glow Protocol — Advanced Serum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;0,800;1,300;1,400&family=Montserrat:wght@100;200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: radial-gradient(ellipse at 50% 30%, #1a0a2e 0%, #0a0514 40%, #020008 100%);
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ─── CORNER ACCENTS ─── */
  .corner {
    position: fixed;
    width: 22px;
    height: 22px;
    opacity: 0;
    animation: fadeIn 2s ease 0.5s forwards;
  }
  .corner-tl { top: 28px; left: 28px; border-top: 2px solid #C8A84B; border-left: 2px solid #C8A84B; }
  .corner-tr { top: 28px; right: 28px; border-top: 2px solid #C8A84B; border-right: 2px solid #C8A84B; }
  .corner-bl { bottom: 28px; left: 28px; border-bottom: 2px solid #C8A84B; border-left: 2px solid #C8A84B; }
  .corner-br { bottom: 28px; right: 28px; border-bottom: 2px solid #C8A84B; border-right: 2px solid #C8A84B; }

  /* ─── LIGHT ORBS ─── */
  .orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  .orb-gold {
    width: 300px;
    height: 300px;
    top: calc(40% - 150px);
    left: calc(50% - 150px);
    background: radial-gradient(circle, rgba(200,168,75,0.25), transparent 70%);
    animation: pulse-gold 4s ease-in-out infinite alternate;
  }
  .orb-purple {
    width: 400px;
    height: 400px;
    top: calc(60% - 200px);
    left: calc(30% - 200px);
    background: radial-gradient(circle, rgba(120,60,200,0.2), transparent 70%);
    animation: drift-purple 6s ease-in-out infinite alternate;
  }
  .orb-blue {
    width: 250px;
    height: 250px;
    top: calc(50% - 125px);
    left: calc(70% - 125px);
    background: radial-gradient(circle, rgba(60,100,220,0.2), transparent 70%);
    animation: drift-blue 5s ease-in-out infinite alternate;
  }

  @keyframes pulse-gold {
    from { opacity: 0.4; transform: scale(0.9); }
    to   { opacity: 0.8; transform: scale(1.1); }
  }
  @keyframes drift-purple {
    from { transform: translate(0, 0); }
    to   { transform: translate(30px, -20px); }
  }
  @keyframes drift-blue {
    from { transform: translate(0, 0); }
    to   { transform: translate(-20px, 15px); }
  }

  /* ─── PARTICLES CONTAINER ─── */
  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #C8A84B;
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0)       translateX(0);            opacity: 0;   }
    20%  { opacity: 0.8; }
    80%  { opacity: 0.4; }
    100% { transform: translateY(-200px) translateX(var(--drift));  opacity: 0;   }
  }

  /* ─── MAIN LAYOUT ─── */
  .page-layout {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 100vh;
    padding: 60px 20px;
    gap: 0;
  }

  /* ─── TOP TEXT ─── */
  .brand-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 700;
    color: #C8A84B;
    letter-spacing: 10px;
    text-align: center;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 2s ease 0.3s forwards;
    margin-bottom: 14px;
  }
  .title-line {
    width: 80px;
    height: 1px;
    background: #C8A84B;
    margin: 0 auto 40px auto;
    opacity: 0;
    animation: fadeIn 2s ease 0.6s forwards;
  }

  /* ─── 3D SCENE ─── */
  .scene {
    perspective: 800px;
    perspective-origin: 50% 40%;
    width: 140px;
    height: 370px;
    position: relative;
    flex-shrink: 0;
  }

  .bottle-wrap {
    position: absolute;
    left: 50%;
    top: 50%;
    transform-origin: center center;
    transform-style: preserve-3d;
    margin-left: -45px;
    margin-top: -175px;
    width: 90px;
    height: 350px;
    animation:
      intro 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
      spin  10s linear 1.5s infinite,
      float  3s ease-in-out 1.5s infinite alternate;
  }

  @keyframes intro {
    from { opacity: 0; transform: scale(0.3) rotateY(0deg); }
    to   { opacity: 1; transform: scale(1)   rotateY(180deg); }
  }
  @keyframes spin  { from { transform: rotateY(0deg);   } to { transform: rotateY(360deg); } }
  @keyframes float {
    from { transform: rotateY(var(--r, 0deg)) translateY(0);     }
    to   { transform: rotateY(var(--r, 0deg)) translateY(-18px); }
  }

  /* ─── BOTTLE PARTS ─── */
  .bottle-body {
    position: absolute;
    width: 90px;
    height: 220px;
    bottom: 0;
    left: 0;
    border-radius: 45px / 20px;
    background: linear-gradient(
      105deg,
      rgba(200,230,245,0.15)  0%,
      rgba(180,210,235,0.55) 30%,
      rgba(220,240,255,0.80) 50%,
      rgba(170,200,220,0.45) 70%,
      rgba(150,180,200,0.20) 100%
    );
    box-shadow:
      inset -20px 0 40px rgba(0,0,0,0.3),
      inset  10px 0 30px rgba(255,255,255,0.15),
      0 20px 80px rgba(100,150,200,0.3),
      0  0  60px rgba(200,180,255,0.15);
    -webkit-backdrop-filter: blur(2px);
    backdrop-filter: blur(2px);
    border: 1px solid rgba(255,255,255,0.2);
  }

  .bottle-highlight {
    position: absolute;
    width: 12px;
    height: 140px;
    left: 18px;
    bottom: 50px;
    background: linear-gradient(
      to bottom,
      transparent,
      rgba(255,255,255,0.6) 30%,
      rgba(255,255,255,0.8) 50%,
      rgba(255,255,255,0.3) 70%,
      transparent
    );
    border-radius: 6px;
    opacity: 0.7;
    pointer-events: none;
    animation: shimmer 3s ease-in-out infinite alternate;
  }
  @keyframes shimmer {
    from { opacity: 0.4; transform: scaleY(0.95); }
    to   { opacity: 0.9; transform: scaleY(1.05); }
  }

  .bottle-label {
    position: absolute;
    width: 70px;
    height: 100px;
    left: 10px;
    bottom: 80px;
    background: rgba(5,0,15,0.85);
    border: 1px solid rgba(200,168,75,0.4);
    border-radius: 4px;
    padding: 10px 8px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    pointer-events: none;
  }
  .label-line {
    width: 40px;
    height: 0;
    border-top: 1px solid #C8A84B;
  }
  .label-glow {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 800;
    color: #C8A84B;
    letter-spacing: 3px;
    line-height: 1;
    margin-top: 3px;
  }
  .label-protocol {
    font-family: 'Montserrat', sans-serif;
    font-size: 7px;
    color: #ffffff;
    letter-spacing: 4px;
    margin-top: 1px;
  }
  .label-diamond {
    color: #C8A84B;
    font-size: 8px;
    margin-top: 2px;
    line-height: 1;
  }
  .label-serum {
    font-family: 'Cormorant Garamond', serif;
    font-size: 6px;
    color: rgba(200,168,75,0.7);
    letter-spacing: 1px;
    font-style: italic;
    margin-top: 1px;
  }

  .bottle-neck {
    position: absolute;
    width: 36px;
    height: 50px;
    left: 27px;
    bottom: 220px;
    background: linear-gradient(
      to right,
      rgba(150,190,210,0.4),
      rgba(220,240,255,0.7),
      rgba(150,190,210,0.4)
    );
    border-radius: 18px 18px 8px 8px;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .bottle-cap {
    position: absolute;
    width: 44px;
    height: 65px;
    left: 23px;
    bottom: 268px;
    background: linear-gradient(
      135deg,
      #8B6914  0%,
      #C8A84B 30%,
      #F0D060 50%,
      #C8A84B 70%,
      #7A5C10 100%
    );
    border-radius: 22px 22px 6px 6px;
    box-shadow:
      0 4px 20px rgba(200,168,75,0.4),
      inset 0 2px 4px rgba(255,255,255,0.3);
  }

  .bottle-base {
    position: absolute;
    width: 90px;
    height: 16px;
    bottom: -10px;
    left: 0;
    background: linear-gradient(
      to right,
      rgba(100,140,170,0.3),
      rgba(180,210,230,0.5),
      rgba(100,140,170,0.3)
    );
    border-radius: 50%;
    filter: blur(2px);
  }

  /* ─── REFLECTION UNDER BOTTLE ─── */
  .reflection {
    width: 80px;
    height: 20px;
    background: radial-gradient(ellipse, rgba(200,168,75,0.3), transparent 70%);
    border-radius: 50%;
    filter: blur(8px);
    animation: ref-pulse 3s ease-in-out infinite alternate;
    margin-top: 10px;
    flex-shrink: 0;
  }
  @keyframes ref-pulse {
    from { opacity: 0.4; transform: scaleX(0.8); }
    to   { opacity: 0.8; transform: scaleX(1.2); }
  }

  /* ─── BOTTOM TEXT ─── */
  .bottom-text {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 32px;
    opacity: 0;
    animation: fadeIn 2s ease 1.2s forwards;
  }
  .tagline-sub {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.9rem;
    color: #ffffff;
    letter-spacing: 5px;
    text-align: center;
    font-weight: 200;
  }
  .tagline-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    color: #C8A84B;
    font-style: italic;
    margin-top: 8px;
    text-align: center;
    letter-spacing: 2px;
  }

  /* ─── SCREEN RECORD HINT ─── */
  .hint {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    text-align: center;
    z-index: 20;
    opacity: 0;
    animation: fadeIn 2s ease 2s forwards;
    white-space: nowrap;
  }

  /* ─── SHARED FADE IN ─── */
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>

<!-- Light orbs -->
<div class="orb orb-gold"></div>
<div class="orb orb-purple"></div>
<div class="orb orb-blue"></div>

<!-- Particles container -->
<div id="particles"></div>

<!-- Corner accents -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Hint -->
<div class="hint">Open fullscreen &middot; Screen record 15 seconds</div>

<!-- Main layout -->
<div class="page-layout">

  <!-- Top text -->
  <h1 class="brand-title">Glow Protocol</h1>
  <div class="title-line"></div>

  <!-- 3D Bottle scene -->
  <div class="scene">
    <div class="bottle-wrap" id="bottleWrap">

      <!-- Cap -->
      <div class="bottle-cap"></div>

      <!-- Neck -->
      <div class="bottle-neck"></div>

      <!-- Body -->
      <div class="bottle-body">
        <!-- Highlight streak -->
        <div class="bottle-highlight"></div>

        <!-- Label -->
        <div class="bottle-label">
          <div class="label-line"></div>
          <div class="label-glow">GLOW</div>
          <div class="label-protocol">PROTOCOL</div>
          <div class="label-line"></div>
          <div class="label-diamond">&#9670;</div>
          <div class="label-serum">Advanced Serum</div>
        </div>
      </div>

      <!-- Base shadow -->
      <div class="bottle-base"></div>

    </div>
  </div>

  <!-- Reflection -->
  <div class="reflection"></div>

  <!-- Bottom text -->
  <div class="bottom-text">
    <div class="tagline-sub">Advanced Serum Formula</div>
    <div class="tagline-main">Luminous skin begins here.</div>
  </div>

</div>

<script>
  // ── Generate 20 gold particles ──
  const container = document.getElementById('particles');
  const centerX   = window.innerWidth  / 2;
  const centerY   = window.innerHeight / 2;

  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';

    // Random X spread around bottle (±80px from centre)
    const x    = centerX + (Math.random() * 160 - 80);
    const y    = centerY + (Math.random() * 120 - 20);
    const dur  = (3 + Math.random() * 4).toFixed(2);   // 3–7 s
    const del  = (Math.random() * 5).toFixed(2);        // 0–5 s
    const drift= (Math.random() * 40 - 20).toFixed(0);  // ±20 px

    p.style.cssText = `
      left:${x}px;
      top:${y}px;
      animation-duration:${dur}s;
      animation-delay:-${del}s;
      --drift:${drift}px;
    `;
    container.appendChild(p);
  }
</script>
</body>
</html>
