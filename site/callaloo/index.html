<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>Calalloo — Caribbean Culinary Intelligence</title>
    <link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap' rel='stylesheet'>
    <style>
        :root{--primary:#F97316;--dark:#0A0F0A;--card:#1A1F1A;--border:rgba(255,255,255,0.05)}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--dark);color:white;font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh}
        nav{padding:40px 6%;display:flex;justify-content:space-between;align-items:center}
        .logo{font-size:1.6rem;font-weight:800;letter-spacing:-1px;display:flex;align-items:center;gap:10px}
        .logo .leaf{color:var(--primary)}
        .hero{padding:120px 6% 100px;text-align:center}
        h1{font-size:clamp(3.5rem, 10vw, 7.5rem);font-weight:800;letter-spacing:-4px;line-height:0.9;margin-bottom:30px}
        .hero p{max-width:600px;margin:0 auto 50px;color:rgba(255,255,255,0.4);font-size:1.1rem;line-height:1.6}
        .btn-cal{background:var(--primary);color:white;padding:20px 50px;border-radius:100px;text-decoration:none;font-weight:800;font-size:1.1rem;transition:0.3s;display:inline-block}
        .btn-cal:hover{transform:scale(1.05);box-shadow:0 20px 40px rgba(249,115,22,0.2)}
        .hub-preview{margin-top:100px;background:var(--card);border:1px solid var(--border);border-radius:40px;padding:60px;max-width:1200px;margin-left:auto;margin-right:auto;text-align:left}
        .stat-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:40px}
        .stat-item h4{font-size:0.7rem;text-transform:uppercase;color:rgba(255,255,255,0.3);letter-spacing:2px;margin-bottom:15px}
        .stat-item .val{font-size:3rem;font-weight:800;color:var(--primary)}
    </style>
</head>
<body>
    <nav><div class='logo'><span class='leaf'>🌿</span>CALALLOO</div></nav>
    <div class='hero'>
        <span style='color:var(--primary);font-weight:800;letter-spacing:5px;font-size:0.75rem;text-transform:uppercase;display:block;margin-bottom:20px'>Caribbean Culinary Intelligence</span>
        <h1>HERITAGE<br>DATA HUB.</h1>
        <p>The SaaS platform for Caribbean culinary logistics, heritage recipe nodes, and local sourcing intelligence. Preserving flavor through data.</p>
        <a href='/site/callaloo/login/' class='btn-cal'>Access Culinary Command</a>
        <div class='hub-preview'>
            <div class='stat-grid'>
                <div class='stat-item'><h4>Recipe Nodes</h4><div class='val'>1,420</div></div>
                <div class='stat-item'><h4>Sourcing APIs</h4><div class='val'>Active</div></div>
                <div class='stat-item'><h4>Network Reach</h4><div class='val'>94%</div></div>
            </div>
        </div>
    </div>
</body>
</html>
