<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Feed — Callaloo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" async></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#E87722;
  --primary-light:#F5A623;
  --primary-dark:#B85A10;
  --bg:#FFF8F0;
  --card:#FFFFFF;
  --text:#1A0D00;
  --muted:rgba(26,13,0,0.45);
  --border:rgba(232,119,34,0.18);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:14px 5%;background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);box-shadow:0 2px 16px rgba(232,119,34,0.07);gap:12px}
.nav-logo{font-size:1.2rem;font-weight:900;color:var(--primary);text-decoration:none;flex-shrink:0}
.nav-logo span{color:#1A0D00}

/* SEARCH BAR */
.search-wrap{flex:1;max-width:520px;position:relative}
.search-input{width:100%;background:#FFF0E0;border:1.5px solid rgba(232,119,34,0.25);border-radius:50px;padding:10px 20px 10px 44px;font-size:.95rem;color:var(--text);outline:none;transition:border .2s;font-family:inherit}
.search-input:focus{border-color:var(--primary);background:#fff}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none}
.search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;cursor:pointer;color:var(--muted);display:none}

/* FILTER PILLS */
.filter-bar{display:flex;gap:8px;padding:14px 5% 4px;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-pill{flex-shrink:0;padding:7px 18px;border-radius:50px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-pill.active{background:var(--primary);border-color:var(--primary);color:#fff}
.filter-pill:hover:not(.active){border-color:var(--primary);color:var(--primary)}

/* RESULTS COUNT */
.results-bar{padding:10px 5% 0;font-size:.82rem;color:var(--muted);font-weight:500}

/* FEED GRID — Pinterest style masonry */
.feed-grid{columns:2;column-gap:12px;padding:14px 5% 100px;max-width:1200px;margin:0 auto}
@media(min-width:600px){.feed-grid{columns:3}}
@media(min-width:900px){.feed-grid{columns:4}}
@media(min-width:1100px){.feed-grid{columns:5}}

/* RECIPE CARD */
.recipe-card{break-inside:avoid;margin-bottom:12px;background:var(--card);border-radius:18px;overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 12px rgba(232,119,34,0.06);transition:all .22s;cursor:pointer;display:block;text-decoration:none;color:inherit;position:relative}
.recipe-card:hover{transform:translateY(-4px);box-shadow:0 10px 32px rgba(232,119,34,0.18);border-color:rgba(232,119,34,0.4)}
.card-img{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative}
.card-badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);color:#fff;font-size:.65rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.save-btn{position:absolute;top:8px;right:8px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.9);border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.save-btn:hover{transform:scale(1.15)}
.save-btn.saved{background:var(--primary);color:#fff}
.card-body{padding:12px}
.card-title{font-weight:700;font-size:.9rem;line-height:1.3;margin-bottom:6px;color:var(--text)}
.card-meta{display:flex;gap:8px;align-items:center;font-size:.73rem;color:var(--muted);flex-wrap:wrap}
.card-dot{color:rgba(232,119,34,0.4)}
.card-rating{color:var(--primary);font-weight:700}
.card-view{display:inline-block;margin-top:8px;font-size:.75rem;font-weight:700;color:var(--primary);text-decoration:none}
.card-view:hover{text-decoration:underline}

/* SAVED SECTION HEADER */
.section-header{padding:16px 5% 4px;display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:1rem;font-weight:800;color:var(--text)}
.section-link{font-size:.82rem;color:var(--primary);text-decoration:none;font-weight:600}
.section-link:hover{text-decoration:underline}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty h3{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:8px}
.empty p{font-size:.88rem;line-height:1.6}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A0D00;color:#fff;padding:10px 22px;border-radius:50px;font-size:.85rem;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:200;box-shadow:0 -4px 20px rgba(232,119,34,0.08)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;text-decoration:none;color:var(--muted);font-size:.65rem;font-weight:600;gap:4px;transition:color .2s;cursor:pointer;border:none;background:none;font-family:inherit}
.bnav-item.active{color:var(--primary)}
.bnav-item .icon{font-size:22px;line-height:1}

/* FLOAT BUTTONS */
.std-float-wa{position:fixed;bottom:76px;right:16px;z-index:9999;width:46px;height:46px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,0.4);transition:transform .2s;text-decoration:none;font-size:20px}
.std-float-bt{position:fixed;bottom:130px;right:16px;z-index:9999;width:40px;height:40px;border-radius:50%;background:var(--primary);border:none;color:#fff;cursor:pointer;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;font-size:16px}
.std-float-bt.visible{opacity:1;transform:translateY(0)}

/* NO RESULTS */
#noResults{display:none;text-align:center;padding:60px 20px;color:var(--muted)}
</style>
</head>
<body>

<nav>
  <a href="/callaloo/" class="nav-logo">Calla<span>loo</span></a>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="search" placeholder="Search recipes... doubles, curry, desserts" autocomplete="off" oninput="handleSearch(this.value)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <a href="/callaloo/profile/" style="font-size:24px;text-decoration:none" title="Profile">👤</a>
</nav>

<!-- FILTER PILLS -->
<div class="filter-bar">
  <button class="filter-pill active" onclick="setFilter('all',this)">All</button>
  <button class="filter-pill" onclick="setFilter('mains',this)">🍽 Mains</button>
  <button class="filter-pill" onclick="setFilter('desserts',this)">🍰 Desserts</button>
  <button class="filter-pill" onclick="setFilter('sides',this)">🥗 Sides</button>
  <button class="filter-pill" onclick="setFilter('snacks',this)">🥜 Snacks</button>
  <button class="filter-pill" onclick="setFilter('condiments',this)">🫙 Condiments</button>
  <button class="filter-pill" onclick="setFilter('saved',this)">❤️ Saved</button>
</div>

<div class="results-bar" id="resultsBar"></div>

<!-- FEED -->
<div class="feed-grid" id="feedGrid"></div>
<div id="noResults">
  <div style="font-size:48px;margin-bottom:16px">🔍</div>
  <div style="font-size:1rem;font-weight:700;margin-bottom:8px;color:var(--text)">No recipes found</div>
  <div style="font-size:.88rem">Try a different search or filter</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="/callaloo/" class="bnav-item"><span class="icon">🏠</span>Home</a>
  <a href="/callaloo/feed/" class="bnav-item active"><span class="icon">🍽</span>Feed</a>
  <a href="/callaloo/recipes/" class="bnav-item"><span class="icon">📖</span>Recipes</a>
  <a href="/callaloo/profile/" class="bnav-item"><span class="icon">👤</span>Profile</a>
</div>

<!-- FLOAT BUTTONS -->
<a href="https://wa.me/447576505652" target="_blank" rel="noopener" class="std-float-wa" aria-label="WhatsApp">💬</a>
<button class="std-float-bt" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/callaloo/recipe-data.js"></script>
<script src="/callaloo/recipe-data-2.js"></script>
<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const SB_URL = 'https://ysqcxakaahxtvgefimtk.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzcWN4YWthYWh4dHZnZWZpbXRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY4ODQ1ODcsImV4cCI6MjA2MjQ2MDU4N30.GCiMFG4D8SOJXiU0VhYPSMJPYZBPMnDqUAHCRkBXpco';
var _sb = null;
var _user = null;
var _savedSlugs = new Set();
var _currentFilter = 'all';
var _currentSearch = '';

function getSB(){
  if(!_sb && window.supabase) _sb = window.supabase.createClient(SB_URL, SB_KEY);
  return _sb;
}

// ── INIT ────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async function(){
  // Load saved from localStorage immediately (works even without login)
  var ls = localStorage.getItem('callaloo_saved');
  if(ls){ try{ _savedSlugs = new Set(JSON.parse(ls)); }catch(e){} }

  // Then check Supabase session
  var sb = getSB();
  if(sb){
    var { data: { session } } = await sb.auth.getSession();
    if(session){ _user = session.user; await loadSavedFromDB(); }
  }

  renderFeed();

  // Scroll back-to-top
  window.addEventListener('scroll', function(){
    var btn = document.getElementById('backTop');
    if(window.scrollY > 400){ btn.classList.add('visible'); } else { btn.classList.remove('visible'); }
  }, {passive:true});
});

// ── LOAD SAVED FROM SUPABASE ────────────────────────────────────────────────
async function loadSavedFromDB(){
  var sb = getSB();
  if(!sb || !_user) return;
  var { data } = await sb.from('saved_recipes').select('slug').eq('user_id', _user.id);
  if(data){ data.forEach(function(r){ _savedSlugs.add(r.slug); }); }
  // Sync localStorage
  localStorage.setItem('callaloo_saved', JSON.stringify([..._savedSlugs]));
}

// ── TOGGLE SAVE ─────────────────────────────────────────────────────────────
async function toggleSave(slug, btn, e){
  e.preventDefault(); e.stopPropagation();
  var wasSaved = _savedSlugs.has(slug);
  if(wasSaved){
    _savedSlugs.delete(slug);
  } else {
    _savedSlugs.add(slug);
  }
  // Update localStorage
  localStorage.setItem('callaloo_saved', JSON.stringify([..._savedSlugs]));

  // Update button
  btn.classList.toggle('saved', !wasSaved);
  btn.textContent = _savedSlugs.has(slug) ? '❤️' : '🤍';
  showToast(_savedSlugs.has(slug) ? 'Saved to your collection!' : 'Removed from collection');

  // Sync to Supabase if logged in
  var sb = getSB();
  if(sb && _user){
    if(!wasSaved){
      await sb.from('saved_recipes').upsert({user_id: _user.id, slug: slug, saved_at: new Date().toISOString()});
    } else {
      await sb.from('saved_recipes').delete().eq('user_id', _user.id).eq('slug', slug);
    }
  }

  // If we're in saved filter, re-render
  if(_currentFilter === 'saved') renderFeed();
}

// ── BUILD ALL RECIPES LIST ──────────────────────────────────────────────────
function getAllRecipes(){
  var all = [];
  var data = window.RECIPE_DATA || {};
  // Merge both data files (RECIPE_DATA_2 extends RECIPE_DATA)
  Object.keys(data).forEach(function(slug){
    var r = data[slug];
    all.push({slug:slug, name:r.name, badge:r.badge||'', emoji:r.emoji||'🍽', gradient:r.gradient||'linear-gradient(135deg,#E87722,#F5A623)', time:r.time||'', difficulty:r.difficulty||'', rating:r.rating||'4.8', category:(r.badge||'').toLowerCase()});
  });
  return all;
}

// ── RENDER FEED ─────────────────────────────────────────────────────────────
function renderFeed(){
  var recipes = getAllRecipes();
  var search = _currentSearch.toLowerCase().trim();
  var filter = _currentFilter;

  var filtered = recipes.filter(function(r){
    var matchSearch = !search || r.name.toLowerCase().includes(search) || r.badge.toLowerCase().includes(search) || r.category.includes(search);
    var matchFilter = filter === 'all' || (filter === 'saved' && _savedSlugs.has(r.slug)) || r.category.includes(filter) || r.badge.toLowerCase().includes(filter);
    return matchSearch && matchFilter;
  });

  var grid = document.getElementById('feedGrid');
  var noRes = document.getElementById('noResults');
  var bar = document.getElementById('resultsBar');

  if(filtered.length === 0){
    grid.innerHTML = '';
    noRes.style.display = 'block';
    bar.textContent = '';
    return;
  }
  noRes.style.display = 'none';
  bar.textContent = filtered.length + ' recipe' + (filtered.length !== 1 ? 's' : '');

  grid.innerHTML = filtered.map(function(r){
    var saved = _savedSlugs.has(r.slug);
    return '<a class="recipe-card" href="/callaloo/recipe/?r=' + r.slug + '">' +
      '<div class="card-img" style="background:' + r.gradient + '">' +
        '<span style="font-size:2.8rem">' + r.emoji + '</span>' +
        '<span class="card-badge">' + r.badge + '</span>' +
        '<button class="save-btn' + (saved?' saved':'') + '" onclick="toggleSave('' + r.slug + '',this,event)" title="' + (saved?'Remove from saved':'Save recipe') + '">' + (saved?'❤️':'🤍') + '</button>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-title">' + r.name + '</div>' +
        '<div class="card-meta">' +
          '<span>⏱ ' + r.time + '</span><span class="card-dot">·</span>' +
          '<span class="card-rating">★ ' + r.rating + '</span>' +
        '</div>' +
        '<span class="card-view">View Recipe →</span>' +
      '</div>' +
    '</a>';
  }).join('');
}

// ── SEARCH ──────────────────────────────────────────────────────────────────
function handleSearch(val){
  _currentSearch = val;
  document.getElementById('searchClear').style.display = val ? 'block' : 'none';
  renderFeed();
}

function clearSearch(){
  document.getElementById('searchInput').value = '';
  _currentSearch = '';
  document.getElementById('searchClear').style.display = 'none';
  renderFeed();
}

// ── FILTER ──────────────────────────────────────────────────────────────────
function setFilter(filter, el){
  _currentFilter = filter;
  document.querySelectorAll('.filter-pill').forEach(function(p){ p.classList.remove('active'); });
  el.classList.add('active');
  renderFeed();
}

// ── TOAST ───────────────────────────────────────────────────────────────────
var _toastTimer;
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2200);
}
</script>

<div style="position:fixed;bottom:84px;right:16px;z-index:9999;background:rgba(20,20,30,0.88);border:1px solid rgba(232,119,34,0.35);border-radius:25px;padding:5px 10px;backdrop-filter:blur(10px)">
  <div id="google_translate_element"></div>
</div>
<script>function googleTranslateElementInit(){new google.translate.TranslateElement({pageLanguage:'en',autoDisplay:false},'google_translate_element')}
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
