<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="pageTitle">Recipe — Callaloo</title>
<link rel="manifest" href="/callaloo/manifest.json">
<meta name="theme-color" content="#E87722">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Callaloo">
<link rel="apple-touch-icon" href="/callaloo/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#E87722;
  --primary-light:#F5A623;
  --primary-dark:#B85A10;
  --bg:#FFF8F0;
  --card:#FFFFFF;
  --text:#1A0D00;
  --muted:rgba(26,13,0,0.5);
  --border:rgba(232,119,34,0.2);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:80px}

/* NAV */
nav{background:rgba(255,248,240,0.97);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:60px;border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Fraunces',serif;font-size:1.25rem;font-weight:900;color:var(--primary);text-decoration:none}
.nav-logo span{color:var(--text)}
.nav-links{display:flex;align-items:center;gap:20px}
.nav-links a{text-decoration:none;color:var(--muted);font-size:.88rem;font-weight:500;transition:color .2s}
.nav-links a:hover{color:var(--primary)}
.nav-cta{background:var(--primary)!important;color:white!important;padding:8px 18px;border-radius:50px;font-weight:600!important}

/* HERO */
.recipe-hero{min-height:300px;display:flex;flex-direction:column;justify-content:flex-end;padding:40px 5% 0;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--primary-dark),var(--primary))}
.recipe-hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.35}
.recipe-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.1) 0%,rgba(26,13,0,0.7) 100%)}
.hero-inner{position:relative;z-index:2;max-width:860px;margin:0 auto;width:100%;padding-bottom:32px}
.recipe-breadcrumb{font-size:13px;color:rgba(255,255,255,0.65);margin-bottom:12px}
.recipe-breadcrumb a{color:rgba(255,255,255,0.65);text-decoration:none}
.recipe-breadcrumb a:hover{color:white}
.recipe-hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:white;font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px}
.recipe-title{font-family:'Fraunces',serif;font-size:clamp(28px,6vw,56px);font-weight:900;color:white;line-height:1.1;margin-bottom:16px}
.recipe-meta-bar{display:flex;align-items:center;gap:20px;flex-wrap:wrap;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.2)}
.recipe-meta-item{color:rgba(255,255,255,0.85);font-size:14px;display:flex;align-items:center;gap:6px}
.recipe-meta-item strong{color:white;font-weight:700}

/* CONTENT */
.recipe-content{max-width:860px;margin:0 auto;padding:40px 5%}
.section-title{font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:var(--text);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.section-divider{height:1px;background:var(--border);margin:32px 0}

/* COVER PHOTO */
.recipe-cover{width:100%;max-height:360px;object-fit:cover;border-radius:20px;margin-bottom:32px;border:1px solid var(--border)}

/* DESCRIPTION */
.recipe-description{font-size:16px;line-height:1.8;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:32px}

/* INGREDIENTS */
.ingredients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.ingredient-item{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;cursor:pointer;transition:all .2s}
.ingredient-item:hover{border-color:var(--primary);background:var(--bg)}
.ingredient-item.checked{background:#FFF0E0;border-color:var(--primary)}
.ingredient-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:12px;font-weight:700;color:var(--primary)}
.ingredient-item.checked .ingredient-check{background:var(--primary);border-color:var(--primary);color:white}
.ingredient-text{font-size:14px;color:var(--text);font-weight:500}
.ingredient-item.checked .ingredient-text{text-decoration:line-through;color:var(--muted)}

/* STEPS */
.steps-list{display:flex;flex-direction:column;gap:14px}
.step-item{display:flex;gap:16px;align-items:flex-start;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px}
.step-number{width:34px;height:34px;background:var(--primary);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.step-text{font-size:15px;line-height:1.7;color:var(--text);padding-top:4px}

/* NUTRITION */
.nutrition-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:540px){.nutrition-grid{grid-template-columns:repeat(2,1fr)}}
.nutrition-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;text-align:center}
.nutrition-value{font-family:'Fraunces',serif;font-size:28px;font-weight:900;color:var(--primary);line-height:1}
.nutrition-label{font-size:11px;color:var(--muted);font-weight:600;margin-top:6px;text-transform:uppercase;letter-spacing:.5px}

/* WHERE TO BUY */
.wtb-list{display:flex;flex-direction:column;gap:12px}
.wtb-item{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.wtb-icon{font-size:26px;flex-shrink:0}
.wtb-ingredient{font-weight:700;font-size:15px;color:var(--text)}
.wtb-store{font-size:13px;color:var(--muted)}
.wtb-aisle{font-size:12px;color:var(--muted);opacity:.7}
.wtb-badge{margin-left:auto;background:var(--bg);border:1px solid var(--border);color:var(--primary);font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;white-space:nowrap}

/* CTA */
.recipe-cta{background:linear-gradient(135deg,var(--primary-dark),var(--primary));border-radius:24px;padding:32px;text-align:center;margin-top:32px}
.recipe-cta h3{font-family:'Fraunces',serif;font-size:24px;color:white;margin-bottom:8px}
.recipe-cta p{color:rgba(255,255,255,0.75);margin-bottom:22px;font-size:.9rem}
.cta-btn{display:inline-flex;align-items:center;gap:10px;background:white;color:var(--primary);padding:13px 26px;border-radius:50px;font-weight:700;font-size:14px;text-decoration:none;transition:all .2s}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.2)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:200;box-shadow:0 -4px 20px rgba(232,119,34,0.08)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;min-height:56px;text-decoration:none;color:var(--muted);font-size:.65rem;font-weight:600;gap:4px;transition:color .2s}
.bnav-item.active{color:var(--primary)}
.bnav-item .icon{font-size:22px;line-height:1}

/* NOT FOUND */
.not-found{text-align:center;padding:80px 5%}
.not-found h2{font-family:'Fraunces',serif;font-size:32px;color:var(--text);margin-bottom:14px}
.not-found p{color:var(--muted);margin-bottom:22px}
.back-btn{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:white;padding:12px 26px;border-radius:50px;text-decoration:none;font-weight:600}

/* LOADING */
.loading{text-align:center;padding:80px 5%;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* FLOAT */
.std-float-wa{position:fixed;bottom:76px;right:16px;z-index:9999;width:46px;height:46px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,0.4);text-decoration:none;font-size:20px}
.std-float-bt{position:fixed;bottom:130px;right:16px;z-index:9999;width:40px;height:40px;border-radius:50%;background:var(--primary);border:none;color:#fff;cursor:pointer;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;font-size:16px}
.std-float-bt.visible{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<nav>
  <a href="/callaloo/feed/" class="nav-logo">Calla<span>loo</span></a>
  <div class="nav-links">
    <a href="/callaloo/recipes/">Recipes</a>
    <a href="/callaloo/profile/" class="nav-cta">My Profile</a>
  </div>
</nav>

<div id="recipeRoot">
  <div class="loading"><div class="spinner"></div><p>Loading recipe...</p></div>
</div>

<div class="bottom-nav">
  <a href="/callaloo/feed/" class="bnav-item"><span class="icon">🍽</span>Feed</a>
  <a href="/callaloo/recipes/" class="bnav-item"><span class="icon">📖</span>Recipes</a>
  <a href="/callaloo/profile/" class="bnav-item"><span class="icon">👤</span>Profile</a>
</div>

<a href="https://wa.me/447576505652" target="_blank" rel="noopener" class="std-float-wa" aria-label="WhatsApp">💬</a>
<button class="std-float-bt" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<div style="position:fixed;bottom:84px;right:16px;z-index:9999;background:rgba(20,20,30,0.88);border:1px solid rgba(232,119,34,0.35);border-radius:25px;padding:5px 10px;backdrop-filter:blur(10px)">
  <div id="gte_rd"></div>
</div>
<script>function gteInit_rd(){new google.translate.TranslateElement({pageLanguage:'en',autoDisplay:false},'gte_rd');}</script>
<script src="//translate.google.com/translate_a/element.js?cb=gteInit_rd"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL = 'https://sktpjacowqaedddtrhuz.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdHBqYWNvd3FhZWRkZHRyaHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDcxNTY1NzIsImV4cCI6MjA2MjczMjU3Mn0.oEYHPGkIoYiMIqXM7JSNFkBnlr8FMM5lXBJLFuFtEzI';

function toggleIngredient(el){ el.classList.toggle('checked'); }

function renderRecipe(r, ingredients, steps, wtb){
  var ingHtml = (ingredients||[]).map(function(item){
    return '<div class="ingredient-item" onclick="toggleIngredient(this)"><div class="ingredient-check">✓</div><div class="ingredient-text">'+item+'</div></div>';
  }).join('') || '<p style="color:var(--muted)">No ingredients listed.</p>';

  var stepsHtml = (steps||[]).map(function(step, i){
    return '<div class="step-item"><div class="step-number">'+(i+1)+'</div><div class="step-text">'+step+'</div></div>';
  }).join('') || '<p style="color:var(--muted)">No steps listed.</p>';

  var wtbHtml = (wtb||[]).map(function(w){
    return '<div class="wtb-item"><div class="wtb-icon">🛒</div><div style="flex:1"><div class="wtb-ingredient">'+(w.ingredient||w.name||'')+'</div><div class="wtb-store">'+(w.store||w.store_name||'')+'</div><div class="wtb-aisle">'+(w.aisle||'')+'</div></div><div class="wtb-badge">Find Nearby</div></div>';
  }).join('') || '<p style="color:var(--muted)">Where-to-buy info coming soon.</p>';

  var tags = r.tags || [];
  var badge = tags.length > 0 ? tags[0] : 'Recipe';
  var prepTime = parseInt(r.prep_time)||0;
  var cookTime = parseInt(r.cook_time)||0;
  var totalTime = prepTime + cookTime;
  var nutrition = r.nutrition || {};

  var heroContent = r.cover_photo_url
    ? '<img class="recipe-hero-img" src="'+r.cover_photo_url+'" alt="'+r.title+'" onerror="this.style.display=\'none\'">'
    : '';

  var html = '<div class="recipe-hero">'
    + heroContent
    + '<div class="recipe-hero-overlay"></div>'
    + '<div class="hero-inner">'
    + '<p class="recipe-breadcrumb"><a href="/callaloo/feed/">Feed</a> › <a href="/callaloo/recipes/">Recipes</a> › '+r.title+'</p>'
    + '<div class="recipe-hero-badge">'+badge+'</div>'
    + '<h1 class="recipe-title">'+r.title+'</h1>'
    + '<div class="recipe-meta-bar">'
    + (totalTime ? '<div class="recipe-meta-item">⏱ <strong>'+totalTime+' min</strong></div>' : '')
    + (r.difficulty ? '<div class="recipe-meta-item">📊 <strong>'+r.difficulty+'</strong></div>' : '')
    + (r.servings ? '<div class="recipe-meta-item">🍽️ <strong>Serves '+r.servings+'</strong></div>' : '')
    + '</div>'
    + '</div></div>'

    + '<div class="recipe-content">'
    + (r.description ? '<p class="recipe-description">'+r.description+'</p>' : '')

    + '<h2 class="section-title">🛒 Ingredients</h2>'
    + '<p style="font-size:13px;color:var(--muted);margin-bottom:14px">Tap each ingredient to check it off as you cook.</p>'
    + '<div class="ingredients-grid">'+ingHtml+'</div>'

    + '<div class="section-divider"></div>'
    + '<h2 class="section-title">👨‍🍳 Steps</h2>'
    + '<div class="steps-list">'+stepsHtml+'</div>'

    + (Object.keys(nutrition).length ? '<div class="section-divider"></div>'
    + '<h2 class="section-title">📊 Nutrition (per serving)</h2>'
    + '<div class="nutrition-grid">'
    + '<div class="nutrition-card"><div class="nutrition-value">'+(nutrition.calories||'—')+'</div><div class="nutrition-label">Calories</div></div>'
    + '<div class="nutrition-card"><div class="nutrition-value">'+(nutrition.protein||'—')+'</div><div class="nutrition-label">Protein</div></div>'
    + '<div class="nutrition-card"><div class="nutrition-value">'+(nutrition.carbs||'—')+'</div><div class="nutrition-label">Carbs</div></div>'
    + '<div class="nutrition-card"><div class="nutrition-value">'+(nutrition.fat||'—')+'</div><div class="nutrition-label">Fat</div></div>'
    + '</div>' : '')

    + '<div class="section-divider"></div>'
    + '<h2 class="section-title">📍 Where to Buy</h2>'
    + '<div class="wtb-list">'+wtbHtml+'</div>'

    + '<div class="recipe-cta"><h3>Tried this recipe?</h3><p>Share how yours turned out!</p>'
    + '<a href="/callaloo/feed/" class="cta-btn">← Back to Feed</a>'
    + '</div>'
    + '</div>';

  document.getElementById('recipeRoot').innerHTML = html;
  document.title = r.title + ' — Callaloo';
}

function renderNotFound(id){
  document.getElementById('recipeRoot').innerHTML = '<div class="not-found"><h2>Recipe not found</h2><p>We could not find this recipe.</p><a href="/callaloo/recipes/" class="back-btn">← Browse all recipes</a></div>';
}

(async function(){
  var params = new URLSearchParams(window.location.search);
  var recipeId = params.get('r');
  if(!recipeId){ renderNotFound(); return; }

  var sb = window.supabase.createClient(SB_URL, SB_KEY);

  try {
    // Load recipe
    var recipeRes = await sb.from('recipes').select('*').eq('id', recipeId).single();
    if(recipeRes.error || !recipeRes.data){ renderNotFound(recipeId); return; }
    var recipe = recipeRes.data;

    // Load ingredients
    var ingRes = await sb.from('recipe_ingredients')
      .select('quantity, unit, ingredient_id, ingredients(name)')
      .eq('recipe_id', recipeId);
    var ingredients = (ingRes.data||[]).map(function(i){
      var name = (i.ingredients && i.ingredients.name) ? i.ingredients.name : '';
      var qty = i.quantity ? i.quantity+' '+(i.unit||'') : '';
      return (qty+' '+name).trim();
    });

    // Load steps
    var steps = [];
    if(recipe.instructions){
      try{ steps = JSON.parse(recipe.instructions); }catch(e){
        steps = recipe.instructions.split('\n').filter(function(s){ return s.trim(); });
      }
    }

    // Load where to buy
    var wtbRes = await sb.from('where_to_buy')
      .select('ingredient_id, store_name, aisle, ingredients(name)')
      .eq('recipe_id', recipeId);
    var wtb = (wtbRes.data||[]).map(function(w){
      return {
        ingredient: (w.ingredients && w.ingredients.name) ? w.ingredients.name : '',
        store: w.store_name||'',
        aisle: w.aisle||''
      };
    });

    renderRecipe(recipe, ingredients, steps, wtb);
  } catch(e){
    renderNotFound(recipeId);
  }
})();

window.addEventListener('scroll',function(){
  var btn=document.getElementById('backTop');
  if(btn) btn.classList.toggle('visible',window.scrollY>400);
},{passive:true});

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/callaloo/sw.js').catch(function(){});
  });
}
</script>
</body>
</html>
