<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#00875A;--primary-light:#00C47A;--primary-dark:#005C3E;--accent:#FFD166;--cream:#F0FFF8;--dark:#0D2B1E;--mid:#3A6B52;--light:#6B9E86;--white:#fff;--border:#A8DFC4;}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--dark);line-height:1.6}

/* NAV */
nav{background:rgba(240,255,248,0.97);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:68px;border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo-icon{width:36px;height:36px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center}
.nav-logo-text{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:var(--dark)}
.nav-links{display:flex;align-items:center;gap:24px}
.nav-links a{text-decoration:none;color:var(--mid);font-size:14px;font-weight:500;transition:color .2s}
.nav-links a:hover{color:var(--primary)}
.nav-cta{background:var(--primary)!important;color:white!important;padding:9px 20px;border-radius:50px;font-weight:600!important}
.ham{display:none;background:none;border:none;cursor:pointer;padding:4px}
.ham span{display:block;width:22px;height:2px;background:var(--dark);margin:5px 0}
@media(max-width:768px){.nav-links{display:none;position:fixed;top:68px;left:0;right:0;background:var(--white);flex-direction:column;padding:20px;gap:4px;border-bottom:1px solid var(--border);z-index:99}.nav-links.open{display:flex}.nav-links a{padding:10px 0;border-bottom:1px solid var(--border);width:100%}.ham{display:block}}

/* HERO */
.recipe-hero{min-height:320px;display:flex;flex-direction:column;justify-content:flex-end;padding:40px 5% 0;position:relative;overflow:hidden}
.recipe-hero-emoji{position:absolute;top:-20px;right:5%;font-size:220px;opacity:.12;line-height:1}
.recipe-breadcrumb{font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:12px}
.recipe-breadcrumb a{color:rgba(255,255,255,0.7);text-decoration:none}
.recipe-breadcrumb a:hover{color:white}
.recipe-hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:white;font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px}
.recipe-title{font-family:'Fraunces',serif;font-size:clamp(36px,6vw,64px);font-weight:900;color:white;line-height:1.1;margin-bottom:16px;max-width:680px}
.recipe-meta-bar{display:flex;align-items:center;gap:24px;padding:20px 0;flex-wrap:wrap}
.recipe-meta-item{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,0.85);font-size:14px}
.recipe-meta-item strong{color:white;font-weight:700}
.cook-row{display:flex;align-items:center;gap:10px;padding:18px 0;border-top:1px solid rgba(255,255,255,0.2)}
.cook-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:800;flex-shrink:0;border:2px solid rgba(255,255,255,0.4)}
.cook-name{color:white;font-weight:600;font-size:15px}
.cook-label{color:rgba(255,255,255,0.6);font-size:12px}
.cook-rating{margin-left:auto;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;padding:6px 14px;border-radius:20px;font-size:14px;font-weight:700}

/* CONTENT */
.recipe-content{max-width:860px;margin:0 auto;padding:48px 5%}
.section-title{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--dark);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.section-title .icon{font-size:22px}
.section-divider{height:1px;background:var(--border);margin:36px 0}

/* DESCRIPTION */
.recipe-description{font-size:17px;line-height:1.8;color:var(--mid);background:var(--white);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:36px}

/* INGREDIENTS */
.ingredients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.ingredient-item{display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px 16px;cursor:pointer;transition:all .2s}
.ingredient-item:hover{border-color:var(--primary);background:var(--cream)}
.ingredient-item.checked{background:#E6F9F2;border-color:var(--primary)}
.ingredient-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:12px;color:var(--primary);font-weight:700}
.ingredient-item.checked .ingredient-check{background:var(--primary);border-color:var(--primary);color:white}
.ingredient-text{font-size:14px;color:var(--dark);font-weight:500}
.ingredient-item.checked .ingredient-text{text-decoration:line-through;color:var(--light)}

/* STEPS */
.steps-list{display:flex;flex-direction:column;gap:16px}
.step-item{display:flex;gap:16px;align-items:flex-start;background:var(--white);border:1px solid var(--border);border-radius:16px;padding:20px}
.step-number{width:36px;height:36px;background:var(--primary);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}
.step-text{font-size:15px;line-height:1.7;color:var(--dark);padding-top:6px}

/* NUTRITION */
.nutrition-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:540px){.nutrition-grid{grid-template-columns:repeat(2,1fr)}}
.nutrition-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center}
.nutrition-value{font-family:'Fraunces',serif;font-size:32px;font-weight:900;color:var(--primary);line-height:1}
.nutrition-label{font-size:12px;color:var(--light);font-weight:600;margin-top:6px;text-transform:uppercase;letter-spacing:.5px}

/* WHERE TO BUY */
.wtb-list{display:flex;flex-direction:column;gap:12px}
.wtb-item{display:flex;align-items:center;gap:16px;background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px 20px}
.wtb-icon{font-size:28px;flex-shrink:0}
.wtb-ingredient{font-weight:700;font-size:15px;color:var(--dark)}
.wtb-store{font-size:13px;color:var(--mid)}
.wtb-aisle{font-size:12px;color:var(--light)}
.wtb-badge{margin-left:auto;background:var(--cream);border:1px solid var(--border);color:var(--primary);font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;white-space:nowrap}

/* CTA */
.recipe-cta{background:linear-gradient(135deg,var(--primary-dark),var(--primary));border-radius:24px;padding:36px;text-align:center;margin-top:36px}
.recipe-cta h3{font-family:'Fraunces',serif;font-size:26px;color:white;margin-bottom:10px}
.recipe-cta p{color:rgba(255,255,255,0.75);margin-bottom:24px}
.cta-btn{display:inline-flex;align-items:center;gap:10px;background:white;color:var(--primary);padding:14px 28px;border-radius:50px;font-weight:700;font-size:15px;text-decoration:none;transition:all .2s}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.2)}

/* NOT FOUND */
.not-found{text-align:center;padding:80px 5%}
.not-found h2{font-family:'Fraunces',serif;font-size:36px;color:var(--dark);margin-bottom:16px}
.not-found p{color:var(--mid);margin-bottom:24px}
.back-btn{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:white;padding:12px 28px;border-radius:50px;text-decoration:none;font-weight:600}

/* STANDARD FLOAT STACK */
.sfw-wa{position:fixed;bottom:24px;right:24px;z-index:9999;width:50px;height:50px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,0.4);text-decoration:none;transition:transform .2s}
.sfw-wa:hover{transform:scale(1.1)}
.sfw-tr{position:fixed;bottom:84px;right:24px;z-index:9999;background:rgba(20,20,30,0.92);border:1px solid rgba(0,135,90,0.35);border-radius:25px;padding:5px 10px;backdrop-filter:blur(10px)}
.sfw-bt{position:fixed;bottom:148px;right:24px;z-index:9999;width:44px;height:44px;border-radius:50%;background:rgba(0,135,90,0.85);border:none;color:#fff;cursor:pointer;font-size:20px;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s}
.sfw-bt.vis{opacity:1;transform:translateY(0)}
</style>
