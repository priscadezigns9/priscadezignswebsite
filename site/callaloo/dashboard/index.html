<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>Calalloo — Neural Kitchen Command</title>
    <link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap' rel='stylesheet'>
    <style>
        :root{--primary:#F97316;--dark:#0A0A0A;--surface:#141414;--border:rgba(255,255,255,0.05)}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--dark);color:white;font-family:'Plus Jakarta Sans',sans-serif;display:flex;height:100vh;overflow:hidden}
        .sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);padding:40px;display:flex;flex-direction:column}
        .main{flex:1;padding:60px;overflow-y:auto}
        .logo{font-size:1.5rem;font-weight:800;color:var(--primary);margin-bottom:50px}
        .nav-item{padding:14px 20px;border-radius:12px;color:rgba(255,255,255,0.4);text-decoration:none;font-weight:600;margin-bottom:8px;transition:0.3s;cursor:pointer}
        .nav-item:hover, .nav-item.active{background:rgba(249,115,22,0.1);color:var(--primary)}
        .grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(350px, 1fr));gap:30px}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:30px}
        .toast{position:fixed;bottom:30px;right:30px;background:var(--primary);color:white;padding:15px 25px;border-radius:12px;font-weight:700;box-shadow:0 10px 30px rgba(0,0,0,0.5);transform:translateY(100px);transition:0.5s;opacity:0;z-index:1000}
        .toast.show{transform:translateY(0);opacity:1}
    </style>
</head>
<body>
<div class='sidebar'>
    <div class='logo'>🥘 Calalloo</div>
    <a class='nav-item active'>📊 Neural Kitchen</a>
    <a class='nav-item' onclick='showToast("Syncing Heritage Recipe Nodes...")'>📜 Recipe Assets</a>
    <a class='nav-item' onclick='showToast("Optimizing Caribbean Inventory...")'>📦 Inventory</a>
    <a class='nav-item'>⚙️ Settings</a>
</div>
<div class='main'>
    <h1 style='font-size:3.5rem;font-weight:800;margin-bottom:10px'>Kitchen Intelligence</h1>
    <p style='color:rgba(255,255,255,0.3);margin-bottom:60px'>Heritage Node Status: SYNCED</p>
    <div class='grid'>
        <div class='card'><h3>Logistics Node</h3><p style='color:rgba(255,255,255,0.4)'>Real-time tracking of hyper-local Caribbean grocery inventory.</p></div>
        <div class='card'><h3>Recipe Neural Mapping</h3><p style='color:rgba(255,255,255,0.4)'>Preserving and scaling heritage culinary data for global export.</p></div>
    </div>
</div>
<div id='toast' class='toast'>Success</div>
<script>function showToast(msg){const t=document.getElementById('toast');t.innerText=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}</script>
</body>
</html>
