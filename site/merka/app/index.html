<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Merka POS — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080A;color:#F0EDF4;font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.bg-glow{position:fixed;top:-20%;right:-20%;width:600px;height:600px;background:radial-gradient(circle,#FF336614 0%,transparent 65%);pointer-events:none}
.bg-glow2{position:fixed;bottom:-20%;left:-10%;width:500px;height:500px;background:radial-gradient(circle,#FF336608 0%,transparent 65%);pointer-events:none}
.login-wrap{position:relative;z-index:1;width:100%;max-width:400px;padding:20px}
.brand{text-align:center;margin-bottom:34px}
.brand-logo{font-size:2rem;font-weight:700;color:#FF3366;letter-spacing:-1px}
.brand-tag{font-size:0.7rem;color:#F0EDF455;letter-spacing:3px;text-transform:uppercase;margin-top:3px;font-family:'Inter',sans-serif}
.card{background:#0F0F12;border:1px solid #FF336620;padding:36px;border-radius:8px;box-shadow:0 0 40px #FF336608}
.card-title{font-size:1.3rem;font-weight:700;margin-bottom:4px}
.card-sub{font-size:0.82rem;color:#F0EDF455;font-family:'Inter',sans-serif;margin-bottom:26px}
.demo-hint{background:#FF336610;border:1px solid #FF336628;padding:10px 14px;border-radius:4px;font-size:0.79rem;color:#FF3366;font-family:'Inter',sans-serif;margin-bottom:18px;text-align:center}
.field{margin-bottom:15px}
label{display:block;font-size:0.71rem;text-transform:uppercase;letter-spacing:2px;color:#FF3366;margin-bottom:6px;font-weight:600;font-family:'Inter',sans-serif}
input{width:100%;background:#08080A;border:1px solid #FF336622;color:#F0EDF4;padding:11px 14px;font-family:'Inter',sans-serif;font-size:0.9rem;border-radius:5px;outline:none;transition:border-color 0.2s}
input:focus{border-color:#FF3366}
input::placeholder{color:#F0EDF430}
.btn{width:100%;background:#FF3366;color:#fff;border:none;padding:13px;font-family:'Space Grotesk',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;border-radius:5px;transition:all 0.2s;margin-top:6px;letter-spacing:0.3px}
.btn:hover{background:#FF5C85;transform:translateY(-1px)}
.error{color:#FF6B6B;font-size:0.79rem;margin-top:5px;display:none}
.footer-link{text-align:center;margin-top:16px;font-size:0.78rem;color:#F0EDF444;font-family:'Inter',sans-serif}
.footer-link a{color:#FF3366}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">Merka</div>
    <div class="brand-tag">Retail & POS Platform</div>
  </div>
  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to your store dashboard</div>
    <div class="demo-hint">admin@merka.app / demo1234</div>
    <form id="loginForm">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@store.com" value="admin@merka.app"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" value="demo1234"/>
        <div class="error" id="err">Invalid credentials.</div>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
  <div class="footer-link">No account? <a href="#">Get Started</a></div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit',function(e){
  e.preventDefault();
  if(document.getElementById('email').value==='admin@merka.app'&&document.getElementById('password').value==='demo1234'){
    localStorage.setItem('merka_auth','true');
    window.location.href='dashboard/';
  } else {document.getElementById('err').style.display='block';}
});
</script>
</body>
</html>
