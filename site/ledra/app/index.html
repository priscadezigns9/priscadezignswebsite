<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ledra — Log In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060A08;color:#EBF5EE;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(#1A8C5B06 1px,transparent 1px),linear-gradient(90deg,#1A8C5B06 1px,transparent 1px);background-size:46px 46px;pointer-events:none}
.bg-glow{position:fixed;top:-150px;left:20%;width:500px;height:500px;background:radial-gradient(ellipse,#1A8C5B14 0%,transparent 70%);pointer-events:none}
.card{position:relative;width:100%;max-width:420px;background:#0D1A11;border:1px solid #1A8C5B22;padding:48px 40px;margin:20px}
.logo{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:700;color:#1A8C5B;margin-bottom:4px;letter-spacing:-1px}
.tagline{font-size:0.75rem;color:#EBF5EE44;text-transform:uppercase;letter-spacing:2.5px;margin-bottom:36px}
.form-label{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#EBF5EE66;margin-bottom:8px;display:block}
.form-input{width:100%;background:#060A08;border:1px solid #1A8C5B22;color:#EBF5EE;padding:13px 16px;font-family:'Inter',sans-serif;font-size:0.92rem;outline:none;transition:border-color 0.2s;margin-bottom:20px}
.form-input:focus{border-color:#1A8C5B55}
.form-input::placeholder{color:#EBF5EE33}
.btn-login{width:100%;background:#1A8C5B;color:#060A08;border:none;padding:14px;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s;margin-top:4px}
.btn-login:hover{opacity:0.88}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:#EBF5EE33;font-size:0.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#1A8C5B18}
.signup-link{text-align:center;font-size:0.83rem;color:#EBF5EE55}
.signup-link a{color:#1A8C5B;text-decoration:none;font-weight:600}
.signup-link a:hover{text-decoration:underline}
.demo-note{background:#1A8C5B11;border:1px solid #1A8C5B33;padding:12px 16px;font-size:0.78rem;color:#1A8C5B99;margin-top:20px;text-align:center}
.status-bar{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#1A8C5B,#0D5C38)}
@media(max-width:480px){.card{padding:36px 24px;margin:16px}}
</style>
</head>
<body>
<div class="status-bar"></div>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="card">
  <div class="logo">Ledra</div>
  <div class="tagline">Accounting Platform</div>
  <form onsubmit="handleLogin(event)">
    <label class="form-label">Email Address</label>
    <input class="form-input" type="email" placeholder="accountant@firm.com" value="admin@ledraaccounts.com"/>
    <label class="form-label">Password</label>
    <input class="form-input" type="password" placeholder="••••••••" value="demo1234"/>
    <button class="btn-login" type="submit">Sign In</button>
  </form>
  <div class="divider">or</div>
  <div class="signup-link">New to Ledra? <a href="#">Start Free Trial</a></div>
  <div class="demo-note">📊 Demo Mode — click Sign In to continue</div>
</div>
<script>
function handleLogin(e){
  e.preventDefault();
  localStorage.setItem('ledra_user', JSON.stringify({name:'Cheryl Ramchand', role:'Senior Accountant', firm:'Ledra Accounts TT'}));
  window.location.href='/ledra/app/dashboard/';
}
</script>
</body>
</html>
