*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080510;
  --card: #0F0A1C;
  --primary: #7B35D4;
  --primary-light: #B06AFF;
  --primary-dim: rgba(123,53,212,0.25);
  --text: #F0EEFF;
  --text-dim: #8B7AB0;
  --gold: #C8A84B;
  --border: rgba(123,53,212,0.3);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  line-height: 1.6;
}

h1,h2,h3,h4,h5 {
  font-family: 'Space Grotesk', sans-serif;
}

a { color: inherit; text-decoration: none; }

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 5%;
}


/* NAV */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,5,16,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 16px 5%;
}
.nav-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo {
  display: flex; align-items: center; gap: 12px;
}
.nav-logo img {
  height: 44px; width: 44px; object-fit: cover; border-radius: 50%; border: 2px solid rgba(123,53,212,0.5);
}
.nav-logo span {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700; font-size: 1.1rem;
  color: var(--text);
}
.nav-links {
  display: flex; gap: 24px;
}
.nav-links a {
  color: var(--text-dim);
  font-size: 0.9rem;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--primary-light); }

/* HERO */
.hero {
  padding: 60px 24px 60px;
  text-align: center;
  position: relative;
  overflow: hidden;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.hero::before {

  pointer-events: none;
}

  width: 280px; height: 280px;
}
