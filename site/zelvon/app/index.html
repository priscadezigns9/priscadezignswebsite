<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Zelvon — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600;700&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#040C12;color:#E2F4FF;font-family:'Barlow',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.bg-glow{position:fixed;top:-20%;right:-10%;width:700px;height:600px;background:radial-gradient(ellipse,#00B4D812 0%,transparent 65%);pointer-events:none}
.bg-glow2{position:fixed;bottom:-30%;left:-15%;width:600px;height:600px;background:radial-gradient(ellipse,#00B4D808 0%,transparent 65%);pointer-events:none}
.login-wrap{position:relative;z-index:1;width:100%;max-width:410px;padding:20px}
.brand{text-align:center;margin-bottom:32px}
.brand-logo{font-family:'Barlow Condensed',sans-serif;font-size:2.4rem;font-weight:800;color:#00B4D8;text-transform:uppercase;letter-spacing:-1px}
.brand-tag{font-size:0.68rem;color:#E2F4FF55;letter-spacing:3px;text-transform:uppercase;margin-top:2px}
.card{background:#070F18;border:1px solid #00B4D820;padding:38px;border-radius:4px;box-shadow:0 0 60px #00B4D808}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:4px}
.card-sub{font-size:0.82rem;color:#E2F4FF55;margin-bottom:26px;font-family:'Barlow',sans-serif}
.demo-hint{background:#00B4D810;border:1px solid #00B4D828;padding:10px 14px;border-radius:3px;font-size:0.79rem;color:#00B4D8;text-align:center;margin-bottom:18px}
.field{margin-bottom:15px}
label{display:block;font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:#00B4D8;margin-bottom:7px;font-weight:600;font-family:'Barlow',sans-serif}
input{width:100%;background:#040C12;border:1px solid #00B4D820;color:#E2F4FF;padding:11px 14px;font-family:'Barlow',sans-serif;font-size:0.9rem;border-radius:3px;outline:none;transition:border-color 0.2s}
input:focus{border-color:#00B4D8}
input::placeholder{color:#E2F4FF28}
.btn{width:100%;background:#00B4D8;color:#040C12;border:none;padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;border-radius:3px;transition:all 0.2s;margin-top:6px}
.btn:hover{background:#22D0F0;transform:translateY(-1px)}
.error{color:#FF6B6B;font-size:0.78rem;margin-top:5px;display:none}
.footer-link{text-align:center;margin-top:16px;font-size:0.78rem;color:#E2F4FF44}
.footer-link a{color:#00B4D8}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">Zelvon</div>
    <div class="brand-tag">Car Rental Management</div>
  </div>
  <div class="card">
    <div class="card-title">Sign In</div>
    <div class="card-sub">Access your fleet management dashboard</div>
    <div class="demo-hint">fleet@zelvon.io / demo1234</div>
    <form id="loginForm">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@rental.com" value="fleet@zelvon.io"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" value="demo1234"/>
        <div class="error" id="err">Invalid credentials.</div>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
  <div class="footer-link">Need an account? <a href="#">Contact Support</a></div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit',function(e){
  e.preventDefault();
  if(document.getElementById('email').value==='fleet@zelvon.io'&&document.getElementById('password').value==='demo1234'){
    localStorage.setItem('zelvon_auth','true');
    window.location.href='dashboard/';
  } else {document.getElementById('err').style.display='block';}
});
</script>
</body>
</html>
