<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Xavrin — Log In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#040B14;color:#E8F4FD;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(#00C2FF08 1px,transparent 1px),linear-gradient(90deg,#00C2FF08 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,#00C2FF18 0%,transparent 70%);pointer-events:none}
.card{position:relative;width:100%;max-width:420px;background:#0A1628;border:1px solid #00C2FF22;padding:48px 40px;margin:20px}
.logo{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:800;color:#00C2FF;letter-spacing:-0.5px;margin-bottom:8px}
.tagline{font-size:0.78rem;color:#E8F4FD44;text-transform:uppercase;letter-spacing:2px;margin-bottom:36px}
.form-label{font-size:0.73rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#E8F4FD66;margin-bottom:8px;display:block}
.form-input{width:100%;background:#040B14;border:1px solid #00C2FF22;color:#E8F4FD;padding:13px 16px;font-family:'Inter',sans-serif;font-size:0.92rem;outline:none;transition:border-color 0.2s;margin-bottom:20px}
.form-input:focus{border-color:#00C2FF55}
.form-input::placeholder{color:#E8F4FD33}
.btn-login{width:100%;background:#00C2FF;color:#040B14;border:none;padding:14px;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s;margin-top:4px}
.btn-login:hover{opacity:0.88}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:#E8F4FD33;font-size:0.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#00C2FF18}
.signup-link{text-align:center;font-size:0.83rem;color:#E8F4FD55}
.signup-link a{color:#00C2FF;text-decoration:none;font-weight:600}
.signup-link a:hover{text-decoration:underline}
.demo-note{background:#00C2FF11;border:1px solid #00C2FF33;padding:12px 16px;font-size:0.78rem;color:#00C2FF99;margin-top:20px;text-align:center}
.status-bar{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#00C2FF,#0066FF)}
@media(max-width:480px){.card{padding:36px 24px;margin:16px}}
</style>
</head>
<body>
<div class="status-bar"></div>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="card">
  <div class="logo">Xavrin</div>
  <div class="tagline">Security Management Platform</div>
  <form onsubmit="handleLogin(event)">
    <label class="form-label">Email Address</label>
    <input class="form-input" type="email" placeholder="admin@yourcompany.com" id="email" value="admin@xavrin.io"/>
    <label class="form-label">Password</label>
    <input class="form-input" type="password" placeholder="••••••••" id="password" value="demo1234"/>
    <button class="btn-login" type="submit">Access Dashboard</button>
  </form>
  <div class="divider">or</div>
  <div class="signup-link">New to Xavrin? <a href="#">Request a Demo</a></div>
  <div class="demo-note">🔐 Demo Mode — click Access Dashboard to continue</div>
</div>
<script>
function handleLogin(e){
  e.preventDefault();
  localStorage.setItem('xavrin_user', JSON.stringify({name:'Marcus St. Hill', role:'Security Manager', org:'Port of Spain HQ'}));
  window.location.href='/xavrin/app/dashboard/';
}
</script>
</body>
</html>
