<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunel — Hospitality Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080600;color:#fef6e4;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 50% 30%,rgba(201,169,110,0.08) 0%,transparent 60%);}
.login-wrap{width:100%;max-width:420px;padding:24px;}
.logo{text-align:center;margin-bottom:40px;}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#C9A96E,#a07840);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 32px rgba(201,169,110,0.3);}
.logo-icon svg{width:28px;height:28px;fill:white;}
.logo h1{font-size:32px;font-weight:500;color:#C9A96E;font-family:'Cormorant Garamond',serif;letter-spacing:2px;}
.logo p{font-size:13px;color:#6b5530;margin-top:4px;}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(201,169,110,0.2);border-radius:20px;padding:36px;}
.card h2{font-size:22px;font-weight:500;font-family:'Cormorant Garamond',serif;margin-bottom:8px;color:#fef6e4;letter-spacing:0.5px;}
.card .sub{font-size:13px;color:#6b5530;margin-bottom:28px;}
.field{margin-bottom:20px;}
.field label{display:block;font-size:11px;font-weight:600;color:#C9A96E;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
.field input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(201,169,110,0.2);border-radius:10px;padding:13px 16px;font-family:'Inter',sans-serif;font-size:14px;color:#fef6e4;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:#C9A96E;}
.field input::placeholder{color:#4a3520;}
.btn{width:100%;background:linear-gradient(135deg,#C9A96E,#a07840);color:#080600;border:none;border-radius:10px;padding:14px;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:1px;transition:opacity 0.2s;margin-top:8px;}
.btn:hover{opacity:0.9;}
.hint{text-align:center;margin-top:20px;font-size:12px;color:#4a3520;}
.hint span{color:#C9A96E;cursor:pointer;}
.demo-note{background:rgba(201,169,110,0.08);border:1px solid rgba(201,169,110,0.2);border-radius:10px;padding:12px 16px;margin-top:24px;font-size:12px;color:#a07840;text-align:center;}
.divider{text-align:center;color:#4a3520;font-size:11px;margin:16px 0;display:flex;align-items:center;gap:10px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(201,169,110,0.1);}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M7 13c1.66 0 3-1.34 3-3S8.66 7 7 7s-3 1.34-3 3 1.34 3 3 3zm12-6h-8v7H3V5H1v15h2v-3h18v3h2v-9c0-2.21-1.79-4-4-4z"/></svg>
    </div>
    <h1>LUNEL</h1>
    <p>Hospitality Management Platform</p>
  </div>
  <div class="card">
    <h2>Staff Sign In</h2>
    <p class="sub">Access your property dashboard</p>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="manager@lunel.app" value="manager@lunel.app">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pass" placeholder="••••••••" value="demo1234">
    </div>
    <button class="btn" onclick="doLogin()">Enter Dashboard</button>
    <div class="divider">OR</div>
    <p class="hint">Forgot password? <span>Reset via email</span></p>
    <div class="demo-note">🏨 Demo credentials pre-filled — click Enter Dashboard</div>
  </div>
</div>
<script>
function doLogin(){
  const email=document.getElementById('email').value;
  const pass=document.getElementById('pass').value;
  if(email&&pass){
    localStorage.setItem('lunel_auth','true');
    localStorage.setItem('lunel_user',email);
    window.location.href='dashboard/';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
