<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorel — Call Centre Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050C0A;color:#e0f2f1;font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 30% 50%,rgba(0,212,170,0.07) 0%,transparent 60%);}
.login-wrap{width:100%;max-width:420px;padding:24px;}
.logo{text-align:center;margin-bottom:40px;}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#00D4AA,#00a88a);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 32px rgba(0,212,170,0.3);}
.logo-icon svg{width:30px;height:30px;fill:white;}
.logo h1{font-size:28px;font-weight:700;color:#00D4AA;}
.logo p{font-size:13px;color:#3d7a72;margin-top:4px;font-family:'Inter',sans-serif;}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(0,212,170,0.15);border-radius:20px;padding:36px;}
.card h2{font-size:20px;font-weight:700;margin-bottom:8px;}
.card .sub{font-size:13px;color:#3d7a72;margin-bottom:28px;font-family:'Inter',sans-serif;}
.field{margin-bottom:20px;}
.field label{display:block;font-size:11px;font-weight:600;color:#00D4AA;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
.field input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(0,212,170,0.2);border-radius:10px;padding:13px 16px;font-family:'Inter',sans-serif;font-size:14px;color:#e0f2f1;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:#00D4AA;}
.field input::placeholder{color:#2d5a54;}
.btn{width:100%;background:linear-gradient(135deg,#00D4AA,#00a88a);color:#050C0A;border:none;border-radius:10px;padding:14px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.2s;margin-top:8px;}
.btn:hover{opacity:0.9;}
.hint{text-align:center;margin-top:20px;font-size:12px;color:#2d5a54;font-family:'Inter',sans-serif;}
.hint span{color:#00D4AA;cursor:pointer;}
.demo-note{background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.2);border-radius:10px;padding:12px 16px;margin-top:24px;font-size:12px;color:#00a88a;text-align:center;font-family:'Inter',sans-serif;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
    </div>
    <h1>Vorel</h1>
    <p>Call Centre Management Platform</p>
  </div>
  <div class="card">
    <h2>Agent Sign In</h2>
    <p class="sub">Access your call centre dashboard</p>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="supervisor@vorel.app" value="supervisor@vorel.app">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pass" placeholder="••••••••" value="demo1234">
    </div>
    <button class="btn" onclick="doLogin()">Sign In to Dashboard</button>
    <p class="hint">Need access? <span>Contact your admin</span></p>
    <div class="demo-note">📞 Demo credentials are pre-filled — just click Sign In</div>
  </div>
</div>
<script>
function doLogin(){
  const email=document.getElementById('email').value;
  const pass=document.getElementById('pass').value;
  if(email&&pass){
    localStorage.setItem('vorel_auth','true');
    localStorage.setItem('vorel_user',email);
    window.location.href='dashboard/';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
