<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0F; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; }
.wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.label { font-family: sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #4B5563; }
</style>
</head>
<body>
<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="440" height="440">
  <rect width="500" height="500" fill="#0A0A0F" rx="60"/>

  <!--
    R — unmistakably an R:
    - Tall straight stem on the LEFT
    - Bowl only on the TOP RIGHT (not full height — only upper half)
    - Strong diagonal leg kicking out bottom RIGHT
    - Open bottom — you can see through the bottom left (not closed like B)
    
    The R outline as a single open path (not closed):
    Start: bottom of stem
    Up the stem → bowl top → bowl arc right → bowl bottom → junction
    → leg kicks diagonally down-right → end
    
    Then mirror that as concentric offsets outward.
    
    Key: the BOTTOM is OPEN — stem ends, leg goes elsewhere. 
    No closed loop at bottom = clearly NOT a B.
  -->

  <!--
    R skeleton (single open stroke path):
    Stem: (210, 420) up to (210, 130)
    Bowl: from (210,130) right arc → peak (310, 210) → back (210, 285)
    Leg: from (245, 285) diagonal → (330, 420)
    
    All rings = this same path, scaled outward from the R's centroid
    using transform="scale()" with appropriate offsets
  -->

  <!-- 
    I'll define the R as a <path> and repeat it scaled up 6 times.
    Each scale adds ~18px of visual offset around the letter.
    Centered at (250, 275).
  -->

  <defs>
    <!-- R path centered at origin, then translated -->
    <!-- Stem from (0, 145) to (0,-145), bowl arcs right to (90, -55) back to (0,15), leg to (105,145) -->
  </defs>

  <!-- Draw 6 concentric R outlines, each slightly larger -->
  <!-- Using translate to center, scale to grow, translate back -->

  <!-- Ring 6 — outermost, most spread -->
  <g transform="translate(250,275)">
    <path d="
      M -130 170
      L -130 -175
      C -130 -185 -120 -190 -108 -190
      C -50 -190 60 -160 60 -85
      C 60 -18 -30 10 -100 15
      L -130 15
      M -85 15
      C -50 20 10 55 35 100
      L 105 185
    "
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.24"
    stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Ring 5 -->
  <g transform="translate(250,275)">
    <path d="
      M -112 152
      L -112 -157
      C -112 -165 -104 -170 -94 -170
      C -42 -170 58 -143 58 -74
      C 58 -12 -24 12 -88 16
      L -112 16
      M -72 16
      C -42 21 12 52 34 93
      L 98 165
    "
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.36"
    stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Ring 4 -->
  <g transform="translate(250,275)">
    <path d="
      M -94 134
      L -94 -139
      C -94 -145 -88 -150 -80 -150
      C -34 -150 56 -126 56 -63
      C 56 -6 -18 14 -76 17
      L -94 17
      M -59 17
      C -34 22 14 49 33 86
      L 91 145
    "
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.50"
    stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Ring 3 -->
  <g transform="translate(250,275)">
    <path d="
      M -76 116
      L -76 -121
      C -76 -125 -72 -130 -66 -130
      C -26 -130 54 -109 54 -52
      C 54 0 -12 16 -64 18
      L -76 18
      M -46 18
      C -26 23 16 46 32 79
      L 84 125
    "
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.64"
    stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Ring 2 -->
  <g transform="translate(250,275)">
    <path d="
      M -58 98
      L -58 -103
      C -58 -105 -56 -110 -52 -110
      C -18 -110 52 -92 52 -41
      C 52 6 -6 18 -52 19
      L -58 19
      M -33 19
      C -18 24 18 43 31 72
      L 77 105
    "
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.78"
    stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Ring 1 — just outside the core R -->
  <g transform="translate(250,275)">
    <path d="
      M -40 80
      L -40 -85
      C -40 -87 -38 -90 -34 -90
      C -10 -90 48 -74 48 -30
      C 48 12 0 20 -40 20
      L -40 20
      M -20 20
      C -10 25 20 40 30 65
      L 70 85
    "
    fill="none" stroke="white" stroke-width="2" stroke-opacity="0.90"
    stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- CORE R — double line (thick + cutout) -->
  <g transform="translate(250,275)">
    <!-- Thick white -->
    <path d="
      M -22 62
      L -22 -67
      C -22 -69 -20 -72 -16 -72
      C 2 -72 44 -58 44 -20
      C 44 18 6 22 -22 22
      L -22 22
      M -6 22
      C 2 26 22 37 29 58
      L 62 68
    "
    fill="none" stroke="white" stroke-width="10" stroke-opacity="0.95"
    stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Dark cutout -->
    <path d="
      M -22 62
      L -22 -67
      C -22 -69 -20 -72 -16 -72
      C 2 -72 44 -58 44 -20
      C 44 18 6 22 -22 22
      L -22 22
      M -6 22
      C 2 26 22 37 29 58
      L 62 68
    "
    fill="none" stroke="#0A0A0F" stroke-width="5"
    stroke-linecap="round" stroke-linejoin="round"/>
  </g>

</svg>
<div class="label">Riddim</div>
</div>
</body>
</html>
