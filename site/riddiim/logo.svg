<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0A0A0F"/>
  
  <!-- 
    The R is built from a single continuous flowing ribbon stroke.
    The vertical stem flows down, the bowl curves out and back,
    and the leg doesn't cut straight — it flows outward like a wave tail,
    curving away like sound dissipating into the air.
  -->
  
  <!-- Outer glow ring — subtle -->
  <circle cx="200" cy="200" r="155" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <circle cx="200" cy="200" r="168" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- THE R — single flowing path, white, rounded stroke ends -->
  <path
    d="
      M 148 280
      L 148 148
      C 148 140 154 132 162 130
      L 210 128
      C 238 128 256 144 256 168
      C 256 192 238 208 214 210
      L 200 212

      M 196 210
      C 210 212 222 218 232 228
      L 268 278
      C 272 284 270 292 264 294
      C 258 296 252 292 249 287
      L 216 238
      C 208 226 196 220 182 218
    "
    fill="none"
    stroke="white"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- The flowing leg tail — curves out like a wave -->
  <path
    d="
      M 148 278
      C 148 278 152 290 162 292
      C 172 294 178 286 178 278
    "
    fill="none"
    stroke="white"
    stroke-width="22"
    stroke-linecap="round"
  />

</svg>
