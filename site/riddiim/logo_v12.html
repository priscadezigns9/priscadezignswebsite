<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0F; display: flex; align-items: center; justify-content: center; min-height: 100vh; gap: 60px; flex-wrap: wrap; padding: 60px; }
.wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.label { font-family: sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #4B5563; }
</style>
</head>
<body>

<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="420" height="420">
  <rect width="500" height="500" fill="#0A0A0F" rx="72"/>

  <!--
    WATER DROPLET RIPPLE EFFECT
    
    Real water ripples are NOT perfect circles:
    - Slightly elliptical (wider than tall)
    - Each ring has a tiny cx/cy offset — outer rings drift slightly
      upward as ripples travel outward (like real water physics)
    - Outer rings are more stretched (bigger rx vs ry ratio)
    - Inner rings closer to circular (the drop point)
    - Very subtle — still reads as a vinyl, but feels organic/alive
    
    Drop point (center): (250, 255) — slightly below center
    so the ripple feels like it's spreading down and out.
    
    Each ring: rx slightly > ry, cx drifts slightly left/up as r grows
  -->

  <defs>
    <clipPath id="cl1">
      <!-- Clip to outermost ripple shape -->
      <ellipse cx="248" cy="252" rx="234" ry="228"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cl1)" fill="none" stroke-linecap="round">

    <!-- 
      12 ripple rings
      Inner (small r): near-circle, centered at drop point (250,255)
      Outer (large r): more oval, center drifts slightly up-left
      
      Each ring: (cx, cy, rx, ry, opacity)
      cx drifts: -0.5px per ring outward
      cy drifts: -1px per ring outward (ripple goes up slightly)
      rx grows faster than ry (spreads wider)
    -->

    <!-- Ring 12 — outermost -->
    <ellipse cx="244" cy="244" rx="231" ry="224" stroke="white" stroke-width="2.0" stroke-opacity="0.22"/>
    <!-- Ring 11 -->
    <ellipse cx="245" cy="245" rx="215" ry="209" stroke="white" stroke-width="2.0" stroke-opacity="0.28"/>
    <!-- Ring 10 -->
    <ellipse cx="246" cy="246" rx="199" ry="194" stroke="white" stroke-width="2.0" stroke-opacity="0.34"/>
    <!-- Ring 9 -->
    <ellipse cx="246" cy="247" rx="183" ry="179" stroke="white" stroke-width="2.0" stroke-opacity="0.40"/>
    <!-- Ring 8 -->
    <ellipse cx="247" cy="248" rx="167" ry="164" stroke="white" stroke-width="2.0" stroke-opacity="0.46"/>
    <!-- Ring 7 -->
    <ellipse cx="247" cy="249" rx="151" ry="149" stroke="white" stroke-width="2.0" stroke-opacity="0.52"/>
    <!-- Ring 6 -->
    <ellipse cx="248" cy="249" rx="135" ry="134" stroke="white" stroke-width="2.0" stroke-opacity="0.58"/>
    <!-- Ring 5 -->
    <ellipse cx="248" cy="250" rx="119" ry="118" stroke="white" stroke-width="2.0" stroke-opacity="0.64"/>
    <!-- Ring 4 -->
    <ellipse cx="249" cy="251" rx="103" ry="103" stroke="white" stroke-width="2.0" stroke-opacity="0.70"/>
    <!-- Ring 3 -->
    <ellipse cx="249" cy="252" rx="87"  ry="87"  stroke="white" stroke-width="2.0" stroke-opacity="0.76"/>
    <!-- Ring 2 -->
    <ellipse cx="250" cy="253" rx="71"  ry="71"  stroke="white" stroke-width="2.0" stroke-opacity="0.83"/>
    <!-- Ring 1 — innermost, near-perfect circle at drop point -->
    <ellipse cx="250" cy="254" rx="57"  ry="57"  stroke="white" stroke-width="2.0" stroke-opacity="0.90"/>

    <!-- Clear center zone — the drop point -->
    <ellipse cx="250" cy="254" rx="46" ry="46" fill="#0A0A0F" stroke="none"/>

  </g>

  <!--
    THE R — centered at the drop point (250, 254)
    Same weight as groove lines (2px rails via thick+cutout)
    Floats in the clear center zone
  -->

  <!-- Thick white -->
  <path d="
    M 232 207
    L 232 301
    M 232 207
    C 232 204 236 202 243 202
    C 265 202 286 213 286 237
    C 286 261 265 272 243 272
    L 232 272
    M 246 272
    C 257 274 268 282 275 295
    L 287 312
  "
  fill="none"
  stroke="white"
  stroke-width="10"
  stroke-opacity="0.92"
  stroke-linecap="round"
  stroke-linejoin="round"
  />

  <!-- Dark cutout -->
  <path d="
    M 232 207
    L 232 301
    M 232 207
    C 232 204 236 202 243 202
    C 265 202 286 213 286 237
    C 286 261 265 272 243 272
    L 232 272
    M 246 272
    C 257 274 268 282 275 295
    L 287 312
  "
  fill="none"
  stroke="#0A0A0F"
  stroke-width="6"
  stroke-linecap="round"
  stroke-linejoin="round"
  />

  <!-- Drop point dot — tiny, like the droplet itself -->
  <circle cx="250" cy="254" r="3.5" fill="rgba(255,255,255,0.5)"/>

</svg>
<div class="label">Riddim — water ripple</div>
</div>

<!-- FULL LOGO -->

    <ellipse cx="95" cy="95" rx="92" ry="90"  stroke="white" stroke-width="1.6" stroke-opacity="0.22"/>

    <ellipse cx="97" cy="97" rx="66" ry="65"  stroke="white" stroke-width="1.6" stroke-opacity="0.46"/>
    <ellipse cx="97" cy="97" rx="53" ry="52"  stroke="white" stroke-width="1.6" stroke-opacity="0.58"/>
    <ellipse cx="98" cy="98" rx="40" ry="40"  stroke="white" stroke-width="1.6" stroke-opacity="0.72"/>

  <!-- R mini -->
  <path d="M 89 79 L 89 120 M 89 79 C 89 78 91 77 94 77 C 104 77 113 81 113 92 C 113 103 104 107 94 107 L 89 107 M 95 107 C 100 108 105 112 108 118 L 113 126"
  fill="none" stroke="white" stroke-width="4.2" stroke-opacity="0.92" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 89 79 L 89 120 M 89 79 C 89 78 91 77 94 77 C 104 77 113 81 113 92 C 113 103 104 107 94 107 L 89 107 M 95 107 C 100 108 105 112 108 118 L 113 126"

  <circle cx="99" cy="99" r="2" fill="rgba(255,255,255,0.45)"/>

  <text x="220" y="114" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="68" fill="white" letter-spacing="-3">RIDDIM</text>
  <text x="222" y="142" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="11" fill="#4B5563" letter-spacing="5.5">HEAR IT. FIND IT. CREATE IT.</text>

</svg>
<div class="label">Full logo</div>
</div>

</body>
</html>
