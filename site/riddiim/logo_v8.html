<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0F; display: flex; align-items: center; justify-content: center; min-height: 100vh; gap: 60px; flex-wrap: wrap; padding: 60px; }
.wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.label { font-family: sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #4B5563; }
</style>
</head>
<body>

<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="420" height="420">
  <rect width="500" height="500" fill="#0A0A0F" rx="72"/>

  <defs>
    <clipPath id="cl1"><circle cx="250" cy="250" r="236"/></clipPath>
  </defs>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#cl1)">

    <!-- 13 outer rings — pure circles, getting brighter inward -->
    <circle cx="250" cy="250" r="233" stroke="white" stroke-width="2.0" stroke-opacity="0.22"/>
    <circle cx="250" cy="250" r="218" stroke="white" stroke-width="2.1" stroke-opacity="0.28"/>
    <circle cx="250" cy="250" r="203" stroke="white" stroke-width="2.2" stroke-opacity="0.34"/>
    <circle cx="250" cy="250" r="188" stroke="white" stroke-width="2.3" stroke-opacity="0.40"/>
    <circle cx="250" cy="250" r="173" stroke="white" stroke-width="2.4" stroke-opacity="0.46"/>
    <circle cx="250" cy="250" r="158" stroke="white" stroke-width="2.5" stroke-opacity="0.52"/>
    <circle cx="250" cy="250" r="143" stroke="white" stroke-width="2.6" stroke-opacity="0.58"/>
    <circle cx="250" cy="250" r="128" stroke="white" stroke-width="2.7" stroke-opacity="0.64"/>
    <circle cx="250" cy="250" r="113" stroke="white" stroke-width="2.8" stroke-opacity="0.70"/>
    <circle cx="250" cy="250" r="98"  stroke="white" stroke-width="2.9" stroke-opacity="0.76"/>
    <circle cx="250" cy="250" r="83"  stroke="white" stroke-width="3.0" stroke-opacity="0.82"/>
    <circle cx="250" cy="250" r="68"  stroke="white" stroke-width="3.1" stroke-opacity="0.88"/>

    <!--
      THE R — drawn as a DOUBLE LINE (two parallel strokes, like a groove channel)
      Outer R path + Inner R path — 8px apart, same shape, offset inward
      No connection at ends — just two clean parallel lines tracing the R
      
      This makes the R look like it IS a groove — because grooves have two sides.
      
      R center: (250, 250)
      Outer path offset: +5px outward from R skeleton
      Inner path offset: -5px inward from R skeleton
      
      R skeleton:
      Stem: x=250, y=210 → y=292
      Bowl: arc from (250,210) right to peak (286,244) back to (250,274)
      Leg: from (262,274) diagonal to (288,292)
    -->

    <!-- OUTER R stroke (slightly larger) -->
    <path d="
      M 238 210
      L 238 294
      M 238 210
      C 238 207 243 205 250 205
      C 272 205 292 216 292 240
      C 292 264 272 274 250 274
      L 238 274
      M 252 274
      C 262 276 272 283 278 294
      L 290 310
    "
    stroke="white"
    stroke-width="2.8"
    stroke-opacity="0.95"
    fill="none"
    />

    <!-- INNER R stroke (slightly smaller — parallel to outer) -->
    <path d="
      M 248 218
      L 248 292
      M 248 218
      C 248 216 252 214 257 214
      C 275 214 290 224 290 244
      C 290 262 275 270 257 270
      L 248 270
      M 258 271
      C 266 273 274 280 280 290
      L 290 306
    "
    stroke="white"
    stroke-width="2.8"
    stroke-opacity="0.95"
    fill="none"
    />

  </g>

  <!-- Center hole -->
  <circle cx="250" cy="250" r="13" fill="#0A0A0F" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <circle cx="250" cy="250" r="4"  fill="rgba(255,255,255,0.45)"/>

</svg>
<div class="label">Riddim — double groove R</div>
</div>

<!-- FULL LOGO WITH WORDMARK -->
<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" width="650" height="171">
  <rect width="760" height="200" fill="#0A0A0F"/>

  <defs>
    <clipPath id="cl2"><circle cx="100" cy="100" r="94"/></clipPath>
  </defs>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#cl2)">
    <circle cx="100" cy="100" r="93"  stroke="white" stroke-width="1.6" stroke-opacity="0.22"/>
    <circle cx="100" cy="100" r="80"  stroke="white" stroke-width="1.7" stroke-opacity="0.32"/>
    <circle cx="100" cy="100" r="67"  stroke="white" stroke-width="1.8" stroke-opacity="0.44"/>
    <circle cx="100" cy="100" r="54"  stroke="white" stroke-width="1.9" stroke-opacity="0.56"/>
    <circle cx="100" cy="100" r="41"  stroke="white" stroke-width="2.0" stroke-opacity="0.68"/>
    <circle cx="100" cy="100" r="28"  stroke="white" stroke-width="2.1" stroke-opacity="0.80"/>

    <!-- Double R scaled for mini -->
    <!-- Outer R -->
    <path d="M 93 84 L 93 118 M 93 84 C 93 82 96 81 99 81 C 109 81 117 86 117 96 C 117 106 109 110 99 110 L 93 110 M 100 110 C 105 111 109 115 112 120 L 117 128"
    stroke="white" stroke-width="1.8" stroke-opacity="0.95" fill="none"/>
    <!-- Inner R -->
    <path d="M 99 89 L 99 116 M 99 89 C 99 88 101 87 103 87 C 111 87 118 91 118 99 C 118 107 111 110 103 110 L 99 110 M 104 110 C 108 111 112 115 114 120 L 118 126"
    stroke="white" stroke-width="1.8" stroke-opacity="0.95" fill="none"/>
  </g>

  <circle cx="100" cy="100" r="5" fill="#0A0A0F" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="100" cy="100" r="2" fill="rgba(255,255,255,0.4)"/>

  <text x="220" y="114" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="68" fill="white" letter-spacing="-3">RIDDIM</text>
  <text x="222" y="142" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="11" fill="#4B5563" letter-spacing="5.5">HEAR IT. FIND IT. CREATE IT.</text>

</svg>
<div class="label">Full logo</div>
</div>

</body>
</html>
