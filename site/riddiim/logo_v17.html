<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0F; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; }
.wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.label { font-family: sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #4B5563; }
</style>
</head>
<body>
<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="440" height="440">
  <rect width="500" height="500" fill="#0A0A0F" rx="60"/>

  <!--
    NEW CONCEPT:
    Outer rings = smooth organic blobs (no R shape at all)
    Middle rings = blob starts to hint at the R — one side flattens, a bump appears
    Inner rings = clearly an R
    Innermost = tight crisp R with double line
    
    This way it reads as ONE shape with the R emerging from the center.
    Not R on top of R on top of R.
    
    All rings centered at (250, 255).
  -->

  <!-- Ring 6 — outermost, pure smooth blob -->
  <path d="
    M 250 42
    C 360 42 446 128 446 238
    C 446 340 372 432 268 450
    C 160 468 58 390 46 282
    C 34 170 110 64 220 46
    C 230 44 240 42 250 42 Z
  " fill="none" stroke="white" stroke-width="2" stroke-opacity="0.22"/>

  <!-- Ring 5 — still blobby, very slight hint of flatness on left -->
  <path d="
    M 250 66
    C 350 64 428 144 428 240
    C 428 330 360 414 262 430
    C 166 446 74 374 64 276
    C 54 176 122 82 222 68
    C 232 66 241 66 250 66 Z
  " fill="none" stroke="white" stroke-width="2" stroke-opacity="0.34"/>

  <!-- Ring 4 — blob starts morphing, left side flattens slightly -->
  <path d="
    M 248 94
    C 156 94 116 110 104 170
    C 96 216 96 236 96 256
    C 96 340 152 406 236 418
    C 316 430 402 376 412 294
    C 420 228 390 160 334 122
    C 306 104 278 94 248 94 Z
  " fill="none" stroke="white" stroke-width="2" stroke-opacity="0.46"/>

  <!-- Ring 3 — shape starts suggesting R: left straighter, top right bumps out -->
  <path d="
    M 200 122
    L 200 388
    C 200 400 212 408 226 408
    L 252 408
    C 310 408 374 378 392 320
    C 404 280 396 240 372 214
    C 396 192 408 160 402 128
    C 394 96 360 86 316 86
    C 280 86 248 94 226 100
    C 212 104 200 112 200 122 Z
  " fill="none" stroke="white" stroke-width="2" stroke-opacity="0.58"/>

  <!-- Ring 2 — clearly R-ish, bowl visible, leg hinting -->
  <path d="
    M 210 142
    L 210 372
    C 210 382 220 388 232 388
    L 254 388
    C 304 388 358 362 374 308
    C 384 272 376 236 354 212
    C 374 192 384 162 378 134
    C 370 106 340 98 300 98
    C 268 98 240 106 222 112
    C 214 116 210 130 210 142 Z
    M 248 280 C 272 282 298 298 312 328 L 340 378
  " fill="none" stroke="white" stroke-width="2" stroke-opacity="0.72"/>

  <!-- Ring 1 — unmistakably R, leg clearly kicks out -->
  <path d="
    M 220 162
    L 220 356
    C 220 364 228 368 238 368
    L 256 368
    C 298 368 342 346 356 298
    C 364 266 356 232 336 210
    C 354 192 362 164 356 140
    C 348 116 322 108 288 108
    C 258 108 234 116 224 122
    C 220 126 220 144 220 162 Z
    M 246 264 C 264 268 284 282 296 308 L 322 360
  " fill="none" stroke="white" stroke-width="2" stroke-opacity="0.86"/>

  <!-- CORE R — double line, crisp, centered -->
  <path d="
    M 228 182
    L 228 340
    M 228 182
    C 228 178 232 175 238 175
    C 262 175 290 187 290 218
    C 290 248 264 260 238 260
    L 228 260
    M 244 261
    C 258 264 272 276 280 296
    L 298 335
  "
  fill="none" stroke="white" stroke-width="11" stroke-opacity="0.95"
  stroke-linecap="round" stroke-linejoin="round"/>

  <path d="
    M 228 182
    L 228 340
    M 228 182
    C 228 178 232 175 238 175
    C 262 175 290 187 290 218
    C 290 248 264 260 238 260
    L 228 260
    M 244 261
    C 258 264 272 276 280 296
    L 298 335
  "
  fill="none" stroke="#0A0A0F" stroke-width="6"
  stroke-linecap="round" stroke-linejoin="round"/>

</svg>
<div class="label">Riddim</div>
</div>
</body>
</html>
