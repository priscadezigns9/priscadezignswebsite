<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0F; display: flex; align-items: center; justify-content: center; min-height: 100vh; gap: 60px; flex-wrap: wrap; padding: 60px; }
.wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.label { font-family: sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #4B5563; }
</style>
</head>
<body>

<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="420" height="420">
  <rect width="500" height="500" fill="#0A0A0F" rx="72"/>

  <defs>
    <clipPath id="cl1"><circle cx="250" cy="250" r="236"/></clipPath>
  </defs>

  <g clip-path="url(#cl1)">

    <!-- Groove rings — same weight, getting brighter inward -->
    <circle cx="250" cy="250" r="233" fill="none" stroke="white" stroke-width="2.0" stroke-opacity="0.22"/>
    <circle cx="250" cy="250" r="218" fill="none" stroke="white" stroke-width="2.0" stroke-opacity="0.28"/>
    <circle cx="250" cy="250" r="203" fill="none" stroke="white" stroke-width="2.0" stroke-opacity="0.34"/>
    <circle cx="250" cy="250" r="188" fill="none" stroke="white" stroke-width="2.0" stroke-opacity="0.40"/>
    <circle cx="250" cy="250" r="173" fill="none" stroke="white" stroke-width="2.0" stroke-opacity="0.46"/>
    <circle cx="250" cy="250" r="158" fill="none" stroke="white" stroke-width="2.0" stroke-opacity="0.52"/>
    <circle cx="250" cy="250" r="143" fill="none" stroke="white" stroke-width="2.0" stroke-opacity="0.58"/>
    <circle cx="250" cy="250" r="128" fill="none" stroke="white" stroke-width="2.0" stroke-opacity="0.64"/>
    <circle cx="250" cy="250" r="113" fill="none" stroke="white" stroke-width="2.0" stroke-opacity="0.70"/>
    <circle cx="250" cy="250" r="98"  fill="none" stroke="white" stroke-width="2.0" stroke-opacity="0.76"/>
    <circle cx="250" cy="250" r="83"  fill="none" stroke="white" stroke-width="2.0" stroke-opacity="0.82"/>
    <circle cx="250" cy="250" r="68"  fill="none" stroke="white" stroke-width="2.0" stroke-opacity="0.88"/>

    <!-- Clear center zone -->
    <circle cx="250" cy="250" r="57" fill="#0A0A0F" stroke="none"/>

  </g>

  <!--
    THE R — same 2px stroke weight as the rings, same opacity as innermost rings (~0.90)
    Double line = thick white (10px) + dark cutout (6px) = 2px rails each side, 6px gap
    This matches the visual weight of the groove lines perfectly.
    Centered at (250, 250), floating in clear zone.
  -->

  <!-- Thick white -->
  <path d="
    M 218 197
    L 218 303
    M 218 197
    C 218 195 222 193 228 193
    C 253 193 284 204 284 230
    C 284 256 253 267 228 267
    L 218 267
    M 234 267
    C 247 269 260 278 268 292
    L 282 308
  "
  fill="none"
  stroke="white"
  stroke-width="10"
  stroke-opacity="0.92"
  stroke-linecap="round"
  stroke-linejoin="round"
  />

  <!-- Dark cutout -->
  <path d="
    M 218 197
    L 218 303
    M 218 197
    C 218 195 222 193 228 193
    C 253 193 284 204 284 230
    C 284 256 253 267 228 267
    L 218 267
    M 234 267
    C 247 269 260 278 268 292
    L 282 308
  "
  fill="none"
  stroke="#0A0A0F"
  stroke-width="6"
  stroke-linecap="round"
  stroke-linejoin="round"
  />

  <!-- Center dot -->
  <circle cx="250" cy="250" r="4" fill="rgba(255,255,255,0.4)"/>

</svg>
<div class="label">Riddim — icon</div>
</div>

<!-- FULL LOGO -->
<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" width="650" height="171">
  <rect width="760" height="200" fill="#0A0A0F"/>

  <defs>
    <clipPath id="cl2"><circle cx="100" cy="100" r="94"/></clipPath>
  </defs>

  <g clip-path="url(#cl2)">
    <circle cx="100" cy="100" r="93"  fill="none" stroke="white" stroke-width="1.6" stroke-opacity="0.22"/>
    <circle cx="100" cy="100" r="80"  fill="none" stroke="white" stroke-width="1.6" stroke-opacity="0.32"/>
    <circle cx="100" cy="100" r="67"  fill="none" stroke="white" stroke-width="1.6" stroke-opacity="0.44"/>
    <circle cx="100" cy="100" r="54"  fill="none" stroke="white" stroke-width="1.6" stroke-opacity="0.56"/>
    <circle cx="100" cy="100" r="41"  fill="none" stroke="white" stroke-width="1.6" stroke-opacity="0.68"/>
    <circle cx="100" cy="100" r="28"  fill="none" stroke="white" stroke-width="1.6" stroke-opacity="0.82"/>
    <circle cx="100" cy="100" r="21"  fill="#0A0A0F" stroke="none"/>
  </g>

  <!-- R mini -->
  <path d="M 89 80 L 89 121 M 89 80 C 89 79 91 78 93 78 C 103 78 114 82 114 93 C 114 104 103 108 93 108 L 89 108 M 95 108 C 100 109 105 113 108 119 L 114 127"
  fill="none" stroke="white" stroke-width="4.2" stroke-opacity="0.92" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 89 80 L 89 121 M 89 80 C 89 79 91 78 93 78 C 103 78 114 82 114 93 C 114 104 103 108 93 108 L 89 108 M 95 108 C 100 109 105 113 108 119 L 114 127"
  fill="none" stroke="#0A0A0F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="100" cy="100" r="2" fill="rgba(255,255,255,0.4)"/>

  <text x="220" y="114" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="68" fill="white" letter-spacing="-3">RIDDIM</text>
  <text x="222" y="142" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="11" fill="#4B5563" letter-spacing="5.5">HEAR IT. FIND IT. CREATE IT.</text>

</svg>
<div class="label">Full logo</div>
</div>

</body>
</html>
