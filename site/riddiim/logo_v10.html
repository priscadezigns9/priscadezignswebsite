<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0F; display: flex; align-items: center; justify-content: center; min-height: 100vh; gap: 60px; flex-wrap: wrap; padding: 60px; }
.wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.label { font-family: sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #4B5563; }
</style>
</head>
<body>

<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="420" height="420">
  <rect width="500" height="500" fill="#0A0A0F" rx="72"/>

  <defs>
    <clipPath id="cl1"><circle cx="250" cy="250" r="236"/></clipPath>
  </defs>

  <!--
    LAYOUT:
    - Record center: (250, 250)
    - Grooves: r=68 (innermost) out to r=233 (outermost)
    - Clear center zone: r=0 to r=58 — the R lives here, floating free
    - R fits inside a ~90x110px box, centered exactly at (250, 250)
    - R bounding box: x: 205 to 295 (90px wide), y: 195 to 305 (110px tall)
    - R visual center: 250, 250 ✓
  -->

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#cl1)">

    <!-- 13 outer rings — pure circles, getting brighter inward -->
    <circle cx="250" cy="250" r="233" stroke="white" stroke-width="2.0" stroke-opacity="0.22"/>
    <circle cx="250" cy="250" r="218" stroke="white" stroke-width="2.1" stroke-opacity="0.28"/>
    <circle cx="250" cy="250" r="203" stroke="white" stroke-width="2.2" stroke-opacity="0.34"/>
    <circle cx="250" cy="250" r="188" stroke="white" stroke-width="2.3" stroke-opacity="0.40"/>
    <circle cx="250" cy="250" r="173" stroke="white" stroke-width="2.4" stroke-opacity="0.46"/>
    <circle cx="250" cy="250" r="158" stroke="white" stroke-width="2.5" stroke-opacity="0.52"/>
    <circle cx="250" cy="250" r="143" stroke="white" stroke-width="2.6" stroke-opacity="0.58"/>
    <circle cx="250" cy="250" r="128" stroke="white" stroke-width="2.7" stroke-opacity="0.64"/>
    <circle cx="250" cy="250" r="113" stroke="white" stroke-width="2.8" stroke-opacity="0.70"/>
    <circle cx="250" cy="250" r="98"  stroke="white" stroke-width="2.9" stroke-opacity="0.76"/>
    <circle cx="250" cy="250" r="83"  stroke="white" stroke-width="3.0" stroke-opacity="0.82"/>
    <circle cx="250" cy="250" r="68"  stroke="white" stroke-width="3.2" stroke-opacity="0.90"/>

    <!-- Clear center zone — black circle covers center, R floats on top -->
    <circle cx="250" cy="250" r="57" fill="#0A0A0F" stroke="none"/>

  </g>

  <!--
    THE R — centered perfectly at (250, 250)
    Bounding box: 90w x 110h → left=205, right=295, top=195, bottom=305
    Visual center of R (optical) = ~(248, 250) ✓
    
    Double line technique: thick white path + dark cutout on top
    
    R skeleton (centerline):
    Stem: x=218, y=197 → y=303
    Bowl top: (218, 197) curves right → peak x=282, y=232 → back (218, 267)
    Leg: from (236, 267) diagonal → (282, 303)
  -->

  <!-- Thick white R -->
  <path d="
    M 218 197
    L 218 303
    M 218 197
    C 218 195 222 193 228 193
    C 253 193 284 204 284 230
    C 284 256 253 267 228 267
    L 218 267
    M 234 267
    C 247 269 260 278 268 292
    L 282 308
  "
  stroke="white"
  stroke-width="20"
  stroke-linecap="round"
  stroke-linejoin="round"
  fill="none"
  />

  <!-- Dark cutout — same path, thinner -->
  <path d="
    M 218 197
    L 218 303
    M 218 197
    C 218 195 222 193 228 193
    C 253 193 284 204 284 230
    C 284 256 253 267 228 267
    L 218 267
    M 234 267
    C 247 269 260 278 268 292
    L 282 308
  "
  stroke="#0A0A0F"
  stroke-width="11"
  stroke-linecap="round"
  stroke-linejoin="round"
  fill="none"
  />

  <!-- Center dot -->
  <circle cx="250" cy="250" r="5" fill="rgba(255,255,255,0.5)"/>

</svg>
<div class="label">Riddim — icon</div>
</div>

<!-- FULL LOGO WITH WORDMARK -->
<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" width="650" height="171">
  <rect width="760" height="200" fill="#0A0A0F"/>

  <defs>
    <clipPath id="cl2"><circle cx="100" cy="100" r="94"/></clipPath>
  </defs>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#cl2)">
    <circle cx="100" cy="100" r="93"  stroke="white" stroke-width="1.5" stroke-opacity="0.22"/>
    <circle cx="100" cy="100" r="80"  stroke="white" stroke-width="1.6" stroke-opacity="0.32"/>
    <circle cx="100" cy="100" r="67"  stroke="white" stroke-width="1.7" stroke-opacity="0.44"/>
    <circle cx="100" cy="100" r="54"  stroke="white" stroke-width="1.8" stroke-opacity="0.56"/>
    <circle cx="100" cy="100" r="41"  stroke="white" stroke-width="1.9" stroke-opacity="0.68"/>
    <circle cx="100" cy="100" r="28"  stroke="white" stroke-width="2.0" stroke-opacity="0.82"/>
    <!-- Clear center -->
    <circle cx="100" cy="100" r="21" fill="#0A0A0F" stroke="none"/>
  </g>

  <!-- R for mini, centered at (100,100), scaled ~40% -->
  <path d="M 89 80 L 89 121 M 89 80 C 89 79 91 78 93 78 C 103 78 114 82 114 93 C 114 104 103 108 93 108 L 89 108 M 95 108 C 100 109 105 113 108 119 L 114 127"
  stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M 89 80 L 89 121 M 89 80 C 89 79 91 78 93 78 C 103 78 114 82 114 93 C 114 104 103 108 93 108 L 89 108 M 95 108 C 100 109 105 113 108 119 L 114 127"
  stroke="#0A0A0F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <circle cx="100" cy="100" r="2" fill="rgba(255,255,255,0.5)"/>

  <text x="220" y="114" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="68" fill="white" letter-spacing="-3">RIDDIM</text>
  <text x="222" y="142" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="11" fill="#4B5563" letter-spacing="5.5">HEAR IT. FIND IT. CREATE IT.</text>

</svg>
<div class="label">Full logo</div>
</div>

</body>
</html>
