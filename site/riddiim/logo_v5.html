<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0F; display: flex; align-items: center; justify-content: center; min-height: 100vh; gap: 60px; flex-wrap: wrap; padding: 60px; }
.wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.label { font-family: sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #4B5563; }
</style>
</head>
<body>

<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 560" width="340" height="380">
  <rect width="500" height="560" fill="#0A0A0F"/>

  <!-- 
    RIDDIM LOGO
    Concentric oval rings spiralling inward.
    The innermost shape IS the R — drawn in the same stroke, same weight.
    
    Outer rings: simple ovals getting smaller toward center
    Innermost: the R letterform, rounded, same line weight
    
    Ring dimensions (rx, ry, cx=250, cy=270):
    Ring 1 (outermost): rx=220, ry=255
    Ring 2: rx=185, ry=215
    Ring 3: rx=150, ry=175
    Ring 4: rx=115, ry=138
    Ring 5: rx=82, ry=102
    Ring 6 (innermost before R): rx=52, ry=68
    Center: The R
  -->

  <g fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">

    <!-- Ring 1 — outermost -->
    <ellipse cx="250" cy="272" rx="220" ry="252" stroke-width="5" stroke-opacity="0.5"/>

    <!-- Ring 2 -->
    <ellipse cx="250" cy="272" rx="186" ry="213" stroke-width="5" stroke-opacity="0.58"/>

    <!-- Ring 3 -->
    <ellipse cx="250" cy="272" rx="152" ry="174" stroke-width="5" stroke-opacity="0.66"/>

    <!-- Ring 4 -->
    <ellipse cx="250" cy="272" rx="118" ry="136" stroke-width="5" stroke-opacity="0.74"/>

    <!-- Ring 5 -->
    <ellipse cx="250" cy="272" rx="84" ry="98" stroke-width="5" stroke-opacity="0.82"/>

    <!-- Ring 6 — just before the R -->
    <ellipse cx="250" cy="272" rx="52" ry="62" stroke-width="5" stroke-opacity="0.9"/>

    <!-- 
      THE R — innermost "ring"
      Same stroke weight as the grooves.
      Drawn as a flowing rounded R that fits within the innermost oval zone.
      Center of R: ~250, 272
      R height: ~80px, width: ~56px
      
      Stem: left side, flows down
      Bowl: curves right from top, smooth arc
      Leg: flows diagonally from bowl junction, curves outward — matching the sketch
    -->
    <path d="
      M 232 232
      L 232 312
      M 232 232
      C 232 230 236 228 242 228
      C 262 228 276 236 276 252
      C 276 268 262 276 242 276
      L 232 276
      M 248 276
      C 256 278 264 284 270 294
      L 284 314
    "
    stroke-width="5.5"
    stroke-opacity="1"
    stroke-linecap="round"
    stroke-linejoin="round"
    />

  </g>

</svg>
<div class="label">Riddim — app icon</div>
</div>

<!-- WITH WORDMARK -->
<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 560" width="480" height="383">
  <rect width="700" height="560" fill="#0A0A0F"/>

  <g fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <!-- Rings -->
    <ellipse cx="250" cy="272" rx="220" ry="252" stroke-width="5" stroke-opacity="0.5"/>
    <ellipse cx="250" cy="272" rx="186" ry="213" stroke-width="5" stroke-opacity="0.58"/>
    <ellipse cx="250" cy="272" rx="152" ry="174" stroke-width="5" stroke-opacity="0.66"/>
    <ellipse cx="250" cy="272" rx="118" ry="136" stroke-width="5" stroke-opacity="0.74"/>
    <ellipse cx="250" cy="272" rx="84" ry="98" stroke-width="5" stroke-opacity="0.82"/>
    <ellipse cx="250" cy="272" rx="52" ry="62" stroke-width="5" stroke-opacity="0.9"/>
    <!-- R -->
    <path d="M 232 232 L 232 312 M 232 232 C 232 230 236 228 242 228 C 262 228 276 236 276 252 C 276 268 262 276 242 276 L 232 276 M 248 276 C 256 278 264 284 270 294 L 284 314"
    stroke-width="5.5" stroke-opacity="1"/>
  </g>

  <!-- RIDDIM wordmark -->
  <text x="510" y="258" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="52" fill="white" letter-spacing="-2" text-anchor="middle">RIDDIM</text>
  <text x="510" y="295" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="12" fill="#4B5563" letter-spacing="5" text-anchor="middle">HEAR IT. FIND IT. CREATE IT.</text>

</svg>
<div class="label">Riddim — full logo</div>
</div>

</body>
</html>
