<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0F; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; }
.wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.label { font-family: sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #4B5563; }
</style>
</head>
<body>
<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 580" width="380" height="440">
  <rect width="500" height="580" fill="#0A0A0F" rx="60"/>

  <!--
    CONCEPT: Concentric R outlines — each ring is a progressively larger
    version of the R shape, offset outward uniformly.
    
    The innermost path = the R itself (tight, clean)
    Each outer ring = same R shape but expanded ~18px in all directions
    with increasingly rounded corners as it grows outward
    
    This creates a "topographic R" — you see the R immediately,
    and the rings radiate outward from it like a logo made of sound waves.
    
    R skeleton center: (250, 290)
    R proportions: tall, rounded, the leg flows down-right
    
    All paths: white stroke, same 2px weight, opacity increases inward
    Black background shows between lines naturally.
    
    Using SVG stroke-width trick for double-line R at center:
    innermost = thick white + dark cutout
    All outer rings = single 2px white line
  -->

  <!-- 
    R shape template (innermost, tightest):
    Rounded rectangle R — stem on left, bowl on right top, leg flows right-down
    
    Path describes the OUTLINE of the R letterform as one closed shape.
    Going clockwise from bottom-left of stem:
  -->

  <!-- Ring 6 — outermost (R shape expanded ~90px all around) -->
  <path d="
    M 108 520
    C 108 546 130 562 156 562
    L 234 562
    C 268 562 296 556 318 544
    C 356 524 392 494 406 460
    C 418 430 414 396 396 370
    C 420 346 436 312 436 276
    C 436 196 374 142 294 136
    L 156 136
    C 130 136 108 154 108 180
    Z
  " fill="none" stroke="white" stroke-width="2" stroke-opacity="0.25" stroke-linejoin="round"/>

  <!-- Ring 5 -->
  <path d="
    M 126 502
    C 126 524 146 538 168 538
    L 238 538
    C 268 538 294 532 314 520
    C 348 502 380 474 392 442
    C 403 414 399 382 382 358
    C 404 336 418 304 418 270
    C 418 198 362 150 288 154
    L 168 154
    C 146 154 126 170 126 192
    Z
  " fill="none" stroke="white" stroke-width="2" stroke-opacity="0.38" stroke-linejoin="round"/>

  <!-- Ring 4 -->
  <path d="
    M 144 484
    C 144 502 162 514 182 514
    L 242 514
    C 268 514 292 508 310 497
    C 340 480 368 454 378 424
    C 388 398 384 368 368 346
    C 388 326 400 296 400 264
    C 400 200 350 158 282 162
    L 182 162
    C 162 162 144 176 144 196
    Z
  " fill="none" stroke="white" stroke-width="2" stroke-opacity="0.52" stroke-linejoin="round"/>

  <!-- Ring 3 -->
  <path d="
    M 162 466
    C 162 480 178 490 196 490
    L 246 490
    C 268 490 290 484 306 474
    C 332 458 356 434 364 406
    C 373 382 369 354 354 334
    C 372 316 382 288 382 258
    C 382 202 338 166 276 170
    L 196 170
    C 178 170 162 182 162 198
    Z
  " fill="none" stroke="white" stroke-width="2" stroke-opacity="0.65" stroke-linejoin="round"/>

  <!-- Ring 2 -->
  <path d="
    M 180 448
    C 180 458 194 466 208 466
    L 250 466
    C 268 466 288 460 302 450
    C 324 436 344 414 350 388
    C 358 366 354 340 340 322
    C 356 306 364 280 364 252
    C 364 204 326 174 268 178
    L 208 178
    C 194 178 180 188 180 200
    Z
  " fill="none" stroke="white" stroke-width="2" stroke-opacity="0.78" stroke-linejoin="round"/>

  <!-- Ring 1 — closest to the R -->
  <path d="
    M 198 430
    C 198 436 210 442 222 442
    L 254 442
    C 268 442 286 437 298 428
    C 316 415 332 394 337 370
    C 343 350 339 326 326 310
    C 340 296 346 272 346 246
    C 346 206 314 182 262 186
    L 222 186
    C 210 186 198 194 198 204
    Z
  " fill="none" stroke="white" stroke-width="2" stroke-opacity="0.90" stroke-linejoin="round"/>

  <!--
    THE R — innermost shape, double line (thick white + cutout)
    This is the core R the rings radiate from.
    Same closed path, drawn as a double-line groove.
  -->

  <!-- Thick white -->
  <path d="
    M 216 412
    C 216 416 224 420 232 420
    L 256 420
    C 267 420 282 415 292 406
    C 308 393 320 373 324 351
    C 330 332 324 312 312 298
    C 324 285 328 263 328 239
    C 328 208 302 192 258 194
    L 232 194
    C 224 194 216 200 216 208
    Z
  " fill="none" stroke="white" stroke-width="11" stroke-opacity="0.95" stroke-linejoin="round"/>

  <!-- Dark cutout -->
  <path d="
    M 216 412
    C 216 416 224 420 232 420
    L 256 420
    C 267 420 282 415 292 406
    C 308 393 320 373 324 351
    C 330 332 324 312 312 298
    C 324 285 328 263 328 239
    C 328 208 302 192 258 194
    L 232 194
    C 224 194 216 200 216 208
    Z
  " fill="none" stroke="#0A0A0F" stroke-width="6" stroke-linejoin="round"/>

</svg>
<div class="label">Riddim</div>
</div>
</body>
</html>
