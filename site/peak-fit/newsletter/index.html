<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peak Fit — Newsletter</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container { max-width: 560px; width: 100%; text-align: center; }
    .eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #FF3D00;
      margin-bottom: 24px;
      display: block;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.4rem, 8vw, 4rem);
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: -2px;
      margin-bottom: 20px;
    }
    .sub {
      color: #aaa;
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 40px;
      max-width: 460px;
      margin-left: auto;
      margin-right: auto;
    }
    form { display: flex; flex-direction: column; gap: 16px; }
    input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      padding: 16px 20px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    input::placeholder { color: #666; }
    input:focus { border-color: #FF3D00; }
    button {
      background: #FF3D00;
      border: none;
      border-radius: 6px;
      color: #000;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 4px;
      padding: 18px;
      text-transform: uppercase;
      transition: opacity 0.2s;
      width: 100%;
    }
    button:hover { opacity: 0.85; }
    .back-link {
      display: inline-block;
      margin-top: 36px;
      color: #555;
      font-size: 0.85rem;
      text-decoration: none;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back-link:hover { color: #FF3D00; }
    .success-msg {
      display: none;
      color: #FF3D00;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-top: 20px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="eyebrow">Stay In The Loop</span>
    <h1>Peak Fit<br>Newsletter</h1>
    <p class="sub">Get the latest signals, drops, and intel from Peak Fit delivered straight to your inbox. No noise. Just the alpha.</p>
    <form id="newsletter-form" action="https://formsubmit.co/peakfit@priscadezigns.org" method="POST">
      <input type="hidden" name="_subject" value="New Newsletter Subscriber — Peak Fit">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="?subscribed=1">
      <input type="text" name="name" placeholder="Your Name" required autocomplete="name">
      <input type="email" name="email" placeholder="Your Email Address" required autocomplete="email">
      <button type="submit">Subscribe Now</button>
    </form>
    <p class="success-msg" id="success-msg">You're in. Welcome to the inner circle.</p>
    <a href="../" class="back-link">Back to Peak Fit</a>
  </div>
  <script>
    const p = new URLSearchParams(window.location.search);
    if (p.get('subscribed') === '1') {
      document.getElementById('newsletter-form').style.display = 'none';
      document.getElementById('success-msg').style.display = 'block';
    }
  </script>
</body>
</html>
