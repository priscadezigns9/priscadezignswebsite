<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drovrex — Oil & Gas Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080600;color:#fef3c7;font-family:'Barlow',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 50% 50%,rgba(245,158,11,0.07) 0%,transparent 60%);}
.login-wrap{width:100%;max-width:420px;padding:24px;}
.logo{text-align:center;margin-bottom:40px;}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#F59E0B,#d97706);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 32px rgba(245,158,11,0.3);}
.logo-icon svg{width:30px;height:30px;fill:white;}
.logo h1{font-size:30px;font-weight:800;color:#F59E0B;letter-spacing:-1px;font-family:'Barlow Condensed',sans-serif;}
.logo p{font-size:13px;color:#7a5c1e;margin-top:4px;}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(245,158,11,0.2);border-radius:20px;padding:36px;}
.card h2{font-size:20px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;margin-bottom:8px;}
.card .sub{font-size:13px;color:#7a5c1e;margin-bottom:28px;}
.field{margin-bottom:20px;}
.field label{display:block;font-size:11px;font-weight:600;color:#F59E0B;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
.field input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:13px 16px;font-family:'Barlow',sans-serif;font-size:14px;color:#fef3c7;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:#F59E0B;}
.field input::placeholder{color:#5c3d0e;}
.btn{width:100%;background:linear-gradient(135deg,#F59E0B,#d97706);color:#080600;border:none;border-radius:10px;padding:14px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:opacity 0.2s;margin-top:8px;}
.btn:hover{opacity:0.9;}
.hint{text-align:center;margin-top:20px;font-size:12px;color:#5c3d0e;}
.hint span{color:#F59E0B;cursor:pointer;}
.demo-note{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:12px 16px;margin-top:24px;font-size:12px;color:#d97706;text-align:center;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3l4 8h-3v4h-2v-4H8l4-8z"/></svg>
    </div>
    <h1>DROVREX</h1>
    <p>Oil & Gas Operations Platform</p>
  </div>
  <div class="card">
    <h2>OPERATIONS LOGIN</h2>
    <p class="sub">Authorised personnel only</p>
    <div class="field">
      <label>Email / Employee ID</label>
      <input type="email" id="email" placeholder="ops@drovrex.app" value="ops@drovrex.app">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pass" placeholder="••••••••" value="demo1234">
    </div>
    <button class="btn" onclick="doLogin()">ACCESS DASHBOARD</button>
    <p class="hint">Need access? <span>Contact IT Security</span></p>
    <div class="demo-note">⚡ Demo credentials pre-filled — click Access Dashboard</div>
  </div>
</div>
<script>
function doLogin(){
  const email=document.getElementById('email').value;
  const pass=document.getElementById('pass').value;
  if(email&&pass){
    localStorage.setItem('drovrex_auth','true');
    localStorage.setItem('drovrex_user',email);
    window.location.href='dashboard/';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
