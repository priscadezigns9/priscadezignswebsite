<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Trovren — Log In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07050F;color:#EEE9FF;font-family:'Nunito',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(#7C4DFF08 1px,transparent 1px),linear-gradient(90deg,#7C4DFF08 1px,transparent 1px);background-size:44px 44px;pointer-events:none}
.bg-glow{position:fixed;bottom:-100px;right:-100px;width:600px;height:600px;background:radial-gradient(ellipse,#7C4DFF18 0%,transparent 70%);pointer-events:none}
.card{position:relative;width:100%;max-width:420px;background:#110E1F;border:1px solid #7C4DFF22;padding:48px 40px;margin:20px;border-radius:4px}
.logo{font-family:'Nunito',sans-serif;font-size:1.9rem;font-weight:900;color:#7C4DFF;margin-bottom:4px;letter-spacing:-0.5px}
.tagline{font-size:0.75rem;color:#EEE9FF44;text-transform:uppercase;letter-spacing:2px;margin-bottom:36px;font-weight:700}
.form-label{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#EEE9FF66;margin-bottom:8px;display:block}
.form-input{width:100%;background:#07050F;border:1px solid #7C4DFF22;color:#EEE9FF;padding:13px 16px;font-family:'Nunito',sans-serif;font-size:0.92rem;outline:none;transition:border-color 0.2s;margin-bottom:20px;border-radius:3px}
.form-input:focus{border-color:#7C4DFF66}
.form-input::placeholder{color:#EEE9FF33}
.btn-login{width:100%;background:#7C4DFF;color:#07050F;border:none;padding:14px;font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s;margin-top:4px;border-radius:3px}
.btn-login:hover{opacity:0.88}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:#EEE9FF33;font-size:0.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#7C4DFF18}
.signup-link{text-align:center;font-size:0.85rem;color:#EEE9FF55}
.signup-link a{color:#7C4DFF;text-decoration:none;font-weight:700}
.demo-note{background:#7C4DFF11;border:1px solid #7C4DFF33;padding:12px 16px;font-size:0.78rem;color:#7C4DFF99;margin-top:20px;text-align:center;border-radius:3px}
.status-bar{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#7C4DFF,#4A00E0)}
@media(max-width:480px){.card{padding:36px 24px;margin:16px}}
</style>
</head>
<body>
<div class="status-bar"></div>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="card">
  <div class="logo">Trovren</div>
  <div class="tagline">Education Management Platform</div>
  <form onsubmit="handleLogin(event)">
    <label class="form-label">Email Address</label>
    <input class="form-input" type="email" placeholder="principal@school.edu.tt" value="admin@trovren.edu"/>
    <label class="form-label">Password</label>
    <input class="form-input" type="password" placeholder="••••••••" value="demo1234"/>
    <button class="btn-login" type="submit">Enter Platform</button>
  </form>
  <div class="divider">or</div>
  <div class="signup-link">New institution? <a href="#">Request Setup</a></div>
  <div class="demo-note">🎓 Demo Mode — click Enter Platform to continue</div>
</div>
<script>
function handleLogin(e){
  e.preventDefault();
  localStorage.setItem('trovren_user', JSON.stringify({name:'Mrs. D. Ramesar', role:'School Principal', school:'Trinity Secondary School'}));
  window.location.href='/trovren/app/dashboard/';
}
</script>
</body>
</html>
