<!DOCTYPE html>
<html>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Installing Prisca Dezigns App...</title>
<link rel=manifest href=/prisca-dezigns/manifest.json>
<meta name=theme-color content=#7B35D4>
<meta name=apple-mobile-web-app-capable content=yes>
<meta name=apple-mobile-web-app-title content="Prisca Dezigns">
<link rel=apple-touch-icon href=https://priscadezigns.org/logos/prisca-dezigns-logo.png>
<style>
body{font-family:sans-serif;background:#07060F;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center;padding:20px}
h1{font-size:1.4rem;margin-bottom:8px}p{color:rgba(255,255,255,0.6);font-size:.9rem;margin-bottom:32px}
.btn{background:linear-gradient(135deg,#7B35D4,#EC4899);color:#fff;border:none;border-radius:50px;padding:14px 28px;font-size:1rem;font-weight:700;cursor:pointer;display:none}
.go{background:none;border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:50px;padding:12px 24px;font-size:.9rem;cursor:pointer;margin-top:12px}
</style>
</head>
<body>
<img src=https://priscadezigns.org/logos/prisca-dezigns-logo.png style=width:80px;border-radius:50%;margin-bottom:20px>
<h1>Prisca Dezigns</h1>
<p>Tap the button below to install the app to your home screen.</p>
<button class=btn id=ib>&#8659; Add to Home Screen</button>
<p id=ios-hint style=display:none;color:rgba(255,255,255,0.5);font-size:.8rem>On iPhone: tap the Share button &#x2197; then &ldquo;Add to Home Screen&rdquo;</p>
<button class=go onclick=location.href='/prisca-dezigns/'>Go to site &#8594;</button>
<script>
if('serviceWorker'in navigator)navigator.serviceWorker.register('/prisca-dezigns/sw.js').catch(()=>{});
const ib=document.getElementById('ib');
let dp;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;ib.style.display='block';});
ib.addEventListener('click',async()=>{if(!dp)return;dp.prompt();const{outcome}=await dp.userChoice;if(outcome==='accepted')location.href='/prisca-dezigns/';});
if(/iPhone|iPad|iPod/.test(navigator.userAgent)&&!window.navigator.standalone){
  document.getElementById('ios-hint').style.display='block';
}
</script>
</body>
</html>
