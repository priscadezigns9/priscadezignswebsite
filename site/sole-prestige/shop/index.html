<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sole Prestige Shop - Gold Standard v4.2</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { --brand-color: #ffffff; --bg-dark: #0a0a0a; --card-bg: #141414; --text-light: #f0f0f0; --border-color: #222; }
body{margin:0;font-family:'Inter', sans-serif;background:var(--bg-dark);color:var(--text-light);line-height:1.6}
nav{background:var(--bg-dark);padding:20px 5%;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.5)}
#logo-wrap { text-decoration:none; display:flex; align-items:baseline; gap:0; }
.logo-sole { font-weight:100; font-size:1.6rem; letter-spacing:0.6em; color:#FFFFFF; text-transform:uppercase; }
.logo-divider { display:inline-block; width:1px; height:1em; background:rgba(255,255,255,0.35); margin:0 12px; vertical-align:middle; }
.logo-prestige { font-weight:800; font-size:1rem; letter-spacing:0.4em; color:#FFFFFF; text-transform:uppercase; }
#upBtn { position: fixed; bottom: 30px; right: 30px; background: var(--brand-color); color: #000; width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 1.5rem; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000; transition: 0.3s; }
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:40px;padding:40px 5%}
.card{background:var(--card-bg);border:1px solid var(--border-color);border-radius:2px;padding:30px;text-align:center;transition:0.4s;display:flex;flex-direction:column;position:relative}
.card:hover{transform:translateY(-10px);box-shadow:0 20px 40px rgba(255,255,255,0.05);border-color:var(--brand-color)}
.img-box{height:300px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;background:#ffffff;border-radius:0;overflow:hidden}
img.product-img{max-width:90%;max-height:90%;object-fit:contain;transition:0.5s}
h3{font-size:0.9rem;margin:0 0 15px;font-weight:400;letter-spacing:0.1em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;height:3em;color:var(--text-light);text-transform:uppercase}
.price{color:var(--brand-color);font-weight:900;font-size:1.2rem;margin-bottom:20px;letter-spacing:0.1em}
.btn{display:block;background:var(--brand-color);color:#000;padding:18px;border-radius:0;text-decoration:none;font-weight:900;text-transform:uppercase;letter-spacing:2px;margin-top:auto;font-size:0.75rem;transition:0.3s}
#loader { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-dark); z-index:1000; display:flex; flex-direction: column; justify-content:center; align-items:center; transition: 0.5s; }
#loaderText { color: var(--brand-color); font-weight: 100; letter-spacing: 15px; text-transform:uppercase; }
#loader.hidden { opacity:0; pointer-events:none; }
</style>
</head>
<body>
<div id="loader"><h2 id="loaderText">SOLE PRESTIGE</h2></div>
<nav>
    <a href="/sole-prestige/" id="logo-wrap">
      <span class="logo-sole">SOLE</span>
      <span class="logo-divider"></span>
      <span class="logo-prestige">PRESTIGE</span>
    </a>
</nav>
<div class="grid" id="grid"></div>
<button id="upBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>
<footer style="padding:60px 5%; text-align:center; background:#000; color:#fff; border-top: 1px solid #111;">
    <div style="font-weight:100; font-size:1.2rem; letter-spacing:0.5em;">SOLE PRESTIGE</div>
    <div style="font-size: 0.6rem; letter-spacing: 3px; opacity: 0.4; margin-top: 20px; text-transform:uppercase;">GOLD STANDARD RESTORATION v4.2</div>
</footer>
<script>
const sb = supabase.createClient("https://sazhdnqzaqpqcralmthh.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc");
async function load() {
  const { data } = await sb.from("empire_inventory").select("*").eq("brand", "Sole Prestige");
  const items = data || [];
  if (items.length === 0) {
      document.getElementById("grid").innerHTML = "<div style='grid-column: 1/-1; text-align:center; padding:100px; opacity:0.5;'><h3>NO ASSETS IN ARCHIVE.</h3></div>";
  } else {
      document.getElementById("grid").innerHTML = items.map(p => `
        <div class="card">
          <div class="img-box"><img class="product-img" src="${p.image_url}" loading="lazy"></div>
          <h3>${p.title}</h3>
          <div class="price">${p.price}</div>
          <a href="${p.affiliate_link}" class="btn" target="_blank">Acquire Asset</a>
        </div>
      `).join("");
  }
  document.getElementById("loader").classList.add("hidden");
}
window.onload = load;
</script></body></html>
