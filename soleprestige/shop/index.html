<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Boutique | Sole Prestige</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Cormorant+Garamond:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #E63946; --bg: #050508; --text: #FFFFFF; --dim: #888; --border: rgba(255,255,255,0.08); }
        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        nav { height: 80px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 6%; position: sticky; top: 0; background: var(--bg); z-index: 1000; }
        .logo { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.5rem; font-weight: 700; color: #fff; text-decoration: none; }
        .nav-links a { color: var(--dim); text-decoration: none; margin-left: 30px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }

        .header { padding: 100px 6% 40px; border-bottom: 1px solid var(--border); }
        h1 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 4rem; margin: 0; color: #fff; }

        .filters { padding: 30px 6%; display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn { padding: 10px 20px; border: 1px solid var(--border); background: transparent; color: #fff; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1px; background: var(--border); }
        .card { background: var(--bg); padding: 40px; text-decoration: none; color: inherit; transition: 0.4s; display: flex; flex-direction: column; }
        .card:hover { background: #0A0A0F; transform: translateY(-5px); z-index: 2; }
        
        .img-box { aspect-ratio: 1/1; background: #fff; border-radius: 4px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 20px; }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; }
        
        .cat-tag { font-size: 0.65rem; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .name { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.4rem; margin: 0 0 20px; flex-grow: 1; }
        .btn { border: 1px solid var(--accent); color: var(--accent); text-align: center; padding: 14px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .card:hover .btn { background: var(--accent); color: #fff; }

        footer { padding: 80px 6%; border-top: 1px solid var(--border); text-align: center; color: var(--dim); font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav>
        <a href="../" class="logo">Sole Prestige</a>
        <div class="nav-links">
            <a href="../">Home</a>
            <a href="/brands/">Network</a>
            <a href="../blog/">Signals</a>
        </div>
    </nav>
    <header class="header"><h1>The Boutique</h1></header>
    <div class="filters">
        <button class="filter-btn active" data-cat="all">All Modules</button>
        <button class="filter-btn" data-cat="Performance">Performance</button>
        <button class="filter-btn" data-cat="Lifestyle">Lifestyle</button>
        <button class="filter-btn" data-cat="Atelier">Atelier</button>
    </div>
    <main class="grid">
        <a href="https://www.amazon.com/s?k=Nike+Alphafly+3&tag=priscadezigns-20" class="card" target="_blank" data-cat="Performance">
            <div class="img-box"><img src="https://m.media-amazon.com/images/I/71u-iF6pMmL._AC_SL1500_.jpg" alt="Nike Alphafly 3"></div>
            <div class="cat-tag">Performance</div>
            <h3 class="name">Nike Alphafly 3</h3>
            <div class="btn">Acquire Piece</div>
        </a>
        <a href="https://www.amazon.com/s?k=Jordan+1+Retro+High&tag=priscadezigns-20" class="card" target="_blank" data-cat="Lifestyle">
            <div class="img-box"><img src="https://m.media-amazon.com/images/I/61MclH9j73L._AC_SL1500_.jpg" alt="Jordan 1 Retro"></div>
            <div class="cat-tag">Lifestyle</div>
            <h3 class="name">Air Jordan 1 Retro</h3>
            <div class="btn">Acquire Piece</div>
        </a>
        <a href="https://www.amazon.com/s?k=Jason+Markk+Cleaning+Kit&tag=priscadezigns-20" class="card" target="_blank" data-cat="Atelier">
            <div class="img-box"><img src="https://m.media-amazon.com/images/I/61ni3t1ryQL._AC_SL1500_.jpg" alt="Cleaning Kit"></div>
            <div class="cat-tag">Atelier</div>
            <h3 class="name">Jason Markk Premium Kit</h3>
            <div class="btn">Acquire Piece</div>
        </a>
    </main>
    <footer>&copy; 2026 PRISCA DEZIGNS | SOLE PRESTIGE</footer>
    <script>
        const btns = document.querySelectorAll('.filter-btn');
        const cards = document.querySelectorAll('.card');
        function filter(cat) {
            btns.forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
            cards.forEach(c => c.style.display = (cat === 'all' || c.dataset.cat === cat) ? 'flex' : 'none');
        }
        btns.forEach(b => b.addEventListener('click', () => filter(b.dataset.cat)));
    </script>
</body>
</html>
