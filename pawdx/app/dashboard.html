<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | PawDx</title>
    <link rel="stylesheet" href="../shared/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../shared/app.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="../landing/index.html" class="logo">Paw<span>Dx</span></a>
                <ul class="nav-links">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="symptom-checker.html">Checker</a></li>
                    <li><a href="breed-library.html">Breeds</a></li>
                    <li><a href="#" onclick="supabase.auth.signOut()">Logout</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container mt-20">
        <div id="settings-warning" class="card" style="border: 2px solid var(--warning); background: #fffaf0;">
            <h3>⚙️ Configuration Required</h3>
            <p>Please enter your Supabase and OpenAI API keys to enable functionality.</p>
            <div class="form-group mt-20">
                <input type="text" id="setup-sb-url" placeholder="Supabase URL">
            </div>
            <div class="form-group">
                <input type="password" id="setup-sb-key" placeholder="Supabase Anon Key">
            </div>
            <div class="form-group">
                <input type="password" id="setup-oa-key" placeholder="OpenAI API Key (gpt-4o-mini access)">
            </div>
            <button class="btn btn-primary" onclick="saveSettings()">Save & Initialize</button>
        </div>

        <div id="dashboard-content" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1>My Pet Profiles</h1>
                <button class="btn btn-primary" onclick="showAddPetModal()">+ Add Pet</button>
            </div>

            <div id="pet-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
                <!-- Pet cards will be injected here -->
                <div class="text-center" style="grid-column: 1/-1; padding: 40px;">
                    <p>Loading pets...</p>
                </div>
            </div>

            <div class="mt-20">
                <h2>Quick Actions</h2>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;" class="mt-10">
                    <a href="symptom-checker.html" class="btn btn-secondary">Run Symptom Check</a>
                    <a href="vaccine-tracker.html" class="btn btn-outline">Manage Vaccines</a>
                    <a href="breed-library.html" class="btn btn-outline">Browse Breeds</a>
                </div>
            </div>

            <div id="payment-options" class="mt-20">
                <!-- Payment simulation injected here -->
            </div>
        </div>
    </main>

    <!-- Add Pet Modal -->
    <div id="pet-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;">
        <div class="card" style="width: 100%; max-width: 500px;">
            <h3>Add New Pet</h3>
            <form id="add-pet-form" class="mt-10">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="pet-name" required>
                </div>
                <div class="form-group">
                    <label>Species</label>
                    <select id="pet-species" required>
                        <option value="Dog">Dog</option>
                        <option value="Cat">Cat</option>
                        <option value="Bird">Bird</option>
                        <option value="Rabbit">Rabbit</option>
                        <option value="Fish">Fish</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Breed</label>
                    <input type="text" id="pet-breed" placeholder="e.g. Golden Retriever">
                </div>
                <div class="form-group">
                    <label>DOB</label>
                    <input type="date" id="pet-dob">
                </div>
                <div class="form-group">
                    <label>Weight (kg)</label>
                    <input type="number" id="pet-weight" step="0.1">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary">Save Pet</button>
                    <button type="button" class="btn btn-outline" onclick="hideAddPetModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function saveSettings() {
            const url = document.getElementById('setup-sb-url').value;
            const key = document.getElementById('setup-sb-key').value;
            const aiKey = document.getElementById('setup-oa-key').value;
            if(!url || !key || !aiKey) return alert("All keys are required.");
            PawDx.saveConfig(url, key, aiKey);
            location.reload();
        }

        async function loadDashboard() {
            if (!PawDx.config.supabaseUrl) return;
            
            document.getElementById('settings-warning').classList.add('hidden');
            document.getElementById('dashboard-content').classList.remove('hidden');

            try {
                const pets = await PawDx.getPets();
                const list = document.getElementById('pet-list');
                list.innerHTML = '';

                if (pets.length === 0) {
                    list.innerHTML = '<div class="text-center" style="grid-column: 1/-1;">You haven\'t added any pets yet.</div>';
                }

                pets.forEach(pet => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>${pet.name}</h3>
                        <p><strong>${pet.species}</strong> - ${pet.breed || 'Mixed'}</p>
                        <p>Weight: ${pet.weight || '--'} kg</p>
                        <div class="mt-10" style="display: flex; gap: 5px;">
                            <a href="health-log.html?id=${pet.id}" class="btn btn-secondary" style="font-size: 12px; padding: 5px 10px;">Logs</a>
                            <a href="vaccine-tracker.html?id=${pet.id}" class="btn btn-outline" style="font-size: 12px; padding: 5px 10px;">Vaccines</a>
                            <a href="symptom-checker.html?id=${pet.id}" class="btn btn-primary" style="font-size: 12px; padding: 5px 10px;">Check</a>
                        </div>
                    `;
                    list.appendChild(card);
                });

                PawDx.initPaymentUI();
            } catch (e) {
                console.error(e);
            }
        }

        function showAddPetModal() {
            document.getElementById('pet-modal').classList.remove('hidden');
        }

        function hideAddPetModal() {
            document.getElementById('pet-modal').classList.add('hidden');
        }

        document.getElementById('add-pet-form').onsubmit = async (e) => {
            e.preventDefault();
            const pet = {
                name: document.getElementById('pet-name').value,
                species: document.getElementById('pet-species').value,
                breed: document.getElementById('pet-breed').value,
                dob: document.getElementById('pet-dob').value,
                weight: parseFloat(document.getElementById('pet-weight').value)
            };
            await PawDx.addPet(pet);
            hideAddPetModal();
            loadDashboard();
        };

        window.onload = () => {
            PawDx.init();
            if (PawDx.config.supabaseUrl) {
                loadDashboard();
            }
        };
    </script>
</body>
</html>
