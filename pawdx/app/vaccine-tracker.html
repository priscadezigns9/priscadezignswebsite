<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaccine Tracker | PawDx</title>
    <link rel="stylesheet" href="../shared/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../shared/app.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="../landing/index.html" class="logo">Paw<span>Dx</span></a>
                <ul class="nav-links">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="symptom-checker.html">Checker</a></li>
                    <li><a href="breed-library.html">Breeds</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container mt-20">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Vaccine Tracker</h1>
            <button class="btn btn-primary" onclick="showAddVaccineModal()">+ Log Vaccine</button>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Select Pet</label>
                <select id="vaccine-pet-id" onchange="loadVaccines()"></select>
            </div>
        </div>

        <div class="card mt-20">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="border-bottom: 2px solid var(--cream);">
                        <th style="text-align: left; padding: 10px;">Vaccine</th>
                        <th style="text-align: left; padding: 10px;">Date Given</th>
                        <th style="text-align: left; padding: 10px;">Next Due</th>
                    </tr>
                </thead>
                <tbody id="vaccine-list">
                    <!-- Vaccine rows injected here -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Add Vaccine Modal -->
    <div id="vaccine-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;">
        <div class="card" style="width: 100%; max-width: 500px;">
            <h3>Log Vaccination</h3>
            <form id="add-vaccine-form" class="mt-10">
                <div class="form-group">
                    <label>Vaccine Name</label>
                    <input type="text" id="vax-name" placeholder="e.g. Rabies, DHPP" required>
                </div>
                <div class="form-group">
                    <label>Date Given</label>
                    <input type="date" id="vax-date" required>
                </div>
                <div class="form-group">
                    <label>Next Due Date</label>
                    <input type="date" id="vax-due">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary">Save Vaccine</button>
                    <button type="button" class="btn btn-outline" onclick="hideAddVaccineModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        async function init() {
            PawDx.init();
            if (!PawDx.supabase) return alert("Please configure Supabase in the Dashboard first.");
            
            const pets = await PawDx.getPets();
            const select = document.getElementById('vaccine-pet-id');
            pets.forEach(pet => {
                const opt = document.createElement('option');
                opt.value = pet.id;
                opt.textContent = pet.name;
                select.appendChild(opt);
            });

            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('id')) {
                select.value = urlParams.get('id');
            }
            
            loadVaccines();
        }

        async function loadVaccines() {
            const petId = document.getElementById('vaccine-pet-id').value;
            if (!petId) return;

            const { data, error } = await PawDx.supabase.from('vaccines').select('*').eq('pet_id', petId).order('date_given', { ascending: false });
            
            const list = document.getElementById('vaccine-list');
            list.innerHTML = '';
            
            if (data.length === 0) {
                list.innerHTML = '<tr><td colspan="3" class="text-center" style="padding: 20px;">No vaccines logged for this pet.</td></tr>';
                return;
            }

            data.forEach(v => {
                const tr = document.createElement('tr');
                tr.style.borderBottom = '1px solid var(--cream)';
                tr.innerHTML = `
                    <td style="padding: 10px;">${v.vaccine_name}</td>
                    <td style="padding: 10px;">${v.date_given}</td>
                    <td style="padding: 10px;">${v.next_due || '--'}</td>
                `;
                list.appendChild(tr);
            });
        }

        function showAddVaccineModal() { document.getElementById('vaccine-modal').classList.remove('hidden'); }
        function hideAddVaccineModal() { document.getElementById('vaccine-modal').classList.add('hidden'); }

        document.getElementById('add-vaccine-form').onsubmit = async (e) => {
            e.preventDefault();
            const petId = document.getElementById('vaccine-pet-id').value;
            const vax = {
                pet_id: petId,
                vaccine_name: document.getElementById('vax-name').value,
                date_given: document.getElementById('vax-date').value,
                next_due: document.getElementById('vax-due').value || null
            };
            await PawDx.supabase.from('vaccines').insert([vax]);
            hideAddVaccineModal();
            loadVaccines();
        };

        window.onload = init;
    </script>
</body>
</html>
