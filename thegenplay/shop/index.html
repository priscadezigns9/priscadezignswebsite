<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GEN PLAY | Objects</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@800&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --indigo: #4F46E5; --lime: #D9F99D; --dark: #0F172A; --white: #FFFFFF; }
        body { margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: var(--white); }
        nav { background: rgba(15, 23, 42, 0.9); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--lime); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo-text { font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.5rem; color: var(--white); text-decoration: none; }
        .logo-text span { color: var(--lime); }
        .nav-links a { color: var(--white); text-decoration: none; margin-left: 20px; font-weight: 700; font-size: 0.85rem; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; padding: 70px 5%; }
        .product-card { background: #1E293B; border-radius: 24px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05); }
        .product-card:hover { transform: scale(1.02); border-color: var(--lime); }
        .product-image { width: 100%; height: 350px; object-fit: cover; }
        .product-info { padding: 30px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-info h3 { margin: 0 0 10px; font-size: 1.25rem; font-family: 'Bricolage Grotesque', sans-serif; color: var(--lime); }
        .price { font-weight: 800; font-size: 1.4rem; margin-bottom: 25px; display: block; }
        .buy-link { background: var(--indigo); color: white; text-align: center; padding: 16px; text-decoration: none; font-weight: 800; border-radius: 16px; transition: 0.2s; }
        .buy-link:hover { background: var(--lime); color: var(--dark); }
        footer { padding: 80px 5%; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }
        #empire-mandate { background: #000; color: #4682B4; padding: 15px 0; text-align: center; font-size: 11px; font-weight: 700; text-transform: uppercase; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav>
        <a href="../" class="logo-text">THE GEN <span>PLAY</span></a>
        <div class="nav-links">
            <a href="../laboratory/">LABORATORY</a>
            <a href="../archives/">ARCHIVES</a>
            <a href="https://priscadezigns.org/thegenplay/shop/">OBJECTS</a>
        </div>
    </nav>
    <div class="product-grid" id="grid"></div>
    <footer>
        <div class="logo-text" style="margin-bottom: 20px;">THE GEN <span>PLAY</span></div>
        <p style="font-size: 13px; opacity: 0.5;">A PRISCA DEZIGNS AFFILIATE · BUILT FOR THE NEXT GENERATION</p>
    </footer>
    <div id="empire-mandate">EMPIRE MANDATE: 10% OF EVERY PURCHASE SUPPORTS <a href="https://priscadezigns.org/thewaymadeknown/" style="color: #4682B4; text-decoration: none;">THE WAY MADE KNOWN</a> MISSION.</div>

    <script>
        const SB_URL = 'https://sazhdnqzaqpqcralmthh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function load() {
            const { data, error } = await sb.from('empire_inventory').select('*').eq('brand', 'The Gen Play');
            if (error) return;
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map(p => `
                <div class="product-card">
                    <img src="${p.image_url}" class="product-image" loading="lazy">
                    <div class="product-info">
                        <h3>${p.title}</h3>
                        <span class="price">${p.price}</span>
                        <a href="${p.affiliate_link}" class="buy-link" target="_blank">Acquire Object</a>
                    </div>
                </div>
            `).join('');
        }
        load();
    </script>
</body>
</html>
