<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE TOY VAULT | THE GEN PLAY LABORATORY</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Bricolage+Grotesque:opsz,wght@12..96,800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --indigo: #6366F1; 
            --lime: #D4FF00; 
            --dark: #0F172A; 
            --white: #F8FAFC;
            --gray: #1E293B;
        } 
        * { margin: 0; padding: 0; box-sizing: border-box; } 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: var(--white); padding-top: 100px; } 
        
        #empire-mandate {
            background: #000; color: #4682B4; padding: 10px 0; text-align: center; font-size: 11px; letter-spacing: 1.5px;
            border-bottom: 1px solid rgba(70,130,180,0.3); z-index: 10001; position: fixed; top: 0; left: 0; width: 100%; height: 32px;
            font-family: sans-serif; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; justify-content: center;
        }

        nav {
            position: fixed; top: 32px; left: 0; right: 0; z-index: 1000; background: rgba(15, 23, 42, 0.95);
            padding: 0 5%; height: 64px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 3px solid var(--lime);
        }
        .header-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .brand-text { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 1.5rem; color: var(--white); letter-spacing: -0.5px; }
        .brand-accent { color: var(--lime); }
        
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a {
            color: var(--white); text-decoration: none; font-weight: 600;
            font-size: 0.9rem; transition: 0.3s;
        }
        .nav-links a:hover { color: var(--lime); }
        
        .nav-btn { 
            background: var(--indigo); color: #fff; padding: 8px 20px; 
            text-decoration: none; border-radius: 50px; font-size: 0.85rem; font-weight: 800; transition: 0.2s;
        }
        .nav-btn:hover { background: var(--lime); color: var(--dark); transform: scale(1.05); }

        .filter-wrap { 
            position: sticky; top: 96px; z-index: 999; background: var(--dark); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 15px 5%; display: flex; gap: 10px; overflow-x: auto; 
        } 
        .filter-btn { 
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.75rem; font-weight: 700; background: var(--gray); 
            border: none; color: var(--white); padding: 8px 20px; cursor: pointer; 
            border-radius: 50px; white-space: nowrap; transition: 0.2s;
        } 
        .filter-btn:hover, .filter-btn.active { background: var(--indigo); color: #fff; } 

        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 40px 5%; } 
        .card { background: var(--gray); border-radius: 20px; padding: 25px; display: flex; flex-direction: column; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); } 
        .card:hover { transform: translateY(-8px); border-color: var(--indigo); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2); }
        
        .card-image { height: 200px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border-radius: 12px; background: #2D3748; overflow: hidden; } 
        .card-image img { max-width: 90%; max-height: 90%; object-fit: contain; } 
        
        .card-title { 
            font-weight: 800; margin-bottom: 15px; height: 3em; 
            overflow: hidden; line-height: 1.3; font-size: 0.95rem; color: var(--white);
        } 
        .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); } 
        .price { font-weight: 800; font-size: 1.1rem; color: var(--lime); } 
        .shop-btn { 
            background: var(--indigo); color: #fff; padding: 10px 20px; 
            text-decoration: none; border-radius: 12px; font-size: 0.8rem; font-weight: 800; transition: 0.2s; 
        }
        .shop-btn:hover { background: var(--white); color: var(--indigo); }

        footer {
            padding: 80px 5%; background: #070B14; border-top: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        .footer-brand { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 1.8rem; margin-bottom: 15px; }
        footer p { font-size: 12px; opacity: 0.5; }
        .badge { display: inline-block; margin-top: 25px; background: var(--gray); color: var(--lime); padding: 5px 15px; border-radius: 50px; font-size: 10px; font-weight: 800; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="empire-mandate">EMPIRE MANDATE: 10% SUPPORT <a href="https://priscadezigns.org/thewaymadeknown/" style="color: #4682B4; margin: 0 5px;">THE WAY MADE KNOWN</a> MISSION.</div>
    <nav>
        <a class="header-brand" href="https://priscadezigns.org/thegenplay/">
            <div class="brand-text">THE GEN <span class="brand-accent">PLAY</span></div>
        </a>
        <div class="nav-links">
            <a href="https://priscadezigns.org/thegenplay/">LABORATORY</a>
            <a href="https://priscadezigns.org/thegenplay/archives/">ARCHIVES</a>
            <a href="https://www.redbubble.com/people/priscadezigns/shop" target="_blank" class="nav-btn">MERCH</a>
        </div>
    </nav>
    <div class="filter-wrap">
        <button onclick="f('all', this)" class="filter-btn active">ALL OBJECTS</button>
        <button onclick="f('Engineering', this)" class="filter-btn">ENGINEERING</button>
        <button onclick="f('Artisanal', this)" class="filter-btn">ARTISANAL</button>
        <button onclick="f('Collectibles', this)" class="filter-btn">COLLECTIBLES</button>
        <button onclick="f('Retro', this)" class="filter-btn">RETRO</button>
        <button onclick="f('Robotics', this)" class="filter-btn">ROBOTICS</button>
    </div>
    
<section class="shop-grid" id="grid"></section>
<footer>
        <div class="footer-brand">THE GEN <span class="brand-accent">PLAY</span></div>
        <p>© 2026 THE GEN PLAY · A PRISCA DEZIGNS VENTURE</p>
        <div class="badge">PRECISION AUDIT: PASSED</div>
    </footer>

    
    
    

    
    
    


    
    
    

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            const SB_URL = 'https://sazhdnqzaqpqcralmthh.supabase.co';
            const SB_KEY = 'sb_publishable_UicuMabi1dRKAvQ4YGiakg_NCMnftfS';
            const sb = supabase.createClient(SB_URL, SB_KEY);

            async function loadInventory() {
                const { data, error } = await sb
                    .from('empire_inventory')
                    .select('*')
                    .eq('brand', 'The Gen Play')
                    .order('created_at', { ascending: false });
                
                if (error) {
                    console.error('Inventory Sync Error:', error);
                    return;
                }
                
                const grid = document.getElementById('grid');
                if (!grid) return;
                
                grid.innerHTML = '';
                                data.forEach(p => {
                    grid.innerHTML += `
                        <div class="product-card">
                            <img src="${p.image_url}" class="product-image" loading="lazy">
                            <h3>${p.title}</h3>
                            <span class="price">${p.price}</span>
                            <a href="${p.affiliate_link}" class="buy-link" target="_blank">View on Amazon</a>
                        </div>`;
                });
            }
            document.addEventListener('DOMContentLoaded', loadInventory);
        })();
    </script>
    <script src="/ateliagaming/js/vanguard_hud.js"></script>
</body>
</html>
