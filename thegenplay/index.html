<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gen Play | High-Fidelity Curations for Every Generation</title>
    <meta name="description" content="A premium laboratory of play. We source and curate the finest engineering kits, artisanal toys, and high-fidelity collectibles.">
    <link rel="icon" type="image/png" href="logos/icon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Bricolage+Grotesque:opsz,wght@12..96,800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366F1; /* Electric Indigo */
            --secondary: #BEF264; /* Lemon Lime */
            --dark: #0F172A;
            --text: #334155;
            --bg: #FFFFFF;
            --section-bg: #F8FAFC;
            --border: rgba(15, 23, 42, 0.08);
            --empire-gold: #C5A059;
        }

        body.dark-mode {
            --bg: #0F172A;
            --text: #F8FAFC;
            --section-bg: #1E293B;
            --border: rgba(248, 250, 252, 0.08);
            --dark: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; transition: background 0.3s, color 0.3s; }
        
        .empire-mandate {
            background: var(--dark);
            color: var(--bg);
            padding: 8px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .empire-mandate span { color: var(--secondary); }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 6%;
            position: sticky;
            top: 0;
            background: rgba(var(--bg), 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .nav-logo-img { height: 32px; width: auto; }

        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text); font-weight: 600; font-size: 0.9rem; transition: color 0.2s; }
        .nav-links a:hover { color: var(--primary); }

        .hero { padding: 100px 6% 80px; text-align: center; background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent); }
        h1 { font-family: 'Bricolage Grotesque', sans-serif; font-size: clamp(2.5rem, 8vw, 4.5rem); line-height: 1.1; margin-bottom: 25px; color: var(--dark); }
        .highlight { color: var(--primary); }

        .btn {
            display: inline-block;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: none;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3); }

        .dark-mode-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .dark-mode-toggle:hover { background: var(--section-bg); }

        /* ... rest of the CSS ... */

        footer { padding: 80px 6%; background: var(--section-bg); border-top: 1px solid var(--border); }
        .footer-logo-img { height: 28px; width: auto; margin-bottom: 20px; }
    </style>
</head>
<body id="body">

    <div class="empire-mandate">
        Part of the Prisca Dezigns Empire. <span>10% of commissions</span> support The Way Made Known.
    </div>

    <header>
        <a href="/" class="nav-brand">
            <img src="logos/horizontal.png" alt="The Gen Play" class="nav-logo-img" id="header-logo">
        </a>
        <nav class="nav-links">
            <a href="#lab">The Research</a>
            <a href="#curations">Curations</a>
            <button class="dark-mode-toggle" onclick="toggleDarkMode()" id="theme-toggle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
            <a href="https://www.amazon.com/s?k=engineering+toys&tag=priscadezigns-20" target="_blank" class="btn btn-primary">Browse Amazon</a>
        </nav>
    </header>

    <!-- ... rest of the sections ... -->

    <footer>
        <div class="footer-content">
            <img src="logos/horizontal.png" alt="The Gen Play" class="footer-logo-img" id="footer-logo">
            <!-- ... -->
        </div>
    </footer>

    <script>
        function toggleDarkMode() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('thegenplay-dark-mode', isDark);
            
            const headerLogo = document.getElementById('header-logo');
            const footerLogo = document.getElementById('footer-logo');
            const toggleBtn = document.getElementById('theme-toggle');
            
            if (isDark) {
                headerLogo.src = 'logos/horizontal-dark.png';
                footerLogo.src = 'logos/horizontal-dark.png';
                toggleBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>';
            } else {
                headerLogo.src = 'logos/horizontal.png';
                footerLogo.src = 'logos/horizontal.png';
                toggleBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
            }
        }

        // Apply saved theme on load
        if (localStorage.getItem('thegenplay-dark-mode') === 'true') {
            toggleDarkMode();
        }
    </script>
</body>
</html>
