
<!DOCTYPE html><html><head><title>Prime Land Alpha</title><style>body{margin:0;overflow:hidden;background:#050508;font-family:sans-serif;}#ui{position:absolute;top:20px;left:20px;color:#fff;}#info{position:absolute;bottom:20px;left:20px;background:rgba(0,0,0,0.5);padding:20px;border-radius:20px;color:#fff;border:1px solid #E63946;}</style></head><body><div id="ui">NEURALS: <span id="b">1000</span></div><div id="info">PARCEL: [X:0, Z:0]<br>STATUS: UNCLAIMED<br><button onclick="this.innerText='CLAIMED (NFT PENDING)';this.style.color='#E63946'" style="margin-top:10px;background:#E63946;color:#fff;border:none;padding:10px;border-radius:50px;">CLAIM (500 NEURALS)</button></div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>let s,ca,r,vx=[];function init(){s=new THREE.Scene();ca=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);ca.position.set(5,5,5);ca.lookAt(0,0,0);r=new THREE.WebGLRenderer();r.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(r.domElement);s.add(new THREE.GridHelper(100,100,0x111111));s.add(new THREE.AmbientLight(0xffffff,0.5));window.onmousedown=e=>{let g=new THREE.BoxGeometry(1,1,1);let m=new THREE.MeshStandardMaterial({color:0x0A0A0F});let v=new THREE.Mesh(g,m);v.position.set(Math.round(Math.random()*10),0.5,Math.round(Math.random()*10));s.add(v);vx.push(v);};animate();}const k={};window.onkeydown=e=>k[e.code]=1;window.onkeyup=e=>k[e.code]=0;function animate(){requestAnimationFrame(animate);if(k.KeyW)ca.position.z-=0.1;if(k.KeyS)ca.position.z+=0.1;r.render(s,ca);}init();</script></body></html>
