
<!DOCTYPE html><html><head><title>Atelier Realms</title><style>body{margin:0;overflow:hidden;background:#050508;font-family:sans-serif;}#ui{position:absolute;top:20px;left:20px;color:#fff;}#info{position:absolute;bottom:20px;left:20px;background:rgba(0,0,0,0.5);padding:25px;border-radius:30px;color:#fff;border:1px solid #457B9D;}.btn{background:#457B9D;color:#fff;border:none;padding:12px;border-radius:50px;cursor:pointer;width:100%;margin-top:10px;}</style></head><body><div id="ui">AT COINS: <span id="at">0</span></div><div id="info">PARCEL [SECTOR-01]<br><span id="s" style="color:#666;">UNCLAIMED ARCHITECTURE</span><button class="btn" onclick="alert('ID Required')">SECURE OWNERSHIP (50 AT)</button></div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>let s,ca,r;function init(){s=new THREE.Scene();ca=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);ca.position.set(5,5,5);ca.lookAt(0,0,0);r=new THREE.WebGLRenderer();r.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(r.domElement);s.add(new THREE.GridHelper(100,100,0x111111));s.add(new THREE.AmbientLight(0xffffff,0.5));window.onmousedown=e=>{if(e.target.tagName==='BUTTON')return;let v=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),new THREE.MeshStandardMaterial({color:0x0A0A0F}));v.position.set(Math.round(Math.random()*10),0.5,Math.round(Math.random()*10));s.add(v);};animate();}function animate(){requestAnimationFrame(animate);r.render(s,ca);}init();</script></body></html>
