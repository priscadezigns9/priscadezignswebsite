
<!DOCTYPE html><html><head><title>Atelier Realms v2</title><style>body{margin:0;overflow:hidden;background:#050508;font-family:sans-serif;}#ui{position:absolute;top:20px;left:20px;color:#fff;}#m{position:absolute;top:20px;right:20px;color:#fff;text-align:right;} .i{padding:5px;opacity:0.5;}.active{opacity:1;border-right:2px solid #E63946;}</style></head><body><div id="ui">VOXELS: <span id="vc">0</span></div><div id="m"><div id="m1" class="i active">1: OBSIDIAN</div><div id="m2" class="i">2: NEON [AT]</div><div id="m3" class="i">3: CHROME [AT]</div></div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>let s,ca,r,sel=1,vx=[];function init(){s=new THREE.Scene();ca=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);ca.position.set(5,5,5);ca.lookAt(0,0,0);r=new THREE.WebGLRenderer({antialias:true});r.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(r.domElement);s.add(new THREE.GridHelper(100,100,0x111111));s.add(new THREE.AmbientLight(0xffffff,0.5));l();window.onmousedown=e=>{if(e.target.tagName==='BUTTON')return;let c=sel===1?0x0A0A0F:sel===2?0xE63946:0xaaaaaa;let em=sel===2?0xE63946:0x000000;let g=new THREE.BoxGeometry(1,1,1);let v=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:c,emissive:em,metalness:sel===3?1:0.5}));v.position.set(Math.round(Math.random()*10),0.5,Math.round(Math.random()*10));s.add(v);vx.push({t:sel,p:v.position});sv();u();};animate();}function sv(){localStorage.setItem('lab_r_v2',JSON.stringify(vx));}function l(){let d=JSON.parse(localStorage.getItem('lab_r_v2')||'[]');d.forEach(o=>{let c=o.t===1?0x0A0A0F:o.t===2?0xE63946:0xaaaaaa;let em=o.t===2?0xE63946:0x000000;let v=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),new THREE.MeshStandardMaterial({color:c,emissive:em}));v.position.copy(o.p);s.add(v);vx.push(o);});u();}function u(){document.getElementById('vc').innerText=vx.length;}window.onkeydown=e=>{if(e.code==='Digit1'){sel=1;sm(1);}if(e.code==='Digit2'){sel=2;sm(2);}if(e.code==='Digit3'){sel=3;sm(3);}};function sm(n){for(let i=1;i<=3;i++)document.getElementById('m'+i).className='i'+(i===n?' active':'');}function animate(){requestAnimationFrame(animate);r.render(s,ca);}init();</script></body></html>
