
<!DOCTYPE html><html><head><title>Neural Lab | Upgrade Nexus</title><style>
body{background:#050508;color:#fff;font-family:sans-serif;margin:0;}
#ui{position:absolute;top:20px;left:20px;z-index:10;background:rgba(0,0,0,0.8);padding:20px;border-radius:20px;border:1px solid #457B9D;}
#canvas{width:100%;height:100vh;}
.btn{background:#E63946;color:#fff;padding:10px 20px;border-radius:5px;cursor:pointer;margin-top:10px;display:inline-block;}
</style></head><body>
<div id="ui">
    <h2>NEURAL LABORATORY</h2>
    <p>Astra Status: Online</p>
    <div id="upgrades">
        <div class="btn" onclick="upgrade('speed')">UPGRADE SPEED (500 Neurals)</div><br>
        <div class="btn" onclick="upgrade('power')">UPGRADE POWER (1000 Neurals)</div>
    </div>
</div>
<div id="canvas"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>
let s,ca,r,a;
function init(){
    s=new THREE.Scene();s.background=new THREE.Color(0x050508);
    ca=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);ca.position.set(10,10,10);ca.lookAt(0,0,0);
    r=new THREE.WebGLRenderer({antialias:true});r.setSize(window.innerWidth,window.innerHeight);
    document.getElementById('canvas').appendChild(r.domElement);
    s.add(new THREE.AmbientLight(0xffffff,0.5));
    
    // Lab Decoration
    let platform=new THREE.Mesh(new THREE.CylinderGeometry(5,5,1,32),new THREE.MeshStandardMaterial({color:0x111111, metalness:1}));
    platform.position.y=-0.5;s.add(platform);
    
    a=new THREE.Mesh(new THREE.BoxGeometry(1.5,1,2.5),new THREE.MeshStandardMaterial({color:0x000000, emissive:0x457B9D}));
    s.add(a);
    
    animate();
}
function upgrade(type){ alert('UPGRADE PROTOCOL: ' + type.toUpperCase() + ' INITIATED'); }
function animate(){
    requestAnimationFrame(animate);
    a.rotation.y+=0.01;
    r.render(s,ca);
}
init();</script></body></html>
