<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Orchard Alpha | Atelier Games</title>
    <style>
        body { margin: 0; overflow: hidden; background: #FDF8F2; font-family: 'Inter', sans-serif; }
        #ui { position: absolute; top: 30px; left: 30px; z-index: 10; color: #1A1A1A; pointer-events: none; }
        .stat { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding: 15px 25px; border-radius: 50px; border: 1px solid rgba(123, 53, 212, 0.2); margin-bottom: 10px; display: inline-block; }
        #controls { position: absolute; bottom: 30px; width: 100%; text-align: center; color: #666; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat">ASTRA: ACTIVE</div><br>
        <div class="stat">NEURALS: <span id="count">0</span></div><br>
        <div class="stat">ATELIER CREDITS (ATLR): <span id="balance">100</span></div>
    </div>
    <div id="controls">Use WASD or Arrows to Move Astra · Space to Jump</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, astra, grapes = [];
        let score = 0;
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xFDF8F2);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0x7B35D4, 0.8);
            sun.position.set(5, 10, 5);
            sun.castShadow = true;
            scene.add(sun);
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0xFAFAFA });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);
            const astraGeo = new THREE.BoxGeometry(1, 1, 1.5);
            const astraMat = new THREE.MeshStandardMaterial({ color: 0x0A0A0A });
            astra = new THREE.Mesh(astraGeo, astraMat);
            astra.position.y = 0.5;
            astra.castShadow = true;
            scene.add(astra);
            for(let i=0; i<10; i++) {
                const grapeGeo = new THREE.SphereGeometry(0.3, 32, 32);
                const grapeMat = new THREE.MeshStandardMaterial({ color: 0x7B35D4, emissive: 0x7B35D4, emissiveIntensity: 0.5 });
                const grape = new THREE.Mesh(grapeGeo, grapeMat);
                grape.position.set(Math.random()*20-10, 0.3, Math.random()*20-10);
                scene.add(grape);
                grapes.push(grape);
            }
            animate();
        }
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        function animate() {
            requestAnimationFrame(animate);
            if(keys['KeyW'] || keys['ArrowUp']) astra.position.z -= 0.1;
            if(keys['KeyS'] || keys['ArrowDown']) astra.position.z += 0.1;
            if(keys['KeyA'] || keys['ArrowLeft']) astra.position.x -= 0.1;
            if(keys['KeyD'] || keys['ArrowRight']) astra.position.x += 0.1;
            grapes.forEach((grape, i) => {
                if(astra.position.distanceTo(grape.position) < 1) {
                    scene.remove(grape);
                    grapes.splice(i, 1);
                    score += 10;
                    document.getElementById('count').innerText = score;
                }
            });
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        init();
    </script>
</body>
</html>
