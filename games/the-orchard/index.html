
<!DOCTYPE html><html><head><title>Orchard v7</title><style>body{margin:0;overflow:hidden;background:#0A0A0F;}#ui{position:absolute;top:20px;left:20px;color:#fff;font-family:sans-serif;}#menu{position:absolute;top:20px;right:20px;color:#fff;text-align:right;}</style></head><body><div id="ui">NEURALS: <span id="c">0</span> | SKIN: <span id="s">OBSIDIAN</span></div><div id="menu">1: TREE (50) | 2: PILLAR (100) | S: SKIN (100)</div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>let s,ca,r,a,cs=[],sel=1,sc=0,oc=0,skin=0;const skins=[0x050505,0xE63946];function init(){s=new THREE.Scene();ca=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);ca.position.set(0,5,10);ca.lookAt(0,0,0);r=new THREE.WebGLRenderer({antialias:true});r.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(r.domElement);s.add(new THREE.AmbientLight(0xffffff,0.5));a=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.8,1.2),new THREE.MeshStandardMaterial({color:skins[skin]}));s.add(a);for(let i=0;i<10;i++)spawnC();loadP();setInterval(tick,1000);animate();}function spawnC(){let c=new THREE.Mesh(new THREE.TorusGeometry(0.3,0.1),new THREE.MeshStandardMaterial({color:0x457B9D}));c.position.set(Math.random()*20-10,0,Math.random()*20-10);s.add(c);cs.push(c);}function tick(){let d=JSON.parse(localStorage.getItem('lab_o_v6')||'{"sc":0}');sc=d.sc;document.getElementById('c').innerText=sc;}function loadP(){let d=JSON.parse(localStorage.getItem('lab_o_v6')||'{"sc":0,"skin":0}');sc=d.sc;skin=d.skin||0;a.material.color.setHex(skins[skin]);document.getElementById('s').innerText=skin===0?'OBSIDIAN':'CRIMSON';}function saveP(){let d=JSON.parse(localStorage.getItem('lab_o_v6')||'{"sc":0}');d.sc=sc;d.skin=skin;localStorage.setItem('lab_o_v6',JSON.stringify(d));}window.onkeydown=e=>{if(e.code==='Digit1')sel=1;if(e.code==='Digit2')sel=2;if(e.code==='KeyS'&&sc>=100){sc-=100;skin=1-skin;a.material.color.setHex(skins[skin]);document.getElementById('s').innerText=skin===0?'OBSIDIAN':'CRIMSON';saveP();}k[e.code]=1;};const k={};window.onkeyup=e=>k[e.code]=0;function animate(){requestAnimationFrame(animate);if(k.KeyW)a.position.z-=0.1;if(k.KeyS)a.position.z+=0.1;if(k.KeyA)a.position.x-=0.1;if(k.KeyD)a.position.x+=0.1;ca.position.lerp(new THREE.Vector3(a.position.x,5,a.position.z+10),0.1);ca.lookAt(a.position);cs.forEach(c=>{c.rotation.y+=0.05;if(a.position.distanceTo(c.position)<1){c.position.set(Math.random()*20-10,0,Math.random()*20-10);sc+=10;saveP();}});r.render(s,ca);}init();</script></body></html>
