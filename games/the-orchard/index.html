
<!DOCTYPE html><html><head><title>Orchard v10 | Quest Node</title><style>body{margin:0;overflow:hidden;background:#0A0A0F;}#ui{position:absolute;top:20px;left:20px;color:#fff;font-family:sans-serif;}#q{position:absolute;top:100px;left:20px;background:rgba(230,57,70,0.1);border:1px solid #E63946;padding:15px;border-radius:15px;color:#fff;display:none;width:250px;font-size:0.8rem;}</style></head><body><div id="ui">NEURALS: <span id="c">0</span><br><small style="color:#E63946;">OVERSEER DETECTED</small></div><div id="q"><b>OVERSEER:</b><br>Welcome, Unit. Plant 3 Neural Trees to unlock the first Gear Blueprint.<br><button onclick="this.parentElement.style.display='none'" style="margin-top:10px;background:#E63946;color:#fff;border:none;padding:5px 10px;border-radius:5px;">ACCEPT</button></div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>let s,ca,r,a,npc;function init(){s=new THREE.Scene();ca=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);ca.position.set(0,5,10);ca.lookAt(0,0,0);r=new THREE.WebGLRenderer({antialias:true});r.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(r.domElement);s.add(new THREE.AmbientLight(0xffffff,0.5));a=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.8,1.2),new THREE.MeshStandardMaterial({color:0x050505}));s.add(a);npc=new THREE.Mesh(new THREE.SphereGeometry(0.8),new THREE.MeshStandardMaterial({color:0xE63946,wireframe:true}));npc.position.set(5,0,5);s.add(npc);animate();}const k={};window.onkeydown=e=>k[e.code]=1;window.onkeyup=e=>k[e.code]=0;function animate(){requestAnimationFrame(animate);if(k.KeyW)a.position.z-=0.1;if(k.KeyS)a.position.z+=0.1;if(a.position.distanceTo(npc.position)<2){document.getElementById('q').style.display='block';}r.render(s,ca);}init();</script></body></html>
