
<!DOCTYPE html><html><head><title>Orchard v4</title><style>body{margin:0;overflow:hidden;background:#0A0A0F;}#ui{position:absolute;top:20px;left:20px;color:#fff;font-family:sans-serif;}#menu{position:absolute;top:20px;right:20px;color:#fff;text-align:right;font-size:0.8rem;}.item{padding:5px;opacity:0.5;}.active{opacity:1;border-right:2px solid #E63946;}</style></head><body><div id="ui">NEURALS: <span id="c">0</span> | OBJS: <span id="o">0</span></div><div id="menu"><div id="i1" class="item active">1: TREE (50)</div><div id="i2" class="item">2: PILLAR (100)</div></div><div style="position:absolute;bottom:20px;width:100%;text-align:center;color:#fff;font-size:0.7rem;">WASD: MOVE | B: BUILD | 1-2: SELECT</div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>let s,ca,r,a,cs=[],sel=1,sc=0,oc=0;function init(){s=new THREE.Scene();ca=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);ca.position.set(0,5,10);ca.lookAt(0,0,0);r=new THREE.WebGLRenderer({antialias:true});r.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(r.domElement);s.add(new THREE.AmbientLight(0xffffff,0.5));a=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.8,1.2),new THREE.MeshStandardMaterial({color:0x050505}));s.add(a);for(let i=0;i<10;i++){let c=new THREE.Mesh(new THREE.TorusGeometry(0.3,0.1),new THREE.MeshStandardMaterial({color:0x457B9D}));c.position.set(Math.random()*20-10,0,Math.random()*20-10);s.add(c);cs.push(c);}animate();}window.onkeydown=e=>{if(e.code==='Digit1'){sel=1;document.getElementById('i1').className='item active';document.getElementById('i2').className='item';}if(e.code==='Digit2'){sel=2;document.getElementById('i2').className='item active';document.getElementById('i1').className='item';}if(e.code==='KeyB'){let cost=sel===1?50:100;if(sc>=cost){sc-=cost;oc++;document.getElementById('c').innerText=sc;document.getElementById('o').innerText=oc;let obj;if(sel===1){obj=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.8,2),new THREE.MeshStandardMaterial({color:0xE63946}));}else{obj=new THREE.Mesh(new THREE.BoxGeometry(1,4,1),new THREE.MeshStandardMaterial({color:0x222222}));}obj.position.set(a.position.x,1,a.position.z-2);s.add(obj);}}k[e.code]=1;};const k={};window.onkeyup=e=>k[e.code]=0;function animate(){requestAnimationFrame(animate);if(k.KeyW)a.position.z-=0.1;if(k.KeyS)a.position.z+=0.1;if(k.KeyA)a.position.x-=0.1;if(k.KeyD)a.position.x+=0.1;ca.position.lerp(new THREE.Vector3(a.position.x,5,a.position.z+10),0.1);ca.lookAt(a.position);cs.forEach(c=>{c.rotation.y+=0.05;if(a.position.distanceTo(c.position)<1){c.position.set(Math.random()*20-10,0,Math.random()*20-10);sc+=10;document.getElementById('c').innerText=sc;}});r.render(s,ca);}init();</script></body></html>
