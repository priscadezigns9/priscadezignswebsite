
<!DOCTYPE html><html><head><title>Orchard v12</title><style>body{margin:0;overflow:hidden;background:#0A0A0F;}#ui{position:absolute;top:20px;left:20px;color:#fff;font-family:sans-serif;}#menu{position:absolute;top:20px;right:20px;color:#fff;text-align:right;font-size:0.8rem;}.item{padding:5px;opacity:0.5;}.active{opacity:1;border-right:2px solid #E63946;}</style></head><body><div id="ui">NEURALS: <span id="c">0</span> | TURRETS: <span id="t">0</span><br><small id="st">DEFENSE: SECURE</small></div><div id="menu"><div id="i1" class="item active">1: TREE</div><div id="i2" class="item">2: PILLAR</div><div id="i3" class="item">3: RELAY</div><div id="i4" class="item">4: TURRET (300)</div></div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>let s,ca,r,a,ts=[],turrs=[],en=[];let sc=0,sel=1;function init(){s=new THREE.Scene();ca=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);ca.position.set(0,5,10);ca.lookAt(0,0,0);r=new THREE.WebGLRenderer({antialias:true});r.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(r.domElement);s.add(new THREE.AmbientLight(0xffffff,0.5));a=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.8,1.2),new THREE.MeshStandardMaterial({color:0x050505}));s.add(a);setInterval(spawnE, 5000);setInterval(tick, 1000);animate();}function spawnE(){let e=new THREE.Mesh(new THREE.TetrahedronGeometry(0.4),new THREE.MeshStandardMaterial({color:0xE63946}));e.position.set(Math.random()*40-20,0.5,Math.random()*40-20);s.add(e);en.push(e);document.getElementById('st').innerText='DEFENSE: ALERT';}function tick(){sc+=ts.length;document.getElementById('c').innerText=sc;turrs.forEach(t=>{en.forEach((e,i)=>{if(t.position.distanceTo(e.position)<8){s.remove(e);en.splice(i,1);if(en.length===0)document.getElementById('st').innerText='DEFENSE: SECURE';}});});}function cO(t,x,z){let o;if(t===4){o=new THREE.Mesh(new THREE.BoxGeometry(0.6,1.5,0.6),new THREE.MeshStandardMaterial({color:0x457B9D}));turrs.push(o);document.getElementById('t').innerText=turrs.length;}else{o=new THREE.Mesh(new THREE.BoxGeometry(0.5,1.5,0.5),new THREE.MeshStandardMaterial({color:t===1?0xE63946:0x333333}));ts.push(o);}o.position.set(x,0.75,z);s.add(o);}window.onkeydown=e=>{let n=parseInt(e.key);if(n>=1&&n<=4){sel=n;for(let i=1;i<=4;i++)document.getElementById('i'+i).className='item'+(i===n?' active':'');}if(e.code==='KeyB'){let cost=sel===4?300:50;if(sc>=cost){sc-=cost;cO(sel,a.position.x,a.position.z-2);}}k[e.code]=1;};const k={};window.onkeyup=e=>k[e.code]=0;function animate(){requestAnimationFrame(animate);if(k.KeyW)a.position.z-=0.1;if(k.KeyS)a.position.z+=0.1;if(k.KeyA)a.position.x-=0.1;if(k.KeyD)a.position.x+=0.1;ca.position.lerp(new THREE.Vector3(a.position.x,5,a.position.z+10),0.1);ca.lookAt(a.position);r.render(s,ca);}init();</script></body></html>
