
<!DOCTYPE html><html><head><title>Social Hub</title><style>body{margin:0;overflow:hidden;background:#050508;}#ui{position:absolute;top:20px;left:20px;color:#fff;font-family:sans-serif;}</style></head><body><div id="ui">SOCIAL HUB<br><small style="color:#457B9D;">GHOST PROTOCOL: ACTIVE</small></div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>let s,ca,r,a,ghs=[];function init(){s=new THREE.Scene();ca=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);ca.position.set(0,5,10);ca.lookAt(0,0,0);r=new THREE.WebGLRenderer();r.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(r.domElement);s.add(new THREE.AmbientLight(0xffffff,0.5));a=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),new THREE.MeshStandardMaterial({color:0x050505}));s.add(a);for(let i=0;i<3;i++){let g=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.8,0.8),new THREE.MeshStandardMaterial({color:0x457B9D,transparent:true,opacity:0.4}));g.position.set(Math.random()*10-5,0,Math.random()*10-5);s.add(g);ghs.push(g);}animate();}const k={};window.onkeydown=e=>k[e.code]=1;window.onkeyup=e=>k[e.code]=0;function animate(){requestAnimationFrame(animate);if(k.KeyW)a.position.z-=0.1;if(k.KeyS)a.position.z+=0.1;ghs.forEach(g=>{g.position.x+=Math.sin(Date.now()*0.001)*0.01;});r.render(s,ca);}init();</script></body></html>
