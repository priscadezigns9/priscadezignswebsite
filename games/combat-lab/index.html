
<!DOCTYPE html><html><head><title>Combat Lab v4 | Titan</title><style>body{margin:0;overflow:hidden;background:#050508;}#ui{position:absolute;top:20px;left:20px;color:#fff;font-family:sans-serif;}#bh{position:absolute;top:20px;right:20px;width:300px;display:none;}#bf{width:100%;height:10px;background:#E63946;}</style></head><body><div id="ui">HEALTH: 100% | NEURALS: <span id="nr">0</span></div><div id="bh">TITAN HP<div style="width:100%;height:10px;background:#222;"><div id="bf"></div></div></div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>let s,ca,r,a,en=[],bs=[],ti,thp=1000,nr=0;function init(){s=new THREE.Scene();ca=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);ca.position.set(0,10,20);ca.lookAt(0,0,0);r=new THREE.WebGLRenderer({antialias:true});r.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(r.domElement);s.add(new THREE.AmbientLight(0xffffff,0.5));a=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),new THREE.MeshStandardMaterial({color:0x050505}));s.add(a);ti=new THREE.Mesh(new THREE.OctahedronGeometry(4),new THREE.MeshStandardMaterial({color:0xE63946,wireframe:true}));ti.position.set(0,4,-30);s.add(ti);document.getElementById('bh').style.display='block';animate();}function blast(){let b=new THREE.Mesh(new THREE.SphereGeometry(0.3),new THREE.MeshStandardMaterial({color:0x457B9D,emissive:0x457B9D}));b.position.copy(a.position);b.v=new THREE.Vector3(0,0,-1);s.add(b);bs.push(b);}function nova(){let n=new THREE.Mesh(new THREE.SphereGeometry(1),new THREE.MeshBasicMaterial({color:0x457B9D,transparent:true,opacity:0.5}));n.position.copy(a.position);s.add(n);let i=setInterval(()=>{n.scale.addScalar(1.5);n.material.opacity-=0.05;if(a.position.distanceTo(ti.position)<n.scale.x){thp-=50;upB();}if(n.material.opacity<=0){s.remove(n);clearInterval(i);}},50);}function upB(){document.getElementById('bf').style.width=(thp/10)+'%';if(thp<=0){s.remove(ti);localStorage.setItem('lab_core','active');alert('TITAN DEFEATED: NEURAL CORE ACQUIRED');}}const k={};window.onkeydown=e=>{if(e.code==='Space')blast();if(e.code==='KeyQ')nova();k[e.code]=1;};window.onkeyup=e=>k[e.code]=0;function animate(){requestAnimationFrame(animate);if(k.KeyW)a.position.z-=0.2;if(k.KeyS)a.position.z+=0.2;if(k.KeyA)a.position.x-=0.2;if(k.KeyD)a.position.x+=0.2;bs.forEach((b,i)=>{b.position.add(b.v);if(b.position.distanceTo(ti.position)<5){thp-=10;upB();s.remove(b);bs.splice(i,1);}});ti.position.x=Math.sin(Date.now()*0.001)*10;r.render(s,ca);}init();</script></body></html>
