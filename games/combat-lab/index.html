
<!DOCTYPE html><html><head><title>Combat Lab v6 | Titan Phase 2</title><style>
body{margin:0;overflow:hidden;background:#050508;}
#ui{position:absolute;top:20px;left:20px;color:#fff;font-family:sans-serif;text-transform:uppercase;letter-spacing:1px;}
#bh{position:absolute;top:20px;right:20px;width:300px;}
#bf{width:100%;height:10px;background:#E63946;transition:width 0.3s;}
#warn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#E63946;font-size:3rem;font-weight:900;display:none;}
</style></head><body>
<div id="ui">HEALTH: 100% | NEURALS: <span id="nr">0</span></div>
<div id="bh">TITAN OVERLORD<div style="width:100%;height:10px;background:#222;margin-top:5px;"><div id="bf"></div></div></div>
<div id="warn">PHASE 2: OVERLOAD</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>
let s,ca,r,a,ti,bs=[],ls=[],thp=1000,ph2=false;
function init(){
    s=new THREE.Scene();s.background=new THREE.Color(0x050508);
    ca=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);ca.position.set(0,8,20);
    r=new THREE.WebGLRenderer({antialias:true});r.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(r.domElement);
    s.add(new THREE.AmbientLight(0xffffff,0.3));
    a=new THREE.Mesh(new THREE.BoxGeometry(1,1,1.5),new THREE.MeshStandardMaterial({color:0x000000,emissive:0x457B9D}));s.add(a);
    ti=new THREE.Group();
    let core=new THREE.Mesh(new THREE.IcosahedronGeometry(3),new THREE.MeshStandardMaterial({color:0xE63946,emissive:0xE63946}));
    ti.add(core);ti.core=core;
    let shell=new THREE.Mesh(new THREE.IcosahedronGeometry(4.5,1),new THREE.MeshStandardMaterial({color:0x111111,wireframe:true}));
    ti.add(shell);ti.position.set(0,4,-30);s.add(ti);
    animate();
}
function blast(){
    let b=new THREE.Mesh(new THREE.SphereGeometry(0.3),new THREE.MeshStandardMaterial({color:0x457B9D,emissive:0x457B9D}));
    b.position.copy(a.position);b.v=new THREE.Vector3(0,0,-1);s.add(b);bs.push(b);
}
function tL(){
    let l=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,5),new THREE.MeshBasicMaterial({color:0xE63946}));
    l.position.copy(ti.position);l.rotation.x=Math.PI/2;l.v=new THREE.Vector3((a.position.x-ti.position.x)*0.05,0,0.5);
    s.add(l);ls.push(l);
}
const k={};window.onkeydown=e=>{if(e.code==='Space')blast();k[e.code]=1;};window.onkeyup=e=>k[e.code]=0;
function animate(){
    requestAnimationFrame(animate);
    if(k.KeyW)a.position.z-=0.2;if(k.KeyS)a.position.z+=0.2;if(k.KeyA)a.position.x-=0.2;if(k.KeyD)a.position.x+=0.2;
    ti.rotation.y+=0.02;ti.position.x=Math.sin(Date.now()*0.001)*15;
    if(thp<500 && !ph2){ph2=true;ti.core.material.color.set(0x457B9D);ti.core.material.emissive.set(0x457B9D);document.getElementById('warn').style.display='block';setTimeout(()=>document.getElementById('warn').style.display='none',2000);}
    if(ph2 && Math.random()<0.05)tL();
    bs.forEach((b,i)=>{b.position.add(b.v);if(b.position.distanceTo(ti.position)<5){thp-=10;document.getElementById('bf').style.width=(thp/10)+'%';s.remove(b);bs.splice(i,1);}});
    ls.forEach((l,i)=>{l.position.add(l.v);if(l.position.distanceTo(a.position)<1){/*Damage player*/}});
    r.render(s,ca);
}
init();</script></body></html>
