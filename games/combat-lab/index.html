
<!DOCTYPE html><html><head><title>Combat Lab | Atelier</title><style>body{margin:0;overflow:hidden;background:#050508;}#ui{position:absolute;top:20px;left:20px;color:#fff;font-family:sans-serif;}</style></head><body><div id="ui">TARGETS: <span id="sc">0</span> | [SPACE] TO BLAST</div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>let s,ca,r,a,bs=[],ts=[];let sc=0;function init(){s=new THREE.Scene();ca=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);ca.position.set(0,5,10);ca.lookAt(0,0,0);r=new THREE.WebGLRenderer({antialias:true});r.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(r.domElement);s.add(new THREE.AmbientLight(0xffffff,0.5));a=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),new THREE.MeshStandardMaterial({color:0x050505}));s.add(a);for(let i=0;i<5;i++)spawnT();animate();}function spawnT(){let t=new THREE.Mesh(new THREE.SphereGeometry(0.5),new THREE.MeshStandardMaterial({color:0xE63946,wireframe:true}));t.position.set(Math.random()*20-10,0.5,Math.random()*20-10);s.add(t);ts.push(t);}function blast(){let b=new THREE.Mesh(new THREE.SphereGeometry(0.2),new THREE.MeshStandardMaterial({color:0x457B9D,emissive:0x457B9D}));b.position.copy(a.position);b.v=new THREE.Vector3(0,0,-0.5);s.add(b);bs.push(b);}window.onkeydown=e=>{if(e.code==='Space')blast();k[e.code]=1;};const k={};window.onkeyup=e=>k[e.code]=0;function animate(){requestAnimationFrame(animate);if(k.KeyW)a.position.z-=0.1;if(k.KeyS)a.position.z+=0.1;if(k.KeyA)a.position.x-=0.1;if(k.KeyD)a.position.x+=0.1;bs.forEach((b,i)=>{b.position.add(b.v);ts.forEach((t,j)=>{if(b.position.distanceTo(t.position)<0.8){s.remove(t);ts.splice(j,1);s.remove(b);bs.splice(i,1);sc++;document.getElementById('sc').innerText=sc;spawnT();}});});r.render(s,ca);}init();</script></body></html>
