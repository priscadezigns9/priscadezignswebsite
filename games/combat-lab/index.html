
<!DOCTYPE html><html><head><title>Combat Lab v3</title><style>body{margin:0;overflow:hidden;background:#050508;}#ui{position:absolute;top:20px;left:20px;color:#fff;font-family:sans-serif;}#hp{width:200px;height:10px;background:#222;border:1px solid #fff;margin-top:5px;}#hf{width:100%;height:100%;background:#E63946;}</style></head><body><div id="ui">HEALTH<div id="hp"><div id="hf"></div></div>NOVA READY [Q]</div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>let s,ca,r,a,en=[],bs=[];let hp=100;function init(){s=new THREE.Scene();ca=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);ca.position.set(0,5,10);ca.lookAt(0,0,0);r=new THREE.WebGLRenderer({antialias:true});r.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(r.domElement);s.add(new THREE.AmbientLight(0xffffff,0.5));a=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),new THREE.MeshStandardMaterial({color:0x050505}));s.add(a);for(let i=0;i<5;i++)spawnE();animate();}function spawnE(){let e=new THREE.Mesh(new THREE.TetrahedronGeometry(0.5),new THREE.MeshStandardMaterial({color:0xE63946}));e.position.set(Math.random()*20-10,0.5,Math.random()*20-10);s.add(e);en.push(e);}function nova(){let n=new THREE.Mesh(new THREE.SphereGeometry(1,32,32),new THREE.MeshBasicMaterial({color:0x457B9D,transparent:true,opacity:0.5}));n.position.copy(a.position);s.add(n);let i=setInterval(()=>{n.scale.addScalar(1);n.material.opacity-=0.05;en.forEach((e,j)=>{if(a.position.distanceTo(e.position)<n.scale.x){s.remove(e);en.splice(j,1);spawnE();}});if(n.material.opacity<=0){s.remove(n);clearInterval(i);}},50);}const k={};window.onkeydown=e=>{if(e.code==='KeyQ')nova();k[e.code]=1;};window.onkeyup=e=>k[e.code]=0;function animate(){requestAnimationFrame(animate);if(k.KeyW)a.position.z-=0.1;if(k.KeyS)a.position.z+=0.1;en.forEach(e=>{if(a.position.distanceTo(e.position)<1.2){hp-=0.1;document.getElementById('hf').style.width=hp+'%';}});bs.forEach((b,i)=>{b.position.add(b.v);});r.render(s,ca);}init();</script></body></html>
