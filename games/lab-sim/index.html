
<!DOCTYPE html><html><head><title>Lab Sim v5</title><style>body{background:#050508;color:#fff;font-family:sans-serif;padding:50px;}.grid{display:grid;grid-template-columns:1fr 350px;gap:40px;max-width:1100px;margin:0 auto;}.card{background:#0A0A0F;border:1px solid rgba(255,255,255,0.05);padding:30px;border-radius:30px;}.stat{font-size:2.5rem;color:#E63946;font-weight:900;}.btn{background:#E63946;color:#fff;padding:15px;border-radius:100px;text-align:center;cursor:pointer;font-weight:700;margin-top:20px;}.m-card{background:rgba(255,255,255,0.02);border:1px solid #457B9D;padding:20px;border-radius:20px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;}</style></head><body><h1>Laboratory Sim: Command Center</h1><div class="grid"><div><div class="card"><h2>MISSION BOARD</h2><div class="m-card"><div><b>SCRAP SALVAGE</b><br><small>Duration: 30s | Reward: +50 Neurals</small></div><div class="btn" style="margin:0;padding:10px 20px;" onclick="startM(1, 30)">START</div></div><div class="m-card"><div><b>ENERGY CORES</b><br><small>Duration: 60s | Reward: 1 Core [Rare]</small></div><div class="btn" style="margin:0;padding:10px 20px;background:#457B9D;" onclick="startM(2, 60)">START</div></div><div id="status" style="color:#E63946;font-weight:700;"></div></div></div><div class="card"><h3>RESERVES</h3><div class="stat" id="n">0</div><h3>MATERIALS</h3><div id="mats">Cores: 0</div></div></div><script>let d=JSON.parse(localStorage.getItem('lab_o_v8')||'{"sc":0}');let m=parseInt(localStorage.getItem('lab_cores')||0);document.getElementById('n').innerText=d.sc;document.getElementById('mats').innerText="Cores: "+m;function startM(id, t){document.getElementById('status').innerText="MISSION IN PROGRESS: "+t+"s";let i=setInterval(()=>{t--;document.getElementById('status').innerText="MISSION IN PROGRESS: "+t+"s";if(t<=0){clearInterval(i);completeM(id);}},1000);}function completeM(id){document.getElementById('status').innerText="MISSION COMPLETE";if(id===1){d.sc+=50;localStorage.setItem('lab_o_v8',JSON.stringify(d));}else{m++;localStorage.setItem('lab_cores',m);}location.reload();}</script></body></html>
