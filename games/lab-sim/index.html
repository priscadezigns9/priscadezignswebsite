
<!DOCTYPE html><html><head><title>Lab Sim v3</title><style>body{background:#050508;color:#fff;font-family:sans-serif;padding:50px;}.grid{display:grid;grid-template-columns:1fr 300px;gap:40px;max-width:1000px;margin:0 auto;}.card{background:#0A0A0F;border:1px solid rgba(255,255,255,0.05);padding:30px;border-radius:30px;}.stat{font-size:2.5rem;color:#E63946;font-weight:900;}.sync{color:#457B9D;font-size:0.7rem;margin-top:10px;text-transform:uppercase;letter-spacing:0.1em;}</style></head><body><h1>Atelier World: Lab Sim</h1><div class="grid"><div class="card"><h2>NEURAL FLEET</h2><div id="f">UNIT 01: ASTRA (ACTIVE)<br></div></div><div class="card"><h3>CLOUD RESERVES</h3><div class="stat" id="n">0</div><div class="sync" id="id">STATUS: DISCONNECTED</div></div></div><script>let d=JSON.parse(localStorage.getItem('lab_o_v8')||'{"sc":0}');let nid=localStorage.getItem('neural_id');if(nid){document.getElementById('id').innerText="SYNCED: "+nid.toUpperCase();document.getElementById('id').style.color="#E63946";}document.getElementById('n').innerText=d.sc;</script></body></html>
