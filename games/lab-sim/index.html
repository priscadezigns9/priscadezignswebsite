
<!DOCTYPE html><html><head><title>Lab v2</title><style>body{background:#050508;color:#fff;font-family:sans-serif;padding:50px;}.grid{display:grid;grid-template-columns:1fr 300px;gap:40px;max-width:1000px;margin:0 auto;}.card{background:#0A0A0F;border:1px solid rgba(255,255,255,0.05);padding:30px;border-radius:30px;}.stat{font-size:2.5rem;color:#E63946;font-weight:900;}.btn{background:#E63946;color:#fff;padding:15px;border-radius:100px;text-align:center;cursor:pointer;font-weight:700;margin-top:20px;}</style></head><body><h1>Atelier World: Lab Sim</h1><div class="grid"><div class="card"><h2>NEURAL FLEET</h2><div id="f">UNIT 01: ASTRA (ACTIVE)<br></div><div class="btn" onclick="buyUnit()">DEPLOY UNIT (500)</div></div><div class="card"><h3>RESERVES</h3><div class="stat" id="n">0</div></div></div><script>let d=JSON.parse(localStorage.getItem('lab_o_v7')||'{"sc":0,"pl":[]}');let u=parseInt(localStorage.getItem('l_u')||1);document.getElementById('n').innerText=d.sc;for(let i=1;i<u;i++)document.getElementById('f').innerHTML+="UNIT 0"+(i+1)+": FOX (ACTIVE)<br>";function buyUnit(){if(d.sc>=500){d.sc-=500;u++;localStorage.setItem('l_u',u);localStorage.setItem('lab_o_v7',JSON.stringify(d));location.reload();}}</script></body></html>
