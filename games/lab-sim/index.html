
<!DOCTYPE html><html><head><title>Lab Sim v4</title><style>body{background:#050508;color:#fff;font-family:sans-serif;padding:50px;}.grid{display:grid;grid-template-columns:1fr 350px;gap:40px;max-width:1100px;margin:0 auto;}.card{background:#0A0A0F;border:1px solid rgba(255,255,255,0.05);padding:30px;border-radius:30px;}.stat{font-size:2.5rem;color:#E63946;font-weight:900;}.btn{background:#E63946;color:#fff;padding:15px;border-radius:100px;text-align:center;cursor:pointer;font-weight:700;margin-top:20px;}.lvl{color:#457B9D;font-weight:700;}</style></head><body><h1>Atelier World: Lab Sim</h1><div class="grid"><div class="card"><h2>NEURAL FLEET</h2><div id="f">UNIT 01: ASTRA <span class="lvl">[LVL 1]</span><br></div><div class="btn" onclick="upgrade()">UPGRADE NEURAL DRIVE (250)</div></div><div class="card"><h3>RESERVES</h3><div class="stat" id="n">0</div></div></div><script>let d=JSON.parse(localStorage.getItem('lab_o_v8')||'{"sc":0}');let lvl=parseInt(localStorage.getItem('lab_lvl')||1);document.getElementById('n').innerText=d.sc;document.querySelector('#f .lvl').innerText="[LVL "+lvl+"]";function upgrade(){if(d.sc>=250){d.sc-=250;lvl++;localStorage.setItem('lab_lvl',lvl);localStorage.setItem('lab_o_v8',JSON.stringify(d));location.reload();}}</script></body></html>
