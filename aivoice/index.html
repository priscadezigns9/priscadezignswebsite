<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice | Prisca Dezigns</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
<style>
    :root {
        --deep-purple: #301934;
        --lilac: #C8A2C8;
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.1);
        --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    body {
        background: #0a0a0a;
        color: white;
        font-family: 'Inter', sans-serif;
        margin: 0;
        overflow: hidden;
    }
    .glass-container {
        min-height: 100vh;
        background: radial-gradient(circle at 50% 50%, #1e1021 0%, #0a0a0a 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 30px;
        box-shadow: var(--glass-shadow);
        padding: 60px 40px;
        max-width: 500px;
        width: 100%;
        text-align: center;
    }
    h1 {
        font-size: 3rem;
        font-weight: 900;
        margin-bottom: 5px;
        letter-spacing: -1px;
        background: linear-gradient(to right, #fff, #C8A2C8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .subtitle {
        color: rgba(255, 255, 255, 0.5);
        font-size: 1rem;
        margin-bottom: 40px;
        font-weight: 400;
    }
    .vertical-nav {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
    }
    .nav-button {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.05);
        color: white;
        padding: 18px 25px;
        border-radius: 15px;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        justify-content: space-between;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .nav-button:hover {
        background: rgba(200, 162, 200, 0.2);
        border-color: rgba(200, 162, 200, 0.5);
        transform: translateY(-2px);
    }
    .nav-button::after {
        content: '→';
        opacity: 0;
        transition: 0.3s;
        transform: translateX(-10px);
    }
    .nav-button:hover::after {
        opacity: 1;
        transform: translateX(0);
    }
    .back-home {
        margin-top: 50px;
        color: var(--lilac);
        text-decoration: none;
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        opacity: 0.6;
        transition: 0.3s;
        display: inline-block;
    }
    .back-home:hover {
        opacity: 1;
        letter-spacing: 3px;
    }
</style>

</head>
<body>
    <div class="glass-container">
        <div class="glass-card">
            <h1>AI VOICE</h1>
            <p class="subtitle">Precision Voice Automation</p>
            
            <div class="vertical-nav">
                <a href="/aivoice/receptionist/" class="nav-button">Receptionist</a>
                <a href="/aivoice/sales/" class="nav-button">Sales Agent</a>
                <a href="/aivoice/support/" class="nav-button">Customer Support</a>
                <a href="/aivoice/outbound/" class="nav-button">Outbound Dialer</a>
            </div>

            <a href="/" class="back-home">← EXIT PORTAL</a>
        </div>
    </div>
</body>
</html>
