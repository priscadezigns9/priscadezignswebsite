<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NURASEN | Neural Defense</title>
    <link rel="manifest" href="manifest.json?v=10">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="brand.jpg">
    <style>
        :root { --accent: #00f2ff; --bg: #050505; --surface: #0a0a0a; --text: #ffffff; --text-dim: #666; --success: #00ff88; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; background: rgba(5,5,5,0.95); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; }
        .logo-img-top { height: 45px; width: auto; }
        
        nav { display: flex; gap: 8px; }
        .nav-btn { color: var(--text-dim); background: none; border: 1px solid transparent; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; cursor: pointer; padding: 10px 14px; border-radius: 10px; transition: 0.3s; }
        .nav-btn.active { color: var(--accent); border-color: rgba(0, 242, 255, 0.2); background: rgba(0, 242, 255, 0.05); }
        
        main { flex: 1; width: 100%; max-width: 800px; margin: 0 auto; padding: 20px; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .status-hero { background: var(--surface); padding: 45px 20px; border: 1px solid #1a1a1a; border-radius: 28px; text-align: center; margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.7); position: relative; overflow: hidden; }
        .hero-logo { width: 110px; height: auto; margin-bottom: 20px; border-radius: 12px; }
        .status-title { font-size: 1.7rem; font-weight: 900; margin: 0; letter-spacing: -0.5px; }
        .status-subtitle { color: var(--text-dim); font-size: 0.95rem; margin-top: 10px; line-height: 1.4; }
        
        .card { background: var(--surface); padding: 25px; border: 1px solid #111; border-radius: 28px; margin-bottom: 15px; }
        .card h3 { margin: 0; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; font-weight: 800; margin-bottom: 15px; }
        
        .btn { background: #111; border: 1px solid #222; color: var(--text); display: block; text-align: center; text-decoration: none; padding: 18px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; border-radius: 16px; cursor: pointer; width: 100%; font-weight: 800; transition: 0.3s; margin-top: 15px; }
        .btn:active { transform: scale(0.97); border-color: var(--accent); color: var(--accent); }
        .btn-pay { background: var(--accent); color: #000; border: none; }
        
        footer { padding: 40px; text-align: center; color: #1a1a1a; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; border-top: 1px solid #111; margin-top: 20px; }

        @media (max-width: 400px) {
            .logo-img-top { height: 40px; }
            .nav-btn { padding: 8px 10px; font-size: 0.6rem; }
        }
    </style>
</head>
<body>
    <header>
        <img src="brand.jpg" alt="Nurasen" class="logo-img-top">
        <div class="nav">
            <button class="nav-btn active" onclick="switchView('dashboard', this)">Dash</button>
            <button class="nav-btn" onclick="switchView('billing', this)">Billing</button>
        </div>
    </header>
    <main>
        <section id="dashboard" class="view active">
            <div class="status-hero">
                <img src="shield.jpg" alt="Nurasen Shield" class="hero-logo">
                <p class="status-title">System Secure</p>
                <p class="status-subtitle">Neural Shield is monitoring the Priscion Empire.</p>
            </div>
            <div class="card">
                <h3>Sovereign Authentication</h3>
                <button class="btn" style="border-color: #f6851b; color: #f6851b;" onclick="alert('Linking MetaMask...')">Link MetaMask</button>
                <button class="btn" style="border-color: #ffffff; color: #ffffff;" onclick="alert('Linking VESPR...')">Link VESPR</button>
            </div>
        </section>

        <section id="billing" class="view">
            <div class="status-hero" style="padding: 30px 20px; box-shadow: none; border-color: #111; margin-bottom: 15px;">
                <img src="brand.jpg" alt="Nurasen Brand" class="hero-logo" style="width: 130px; border-radius: 0;">
                <p style="font-size: 0.9rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin: 0; color: var(--accent);">Subscription Node</p>
            </div>
            <div class="card">
                <p style="font-weight:900;color:var(--accent);font-size:1.8rem;text-align:center;margin: 20px 0;">100 $NRL <span style="font-size:0.75rem;color:var(--text-dim);font-weight:500">/ mo</span></p>
                <button class="btn btn-pay" onclick="alert('Transmitted to Sovereign Treasury.')">Pay with $NRL</button>
                <button class="btn" onclick="alert('Transmitted to Sovereign Treasury.')">Pay with ADA</button>
            </div>
        </section>
    </main>
    <footer>PRISCION | NURASEN v1.2.0</footer>
    <script>
        function switchView(viewId, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            btn.classList.add('active');
            window.scrollTo(0,0);
        }
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
