    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --accent: #00f2ff; --bg: #050505; --surface: #0a0a0a; --text: #ffffff; --text-dim: #666; --success: #00ff88; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; background: rgba(5,5,5,0.95); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; }
        .logo-img-top { height: 40px; width: auto; }
        main { flex: 1; width: 100%; max-width: 800px; margin: 0 auto; padding: 20px; }
        .view { display: none; } .view.active { display: block; }
        .status-hero { background: var(--surface); padding: 40px 20px; border: 1px solid #1a1a1a; border-radius: 24px; text-align: center; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); position: relative; overflow: hidden; }
        .hero-logo { width: 90px; height: auto; margin-bottom: 15px; }
        .status-title { font-size: 1.6rem; font-weight: 800; margin: 0; }
        .card { background: var(--surface); padding: 25px; border: 1px solid #111; border-radius: 24px; margin-bottom: 15px; }
        .btn { margin-top: 15px; background: #111; border: 1px solid #222; color: var(--text); display: block; text-align: center; text-decoration: none; padding: 16px; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; border-radius: 14px; cursor: pointer; width: 100%; font-weight: 800; }
        .btn-pay { background: var(--accent); color: #000; border: none; }
        .nav-btn { color: var(--text-dim); background: none; border: none; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; cursor: pointer; padding: 10px; }
        .nav-btn.active { color: var(--accent); }
    </style>
