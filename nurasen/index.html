    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NURASEN | Neural Defense</title>
    <style>
        :root { --accent: #00f2ff; --bg: #050505; --surface: #0a0a0a; --text: #ffffff; --text-dim: #666; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; }
        .logo-wrap { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 35px; width: auto; border-radius: 4px; }
        .logo-text { font-weight: 900; color: var(--accent); letter-spacing: -1px; font-size: 1.3rem; }
        nav a { color: var(--text-dim); text-decoration: none; margin-left: 20px; font-size: 0.75rem; text-transform: uppercase; }
        main { flex: 1; width: 100%; max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .status-hero { background: var(--surface); padding: 50px 20px; border: 1px solid #1a1a1a; border-radius: 12px; text-align: center; margin-bottom: 30px; box-shadow: 0 0 40px rgba(0, 242, 255, 0.03); }
        .hero-logo { width: 100px; height: auto; margin-bottom: 25px; border-radius: 8px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        .status-title { font-size: 2rem; font-weight: bold; margin: 0; letter-spacing: -0.5px; }
        .status-subtitle { color: var(--text-dim); font-size: 1.1rem; margin-top: 12px; }
        .action-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--surface); padding: 30px; border: 1px solid #111; border-radius: 12px; transition: border-color 0.3s; }
        .card:hover { border-color: #222; }
        .card h3 { margin: 0; font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; }
        .btn { margin-top: 25px; background: transparent; border: 1px solid #1a1a1a; color: var(--text-dim); display: block; text-align: center; text-decoration: none; padding: 14px; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; transition: 0.3s; border-radius: 6px; }
        .btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0, 242, 255, 0.02); }
        .stat-row { display: flex; justify-content: space-between; margin-top: 18px; font-size: 0.95rem; border-bottom: 1px solid #111; padding-bottom: 12px; }
        footer { padding: 50px; text-align: center; color: #222; font-size: 0.75rem; border-top: 1px solid #111; margin-top: 60px; letter-spacing: 1px; }
    </style>
