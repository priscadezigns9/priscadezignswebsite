<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NURASEN | Neural Defense</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap">
    <style>
        :root { --neon: #00FF88; --bg: #050505; --surface: #0A0A0A; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        header { padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; }
        .logo-wrap { display: flex; align-items: center; gap: 15px; }
        .logo-icon { width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--neon); }
        .logo-text { font-weight: 900; letter-spacing: 4px; color: var(--neon); font-size: 1.2rem; }
        .hero { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at center, rgba(0, 255, 136, 0.05), transparent); }
        .glitch-title { font-size: 4rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: -2px; }
        .cyber-btn { background: var(--neon); color: #000; padding: 20px 50px; border-radius: 100px; font-weight: 900; text-decoration: none; margin-top: 40px; display: inline-block; transition: 0.4s; box-shadow: 0 0 30px rgba(0, 255, 136, 0.3); cursor: pointer; border: none; }
        .cyber-btn:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(0, 255, 136, 0.5); }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; padding: 100px 10%; }
        .stat-card { background: var(--surface); border: 1px solid #111; padding: 40px; border-radius: 30px; text-align: center; }
        .stat-val { font-size: 2.5rem; font-weight: 900; color: var(--neon); display: block; }
        .stat-lbl { font-size: 0.7rem; color: #444; font-weight: 900; letter-spacing: 2px; }
        .sidebar { position: fixed; right: -420px; top: 0; width: 400px; height: 100vh; background: #000; z-index: 10000; border-left: 1px solid #111; transition: 0.5s; }
        .sidebar.active { right: 0; }
    </style>
</head>
<body>
    <header>
        <div class="logo-wrap">
            <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/logos/nurasen_icon.jpg" class="logo-icon">
            <span class="logo-text">NURASEN</span>
        </div>
        <nav><button onclick="toggleSidebar()" style="background:none; border:1px solid #222; color:#666; padding:10px 20px; border-radius:10px; cursor:pointer; font-weight:900;">WALLET</button></nav>
    </header>
    <main>
        <section class="hero">
            <h1 class="glitch-title">Neural Defense</h1>
            <p style="color:#666; max-width:500px; margin-top:20px;">The world's first AI-driven dVPN and Antivirus anchored to the Priscion Ledger.</p>
            <button class="cyber-btn" onclick="toggleSidebar()">INITIALIZE NODE</button>
        </section>
        <section class="stats">
            <div class="stat-card" style="cursor:pointer;" onclick="triggerPurchase('Nurasen Basic Node', '29', 'PRN', 'Monthly Encryption')"><span class="stat-lbl">BASIC</span><span class="stat-val">$29</span><span class="stat-lbl">MONTHLY</span></div>
            <div class="stat-card" style="cursor:pointer; border-color:var(--neon);" onclick="triggerPurchase('Nurasen Pro Node', '99', 'PRN', 'Annual Security')"><span class="stat-lbl">PRO</span><span class="stat-val">$99</span><span class="stat-lbl">YEARLY</span></div>
            <div class="stat-card" style="cursor:pointer;" onclick="triggerPurchase('Nurasen Enterprise Node', '499', 'PRN', 'Lifetime Sovereign')"><span class="stat-lbl">EMPIRE</span><span class="stat-val">$499</span><span class="stat-lbl">LIFETIME</span></div>
        </section>
    </main>
    <div id="sidebar" class="sidebar"></div>
    <script src="../wallet-core.js"></script>
    <script>
        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            s.classList.toggle('active');
            if(s.classList.contains('active')) initializeWallet('sidebar');
        }
    </script>
</body>
</html>
