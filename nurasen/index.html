<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NURASEN | Neural Defense</title>
    <meta name="theme-color" content="#050505">
    <style>
        :root { --accent: #00f2ff; --bg: #050505; --surface: #0a0a0a; --text: #ffffff; --text-dim: #666; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        /* Clean Header: Identity Asset on User Left, No "All the N" Logo */
        header { padding: 12px 20px; display: flex; justify-content: flex-start; align-items: center; border-bottom: 1px solid #111; background: rgba(5,5,5,0.95); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; }
        .logo-header { height: 40px; width: auto; }
        
        nav { display: flex; gap: 10px; justify-content: center; padding: 12px; background: rgba(0,0,0,0.2); border-bottom: 1px solid #111; }
        .nav-btn { color: var(--text-dim); background: none; border: none; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; cursor: pointer; padding: 10px 15px; border-radius: 10px; transition: 0.3s; }
        .nav-btn.active { color: var(--accent); background: rgba(0, 242, 255, 0.05); }
        
        main { flex: 1; width: 100%; max-width: 500px; margin: 0 auto; padding: 30px 20px; }
        .view { display: none; } .view.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .hero-box { background: var(--surface); padding: 50px 20px; border: 1px solid #1a1a1a; border-radius: 32px; text-align: center; margin-bottom: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.7); }
        .main-logo { width: 140px; height: auto; margin-bottom: 20px; border-radius: 15px; }
        .status-label { font-size: 1.8rem; font-weight: 900; margin: 0; letter-spacing: -1px; }
        
        .action-card { background: var(--surface); padding: 30px; border: 1px solid #111; border-radius: 32px; margin-bottom: 20px; text-align: center; }
        .action-btn { background: #111; border: 1px solid #222; color: var(--text); display: block; text-align: center; padding: 20px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 3px; border-radius: 18px; cursor: pointer; width: 100%; font-weight: 900; text-decoration: none; margin-top: 15px; transition: 0.3s; }
        .action-btn:active { transform: scale(0.96); border-color: var(--accent); }
        
        footer { padding: 50px; text-align: center; color: #1a1a1a; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 4px; font-weight: 800; }
    </style>
</head>
