    <style>
        :root { --accent: #00f2ff; --bg: #050505; --surface: #0a0a0a; --text: #ffffff; --text-dim: #666; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        header { padding: 10px 15px; display: flex; justify-content: flex-end; align-items: center; border-bottom: 1px solid #111; background: rgba(5,5,5,0.95); backdrop-filter: blur(15px); z-index: 1000; position: sticky; top: 0; }
        .logo-img-top { height: 50px; width: auto; border-radius: 4px; }
        
        main { flex: 1; width: 100%; max-width: 600px; margin: 0 auto; padding: 20px; }
        .status-hero { background: var(--surface); padding: 45px 20px; border: 1px solid #1a1a1a; border-radius: 24px; text-align: center; margin-bottom: 20px; position: relative; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        .hero-logo { width: 130px; height: auto; margin-bottom: 20px; border-radius: 12px; }
        .status-title { font-size: 1.8rem; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .status-subtitle { color: var(--text-dim); font-size: 1rem; margin-top: 10px; line-height: 1.4; opacity: 0.8; }
        
        .card { background: var(--surface); padding: 25px; border: 1px solid #111; border-radius: 24px; width: 100%; margin-bottom: 15px; }
        .card h3 { margin: 0; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
        
        .btn { margin-top: 25px; background: #111; border: 1px solid #222; color: var(--text); display: block; text-align: center; text-decoration: none; padding: 20px; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 3px; transition: 0.3s; border-radius: 16px; cursor: pointer; width: 100%; font-weight: 800; }
        .btn:active { background: #1a1a1a; transform: scale(0.97); border-color: var(--accent); color: var(--accent); }
        
        .stat-row { display: flex; justify-content: space-between; margin-top: 15px; font-size: 1rem; border-bottom: 1px solid #111; padding-bottom: 15px; }
        .progress-bar { position: absolute; bottom: 0; left: 0; height: 5px; background: var(--accent); width: 0%; transition: width 0.1s linear; }
        
        footer { padding: 40px 20px; text-align: center; color: #1a1a1a; font-size: 0.7rem; border-top: 1px solid #111; margin-top: 40px; text-transform: uppercase; letter-spacing: 3px; font-weight: 600; }
    </style>
</head>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function startScan() {
            const title = document.getElementById('status-title');
            const subtitle = document.getElementById('status-subtitle');
            const progress = document.getElementById('progress');
            const btn = event.target;
            
            btn.disabled = true;
            btn.innerText = "Scanning...";
            title.innerText = "Analyzing Nodes...";
            subtitle.innerText = "Neural sentinel traversing the empire architecture.";
            
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    title.innerText = "Scan Complete";
                    subtitle.innerText = "Perimeter verified. No anomalies detected.";
                    progress.style.width = '0%';
                    btn.disabled = false;
                    btn.innerText = "Run Sentinel Scan";
                    
                    setTimeout(() => {
                        title.innerText = "System Secure";
                        subtitle.innerText = "Neural Shield is monitoring the Priscion Empire.";
                    }, 4000);
                } else {
                    width += 1.5;
                    progress.style.width = width + '%';
                }
            }, 40);
        }
    </script>
