<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NURASEN | Neural Defense</title>
    <style>
        :root { --accent: #00f2ff; --bg: #050505; --surface: #0a0a0a; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #111; }
        .logo { font-weight: 900; color: var(--accent); }
        nav a { color: #666; text-decoration: none; margin-left: 20px; font-size: 0.8rem; text-transform: uppercase; }
        .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .shield { width: 150px; height: 150px; border: 1px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; box-shadow: 0 0 20px #00f2ff22; }
        .status-card { background: var(--surface); padding: 20px 40px; border: 1px solid #1a1a1a; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; max-width: 800px; margin-top: 40px; }
        .card { background: var(--surface); padding: 15px; border: 1px solid #111; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo">NURASEN</div>
        <nav><a href="#">Login</a><a href="#">Dashboard</a><a href="#">Blog</a></nav>
    </header>
    <main class="hero">
        <div class="shield">ACTIVE</div>
        <div class="status-card">SYSTEM HEALTH: SECURE</div>
        <div class="grid">
            <div class="card">DESKTOP: SAFE</div>
            <div class="card">MOBILE: SAFE</div>
            <div class="card">THREATS: 0</div>
        </div>
    </main>
</body>
</html>
