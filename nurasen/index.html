<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NURASEN | Neural Defense</title>
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --accent: #00f2ff; --bg: #050505; --surface: #0a0a0a; --text: #ffffff; --text-dim: #666; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; background: rgba(5,5,5,0.95); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; }
        .logo-l { height: 40px; width: auto; }
        .logo-r { height: 40px; width: auto; }
        nav { display: flex; gap: 8px; justify-content: center; padding: 10px; background: rgba(0,0,0,0.3); border-bottom: 1px solid #111; }
        .nav-btn { color: var(--text-dim); background: none; border: none; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; cursor: pointer; padding: 10px; border-radius: 8px; transition: 0.3s; }
        .nav-btn.active { color: var(--accent); background: rgba(0, 242, 255, 0.05); }
        main { flex: 1; width: 100%; max-width: 600px; margin: 0 auto; padding: 20px; }
        .view { display: none; } .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .hero { background: var(--surface); padding: 40px 20px; border: 1px solid #1a1a1a; border-radius: 28px; text-align: center; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        .hero-img { width: 120px; height: auto; margin-bottom: 15px; border-radius: 12px; }
        .status-t { font-size: 1.7rem; font-weight: 900; margin: 0; letter-spacing: -0.5px; }
        .card { background: var(--surface); padding: 25px; border: 1px solid #111; border-radius: 28px; margin-bottom: 15px; text-align: center; }
        .btn { background: #111; border: 1px solid #222; color: var(--text); display: block; text-align: center; padding: 18px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; border-radius: 16px; cursor: pointer; width: 100%; font-weight: 800; text-decoration: none; margin-top: 15px; transition: 0.3s; }
        footer { padding: 40px; text-align: center; color: #1a1a1a; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; }
    </style>
</head>
