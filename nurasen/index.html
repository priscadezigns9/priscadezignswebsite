<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NURASEN | Neural Defense</title>
    <meta name="theme-color" content="#050505">
    <style>
        :root { --accent: #00f2ff; --bg: #050505; --surface: #0a0a0a; --text: #ffffff; --text-dim: #666; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; background: rgba(5,5,5,0.95); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; }
        .logo-l { height: 40px; width: auto; }
        .logo-r { height: 40px; width: auto; }
        nav { display: flex; gap: 10px; justify-content: center; padding: 10px; border-bottom: 1px solid #111; }
        .nav-btn { color: var(--text-dim); background: none; border: none; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; cursor: pointer; padding: 10px; border-radius: 8px; }
        .nav-btn.active { color: var(--accent); background: rgba(0,242,255,0.05); }
        main { flex: 1; width: 100%; max-width: 600px; margin: 0 auto; padding: 20px; }
        .view { display: none; } .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .hero { background: var(--surface); padding: 40px 20px; border: 1px solid #1a1a1a; border-radius: 24px; text-align: center; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .hero-img { width: 110px; height: auto; margin-bottom: 15px; }
        .card { background: var(--surface); padding: 25px; border: 1px solid #111; border-radius: 24px; margin-bottom: 15px; text-align: center; }
        .btn { background: #111; border: 1px solid #222; color: var(--text); display: block; padding: 18px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; border-radius: 16px; cursor: pointer; width: 100%; font-weight: 800; text-decoration: none; margin-top: 15px; }
        footer { padding: 40px; text-align: center; color: #1a1a1a; font-size: 0.6rem; letter-spacing: 3px; font-weight: 700; }
    </style>
</head>
<body>
    <script>
        // Force unregister broken service workers to fix blank screen
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) { registration.unregister(); }
        });
    </script>
    <header>
        <img src="https://priscadezigns.org/nurasen/brand.jpg" class="logo-l">
        <img src="https://priscadezigns.org/nurasen/logo_right.jpg" class="logo-r">
    </header>
    <nav>
        <button class="nav-btn active" onclick="switchView('dash', this)">Dash</button>
        <button class="nav-btn" onclick="switchView('bill', this)">Billing</button>
    </nav>
    <main>
        <section id="dash" class="view active">
            <div class="hero">
                <img src="https://priscadezigns.org/nurasen/shield.jpg" class="hero-img">
                <h2 style="margin:0">System Secure</h2>
            </div>
            <div class="card">
                <button class="btn" style="border-color:#f6851b;color:#f6851b">Link Wallet</button>
            </div>
        </section>
        <section id="bill" class="view">
            <div class="hero" style="padding:20px; box-shadow:none">
                <img src="https://priscadezigns.org/nurasen/brand.jpg" class="hero-img" style="width:120px">
            </div>
            <div class="card">
                <h1 style="color:var(--accent)">100 $NRL</h1>
                <button class="btn" style="background:var(--accent);color:#000;border:none">Pay with $NRL</button>
            </div>
        </section>
    </main>
    <footer>PRISCION | NURASEN v2.0.0</footer>
    <script>
        function switchView(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
