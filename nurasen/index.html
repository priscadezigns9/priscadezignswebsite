<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NURASEN | Neural Defense</title>
    <style>
        :root { --accent: #00f2ff; --bg: #050505; --surface: #0a0a0a; --text: #ffffff; --text-dim: #666; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; background: rgba(5,5,5,0.95); position: sticky; top: 0; z-index: 1000; }
        .logo-l { height: 35px; width: auto; }
        .logo-r { height: 35px; width: auto; }
        nav { display: flex; gap: 8px; justify-content: center; padding: 10px; border-bottom: 1px solid #111; }
        .nav-btn { color: var(--text-dim); background: none; border: none; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; cursor: pointer; padding: 10px; }
        .nav-btn.active { color: var(--accent); }
        main { flex: 1; width: 100%; max-width: 600px; margin: 0 auto; padding: 20px; }
        .view { display: none; } .view.active { display: block; }
        .hero { background: var(--surface); padding: 40px 20px; border: 1px solid #1a1a1a; border-radius: 24px; text-align: center; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .hero-img { width: 100px; height: auto; margin-bottom: 15px; }
        .card { background: var(--surface); padding: 25px; border: 1px solid #111; border-radius: 24px; text-align: center; }
        .btn { background: #111; border: 1px solid #222; color: var(--text); display: block; padding: 18px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; border-radius: 16px; width: 100%; font-weight: 800; text-decoration: none; margin-top: 15px; }
        footer { padding: 30px; text-align: center; color: #1a1a1a; font-size: 0.6rem; letter-spacing: 3px; font-weight: 700; }
    </style>
</head>
