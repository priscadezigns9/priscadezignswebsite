<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NURASEN | Neural Defense</title>
    <link rel="manifest" href="manifest.json?v=50">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --accent: #00f2ff; --bg: #050505; --surface: #0a0a0a; --text: #ffffff; --text-dim: #666; --success: #00ff88; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; background: rgba(5,5,5,0.95); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; }
        .logo-left { height: 45px; width: auto; }
        .logo-right { height: 45px; width: auto; }
        nav { display: flex; gap: 8px; justify-content: center; padding: 10px; background: rgba(0,0,0,0.3); border-bottom: 1px solid #111; }
        .nav-btn { color: var(--text-dim); background: none; border: none; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; cursor: pointer; padding: 10px; }
        .nav-btn.active { color: var(--accent); }
        main { flex: 1; width: 100%; max-width: 800px; margin: 0 auto; padding: 20px; }
        .view { display: none; } .view.active { display: block; }
        .status-hero { background: var(--surface); padding: 40px 20px; border: 1px solid #1a1a1a; border-radius: 24px; text-align: center; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        .hero-logo { width: 100px; height: auto; margin-bottom: 15px; }
        .status-title { font-size: 1.6rem; font-weight: 800; margin: 0; }
        .card { background: var(--surface); padding: 25px; border: 1px solid #111; border-radius: 24px; margin-bottom: 15px; }
        .btn { background: #111; border: 1px solid #222; color: var(--text); display: block; text-align: center; text-decoration: none; padding: 16px; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; border-radius: 14px; cursor: pointer; width: 100%; font-weight: 800; margin-top: 15px; }
        footer { padding: 30px; text-align: center; color: #1a1a1a; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <header>
        <img src="brand.jpg" class="logo-left">
        <img src="logo_right.jpg" class="logo-right">
    </header>
    <nav><button class="nav-btn active" onclick="switchView('dashboard', this)">Dash</button><button class="nav-btn" onclick="switchView('billing', this)">Billing</button></nav>
    <main>
        <section id="dashboard" class="view active">
            <div class="status-hero"><img src="shield.jpg" class="hero-logo"><p class="status-title">System Secure</p></div>
            <div class="card"><button class="btn" style="border-color:#f6851b;color:#f6851b">Link Sovereign Wallet</button></div>
        </section>
        <section id="billing" class="view">
            <div class="status-hero" style="padding: 25px; box-shadow: none; border-color: #111;"><img src="brand.jpg" class="hero-logo" style="width: 120px;"></div>
            <div class="card"><p style="font-weight:900;color:var(--accent);font-size:1.8rem;text-align:center">100 $NRL</p><button class="btn" style="background:var(--accent);color:#000;border:none">Pay with $NRL</button></div>
        </section>
    </main>
    <script>
        function switchView(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
