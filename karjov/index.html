<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karjov | AI Social Scaling & Management | Prisca Dezigns</title>
  <meta name="description" content="Karjov is an intelligent social scaling and management platform. Automate posting, schedule across all platforms, and dominate every feed.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #0EA5E9;
      --bg: #050508;
      --card: #0F172A;
      --text: #F8FAFC;
      --text-dim: #94A3B8;
      --border: rgba(14, 165, 233, 0.2);
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    header { padding: 24px 0; border-bottom: 1px solid var(--border); background: rgba(5, 5, 8, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; }
    nav { display: flex; justify-content: space-between; align-items: center; }
    .logo img { height: 32px; }
    .btn { display: inline-block; padding: 10px 24px; border-radius: 8px; font-weight: 600; text-decoration: none; transition: all 0.2s; cursor: pointer; border: none; font-size: 0.9rem;}
    .btn-primary { background-color: var(--primary); color: white; }
    .btn-secondary { background-color: rgba(14, 165, 233, 0.1); color: var(--primary); border: 1px solid var(--border); }
    .hero { padding: 120px 0 80px; text-align: center; background: radial-gradient(circle at center, rgba(14, 165, 233, 0.1) 0%, transparent 70%); }
    .hero h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 900; margin-bottom: 24px; letter-spacing: -2px; line-height: 1.1; }
    .hero h1 span { color: var(--primary); }
    .hero p { font-size: 1.25rem; color: var(--text-dim); max-width: 700px; margin: 0 auto 40px; }
    .pricing { padding: 100px 0; }
    .pricing-header { text-align: center; margin-bottom: 60px; }
    .pricing-toggle { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 48px; }
    .toggle-label { font-weight: 600; color: var(--text-dim); font-size: 0.9rem; }
    .toggle-label.active { color: var(--text); }
    .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--card); border: 1px solid var(--border); transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 3px; background-color: var(--primary); transition: .4s; border-radius: 50%; }
    input:checked + .slider:before { transform: translateX(24px); }
    .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 32px; }
    .pricing-card { background-color: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 48px; display: flex; flex-direction: column; transition: transform 0.3s ease; }
    .pricing-card:hover { transform: translateY(-5px); border-color: var(--primary); }
    .pricing-card.featured { border-color: var(--primary); position: relative; }
    .price { font-size: 3.5rem; font-weight: 800; margin-bottom: 24px; letter-spacing: -1px; }
    .price span { font-size: 1rem; color: var(--text-dim); font-weight: 400; }
    .pricing-features { list-style: none; margin-bottom: 40px; flex-grow: 1; }
    .pricing-features li { margin-bottom: 16px; color: var(--text-dim); display: flex; align-items: center; gap: 12px; }
    .pricing-features li::before { content: "✓"; color: var(--primary); font-weight: bold; }
    footer { padding: 80px 0; border-top: 1px solid var(--border); text-align: center; color: var(--text-dim); }
    footer img { height: 48px; margin-bottom: 12px; opacity: 0.8; }

    /* Payment Modal Styles */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); color: #1a1a1a; text-align: left; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border: 1px solid rgba(0,0,0,0.1); max-width: 480px; width: 100%; border-radius: 16px; padding: 40px 36px; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-close { position: absolute; top: 16px; right: 20px; font-size: 1.4rem; cursor: pointer; color: #666; transition: color 0.2s; }
    .modal h3 { font-family: sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--primary, #0EA5E9); margin-bottom: 6px; }
    .modal-sub { font-size: 0.83rem; color: #666; margin-bottom: 28px; line-height: 1.6; }
    .pay-method { border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s
