<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Automate My Business — Karjov</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080500;color:#F5E8C0;font-family:'IBM Plex Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:60px 24px 80px}
a{text-decoration:none;color:inherit}
:root{--amber:#F59E0B;--amber2:#D97706;--dim:#5A4A20;--muted:#8A7040;--border:rgba(245,158,11,0.12);--surface:#0C0800}

.top{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:540px;margin-bottom:48px}
.nav-logo{font-family:'IBM Plex Mono',monospace;font-size:1rem;font-weight:700;color:var(--amber);letter-spacing:2px}
.back{font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--muted);transition:color 0.2s}
.back:hover{color:#F5E8C0}

.card{width:100%;max-width:540px;background:var(--surface);border:1px solid var(--border);padding:44px 40px}
.card-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;color:var(--amber);letter-spacing:4px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.card-eyebrow::before{content:'';width:28px;height:1px;background:var(--amber)}
.card h1{font-family:'IBM Plex Mono',monospace;font-size:1.8rem;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px;line-height:1.15}
.card h1 span{color:var(--amber)}
.card p.sub{color:var(--muted);font-size:0.88rem;margin-bottom:36px;line-height:1.65}

.field{margin-bottom:20px}
label{display:block;font-family:'IBM Plex Mono',monospace;font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:7px}
input,textarea,select{width:100%;background:#100900;border:1px solid var(--border);padding:12px 14px;color:#F5E8C0;font-family:'IBM Plex Mono',monospace;font-size:0.85rem;outline:none;transition:border-color 0.2s;-webkit-appearance:none;border-radius:0}
input:focus,textarea:focus,select:focus{border-color:var(--amber)}
textarea{resize:vertical;min-height:100px;line-height:1.6}
select option{background:#0C0800}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.divider{height:1px;background:var(--border);margin:28px 0}

.submit{width:100%;background:var(--amber);color:#080500;border:none;padding:16px;font-family:'IBM Plex Mono',monospace;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:8px;letter-spacing:1px}
.submit:hover{background:var(--amber2)}
.note{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--dim);text-align:center;margin-top:14px;line-height:1.7;letter-spacing:0.5px}
</style>
</head>
<body>

<div class="top">
  <div class="nav-logo">KARJOV</div>
  <a class="back" href="/karjov/">← BACK</a>
</div>

<div class="card">
  <div class="card-eyebrow">Automation Brief</div>
  <h1>Tell us what<br/>to <span>automate.</span></h1>
  <p class="sub">Fill this in and we'll identify the exact workflows to automate in your business — and send you a setup plan within 24 hours.</p>

  <div class="row">
    <div class="field"><label>Name *</label><input type="text" placeholder="Full name"/></div>
    <div class="field"><label>WhatsApp *</label><input type="tel" placeholder="+1 868 000 0000"/></div>
  </div>
  <div class="field"><label>Email *</label><input type="email" placeholder="you@example.com"/></div>
  <div class="field"><label>Business / Organisation</label><input type="text" placeholder="Optional"/></div>
  <div class="field">
    <label>What eats most of your time? *</label>
    <select>
      <option value="">Select the biggest time-waster...</option>
      <option>Following up with leads / clients</option>
      <option>Sending invoices & chasing payments</option>
      <option>Scheduling & appointment management</option>
      <option>Social media posting</option>
      <option>Data entry & reporting</option>
      <option>WhatsApp / customer replies</option>
      <option>Multiple things — all of the above</option>
    </select>
  </div>
  <div class="field"><label>Describe your current process *</label><textarea placeholder="Walk us through how things work right now — what tools you use, where things fall through the cracks, and what you wish happened automatically."></textarea></div>
  <div class="field">
    <label>Team size</label>
    <select><option value="">Select...</option><option>Just me</option><option>2–5 people</option><option>6–20 people</option><option>20+ people</option></select>
  </div>
  <div class="field"><label>How did you find us?</label><select><option value="">Select...</option><option>Facebook</option><option>Instagram</option><option>Google</option><option>Referral</option><option>Other</option></select></div>

  <div class="divider"></div>
  <button class="submit">SUBMIT → AUTOMATE MY BUSINESS</button>
  <p class="note">RESPONSE WITHIN 24H · SETUP STARTS IN 48H · NO LOCK-IN CONTRACTS</p>
</div>

</body>
</html>
