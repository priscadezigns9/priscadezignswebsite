<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Lab | Prisca Dezigns</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Fraunces:opsz,wght@9..144,400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FAFAFA; --text: #1A1A1A; --accent: #7B35D4; --dim: #666; --border: rgba(0,0,0,0.08); --font-heading: 'Fraunces', serif; --font-body: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); margin: 0; padding: 80px 5% 100px; line-height: 1.6; }
        header { max-width: 1100px; margin: 0 auto 80px; display: flex; align-items: center; justify-content: space-between; }
        .header-logo { height: 40px; }
        h1 { font-family: var(--font-heading); font-size: 3.5rem; margin: 0; letter-spacing: -2px; font-weight: 700; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1100px; margin: 0 auto; }
        .product-card { background: #fff; border: 1px solid var(--border); border-radius: 24px; padding: 35px; text-decoration: none; color: inherit; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; text-align: center; }
        .product-card:hover { transform: translateY(-12px); box-shadow: 0 30px 60px rgba(0,0,0,0.06); border-color: var(--accent); }
        .logo-box { width: 70px; height: 70px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .product-card h3 { font-family: var(--font-heading); font-size: 1.5rem; margin: 0 0 12px; font-weight: 700; }
        .product-card p { font-size: 0.95rem; color: var(--dim); margin: 0; }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <header class="reveal">
        <a href="/"><img src="/logos/prisca-dezigns-wordmark.svg" alt="Prisca Dezigns" class="header-logo"></a>
        <span style="font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); font-weight: 600;">SaaS Lab</span>
    </header>
    <div style="max-width: 1100px; margin: 0 auto 60px;" class="reveal"><h1>Neural Products.</h1></div>
    <div class="product-grid">
        <a href="/rowcell/" class="product-card reveal"><div class="logo-box"><img src="/logos/rowcell_grid.svg"></div><h3>Rowcell</h3><p>Neural Spreadsheet Architecture.</p></a>
        <a href="/velloq/" class="product-card reveal"><div class="logo-box"><img src="/logos/velloq_logo_official.png"></div><h3>Velloq</h3><p>Autonomous Architecture Engine.</p></a>
        <a href="/moblync/" class="product-card reveal"><div class="logo-box"><img src="/logos/moblync_logo_official.png"></div><h3>Moblync</h3><p>Mobile-First Neural Deployment.</p></a>
        <a href="/cupyx/" class="product-card reveal"><div class="logo-box"><img src="/logos/cupyx_logo.png"></div><h3>Cupyx</h3><p>Narrative Scaling Infrastructure.</p></a>
        <a href="/karjov/" class="product-card reveal"><div class="logo-box"><img src="/logos/karjov_logo_official.png"></div><h3>Karjov</h3><p>Financial Intelligence Lab.</p></a>
    </div>
    <script>
        const obs = new IntersectionObserver((es) => { es.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }); }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    </script>
</body>
</html>
