<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <img src="icons/icon48.png" alt="Logo" class="logo">
      <h1>NURASEN</h1>
      <p class="tagline">Quantum-Secure Signal Inspection</p>
    </header>

    <div class="status-box">
      <div id="status-light" class="light"></div>
      <span id="threat-level">SCANNING...</span>
    </div>

    <div class="stats-container">
      <div class="stat">
        <span class="label">Trackers</span>
        <span id="tracker-count" class="value">0</span>
      </div>
      <div class="stat">
        <span class="label">Insecure</span>
        <span id="insecure-count" class="value">0</span>
      </div>
      <div class="stat">
        <span class="label">Suspicious</span>
        <span id="suspicious-count" class="value">0</span>
      </div>
    </div>

    <div class="actions">
      <button id="upgrade-btn">UPGRADE TO PRO</button>
      <a href="options.html" id="settings-link">Settings</a>
    </div>

    <footer>
      <span>Priscion Empire</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
