<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nurasen Options</title>
  <style>
    body {
      background-color: #000000;
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      padding: 40px;
    }
    h1 { color: #00FFFF; font-weight: 900; }
    .card {
      background: #050505;
      border: 1px solid #00FFFF33;
      padding: 20px;
      margin-bottom: 20px;
      max-width: 600px;
    }
    .pro-banner {
      background: linear-gradient(90deg, #00FFFF, #005555);
      color: #000;
      padding: 20px;
      font-weight: 900;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 4px;
    }
    button {
      background: #000;
      color: #00FFFF;
      border: 2px solid #000;
      padding: 10px 20px;
      font-weight: 900;
      cursor: pointer;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .stat-item {
      border-bottom: 1px solid #222;
      padding: 10px 0;
    }
    .stat-val { color: #00FFFF; font-weight: 900; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>
  <h1>Nurasen Neural Defense</h1>
  <p>Settings & Configuration</p>

  <div class="pro-banner">
    <div>
      GO PRO FOR $5.99/MO<br>
      <small>Unlocks Real-time Phishing API & VPN Leak Protection</small>
    </div>
    <button id="upgrade-pro">UPGRADE NOW</button>
  </div>

  <div class="card">
    <h2>Global Stats</h2>
    <div class="stats-grid">
      <div class="stat-item">Total Pages Scanned: <span id="stat-scans" class="stat-val">0</span></div>
      <div class="stat-item">Threats Detected: <span id="stat-threats" class="stat-val">0</span></div>
    </div>
  </div>

  <div class="card">
    <h2>Security Preferences</h2>
    <label>
      <input type="checkbox" id="block-trackers" checked disabled> Block known trackers (Pro only)
    </label><br><br>
    <label>
      <input type="checkbox" id="phishing-api" disabled> Real-time Phishing API (Pro only)
    </label>
  </div>

  <script src="options.js"></script>
</body>
</html>
