<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atelia Gaming | Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #D32F2F; --orange: #FF6B00; --white: #FFFFFF; --black: #050505; }
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--black); color: var(--white); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        header { background: #000; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); z-index: 10000; }
        .logo-img { height: 35px; }
        #game-container { flex: 1; width: 100%; background: #050505 url('https://images.unsplash.com/photo-1475274047050-1d0c0975c63e?w=1600&q=80') center center / cover no-repeat; position: relative; overflow: hidden; }
        #player { width: 120px; height: 120px; position: absolute; bottom: 50px; left: 100px; z-index: 10; pointer-events: none; }
        .obs { width: 400px; height: 400px; position: absolute; bottom: 30px; border: 10px solid var(--orange); border-radius: 50%; box-shadow: 0 0 20px var(--orange); background: rgba(255,107,0,0.05); z-index: 5; }
        #score-ui { position: absolute; top: 20px; right: 20px; z-index: 100; font-family: 'Bangers'; font-size: 2.5rem; text-shadow: 0 0 10px var(--red); pointer-events: none; }
        #select-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .selection-grid { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }
        .char-opt { text-align: center; cursor: pointer; padding: 5px; border: 2px solid transparent; width: 120px; }
        .char-opt.active { background: #222; border-color: var(--white); }
        .char-opt img { height: 140px; width: 100%; object-fit: contain; }
        #start-btn { margin-top: 20px; padding: 10px 30px; background: var(--red); color: white; border: 2px solid white; font-family: 'Russo One'; font-size: 1.4rem; cursor: pointer; z-index: 1100; }
        #results-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        #auth-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .auth-form { background: #111; padding: 30px; border: 1px solid var(--red); display: flex; flex-direction: column; gap: 10px; width: 280px; }
        .auth-form input { padding: 10px; background: #222; border: 1px solid #333; color: white; outline: none; }
        .auth-btn { padding: 10px; background: var(--red); color: white; border: none; font-family: 'Russo One'; cursor: pointer; }
        #profile-hub { position: absolute; top: 15px; left: 15px; z-index: 100; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 15px; }
        #p-avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--orange); object-fit: cover; }
        #dashboard-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 6000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <header>
        <a href="index.html"><img src="https://priscadezigns.org/logos/atelier-gaming.png" class="logo-img"></a>
        <div style="font-family:'Russo One'; font-size:1rem; color:var(--red);">ARENA V1.0</div>
        <button onclick="openDash()" style="color:white; font-family:'Russo One'; font-size:0.8rem; border:1px solid #444; padding:5px 10px; background:#111; cursor:pointer;">DASHBOARD</button>
        <a href="/ateliagaming/" style="color:#666; font-family:'Russo One'; font-size:0.7rem; text-decoration:none;">EXIT</a>
    </header>
    <div id="game-container">
        <div id="profile-hub" style="display: none;">
            <img id="p-avatar" src="">
            <div style="font-size:10px;"><div id="p-username">VANGUARD</div><div id="p-prestige" style="color:var(--orange);">0 ATLR</div></div>
        </div>
        <div id="auth-overlay">
            <div class="auth-form" id="login-form">
                <h3 style="font-family:'Bangers'; color:white; text-align:center; margin:0;">LOGIN</h3>
                <input type="email" id="email" placeholder="EMAIL">
                <input type="password" id="password" placeholder="PASSWORD">
                <button class="auth-btn" onclick="handleLogin()">ENTER ARENA</button>
                <p style="font-size:10px; color:#666; text-align:center;">NEW? <span onclick="toggleA()" style="color:var(--red); cursor:pointer;">SIGN UP</span></p>
                <button onclick="closeAuth()" style="background:none; border:none; color:#444; font-size:10px; cursor:pointer; margin-top:10px;">[CLOSE]</button>
            </div>
            <div class="auth-form" id="signup-form" style="display:none;">
                <h3 style="font-family:'Bangers'; color:white; text-align:center; margin:0;">SIGN UP</h3>
                <input type="text" id="reg-user" placeholder="USERNAME">
                <input type="email" id="reg-email" placeholder="EMAIL">
                <input type="password" id="reg-password" placeholder="PASSWORD">
                <button class="auth-btn" onclick="handleReg()">CREATE VANGUARD</button>
                <p style="font-size:10px; color:#666; text-align:center;">MEMBER? <span onclick="toggleA()" style="color:var(--red); cursor:pointer;">LOGIN</span></p>
            </div>
        </div>
        <div id="score-ui">SCORE: <span id="score-text">000</span></div>
        <img id="player" src="https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp">
        <div id="select-screen">
            <h2 style="font-family:'Bangers'; font-size:2.5rem; margin:0;">SELECT VANGUARD</h2>
            <div class="selection-grid">
                <div class="char-opt active" onclick="selChar('astra')" id="o-astra"><img src="https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp"><p style="margin:0; font-family:'Bangers';">ASTRA</p></div>
                <div class="char-opt" onclick="selChar('mimi')" id="o-mimi"><img src="https://priscadezigns.org/ateliagaming/assets/mimi/mimi_full_body_2d.webp"><p style="margin:0; font-family:'Bangers';">MIMI</p></div>
                <div class="char-opt" onclick="selChar('nova')" id="o-nova"><img src="https://priscadezigns.org/ateliagaming/assets/nova/nova_v4.webp"><p style="margin:0; font-family:'Bangers';">NOVA</p></div>
                <div class="char-opt" onclick="selChar('echo')" id="o-echo"><img src="https://priscadezigns.org/ateliagaming/assets/echo/echo_2d_hf.webp"><p style="margin:0; font-family:'Bangers';">ECHO</p></div>
            </div>
            <button id="start-btn" onclick="launchGame()">START ARENA</button>
        </div>
        <div id="results-modal">
            <h1 style="font-family:'Bangers'; font-size:4rem; color:var(--red); margin:0;">WRECKED!</h1>
            <p style="font-family:'Russo One'; font-size:1.5rem;">SCORE: <span id="res-score">0</span></p>
            <button onclick="restart()" style="background:var(--red); color:white; border:2px solid white; padding:10px 30px; font-family:'Russo One'; cursor:pointer;">RE-ENTER</button>
        </div>
    </div>
    <div id="dashboard-modal">
        <div style="width:90%; max-width:400px; background:#111; border:1px solid var(--orange); border-radius:10px; padding:20px; position:relative;">
            <button onclick="closeDash()" style="position:absolute; top:10px; right:10px; background:none; border:none; color:#888; cursor:pointer;">✕</button>
            <h2 style="font-family:'Bangers'; color:white; text-align:center; margin-top:0;">DASHBOARD</h2>
            <div style="display:flex; flex-direction:column; gap:10px; font-family:'Russo One'; font-size:0.9rem;">
                <div style="display:flex; justify-content:space-between;"><span>TOTAL ATLR:</span><span id="d-atlr" style="color:var(--orange);">0</span></div>
                <div style="display:flex; justify-content:space-between;"><span>HIGH SCORE:</span><span id="d-high" style="color:var(--orange);">0</span></div>
            </div>
            <button onclick="handleLogout()" style="width:100%; margin-top:20px; background:none; border:1px solid #333; color:#555; padding:5px; cursor:pointer;">LOGOUT</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/ateliagaming/js/atelia_supabase.js?v=5"></script>
    <script>
        const assets = {
            astra: { sel: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp', r: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_running.webp', j: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_jumping.webp', flip: false },
            mimi: { sel: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_full_body_2d.webp', r: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_running.webp', j: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_jumping.webp', flip: true },
            nova: { sel: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_v4.webp', r: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_running.webp', j: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_jumping.webp', flip: true },
            echo: { sel: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_2d_hf.webp', r: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_running.webp', j: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_jumping.webp', flip: true }
        };
        let char = 'astra', score = 0, active = false, jumping = false, spawnTimeout, activeIntervals = [];
        const player = document.getElementById('player'), scoreTxt = document.getElementById('score-text'), gameArea = document.getElementById('game-container');

        window.addEventListener('load', function() {
            if (window.Atelia) {
                Atelia.auth.onAuthStateChange(async (e, s) => {
                    if (s?.user) {
                        document.getElementById('profile-hub').style.display = 'flex';
                        document.getElementById('auth-overlay').style.display = 'none';
                        const p = await Atelia.arena.getProfile(s.user.id);
                        document.getElementById('p-username').innerText = (p.username || 'Vanguard').toUpperCase();
                        document.getElementById('p-prestige').innerText = (p.atlr_prestige || 0) + ' ATLR';
                        document.getElementById('p-avatar').src = assets[char].sel;
                    } else {
                        document.getElementById('profile-hub').style.display = 'none';
                    }
                });
            }
        });

        function selChar(c) { 
            char = c; 
            document.querySelectorAll('.char-opt').forEach(o => o.classList.remove('active')); 
            document.getElementById('o-' + c).classList.add('active'); 
            player.src = assets[c].sel; 
            player.style.transform = assets[c].flip ? 'scaleX(-1)' : 'scaleX(1)'; 
        }

        async function launchGame() {
            if(!window.Atelia) return;
            const { data } = await Atelia.auth.getUser();
            if (!data?.user) {
                document.getElementById('auth-overlay').style.display = 'flex';
                return;
            }
            active = true;
            document.getElementById('select-screen').style.display = 'none';
            score = 0; scoreTxt.innerText = '000';
            player.style.bottom = '50px'; player.src = assets[char].r;
            player.style.transform = assets[char].flip ? 'scaleX(-1)' : 'scaleX(1)';
            runSpawn();
        }

        function runSpawn() {
            if (!active) return;
            let obs = document.createElement('div'); obs.className = 'obs'; obs.style.right = '-600px'; gameArea.appendChild(obs);
            let move = setInterval(() => {
                if (!active) { clearInterval(move); return; }
                let r = parseInt(obs.style.right);
                if (r > gameArea.clientWidth + 600) { 
                    clearInterval(move); if (obs.parentNode) gameArea.removeChild(obs); 
                    score++; scoreTxt.innerText = score.toString().padStart(3, '0'); 
                }
                let p = player.getBoundingClientRect(), o = obs.getBoundingClientRect();
                if (p.right > o.left + 50 && p.left < o.right - 50 && p.bottom > o.top + 50) { 
                    endGame(); clearInterval(move); 
                }
                obs.style.right = (r + 12 + (score/5)) + 'px';
            }, 20);
            activeIntervals.push(move);
            spawnTimeout = setTimeout(runSpawn, 3000 + Math.random() * 2000);
        }

        function endGame() {
            active = false; clearTimeout(spawnTimeout); activeIntervals.forEach(clearInterval);
            document.getElementById('res-score').innerText = score;
            document.getElementById('results-modal').style.display = 'flex';
            Atelia.arena.saveScore(score, char);
        }

        function restart() {
            document.getElementById('results-modal').style.display = 'none';
            document.getElementById('select-screen').style.display = 'flex';
            document.querySelectorAll('.obs').forEach(o => o.remove());
        }

        async function openDash() {
            if(!window.Atelia) return;
            const { data } = await Atelia.auth.getUser();
            if (data?.user) {
                const p = await Atelia.arena.getProfile(data.user.id);
                document.getElementById('d-atlr').innerText = p.atlr_prestige || 0;
                document.getElementById('d-high').innerText = p.high_score || 0;
                document.getElementById('dashboard-modal').style.display = 'flex';
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
            }
        }
        function closeDash() { document.getElementById('dashboard-modal').style.display = 'none'; }
        function closeAuth() { document.getElementById('auth-overlay').style.display = 'none'; }
        function toggleA() {
            const l = document.getElementById('login-form'), s = document.getElementById('signup-form');
            l.style.display = l.style.display === 'none' ? 'flex' : 'none';
            s.style.display = s.style.display === 'none' ? 'flex' : 'none';
        }
        async function handleLogin() { await Atelia.auth.signIn(document.getElementById('email').value, document.getElementById('password').value); }
        async function handleReg() { await Atelia.auth.signUp(document.getElementById('reg-email').value, document.getElementById('reg-password').value, document.getElementById('reg-user').value); }
        function handleLogout() { Atelia.auth.signOut(); }

        function doJump() {
            if (!active || jumping) return;
            jumping = true; player.src = assets[char].j;
            let pos = 50, up = setInterval(() => {
                if (pos >= 220) {
                    clearInterval(up);
                    let down = setInterval(() => {
                        if (pos <= 50) { clearInterval(down); jumping = false; player.src = assets[char].r; }
                        pos -= 4; player.style.bottom = pos + 'px';
                    }, 25);
                }
                pos += 6; player.style.bottom = pos + 'px';
            }, 25);
        }

        window.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); doJump(); } });
        gameArea.addEventListener('mousedown', (e) => { if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') { e.preventDefault(); doJump(); } });
        gameArea.addEventListener('touchstart', (e) => { if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') { e.preventDefault(); doJump(); } });
    </script>
</body>
</html>
