<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelia Gaming | Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #D32F2F; --orange: #FF6B00; --white: #FFFFFF; --black: #050505; }
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--black); color: var(--white); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #arena-header { background: #000; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); }
        .logo-img { height: 40px; }
        #game-container { flex: 1; width: 100%; background: url('https://images.unsplash.com/photo-1475274047050-1d0c0975c63e?w=1600&q=80') center center / cover no-repeat; position: relative; overflow: hidden; }
        #player { width: 140px; height: 140px; position: absolute; bottom: 50px; left: 100px; z-index: 10; }
        .obs { width: 420px; height: 420px; position: absolute; bottom: 30px; border: 12px solid var(--orange); border-radius: 50%; box-shadow: 0 0 30px var(--orange); background: rgba(255,107,0,0.05); z-index: 5; }
        .game-ui { position: absolute; top: 20px; right: 20px; z-index: 100; pointer-events: none; }
        #score-text { font-family: 'Bangers'; font-size: 3rem; color: var(--white); text-shadow: 0 0 20px var(--red); }
        #select-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .selection-grid { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        .char-opt { text-align: center; cursor: pointer; transition: 0.3s; padding: 10px; border: 2px solid transparent; width: 140px; }
        .char-opt.active { background: #222; border-color: var(--white); box-shadow: 0 0 15px var(--red); }
        .char-opt img { height: 160px; width: 100%; object-fit: contain; }
        #start-btn { margin-top: 25px; padding: 12px 40px; background: var(--red); color: white; border: 3px solid white; font-family: 'Russo One'; font-size: 1.6rem; cursor: pointer; }
        #results-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        #auth-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2001; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .auth-form { background: #111; padding: 40px; border: 2px solid var(--red); display: flex; flex-direction: column; gap: 15px; width: 320px; }
        .auth-form input { padding: 12px; background: #222; border: 1px solid #444; color: white; outline: none; }
        .auth-btn { padding: 12px; background: var(--red); color: white; border: none; font-family: 'Russo One'; cursor: pointer; }
        #profile-hub { position: absolute; top: 20px; left: 20px; z-index: 100; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        #p-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--orange); object-fit: cover; }
        #dashboard-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <header id="arena-header">
        <a href="index.html"><img src="https://priscadezigns.org/logos/atelier-gaming.png" class="logo-img"></a>
        <div style="font-family:'Russo One'; font-size:1.2rem; color:var(--red);">GALACTIC ARENA V1.0</div>                
        <button onclick="toggleDashboard()" style="color:white; font-family:'Russo One'; font-size:0.9rem; border:1px solid rgba(255,255,255,0.3); padding:5px 12px; border-radius:4px; background:rgba(255,255,255,0.1); margin-left:15px; cursor:pointer;">DASHBOARD</button>                
        <a href="/ateliagaming/" style="color:#888; text-decoration:none; font-family:'Russo One'; font-size:0.8rem; margin-left:15px;">EXIT ARENA</a>
    </header>
    <div id="game-container">
        <div id="profile-hub" style="display: none;">
            <img id="p-avatar" src="">
            <div><div id="p-username">VANGUARD</div><div id="p-prestige">0 ATLR</div></div>
        </div>
        <div id="auth-overlay">
            <div class="auth-form" id="login-form">
                <h2 style="font-family:'Bangers'; color:white; text-align:center;">VANGUARD LOGIN</h2>
                <input type="email" id="email" placeholder="EMAIL">
                <input type="password" id="password" placeholder="PASSWORD">
                <button class="auth-btn" onclick="login()">LOGIN</button>
                <p style="font-size:12px; color:#888; text-align:center;">NEW? <a href="#" onclick="toggleAuth()" style="color:var(--red);">SIGN UP</a></p>
            </div>
            <div class="auth-form" id="signup-form" style="display:none;">
                <h2 style="font-family:'Bangers'; color:white; text-align:center;">JOIN THE ARENA</h2>
                <input type="text" id="reg-user" placeholder="USERNAME">
                <input type="email" id="reg-email" placeholder="EMAIL">
                <input type="password" id="reg-password" placeholder="PASSWORD">
                <button class="auth-btn" onclick="register()">REGISTER</button>
                <p style="font-size:12px; color:#888; text-align:center;">MEMBER? <a href="#" onclick="toggleAuth()" style="color:var(--red);">LOGIN</a></p>
            </div>
        </div>
        <div id="score-ui" class="game-ui"><span>SCORE: </span><span id="score-text">000</span></div>
        <img id="player" src="https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp">
        <div id="select-screen">
            <h3 style="font-family: 'Bangers'; font-size: 3rem; color: #fff;">SELECT YOUR VANGUARD</h3>
            <div class="selection-grid">
                <div class="char-opt active" onclick="sel('astra')" id="o-astra"><img src="https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp"><p>ASTRA</p></div>
                <div class="char-opt" onclick="sel('mimi')" id="o-mimi"><img src="https://priscadezigns.org/ateliagaming/assets/mimi/mimi_full_body_2d.webp"><p>MIMI</p></div>
                <div class="char-opt" onclick="sel('nova')" id="o-nova"><img src="https://priscadezigns.org/ateliagaming/assets/nova/nova_v4.webp"><p>NOVA</p></div>
                <div class="char-opt" onclick="sel('echo')" id="o-echo"><img src="https://priscadezigns.org/ateliagaming/assets/echo/echo_2d_hf.webp"><p>ECHO</p></div>
            </div>
            <button id="start-btn" onclick="start()">START ARENA</button>
        </div>
        <div id="results-modal">
            <h1>WRECKED!</h1>
            <p style="font-family:'Russo One'; font-size:2rem;">SCORE: <span id="res-score">0</span></p>
            <button onclick="resetGame()" style="background:var(--red); color:white; border:4px solid white; padding:15px 40px; font-family:'Russo One'; cursor:pointer;">RE-ENTER</button>
        </div>
    </div>
    <div id="dashboard-modal">
        <div style="width:90%; max-width:600px; background:#111; border:2px solid var(--orange); border-radius:15px; padding:30px; position:relative;">
            <button onclick="toggleDashboard()" style="position:absolute; top:15px; right:15px; background:none; border:none; color:#888; font-size:1.5rem; cursor:pointer;">✕</button>
            <h2 style="font-family:'Bangers'; color:white; font-size:3rem; text-align:center;">VANGUARD DASHBOARD</h2>
            <div style="display:flex; flex-direction:column; gap:20px; font-family:'Russo One';">
                <div style="display:flex; justify-content:space-between;"><span>RANK:</span><span style="color:var(--orange);">VANGUARD ELITE</span></div>
                <div style="display:flex; justify-content:space-between;"><span>TOTAL ATLR:</span><span id="d-atlr" style="color:var(--orange);">0 ATLR</span></div>
                <div style="display:flex; justify-content:space-between;"><span>HIGH SCORE:</span><span id="d-high">0</span></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/ateliagaming/js/atelia_supabase.js"></script>
    <script>
        const assets = {
            astra: { sel: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp', r: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_running.webp', j: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_jumping.webp', flip: false },
            mimi: { sel: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_full_body_2d.webp', r: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_running.webp', j: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_jumping.webp', flip: true },
            nova: { sel: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_v4.webp', r: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_running.webp', j: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_jumping.webp', flip: true },
            echo: { sel: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_2d_hf.webp', r: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_running.webp', j: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_jumping.webp', flip: true }
        };
        let char = 'astra', jumping = false, score = 0, active = false, spawnTimeout, activeIntervals = [];
        const player = document.getElementById('player'), scoreTxt = document.getElementById('score-text'), gameArea = document.getElementById('game-container');
        Atelia.auth.onAuthStateChange(async (e, s) => {
            if (s?.user) {
                document.getElementById('profile-hub').style.display = 'flex'; document.getElementById('auth-overlay').style.display = 'none';
                const p = await Atelia.arena.getProfile(s.user.id);
                document.getElementById('p-username').innerText = (p.username || 'Vanguard').toUpperCase();
                document.getElementById('p-prestige').innerText = (p.atlr_prestige || 0) + ' ATLR';
                document.getElementById('p-avatar').src = assets[char].sel;
            } else { document.getElementById('profile-hub').style.display = 'none'; }
        });
        async function login() { await Atelia.auth.signIn(document.getElementById('email').value, document.getElementById('password').value); }
        function toggleAuth() { const l = document.getElementById('login-form'), s = document.getElementById('signup-form'); l.style.display = l.style.display === 'none' ? 'flex' : 'none'; s.style.display = s.style.display === 'none' ? 'flex' : 'none'; }
        async function toggleDashboard() {
            const m = document.getElementById('dashboard-modal');
            if (m.style.display === 'none' || !m.style.display) {
                const { data } = await Atelia.auth.getUser();
                if (data?.user) {
                    const p = await Atelia.arena.getProfile(data.user.id);
                    document.getElementById('d-atlr').innerText = (p.atlr_prestige || 0) + ' ATLR';
                    document.getElementById('d-high').innerText = p.high_score || 0;
                    m.style.display = 'flex';
                } else { document.getElementById('auth-overlay').style.display = 'flex'; }
            } else { m.style.display = 'none'; }
        }
        function sel(c) { char = c; document.querySelectorAll('.char-opt').forEach(o => o.classList.remove('active')); document.getElementById('o-' + c).classList.add('active'); player.src = assets[c].sel; player.style.transform = assets[c].flip ? 'scaleX(-1)' : 'scaleX(1)'; }
        async function start() {
            const { data } = await Atelia.auth.getUser();
            if (!data?.user) { document.getElementById('auth-overlay').style.display = 'flex'; return; }
            active = true; document.getElementById('select-screen').style.display = 'none';
            score = 0; scoreTxt.innerText = '000'; player.style.bottom = '50px'; player.src = assets[char].r;
            spawn();
        }
        function jump() { 
            if (!active || jumping) return; jumping = true; player.src = assets[char].j;
            let pos = 50, up = setInterval(() => { if (pos >= 220) { clearInterval(up); let down = setInterval(() => { if (pos <= 50) { clearInterval(down); jumping = false; player.src = assets[char].r; } pos -= 4; player.style.bottom = pos + 'px'; }, 25); } pos += 6; player.style.bottom = pos + 'px'; }, 25);
        }
        function spawn() {
            if (!active) return;
            let obs = document.createElement('div'); obs.className = 'obs'; obs.style.right = '-600px'; gameArea.appendChild(obs);
            let move = setInterval(() => {
                if (!active) { clearInterval(move); return; }
                let r = parseInt(obs.style.right);
                if (r > gameArea.clientWidth + 600) { clearInterval(move); if (obs.parentNode) gameArea.removeChild(obs); score++; scoreTxt.innerText = score.toString().padStart(3, '0'); }
                let p = player.getBoundingClientRect(), o = obs.getBoundingClientRect();
                if (p.right > o.left + 50 && p.left < o.right - 50 && p.bottom > o.top + 50) { gameOver(); clearInterval(move); }
                obs.style.right = (r + 12 + (score/5)) + 'px';
            }, 20);
            activeIntervals.push(move); spawnTimeout = setTimeout(spawn, 3000 + Math.random() * 2000);
        }
        function gameOver() { active = false; clearTimeout(spawnTimeout); activeIntervals.forEach(clearInterval); document.getElementById('res-score').innerText = score; document.getElementById('results-modal').style.display = 'flex'; Atelia.arena.saveScore(score, char); }
        function resetGame() { document.getElementById('results-modal').style.display = 'none'; document.getElementById('select-screen').style.display = 'flex'; document.querySelectorAll('.obs').forEach(o => o.remove()); }
        window.addEventListener('keydown', e => { if (e.code === 'Space') jump(); });
        gameArea.addEventListener('mousedown', () => jump());
    </script>
</body>
</html>
