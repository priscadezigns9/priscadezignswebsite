<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atelia Gaming | Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #D32F2F; --orange: #FF6B00; --white: #FFFFFF; --black: #050505; }
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--black); color: var(--white); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        header { background: #000; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); z-index: 10000; }
        .logo-img { height: 35px; }
        #game-container { flex: 1; width: 100%; background: #050505 url('https://images.unsplash.com/photo-1475274047050-1d0c0975c63e?w=1600&q=80') center center / cover no-repeat; position: relative; overflow: hidden; }
        #player { width: 140px; height: 140px; position: absolute; bottom: 50px; left: 100px; z-index: 10; pointer-events: none; }
        .obs { width: 420px; height: 420px; position: absolute; bottom: 30px; border: 12px solid var(--orange); border-radius: 50%; box-shadow: 0 0 40px var(--orange), inset 0 0 30px var(--orange); background: rgba(255,107,0,0.05); z-index: 5; }
        #score-ui { position: absolute; top: 20px; right: 20px; z-index: 100; font-family: 'Bangers'; font-size: 3rem; text-shadow: 0 0 15px var(--red); pointer-events: none; }
        #select-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .selection-grid { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }
        .char-opt { text-align: center; cursor: pointer; padding: 10px; border: 2px solid transparent; width: 130px; border-radius: 10px; transition: 0.3s; }
        .char-opt:hover { background: rgba(255,255,255,0.05); }
        .char-opt.active { background: rgba(211,47,47,0.2); border-color: var(--white); box-shadow: 0 0 20px var(--red); }
        .char-opt img { height: 160px; width: 100%; object-fit: contain; }
        #start-btn { margin-top: 25px; padding: 12px 40px; background: var(--red); color: white; border: 3px solid white; font-family: 'Russo One'; font-size: 1.6rem; cursor: pointer; z-index: 1100; }
        #results-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        #auth-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 15000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .auth-form { background: #111; padding: 40px; border: 2px solid var(--red); display: flex; flex-direction: column; gap: 15px; width: 300px; box-shadow: 0 0 50px rgba(211,47,47,0.3); }
        .auth-form input { padding: 12px; background: #222; border: 1px solid #333; color: white; outline: none; }
        .auth-btn { padding: 12px; background: var(--red); color: white; border: none; font-family: 'Russo One'; cursor: pointer; }
        #profile-hub { position: absolute; top: 15px; left: 15px; z-index: 100; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 30px; border: 2px solid var(--orange); box-shadow: 0 0 15px rgba(255,107,0,0.2); }
        #p-avatar-wrap { width: 45px; height: 45px; border-radius: 50%; overflow: hidden; border: 2px solid var(--white); background: #000; flex-shrink: 0; }
        #p-avatar { width: 100%; height: 100%; object-fit: cover; }
        #dashboard-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 20000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <header>
        <a href="index.html"><img src="https://priscadezigns.org/logos/atelier-gaming.png" class="logo-img"></a>
        <div style="font-family:'Russo One'; font-size:1.2rem; color:var(--red);">ARENA V1.1</div>
        <button id="dash-btn" style="color:white; font-family:'Russo One'; font-size:0.9rem; border:1px solid #444; padding:6px 15px; background:#111; cursor:pointer; border-radius:4px;">DASHBOARD</button>
        <a href="/ateliagaming/" style="color:#888; font-family:'Russo One'; font-size:0.8rem; text-decoration:none; margin-left:10px;">EXIT</a>
    </header>
    <div id="game-container">
        <div id="profile-hub" style="display: none;">
            <div id="p-avatar-wrap"><img id="p-avatar" src=""></div>
            <div><div id="p-username" style="font-family:'Russo One'; font-size:0.8rem;">VANGUARD</div><div id="p-prestige" style="font-family:'Bangers'; color:var(--orange); font-size:1.2rem;">0 ATLR</div></div>
        </div>
        <div id="auth-overlay">
            <div class="auth-form" id="login-form">
                <h2 style="font-family:'Bangers'; color:white; text-align:center; margin:0 0 10px;">VANGUARD LOGIN</h2>
                <input type="email" id="email" placeholder="EMAIL">
                <input type="password" id="password" placeholder="PASSWORD">
                <button class="auth-btn" id="login-btn">ENTER ARENA</button>
                <p style="font-size:12px; color:#888; text-align:center;">NEW RECRUIT? <span id="toggle-auth-btn" style="color:var(--red); cursor:pointer; text-decoration:underline;">SIGN UP</span></p>
            </div>
            <div class="auth-form" id="signup-form" style="display:none;">
                <h2 style="font-family:'Bangers'; color:white; text-align:center; margin:0 0 10px;">JOIN THE ELITE</h2>
                <input type="text" id="reg-user" placeholder="USERNAME">
                <input type="email" id="reg-email" placeholder="EMAIL">
                <input type="password" id="reg-password" placeholder="PASSWORD">
                <button class="auth-btn" id="reg-btn">CREATE VANGUARD</button>
                <p style="font-size:12px; color:#888; text-align:center;">ALREADY ENLISTED? <span id="toggle-auth-login" style="color:var(--red); cursor:pointer; text-decoration:underline;">LOGIN</span></p>
            </div>
        </div>
        <div id="score-ui">SCORE: <span id="score-text">000</span></div>
        <img id="player" src="https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp">
        <div id="select-screen">
            <h1 style="font-family:'Bangers'; font-size:4rem; margin:0; text-shadow:0 0 20px var(--red);">SELECT VANGUARD</h1>
            <div class="selection-grid">
                <div class="char-opt active" data-char="astra" id="o-astra"><img src="https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp"><p style="margin:5px 0 0; font-family:'Bangers'; font-size:1.5rem;">ASTRA</p></div>
                <div class="char-opt" data-char="mimi" id="o-mimi"><img src="https://priscadezigns.org/ateliagaming/assets/mimi/mimi_full_body_2d.webp"><p style="margin:5px 0 0; font-family:'Bangers'; font-size:1.5rem;">MIMI</p></div>
                <div class="char-opt" data-char="nova" id="o-nova"><img src="https://priscadezigns.org/ateliagaming/assets/nova/nova_v4.webp"><p style="margin:5px 0 0; font-family:'Bangers'; font-size:1.5rem;">NOVA</p></div>
                <div class="char-opt" data-char="echo" id="o-echo"><img src="https://priscadezigns.org/ateliagaming/assets/echo/echo_2d_hf.webp"><p style="margin:5px 0 0; font-family:'Bangers'; font-size:1.5rem;">ECHO</p></div>
            </div>
            <button id="start-btn">START ARENA</button>
        </div>
        <div id="results-modal">
            <h1 style="font-family:'Bangers'; font-size:6rem; color:var(--red); margin:0; text-shadow: 4px 4px 0 white;">WRECKED!</h1>
            <p style="font-family:'Russo One'; font-size:2.5rem; color:white;">FINAL SCORE: <span id="res-score">0</span></p>
            <button id="restart-btn" style="background:var(--red); color:white; border:4px solid white; padding:15px 50px; font-family:'Russo One'; font-size:1.8rem; cursor:pointer; margin-top:20px;">RE-ENTER</button>
        </div>
    </div>
    <div id="dashboard-modal">
        <div style="width:90%; max-width:500px; background:#111; border:3px solid var(--orange); border-radius:15px; padding:30px; position:relative; box-shadow: 0 0 100px rgba(255,107,0,0.3);">
            <button id="close-dash" style="position:absolute; top:15px; right:15px; background:none; border:none; color:#888; font-size:2rem; cursor:pointer;">✕</button>
            <h2 style="font-family:'Bangers'; color:white; text-align:center; margin-top:0; font-size:4rem;">VANGUARD VAULT</h2>
            <div style="display:flex; flex-direction:column; gap:20px; font-family:'Russo One'; font-size:1.2rem;">
                <div style="display:flex; justify-content:space-between; border-bottom:1px solid #222; padding-bottom:10px;"><span>RANK:</span><span style="color:var(--orange);">VANGUARD ELITE</span></div>
                <div style="display:flex; justify-content:space-between; border-bottom:1px solid #222; padding-bottom:10px;"><span>TOTAL ATLR:</span><span id="d-atlr" style="color:var(--orange); font-size:2rem;">0</span></div>
                <div style="display:flex; justify-content:space-between; border-bottom:1px solid #222; padding-bottom:10px;"><span>HIGH SCORE:</span><span id="d-high" style="color:var(--white);">0</span></div>
            </div>
            <button id="logout-btn" style="width:100%; margin-top:30px; background:none; border:1px solid #444; color:#666; padding:10px; cursor:pointer; font-family:'Russo One'; border-radius:5px;">LOGOUT SESSION</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/ateliagaming/js/atelia_supabase.js"></script>
    <script>
        const assets = {
            astra: { sel: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp', r: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_running.webp', j: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_jumping.webp', glow: 'rgba(255,107,0,0.8)', flip: false },
            mimi: { sel: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_full_body_2d.webp', r: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_running.webp', j: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_jumping.webp', glow: 'rgba(255,107,0,0.8)', flip: true },
            nova: { sel: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_v4.webp', r: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_running.webp', j: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_jumping.webp', glow: 'rgba(160,32,240,0.8)', flip: true },
            echo: { sel: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_2d_hf.webp', r: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_running.webp', j: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_jumping.webp', glow: 'rgba(0,191,255,0.8)', flip: true }
        };
        let char = 'astra', score = 0, active = false, jumping = false, spawnTimeout, activeIntervals = [];
        const player = document.getElementById('player'), scoreTxt = document.getElementById('score-text'), gameArea = document.getElementById('game-container');

        window.onload = function() {
            if (window.Atelia) {
                Atelia.auth.onAuthStateChange(async (e, s) => {
                    if (s?.user) {
                        document.getElementById('profile-hub').style.display = 'flex';
                        document.getElementById('auth-overlay').style.display = 'none';
                        const p = await Atelia.arena.getProfile(s.user.id);
                        document.getElementById('p-username').innerText = (p.username || 'Vanguard').toUpperCase();
                        document.getElementById('p-prestige').innerText = (p.atlr_prestige || 0) + ' ATLR';
                        document.getElementById('p-avatar').src = assets[char].sel;
                    } else { document.getElementById('profile-hub').style.display = 'none'; }
                });
            }
            
            document.getElementById('dash-btn').onclick = openDash;
            document.getElementById('close-dash').onclick = () => document.getElementById('dashboard-modal').style.display = 'none';
            document.getElementById('start-btn').onclick = launchGame;
            document.getElementById('restart-btn').onclick = () => {
                document.getElementById('results-modal').style.display = 'none';
                document.getElementById('select-screen').style.display = 'flex';
                document.querySelectorAll('.obs').forEach(o => o.remove());
            };
            document.getElementById('login-btn').onclick = async () => {
                const { error } = await Atelia.auth.signIn(document.getElementById('email').value, document.getElementById('password').value);
                if(error) alert(error.message);
            };
            document.getElementById('reg-btn').onclick = async () => {
                const { error } = await Atelia.auth.signUp(document.getElementById('reg-email').value, document.getElementById('reg-password').value, document.getElementById('reg-user').value);
                if(error) alert(error.message);
            };
            document.getElementById('logout-btn').onclick = () => Atelia.auth.signOut();
            document.getElementById('toggle-auth-btn').onclick = toggleAuth;
            document.getElementById('toggle-auth-login').onclick = toggleAuth;

            document.querySelectorAll('.char-opt').forEach(opt => {
                opt.onclick = () => {
                    char = opt.getAttribute('data-char');
                    document.querySelectorAll('.char-opt').forEach(o => o.classList.remove('active'));
                    opt.classList.add('active');
                    player.src = assets[char].sel;
                    player.style.transform = assets[char].flip ? 'scaleX(-1)' : 'scaleX(1)';
                    if(document.getElementById('p-avatar')) document.getElementById('p-avatar').src = assets[char].sel;
                };
            });
        };

        function toggleAuth() {
            const l = document.getElementById('login-form'), s = document.getElementById('signup-form');
            l.style.display = l.style.display === 'none' ? 'flex' : 'none';
            s.style.display = s.style.display === 'none' ? 'flex' : 'none';
        }

        async function launchGame() {
            const { data } = await Atelia.auth.getUser();
            if (!data?.user) { document.getElementById('auth-overlay').style.display = 'flex'; return; }
            active = true; document.getElementById('select-screen').style.display = 'none';
            score = 0; scoreTxt.innerText = '000'; player.style.bottom = '50px'; player.style.left = '100px'; player.src = assets[char].r;
            player.style.transform = assets[char].flip ? 'scaleX(-1)' : 'scaleX(1)';
            runSpawn();
        }

        function runSpawn() {
            if (!active) return;
            let obs = document.createElement('div'); obs.className = 'obs'; obs.style.right = '-600px'; gameArea.appendChild(obs);
            let move = setInterval(() => {
                if (!active) { clearInterval(move); return; }
                let r = parseInt(obs.style.right);
                if (r > gameArea.clientWidth + 600) { 
                    clearInterval(move); if (obs.parentNode) gameArea.removeChild(obs); 
                    score++; scoreTxt.innerText = score.toString().padStart(3, '0'); 
                }
                
                let pRect = player.getBoundingClientRect(), oRect = obs.getBoundingClientRect();
                let playerBottom = parseInt(player.style.bottom) || 50;
                let playerTop = playerBottom + 140;

                // ATELIA GAMING STANDARD COLLISION ENGINE (Forgiving Mode)
                // Hoop is 420px tall, starts at bottom: 30px. Rim is 12px.
                // Hole center is 240px from bottom.
                // Clearance window is 240px wide (from 120px to 360px).
                if (pRect.right > oRect.left + 100 && pRect.left < oRect.right - 100) {
                    if (playerBottom < 120 || playerTop > 360) { 
                        endGame(); clearInterval(move); 
                    }
                }
                obs.style.right = (r + 13 + (score/5)) + 'px';
            }, 20);
            activeIntervals.push(move);
            spawnTimeout = setTimeout(runSpawn, 3000 + Math.random() * 2000);
        }

        function endGame() {
            active = false; clearTimeout(spawnTimeout); activeIntervals.forEach(clearInterval);
            document.getElementById('res-score').innerText = score;
            document.getElementById('results-modal').style.display = 'flex';
            if (window.Atelia) Atelia.arena.saveScore(score, char);
        }

        async function openDash() {
            const { data } = await Atelia.auth.getUser();
            if (data?.user) {
                const p = await Atelia.arena.getProfile(data.user.id);
                document.getElementById('d-atlr').innerText = p.atlr_prestige || 0;
                document.getElementById('d-high').innerText = p.high_score || 0;
                document.getElementById('dashboard-modal').style.display = 'flex';
            } else { document.getElementById('auth-overlay').style.display = 'flex'; }
        }

        function doJump() {
            if (!active || jumping) return;
            jumping = true; player.src = assets[char].j;
            let pos = 50, leftPos = 100, up = setInterval(() => {
                if (pos >= 270) { // Standard Calibration peak
                    clearInterval(up);
                    let down = setInterval(() => {
                        if (pos <= 50) { clearInterval(down); jumping = false; player.src = assets[char].r; }
                        pos -= 5; leftPos -= 2;
                        player.style.bottom = pos + 'px'; player.style.left = leftPos + 'px';
                    }, 25);
                }
                pos += 7; leftPos += 4;
                player.style.bottom = pos + 'px'; player.style.left = leftPos + 'px';
            }, 25);
        }

        window.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); doJump(); } });
        gameArea.addEventListener('mousedown', (e) => { if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') { e.preventDefault(); doJump(); } });
        gameArea.addEventListener('touchstart', (e) => { if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') { e.preventDefault(); doJump(); } });
    </script>
</body>
</html>
