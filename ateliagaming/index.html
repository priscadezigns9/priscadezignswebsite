<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root { --brand-color: #D32F2F; --bg-dark: #0a0a0a; --card-bg: #141414; --text-light: #f0f0f0; --border-color: #222; }
body{margin:0;font-family:'Inter', sans-serif;background:var(--bg-dark);color:var(--text-light);line-height:1.6}
nav{background:var(--bg-dark);padding:20px 5%;border-bottom:3px solid var(--brand-color);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.5)}
#logo { height: 50px; max-width: 200px; object-fit: contain; }
#upBtn { position: fixed; bottom: 30px; right: 30px; background: var(--brand-color); color: #fff; width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 1.5rem; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000; transition: 0.3s; }
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:40px;padding:40px 5%}
.card{background:var(--card-bg);border:1px solid var(--border-color);border-radius:20px;padding:30px;text-align:center;transition:0.4s;display:flex;flex-direction:column;position:relative}
.card:hover{transform:translateY(-10px);box-shadow:0 20px 40px rgba(0,0,0,0.4);border-color:var(--brand-color)}
.img-box{height:300px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;background:#fff;border-radius:12px;overflow:hidden}
img.product-img{max-width:90%;max-height:90%;object-fit:contain;transition:0.5s}
h3{font-size:1rem;margin:0 0 15px;font-weight:800;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;height:3em;color:var(--text-light)}
.price{color:var(--brand-color);font-weight:900;font-size:1.5rem;margin-bottom:20px}
.btn{display:block;background:var(--brand-color);color: #fff;padding:18px;border-radius:12px;text-decoration:none;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-top:auto;font-size:0.85rem;transition:0.3s}
#loader { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-dark); z-index:1000; display:flex; flex-direction: column; justify-content:center; align-items:center; transition: 0.5s; }
#loaderText { color: var(--brand-color); font-weight: 900; letter-spacing: 5px; }
#loader.hidden { opacity:0; pointer-events:none; }
</style>
</head>
<body>

<nav>
    <img id="logo" src="https://priscadezigns.org/assets/logos/atelia_gaming_hf.png" alt="Atelia Gaming Logo">
    <div id="auth-status" style="font-family: 'Inter', sans-serif; font-size: 10px; color: #666; letter-spacing: 1px; cursor:pointer; font-weight:700;" onclick="toggleAuthModal()">[HANDSHAKE_REQUIRED]</div>
</nav>
<div class="grid" id="grid"></div>
<button id="upBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>
<footer style="padding:60px 5%; text-align:center; background:#000; color:#fff; border-top: 1px solid #222;">
    <div style="font-weight:900; font-size:1.5rem">ATELIA GAMING</div>
    <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6; margin-top: 20px;">A PRISCA DEZIGNS EMPIRE VENTURE - GOLD STANDARD RESTORATION v4.2</div>
</footer>

<!-- Sovereign Vault Modal -->
<div id="auth-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; align-items:center; justify-content:center; padding:20px;">
  <div style="background:#111; border:1px solid #222; padding:40px; width:100%; max-width:400px; border-radius:12px; text-align:center;">
    <div style="font-family:'Inter', sans-serif; font-size:2rem; color:#fff; margin-bottom:10px; font-weight:900;">SOVEREIGN VAULT</div>
    <p style="font-size:10px; color:#666; margin-bottom:30px; letter-spacing:1px; font-weight:700;">SECURE YOUR IDENTITY ACROSS THE EMPIRE</p>
    
    <input type="email" id="auth-email" placeholder="NEURAL_EMAIL" style="width:100%; background:#000; border:1px solid #333; padding:15px; color:#fff; border-radius:8px; margin-bottom:15px; font-family:inherit; outline:none;">
    <input type="password" id="auth-pass" placeholder="VAULT_KEY" style="width:100%; background:#000; border:1px solid #333; padding:15px; color:#fff; border-radius:8px; margin-bottom:30px; font-family:inherit; outline:none;">
    
    <button onclick="handleAuth('signin')" id="signin-btn" style="width:100%; background:#D32F2F; color:#fff; padding:15px; border-radius:8px; font-weight:900; border:none; margin-bottom:15px; cursor:pointer; text-transform:uppercase;">SIGN_IN</button>
    <button onclick="handleAuth('signup')" id="signup-btn" style="width:100%; background:transparent; color:#fff; padding:15px; border-radius:8px; font-weight:900; border:1px solid #333; cursor:pointer; text-transform:uppercase;">CREATE_IDENTITY</button>
    
    <div onclick="toggleAuthModal()" style="margin-top:30px; font-size:10px; color:#444; cursor:pointer; letter-spacing:2px; font-weight:700;">CANCEL_HANDSHAKE</div>
  </div>
</div>

<script>
const sbAuth = supabase.createClient("https://sktpjacowqaedddtrhuz.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdHBqYWNvd3FhZWRkZHRyaHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDk5MzEsImV4cCI6MjA5NDIyNTkzMX0.FK4N_ATFTaUuGXrYu_7OBn3qCdlo0rOzxk-E6TxJxqs");
const sb = supabase.createClient("https://sazhdnqzaqpqcralmthh.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc");

let user = null;
window.toggleAuthModal = () => {
    const m = document.getElementById('auth-modal');
    m.style.display = m.style.display === 'none' ? 'flex' : 'none';
};

const updateAuthUI = (u) => {
    user = u;
    const status = document.getElementById('auth-status');
    if(user) {
        status.textContent = `[IDENTITY_LOCKED: ${'VAULT_LOCKED'}]`;
        status.style.color = '#fff';
    } else {
        status.textContent = '[HANDSHAKE_REQUIRED]';
        status.style.color = '#666';
    }
};

window.handleAuth = async (type) => {
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-pass').value;
    if(!email || !password) return alert('MISSING_CREDENTIALS');

    const btn = event.target;
    btn.disabled = true;
    btn.textContent = 'CONNECTING...';

    try {
        const { data, error } = type === 'signup' 
            ? await sb.auth.signUp({ email, password })
            : await sb.auth.signInWithPassword({ email, password });

        if(error) throw error;
        updateAuthUI(data.user);
        toggleAuthModal();
        if(type === 'signup') alert('IDENTITY_CREATED. CHECK EMAIL FOR HANDSHAKE.');
    } catch(e) {
        alert(`AUTH_ERROR: ${e.message}`);
    } finally {
        btn.disabled = false;
        btn.textContent = type === 'signup' ? 'CREATE_IDENTITY' : 'SIGN_IN';
    }
};

sb.auth.getSession().then(({data}) => {
    if(data.session) updateAuthUI(data.session.user);
});
async function load() {
  const { data } = await sb.from("empire_inventory").select("*").eq("brand", "Atelia Gaming");
  const items = data || [];
  if (items.length === 0) {
      document.getElementById("grid").innerHTML = "<div style='grid-column: 1/-1; text-align:center; padding:100px; opacity:0.5;'><h3>No items found in the vault.</h3></div>";
  } else {
      document.getElementById("grid").innerHTML = items.map(p => `
        <div class="card">
          <div class="img-box"><img class="product-img" src="${p.image_url}" loading="lazy" onerror="this.src='https://priscadezigns.org/assets/logos/pd_mark_sq.png'"></div>
          <h3>${p.title}</h3>
          <div class="price">${p.price}</div>
          <a href="${p.affiliate_link}" class="btn" target="_blank">Acquire Armory</a>
        </div>
      `).join("");
  }
  document.getElementById("loader").classList.add("hidden");
}
window.onload = load;
</script></body></html>
