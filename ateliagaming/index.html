<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelia Gaming | The Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #FF6B00;
            --white: #FFFFFF;
            --black: #050505;
            --dark-gray: #111111;
        }
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--black);
            color: var(--white);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Unique Gaming UI - Restore Aggressive Identity */
        nav {
            position: sticky;
            top: 0;
            z-index: 10000;
            background: rgba(5, 5, 5, 0.98);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--orange);
        }
        .logo img {
            height: 70px;
            filter: drop-shadow(0 0 8px var(--orange));
        }
        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-family: 'Bangers';
            font-size: 1.6rem;
            margin-left: 35px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .nav-links a:hover { color: var(--orange); text-shadow: 0 0 10px var(--orange); }

        /* Hero Section */
        .hero {
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10%;
            background: linear-gradient(135deg, #000 0%, #111 100%);
            position: relative;
        }
        .hero-content { max-width: 600px; z-index: 2; }
        .hero h1 {
            font-family: 'Bangers';
            font-size: 7rem;
            line-height: 0.85;
            margin: 0;
            color: var(--orange);
            text-transform: uppercase;
        }
        .hero-img {
            max-height: 85%;
            z-index: 1;
            /* Removed Hover/Float Animation */
            filter: drop-shadow(0 0 30px rgba(255, 107, 0, 0.15));
        }

        /* Flip Animation for Tokens */
        .coin-img {
            width: 150px;
            height: 150px;
            animation: flip 4s linear infinite;
            transform-style: preserve-3d;
        }
        @keyframes flip {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .cta-button {
            background: var(--orange);
            color: var(--white);
            padding: 18px 45px;
            font-family: 'Bangers';
            font-size: 2.2rem;
            text-decoration: none;
            border-radius: 4px;
            display: inline-block;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            margin-top: 30px;
        }
        .cta-button:hover { background: #e65a00; transform: scale(1.03); box-shadow: 0 0 25px var(--orange); }

        /* Champions Section - Links to Lore */
        .champions {
            padding: 100px 10%;
            text-align: center;
        }
        .champions h2 { font-family: 'Bangers'; font-size: 4.5rem; color: var(--orange); margin-bottom: 60px; }
        .champion-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 45px;
        }
        .champion-card {
            background: var(--dark-gray);
            border: 2px solid #222;
            padding: 35px;
            border-radius: 20px;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: white;
            display: block;
        }
        .champion-card:hover { border-color: var(--orange); transform: translateY(-12px); background: #151515; }
        .champion-card img { width: 100%; height: auto; border-radius: 12px; margin-bottom: 20px; }
        .champion-card h3 { font-family: 'Bangers'; font-size: 2.8rem; margin: 0; }

        /* Game Section */
        #gameArea {
            width: 100%;
            height: 600px;
            background: #080808;
            border-top: 3px solid var(--orange);
            position: relative;
            display: none;
            overflow: hidden;
        }
        #player { width: 110px; height: 110px; position: absolute; bottom: 30px; left: 80px; z-index: 5; }
        .obstacle { width: 60px; height: 60px; background: var(--orange); position: absolute; bottom: 30px; border-radius: 8px; }
    </style>
</head>
<body>

<nav>
    <a href="https://priscadezigns.org/ateliagaming/" class="logo">
        <img src="https://priscadezigns.org/ateliagaming/assets/atelia_logo_transparent.webp" alt="Atelia Gaming">
    </a>
    <div class="nav-links">
        <a href="#arena">Arena</a>
        <a href="#champions">Champions</a>
        <a href="https://priscadezigns.org/ateliagaming/shop/">Armory</a>
        <a href="https://priscadezigns.org/blog/">Blog</a>
    </div>
</nav>

<section class="hero" id="arena">
    <div class="hero-content">
        <h1>THE ARENA</h1>
        <p style="font-size:1.6rem; color:#aaa; margin: 25px 0;">ASTRA VANGUARD oversees the high-fidelity ecosystem. Proclaim your power.</p>
        <div style="display:flex; gap:20px;">
            <button class="cta-button" onclick="startGame()">Start Game</button>
            <a href="https://priscadezigns.org/ateliagaming/shop/" class="cta-button" style="background:transparent; border: 2px solid var(--orange);">Enter Shop</a>
        </div>
    </div>
    <!-- Additional Astra Image -->
    <img src="https://priscadezigns.org/ateliagaming/assets/astra/astra_3d_hf.webp" alt="Astra" class="hero-img">
</section>

<section class="champions" id="champions">
    <h2>CHAMPIONS</h2>
    <div class="champion-grid">
        <a href="astra.html" class="champion-card">
            <img src="https://priscadezigns.org/ateliagaming/assets/astra/astra_3d_hf.webp" alt="Astra">
            <h3>ASTRA</h3>
            <p>Vanguard of Truth</p>
        </a>
        <a href="mimi.html" class="champion-card">
            <img src="https://priscadezigns.org/ateliagaming/assets/mimi/mimi_3d_hf.webp" alt="Mimi">
            <h3>MIMI</h3>
            <p>Otaku Sage</p>
        </a>
        <a href="nova.html" class="champion-card">
            <img src="https://priscadezigns.org/ateliagaming/assets/nova/nova_3d_hf.webp" alt="Nova">
            <h3>NOVA</h3>
            <p>Signal Engineer</p>
        </a>
        <a href="echo.html" class="champion-card">
            <img src="https://priscadezigns.org/ateliagaming/assets/echo/echo_3d_hf.webp" alt="Echo">
            <h3>ECHO</h3>
            <p>Frequency Hybrid</p>
        </a>
    </div>
</section>

<section class="champions" style="background:#000; border-top: 1px solid #222;">
    <h2 style="font-family:'Bangers'; font-size:3.5rem; color:var(--white);">EMPIRE CURRENCY</h2>
    <div style="display:flex; justify-content:center; gap:60px; flex-wrap:wrap;">
        <div class="champion-card" style="width:320px; cursor:default;">
            <img src="https://priscadezigns.org/ateliagaming/assets/logos/atelia_coin_separate.webp" class="coin-img" alt="ATLR">
            <h3 style="font-family:'Bangers'; font-size:2.8rem;">ATLR</h3>
            <p>Lab-Native Utility</p>
        </div>
    </div>
</section>

<div id="gameArea">
    <img id="player" src="https://priscadezigns.org/ateliagaming/assets/echo/echo_running.webp" alt="Player">
    <div id="score" style="position:absolute; top:30px; right:40px; font-family:'Bangers'; font-size:3rem; color:var(--orange);">000</div>
</div>

<script>
    let isJumping = false;
    let score = 0;
    let gameActive = false;

    function startGame() {
        document.getElementById('gameArea').style.display = 'block';
        gameActive = true;
        score = 0;
        document.getElementById('arena').style.display = 'none';
        document.getElementById('champions').style.display = 'none';
        spawnObstacle();
    }

    function jump() {
        if (isJumping || !gameActive) return;
        isJumping = true;
        let p = document.getElementById('player');
        p.src = 'https://priscadezigns.org/ateliagaming/assets/echo/echo_jumping.webp';
        p.style.transform = 'scaleX(-1)';
        
        let pos = 30;
        let up = setInterval(() => {
            if (pos >= 300) {
                clearInterval(up);
                let down = setInterval(() => {
                    if (pos <= 30) {
                        clearInterval(down);
                        isJumping = false;
                        p.src = 'https://priscadezigns.org/ateliagaming/assets/echo/echo_running.webp';
                    }
                    pos -= 12;
                    p.style.bottom = pos + 'px';
                }, 20);
            }
            pos += 15;
            p.style.bottom = pos + 'px';
        }, 20);
    }

    function spawnObstacle() {
        if (!gameActive) return;
        let area = document.getElementById('gameArea');
        let obs = document.createElement('div');
        obs.className = 'obstacle';
        obs.style.right = '-60px';
        area.appendChild(obs);

        let move = setInterval(() => {
            if (!gameActive) { clearInterval(move); return; }
            let r = parseInt(obs.style.right);
            if (r > area.clientWidth) {
                clearInterval(move);
                area.removeChild(obs);
                score++;
                document.getElementById('score').innerText = score.toString().padStart(3, '0');
            }
            
            let pRect = document.getElementById('player').getBoundingClientRect();
            let oRect = obs.getBoundingClientRect();
            
            if (pRect.right > oRect.left && pRect.left < oRect.right && pRect.bottom > oRect.top) {
                gameActive = false;
                alert('CRITICAL FAILURE | SCORE: ' + score);
                location.reload();
            }
            obs.style.right = (r + 12) + 'px';
        }, 20);
        setTimeout(spawnObstacle, 1200 + Math.random() * 1800);
    }

    window.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });
    window.addEventListener('touchstart', jump);
</script>

</body>
</html>
