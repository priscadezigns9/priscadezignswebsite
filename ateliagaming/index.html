<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelia Gaming | The Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #FF6B00;
            --white: #FFFFFF;
            --black: #050505;
            --dark-gray: #111111;
        }
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--black);
            color: var(--white);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        nav {
            position: sticky;
            top: 0;
            z-index: 10000;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--orange);
        }
        .logo img {
            height: 60px;
            filter: drop-shadow(0 0 5px var(--orange));
        }
        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-family: 'Bangers';
            font-size: 1.5rem;
            margin-left: 30px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .nav-links a:hover { color: var(--orange); text-shadow: 0 0 10px var(--orange); }
        .hero {
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        .hero-content { max-width: 600px; }
        .hero h1 {
            font-family: 'Bangers';
            font-size: 6rem;
            line-height: 0.9;
            margin: 0;
            color: var(--orange);
            text-transform: uppercase;
        }
        .hero-img {
            max-height: 80%;
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .coin-img {
            width: 150px;
            height: 150px;
            animation: flip 3s linear infinite;
            transform-style: preserve-3d;
        }
        @keyframes flip {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        .cta-button {
            background: var(--orange);
            color: var(--white);
            padding: 15px 40px;
            font-family: 'Bangers';
            font-size: 2rem;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
        }
        .cta-button:hover { background: #e65a00; box-shadow: 0 0 20px var(--orange); transform: scale(1.05); }
        .champions {
            padding: 100px 10%;
            text-align: center;
        }
        .champion-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
        }
        .champion-card {
            background: var(--dark-gray);
            border: 1px solid #222;
            padding: 30px;
            border-radius: 15px;
            transition: 0.3s;
        }
        .champion-card:hover { border-color: var(--orange); transform: translateY(-10px); }
        .champion-card img { width: 100%; height: auto; border-radius: 10px; margin-bottom: 15px; }
        #gameArea {
            width: 100%;
            height: 500px;
            background: #111;
            border: 2px solid var(--orange);
            position: relative;
            margin-top: 50px;
            overflow: hidden;
            display: none;
        }
        #player {
            width: 120px;
            height: 120px;
            position: absolute;
            bottom: 20px;
            left: 50px;
            z-index: 10;
        }
        .obstacle {
            width: 50px;
            height: 50px;
            background: var(--orange);
            position: absolute;
            bottom: 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<nav>
    <a href="https://priscadezigns.org/ateliagaming/" class="logo">
        <img src="https://priscadezigns.org/ateliagaming/assets/atelia_logo_transparent.webp" alt="Atelia Gaming">
    </a>
    <div class="nav-links">
        <a href="#arena">Arena</a>
        <a href="#champions">Champions</a>
        <a href="https://priscadezigns.org/ateliagaming/shop/">Armory</a>
    </div>
</nav>

<section class="hero" id="arena">
    <div class="hero-content">
        <h1>THE ARENA</h1>
        <p style="font-size:1.5rem; color:#888;">ASTRA VANGUARD leads the charge in the ultimate high-fidelity gaming ecosystem.</p>
        <button class="cta-button" onclick="startGame()">Start Game</button>
    </div>
    <img src="https://priscadezigns.org/ateliagaming/assets/astra/astra_3d_hf.webp" alt="Astra" class="hero-img">
</section>

<section class="champions" id="champions">
    <h2 style="font-family:'Bangers'; font-size:4rem; color:var(--orange);">CHAMPIONS</h2>
    <div class="champion-grid">
        <div class="champion-card">
            <img src="https://priscadezigns.org/ateliagaming/assets/astra/astra_3d_hf.webp" alt="Astra">
            <h3 style="font-family:'Bangers'; font-size:2rem;">ASTRA</h3>
            <p>The Vanguard of Truth.</p>
        </div>
        <div class="champion-card">
            <img src="https://priscadezigns.org/ateliagaming/assets/mimi/mimi_3d_hf.webp" alt="Mimi">
            <h3 style="font-family:'Bangers'; font-size:2rem;">MIMI</h3>
            <p>The Otaku Sage.</p>
        </div>
        <div class="champion-card">
            <img src="https://priscadezigns.org/ateliagaming/assets/nova/nova_3d_hf.webp" alt="Nova">
            <h3 style="font-family:'Bangers'; font-size:2rem;">NOVA</h3>
            <p>The Signal Engineer.</p>
        </div>
        <div class="champion-card">
            <img src="https://priscadezigns.org/ateliagaming/assets/echo/echo_3d_hf.webp" alt="Echo">
            <h3 style="font-family:'Bangers'; font-size:2rem;">ECHO</h3>
            <p>The Frequency Hybrid.</p>
        </div>
    </div>
</section>

<section class="champions" style="background:#000;">
    <h2 style="font-family:'Bangers'; font-size:3rem; color:var(--white);">NATIVE TOKENS</h2>
    <div style="display:flex; justify-content:center; gap:50px; flex-wrap:wrap;">
        <div class="champion-card" style="width:300px;">
            <img src="https://priscadezigns.org/ateliagaming/assets/logos/atelia_coin_separate.webp" class="coin-img" alt="ATLR">
            <h3 style="font-family:'Bangers'; font-size:2.5rem;">ATLR</h3>
            <p>Native utility for the lab.</p>
        </div>
    </div>
</section>

<div id="gameArea">
    <img id="player" src="https://priscadezigns.org/ateliagaming/assets/echo/echo_running.webp" alt="Echo">
    <div id="score" style="position:absolute; top:20px; right:20px; font-family:'Bangers'; font-size:2.5rem; color:var(--orange);">Score: 0</div>
</div>

<script>
    let isJumping = false;
    let score = 0;
    let gameActive = false;

    function startGame() {
        document.getElementById('gameArea').style.display = 'block';
        gameActive = true;
        score = 0;
        document.getElementById('arena').style.display = 'none';
        document.getElementById('champions').style.display = 'none';
        spawnObstacle();
    }

    function jump() {
        if (isJumping || !gameActive) return;
        isJumping = true;
        let p = document.getElementById('player');
        p.src = 'https://priscadezigns.org/ateliagaming/assets/echo/echo_jumping.webp';
        p.style.transform = 'scaleX(-1)'; // Echo facing correction
        
        let pos = 20;
        let up = setInterval(() => {
            if (pos >= 250) {
                clearInterval(up);
                let down = setInterval(() => {
                    if (pos <= 20) {
                        clearInterval(down);
                        isJumping = false;
                        p.src = 'https://priscadezigns.org/ateliagaming/assets/echo/echo_running.webp';
                    }
                    pos -= 10;
                    p.style.bottom = pos + 'px';
                }, 20);
            }
            pos += 12;
            p.style.bottom = pos + 'px';
        }, 20);
    }

    function spawnObstacle() {
        if (!gameActive) return;
        let area = document.getElementById('gameArea');
        let obs = document.createElement('div');
        obs.className = 'obstacle';
        obs.style.right = '-50px';
        area.appendChild(obs);

        let move = setInterval(() => {
            if (!gameActive) { clearInterval(move); return; }
            let r = parseInt(obs.style.right);
            if (r > area.clientWidth) {
                clearInterval(move);
                area.removeChild(obs);
                score++;
                document.getElementById('score').innerText = 'Score: ' + score;
            }
            
            let p = document.getElementById('player');
            let pRect = p.getBoundingClientRect();
            let oRect = obs.getBoundingClientRect();
            
            if (pRect.right > oRect.left && pRect.left < oRect.right && pRect.bottom > oRect.top) {
                gameActive = false;
                alert('GAME OVER! YOUR SCORE: ' + score);
                location.reload();
            }
            obs.style.right = (r + 10) + 'px';
        }, 20);

        setTimeout(spawnObstacle, 1500 + Math.random() * 2000);
    }

    window.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });
    window.addEventListener('touchstart', jump);
</script>

</body>
</html>
