<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelia Gaming | Neural Play</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>.sidebar { position: fixed; right: -400px; top: 0; width: 400px; height: 100vh; background: rgba(5,5,5,0.98); backdrop-filter: blur(25px); border-left: 1px solid #222; transition: 0.5s cubic-bezier(0.8,0,0.2,1); z-index: 10000; overflow-y: auto; font-family: sans-serif; } .sidebar.active { right: 0; } .sidebar-header { padding: 30px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; color: white; } .close-btn { background: none; border: none; color: #555; font-size: 2rem; cursor: pointer; } .sidebar-tabs { display: flex; border-bottom: 1px solid #111; } .sidebar-tabs button { flex: 1; background: none; border: none; color: #444; padding: 15px; font-size: 0.6rem; font-weight: 800; cursor: pointer; transition: 0.3s; } @media (max-width: 480px) { .sidebar { width: 100%; right: -100%; } }</style><style>
        :root {
            --red: #D32F2F;
            --orange: #FF6B00;
            --white: #FFFFFF;
            --black: #050505;
        }
        body, html {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            background-color: var(--black); color: var(--white); overflow-x: hidden;
        }
        
        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; background: rgba(0,0,0,0.9); border-bottom: 1px solid #1a1a1a;
            position: fixed; top: 0; width: 90%; z-index: 1000; backdrop-filter: blur(10px);
        }
        .logo-img { height: 40px; filter: drop-shadow(0 0 5px var(--red)); }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-link { 
            color: #888; text-decoration: none; font-family: 'Russo One'; font-size: 0.8rem; 
            letter-spacing: 1px; transition: 0.3s;
        }
        .nav-link:hover, .nav-link.active { color: var(--red); }
        .hub-btn {
            background: var(--red); color: white; padding: 10px 20px; 
            font-family: 'Russo One'; text-decoration: none; border-radius: 4px;
            box-shadow: 0 0 15px rgba(211,47,47,0.3); transition: 0.3s;
        }
        .hub-btn:hover { background: var(--orange); box-shadow: 0 0 20px var(--orange); }

        /* Hero Section */
        #hero {
            height: 100vh; display: flex; align-items: center; justify-content: space-between;
            padding: 0 10%; background: radial-gradient(circle at 70% 50%, #1a0a0a 0%, #050505 100%);
            position: relative; overflow: hidden;
        }
        .hero-content { max-width: 500px; z-index: 10; }
        .hero-title { font-family: 'Bangers'; font-size: 6rem; line-height: 0.9; margin: 0; letter-spacing: 4px; }
        .hero-subtitle { font-family: 'Russo One'; color: var(--red); font-size: 1.2rem; margin: 20px 0; letter-spacing: 2px; }
        .hero-desc { color: #888; line-height: 1.6; margin-bottom: 35px; font-size: 1rem; }
        
        .hero-img-wrap { position: relative; height: 80vh; width: 50%; display: flex; align-items: center; justify-content: center; }
        .astra-hero {
            height: 110%; filter: drop-shadow(0 0 30px rgba(211,47,47,0.4));
            animation: floatHero 6s ease-in-out infinite;
        }
        @keyframes floatHero { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-30px) rotate(2deg); } }

        .cta-btn {
            display: inline-block; padding: 18px 45px; background: white; color: black;
            font-family: 'Russo One'; text-decoration: none; font-size: 1.1rem;
            border: 2px solid white; transition: 0.3s;
        }
        .cta-btn:hover { background: transparent; color: white; }

        /* Grid Background Effect */
        #hero::before {
            content: ''; position: absolute; inset: 0;
            background-image: linear-gradient(rgba(211,47,47,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(211,47,47,0.05) 1px, transparent 1px);
            background-size: 50px 50px; transform: perspective(500px) rotateX(60deg) translateY(-100px);
            mask-image: linear-gradient(to bottom, black, transparent);
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html"><img src="https://priscadezigns.org/logos/atelier-gaming.png" class="logo-img" alt="Atelia Logo"></a>
        <div class="nav-links">
            <a href="index.html" class="nav-link active">HOME</a>
            <a href="shop.html" class="nav-link">SHOP</a>
            <a href="leaderboard.html" class="nav-link">RECORDS</a>
            <a href="game.html" class="hub-btn">GAMING HUB</a>
        </div>
    </nav>

    <section id="hero">
        <div class="hero-content">
            <h1 class="hero-title">ATELIA<br>GAMING</h1>
            <p class="hero-subtitle">VANGUARD OPERATIONAL</p>
            <p class="hero-desc">Enter the laboratory of high-fidelity play. Discover the next generation of Play-to-Earn protocols featuring Astra and the Vanguard unit.</p>
            <a href="game.html" class="cta-btn">ENTER THE ARENA</a>
        </div>
        <div class="hero-img-wrap">
            <img src="https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp" class="astra-hero" alt="Astra Vanguard">
        </div>
    </section>

<div id="sidebar" class="sidebar"><div class="sidebar-header"><h2 style="font-size:1.1rem; margin:0; font-weight: 900;">PRISCION WALLET</h2><button onclick="toggleSidebar()" class="close-btn">&times;</button></div><div class="sidebar-tabs"><button id="tab-assets" onclick="switchWalletTabCore('assets')">Assets</button><button id="tab-vault" onclick="switchWalletTabCore('vault')">Vault</button><button id="tab-shop" onclick="switchWalletTabCore('shop')">Hub</button><button id="tab-sync" onclick="switchWalletTabCore('sync')">Security</button></div><div id="wallet-main-view"></div></div><script src="../wallet-core.js"></script><script>function toggleSidebar(){ const s=document.getElementById('sidebar'); s.classList.toggle('active'); if(s.classList.contains('active')){ if(typeof initializeWallet==='function') initializeWallet('sidebar'); } }</script></body>
</html>
