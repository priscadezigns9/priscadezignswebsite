<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Neural Bench | Atelia Gaming Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00F0FF; --bg: #050505; --text: #FFFFFF; --border: rgba(0,240,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; line-height: 1.6; }

        header { position: fixed; top: 0; width: 100%; padding: 25px 8%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(5,5,5,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Space Mono', monospace; font-size: 1.2rem; font-weight: 700; letter-spacing: 4px; text-decoration: none; color: var(--accent); }
        
        .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 150px 8% 100px; text-align: center; }
        .tag { font-family: 'Space Mono', monospace; color: var(--accent); font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 40px; }
        h1 { font-size: clamp(3rem, 10vw, 7rem); font-weight: 900; letter-spacing: -2px; line-height: 0.9; margin-bottom: 60px; text-shadow: 0 0 20px rgba(0,240,255,0.2); }

        .bench-interface { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 60px; border-radius: 4px; max-width: 1000px; width: 100%; position: relative; box-shadow: inset 0 0 50px rgba(0,240,255,0.05); }
        
        .input-group { display: flex; gap: 20px; margin-top: 20px; }
        input { flex: 1; padding: 25px; background: transparent; border: 1px solid var(--border); color: #fff; font-family: inherit; font-size: 1.1rem; }
        .run-btn { padding: 0 40px; background: var(--accent); color: #000; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; letter-spacing: 2px; }

        #bench-result { margin-top: 60px; }
        .report { text-align: left; animation: glowPulse 2s infinite alternate; }
        @keyframes glowPulse { from { border-color: rgba(0,240,255,0.1); } to { border-color: rgba(0,240,255,0.5); } }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 30px; }
        .stat-item { padding: 25px; background: rgba(0,240,255,0.03); border: 1px solid var(--border); }
        .s-label { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
        .s-val { font-size: 1.5rem; font-weight: 900; }

        .acq-btn { display: inline-block; width: 100%; text-align: center; background: #fff; color: #000; text-decoration: none; padding: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; margin-top: 40px; }

        footer { padding: 100px 8% 50px; text-align: center; border-top: 1px solid var(--border); opacity: 0.3; }
    </style>
</head>
<body>
    <header>
        <a href="../" class="logo">ATELIA LAB</a>
        <nav><a href="../" style="color:#fff; text-decoration:none; font-weight:700; font-size:0.7rem; text-transform:uppercase; letter-spacing:2px;">Terminal</a></nav>
    </header>

    <main class="hero">
        <div class="tag">Hardware Optimization V9.0</div>
        <h1>Neural Bench.</h1>

        <div class="bench-interface">
            <p style="color:#666; margin-bottom:40px; text-transform:uppercase; letter-spacing:3px; font-size:0.8rem;">Identify Target Game or Hardware Specification</p>
            <div class="input-group">
                <input type="text" id="ai-input" placeholder="e.g. Cyberpunk 2077 at 4K, RTX 5090 config..." autocomplete="off">
                <button class="run-btn" onclick="runBench()">Execute</button>
            </div>
            <div id="bench-result"></div>
        </div>
    </main>

    <footer>© 2026 ATELIA GAMING // HIGH-PERFORMANCE NEURAL CORE</footer>

    <script>
    function runBench() {
        const input = document.getElementById('ai-input').value.trim();
        const res = document.getElementById('bench-result');
        if(!input) return;

        res.innerHTML = '<p style="color:var(--accent); font-weight:900; letter-spacing:8px; margin-top:40px;">CALIBRATING SIGNAL...</p>';

        setTimeout(() => {
            const query = input.toLowerCase(); const tag = "priscadezigns-20";
            let fps = "144+"; let latency = "8ms"; let thermal = "Optimized";
            
            if(query.includes('4k')) { fps = "85"; latency = "15ms"; }
            if(query.includes('rtx')) { fps = "240+"; latency = "2ms"; }

            res.innerHTML = `
                <div class="report" style="border-top:1px solid var(--accent); padding-top:40px; margin-top:40px;">
                    <span class="tag" style="font-size:0.6rem;">Simulation Complete // Astra-Nova Link Stable</span>
                    <h2 style="font-size:2.5rem; margin:10px 0 30px;">Optimization Verdict</h2>
                    
                    <div class="stat-grid">
                        <div class="stat-item"><div class="s-label">Projected FPS</div><div class="s-val">${fps}</div></div>
                        <div class="stat-item"><div class="s-label">Signal Latency</div><div class="s-val">${latency}</div></div>
                        <div class="stat-item"><div class="s-label">Thermal Delta</div><div class="s-val">${thermal}</div></div>
                    </div>

                    <a href="https://www.amazon.com/s?k=${encodeURIComponent(input)}+gaming+hardware&tag=${tag}" target="_blank" class="acq-btn">Acquire Performance Hardware →</a>
                </div>
            `;
        }, 1800);
    }
    </script>
</body>
</html>
