<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelia Gaming | Armory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --red: #D32F2F; --white: #FFFFFF; --black: #050505; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--black); color: var(--white); }
        nav { background: rgba(5,5,5,0.98); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--red); position: sticky; top: 0; z-index: 1000; }
        .logo-img { height: 60px; }
        .nav-links a { color: var(--white); text-decoration: none; margin-left: 20px; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 50px 5%; }
        .product-card { background: #111; border: 1px solid #222; border-radius: 12px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; text-align: center; }
        .product-card:hover { transform: translateY(-10px); border-color: var(--red); box-shadow: 0 10px 30px rgba(211, 47, 47, 0.2); }
        .product-image { width: 100%; height: 300px; object-fit: cover; background: #fff; }
        .product-info { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-info h3 { margin: 0 0 10px; font-size: 1.1rem; font-weight: 800; color: var(--white); }
        .price { color: var(--red); font-weight: 800; font-size: 1.2rem; margin-bottom: 20px; display: block; }
        .buy-link { background: var(--red); color: white; text-align: center; padding: 12px; text-decoration: none; font-weight: 800; border-radius: 4px; text-transform: uppercase; font-size: 0.8rem; }
        footer { padding: 40px 5%; text-align: center; border-top: 1px solid #222; font-size: 12px; opacity: 0.6; }
        #empire-mandate { background: #000; color: #4682B4; padding: 15px 0; text-align: center; font-size: 11px; font-weight: 700; text-transform: uppercase; border-top: 1px solid #222; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav>
        <a href="../index.html"><img src="https://priscadezigns.org/logos/atelier-gaming.png" class="logo-img" alt="Atelia Logo"></a>
        <div class="nav-links">
            <a href="../bench/">Neural Bench AI</a>
            <a href="../arena.html">The Arena</a>
            <a href="https://priscadezigns.org/ateliagaming/shop/">Armory</a>
        </div>
    </nav>
    <div class="product-grid" id="grid"></div>
    <footer>
        <img src="https://priscadezigns.org/logos/atelier-gaming.png" style="height: 30px; margin-bottom: 10px;" alt="Atelia Logo"><br>
        © 2026 ATELIA GAMING LABS · A PRISCA DEZIGNS AFFILIATE
    </footer>
    <div id="empire-mandate">EMPIRE MANDATE: 10% OF EVERY PURCHASE SUPPORTS <a href="https://priscadezigns.org/thewaymadeknown/" style="color: #4682B4; text-decoration: none;">THE WAY MADE KNOWN</a> MISSION.</div>

    <script>
        const SB_URL = 'https://sazhdnqzaqpqcralmthh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function load() {
            const { data, error } = await sb.from('empire_inventory').select('*').eq('brand', 'Atelia Gaming');
            if (error) return;
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map(p => `
                <div class="product-card">
                    <img src="${p.image_url}" class="product-image" loading="lazy">
                    <div class="product-info">
                        <h3>${p.title}</h3>
                        <span class="price">${p.price}</span>
                        <a href="${p.affiliate_link}" class="buy-link" target="_blank">Acquire on Amazon</a>
                    </div>
                </div>
            `).join('');
        }
        load();
    </script>
</body>
</html>
