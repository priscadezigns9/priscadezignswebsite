<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>The Armory | Atelia Gaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #FF3E3E; --bg: #050508; --text: #FFFFFF; --border: rgba(255,62,62,0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        nav { padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .logo img { height: 50px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 80px 5%; }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 3.5rem; margin-bottom: 50px; text-align: center; text-transform: uppercase; letter-spacing: -2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .card { background: #0D0D14; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; padding: 30px; transition: 0.3s; text-decoration: none; color: inherit; position: relative; }
        .card:hover { border-color: var(--red); box-shadow: 0 0 30px rgba(255,62,62,0.1); transform: translateY(-5px); }
        .img-box { aspect-ratio: 1/1; background: #fff; margin-bottom: 30px; border-radius: 2px; display: flex; align-items: center; justify-content: center; padding: 30px; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; mix-blend-mode: multiply; }
        .item-category { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; color: var(--red); font-weight: 700; margin-bottom: 15px; }
        .item-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; margin-bottom: 15px; font-size: 1.4rem; line-height: 1.1; }
        .item-price { font-weight: 700; font-size: 1.2rem; color: #fff; margin-bottom: 25px; }
        .btn { display: inline-block; width: 100%; text-align: center; background: var(--red); color: #fff; padding: 14px; border-radius: 2px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav>
        <a href="../" class="logo"><img src="https://priscadezigns.org/ateliagaming/assets/atelia_rect_logo.webp" alt="Atelia Gaming"></a>
    </nav>
    <div class="container">
        <h1>THE ARMORY</h1>
        <div class="grid">
            <a href="https://www.amazon.com/dp/B0C7S9S9K9?tag=priscadezigns-20" class="card" target="_blank">
                <div class="item-category">Peripherals</div>
                <div class="img-box"><img src="https://m.media-amazon.com/images/I/71RoxAM5DVL._AC_SL1500_.jpg" alt="Logitech G Pro"></div>
                <div class="item-title">Logitech G PRO X 2 Lightspeed Wireless</div>
                <div class="item-price">$249.00</div>
                <div class="btn">Deploy Intel</div>
            </a>
            <a href="https://www.amazon.com/dp/B0CFSR9DNG?tag=priscadezigns-20" class="card" target="_blank">
                <div class="item-category">Hardware</div>
                <div class="img-box"><img src="https://m.media-amazon.com/images/I/61PQSiTkywL._AC_SL1500_.jpg" alt="RTX 4090"></div>
                <div class="item-title">ASUS ROG Strix GeForce RTX™ 4090</div>
                <div class="item-price">$1,999.99</div>
                <div class="btn">Deploy Intel</div>
            </a>
            <a href="https://www.amazon.com/dp/B0CHH6W6V5?tag=priscadezigns-20" class="card" target="_blank">
                <div class="item-category">Display</div>
                <div class="img-box"><img src="https://m.media-amazon.com/images/I/81B-8tM+xPL._AC_SL1500_.jpg" alt="ROG Swift"></div>
                <div class="item-title">ASUS ROG Swift 32” 4K OLED Monitor</div>
                <div class="item-price">$1,299.00</div>
                <div class="btn">Deploy Intel</div>
            </a>
        </div>
    </div>
</body>
</html>
