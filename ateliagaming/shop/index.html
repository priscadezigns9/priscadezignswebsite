<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>The Armory | Atelia Gaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #FF3E3E; --bg: #0A0A0B; --text: #FFFFFF; --border: rgba(255,62,62,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; letter-spacing: 0.02em; }
        nav { padding: 40px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo-group { display: flex; align-items: center; gap: 15px; text-decoration: none; color: #fff; }
        .logo-mark { width: 45px; height: 45px; background: var(--red); display: flex; align-items: center; justify-content: center; border-radius: 2px; }
        .logo-mark img { height: 25px; }
        .logo-text { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
        .container { max-width: 1200px; margin: 0 auto; padding: 100px 5%; }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 3.5rem; margin-bottom: 70px; text-align: center; text-transform: uppercase; font-weight: 700; letter-spacing: -2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 60px; }
        .card { background: #000; border: 1px solid var(--border); padding: 40px 30px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); text-decoration: none; color: inherit; text-align: center; border-radius: 4px; }
        .card:hover { border-color: var(--red); background: #0D0D14; box-shadow: 0 0 30px rgba(255,62,62,0.05); }
        .img-box { aspect-ratio: 1/1.2; background: #fff; margin-bottom: 35px; display: flex; align-items: center; justify-content: center; padding: 40px; border-radius: 2px; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; mix-blend-mode: multiply; transition: 0.5s; }
        .card:hover .img-box img { transform: scale(1.05); }
        .item-brand { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 5px; color: var(--red); margin-bottom: 15px; font-weight: 700; }
        .item-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; margin-bottom: 15px; font-weight: 700; line-height: 1.1; }
        .item-price { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; color: #fff; margin-bottom: 30px; font-weight: 300; }
        .btn { display: inline-block; width: 100%; text-align: center; border-bottom: 1px solid var(--red); color: var(--red); padding-bottom: 10px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; transition: 0.3s; }
        .card:hover .btn { letter-spacing: 5px; background: rgba(255,62,62,0.05); }
    </style>
</head>
<body>
    <nav>
        <a href="../" class="logo-group">
            <div class="logo-mark"><img src="https://priscadezigns.org/ateliagaming/assets/atelia_icon_logo.webp" alt="A"></div>
            <span class="logo-text">ATELIA GAMING</span>
        </a>
    </nav>
    <div class="container">
        <h1>THE ARMORY</h1>
        <div class="grid">
            <a href="https://www.amazon.com/dp/B0C7S9S9K9?tag=priscadezigns-20" class="card" target="_blank">
                <div class="item-brand">Logitech</div>
                <div class="img-box"><img src="https://m.media-amazon.com/images/I/71RoxAM5DVL._AC_SL1500_.jpg" alt="Logitech G Pro"></div>
                <div class="item-title">PRO X 2 LIGHTSPEED Wireless</div>
                <div class="item-price">$249.00</div>
                <div class="btn">Deploy Intel</div>
            </a>
            <a href="https://www.amazon.com/dp/B0CFSR9DNG?tag=priscadezigns-20" class="card" target="_blank">
                <div class="item-brand">ASUS ROG</div>
                <div class="img-box"><img src="https://m.media-amazon.com/images/I/61PQSiTkywL._AC_SL1500_.jpg" alt="RTX 4090"></div>
                <div class="item-title">Strix GeForce RTX™ 4090</div>
                <div class="item-price">$1,999.99</div>
                <div class="btn">Deploy Intel</div>
            </a>
            <a href="https://www.amazon.com/dp/B0CHH6W6V5?tag=priscadezigns-20" class="card" target="_blank">
                <div class="item-brand">ASUS ROG</div>
                <div class="img-box"><img src="https://m.media-amazon.com/images/I/81B-8tM+xPL._AC_SL1500_.jpg" alt="ROG Swift"></div>
                <div class="item-title">Swift 32” 4K OLED Monitor</div>
                <div class="item-price">$1,299.00</div>
                <div class="btn">Deploy Intel</div>
            </a>
        </div>
    </div>
</body>
</html>
