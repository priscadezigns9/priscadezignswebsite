<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelia Bubbles | Neural Cleanup</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #D32F2F;
            --orange: #FF6B00;
            --white: #FFFFFF;
            --black: #050505;
        }
        body, html {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            background-color: var(--black); color: var(--white); height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }
        nav { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); }
        .logo-img { height: 40px; filter: drop-shadow(0 0 5px var(--red)); }

        #game-area {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(45deg, #050505 0%, #111 100%);
            position: relative;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            grid-template-rows: repeat(8, 50px);
            gap: 5px;
            padding: 10px;
            background: rgba(255,255,255,0.02);
            border: 2px solid rgba(255,107,0,0.2);
        }

        .bubble {
            width: 50px; height: 50px; border-radius: 50%;
            cursor: pointer; transition: 0.2s;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.5);
        }
        .bubble:hover { transform: scale(1.1); z-index: 10; border-color: white; }

        .red { background: radial-gradient(circle at 30% 30%, #ff5555, #D32F2F); }
        .orange { background: radial-gradient(circle at 30% 30%, #ff9955, #FF6B00); }
        .blue { background: radial-gradient(circle at 30% 30%, #55aaff, #2979FF); }
        .purple { background: radial-gradient(circle at 30% 30%, #aa55ff, #6200EA); }

        #ui {
            position: absolute; top: 30px; right: 30px; text-align: right;
        }
        .score-box { font-family: 'Bangers'; font-size: 3rem; color: var(--white); }
        .atlr-box { font-family: 'Russo One'; font-size: 1.2rem; color: var(--orange); }

        #timer-bar {
            width: 400px; height: 10px; background: #222; margin-top: 20px;
            position: relative; overflow: hidden;
        }
        #timer-fill { height: 100%; width: 100%; background: var(--red); transition: linear; }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn {
            padding: 15px 40px; background: var(--red); color: white;
            border: 3px solid white; font-family: 'Russo One'; font-size: 1.5rem;
            cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html"><img src="https://priscadezigns.org/logos/atelier-gaming.png" class="logo-img" alt="Atelia Logo"></a>
        <div style="font-family:'Russo One'; font-size:1.2rem; color:var(--red);">ATELIA BUBBLES</div>
    </nav>

    <div id="game-area">
        <div id="ui">
            <div class="score-box" id="score">000</div>
            <div class="atlr-box"><img src="https://priscadezigns.org/ateliagaming/assets/coins/atlr_coin_separate.webp" height="25"> <span id="atlr">0</span> EARNED</div>
        </div>

        <div id="grid"></div>

        <div id="timer-bar"><div id="timer-fill"></div></div>

        <div id="overlay">
            <h1 style="font-family:'Bangers'; font-size:5rem;">NEURAL CLEANUP</h1>
            <p style="font-family:'Russo One'; color:var(--orange);">MATCH COLORS TO CLEAR DEBRIS</p>
            <button class="btn" onclick="start()">START PROTOCOL</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/ateliagaming/js/atelia_supabase.js"></script>
    <script>
        const colors = ['red', 'orange', 'blue', 'purple'];
        let score = 0, atlr = 0, timeLeft = 60, active = false;

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i=0; i<64; i++) {
                const b = document.createElement('div');
                b.className = 'bubble ' + colors[Math.floor(Math.random()*colors.length)];
                b.onclick = () => pop(b);
                grid.appendChild(b);
            }
        }

        function pop(el) {
            if(!active) return;
            const color = el.className.split(' ')[1];
            el.style.transform = 'scale(0)';
            score += 10;
            atlr = Math.floor(score / 50);
            document.getElementById('score').innerText = score.toString().padStart(3, '0');
            document.getElementById('atlr').innerText = atlr;
            
            setTimeout(() => {
                el.className = 'bubble ' + colors[Math.floor(Math.random()*colors.length)];
                el.style.transform = 'scale(1)';
            }, 500);
        }

        function start() {
            score = 0; atlr = 0; timeLeft = 60; active = true;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('score').innerText = '000';
            document.getElementById('atlr').innerText = '0';
            createGrid();
            tick();
        }

        function tick() {
            if(!active) return;
            timeLeft -= 0.1;
            document.getElementById('timer-fill').style.width = (timeLeft / 60 * 100) + '%';
            
            if(timeLeft <= 0) {
                active = false;
                end();
            } else {
                setTimeout(tick, 100);
            }
        }

        async function end() {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlay').querySelector('h1').innerText = 'MISSION COMPLETE';
            document.getElementById('overlay').querySelector('p').innerText = 'YOU EARNED ' + atlr + ' ATLR';
            if(window.Atelia) {
                const user = await Atelia.auth.getUser();
                if(user.data.user) {
                    await Atelia.arena.updatePrestige(user.data.user.id, atlr);
                }
            }
        }
    </script>
</body>
</html>
