<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra Wings | Atelia Gaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #D32F2F;
            --orange: #FF6B00;
            --white: #FFFFFF;
            --black: #050505;
        }
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--black);
            color: var(--white);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #arena-header {
            background: #000;
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--red);
        }
        .logo-img { height: 40px; filter: drop-shadow(0 0 5px var(--red)); }
        
        #game-container {
            flex: 1;
            width: 100%;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 100%);
            position: relative;
            overflow: hidden;
        }
        
        #bird {
            width: 80px; height: 80px;
            position: absolute;
            left: 100px;
            top: 50%;
            z-index: 100;
            filter: drop-shadow(0 0 10px rgba(255,107,0,0.5));
            transition: transform 0.1s;
        }

        .pipe {
            position: absolute;
            width: 80px;
            background: linear-gradient(90deg, #222, #333, #222);
            border: 2px solid var(--red);
            z-index: 50;
        }

        #score-ui {
            position: absolute;
            top: 20px;
            right: 40px;
            font-family: 'Bangers';
            font-size: 4rem;
            color: white;
            text-shadow: 0 0 20px var(--red);
            z-index: 200;
        }

        #select-screen, #results-modal, #auth-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .selection-grid { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin: 30px 0; }
        .char-opt {
            text-align: center; cursor: pointer; transition: 0.3s; padding: 10px;
            border: 2px solid transparent; width: 120px;
        }
        .char-opt:hover { background: #111; border-color: var(--orange); }
        .char-opt.active { background: #222; border-color: white; box-shadow: 0 0 15px var(--red); }
        .char-opt img { height: 120px; width: 100%; object-fit: contain; filter: grayscale(1); }
        .char-opt:hover img, .char-opt.active img { filter: grayscale(0); }
        .char-opt p { font-family: 'Bangers'; font-size: 1.2rem; margin-top: 10px; }

        .btn {
            padding: 15px 40px; background: var(--red); color: white;
            border: 3px solid white; font-family: 'Russo One'; font-size: 1.5rem;
            cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: var(--orange); transform: scale(1.05); }

        #profile-hub {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            display: flex; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 12px;
            border: 1px solid rgba(255,107,0,0.3);
        }
        #p-avatar { height: 60px; filter: drop-shadow(0 0 5px var(--orange)); }
        #p-username { font-family: 'Russo One'; font-size: 0.9rem; color: #fff; }
        #p-prestige { font-family: 'Bangers'; font-size: 1.1rem; color: var(--orange); }
    </style>
</head>
<body>

    <header id="arena-header">
        <a href="index.html"><img src="https://priscadezigns.org/logos/atelier-gaming.png" class="logo-img" alt="Atelia Logo"></a>
        <div style="font-family:'Russo One'; font-size:1.2rem; color:var(--red);">ASTRA WINGS V1.0</div>
    </header>

    <div id="game-container">
        <div id="profile-hub" style="display: none;">
            <img id="p-avatar" src="" alt="Avatar">
            <div>
                <div id="p-username">VANGUARD</div>
                <div id="p-prestige">0 ATLR</div>
            </div>
        </div>

        <div id="score-ui">00</div>

        <img id="bird" src="https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp">

        <div id="select-screen">
            <h2 style="font-family:'Bangers'; font-size:4rem; margin:0;">ASTRA WINGS</h2>
            <p style="font-family:'Russo One'; color:var(--orange);">SELECT YOUR PILOT</p>
            <div class="selection-grid">
                <div class="char-opt active" onclick="sel('astra')" id="o-astra"><img src="https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp"><p>ASTRA</p></div>
                <div class="char-opt" onclick="sel('mimi')" id="o-mimi"><img src="https://priscadezigns.org/ateliagaming/assets/mimi/mimi_full_body_2d.webp"><p>MIMI</p></div>
                <div class="char-opt" onclick="sel('nova')" id="o-nova"><img src="https://priscadezigns.org/ateliagaming/assets/nova/nova_v4.webp"><p>NOVA</p></div>
                <div class="char-opt" onclick="sel('echo')" id="o-echo"><img src="https://priscadezigns.org/ateliagaming/assets/echo/echo_2d_hf.webp"><p>ECHO</p></div>
            </div>
            <button class="btn" onclick="startGame()">INITIATE FLIGHT</button>
        </div>

        <div id="results-modal" style="display:none;">
            <h2 style="font-family:'Bangers'; font-size:5rem; color:var(--red); margin:0;">ALTITUDE LOST</h2>
            <p style="font-family:'Russo One'; font-size:2rem;">SCORE: <span id="final-score">0</span></p>
            <div style="display:flex; align-items:center; gap:15px; margin:20px 0;">
                <img src="https://priscadezigns.org/ateliagaming/assets/coins/atlr_coin_separate.webp" height="60">
                <span style="font-family:'Bangers'; font-size:2.5rem; color:var(--orange);">+<span id="atlr-earned">0</span> ATLR</span>
            </div>
            <button class="btn" onclick="resetGame()">RE-ENTRY</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/ateliagaming/js/atelia_supabase.js"></script>
    <script>
        const assets = {
            astra: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp',
            mimi: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_full_body_2d.webp',
            nova: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_v4.webp',
            echo: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_2d_hf.webp'
        };

        let char = 'astra', active = false, score = 0;
        let birdY = 50, velocity = 0, gravity = 0.4, jump = -8;
        let pipes = [], frame = 0;

        const bird = document.getElementById('bird');
        const scoreUI = document.getElementById('score-ui');
        const container = document.getElementById('game-container');

        Atelia.auth.onAuthStateChange(async (e, session) => {
            if (session?.user) {
                document.getElementById('profile-hub').style.display = 'flex';
                const p = await Atelia.arena.getProfile(session.user.id);
                document.getElementById('p-username').innerText = (p.username || 'VANGUARD').toUpperCase();
                document.getElementById('p-prestige').innerText = (p.atlr_prestige || 0) + ' ATLR';
                document.getElementById('p-avatar').src = assets[char];
            }
        });

        function sel(c) {
            char = c;
            document.querySelectorAll('.char-opt').forEach(o => o.classList.remove('active'));
            document.getElementById('o-'+c).classList.add('active');
            bird.src = assets[c];
            if(document.getElementById('p-avatar')) document.getElementById('p-avatar').src = assets[c];
        }

        function startGame() {
            active = true;
            score = 0;
            birdY = container.clientHeight / 2;
            velocity = 0;
            pipes.forEach(p => p.el.remove());
            pipes = [];
            document.getElementById('select-screen').style.display = 'none';
            document.getElementById('results-modal').style.display = 'none';
            scoreUI.innerText = '00';
            requestAnimationFrame(gameLoop);
        }

        function flap() { if(active) velocity = jump; }

        function createPipe() {
            const gap = 200;
            const minHeight = 50;
            const maxHeight = container.clientHeight - gap - minHeight;
            const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;

            const topPipe = document.createElement('div');
            topPipe.className = 'pipe';
            topPipe.style.height = topHeight + 'px';
            topPipe.style.top = '0';
            topPipe.style.right = '-80px';
            container.appendChild(topPipe);

            const bottomPipe = document.createElement('div');
            bottomPipe.className = 'pipe';
            bottomPipe.style.height = (container.clientHeight - topHeight - gap) + 'px';
            bottomPipe.style.bottom = '0';
            bottomPipe.style.right = '-80px';
            container.appendChild(bottomPipe);

            pipes.push({ el: topPipe, x: -80, passed: false });
            pipes.push({ el: bottomPipe, x: -80, passed: false });
        }

        function gameLoop() {
            if(!active) return;
            frame++;

            velocity += gravity;
            birdY += velocity;
            bird.style.top = birdY + 'px';
            bird.style.transform = `rotate(${velocity * 3}deg)`;

            if(birdY < 0 || birdY > container.clientHeight - 80) return gameOver();

            if(frame % 100 === 0) createPipe();

            for(let i = pipes.length - 1; i >= 0; i--) {
                const p = pipes[i];
                p.x += 4;
                p.el.style.right = p.x + 'px';

                const bRect = bird.getBoundingClientRect();
                const pRect = p.el.getBoundingClientRect();

                if (bRect.right > pRect.left + 10 && bRect.left < pRect.right - 10 &&
                    bRect.bottom > pRect.top + 10 && bRect.top < pRect.bottom - 10) {
                    return gameOver();
                }

                if(!p.passed && p.x > container.clientWidth - 100) {
                    p.passed = true;
                    if(i % 2 === 0) {
                        score++;
                        scoreUI.innerText = score.toString().padStart(2, '0');
                    }
                }

                if(p.x > container.clientWidth + 100) {
                    p.el.remove();
                    pipes.splice(i, 1);
                }
            }
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            active = false;
            document.getElementById('final-score').innerText = score;
            document.getElementById('atlr-earned').innerText = score;
            document.getElementById('results-modal').style.display = 'flex';
            if(window.Atelia) Atelia.arena.saveScore(score, char);
        }

        function resetGame() {
            document.getElementById('results-modal').style.display = 'none';
            document.getElementById('select-screen').style.display = 'flex';
        }

        window.addEventListener('keydown', e => { if(e.code === 'Space') flap(); });
        container.addEventListener('mousedown', flap);
        container.addEventListener('touchstart', flap);
    </script>
</body>
</html>
