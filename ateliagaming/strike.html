<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelia Strike | Neural Defense</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #D32F2F;
            --orange: #FF6B00;
            --white: #FFFFFF;
            --black: #050505;
        }
        body, html {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            background-color: var(--black); color: var(--white); height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }
        nav { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); }
        .logo-img { height: 40px; filter: drop-shadow(0 0 5px var(--red)); }

        #game-area {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: url('https://images.unsplash.com/photo-1475274047050-1d0c0975c63e?w=1600&q=80');
            background-size: cover; position: relative; overflow: hidden;
        }

        #player {
            width: 80px; height: 80px; position: absolute; left: 50px; top: 50%;
            z-index: 100; transition: top 0.1s; filter: drop-shadow(0 0 10px var(--orange));
        }

        .bullet {
            position: absolute; width: 15px; height: 4px; background: #00ffff;
            box-shadow: 0 0 10px #00ffff; z-index: 90;
        }

        .enemy {
            position: absolute; width: 60px; height: 60px;
            background: url('https://priscadezigns.org/logos/pd_mark_sq.png');
            background-size: contain; filter: hue-rotate(300deg) brightness(1.5);
            z-index: 80;
        }

        #ui { position: absolute; top: 30px; right: 30px; text-align: right; }
        .score-box { font-family: 'Bangers'; font-size: 3rem; color: var(--white); }

        #overlay, #select-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn {
            padding: 15px 40px; background: var(--red); color: white;
            border: 3px solid white; font-family: 'Russo One'; font-size: 1.5rem;
            cursor: pointer; margin-top: 20px;
        }

        .char-grid { display: flex; gap: 20px; margin-top: 30px; }
        .char-opt {
            border: 2px solid #333; padding: 10px; cursor: pointer; transition: 0.3s; width: 100px; text-align: center;
        }
        .char-opt:hover, .char-opt.active { border-color: var(--red); background: #111; }
        .char-opt img { width: 100%; height: 100px; object-fit: contain; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html"><img src="https://priscadezigns.org/logos/atelier-gaming.png" class="logo-img" alt="Atelia Logo"></a>
        <div style="font-family:'Russo One'; font-size:1.2rem; color:var(--red);">ATELIA STRIKE</div>
    </nav>

    <div id="game-area">
        <div id="ui">
            <div class="score-box" id="score">000</div>
            <div style="font-family:'Bangers'; color:var(--orange); font-size:1.5rem;">+<span id="atlr">0</span> ATLR</div>
        </div>

        <img id="player" src="">

        <div id="select-screen">
            <h1 style="font-family:'Bangers'; font-size:5rem; margin:0;">ATELIA STRIKE</h1>
            <p style="font-family:'Russo One'; color:var(--orange);">CHOOSE YOUR VANGUARD PILOT</p>
            <div class="char-grid">
                <div class="char-opt active" onclick="sel('astra')" id="s-astra"><img src="https://priscadezigns.org/ateliagaming/assets/astra/astra_jumping.webp"><p>ASTRA</p></div>
                <div class="char-opt" onclick="sel('mimi')" id="s-mimi"><img src="https://priscadezigns.org/ateliagaming/assets/mimi/mimi_jumping.webp"><p>MIMI</p></div>
                <div class="char-opt" onclick="sel('nova')" id="s-nova"><img src="https://priscadezigns.org/ateliagaming/assets/nova/nova_jumping.webp"><p>NOVA</p></div>
                <div class="char-opt" onclick="sel('echo')" id="s-echo"><img src="https://priscadezigns.org/ateliagaming/assets/echo/echo_jumping.webp"><p>ECHO</p></div>
            </div>
            <button class="btn" onclick="start()">IGNITE ENGINES</button>
        </div>

        <div id="overlay" style="display:none;">
            <h1 style="font-family:'Bangers'; font-size:5rem;">LINK SEVERED</h1>
            <p id="res-text" style="font-family:'Russo One'; color:var(--orange);"></p>
            <button class="btn" onclick="location.reload()">RE-INITIATE</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/ateliagaming/js/atelia_supabase.js"></script>
    <script>
        const assets = {
            astra: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_jumping.webp',
            mimi: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_jumping.webp',
            nova: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_jumping.webp',
            echo: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_jumping.webp'
        };
        let char = 'astra', active = false, score = 0, atlr = 0;
        const player = document.getElementById('player');
        const area = document.getElementById('game-area');

        function sel(c) {
            char = c;
            document.querySelectorAll('.char-opt').forEach(o => o.classList.remove('active'));
            document.getElementById('s-'+c).classList.add('active');
            player.src = assets[c];
        }

        function start() {
            document.getElementById('select-screen').style.display = 'none';
            active = true;
            loop();
            setInterval(spawnEnemy, 1500);
            setInterval(fire, 300);
        }

        area.addEventListener('mousemove', e => {
            if(!active) return;
            player.style.top = (e.clientY - area.offsetTop - 40) + 'px';
        });
        area.addEventListener('touchmove', e => {
            if(!active) return;
            player.style.top = (e.touches[0].clientY - area.offsetTop - 40) + 'px';
        });

        function fire() {
            if(!active) return;
            const b = document.createElement('div');
            b.className = 'bullet';
            b.style.left = '130px';
            b.style.top = (player.offsetTop + 40) + 'px';
            area.appendChild(b);
            
            const move = setInterval(() => {
                b.style.left = (parseInt(b.style.left) + 10) + 'px';
                if(parseInt(b.style.left) > window.innerWidth) {
                    clearInterval(move); b.remove();
                }
                // Collision
                const enemies = document.querySelectorAll('.enemy');
                enemies.forEach(e => {
                    const er = e.getBoundingClientRect();
                    const br = b.getBoundingClientRect();
                    if(br.right > er.left && br.top < er.bottom && br.bottom > er.top) {
                        e.remove(); b.remove(); clearInterval(move);
                        score += 10; updateScore();
                    }
                });
            }, 20);
        }

        function spawnEnemy() {
            if(!active) return;
            const e = document.createElement('div');
            e.className = 'enemy';
            e.style.right = '-60px';
            e.style.top = Math.random() * (area.clientHeight - 60) + 'px';
            area.appendChild(e);

            const move = setInterval(() => {
                e.style.right = (parseInt(e.style.right) + 5) + 'px';
                if(parseInt(e.style.right) > window.innerWidth) {
                    clearInterval(move); e.remove();
                }
                // Player collision
                const pr = player.getBoundingClientRect();
                const er = e.getBoundingClientRect();
                if(er.left < pr.right && er.top < pr.bottom && er.bottom > pr.top) {
                    active = false; end();
                }
            }, 20);
        }

        function updateScore() {
            document.getElementById('score').innerText = score.toString().padStart(3, '0');
            atlr = Math.floor(score / 5);
            document.getElementById('atlr').innerText = atlr;
        }

        function end() {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('res-text').innerText = 'TOTAL ATLR SECURED: ' + atlr;
            if(window.Atelia) {
                Atelia.auth.getUser().then(u => {
                    if(u.data.user) Atelia.arena.updatePrestige(u.data.user.id, atlr);
                });
            }
        }

        function loop() { if(active) requestAnimationFrame(loop); }
    </script>
</body>
</html>
