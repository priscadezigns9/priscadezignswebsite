<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autodrome Circuit | High-Fidelity Racing</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #D32F2F;
            --orange: #FF6B00;
            --white: #FFFFFF;
            --black: #050505;
        }
        body, html {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            background-color: var(--black); color: var(--white); height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }
        nav { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); }
        .logo-img { height: 40px; filter: drop-shadow(0 0 5px var(--red)); }

        #game-area {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #111; position: relative; overflow: hidden;
        }

        #track {
            width: 300px; height: 100%; background: #222; border-left: 5px dashed #444; border-right: 5px dashed #444;
            position: relative; overflow: hidden;
        }
        .lane-line {
            position: absolute; left: 50%; width: 5px; height: 50px; background: rgba(255,255,255,0.2);
            transform: translateX(-50%); animation: moveLines 1s linear infinite;
        }
        @keyframes moveLines { from { top: -100px; } to { top: 100%; } }

        #car {
            width: 80px; height: 120px; position: absolute; bottom: 50px; left: 35px;
            background: url('https://priscadezigns.org/ateliagaming/assets/nova/nova_drive_v2.webp');
            background-size: cover; z-index: 100; transition: left 0.2s;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.8));
        }

        .obstacle {
            position: absolute; width: 60px; height: 100px; background: #D32F2F;
            border: 2px solid white; z-index: 50;
        }

        #ui { position: absolute; top: 30px; right: 30px; text-align: right; }
        .score-box { font-family: 'Bangers'; font-size: 3rem; color: var(--white); }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn {
            padding: 15px 40px; background: var(--red); color: white;
            border: 3px solid white; font-family: 'Russo One'; font-size: 1.5rem;
            cursor: pointer; margin-top: 20px;
        }
        .controls { margin-top: 20px; font-family: 'Russo One'; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html"><img src="https://priscadezigns.org/logos/atelier-gaming.png" class="logo-img" alt="Atelia Logo"></a>
        <div style="font-family:'Russo One'; font-size:1.2rem; color:var(--red);">AUTODROME CIRCUIT</div>
    </nav>

    <div id="game-area">
        <div id="ui">
            <div class="score-box" id="score">000</div>
            <div style="font-family:'Bangers'; color:var(--orange); font-size:1.5rem;">+<span id="atlr">0</span> ATLR</div>
        </div>

        <div id="track">
            <div id="car"></div>
        </div>

        <div class="controls">USE LEFT/RIGHT ARROWS OR TAP SIDES TO STEER</div>

        <div id="overlay">
            <h1 style="font-family:'Bangers'; font-size:5rem; margin:0;">AUTODROME CIRCUIT</h1>
            <p style="font-family:'Russo One'; color:var(--orange);">PRECISION DRIVING · SOVEREIGN REWARDS</p>
            <button class="btn" onclick="start()">IGNITE ENGINES</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/ateliagaming/js/atelia_supabase.js"></script>
    <script>
        let score = 0, atlr = 0, active = false, lane = 0; // 0: left, 1: right
        const car = document.getElementById('car');
        const track = document.getElementById('track');

        function start() {
            document.getElementById('overlay').style.display = 'none';
            active = true;
            score = 0; atlr = 0; lane = 0;
            updateCar();
            gameLoop();
            spawnObstacle();
        }

        function updateCar() {
            car.style.left = lane === 0 ? '35px' : '185px';
        }

        window.addEventListener('keydown', e => {
            if(!active) return;
            if(e.key === 'ArrowLeft') lane = 0;
            if(e.key === 'ArrowRight') lane = 1;
            updateCar();
        });

        track.addEventListener('touchstart', e => {
            if(!active) return;
            const x = e.touches[0].clientX - track.getBoundingClientRect().left;
            lane = x < 150 ? 0 : 1;
            updateCar();
        });

        function spawnObstacle() {
            if(!active) return;
            const obs = document.createElement('div');
            obs.className = 'obstacle';
            const oLane = Math.random() > 0.5 ? 0 : 1;
            obs.style.left = oLane === 0 ? '45px' : '195px';
            obs.style.top = '-100px';
            track.appendChild(obs);

            let obsY = -100;
            const move = setInterval(() => {
                if(!active) { clearInterval(move); obs.remove(); return; }
                obsY += 7 + (score / 100);
                obs.style.top = obsY + 'px';

                if(obsY > window.innerHeight) {
                    clearInterval(move); obs.remove();
                    score += 10; updateUI();
                }

                // Collision
                if(obsY > window.innerHeight - 250 && obsY < window.innerHeight - 50) {
                    if(oLane === lane) {
                        active = false; end();
                    }
                }
            }, 20);

            setTimeout(spawnObstacle, 1500 - Math.min(500, score * 2));
        }

        function updateUI() {
            document.getElementById('score').innerText = score.toString().padStart(3, '0');
            atlr = Math.floor(score / 5);
            document.getElementById('atlr').innerText = atlr;
        }

        function end() {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlay').querySelector('h1').innerText = 'CRITICAL FAILURE';
            document.getElementById('overlay').querySelector('p').innerText = 'TOTAL ATLR EARNED: ' + atlr;
            if(window.Atelia) {
                Atelia.auth.getUser().then(u => {
                    if(u.data.user) Atelia.arena.updatePrestige(u.data.user.id, atlr);
                });
            }
        }

        function gameLoop() { if(active) requestAnimationFrame(gameLoop); }
    </script>
</body>
</html>
