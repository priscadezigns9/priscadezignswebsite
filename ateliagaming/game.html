<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>The Arena | Atelia Gaming Lab</title>
    <link href='https://fonts.googleapis.com/css2?family=Russo+One&family=Bangers&display=swap' rel='stylesheet'>
    <style>
        :root { --red: #D32F2F; --orange: #FF6B00; --purple: #A020F0; --blue: #00BFFF; --white: #FFFFFF; --black: #050505; }
        body { margin: 0; background: var(--black); color: white; font-family: 'Russo One'; overflow: hidden; }
        nav { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--red); background: #000; position: relative; z-index: 2000; }
        .logo { height: 50px; }
        .back-btn { color: white; text-decoration: none; font-size: 1.2rem; border: 2px solid var(--orange); padding: 5px 15px; transition: 0.3s; }
        .back-btn:hover { background: var(--orange); }
        #game { width: 100%; height: calc(100vh - 100px); position: relative; background: url('https://images.unsplash.com/photo-1620712943543-bcc4628c7189?w=1920&q=80') center center / cover no-repeat; overflow: hidden; z-index: 1; }
        #game::before { content: ''; position: absolute; top:0; left:0; width:200%; height:100%; background: inherit; animation: scrollBg 30s linear infinite; z-index: -1; }
        @keyframes scrollBg { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        #game::after { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(0deg, rgba(211,47,47,0.2), rgba(0,0,0,0.4)); pointer-events:none; }
        #player { width: 150px; height: 150px; position: absolute; bottom: 50px; left: 100px; z-index: 10; transition: transform 0.1s; }
        .obs { width: 380px; height: 380px; position: absolute; bottom: 50px; border: 25px solid var(--orange); border-radius: 50%; box-shadow: 0 0 80px var(--orange), inset 0 0 60px var(--orange); background: rgba(255,107,0,0.15); }
        .obs::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180px; height: 180px; border-radius: 50%; border: 6px dashed white; animation: rotate 4s linear infinite; }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        #score-ui { position: absolute; top: 20px; right: 20px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.9); padding: 10px 30px; border: 4px solid var(--orange); z-index: 1500; pointer-events: none; }
        #score-ui span { font-family: 'Bangers'; font-size: 2.5rem; color: white; letter-spacing: 2px; }
        .char-select { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 20px; z-index: 1000; background: rgba(0,0,0,0.95); padding: 40px; border: 5px solid var(--red); box-shadow: 20px 20px 0 var(--orange); width: 90%; justify-content: center; flex-wrap: wrap; }
        .char-opt { text-align: center; cursor: pointer; transition: 0.3s; padding: 15px; border: 2px solid transparent; width: 180px; }
        .char-opt:hover { background: #111; border-color: var(--orange); transform: translateY(-10px); }
        .char-opt.active { background: #222; border-color: var(--white); box-shadow: 0 0 20px var(--red); }
        .char-opt img { height: 240px; width: 100%; border-radius: 10px; margin-bottom: 10px; filter: grayscale(1); transition: 0.3s; object-fit: contain; }
        .char-opt:hover img, .char-opt.active img { filter: grayscale(0); }
        .char-opt p { font-family: 'Bangers'; font-size: 2rem; margin: 0; letter-spacing: 1px; color: var(--white); }
        #start-btn { width: 300px; height: 70px; background: var(--red); color: white; border: none; font-family: 'Russo One'; font-size: 2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; text-transform: uppercase; margin-top: 20px; }
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
        .modal h1 { font-family: 'Bangers'; font-size: 7rem; color: var(--red); margin: 0; text-shadow: 5px 5px 0 white; }
        .modal p { font-size: 1.6rem; margin-bottom: 15px; }
        .modal .coin-earned { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; font-family: 'Bangers'; font-size: 2.5rem; color: var(--orange); }
        .modal .coin-earned img { height: 100px; filter: drop-shadow(0 0 15px var(--orange)); }
        .modal button { background: var(--orange); color: white; border: none; padding: 12px 40px; font-family: 'Russo One'; font-size: 1.6rem; cursor: pointer; border: 4px solid white; }
    </style>
</head>
<body>
<nav>
    <a href='index.html'><img src='https://priscadezigns.org/logos/atelier-gaming.png' class='logo' alt='Atelia Gaming Lab'></a>
    <a href='index.html' class='back-btn'>EXIT TO HUB</a>
</nav>
<div id='game'>
    <div id='score-ui'><span>SCORE: </span><span id='score-text'>000</span></div>
    <img id='player' src='https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp' alt='Character'>
    <div class='char-select' id='select-screen'>
        <div class='char-opt active' onclick='sel("astra")' id='o-astra'><img src='https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp'><p>ASTRA</p></div>
        <div class='char-opt' onclick='sel("mimi")' id='o-mimi'><img src='https://priscadezigns.org/ateliagaming/assets/mimi/mimi_2d_hf_1.webp'><p>MIMI</p></div>
        <div class='char-opt' onclick='sel("nova")' id='o-nova'><img src='https://priscadezigns.org/ateliagaming/assets/nova/nova_v4.webp'><p>NOVA</p></div>
        <div class='char-opt' onclick='sel("echo")' id='o-echo'><img src='https://priscadezigns.org/ateliagaming/assets/echo/echo_2d_hf_1.webp'><p>ECHO</p></div>
        <button id='start-btn' onclick='start()'>START ARENA</button>
    </div>
    <div class='modal' id='results-modal'>
        <h1>WRECKED!</h1>
        <p>FINAL SCORE: <span id='res-score'>0</span></p>
        <div class='coin-earned'><img src='https://priscadezigns.org/ateliagaming/assets/coins/atlr_coin_separate.webp' alt='ATLR Coin'><span id='atlr-count'>+0 ATLR</span></div>
        <button onclick='location.reload()'>TRY AGAIN</button>
    </div>
</div>
<script>
    const assets = {
        astra: { 
            sel: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp', 
            r: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_running.webp', 
            j: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_jumping.webp', 
            glow: 'rgba(255,107,0,0.8)', 
            flip: true 
        },
        mimi: { 
            sel: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_full_body_2d.webp', 
            r: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_running.webp', 
            j: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_jumping.webp', 
            glow: 'rgba(255,107,0,0.8)', 
            flip: false 
        },
        nova: { 
            sel: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_v4.webp', 
            r: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_running.webp', 
            j: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_jumping.webp', 
            glow: 'rgba(160,32,240,0.8)', 
            flip: true 
        },
        echo: { 
            sel: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_2d_hf_1.webp', 
            r: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_running.webp', 
            j: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_jumping.webp', 
            glow: 'rgba(0,191,255,0.8)', 
            flip: false 
        }
    };
    let char = 'astra', jumping = false, score = 0, active = false;
    function sel(c) { char = c; document.querySelectorAll('.char-opt').forEach(o => o.classList.remove('active')); document.getElementById('o-' + c).classList.add('active'); let p = document.getElementById('player'); p.src = assets[c].sel; p.style.transform = assets[c].flip ? 'scaleX(-1)' : 'scaleX(1)'; }
    function start() { 
        document.getElementById('select-screen').style.display = 'none'; 
        let p = document.getElementById('player'); 
        p.src = assets[char].r; 
        p.style.filter = 'drop-shadow(0 0 15px ' + assets[char].glow + ')'; 
        // Ensure all are running right (scaling -1 if the asset faces left)
        p.style.transform = assets[char].flip ? 'scaleX(-1)' : 'scaleX(1)'; 
        active = true; spawn(); 
    }
    function jump() { if (!active || jumping) return; jumping = true; let p = document.getElementById('player'); p.src = assets[char].j; p.style.transform = assets[char].flip ? 'scaleX(-1)' : 'scaleX(1)'; let pos = 50, up = setInterval(() => { if (pos >= 280) { clearInterval(up); let down = setInterval(() => { if (pos <= 50) { clearInterval(down); jumping = false; p.src = assets[char].r; p.style.transform = assets[char].flip ? 'scaleX(-1)' : 'scaleX(1)'; } pos -= 15; p.style.bottom = pos + 'px'; }, 20); } pos += 18; p.style.bottom = pos + 'px'; }, 20); }
    function spawn() { if (!active) return; let area = document.getElementById('game'), obs = document.createElement('div'); obs.className = 'obs'; obs.style.right = '-400px'; area.appendChild(obs); let move = setInterval(() => { if (!active) { clearInterval(move); return; } let r = parseInt(obs.style.right); if (r > area.clientWidth) { clearInterval(move); area.removeChild(obs); score++; document.getElementById('score-text').innerText = score.toString().padStart(3, '0'); }             let pRect = document.getElementById('player').getBoundingClientRect(), oRect = obs.getBoundingClientRect(); 
            if (pRect.right > oRect.left + 80 && pRect.left < oRect.right - 80) {
                if (pRect.top < oRect.top + 45 || pRect.bottom > oRect.bottom - 45) {
                    active = false; 
                    document.getElementById('res-score').innerText = score; 
                    document.getElementById('atlr-count').innerText = '+' + score + ' ATLR'; 
                    document.getElementById('results-modal').style.display = 'flex'; 
                }
            } obs.style.right = (r + 15 + (score/10)) + 'px'; }, 20); setTimeout(spawn, 1000 + Math.random() * 2000); }
    window.addEventListener('keydown', e => { if (e.code === 'Space') jump(); });
    window.addEventListener('touchstart', jump);
</script>
</body>
</html>
