<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Arena | Atelia Gaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        :root { --red: #D32F2F; --white: #FFFFFF; --black: #050505; }
        body { margin: 0; background: var(--black); color: white; font-family: 'Russo One'; overflow: hidden; }
        nav { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--red); background: #000; }
        #game { width: 100%; height: calc(100vh - 100px); position: relative; background: #080808; overflow: hidden; border-bottom: 5px solid var(--red); }
        #game::after { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(0deg, rgba(211,47,47,0.1), transparent); pointer-events:none; }
        #player { width: 120px; height: 120px; position: absolute; bottom: 50px; left: 100px; z-index: 10; }
        .obs { width: 70px; height: 70px; background: var(--red); position: absolute; bottom: 50px; border-radius: 12px; box-shadow: 0 0 20px var(--red); }
        #score-ui { position: absolute; top: 40px; right: 50px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.8); padding: 15px 30px; border-radius: 50px; border: 2px solid var(--red); }
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .char-grid { display: flex; gap: 30px; margin: 40px 0; }
        .char-opt { width: 150px; cursor: pointer; border: 3px solid transparent; border-radius: 15px; padding: 10px; background: #111; transition: 0.3s; text-align: center; }
        .char-opt:hover, .char-opt.active { border-color: var(--red); transform: scale(1.1); }
        .char-opt img { width: 100%; border-radius: 10px; }
        .btn { background: var(--red); color: white; border: none; padding: 18px 50px; font-size: 2rem; cursor: pointer; border-radius: 6px; text-transform: uppercase; }
        #results-modal { display: none; }
    </style>
</head>
<body>
<nav><a href="index.html" style="color:white; text-decoration:none;">← HUB</a><img src="https://priscadezigns.org/ateliagaming/assets/atelia_icon_logo.webp" height="50"></nav>
<div id="game">
    <div id="select-modal" class="modal">
        <h2>SELECT CHAMPION</h2>
        <div class="char-grid">
            <div class="char-opt active" onclick="sel('astra')" id="o-astra"><img src="https://priscadezigns.org/ateliagaming/assets/astra/astra_3d_hf.webp"><p>ASTRA</p></div>
            <div class="char-opt" onclick="sel('mimi')" id="o-mimi"><img src="https://priscadezigns.org/ateliagaming/assets/mimi/mimi_2d_hf_1.webp"><p>MIMI</p></div>
            <div class="char-opt" onclick="sel('nova')" id="o-nova"><img src="https://priscadezigns.org/ateliagaming/assets/nova/nova_2d_hf.webp"><p>NOVA</p></div>
            <div class="char-opt" onclick="sel('echo')" id="o-echo"><img src="https://priscadezigns.org/ateliagaming/assets/echo/echo_2d_hf.webp"><p>ECHO</p></div>
        </div>
        <button class="btn" onclick="start()">START MISSION</button>
    </div>
    <div id="results-modal" class="modal">
        <h2 id="res-title">MISSION FAILED</h2>
        <div style="display:flex; align-items:center; gap:20px; margin: 30px 0;">
             <img src="https://priscadezigns.org/ateliagaming/assets/logos/atelia_coin_separate.webp" height="80">
             <h3 id="res-score" style="font-size: 4rem;">000</h3>
        </div>
        <button class="btn" onclick="location.reload()">RETRY MISSION</button>
    </div>
    <img id="player" src="https://priscadezigns.org/ateliagaming/assets/astra/astra_3d_hf.webp">
    <div id="score-ui"><img src="https://priscadezigns.org/ateliagaming/assets/logos/atelia_coin_separate.webp" height="50"><div id="score-text">000</div></div>
</div>
<script>
    let jumping = false, score = 0, active = false, char = 'astra';
    const assets = {
        astra: { r: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_3d_hf.webp', j: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_3d_hf.webp' },
        mimi: { r: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_running.webp', j: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_jumping.webp' },
        nova: { r: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_running.webp', j: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_jumping.webp' },
        echo: { r: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_running.webp', j: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_jumping.webp' }
    };
    function sel(c) { char = c; document.querySelectorAll('.char-opt').forEach(e => e.classList.remove('active')); document.getElementById('o-'+c).classList.add('active'); document.getElementById('player').src = assets[c].r; }
    function start() { document.getElementById('select-modal').style.display='none'; active=true; spawn(); }
    function jump() {
        if (jumping || !active) return; jumping = true;
        let p = document.getElementById('player'); p.src = assets[char].j;
        if (char === 'echo') p.style.transform = 'scaleX(-1)';
        let pos = 50, up = setInterval(() => {
            if (pos >= 350) { clearInterval(up); let down = setInterval(() => {
                if (pos <= 50) { clearInterval(down); jumping = false; p.src = assets[char].r; }
                pos -= 15; p.style.bottom = pos + 'px';
            }, 20); }
            pos += 18; p.style.bottom = pos + 'px';
        }, 20);
    }
    function spawn() {
        if (!active) return;
        let area = document.getElementById('game'), obs = document.createElement('div');
        obs.className = 'obs'; obs.style.right = '-80px'; area.appendChild(obs);
        let move = setInterval(() => {
            if (!active) { clearInterval(move); return; }
            let r = parseInt(obs.style.right);
            if (r > area.clientWidth) { clearInterval(move); area.removeChild(obs); score++; document.getElementById('score-text').innerText = score.toString().padStart(3, '0'); }
            let pRect = document.getElementById('player').getBoundingClientRect(), oRect = obs.getBoundingClientRect();
            if (pRect.right > oRect.left + 20 && pRect.left < oRect.right - 20 && pRect.bottom > oRect.top + 20) {
                active = false; document.getElementById('res-score').innerText = score; document.getElementById('results-modal').style.display = 'flex';
            }
            obs.style.right = (r + 14) + 'px';
        }, 20);
        setTimeout(spawn, 1000 + Math.random() * 2000);
    }
    window.addEventListener('keydown', e => { if (e.code === 'Space') jump(); });
    window.addEventListener('touchstart', jump);
</script>
</body>
</html>
