<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>The Arena | Atelia Gaming Lab</title>
    <link href='https://fonts.googleapis.com/css2?family=Russo+One&family=Bangers&display=swap' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/atelia_supabase.js"></script>
    <style>
        :root { --red: #D32F2F; --orange: #FF6B00; --purple: #A020F0; --blue: #00BFFF; --white: #FFFFFF; --black: #050505; }
        body { margin: 0; background: var(--black); color: white; font-family: 'Russo One'; overflow: hidden; }
        nav { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--red); background: #000; position: relative; z-index: 2000; }
        .logo { height: 50px; }
        .back-btn { color: white; text-decoration: none; font-size: 1.2rem; border: 2px solid var(--orange); padding: 5px 15px; transition: 0.3s; }
        .back-btn:hover { background: var(--orange); }

        #auth-ui { position: absolute; top: 20px; left: 20px; z-index: 2500; display: flex; gap: 10px; }
        .auth-btn { background: rgba(0,0,0,0.8); color: var(--orange); border: 2px solid var(--orange); padding: 5px 15px; cursor: pointer; font-family: 'Russo One'; font-size: 0.9rem; text-decoration: none; }
        .auth-btn:hover { background: var(--orange); color: black; }
        #user-greeting { font-family: 'Russo One'; color: var(--white); font-size: 1rem; text-shadow: 0 0 10px var(--orange); }

        #game { width: 100%; height: calc(100vh - 100px); position: relative; background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1920&q=80') center center / cover no-repeat; overflow: hidden; z-index: 1; }
        #game::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.9) 100%); pointer-events: none; z-index: 2; }
        
        #player { width: 130px; height: 130px; position: absolute; bottom: 30px; left: 100px; z-index: 10; transition: transform 0.1s; }
        .obs { width: 440px; height: 440px; position: absolute; bottom: 60px; border: 12px solid var(--orange); border-radius: 50%; box-shadow: 0 0 80px var(--orange), inset 0 0 60px var(--orange); background: rgba(255,107,0,0.15); }
        .obs::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border-radius: 50%; border: 12px dashed white; animation: rotate 4s linear infinite; }
        
        #score-ui { position: absolute; top: 20px; right: 20px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.9); padding: 10px 30px; border: 4px solid var(--orange); z-index: 1500; pointer-events: none; display: none; }
        #score-ui span { font-family: 'Bangers'; font-size: 2.5rem; color: white; letter-spacing: 2px; }

        /* COMMAND DECK UI */
        #command-deck { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #command-deck::before { content: ''; position: absolute; width: 200%; height: 200%; background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(255,107,0,0.05) 1px, rgba(255,107,0,0.05) 2px); pointer-events: none; animation: scan 10s linear infinite; }
        @keyframes scan { from { transform: translateY(-50%); } to { transform: translateY(0); } }

        .deck-header { font-family: 'Bangers'; font-size: 5rem; color: var(--orange); margin-bottom: 20px; text-shadow: 0 0 20px var(--red); z-index: 5; }
        .vanguard-grid { display: flex; gap: 30px; z-index: 5; max-width: 1200px; width: 90%; justify-content: center; }
        
        .char-card { width: 250px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); padding: 20px; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .char-card:hover { border-color: var(--orange); background: rgba(255,107,0,0.1); transform: translateY(-10px); }
        .char-card.active { border-color: var(--white); background: rgba(255,255,255,0.1); box-shadow: 0 0 30px var(--orange); }
        .char-card img { width: 100%; height: 300px; object-fit: contain; filter: grayscale(1); transition: 0.3s; }
        .char-card:hover img, .char-card.active img { filter: grayscale(0); transform: scale(1.1); }
        .char-name { font-family: 'Bangers'; font-size: 2.5rem; text-align: center; margin-top: 15px; }

        .lore-panel { width: 90%; max-width: 1200px; background: rgba(0,0,0,0.8); border: 2px solid var(--orange); margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; padding: 30px; z-index: 5; display: none; }
        .lore-text h2 { font-family: 'Russo One'; color: var(--orange); border-bottom: 2px solid var(--red); padding-bottom: 10px; margin-top: 0; }
        .lore-text p { font-family: 'Inter', sans-serif; font-size: 1rem; line-height: 1.6; color: #ccc; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-bar-container { background: #222; height: 12px; border-radius: 6px; margin-top: 5px; position: relative; overflow: hidden; }
        .stat-bar { height: 100%; background: var(--orange); width: 0%; transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .stat-label { font-size: 0.8rem; text-transform: uppercase; color: #888; }

        #deploy-btn { margin-top: 40px; width: 400px; height: 80px; background: var(--red); color: white; font-family: 'Bangers'; font-size: 3rem; border: 4px solid white; cursor: pointer; z-index: 5; display: none; box-shadow: 0 0 20px var(--red); }
        #deploy-btn:hover { background: white; color: var(--red); transform: scale(1.05); }

        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
        .modal h1 { font-family: 'Bangers'; font-size: 7rem; color: var(--red); margin: 0; text-shadow: 5px 5px 0 white; }
        .modal p { font-size: 1.6rem; margin-bottom: 15px; }
        .modal .coin-earned { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; font-family: 'Bangers'; font-size: 2.5rem; color: var(--orange); }
        .modal .coin-earned img { height: 100px; filter: drop-shadow(0 0 15px var(--orange)); }
        .modal button { background: var(--orange); color: white; border: none; padding: 12px 40px; font-family: 'Russo One'; font-size: 1.6rem; cursor: pointer; border: 4px solid white; }
    </style>
</head>
<body>
<nav>
    <a href='index.html'><img src='https://priscadezigns.org/logos/atelier-gaming.png' class='logo' alt='Atelia Gaming Lab'></a>
    <a href='index.html' class='back-btn'>EXIT TO HUB</a>
</nav>
<div id='game'>
    <div id="auth-ui">
        <span id="user-greeting">GUEST VANGUARD</span>
        <a href="login.html" id="auth-link" class="auth-btn">SYNC PROFILE</a>
        <a href="leaderboard.html" class="auth-btn" style="border-color: var(--white); color: var(--white);">SCORE ROOM</a>
    </div>
    <div id='score-ui'><span>SCORE: </span><span id='score-text'>000</span></div>
    
    <div id="command-deck">
        <h1 class="deck-header">VANGUARD COMMAND DECK</h1>
        <div class="vanguard-grid">
            <div class="char-card" onclick="sel('astra')" id="card-astra">
                <img src="https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp">
                <div class="char-name">ASTRA</div>
            </div>
            <div class="char-card" onclick="sel('nova')" id="card-nova">
                <img src="https://priscadezigns.org/ateliagaming/assets/nova/nova_v4.webp">
                <div class="char-name">NOVA</div>
            </div>
            <div class="char-card" onclick="sel('mimi')" id="card-mimi">
                <img src="https://priscadezigns.org/ateliagaming/assets/mimi/mimi_full_body_2d.webp">
                <div class="char-name">MIMI</div>
            </div>
        </div>

        <div class="lore-panel" id="lore-panel">
            <div class="lore-text">
                <h2 id="l-name">CHARACTER NAME</h2>
                <p id="l-desc">Vanguard description incoming...</p>
            </div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label" id="s1-label">STAT 1</div>
                    <div class="stat-bar-container"><div class="stat-bar" id="s1-bar"></div></div>
                </div>
                <div class="stat-item">
                    <div class="stat-label" id="s2-label">STAT 2</div>
                    <div class="stat-bar-container"><div class="stat-bar" id="s2-bar"></div></div>
                </div>
            </div>
        </div>

        <button id="deploy-btn" onclick="start()">DEPLOY TO ARENA</button>
    </div>

    <img id='player' src='https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp' alt='Character' style="display:none">
    <div class='modal' id='results-modal'>
        <h1>WRECKED!</h1>
        <p>FINAL SCORE: <span id='res-score'>0</span></p>
        <div class='coin-earned'><img src='https://priscadezigns.org/ateliagaming/assets/coins/atlr_coin_separate.webp' alt='ATLR Coin'><span id='atlr-count'>+0 ATLR</span></div>
        <button onclick='location.reload()'>TRY AGAIN</button>
    </div>
</div>
<script>
    const assets = {
        astra: { 
            name: 'ASTRA',
            desc: 'The Vanguard & Signal Engineer. Expert in high-fidelity navigation and structural integrity. Her signal strength allows for precise jumps across the arena.',
            stats: { s1: ['Signal Strength', 85], s2: ['Sync Stability', 70] },
            sel: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp', 
            r: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_running.webp', 
            j: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_jumping.webp', 
            glow: 'rgba(255,107,0,0.8)', 
            flip: false 
        },
        mimi: { 
            name: 'MIMI',
            desc: 'The Otaku Sage. Her archival wisdom projects a shield of focus. She maneuvers through portals with a calculated grace that defies standard physics.',
            stats: { s1: ['Archival Wisdom', 95], s2: ['Precision', 60] },
            sel: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_full_body_2d.webp', 
            r: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_running.webp', 
            j: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_jumping.webp', 
            glow: 'rgba(255,107,0,0.8)', 
            flip: true 
        },
        nova: { 
            name: 'NOVA',
            desc: 'The Signal Vanguard. A powerhouse of raw engineering energy. Nova thrives in high-speed environments where signal power is the only rule.',
            stats: { s1: ['Signal Power', 90], s2: ['Velocity', 80] },
            sel: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_v4.webp', 
            r: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_running.webp', 
            j: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_jumping.webp', 
            glow: 'rgba(160,32,240,0.8)', 
            flip: true 
        }
    };
    let char = '', jumping = false, score = 0, active = false;

    function sel(c) { 
        char = c; 
        document.querySelectorAll('.char-card').forEach(o => o.classList.remove('active')); 
        document.getElementById('card-' + c).classList.add('active'); 
        
        // Update Lore & Stats
        document.getElementById('lore-panel').style.display = 'grid';
        document.getElementById('deploy-btn').style.display = 'block';
        document.getElementById('l-name').innerText = assets[c].name;
        document.getElementById('l-desc').innerText = assets[c].desc;
        
        document.getElementById('s1-label').innerText = assets[c].stats.s1[0];
        document.getElementById('s1-bar').style.width = assets[c].stats.s1[1] + '%';
        document.getElementById('s2-label').innerText = assets[c].stats.s2[0];
        document.getElementById('s2-bar').style.width = assets[c].stats.s2[1] + '%';

        let p = document.getElementById('player'); 
        p.src = assets[c].sel; 
        p.style.transform = assets[c].flip ? 'scaleX(-1)' : 'scaleX(1)'; 
    }

    function start() { 
        document.getElementById('command-deck').style.display = 'none'; 
        document.getElementById('score-ui').style.display = 'flex';
        let p = document.getElementById('player'); 
        p.style.display = 'block';
        p.src = assets[char].r; 
        p.style.filter = 'drop-shadow(0 0 15px ' + assets[char].glow + ')'; 
        p.style.transform = assets[char].flip ? 'scaleX(-1)' : 'scaleX(1)'; 
        active = true; spawn(); 
    }
    function jump() { if (!active || jumping) return; jumping = true; let p = document.getElementById('player'); p.src = assets[char].j; p.style.transform = assets[char].flip ? 'scaleX(-1)' : 'scaleX(1)'; let pos = 50, up = setInterval(() => { if (pos >= 350) { clearInterval(up); let down = setInterval(() => { if (pos <= 50) { clearInterval(down); jumping = false; p.src = assets[char].r; p.style.transform = assets[char].flip ? 'scaleX(-1)' : 'scaleX(1)'; } pos -= 15; p.style.bottom = pos + 'px'; }, 20); } pos += 18; p.style.bottom = pos + 'px'; }, 20); }
    function spawn() { if (!active) return; let area = document.getElementById('game'), obs = document.createElement('div'); obs.className = 'obs'; obs.style.right = '-600px'; area.appendChild(obs); let move = setInterval(() => { if (!active) { clearInterval(move); return; } let r = parseInt(obs.style.right); if (r > area.clientWidth) { clearInterval(move); area.removeChild(obs); score++; document.getElementById('score-text').innerText = score.toString().padStart(3, '0'); }             let pRect = document.getElementById('player').getBoundingClientRect(), oRect = obs.getBoundingClientRect(); 
            if (pRect.right > oRect.left + 100 && pRect.left < oRect.right - 100) {
                if (pRect.top < oRect.top + 30 || pRect.bottom > oRect.bottom - 45) {
                    active = false; 
                    document.getElementById('res-score').innerText = score; 
                    document.getElementById('atlr-count').innerText = '+' + score + ' ATLR'; 
                    document.getElementById('results-modal').style.display = 'flex'; 
                    Atelia.arena.saveScore(score, char); // SYNC TO DATA CORE
                }
            } obs.style.right = (r + 15 + (score/10)) + 'px'; }, 20); setTimeout(spawn, 1000 + Math.random() * 2000); }
    window.addEventListener('keydown', e => { if (e.code === 'Space') jump(); });
    window.addEventListener('touchstart', jump);

    // Auth Initialization
    Atelia.auth.onAuthStateChange((event, session) => {
        const greeting = document.getElementById('user-greeting');
        const authLink = document.getElementById('auth-link');
        if (session) {
            greeting.innerText = (session.user.user_metadata.username || 'VANGUARD').toUpperCase();
            greeting.style.cursor = 'pointer';
            greeting.onclick = () => window.location.href = 'profile.html';
            authLink.innerText = 'LOGOUT';
            authLink.href = '#';
            authLink.onclick = (e) => { e.preventDefault(); Atelia.auth.signOut(); };
        } else {
            greeting.innerText = 'GUEST VANGUARD';
            greeting.onclick = null;
            greeting.style.cursor = 'default';
            authLink.innerText = 'SYNC PROFILE';
            authLink.href = 'login.html';
            authLink.onclick = null;
        }
    });
</script>
</body>
</html>
