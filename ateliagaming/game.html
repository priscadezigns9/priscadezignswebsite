<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Arena | Atelia Gaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root { --red: #D32F2F; --orange: #FF6B00; --white: #FFFFFF; --black: #050505; }
        body { margin: 0; background: var(--black); color: white; font-family: 'Russo One'; overflow: hidden; }
        nav { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--red); background: #000; position: relative; z-index: 100; }
        .logo { height: 50px; }
        .back-btn { color: white; text-decoration: none; font-size: 1.2rem; border: 2px solid var(--orange); padding: 5px 15px; transition: 0.3s; }
        .back-btn:hover { background: var(--orange); }
        
        #game { width: 100%; height: calc(100vh - 100px); position: relative; background: radial-gradient(circle at center, #1a0000 0%, #000 100%); overflow: hidden; }
        #game::after { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(0deg, rgba(211,47,47,0.1), transparent); pointer-events:none; }
        
        #player { 
            width: 140px; height: 140px; position: absolute; bottom: 50px; left: 100px; z-index: 10; 
            filter: drop-shadow(0 0 10px rgba(255,107,0,0.5)); 
            transition: transform 0.1s;
            transform: scaleX(-1); /* Flip characters to face right/obstacles */
        }
        .obs { width: 80px; height: 80px; background: linear-gradient(45deg, var(--red), var(--orange)); position: absolute; bottom: 50px; border-radius: 4px; box-shadow: 0 0 30px var(--red); border: 3px solid white; }
        
        #score-ui { position: absolute; top: 40px; right: 50px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.9); padding: 15px 40px; border-radius: 0; border: 4px solid var(--orange); box-shadow: 5px 5px 0 var(--red); }
        #score-ui span { font-family: 'Bangers'; font-size: 3rem; color: white; letter-spacing: 2px; }
        
        .char-select { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 30px; z-index: 50; background: rgba(0,0,0,0.95); padding: 50px; border: 5px solid var(--red); box-shadow: 20px 20px 0 var(--orange); }
        .char-opt { text-align: center; cursor: pointer; transition: 0.3s; padding: 20px; border: 2px solid transparent; width: 180px; }
        .char-opt:hover { background: #111; border-color: var(--orange); transform: translateY(-10px); }
        .char-opt.active { background: #222; border-color: var(--white); box-shadow: 0 0 20px var(--red); }
        .char-opt img { height: 200px; border-radius: 10px; margin-bottom: 15px; filter: grayscale(1); transition: 0.3s; object-fit: contain; }
        .char-opt:hover img, .char-opt.active img { filter: grayscale(0); }
        .char-opt p { font-family: 'Bangers'; font-size: 2.5rem; margin: 0; letter-spacing: 1px; color: var(--white); }
        
        #start-btn { position: absolute; bottom: -80px; left: 50%; transform: translateX(-50%); background: var(--red); color: white; border: none; padding: 15px 50px; font-family: 'Russo One'; font-size: 2rem; cursor: pointer; box-shadow: 5px 5px 0 var(--black); transition: 0.2s; }
        #start-btn:hover { background: var(--orange); transform: translateX(-50%) scale(1.05); }
        
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .modal h1 { font-family: 'Bangers'; font-size: 10rem; color: var(--red); margin: 0; text-shadow: 10px 10px 0 white; }
        .modal p { font-size: 2rem; margin-bottom: 20px; }
        .modal .coin-earned { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; font-family: 'Bangers'; font-size: 3rem; color: var(--orange); }
        .modal .coin-earned img { height: 60px; filter: drop-shadow(0 0 10px var(--orange)); }
        .modal button { background: var(--orange); color: white; border: none; padding: 20px 60px; font-family: 'Russo One'; font-size: 2rem; cursor: pointer; border: 4px solid white; }
    </style>
</head>
<body>
<nav>
    <a href="index.html"><img src="https://priscadezigns.org/ateliagaming/assets/atelia_rect_logo.webp" class="logo" alt="Atelia"></a>
    <a href="index.html" class="back-btn">EXIT TO HUB</a>
</nav>

<div id="game">
    <div id="score-ui"><span>SCORE: </span><span id="score-text">000</span></div>
    <img id="player" src="https://priscadezigns.org/ateliagaming/assets/astra/astra_2d_hf.webp" alt="Character">
    
    <div class="char-select" id="select-screen">
        <div class="char-opt active" onclick="sel('astra')" id="o-astra"><img src="https://priscadezigns.org/ateliagaming/assets/astra/astra_2d_hf.webp"><p>ASTRA</p></div>
        <div class="char-opt" onclick="sel('mimi')" id="o-mimi"><img src="https://priscadezigns.org/ateliagaming/assets/mimi/mimi_2d_hf_1.webp"><p>MIMI</p></div>
        <div class="char-opt" onclick="sel('nova')" id="o-nova"><img src="https://priscadezigns.org/ateliagaming/assets/nova/nova_2d_hf.webp"><p>NOVA</p></div>
        <div class="char-opt" onclick="sel('echo')" id="o-echo"><img src="https://priscadezigns.org/ateliagaming/assets/echo/echo_2d_hf.webp"><p>ECHO</p></div>
        <button id="start-btn" onclick="start()">START ARENA</button>
    </div>

    <div class="modal" id="results-modal">
        <h1>WRECKED!</h1>
        <p>FINAL SCORE: <span id="res-score">0</span></p>
        <div class="coin-earned">
            <img src="https://priscadezigns.org/ateliagaming/assets/coins/atlr_coin_separate.webp" alt="ATLR Coin">
            <span id="atlr-count">+0 ATLR</span>
        </div>
        <button onclick="location.reload()">TRY AGAIN</button>
    </div>
</div>

<script>
    const assets = {
        astra: { 
            sel: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_2d_hf.webp',
            r: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_running.webp', 
            j: 'https://priscadezigns.org/ateliagaming/assets/astra/astra_jumping.webp' 
        },
        mimi: { 
            sel: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_2d_hf_1.webp',
            r: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_running.webp', 
            j: 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_jumping.webp' 
        },
        nova: { 
            sel: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_2d_hf.webp',
            r: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_running.webp', 
            j: 'https://priscadezigns.org/ateliagaming/assets/nova/nova_jumping.webp' 
        },
        echo: { 
            sel: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_2d_hf.webp',
            r: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_running.webp', 
            j: 'https://priscadezigns.org/ateliagaming/assets/echo/echo_jumping.webp' 
        }
    };
    let char = 'astra', jumping = false, score = 0, active = false;
    function sel(c) {
        char = c; document.querySelectorAll('.char-opt').forEach(o => o.classList.remove('active'));
        document.getElementById('o-' + c).classList.add('active');
        document.getElementById('player').src = assets[c].sel;
    }
    function start() {
        document.getElementById('select-screen').style.display = 'none';
        document.getElementById('player').src = assets[char].r;
        active = true; spawn();
    }
    function jump() {
        if (!active || jumping) return;
        jumping = true; let p = document.getElementById('player'); p.src = assets[char].j;
        let pos = 50, up = setInterval(() => {
            if (pos >= 250) { clearInterval(up); let down = setInterval(() => {
                if (pos <= 50) { clearInterval(down); jumping = false; p.src = assets[char].r; }
                pos -= 15; p.style.bottom = pos + 'px';
            }, 20); }
            pos += 18; p.style.bottom = pos + 'px';
        }, 20);
    }
    function spawn() {
        if (!active) return;
        let area = document.getElementById('game'), obs = document.createElement('div');
        obs.className = 'obs'; obs.style.right = '-80px'; area.appendChild(obs);
        let move = setInterval(() => {
            if (!active) { clearInterval(move); return; }
            let r = parseInt(obs.style.right);
            if (r > area.clientWidth) { clearInterval(move); area.removeChild(obs); score++; document.getElementById('score-text').innerText = score.toString().padStart(3, '0'); }
            let pRect = document.getElementById('player').getBoundingClientRect(), oRect = obs.getBoundingClientRect();
            if (pRect.right > oRect.left + 20 && pRect.left < oRect.right - 20 && pRect.bottom > oRect.top + 20) {
                active = false; 
                document.getElementById('res-score').innerText = score;
                document.getElementById('atlr-count').innerText = '+' + score + ' ATLR';
                document.getElementById('results-modal').style.display = 'flex';
            }
            obs.style.right = (r + 15 + (score/10)) + 'px';
        }, 20);
        setTimeout(spawn, 1000 + Math.random() * 2000);
    }
    window.addEventListener('keydown', e => { if (e.code === 'Space') jump(); });
    window.addEventListener('touchstart', jump);
</script>
</body>
</html>
