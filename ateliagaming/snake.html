<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Snake | Atelia Gaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #D32F2F;
            --orange: #FF6B00;
            --white: #FFFFFF;
            --black: #050505;
        }
        body, html {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            background-color: var(--black); color: var(--white); height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }
        nav { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); }
        .logo-img { height: 40px; filter: drop-shadow(0 0 5px var(--red)); }

        #game-area {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            position: relative;
        }

        canvas {
            background: #111;
            border: 2px solid rgba(255,107,0,0.3);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        #ui {
            position: absolute; top: 30px; right: 30px; text-align: right;
            background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid var(--red);
        }
        .score-box { font-family: 'Bangers'; font-size: 3rem; color: var(--white); line-height: 1; }
        .atlr-box { font-family: 'Russo One'; font-size: 1rem; color: var(--orange); margin-top: 5px; }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }
        .btn {
            padding: 15px 40px; background: var(--red); color: white;
            border: 3px solid white; font-family: 'Russo One'; font-size: 1.5rem;
            cursor: pointer; margin-top: 25px; transition: 0.3s;
        }
        .btn:hover { background: var(--orange); transform: scale(1.05); }

        .controls-hint {
            margin-top: 20px; font-family: 'Russo One'; font-size: 0.8rem; color: #888; letter-spacing: 1px;
        }
        
        #char-select {
            display: flex; gap: 15px; margin-bottom: 20px;
        }
        .char-btn {
            width: 60px; height: 60px; border: 2px solid #333; cursor: pointer; padding: 5px; background: #111;
        }
        .char-btn.active { border-color: var(--red); background: #222; }
        .char-btn img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html"><img src="https://priscadezigns.org/logos/atelier-gaming.png" class="logo-img" alt="Atelia Logo"></a>
        <div style="font-family:'Russo One'; font-size:1.2rem; color:var(--orange);">NEURAL SNAKE</div>
    </nav>

    <div id="game-area">
        <div id="ui">
            <div class="score-box" id="score">00</div>
            <div class="atlr-box"><img src="https://priscadezigns.org/ateliagaming/assets/coins/atlr_coin_separate.webp" height="20"> <span id="atlr">0</span> ATLR</div>
        </div>

        <canvas id="snakeGame" width="400" height="400"></canvas>
        
        <div class="controls-hint">USE ARROW KEYS OR SWIPE TO NAVIGATE</div>

        <div id="overlay">
            <h1 style="font-family:'Bangers'; font-size:5rem; margin:0;">NEURAL SNAKE</h1>
            <p style="font-family:'Russo One'; color:var(--orange); margin-bottom:30px;">COLLECT DATA NODES · EARN ATLR</p>
            
            <div id="char-select">
                <div class="char-btn active" id="sel-astra" onclick="setChar('astra')"><img src="https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp"></div>
                <div class="char-btn" id="sel-mimi" onclick="setChar('mimi')"><img src="https://priscadezigns.org/ateliagaming/assets/mimi/mimi_full_body_2d.webp"></div>
                <div class="char-btn" id="sel-nova" onclick="setChar('nova')"><img src="https://priscadezigns.org/ateliagaming/assets/nova/nova_v4.webp"></div>
                <div class="char-btn" id="sel-echo" onclick="setChar('echo')"><img src="https://priscadezigns.org/ateliagaming/assets/echo/echo_2d_hf.webp"></div>
            </div>

            <button class="btn" onclick="start()">INITIATE PROTOCOL</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/ateliagaming/js/atelia_supabase.js"></script>
    <script>
        const canvas = document.getElementById('snakeGame');
        const ctx = canvas.getContext('2d');
        const box = 20;
        let snake, food, direction, game, score = 0, atlr = 0, active = false;
        let char = 'astra';

        const headImgs = {
            astra: new Image(), mimi: new Image(), nova: new Image(), echo: new Image()
        };
        headImgs.astra.src = 'https://priscadezigns.org/ateliagaming/assets/astra/astra_full_body_hf.webp';
        headImgs.mimi.src = 'https://priscadezigns.org/ateliagaming/assets/mimi/mimi_full_body_2d.webp';
        headImgs.nova.src = 'https://priscadezigns.org/ateliagaming/assets/nova/nova_v4.webp';
        headImgs.echo.src = 'https://priscadezigns.org/ateliagaming/assets/echo/echo_2d_hf.webp';

        const coinImg = new Image();
        coinImg.src = 'https://priscadezigns.org/ateliagaming/assets/coins/atlr_coin_separate.webp';

        function setChar(c) {
            char = c;
            document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sel-'+c).classList.add('active');
        }

        document.addEventListener("keydown", changeDir);
        function changeDir(e) {
            if(e.keyCode == 37 && direction != "RIGHT") direction = "LEFT";
            else if(e.keyCode == 38 && direction != "DOWN") direction = "UP";
            else if(e.keyCode == 39 && direction != "LEFT") direction = "RIGHT";
            else if(e.keyCode == 40 && direction != "UP") direction = "DOWN";
        }

        function start() {
            score = 0; atlr = 0; direction = "RIGHT"; active = true;
            snake = [{x: 9 * box, y: 10 * box}];
            food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };
            document.getElementById('overlay').style.display = 'none';
            if(game) clearInterval(game);
            game = setInterval(draw, 100);
        }

        function draw() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0,0,canvas.width,canvas.height);

            // Draw Snake
            for(let i=0; i<snake.length; i++) {
                if(i==0) {
                    ctx.drawImage(headImgs[char], snake[i].x, snake[i].y, box, box);
                } else {
                    ctx.fillStyle = (i%2==0) ? "#D32F2F" : "#FF6B00";
                    ctx.fillRect(snake[i].x, snake[i].y, box, box);
                }
            }

            // Draw Food
            ctx.drawImage(coinImg, food.x, food.y, box, box);

            let sX = snake[0].x;
            let sY = snake[0].y;

            if(direction == "LEFT") sX -= box;
            if(direction == "UP") sY -= box;
            if(direction == "RIGHT") sX += box;
            if(direction == "DOWN") sY += box;

            if(sX == food.x && sY == food.y) {
                score++;
                atlr = Math.floor(score / 2);
                document.getElementById('score').innerText = score.toString().padStart(2, '0');
                document.getElementById('atlr').innerText = atlr;
                food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };
            } else {
                snake.pop();
            }

            let newHead = { x: sX, y: sY };

            if(sX < 0 || sX >= canvas.width || sY < 0 || sY >= canvas.height || collision(newHead, snake)) {
                return end();
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i=0; i<array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        async function end() {
            clearInterval(game);
            active = false;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlay').querySelector('h1').innerText = 'LINK SEVERED';
            document.getElementById('overlay').querySelector('p').innerText = 'TOTAL ATLR EARNED: ' + atlr;
            if(window.Atelia) {
                const u = await Atelia.auth.getUser();
                if(u.data.user) await Atelia.arena.updatePrestige(u.data.user.id, atlr);
            }
        }
    </script>
</body>
</html>
