<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Aesthetic Scout | Quiet Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #000; --bg: #fff; --text: #1A1A1A; --border: #f0f0f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.8; letter-spacing: -0.01em; }

        header { position: fixed; top: 0; width: 100%; padding: 30px 8%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 5px; text-decoration: none; color: #000; }
        
        .hero { min-height: 100vh; padding: 180px 8% 100px; max-width: 900px; margin: 0 auto; text-align: center; }
        .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 5px; color: #aaa; font-weight: 700; margin-bottom: 30px; display: block; }
        h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 300; line-height: 1.2; margin-bottom: 60px; }

        .interface { border-top: 1px solid #000; padding-top: 60px; }
        .input-group { display: flex; gap: 20px; margin-top: 20px; }
        input { flex: 1; padding: 20px; border: 1px solid var(--border); font-family: inherit; font-size: 1rem; background: #fafafa; }
        .run-btn { padding: 0 40px; background: #000; color: #fff; border: none; font-weight: 400; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; transition: 0.3s; }

        #ai-result { margin-top: 80px; }
        .scout-report { text-align: left; animation: fadeIn 1.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; margin-top: 40px; }
        .r-title { font-size: 1.5rem; font-weight: 300; margin-bottom: 20px; }
        .r-text { color: #888; font-size: 0.95rem; }

        .acq-btn { display: inline-block; width: 100%; text-align: center; border: 1px solid #000; color: #000; text-decoration: none; padding: 20px; font-weight: 400; text-transform: uppercase; letter-spacing: 4px; font-size: 0.75rem; margin-top: 60px; }

        footer { padding: 100px 8% 50px; text-align: center; border-top: 1px solid var(--border); opacity: 0.3; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 4px; }
    </style>
</head>
<body>
    <header>
        <a href="../" class="logo">Quiet Luxury</a>
        <nav><a href="../shop/" style="color:#000; text-decoration:none; font-weight:400; font-size:0.7rem; text-transform:uppercase; letter-spacing:2px;">Archive</a></nav>
    </header>

    <main class="hero">
        <span class="label">Neural Aesthetic Scout V1.0</span>
        <h1>Refinement Intelligence.</h1>

        <div class="interface">
            <p style="color:#aaa; margin-bottom:40px; text-transform:uppercase; letter-spacing:4px; font-size:0.75rem;">Define a material, silhouette, or tonal environment</p>
            <div class="input-group">
                <input type="text" id="ai-input" placeholder="e.g. Brushed gold, minimal watch, cashmere tones..." autocomplete="off">
                <button class="run-btn" onclick="runScout()">Analyze</button>
            </div>
            <div id="ai-result"></div>
        </div>
    </main>

    <footer>© 2026 QUIET LUXURY // ARCHIVAL MINIMALISM</footer>

    <script>
    function runScout() {
        const input = document.getElementById('ai-input').value.trim();
        const res = document.getElementById('ai-result');
        if(!input) return;

        res.innerHTML = '<p style="text-align:center; font-weight:300; letter-spacing:5px; margin-top:40px; color:#aaa;">FILTERING SIGNAL...</p>';

        setTimeout(() => {
            const query = input.toLowerCase(); const tag = "priscadezigns-20";
            let verdict = "Optimal Refinement"; let material = "Archival Synthesis";
            
            if(query.includes('gold') || query.includes('jewelry')) { verdict = "Subtle Brilliance"; material = "18K Sourced"; }
            if(query.includes('watch') || query.includes('time')) { verdict = "Horological Integrity"; material = "Mechanical Core"; }

            res.innerHTML = `
                <div class="scout-report">
                    <span class="label" style="font-size:0.55rem;">Scout Complete // Verdict: ${verdict}</span>
                    <div class="report-grid">
                        <div>
                            <h2 class="r-title">Tonal Alignment</h2>
                            <p class="r-text">Intelligence confirms the "${input}" aesthetic as a high-fidelity match for the Quiet Luxury protocol. Focus remains on silhouette integrity and material permanence.</p>
                        </div>
                        <div>
                            <h2 class="r-title">Material Core</h2>
                            <p class="r-text">Primary recommendation: ${material}. This selection minimizes aesthetic noise while maximizing long-term archival resonance.</p>
                        </div>
                    </div>

                    <a href="https://www.amazon.com/s?k=${encodeURIComponent(input)}+minimalist+luxury&tag=${tag}" target="_blank" class="acq-btn">Acquire Sourced Silhouettes →</a>
                </div>
            `;
        }, 2000);
    }
    </script>
</body>
</html>
