
<!DOCTYPE html><html><head><title>Neural Workshop v2</title><style>
body{background:#050508;color:#fff;font-family:sans-serif;margin:0;}
section{padding:100px 10%;text-align:center;}
.ws-container{background:#0A0A0F;border:1px solid #E63946;padding:50px;border-radius:40px;box-shadow:0 0 50px rgba(230,57,70,0.1);}
.slot{width:120px;height:120px;background:rgba(255,255,255,0.05);border:2px dashed #457B9D;margin:20px auto;border-radius:20px;display:flex;align-items:center;justify-content:center;}
.btn{background:#E63946;padding:15px 40px;border-radius:10px;font-weight:700;cursor:pointer;display:inline-block;margin-top:30px;}
.locked{opacity:0.3;cursor:not-allowed;}
</style></head><body><section>
<div class="ws-container">
    <h1>NEURAL WORKSHOP</h1>
    <p style="opacity:0.6;">Forge elite Astra components using salvaged Energy Cores.</p>
    <div class="slot" id="s1">EMPTY</div>
    <div id="c_info">NEURAL CORE REQUIRED</div>
    <div class="btn locked" id="cb" onclick="craft()">CRAFT X-FRAME</div>
</div>
</section>
<script>
function check(){
    let core = localStorage.getItem('lab_core');
    if(core==='active'){
        document.getElementById('s1').innerText='CORE DETECTED';
        document.getElementById('s1').style.borderStyle='solid';
        document.getElementById('c_info').innerText='CORE SYNCHRONIZED';
        document.getElementById('cb').className='btn';
    }
    if(localStorage.getItem('lab_frame')==='active'){
        document.getElementById('cb').innerText='FRAME CRAFTED';
        document.getElementById('cb').className='btn locked';
    }
}
function craft(){
    if(localStorage.getItem('lab_core')==='active'){
        localStorage.setItem('lab_frame','active');
        check();
    }
}
check();
</script></body></html>
