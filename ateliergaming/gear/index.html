<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Gear | Atelier World Hardware</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&family=Space+Grotesk:wght@300;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #050508;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(5, 5, 8, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(230, 57, 70, 0.1);
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: #fff;
        }

        .logo {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 1px solid #E63946;
            object-fit: cover;
        }

        .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.4rem;
            letter-spacing: 1px;
        }
        
        nav {
            display: flex;
            gap: 35px;
            list-style: none;
        }
        
        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
            transition: 0.4s;
        }
        
        nav a:hover, nav a.active {
            opacity: 1;
            color: #E63946;
        }

        .page-header {
            padding: 180px 10% 80px;
            background: linear-gradient(to bottom, #0A0A15 0%, #050508 100%);
        }

        .page-tag {
            color: #E63946;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            display: block;
        }

        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 5rem;
            letter-spacing: -2px;
            line-height: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 60px;
            padding: 80px 10%;
        }

        .gear-card {
            background: #08080C;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.4s;
            overflow: hidden;
        }

        .gear-card:hover {
            border-color: #E63946;
            transform: scale(1.02);
        }

        .gear-img {
            width: 100%;
            height: 350px;
            object-fit: contain;
            background: #000;
            padding: 40px;
            filter: grayscale(100%);
            transition: 0.5s;
        }

        .gear-card:hover .gear-img {
            filter: grayscale(0%);
        }

        .gear-body {
            padding: 30px;
        }

        .gear-card h3 {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.6rem;
            margin-bottom: 10px;
        }

        .price {
            color: #E63946;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: block;
        }

        .btn-buy {
            display: block;
            background: transparent;
            color: #fff;
            text-align: center;
            text-decoration: none;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.4s;
        }

        .btn-buy:hover {
            background: #E63946;
            border-color: #E63946;
        }

        footer {
            padding: 80px 10% 40px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0.4;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .page-title { font-size: 3.5rem; }
            nav { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <a href="/ateliergaming/" class="logo-container">
            <img src="https://priscadezigns.org/logos/atelier-gaming.jpg" alt="Atelier" class="logo">
            <span class="logo-text">Atelier World</span>
        </a>
        <nav>
            <a href="/ateliergaming/games/">Games</a>
            <a href="/ateliergaming/gear/" class="active">Gear</a>
            <a href="/ateliergaming/blog/">Signals</a>
            <a href="/ateliergaming/shop/">Shop</a>
            <a href="/ateliergaming/hub/">Connect</a>
        </nav>
    </header>
    
    <main>
        <div class="page-header">
            <span class="page-tag">Technical Precision</span>
            <h1 class="page-title">Nexus<br>Gear</h1>
        </div>

        <div class="grid">
            <div class="gear-card">
                <img src="https://m.media-amazon.com/images/P/B089M6DMMV.01._SCLZZZZZZZ_SX1000_.jpg" alt="Keyboard" class="gear-img">
                <div class="gear-body">
                    <h3>Mechanical Archive V1</h3>
                    <span class="price">$129.99</span>
                    <a href="https://www.amazon.com/s?k=gaming+mechanical+keyboard&tag=priscadezigns-20" class="btn-buy" target="_blank">Acquire Hardware</a>
                </div>
            </div>
            <div class="gear-card">
                <img src="https://m.media-amazon.com/images/I/61KAcyfr66L._SL500_.jpg" alt="Headset" class="gear-img">
                <div class="gear-body">
                    <h3>Neural Audio 7</h3>
                    <span class="price">$189.99</span>
                    <a href="https://www.amazon.com/s?k=gaming+headset+wireless&tag=priscadezigns-20" class="btn-buy" target="_blank">Acquire Hardware</a>
                </div>
            </div>
            <div class="gear-card">
                <img src="https://m.media-amazon.com/images/P/B07TVK8WJP.01._SCLZZZZZZZ_SX1000_.jpg" alt="Mouse" class="gear-img">
                <div class="gear-body">
                    <h3>Kinetic Sensor Pro</h3>
                    <span class="price">$79.99</span>
                    <a href="https://www.amazon.com/s?k=gaming+mouse+high+dpi&tag=priscadezigns-20" class="btn-buy" target="_blank">Acquire Hardware</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-left">
            &copy; 2026 PRISCA DEZIGNS | ATELIER WORLD
        </div>
        <div class="footer-right">
            Neural Nexus Protocol v7.0
        </div>
    </footer>
</body>
</html>
