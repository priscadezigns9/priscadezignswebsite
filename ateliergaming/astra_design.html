<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelia Gaming | Astra Nexus Manifest</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&family=Space+Grotesk:wght@300;400;700&family=JetBrains+Mono:wght@400&display=swap');
        
        :root {
            --crimson: #E63946;
            --void: #050508;
            --fox-red: #D42426;
            --gold: #FFD700;
            --white: #F1FAEE;
        }

        body {
            background: var(--void);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .dossier {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 380px;
        }

        #astra-viewport { width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%); }

        .interface {
            background: rgba(10, 10, 15, 0.98);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            overflow-y: auto;
            backdrop-filter: blur(20px);
        }

        .tagline { font-family: 'JetBrains Mono'; color: var(--crimson); text-transform: uppercase; letter-spacing: 5px; font-size: 10px; margin-bottom: 5px; display: block; }
        h1 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 3rem; margin: 0; letter-spacing: -2px; line-height: 0.9; }

        .control-group { margin-top: 30px; }
        h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.4; margin-bottom: 15px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--white);
            padding: 10px;
            font-size: 10px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-family: 'JetBrains Mono';
        }

        .btn:hover, .btn.active { background: var(--crimson); border-color: var(--crimson); box-shadow: 0 0 15px rgba(230, 57, 70, 0.4); }

        #loader { position: fixed; inset: 0; background: var(--void); display: flex; align-items: center; justify-content: center; z-index: 1000; font-family: 'JetBrains Mono'; color: var(--crimson); letter-spacing: 10px; }
    </style>
</head>
<body>

    <div id="loader">MANIFESTING_ATELIA_CHARACTER...</div>

    <div class="dossier">
        <div id="astra-viewport"></div>
        <div class="interface">
            <span class="tagline">Neural Character Sync</span>
            <h1>Astra Nexus<br>Atelia Edition</h1>
            
            <div class="control-group">
                <h3>Expressions</h3>
                <div class="grid">
                    <button class="btn active" onclick="setExpr('HAPPY', this)">Happy</button>
                    <button class="btn" onclick="setExpr('CURIOUS', this)">Curious</button>
                    <button class="btn" onclick="setExpr('EXCITED', this)">Excited</button>
                    <button class="btn" onclick="setExpr('CONFIDENT', this)">Confident</button>
                    <button class="btn" onclick="setExpr('SURPRISED', this)">Surprised</button>
                    <button class="btn" onclick="setExpr('THINKING', this)">Thinking</button>
                    <button class="btn" onclick="setExpr('WINK', this)">Wink</button>
                    <button class="btn" onclick="setExpr('DETERMINED', this)">Determined</button>
                </div>
            </div>

            <div class="control-group">
                <h3>Animations</h3>
                <div class="grid">
                    <button class="btn" onclick="setAnim('IDLE', this)">Idle</button>
                    <button class="btn" onclick="setAnim('WALK', this)">Walk</button>
                    <button class="btn" onclick="setAnim('RUN', this)">Run</button>
                    <button class="btn" onclick="setAnim('JUMP', this)">Jump</button>
                    <button class="btn" onclick="setAnim('TALK', this)">Talk</button>
                </div>
            </div>

            <div class="control-group" style="opacity: 0.5; font-size: 11px;">
                // GEAR: Red Mario-Style Hat ('A' Emblem)<br>
                // OUTFIT: Fantasy Scarf, Magic Charm, Boots<br>
                // TAIL: V-Marking Manifested<br>
                // STYLE: Genshin x Mario Hybrid
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, astra;
        let head, hat, scarf, body, lArm, rArm, lLeg, rLeg, tail;
        let lEye, rEye, mouth, lBrow, rBrow;
        let animState = 'IDLE', exprState = 'HAPPY';

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(35, (window.innerWidth - 380) / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.8, 6.5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth - 380, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('astra-viewport').appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);
            const spot = new THREE.SpotLight(0xffffff, 1);
            spot.position.set(5, 10, 5);
            scene.add(spot);

            astra = new THREE.Group();

            // MATERIALS (Cinematic Anime-Biological Hybrid)
            const redMat = new THREE.MeshStandardMaterial({ 
                color: 0xD42426, 
                roughness: 0.6, 
                metalness: 0.1,
                emissive: 0x220000 
            });
            const whiteMat = new THREE.MeshStandardMaterial({ color: 0xF1FAEE, roughness: 0.8 });
            const blackMat = new THREE.MeshStandardMaterial({ color: 0x0A0A0F, roughness: 0.3, metalness: 0.2 });
            const goldMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.1, metalness: 0.9 });
            const eyeMat = new THREE.MeshStandardMaterial({ 
                color: 0xE63946, 
                emissive: 0xE63946, 
                emissiveIntensity: 0.5,
                roughness: 0.1 
            });

            // 1. SEAMLESS BODY (Connected Anatomy)
            body = new THREE.Group();
            const core = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), redMat);
            core.scale.set(1, 1.2, 0.8);
            body.add(core);
            astra.add(body);

            // SCARF & CHARM (Seamless Connection)
            scarf = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.1, 16, 32), blackMat);
            scarf.rotation.x = Math.PI/2;
            scarf.position.y = 0.55;
            body.add(scarf);
            
            const charm = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), goldMat);
            charm.position.set(0, 0.45, 0.3);
            body.add(charm);

            // 2. HEAD & HAT (With 'A' Emblem)
            head = new THREE.Group();
            const skull = new THREE.Mesh(new THREE.SphereGeometry(0.42, 32, 32), redMat);
            head.add(skull);

            const muzz = new THREE.Mesh(new THREE.SphereGeometry(0.24, 32, 32), whiteMat);
            muzz.scale.set(0.8, 0.7, 1.8);
            muzz.position.z = 0.35;
            head.add(muzz);

            hat = new THREE.Group();
            const cap = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 16, 0, Math.PI*2, 0, Math.PI/2), redMat);
            hat.add(cap);
            const brim = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.05, 0.45), redMat);
            brim.position.set(0, -0.05, 0.35);
            hat.add(brim);
            
            // The 'A' Emblem
            const circle = new THREE.Mesh(new THREE.CircleGeometry(0.12, 32), whiteMat);
            circle.position.set(0, 0.2, 0.42);
            hat.add(circle);
            
            const aChar = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.1, 0.01), redMat);
            const aBar = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.02, 0.01), redMat);
            const lLeg_a = aChar.clone(); lLeg_a.rotation.z = 0.3; lLeg_a.position.set(-0.03, 0.2, 0.43);
            const rLeg_a = aChar.clone(); rLeg_a.rotation.z = -0.3; rLeg_a.position.set(0.03, 0.2, 0.43);
            aBar.position.set(0, 0.18, 0.43);
            hat.add(lLeg_a, rLeg_a, aBar);
            
            hat.position.y = 0.15;
            head.add(hat);

            // 2. SOFT NEON LAB LIGHTING (Teal & Red)
            const neonRed = new THREE.PointLight(0xE63946, 3, 10);
            neonRed.position.set(3, 2, 2);
            scene.add(neonRed);
            
            const neonTeal = new THREE.PointLight(0x00B4A6, 4, 10);
            neonTeal.position.set(-3, 2, 1);
            scene.add(neonTeal);
            
            const topGlow = new THREE.DirectionalLight(0xffffff, 0.5);
            topGlow.position.set(0, 10, 0);
            scene.add(topGlow);

            // 3. REFINED TAIL (Black 'V' Marking)
            tail = new THREE.Group();
            const tMain = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), redMat);
            tMain.scale.set(1, 1, 4);
            tail.add(tMain);
            
            const tTip = new THREE.Mesh(new THREE.SphereGeometry(0.28, 32, 32), whiteMat);
            tTip.position.z = -2.0;
            tail.add(tTip);
            
            // The 'V' Marking near the base
            const v1 = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.3, 0.05), blackMat);
            v1.rotation.z = 0.5; v1.position.set(-0.1, 0.1, -0.6);
            const v2 = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.3, 0.05), blackMat);
            v2.rotation.z = -0.5; v2.position.set(0.1, 0.1, -0.6);
            tail.add(v1, v2);

            tail.position.set(0, -0.2, -0.5);
            tail.rotation.x = -0.2;
            body.add(tail);

            scene.add(astra);
            astra.position.y = 1;

            document.getElementById('loader').remove();
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.001;
            
            // EXPRESSION LOGIC
            lBrow.rotation.z = 0; rBrow.rotation.z = 0;
            lEye.scale.y = 1; rEye.scale.y = 1;
            
            switch(exprState) {
                case 'HAPPY': lBrow.position.y = 0.32; rBrow.position.y = 0.32; break;
                case 'CURIOUS': lBrow.rotation.z = 0.3; rBrow.rotation.z = -0.3; break;
                case 'SURPRISED': lEye.scale.set(1.2, 1.2, 1.2); rEye.scale.set(1.2, 1.2, 1.2); break;
                case 'WINK': lEye.scale.y = 0.1; break;
                case 'DETERMINED': lBrow.rotation.z = -0.4; rBrow.rotation.z = 0.4; break;
            }

            // ANIMATION LOGIC
            switch(animState) {
                case 'IDLE': astra.position.y = 1 + Math.sin(t*2)*0.05; break;
                case 'WALK': 
                    lLeg.rotation.x = Math.sin(t*8)*0.5; rLeg.rotation.x = -Math.sin(t*8)*0.5;
                    lArm.rotation.x = -Math.sin(t*8)*0.5; rArm.rotation.x = Math.sin(t*8)*0.5;
                    break;
                case 'RUN':
                    lLeg.rotation.x = Math.sin(t*15)*0.8; rLeg.rotation.x = -Math.sin(t*15)*0.8;
                    body.rotation.x = 0.2;
                    break;
                case 'JUMP': astra.position.y = 1 + Math.abs(Math.sin(t*5))*1.5; break;
            }

            tail.rotation.y = Math.sin(t*3)*0.4;
            renderer.render(scene, camera);
        }

        function setAnim(s, btn) { animState = s; updateBtns(btn); }
        function setExpr(s, btn) { exprState = s; updateBtns(btn); }
        function updateBtns(btn) {
            btn.parentElement.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        init();
    </script>
</body>
</html>
