<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Design: Astra Nexus | Humanoid Vulpine Manifest</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&family=Space+Grotesk:wght@300;400;700&family=JetBrains+Mono:wght@400&display=swap');
        
        :root {
            --crimson: #E63946;
            --void: #050508;
            --fox-red: #D42426;
            --teal: #00B4A6;
            --white: #F1FAEE;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background: var(--void);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .dossier {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 350px;
        }

        #astra-viewport { width: 100%; height: 100%; background: #000; }

        .interface {
            background: rgba(10, 10, 15, 0.98);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            overflow-y: auto;
            backdrop-filter: blur(20px);
        }

        .tagline {
            font-family: 'JetBrains Mono';
            color: var(--crimson);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 10px;
            margin-bottom: 5px;
            display: block;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 3rem;
            margin: 0;
            letter-spacing: -2px;
            line-height: 0.9;
        }

        .control-group { margin-top: 40px; }
        h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.4; margin-bottom: 20px; }

        .anim-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-anim {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--white);
            padding: 12px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-anim:hover, .btn-anim.active {
            background: var(--crimson);
            border-color: var(--crimson);
            box-shadow: 0 0 20px rgba(230, 57, 70, 0.3);
        }

        #loading-overlay {
            position: fixed; inset: 0; background: var(--void);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; font-family: 'JetBrains Mono'; color: var(--crimson); letter-spacing: 10px;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">SYNCING_VULPINE_ANATOMY...</div>

    <div class="dossier">
        <div id="astra-viewport"></div>
        <div class="interface">
            <span class="tagline">Neural Unit // ASTRA</span>
            <h1>Swiper-Grade<br>Humanoid</h1>
            <div class="control-group">
                <h3>Movement</h3>
                <div class="anim-grid">
                    <button class="btn-anim active" onclick="setAnim('IDLE', this)">Idle</button>
                    <button class="btn-anim" onclick="setAnim('HUMANOID_WALK', this)">Walk</button>
                    <button class="btn-anim" onclick="setAnim('SNEAK', this)">Sneak</button>
                    <button class="btn-anim" onclick="setAnim('WAVE', this)">Wave</button>
                    <button class="btn-anim" onclick="setAnim('TALK', this)">Talk</button>
                </div>
            </div>
            <div class="control-group">
                <h3>Vitals</h3>
                <p style="font-size: 12px; line-height: 1.6; opacity: 0.6;">
                    // Connections: Muscle-wrapped limb joints.<br>
                    // Skin: Seamless crimson organic surface.<br>
                    // Logic: Humanoid articulation (Swiper-Ref).<br>
                    // Tail: High-fidelity biological wag.
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, astra;
        let head, neck, chest, pelvis, lArm, rArm, lLeg, rLeg, tail;
        let lEye, rEye, mouth, snout;
        let animState = 'IDLE';

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, (window.innerWidth - 350) / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.8, 6);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth - 350, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('astra-viewport').appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
            mainLight.position.set(5, 10, 7.5);
            scene.add(mainLight);

            astra = new THREE.Group();

            // MATERIALS (Organic & Smooth)
            const redMat = new THREE.MeshPhongMaterial({ color: 0xD42426, shininess: 40 });
            const whiteMat = new THREE.MeshPhongMaterial({ color: 0xF1FAEE, shininess: 10 });
            const blackMat = new THREE.MeshPhongMaterial({ color: 0x050508, shininess: 50 });
            const eyeMat = new THREE.MeshPhongMaterial({ color: 0xE63946, emissive: 0x220000 });

            // 1. SEAMLESS TORSO (Muscle & Connections)
            pelvis = new THREE.Group();
            const pelvisSkin = new THREE.Mesh(new THREE.SphereGeometry(0.38, 32, 32), redMat);
            pelvisSkin.scale.set(1.1, 0.9, 1.1);
            pelvis.add(pelvisSkin);
            astra.add(pelvis);

            chest = new THREE.Group();
            const chestSkin = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 32), redMat);
            chestSkin.scale.set(1.1, 1.2, 1);
            chest.position.y = 0.65;
            chest.add(chestSkin);
            
            // Belly Patch
            const belly = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), whiteMat);
            belly.scale.set(0.9, 0.8, 0.6);
            belly.position.set(0, -0.1, 0.2);
            chest.add(belly);
            pelvis.add(chest);

            // 2. NECK & HEAD (Seamless Connection)
            neck = new THREE.Group();
            const neckMusc = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.2, 0.4, 32), redMat);
            neck.add(neckMusc);
            neck.position.y = 0.55;
            chest.add(neck);

            head = new THREE.Group();
            const skull = new THREE.Mesh(new THREE.SphereGeometry(0.38, 32, 32), redMat);
            head.add(skull);

            snout = new THREE.Group();
            const muzz = new THREE.Mesh(new THREE.SphereGeometry(0.2, 32, 32), whiteMat);
            muzz.scale.set(0.8, 0.7, 2.0);
            muzz.position.z = 0.35;
            snout.add(muzz);
            const nose = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), blackMat);
            nose.position.set(0, 0, 0.7);
            snout.add(nose);
            head.add(snout);

            // EARS (Skin-like fox ears)
            function createEar(isLeft) {
                const group = new THREE.Group();
                const ear = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.6, 32), redMat);
                ear.scale.z = 0.3;
                group.add(ear);
                group.position.set(isLeft ? -0.25 : 0.25, 0.45, 0);
                group.rotation.z = isLeft ? 0.3 : -0.3;
                return group;
            }
            head.add(createEar(true), createEar(false));

            head.position.y = 0.4;
            neck.add(head);

            // 3. HUMAN-LIKE LIMBS (With Muscle Definition & Joint Blending)
            function createHumanoidLimb(isArm) {
                const group = new THREE.Group();
                
                // Shoulder/Hip Joint (Blend)
                const joint1 = new THREE.Mesh(new THREE.SphereGeometry(isArm ? 0.12 : 0.18, 32, 32), redMat);
                group.add(joint1);

                // Upper Limb (Muscle)
                const upper = new THREE.Mesh(new THREE.CylinderGeometry(isArm ? 0.08 : 0.14, isArm ? 0.1 : 0.16, 0.6, 32), redMat);
                upper.position.y = -0.3;
                group.add(upper);

                // Elbow/Knee (Connection)
                const elbow = new THREE.Group();
                const joint2 = new THREE.Mesh(new THREE.SphereGeometry(isArm ? 0.09 : 0.13, 32, 32), redMat);
                elbow.add(joint2);
                
                // Lower Limb (Forearm/Calf)
                const lower = new THREE.Mesh(new THREE.CylinderGeometry(isArm ? 0.09 : 0.13, isArm ? 0.07 : 0.1, 0.6, 32), redMat);
                lower.position.y = -0.3;
                elbow.add(lower);
                elbow.position.y = -0.6;
                group.add(elbow);

                // PAW (Actual Fox Paws)
                const paw = new THREE.Group();
                const palm = new THREE.Mesh(new THREE.SphereGeometry(isArm ? 0.12 : 0.18, 32, 32), redMat);
                palm.scale.set(1, 0.5, 1.4);
                paw.add(palm);
                
                for(let i=0; i<4; i++) {
                    const toe = new THREE.Mesh(new THREE.SphereGeometry(isArm ? 0.04 : 0.06, 16, 16), redMat);
                    toe.position.set((i-1.5)*0.07, -0.05, 0.18);
                    toe.scale.z = 1.8;
                    paw.add(toe);
                }
                
                paw.position.y = -0.65;
                elbow.add(paw);
                
                return { group, elbow, paw };
            }

            const la = createHumanoidLimb(true); lArm = la.group; lArm.position.set(-0.6, 0.35, 0); chest.add(lArm);
            const ra = createHumanoidLimb(true); rArm = ra.group; rArm.position.set(0.6, 0.35, 0); chest.add(ra.group);
            const ll = createHumanoidLimb(false); lLeg = ll.group; lLeg.position.set(-0.3, -0.1, 0); pelvis.add(lLeg);
            const rl = createHumanoidLimb(false); rLeg = rl.group; rLeg.position.set(0.3, -0.1, 0); pelvis.add(rLeg);

            // 4. BIG FOX TAIL (Biological connection)
            tail = new THREE.Group();
            const tailJoint = new THREE.Mesh(new THREE.SphereGeometry(0.15, 32, 32), redMat);
            tail.add(tailJoint);
            const tailBody = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), redMat);
            tailBody.scale.set(1, 1, 3.5);
            tailBody.position.z = -0.8;
            tail.add(tailBody);
            const tailTip = new THREE.Mesh(new THREE.SphereGeometry(0.25, 32, 32), whiteMat);
            tailTip.position.z = -1.8;
            tail.add(tailTip);
            
            tail.position.set(0, 0, -0.4);
            tail.rotation.x = -0.3;
            pelvis.add(tail);

            scene.add(astra);
            astra.position.y = 1;

            document.getElementById('loading-overlay').remove();
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.001;
            
            resetPose();

            switch(animState) {
                case 'IDLE':
                    astra.position.y = 1 + Math.sin(t*1.5)*0.05;
                    tail.rotation.y = Math.sin(t*2)*0.5;
                    lArm.rotation.x = 0.2 + Math.sin(t*1.2)*0.1;
                    rArm.rotation.x = 0.2 + Math.cos(t*1.2)*0.1;
                    break;
                case 'HUMANOID_WALK':
                    applyWalk(t, 5, 0.7);
                    break;
                case 'SNEAK':
                    applyWalk(t, 4, 0.5);
                    chest.rotation.x = 0.4;
                    astra.position.y = 0.7;
                    break;
                case 'WAVE':
                    rArm.rotation.x = -2.0;
                    rArm.children[2].rotation.z = Math.sin(t*15)*0.5;
                    break;
                case 'TALK':
                    snout.rotation.x = Math.sin(t*20)*0.15;
                    head.rotation.y = Math.sin(t*5)*0.1;
                    break;
            }

            renderer.render(scene, camera);
        }

        function applyWalk(t, speed, amp) {
            const s = Math.sin(t*speed);
            lLeg.rotation.x = s*amp;
            rLeg.rotation.x = -s*amp;
            lArm.rotation.x = -s*amp;
            rArm.rotation.x = s*amp;
            lLeg.children[2].rotation.x = Math.max(0, -s*0.8);
            rLeg.children[2].rotation.x = Math.max(0, s*0.8);
            astra.position.y = 1.0 + Math.abs(Math.cos(t*speed))*0.15;
        }

        function resetPose() {
            chest.rotation.set(0,0,0);
            lArm.rotation.set(0,0,0); rArm.rotation.set(0,0,0);
            lLeg.rotation.set(0,0,0); rLeg.rotation.set(0,0,0);
            astra.position.y = 1;
        }

        function setAnim(s, btn) {
            animState = s;
            document.querySelectorAll('.btn-anim').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        window.addEventListener('resize', () => {
            camera.aspect = (window.innerWidth - 350) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 350, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
