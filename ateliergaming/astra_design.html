<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelia Gaming | Astra Nexus Manifest</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&family=Space+Grotesk:wght@300;400;700&family=JetBrains+Mono:wght@400&display=swap');
        
        :root {
            --crimson: #E63946;
            --void: #050508;
            --fox-red: #D42426;
            --gold: #FFD700;
            --white: #F1FAEE;
        }

        body {
            background: var(--void);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .dossier {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 380px;
        }

        #astra-viewport { width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%); }

        .interface {
            background: rgba(10, 10, 15, 0.98);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            overflow-y: auto;
            backdrop-filter: blur(20px);
        }

        .tagline { font-family: 'JetBrains Mono'; color: var(--crimson); text-transform: uppercase; letter-spacing: 5px; font-size: 10px; margin-bottom: 5px; display: block; }
        h1 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 3rem; margin: 0; letter-spacing: -2px; line-height: 0.9; }

        .control-group { margin-top: 30px; }
        h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.4; margin-bottom: 15px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--white);
            padding: 10px;
            font-size: 10px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-family: 'JetBrains Mono';
        }

        .btn:hover, .btn.active { background: var(--crimson); border-color: var(--crimson); box-shadow: 0 0 15px rgba(230, 57, 70, 0.4); }

        #loader { position: fixed; inset: 0; background: var(--void); display: flex; align-items: center; justify-content: center; z-index: 1000; font-family: 'JetBrains Mono'; color: var(--crimson); letter-spacing: 10px; }
    </style>
</head>
<body>

    <div id="loader">MANIFESTING_ATELIA_CHARACTER...</div>

    <div class="dossier">
        <div id="astra-viewport"></div>
        <div class="interface">
            <span class="tagline">Neural Character Sync</span>
            <h1>Astra Nexus<br>Atelia Edition</h1>
            
            <div class="control-group">
                <h3>Expressions</h3>
                <div class="grid">
                    <button class="btn active" onclick="setExpr('HAPPY', this)">Happy</button>
                    <button class="btn" onclick="setExpr('CURIOUS', this)">Curious</button>
                    <button class="btn" onclick="setExpr('EXCITED', this)">Excited</button>
                    <button class="btn" onclick="setExpr('CONFIDENT', this)">Confident</button>
                    <button class="btn" onclick="setExpr('SURPRISED', this)">Surprised</button>
                    <button class="btn" onclick="setExpr('THINKING', this)">Thinking</button>
                    <button class="btn" onclick="setExpr('WINK', this)">Wink</button>
                    <button class="btn" onclick="setExpr('DETERMINED', this)">Determined</button>
                </div>
            </div>

            <div class="control-group">
                <h3>Animations</h3>
                <div class="grid">
                    <button class="btn" onclick="setAnim('IDLE', this)">Idle</button>
                    <button class="btn" onclick="setAnim('WALK', this)">Walk</button>
                    <button class="btn" onclick="setAnim('RUN', this)">Run</button>
                    <button class="btn" onclick="setAnim('JUMP', this)">Jump</button>
                    <button class="btn" onclick="setAnim('TALK', this)">Talk</button>
                </div>
            </div>

            <div class="control-group" style="opacity: 0.5; font-size: 11px;">
                // GEAR: Red Mario-Style Hat ('A' Emblem)<br>
                // OUTFIT: Fantasy Scarf, Magic Charm, Boots<br>
                // TAIL: V-Marking Manifested<br>
                // STYLE: Genshin x Mario Hybrid
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, astra;
        let head, hat, scarf, body, lArm, rArm, lLeg, rLeg, tail;
        let lEye, rEye, mouth, lBrow, rBrow;
        let animState = 'IDLE', exprState = 'HAPPY';

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(35, (window.innerWidth - 380) / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.8, 6.5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth - 380, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('astra-viewport').appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);
            const spot = new THREE.SpotLight(0xffffff, 1);
            spot.position.set(5, 10, 5);
            scene.add(spot);

            astra = new THREE.Group();

            // MATERIALS
            const redMat = new THREE.MeshPhongMaterial({ color: 0xD42426, shininess: 40 });
            const whiteMat = new THREE.MeshPhongMaterial({ color: 0xF1FAEE });
            const blackMat = new THREE.MeshPhongMaterial({ color: 0x1A1A1A });
            const goldMat = new THREE.MeshPhongMaterial({ color: 0xFFD700, shininess: 80 });

            // 1. BODY & OUTFIT
            body = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), redMat);
            body.scale.set(1, 1.2, 0.8);
            astra.add(body);

            // Scarf
            scarf = new THREE.Mesh(new THREE.TorusGeometry(0.25, 0.08, 16, 32), blackMat);
            scarf.rotation.x = Math.PI/2;
            scarf.position.y = 0.5;
            body.add(scarf);
            
            const charm = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), goldMat);
            charm.position.set(0, 0.4, 0.25);
            body.add(charm);

            // 2. HEAD & HAT
            head = new THREE.Group();
            const skull = new THREE.Mesh(new THREE.SphereGeometry(0.42, 32, 32), redMat);
            head.add(skull);

            const muzz = new THREE.Mesh(new THREE.SphereGeometry(0.22, 32, 32), whiteMat);
            muzz.scale.set(0.8, 0.7, 1.8);
            muzz.position.z = 0.3;
            head.add(muzz);

            // HAT (A Emblem)
            hat = new THREE.Group();
            const cap = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 16, 0, Math.PI*2, 0, Math.PI/2), redMat);
            hat.add(cap);
            const brim = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.05, 0.4), redMat);
            brim.position.set(0, 0, 0.3);
            hat.add(brim);
            const emblem = new THREE.Mesh(new THREE.CircleGeometry(0.12, 32), whiteMat);
            emblem.position.set(0, 0.2, 0.4);
            hat.add(emblem);
            hat.position.y = 0.1;
            head.add(hat);

            // EYES & EXPRESSIONS
            lEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 32, 32), blackMat);
            lEye.position.set(-0.18, 0.15, 0.35);
            head.add(lEye);
            rEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 32, 32), blackMat);
            rEye.position.set(0.18, 0.15, 0.35);
            head.add(rEye);
            
            lBrow = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.04, 0.02), blackMat);
            lBrow.position.set(-0.18, 0.3, 0.4);
            head.add(lBrow);
            rBrow = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.04, 0.02), blackMat);
            rBrow.position.set(0.18, 0.3, 0.4);
            head.add(rBrow);

            head.position.y = 0.9;
            body.add(head);

            // 3. LIMBS & BOOTS
            function createLimb(isArm) {
                const group = new THREE.Group();
                const limb = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.6), isArm ? redMat : blackMat);
                limb.position.y = -0.3;
                group.add(limb);
                const boot = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.35), redMat);
                boot.position.y = -0.6;
                group.add(boot);
                return group;
            }
            lArm = createLimb(true); lArm.position.set(-0.5, 0.4, 0); body.add(lArm);
            rArm = createLimb(true); rArm.position.set(0.5, 0.4, 0); body.add(rArm);
            lLeg = createLimb(false); lLeg.position.set(-0.25, -0.4, 0); body.add(lLeg);
            rLeg = createLimb(false); rLeg.position.set(0.25, -0.4, 0); body.add(rLeg);

            // 4. TAIL (Unique Marking)
            tail = new THREE.Group();
            const tBody = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), redMat);
            tBody.scale.set(1, 1, 3.5);
            tail.add(tBody);
            const tTip = new THREE.Mesh(new THREE.SphereGeometry(0.25, 32, 32), whiteMat);
            tTip.position.z = -1.8;
            tail.add(tTip);
            const marking = new THREE.Mesh(new THREE.TorusGeometry(0.15, 0.02, 16, 32), blackMat);
            marking.position.z = -1.0;
            tail.add(marking);
            tail.position.set(0, -0.2, -0.4);
            body.add(tail);

            scene.add(astra);
            astra.position.y = 1;

            document.getElementById('loader').remove();
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.001;
            
            // EXPRESSION LOGIC
            lBrow.rotation.z = 0; rBrow.rotation.z = 0;
            lEye.scale.y = 1; rEye.scale.y = 1;
            
            switch(exprState) {
                case 'HAPPY': lBrow.position.y = 0.32; rBrow.position.y = 0.32; break;
                case 'CURIOUS': lBrow.rotation.z = 0.3; rBrow.rotation.z = -0.3; break;
                case 'SURPRISED': lEye.scale.set(1.2, 1.2, 1.2); rEye.scale.set(1.2, 1.2, 1.2); break;
                case 'WINK': lEye.scale.y = 0.1; break;
                case 'DETERMINED': lBrow.rotation.z = -0.4; rBrow.rotation.z = 0.4; break;
            }

            // ANIMATION LOGIC
            switch(animState) {
                case 'IDLE': astra.position.y = 1 + Math.sin(t*2)*0.05; break;
                case 'WALK': 
                    lLeg.rotation.x = Math.sin(t*8)*0.5; rLeg.rotation.x = -Math.sin(t*8)*0.5;
                    lArm.rotation.x = -Math.sin(t*8)*0.5; rArm.rotation.x = Math.sin(t*8)*0.5;
                    break;
                case 'RUN':
                    lLeg.rotation.x = Math.sin(t*15)*0.8; rLeg.rotation.x = -Math.sin(t*15)*0.8;
                    body.rotation.x = 0.2;
                    break;
                case 'JUMP': astra.position.y = 1 + Math.abs(Math.sin(t*5))*1.5; break;
            }

            tail.rotation.y = Math.sin(t*3)*0.4;
            renderer.render(scene, camera);
        }

        function setAnim(s, btn) { animState = s; updateBtns(btn); }
        function setExpr(s, btn) { exprState = s; updateBtns(btn); }
        function updateBtns(btn) {
            btn.parentElement.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        init();
    </script>
</body>
</html>
