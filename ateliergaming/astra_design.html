<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelia Mascot | Astra: Vulpine Illustration</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050508;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
            cursor: crosshair;
        }
        #ui-overlay {
            position: absolute;
            top: 40px;
            left: 40px;
            pointer-events: none;
            font-family: 'Georgia', serif;
            color: #E63946;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h2 style="font-weight: 400; font-style: italic; letter-spacing: 2px;">Astra Nexus</h2>
        <p style="font-size: 12px; letter-spacing: 4px; text-transform: uppercase;">Cinematic Illustration Mode</p>
    </div>

    <canvas id="astraCanvas"></canvas>

    <script>
        const canvas = document.getElementById('astraCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouse = { x: 0, y: 0 };
        let targetMouse = { x: 0, y: 0 };
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            mouse.x = width / 2;
            mouse.y = height / 2;
            targetMouse.x = width / 2;
            targetMouse.y = height / 2;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            targetMouse.x = e.clientX;
            targetMouse.y = e.clientY;
        });
        resize();

        function drawAstra(t) {
            ctx.clearRect(0, 0, width, height);
            
            // Interaction Lag
            mouse.x += (targetMouse.x - mouse.x) * 0.05;
            mouse.y += (targetMouse.y - mouse.y) * 0.05;
            
            const centerX = width / 2;
            const centerY = height / 2 + Math.sin(t * 0.002) * 15;
            
            // Look direction factors
            const lookX = (mouse.x - centerX) / (width / 2);
            const lookY = (mouse.y - centerY) / (height / 2);

            ctx.save();
            ctx.translate(centerX, centerY);

            // 1. SHADOW (Soft Organic Floor Shadow)
            ctx.beginPath();
            ctx.ellipse(0, 260, 120, 30, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fill();

            // 2. THE TAIL (Flowing Biological Form)
            ctx.save();
            ctx.rotate(Math.sin(t * 0.001) * 0.1);
            const tailGrad = ctx.createLinearGradient(-150, 200, -250, 0);
            tailGrad.addColorStop(0, '#D42426');
            tailGrad.addColorStop(0.7, '#E63946');
            tailGrad.addColorStop(1, '#F1FAEE');
            
            ctx.beginPath();
            ctx.moveTo(-40, 150);
            ctx.bezierCurveTo(-150, 250, -350, 150, -250, -50);
            ctx.bezierCurveTo(-150, -150, -50, -50, -40, 150);
            ctx.fillStyle = tailGrad;
            ctx.fill();
            
            // Tail V-Marking (Organic Blend)
            ctx.beginPath();
            ctx.moveTo(-120, 120);
            ctx.lineTo(-140, 140);
            ctx.lineTo(-160, 120);
            ctx.strokeStyle = 'rgba(29, 53, 87, 0.2)';
            ctx.lineWidth = 15;
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.restore();

            // 3. THE BODY (Fluid Anatomical Flow)
            const bodyGrad = ctx.createRadialGradient(0, 50, 20, 0, 50, 200);
            bodyGrad.addColorStop(0, '#E63946');
            bodyGrad.addColorStop(1, '#A8252F');
            
            ctx.beginPath();
            ctx.moveTo(-70, 220); // Left Leg base
            ctx.bezierCurveTo(-100, 180, -90, 50, -80, 0); // Side to shoulder
            ctx.bezierCurveTo(-70, -80, 70, -80, 80, 0); // Shoulder to Shoulder
            ctx.bezierCurveTo(90, 50, 100, 180, 70, 220); // Down to right leg
            ctx.bezierCurveTo(40, 250, -40, 250, -70, 220); // Belly curve
            ctx.fillStyle = bodyGrad;
            ctx.shadowBlur = 40;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.fill();
            ctx.shadowBlur = 0;

            // White Underbelly (Natural Curve)
            ctx.beginPath();
            ctx.moveTo(-40, 210);
            ctx.bezierCurveTo(-60, 150, -60, 50, 0, 40);
            ctx.bezierCurveTo(60, 50, 60, 150, 40, 210);
            ctx.bezierCurveTo(20, 225, -20, 225, -40, 210);
            ctx.fillStyle = 'rgba(241, 250, 238, 0.9)';
            ctx.fill();

            // 4. LIMBS (Humanoid Connected Flow)
            ctx.strokeStyle = '#D42426';
            ctx.lineWidth = 35;
            ctx.lineCap = 'round';
            
            // Legs (Digitigrade Flow)
            ctx.beginPath();
            ctx.moveTo(-45, 180);
            ctx.quadraticCurveTo(-60, 260, -80, 250); // Left
            ctx.moveTo(45, 180);
            ctx.quadraticCurveTo(60, 260, 80, 250); // Right
            ctx.stroke();

            // Arms (Fluid Motion)
            ctx.save();
            ctx.translate(lookX * 5, lookY * 5);
            ctx.beginPath();
            ctx.moveTo(-75, 40);
            ctx.quadraticCurveTo(-120, 100 + Math.sin(t*0.002)*10, -100, 160); // Left Arm
            ctx.moveTo(75, 40);
            ctx.quadraticCurveTo(120, 100 + Math.cos(t*0.002)*10, 100, 160); // Right Arm
            ctx.stroke();
            ctx.restore();

            // 5. THE HEAD (Integrated with Hat)
            ctx.save();
            ctx.translate(lookX * 25, lookY * 15 - 50);
            ctx.rotate(lookX * 0.1);

            // Ears (Biological Vulpine Form)
            ctx.fillStyle = '#D42426';
            ctx.beginPath();
            ctx.moveTo(-70, -20);
            ctx.quadraticCurveTo(-90, -140, -40, -80); // Left Ear
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(70, -20);
            ctx.quadraticCurveTo(90, -140, 40, -80); // Right Ear
            ctx.fill();

            // Face (Rounded Illustration Style)
            ctx.beginPath();
            ctx.arc(0, 0, 95, 0, Math.PI * 2);
            ctx.fillStyle = '#E63946';
            ctx.fill();

            // Muzzle (Soft Blended Gradient)
            const muzzGrad = ctx.createRadialGradient(0, 40, 10, 0, 40, 80);
            muzzGrad.addColorStop(0, '#F1FAEE');
            muzzGrad.addColorStop(1, 'rgba(241, 250, 238, 0)');
            ctx.beginPath();
            ctx.ellipse(0, 40, 70, 50, 0, 0, Math.PI * 2);
            ctx.fillStyle = muzzGrad;
            ctx.fill();

            // Expression: Eyes (Expressive Oversized Lenses)
            const eyeX = 40;
            const eyeY = 10;
            ctx.fillStyle = '#1D3557';
            // Left Eye
            ctx.beginPath();
            ctx.ellipse(-eyeX + lookX * 5, eyeY + lookY * 5, 18, 28, 0, 0, Math.PI * 2);
            ctx.fill();
            // Right Eye
            ctx.beginPath();
            ctx.ellipse(eyeX + lookX * 5, eyeY + lookY * 5, 18, 28, 0, 0, Math.PI * 2);
            ctx.fill();
            // Sparkles
            ctx.fillStyle = '#FFF';
            ctx.beginPath(); ctx.arc(-eyeX + 5 + lookX * 5, eyeY - 10 + lookY * 5, 6, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(eyeX + 5 + lookX * 5, eyeY - 10 + lookY * 5, 6, 0, Math.PI * 2); ctx.fill();

            // THE HAT (Integrated Illustration)
            ctx.fillStyle = '#D42426';
            ctx.beginPath();
            ctx.arc(0, -30, 98, Math.PI, 0); // Cap dome
            ctx.fill();
            ctx.fillRect(-110, -35, 220, 15); // Brim
            // Emblem
            ctx.fillStyle = '#FFF';
            ctx.beginPath(); ctx.arc(0, -65, 28, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#D42426';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('A', 0, -57);

            ctx.restore();

            // 6. SCARF (Flowing Accessory)
            ctx.save();
            ctx.translate(lookX * 10, lookY * 5);
            ctx.beginPath();
            ctx.moveTo(-100, -20);
            ctx.bezierCurveTo(-110, 30, 110, 30, 100, -20);
            ctx.lineWidth = 30;
            ctx.strokeStyle = '#1D3557';
            ctx.stroke();
            // Magic Charm
            ctx.beginPath();
            ctx.arc(0, 15, 10, 0, Math.PI * 2);
            ctx.fillStyle = '#FFD700';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#FFD700';
            ctx.fill();
            ctx.restore();

            ctx.restore();
            
            requestAnimationFrame(drawAstra);
        }

        requestAnimationFrame(drawAstra);
    </script>
</body>
</html>
