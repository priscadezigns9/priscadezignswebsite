<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra | High-Fidelity Character Manifest</title>
    <script src="https://chnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --bg: #0A2A0F; }
        body { margin: 0; background: var(--bg); overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #stage { position: relative; width: 800px; height: 800px; }
        .layer { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; }
        #tail { background-image: url('astra_assets/tail.png'); z-index: 1; }
        #body { background-image: url('astra_assets/body.png'); z-index: 2; }
        #head { background-image: url('astra_assets/head.png'); z-index: 3; }
    </style>
</head>
<body>
    <div id="stage"><div id="tail" class="layer"></div><div id="body" class="layer"></div><div id="head" class="layer"></div></div>
    <script>
        const layers = { head: document.getElementById('head'), body: document.getElementById('body'), tail: document.getElementById('tail') };
        gsap.to(layers.body, { scale: 1.02, duration: 3, repeat: -1, yoyo: true, ease: "sine.in/out" });
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 30;
            const y = (e.clientY / window.innerheight - 0.5) * 30;
            gsap.to(layers.head, { x: x * 0.8, y: y * 0.8, duration: 0.6 });
            gsap.to(layers.body, { x: x * 0.3, y: x * 0.3, duration: 0.8 });
            gsap.to(layers.tail, { x: -x * 0.5, y: -y * 0.5, duration: 1.2 });
        });
    </script>
</body>
</html>
