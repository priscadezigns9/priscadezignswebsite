<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nexus | Atelier World Node 03</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050508; 
            overflow: hidden; 
            font-family: 'Space Grotesk', sans-serif;
            color: #fff;
        }
        #terminal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 800px;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid #E63946;
            padding: 40px;
            z-index: 10;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .terminal-header {
            font-size: 1.5rem;
            color: #E63946;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 1px solid rgba(230, 57, 70, 0.3);
            padding-bottom: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.5;
            letter-spacing: 2px;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .btn-action {
            padding: 15px;
            background: transparent;
            border: 1px solid #E63946;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-action:hover {
            background: #E63946;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div id="ui-overlay">NODE 03: THE NEXUS | STRATEGY HUB</div>
    
    <div id="terminal">
        <div class="terminal-header">Neural Command Terminal</div>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Neural Sap Reserves</div>
                <div class="stat-value" id="sap-reserves">1,420</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Active Fleet Units</div>
                <div class="stat-value" id="fleet-count">12</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Titan Core Sync</div>
                <div class="stat-value" id="core-sync">84%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Network Status</div>
                <div class="stat-value" id="status">OPTIMAL</div>
            </div>
        </div>
        <button class="btn-action" onclick="window.location.href='/ateliergaming/games/'">Return to Node Hub</button>
        <button class="btn-action" onclick="alert('Syncing with Global Neural Grid...')">Synchronize Data</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, particles = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050508);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Create Hangar-like geometry
            const geometry = new THREE.IcosahedronGeometry(10, 2);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0xE63946, 
                wireframe: true, 
                transparent: true, 
                opacity: 0.1 
            });
            const hangar = new THREE.Mesh(geometry, material);
            scene.add(hangar);
            
            // Rotating particles
            for(let i=0; i<200; i++) {
                let p = new THREE.Mesh(
                    new THREE.SphereGeometry(0.02),
                    new THREE.MeshBasicMaterial({ color: 0x457B9D })
                );
                p.position.set(Math.random()*20-10, Math.random()*20-10, Math.random()*20-10);
                scene.add(p);
                particles.push(p);
            }

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            scene.rotation.y += 0.001;
            particles.forEach(p => {
                p.position.y -= 0.01;
                if(p.position.y < -10) p.position.y = 10;
            });
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
