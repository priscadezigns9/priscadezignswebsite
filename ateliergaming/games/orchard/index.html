<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Orchard | Atelier World Node 01</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050508; 
            overflow: hidden; 
            font-family: 'Space Grotesk', sans-serif;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border: 1px solid #E63946;
            border-radius: 5px;
            font-size: 12px;
            z-index: 10;
        }
        #ui span { color: #E63946; font-weight: 700; }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border: 1px solid #E63946;
            border-radius: 5px;
            font-size: 11px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="ui">
        NEURAL SAPPER v7.5<br>
        NEURAL SAP: <span id="sap">0</span><br>
        FOX UNITS: <span id="foxes">3</span><br>
        NEURAL FLEET: <span id="fleet">2</span> UNITS<br>
        <small>WASD to move | [E] to harvest</small>
    </div>
    <div id="controls">
        PRESS [E] NEAR TREES | FLEET DRONES ASSIST AUTOMATICALLY
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, player, terrain, foxes = [], trees = [], drones = [], sapCollected = 0;
        let keys = {}, playerVelocity = 0;

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050508);
            scene.fog = new THREE.FogExp2(0x050508, 0.05);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 12, 20);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.35));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(30, 20, 30);
            dirLight.castShadow = true;
            dirLight.shadow.camera.left = -50;
            dirLight.shadow.camera.right = 50;
            dirLight.shadow.camera.top = 50;
            dirLight.shadow.camera.bottom = -50;
            scene.add(dirLight);

            // Terrain
            createTerrain();

            // Player (Sapper)
            player = new THREE.Group();
            let body = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, 1, 0.6),
                new THREE.MeshStandardMaterial({ color: 0x0A0A0F, metalness: 0.8, roughness: 0.2 })
            );
            body.castShadow = true;
            body.receiveShadow = true;
            player.add(body);

            let head = new THREE.Mesh(
                new THREE.SphereGeometry(0.35, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0x1A1A2E, metalness: 0.7, roughness: 0.3 })
            );
            head.position.y = 0.8;
            head.castShadow = true;
            player.add(head);

            // Eye glow
            let eye = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 8, 8),
                new THREE.MeshStandardMaterial({ color: 0x457B9D, emissive: 0x457B9D })
            );
            eye.position.set(0.1, 1, 0.3);
            player.add(eye);

            player.position.set(0, 0.5, 0);
            player.castShadow = true;
            scene.add(player);

            // Trees (Sap sources)
            for (let i = 0; i < 8; i++) {
                spawnTree();
            }

            // Fox units
            for (let i = 0; i < 3; i++) {
                spawnFox();
            }

            // Neural Fleet Drones
            for (let i = 0; i < 2; i++) {
                spawnDrone();
            }

            // Input
            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (e.code === 'KeyE') harvestNearby();
            });
            window.addEventListener('keyup', (e) => {
                keys[e.code] = false;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        function createTerrain() {
            let ground = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200),
                new THREE.MeshStandardMaterial({ 
                    color: 0x050505,
                    map: createTerrainTexture(),
                    roughness: 0.9,
                    metalness: 0.1
                })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            for (let i = 0; i < 5; i++) {
                let hill = new THREE.Mesh(
                    new THREE.CylinderGeometry(8, 10, 6, 32),
                    new THREE.MeshStandardMaterial({ color: 0x0A0A0F, roughness: 0.8 })
                );
                hill.position.set(Math.random() * 60 - 30, 0, Math.random() * 60 - 30);
                scene.add(hill);
            }
        }

        function createTerrainTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, 256, 256);
            for (let i = 0; i < 50; i++) {
                ctx.fillStyle = `rgba(69, 123, 157, ${Math.random() * 0.3})`;
                ctx.fillRect(Math.random() * 256, Math.random() * 256, 10, 10);
            }
            return new THREE.CanvasTexture(canvas);
        }

        function spawnTree() {
            let tree = new THREE.Group();
            let trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.4, 4, 8),
                new THREE.MeshStandardMaterial({ color: 0x2A1A1A, roughness: 0.9 })
            );
            tree.add(trunk);
            let foliage = new THREE.Mesh(
                new THREE.IcosahedronGeometry(1.8, 4),
                new THREE.MeshStandardMaterial({ color: 0x2D5A27, emissive: 0x1D3A17 })
            );
            foliage.position.y = 2.5;
            tree.add(foliage);
            let sap = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0x457B9D, emissive: 0x457B9D })
            );
            sap.position.y = 2;
            tree.add(sap);
            tree.sapNode = sap;
            tree.harvestable = true;
            tree.position.set(Math.random() * 60 - 30, 0.5, Math.random() * 60 - 30);
            scene.add(tree);
            trees.push(tree);
        }

        function spawnFox() {
            let fox = new THREE.Group();
            let body = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 0.5, 1.2),
                new THREE.MeshStandardMaterial({ color: 0xFF6B2B, metalness: 0.3 })
            );
            fox.add(body);
            let head = new THREE.Mesh(
                new THREE.SphereGeometry(0.4, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xFF8C42 })
            );
            head.position.set(0, 0.25, 0.6);
            fox.add(head);
            fox.position.set(Math.random() * 40 - 20, 0.5, Math.random() * 40 - 20);
            fox.velocity = new THREE.Vector3(0,0,0);
            scene.add(fox);
            foxes.push(fox);
        }

        function spawnDrone() {
            let drone = new THREE.Group();
            let core = new THREE.Mesh(
                new THREE.SphereGeometry(0.2, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xE63946, emissive: 0xE63946 })
            );
            drone.add(core);
            let ring = new THREE.Mesh(
                new THREE.TorusGeometry(0.4, 0.05, 8, 32),
                new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9 })
            );
            drone.add(ring);
            drone.ring = ring;
            drone.position.set(player.position.x + Math.random()*2-1, 5, player.position.z + Math.random()*2-1);
            drone.targetTree = null;
            scene.add(drone);
            drones.push(drone);
        }

        function harvestNearby() {
            trees.forEach(tree => {
                if (tree.harvestable && player.position.distanceTo(tree.position) < 5) {
                    collectSap(tree);
                }
            });
        }

        function collectSap(tree) {
            sapCollected += 10;
            tree.harvestable = false;
            tree.sapNode.visible = false;
            document.getElementById('sap').textContent = sapCollected;
        }

        function animate() {
            requestAnimationFrame(animate);

            // Player movement
            if (keys['KeyW']) player.position.z -= 0.15;
            if (keys['KeyS']) player.position.z += 0.15;
            if (keys['KeyA']) player.position.x -= 0.15;
            if (keys['KeyD']) player.position.x += 0.15;

            // Fox AI
            foxes.forEach(fox => {
                let toPlayer = new THREE.Vector3().subVectors(player.position, fox.position);
                if (toPlayer.length() < 12) {
                    toPlayer.normalize().multiplyScalar(0.06);
                    fox.position.add(toPlayer);
                }
                fox.lookAt(player.position.x, fox.position.y, player.position.z);
            });

            // Drone AI (Neural Fleet)
            drones.forEach((drone, i) => {
                drone.ring.rotation.y += 0.1;
                drone.ring.rotation.x += 0.05;

                // Find a tree to harvest if idle
                if (!drone.targetTree) {
                    trees.forEach(tree => {
                        if (tree.harvestable && tree.position.distanceTo(player.position) < 15) {
                            drone.targetTree = tree;
                        }
                    });
                }

                if (drone.targetTree && drone.targetTree.harvestable) {
                    // Fly to tree
                    let toTree = new THREE.Vector3().subVectors(drone.targetTree.position, drone.position);
                    toTree.y += 2.5; // Aim for sap core
                    if (toTree.length() < 0.5) {
                        collectSap(drone.targetTree);
                        drone.targetTree = null;
                    } else {
                        toTree.normalize().multiplyScalar(0.1);
                        drone.position.add(toTree);
                    }
                } else {
                    // Follow player
                    let offset = new THREE.Vector3(Math.cos(Date.now()*0.002 + i)*3, 3 + Math.sin(Date.now()*0.005 + i)*0.5, Math.sin(Date.now()*0.002 + i)*3);
                    let targetPos = new THREE.Vector3().addVectors(player.position, offset);
                    drone.position.lerp(targetPos, 0.05);
                }
            });

            // Camera follow
            camera.position.lerp(new THREE.Vector3(player.position.x, 12, player.position.z + 20), 0.05);
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
