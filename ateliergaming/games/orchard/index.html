<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Orchard | Atelier World Node 01</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050508; 
            overflow: hidden; 
            font-family: 'Space Grotesk', sans-serif;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border: 1px solid #E63946;
            border-radius: 5px;
            font-size: 12px;
            z-index: 10;
        }
        #ui span { color: #E63946; font-weight: 700; }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border: 1px solid #E63946;
            border-radius: 5px;
            font-size: 11px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="ui">
        NEURAL SAPPER v7.0<br>
        NEURAL SAP: <span id="sap">0</span><br>
        FOX UNITS: <span id="foxes">3</span><br>
        <small>WASD to move | [E] to harvest</small>
    </div>
    <div id="controls">
        PRESS [E] NEAR TREES TO HARVEST | AVOID FOX UNITS
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, player, terrain, foxes = [], trees = [], sapCollected = 0;
        let keys = {}, playerVelocity = 0;

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050508);
            scene.fog = new THREE.FogExp2(0x050508, 0.05);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 12, 20);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.35));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(30, 20, 30);
            dirLight.castShadow = true;
            dirLight.shadow.camera.left = -50;
            dirLight.shadow.camera.right = 50;
            dirLight.shadow.camera.top = 50;
            dirLight.shadow.camera.bottom = -50;
            scene.add(dirLight);

            // Terrain
            createTerrain();

            // Player (Sapper)
            player = new THREE.Group();
            let body = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, 1, 0.6),
                new THREE.MeshStandardMaterial({ color: 0x0A0A0F, metalness: 0.8, roughness: 0.2 })
            );
            body.castShadow = true;
            body.receiveShadow = true;
            player.add(body);

            let head = new THREE.Mesh(
                new THREE.SphereGeometry(0.35, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0x1A1A2E, metalness: 0.7, roughness: 0.3 })
            );
            head.position.y = 0.8;
            head.castShadow = true;
            player.add(head);

            // Eye glow
            let eye = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 8, 8),
                new THREE.MeshStandardMaterial({ color: 0x457B9D, emissive: 0x457B9D })
            );
            eye.position.set(0.1, 1, 0.3);
            player.add(eye);

            player.position.set(0, 0.5, 0);
            player.castShadow = true;
            scene.add(player);

            // Trees (Sap sources)
            for (let i = 0; i < 8; i++) {
                spawnTree();
            }

            // Fox units (enemies with high-fidelity textures)
            for (let i = 0; i < 3; i++) {
                spawnFox();
            }

            // Input
            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (e.code === 'KeyE') harvestNearby();
            });
            window.addEventListener('keyup', (e) => {
                keys[e.code] = false;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        function createTerrain() {
            // Ground
            let ground = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200),
                new THREE.MeshStandardMaterial({ 
                    color: 0x050505,
                    map: createTerrainTexture(),
                    roughness: 0.9,
                    metalness: 0.1
                })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Rolling hills
            for (let i = 0; i < 5; i++) {
                let hill = new THREE.Mesh(
                    new THREE.CylinderGeometry(8, 10, 6, 32),
                    new THREE.MeshStandardMaterial({ 
                        color: 0x0A0A0F, 
                        roughness: 0.8,
                        metalness: 0
                    })
                );
                hill.position.set(Math.random() * 60 - 30, 0, Math.random() * 60 - 30);
                hill.castShadow = true;
                hill.receiveShadow = true;
                scene.add(hill);
            }
        }

        function createTerrainTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, 256, 256);

            for (let i = 0; i < 50; i++) {
                ctx.fillStyle = `rgba(69, 123, 157, ${Math.random() * 0.3})`;
                ctx.fillRect(Math.random() * 256, Math.random() * 256, 10, 10);
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.repeat.set(4, 4);
            return texture;
        }

        function spawnTree() {
            let tree = new THREE.Group();

            // Trunk
            let trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.4, 4, 8),
                new THREE.MeshStandardMaterial({ 
                    color: 0x2A1A1A, 
                    roughness: 0.9,
                    map: createWoodTexture()
                })
            );
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            tree.add(trunk);

            // Foliage (high-fidelity sphere)
            let foliage = new THREE.Mesh(
                new THREE.IcosahedronGeometry(1.8, 4),
                new THREE.MeshStandardMaterial({ 
                    color: 0x2D5A27, 
                    emissive: 0x1D3A17,
                    metalness: 0.2,
                    roughness: 0.7
                })
            );
            foliage.position.y = 2.5;
            foliage.castShadow = true;
            foliage.receiveShadow = true;
            tree.add(foliage);

            // Sap node (glowing core)
            let sap = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 16, 16),
                new THREE.MeshStandardMaterial({ 
                    color: 0x457B9D, 
                    emissive: 0x457B9D,
                    metalness: 0.9
                })
            );
            sap.position.y = 2;
            tree.add(sap);
            tree.sapNode = sap;
            tree.harvestable = true;

            tree.position.set(Math.random() * 60 - 30, 0.5, Math.random() * 60 - 30);
            scene.add(tree);
            trees.push(tree);
        }

        function createWoodTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            for (let y = 0; y < 256; y++) {
                const shade = Math.sin(y * 0.02) * 15 + 42 + Math.random() * 10;
                ctx.fillStyle = `rgb(${shade}, ${shade - 10}, ${shade - 20})`;
                ctx.fillRect(0, y, 64, 1);
            }

            return new THREE.CanvasTexture(canvas);
        }

        function spawnFox() {
            let fox = new THREE.Group();

            // Body (high-fidelity)
            let body = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 0.5, 1.2),
                new THREE.MeshStandardMaterial({ 
                    color: 0xFF6B2B,
                    map: createFoxTexture(),
                    metalness: 0.3,
                    roughness: 0.6
                })
            );
            body.castShadow = true;
            body.receiveShadow = true;
            fox.add(body);

            // Head
            let head = new THREE.Mesh(
                new THREE.SphereGeometry(0.4, 16, 16),
                new THREE.MeshStandardMaterial({ 
                    color: 0xFF8C42,
                    metalness: 0.4,
                    roughness: 0.5
                })
            );
            head.position.set(0, 0.25, 0.6);
            head.castShadow = true;
            fox.add(head);

            // Eyes (glowing sensors)
            let leftEye = new THREE.Mesh(
                new THREE.SphereGeometry(0.12, 8, 8),
                new THREE.MeshStandardMaterial({ color: 0xE63946, emissive: 0xE63946 })
            );
            leftEye.position.set(-0.15, 0.35, 0.95);
            fox.add(leftEye);

            let rightEye = new THREE.Mesh(
                new THREE.SphereGeometry(0.12, 8, 8),
                new THREE.MeshStandardMaterial({ color: 0xE63946, emissive: 0xE63946 })
            );
            rightEye.position.set(0.15, 0.35, 0.95);
            fox.add(rightEye);

            // Tail (segmented for mechanical look)
            for (let i = 0; i < 3; i++) {
                let tail = new THREE.Mesh(
                    new THREE.BoxGeometry(0.15, 0.15, 0.4),
                    new THREE.MeshStandardMaterial({ 
                        color: 0xCC5522,
                        metalness: 0.5,
                        roughness: 0.4
                    })
                );
                tail.position.set(0, -0.15, -0.3 - i * 0.4);
                tail.rotation.z = Math.sin(Date.now() * 0.005 + i) * 0.3;
                fox.add(tail);
                fox.tailSegments = fox.tailSegments || [];
                fox.tailSegments.push(tail);
            }

            fox.position.set(Math.random() * 40 - 20, 0.5, Math.random() * 40 - 20);
            fox.velocity = new THREE.Vector3(0, 0, 0);
            fox.speed = 0.05;
            fox.castShadow = true;
            scene.add(fox);
            foxes.push(fox);
        }

        function createFoxTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#FF6B2B';
            ctx.fillRect(0, 0, 64, 64);

            ctx.fillStyle = 'rgba(255, 100, 50, 0.4)';
            for (let i = 0; i < 20; i++) {
                ctx.fillRect(Math.random() * 64, Math.random() * 64, 8, 8);
            }

            return new THREE.CanvasTexture(canvas);
        }

        function harvestNearby() {
            trees.forEach(tree => {
                if (tree.harvestable && player.position.distanceTo(tree.position) < 5) {
                    sapCollected += 10;
                    tree.harvestable = false;
                    tree.sapNode.visible = false;
                    document.getElementById('sap').textContent = sapCollected;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            // Player movement
            if (keys['KeyW']) player.position.z -= 0.15;
            if (keys['KeyS']) player.position.z += 0.15;
            if (keys['KeyA']) player.position.x -= 0.15;
            if (keys['KeyD']) player.position.x += 0.15;

            // Clamp player to terrain
            player.position.x = Math.max(-40, Math.min(40, player.position.x));
            player.position.z = Math.max(-40, Math.min(40, player.position.z));

            // Fox AI
            foxes.forEach((fox, idx) => {
                // Chase player if close
                let toPlayer = new THREE.Vector3().subVectors(player.position, fox.position);
                if (toPlayer.length() < 15) {
                    toPlayer.normalize().multiplyScalar(fox.speed);
                    fox.position.add(toPlayer);
                } else {
                    // Random patrol
                    if (Math.random() < 0.02) {
                        fox.velocity = new THREE.Vector3(
                            (Math.random() - 0.5) * 0.1,
                            0,
                            (Math.random() - 0.5) * 0.1
                        );
                    }
                    fox.position.add(fox.velocity);
                }

                // Tail animation
                if (fox.tailSegments) {
                    fox.tailSegments.forEach((tail, i) => {
                        tail.rotation.z = Math.sin(Date.now() * 0.008 + i * 0.3) * 0.4;
                    });
                }

                // Boundary
                fox.position.x = Math.max(-35, Math.min(35, fox.position.x));
                fox.position.z = Math.max(-35, Math.min(35, fox.position.z));

                // Look toward player
                fox.lookAt(new THREE.Vector3(player.position.x, fox.position.y, player.position.z));
            });

            // Camera follow
            camera.position.lerp(
                new THREE.Vector3(player.position.x, 12, player.position.z + 20),
                0.05
            );
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
