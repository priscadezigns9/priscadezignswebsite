<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Orchard v8.0 | Atelier World Node 01</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050508; 
            overflow: hidden; 
            font-family: 'Space Grotesk', sans-serif;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border: 1px solid #E63946;
            border-radius: 5px;
            font-size: 12px;
            z-index: 10;
        }
        #ui span { color: #E63946; font-weight: 700; }
        #upgrades {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border: 1px solid #457B9D;
            border-radius: 5px;
            font-size: 11px;
            z-index: 10;
        }
        .upgrade-btn {
            display: block;
            margin-top: 10px;
            padding: 5px 10px;
            background: #457B9D;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 10px;
            text-transform: uppercase;
        }
        .upgrade-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border: 1px solid #E63946;
            border-radius: 5px;
            font-size: 11px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="ui">
        NEURAL SAPPER v8.0<br>
        NEURAL SAP: <span id="sap">0</span><br>
        FOX UNITS: <span id="foxes">4</span><br>
        NEURAL FLEET: <span id="fleet">2</span> UNITS<br>
        <small>WASD to move | [E] to harvest</small>
    </div>
    <div id="upgrades">
        FLEET UPGRADES<br>
        <button id="buy-drone" class="upgrade-btn">Buy Drone (100 Sap)</button>
        <button id="upgrade-speed" class="upgrade-btn">Drone Speed (50 Sap)</button>
    </div>
    <div id="controls">
        COLLECT SAP TO UPGRADE YOUR FLEET | WATCH OUT FOR THE LORE-DRIVEN FOG
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, player, trees = [], foxes = [], drones = [], sapCollected = 0;
        let keys = {}, droneSpeed = 0.1, droneCost = 100;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050508);
            scene.fog = new THREE.FogExp2(0x050508, 0.06);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
            const light = new THREE.PointLight(0xE63946, 1, 100);
            light.position.set(0, 20, 10);
            scene.add(light);

            createEnvironment();
            createPlayer();
            
            for(let i=0; i<10; i++) spawnTree();
            for(let i=0; i<4; i++) spawnFox();
            for(let i=0; i<2; i++) spawnDrone();

            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if(e.code === 'KeyE') harvest();
            });
            window.addEventListener('keyup', e => keys[e.code] = false);
            
            document.getElementById('buy-drone').onclick = () => {
                if(sapCollected >= droneCost) {
                    sapCollected -= droneCost;
                    spawnDrone();
                    droneCost += 50;
                    updateUI();
                }
            };
            
            document.getElementById('upgrade-speed').onclick = () => {
                if(sapCollected >= 50) {
                    sapCollected -= 50;
                    droneSpeed += 0.05;
                    updateUI();
                }
            };

            animate();
        }

        function createEnvironment() {
            let ground = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200),
                new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 1 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Bio-mechanical Flora (Luminous Vines)
            for(let i=0; i<30; i++) {
                let vine = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.05, 0.25, 1),
                    new THREE.MeshStandardMaterial({ color: 0x457B9D, emissive: 0x457B9D, emissiveIntensity: 0.5 })
                );
                vine.position.set(Math.random()*100-50, 2.5, Math.random()*100-50);
                vine.rotation.z = Math.random() * 0.5;
                scene.add(vine);
            }
        }

        function createFoxMesh(isAstra = false) {
            let fox = new THREE.Group();
            let skinColor = isAstra ? 0x0A0A0F : 0xFF6B2B; 
            let emissiveColor = isAstra ? 0x00B4A6 : 0x000000;

            const skinMat = new THREE.MeshStandardMaterial({ 
                color: skinColor, 
                roughness: 0.7, 
                metalness: 0.1,
                emissive: emissiveColor,
                emissiveIntensity: isAstra ? 0.2 : 0
            });
            const tunicMat = new THREE.MeshStandardMaterial({ color: 0xE63946, roughness: 0.9 });

            // Body (Organic)
            const body = new THREE.Mesh(new THREE.IcosahedronGeometry(0.5, 2), skinMat);
            body.scale.set(0.8, 1.2, 0.6);
            fox.add(body);

            // Tunic (Apparel)
            if(isAstra) {
                const tunic = new THREE.Mesh(new THREE.IcosahedronGeometry(0.52, 2), tunicMat);
                tunic.scale.set(0.85, 0.8, 0.65);
                tunic.position.y = 0.2;
                fox.add(tunic);
            }

            // Head
            const head = new THREE.Group();
            const skull = new THREE.Mesh(new THREE.IcosahedronGeometry(0.35, 2), skinMat);
            head.add(skull);

            // Muzzle
            const muzzle = new THREE.Mesh(new THREE.IcosahedronGeometry(0.15, 1), skinMat);
            muzzle.scale.set(1, 0.8, 1.5);
            muzzle.position.set(0, -0.1, 0.25);
            head.add(muzzle);

            // Ears
            const earGeo = new THREE.ConeGeometry(0.1, 0.4, 4);
            const lEar = new THREE.Mesh(earGeo, skinMat);
            lEar.position.set(-0.2, 0.35, 0);
            head.add(lEar);
            const rEar = new THREE.Mesh(earGeo, skinMat);
            rEar.position.set(0.2, 0.35, 0);
            head.add(rEar);

            // Eyes
            const eyeGeo = new THREE.SphereGeometry(0.06, 8, 8);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0xE63946 });
            const lEye = new THREE.Mesh(eyeGeo, eyeMat);
            lEye.position.set(-0.15, 0.1, 0.28);
            head.add(lEye);
            const rEye = new THREE.Mesh(eyeGeo, eyeMat);
            rEye.position.set(0.15, 0.1, 0.28);
            head.add(rEye);

            head.position.y = 1.0;
            fox.add(head);

            // Tail
            const tail = new THREE.Mesh(new THREE.IcosahedronGeometry(0.2, 1), skinMat);
            tail.scale.set(1, 1, 3);
            tail.position.set(0, 0, -0.6);
            tail.rotation.x = -Math.PI / 6;
            fox.add(tail);

            return fox;
        }

        function createPlayer() {
            player = createFoxMesh(true);
            player.position.y = 0.5;
            scene.add(player);
        }

        function spawnTree() {
            let tree = new THREE.Group();
            let trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.4, 4), new THREE.MeshStandardMaterial({color: 0x221111}));
            tree.add(trunk);
            let leaf = new THREE.Mesh(new THREE.IcosahedronGeometry(1.5, 1), new THREE.MeshStandardMaterial({color: 0x2D5A27, emissive: 0x112211}));
            leaf.position.y = 2.5;
            tree.add(leaf);
            let core = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({color: 0x457B9D, emissive: 0x457B9D}));
            core.position.y = 2;
            tree.add(core);
            tree.core = core;
            tree.active = true;
            tree.position.set(Math.random()*80-40, 0, Math.random()*80-40);
            scene.add(tree);
            trees.push(tree);
        }

        function spawnFox() {
            let fox = createFoxMesh(false);
            fox.position.set(Math.random()*80-40, 0.3, Math.random()*80-40);
            fox.dir = new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize();
            scene.add(fox);
            foxes.push(fox);
        }

        function spawnDrone() {
            let drone = new THREE.Group();
            let core = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshStandardMaterial({color: 0xE63946, emissive: 0xE63946}));
            drone.add(core);
            drone.position.set(player.position.x, 5, player.position.z);
            drone.target = null;
            scene.add(drone);
            drones.push(drone);
            updateUI();
        }

        function harvest() {
            trees.forEach(t => {
                if(t.active && t.position.distanceTo(player.position) < 5) {
                    sapCollected += 10;
                    t.active = false;
                    t.core.visible = false;
                    updateUI();
                }
            });
        }

        function updateUI() {
            document.getElementById('sap').textContent = sapCollected;
            document.getElementById('fleet').textContent = drones.length;
            document.getElementById('buy-drone').textContent = `Buy Drone (${droneCost} Sap)`;
            document.getElementById('buy-drone').disabled = sapCollected < droneCost;
            document.getElementById('upgrade-speed').disabled = sapCollected < 50;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if(keys['KeyW']) player.position.z -= 0.2;
            if(keys['KeyS']) player.position.z += 0.2;
            if(keys['KeyA']) player.position.x -= 0.2;
            if(keys['KeyD']) player.position.x += 0.2;

            foxes.forEach(f => {
                f.position.addScaledVector(f.dir, 0.05);
                if(Math.abs(f.position.x) > 45 || Math.abs(f.position.z) > 45) f.dir.negate();
                f.lookAt(f.position.clone().add(f.dir));
            });

            drones.forEach((d, i) => {
                if(!d.target) {
                    trees.forEach(t => { if(t.active) d.target = t; });
                }
                
                if(d.target && d.target.active) {
                    let dir = new THREE.Vector3().subVectors(d.target.position, d.position);
                    dir.y += 2.5;
                    if(dir.length() < 0.5) {
                        sapCollected += 10;
                        d.target.active = false;
                        d.target.core.visible = false;
                        d.target = null;
                        updateUI();
                    } else {
                        d.position.addScaledVector(dir.normalize(), droneSpeed);
                    }
                } else {
                    let orbit = new THREE.Vector3(Math.cos(Date.now()*0.002+i)*4, 4, Math.sin(Date.now()*0.002+i)*4);
                    d.position.lerp(player.position.clone().add(orbit), 0.05);
                }
            });

            camera.position.lerp(new THREE.Vector3(player.position.x, 15, player.position.z + 25), 0.05);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
