<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat Lab | Atelier World Node 02</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050508; 
            overflow: hidden; 
            font-family: 'Space Grotesk', sans-serif;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border: 1px solid #E63946;
            border-radius: 5px;
            font-size: 12px;
            z-index: 10;
        }
        #ui span { color: #E63946; font-weight: 700; }
        #msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #457B9D;
            font-size: 2.5rem;
            display: none;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border: 2px solid #457B9D;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border: 1px solid #E63946;
            border-radius: 5px;
            font-size: 11px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="ui">
        TITAN PROTOCOL v7.1<br>
        TITAN HEALTH: <span id="thp">100</span>%<br>
        ENERGY CORES: <span id="cores">0</span><br>
        <small>WASD to move | [SPACE] to blast</small>
    </div>
    <div id="msg">TITAN NEUTRALIZED<br>CORE SALVAGED</div>
    <div id="controls">
        USE [SPACE] TO NEUTRALIZE THE TITAN | DODGE THE ENERGY SHOCKWAVES
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, player, titan, projectiles = [], titanHP = 500, coresCollected = 0;
        let keys = {}, titanActive = true;

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050508);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 25);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
            const spotLight = new THREE.SpotLight(0xffffff, 1);
            spotLight.position.set(20, 40, 20);
            spotLight.castShadow = true;
            scene.add(spotLight);

            // Floor (Arena)
            let floor = new THREE.Mesh(
                new THREE.CircleGeometry(50, 64),
                new THREE.MeshStandardMaterial({ 
                    color: 0x0A0A0F,
                    map: createGridTexture(),
                    metalness: 0.2,
                    roughness: 0.8
                })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Player (Stinger-class unit)
            player = new THREE.Group();
            let body = new THREE.Mesh(
                new THREE.ConeGeometry(0.5, 1.5, 8),
                new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x457B9D, metalness: 0.9 })
            );
            body.rotation.x = Math.PI / 2;
            player.add(body);
            player.position.y = 1;
            scene.add(player);

            // Neural Titan (Boss)
            createTitan();

            // Input
            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (e.code === 'Space') fireProjectile();
            });
            window.addEventListener('keyup', (e) => {
                keys[e.code] = false;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        function createGridTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, 512, 512);
            ctx.strokeStyle = '#E63946';
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.2;
            
            for (let i = 0; i < 512; i += 32) {
                ctx.beginPath();
                ctx.moveTo(i, 0); ctx.lineTo(i, 512);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i); ctx.lineTo(512, i);
                ctx.stroke();
            }
            return new THREE.CanvasTexture(canvas);
        }

        function createTitan() {
            titan = new THREE.Group();

            // Titan Core (High-fidelity)
            let core = new THREE.Mesh(
                new THREE.IcosahedronGeometry(3.5, 0),
                new THREE.MeshStandardMaterial({ 
                    color: 0xE63946, 
                    emissive: 0x440000,
                    metalness: 0.8,
                    roughness: 0.1,
                    wireframe: false
                })
            );
            titan.add(core);
            titan.core = core;

            // Mechanical Shell segments
            for (let i = 0; i < 4; i++) {
                let segment = new THREE.Mesh(
                    new THREE.TorusGeometry(5, 0.2, 8, 32),
                    new THREE.MeshStandardMaterial({ 
                        color: 0x111111, 
                        metalness: 0.9, 
                        roughness: 0.2 
                    })
                );
                segment.rotation.x = Math.random() * Math.PI;
                segment.rotation.y = Math.random() * Math.PI;
                titan.add(segment);
                titan.segments = titan.segments || [];
                titan.segments.push(segment);
            }

            // Outer floating shields
            for (let i = 0; i < 12; i++) {
                let shield = new THREE.Mesh(
                    new THREE.BoxGeometry(1.5, 3, 0.2),
                    new THREE.MeshStandardMaterial({ 
                        color: 0x0A0A0F,
                        metalness: 0.7,
                        roughness: 0.3,
                        map: createTitanTexture()
                    })
                );
                let angle = (i / 12) * Math.PI * 2;
                shield.position.set(Math.cos(angle) * 7, 0, Math.sin(angle) * 7);
                shield.lookAt(0, 0, 0);
                titan.add(shield);
                titan.shields = titan.shields || [];
                titan.shields.push(shield);
            }

            titan.position.set(0, 5, -30);
            scene.add(titan);
        }

        function createTitanTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0A0A0F';
            ctx.fillRect(0, 0, 128, 128);
            ctx.strokeStyle = '#E63946';
            ctx.lineWidth = 2;
            ctx.strokeRect(10, 10, 108, 108);
            ctx.fillStyle = 'rgba(230, 57, 70, 0.1)';
            ctx.fillRect(20, 20, 88, 88);
            return new THREE.CanvasTexture(canvas);
        }

        function fireProjectile() {
            let p = new THREE.Mesh(
                new THREE.SphereGeometry(0.3, 8, 8),
                new THREE.MeshStandardMaterial({ color: 0x457B9D, emissive: 0x457B9D })
            );
            p.position.copy(player.position);
            p.velocity = new THREE.Vector3(0, 0, -1);
            scene.add(p);
            projectiles.push(p);
        }

        function spawnLoot() {
            titanActive = false;
            scene.remove(titan);
            
            let core = new THREE.Mesh(
                new THREE.IcosahedronGeometry(1.5, 4),
                new THREE.MeshStandardMaterial({ color: 0x457B9D, emissive: 0x457B9D })
            );
            core.position.set(titan.position.x, 1.5, titan.position.z);
            scene.add(core);
            titan.loot = core;
        }

        function animate() {
            requestAnimationFrame(animate);

            // Player controls
            if (keys['KeyW']) player.position.z -= 0.15;
            if (keys['KeyS']) player.position.z += 0.15;
            if (keys['KeyA']) player.position.x -= 0.15;
            if (keys['KeyD']) player.position.x += 0.15;

            // Projectile handling
            projectiles.forEach((p, idx) => {
                p.position.add(p.velocity);
                if (titanActive && p.position.distanceTo(titan.position) < 6) {
                    titanHP -= 10;
                    document.getElementById('thp').textContent = Math.max(0, Math.floor((titanHP / 500) * 100));
                    scene.remove(p);
                    projectiles.splice(idx, 1);
                    if (titanHP <= 0) spawnLoot();
                }
            });

            // Titan Animation
            if (titanActive) {
                titan.core.rotation.y += 0.02;
                titan.core.rotation.x += 0.01;
                titan.segments.forEach((s, i) => {
                    s.rotation.y += 0.01 * (i + 1);
                    s.rotation.x += 0.005 * (i + 1);
                });
                titan.shields.forEach((s, i) => {
                    let angle = (Date.now() * 0.001) + (i / 12) * Math.PI * 2;
                    s.position.x = Math.cos(angle) * 8;
                    s.position.z = Math.sin(angle) * 8;
                    s.lookAt(0, 5, 0);
                });
                // Gentle float
                titan.position.y = 5 + Math.sin(Date.now() * 0.002) * 1.5;
            } else if (titan.loot && player.position.distanceTo(titan.loot.position) < 2) {
                scene.remove(titan.loot);
                titan.loot = null;
                coresCollected++;
                document.getElementById('cores').textContent = coresCollected;
                document.getElementById('msg').style.display = 'block';
                setTimeout(() => document.getElementById('msg').style.display = 'none', 3000);
            }

            // Camera follow
            camera.position.lerp(
                new THREE.Vector3(player.position.x, 10, player.position.z + 20),
                0.05
            );
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
