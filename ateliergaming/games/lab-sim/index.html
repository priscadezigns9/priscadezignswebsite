<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat Lab v8.0 | Atelier World Node 02</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050508; 
            overflow: hidden; 
            font-family: 'Space Grotesk', sans-serif;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border: 1px solid #E63946;
            border-radius: 5px;
            font-size: 12px;
            z-index: 10;
        }
        #ui span { color: #E63946; font-weight: 700; }
        #msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #457B9D;
            font-size: 2.5rem;
            display: none;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border: 2px solid #457B9D;
            z-index: 20;
        }
        #phase-tag {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #E63946;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 700;
            z-index: 10;
            opacity: 0.8;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border: 1px solid #E63946;
            border-radius: 5px;
            font-size: 11px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="ui">
        TITAN PROTOCOL v8.0<br>
        TITAN HEALTH: <span id="thp">100</span>%<br>
        ENERGY CORES: <span id="cores">0</span><br>
        PULSE CHARGE: <span id="pulse">100</span>%<br>
        <small>WASD move | [SPACE] blast | [R] Neural Pulse</small>
    </div>
    <div id="phase-tag">PHASE 1: STABLE</div>
    <div id="msg">TITAN NEUTRALIZED<br>CORE SALVAGED</div>
    <div id="controls">
        USE [R] FOR NEURAL PULSE WHEN CHARGED | WATCH FOR PHASE SHIFTS
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, player, titan, drones = [], projectiles = [], titanHP = 1000, maxHP = 1000, coresCollected = 0;
        let keys = {}, titanActive = true, pulseCharge = 100, currentPhase = 1;
        let titanProjectiles = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050508);
            scene.fog = new THREE.FogExp2(0x050508, 0.015);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.15));
            const spotLight = new THREE.SpotLight(0xffffff, 0.8);
            spotLight.position.set(20, 50, 20);
            scene.add(spotLight);

            let floor = new THREE.Mesh(
                new THREE.CircleGeometry(60, 64),
                new THREE.MeshStandardMaterial({ color: 0x050508, roughness: 1, metalness: 0 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            player = new THREE.Group();
            let pBody = new THREE.Mesh(
                new THREE.ConeGeometry(0.5, 1.5, 8),
                new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x457B9D })
            );
            pBody.rotation.x = Math.PI / 2;
            player.add(pBody);
            player.position.y = 1;
            scene.add(player);

            createTitan();
            for (let i = 0; i < 3; i++) spawnDrone();

            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if (e.code === 'Space') fireProjectile();
                if (e.code === 'KeyR') firePulse();
            });
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        function spawnDrone() {
            let drone = new THREE.Group();
            let core = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshStandardMaterial({ color: 0xE63946, emissive: 0xE63946 }));
            drone.add(core);
            let ring = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.04), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            drone.add(ring);
            drone.ring = ring;
            scene.add(drone);
            drones.push(drone);
        }

        function createTitan() {
            titan = new THREE.Group();
            let core = new THREE.Mesh(new THREE.IcosahedronGeometry(4, 0), new THREE.MeshStandardMaterial({ color: 0xE63946, emissive: 0x330000 }));
            titan.add(core);
            titan.core = core;
            titan.segments = [];
            for (let i = 0; i < 3; i++) {
                let s = new THREE.Mesh(new THREE.TorusGeometry(6, 0.2), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                s.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                titan.add(s);
                titan.segments.push(s);
            }
            titan.position.set(0, 8, -40);
            scene.add(titan);
        }

        function fireProjectile() {
            if(!titanActive) return;
            let p = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshStandardMaterial({ color: 0x457B9D, emissive: 0x457B9D }));
            p.position.copy(player.position);
            p.velocity = new THREE.Vector3(0, 0, -1.5);
            scene.add(p);
            projectiles.push(p);
        }

        function firePulse() {
            if(pulseCharge < 100 || !titanActive) return;
            pulseCharge = 0;
            let ring = new THREE.Mesh(new THREE.TorusGeometry(1, 0.1, 16, 64), new THREE.MeshBasicMaterial({ color: 0x457B9D, transparent: true, opacity: 0.8 }));
            ring.position.copy(player.position);
            ring.rotation.x = Math.PI / 2;
            scene.add(ring);
            
            let pulseAnim = setInterval(() => {
                ring.scale.addScalar(0.5);
                ring.material.opacity -= 0.02;
                if(ring.position.distanceTo(titan.position) < ring.scale.x + 4) {
                    titanHP -= 100;
                    updateUI();
                }
                if(ring.material.opacity <= 0) {
                    scene.remove(ring);
                    clearInterval(pulseAnim);
                }
            }, 20);
        }

        function titanAttack() {
            let p = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({ color: 0xE63946, emissive: 0xE63946 }));
            p.position.copy(titan.position);
            let dir = new THREE.Vector3().subVectors(player.position, titan.position).normalize();
            p.velocity = dir.multiplyScalar(0.4);
            scene.add(p);
            titanProjectiles.push(p);
        }

        function updateUI() {
            let pct = Math.max(0, Math.floor((titanHP / maxHP) * 100));
            document.getElementById('thp').textContent = pct;
            document.getElementById('pulse').textContent = Math.floor(pulseCharge);
            
            if(pct < 30 && currentPhase < 3) {
                currentPhase = 3;
                document.getElementById('phase-tag').textContent = "PHASE 3: CRITICAL OVERLOAD";
                titan.core.material.emissive.setHex(0xFF0000);
            } else if(pct < 70 && currentPhase < 2) {
                currentPhase = 2;
                document.getElementById('phase-tag').textContent = "PHASE 2: UNSTABLE";
            }

            if(titanHP <= 0 && titanActive) spawnLoot();
        }

        function spawnLoot() {
            titanActive = false;
            scene.remove(titan);
            let loot = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 4), new THREE.MeshStandardMaterial({ color: 0x457B9D, emissive: 0x457B9D }));
            loot.position.set(0, 2, -40);
            scene.add(loot);
            titan.loot = loot;
        }

        function animate() {
            requestAnimationFrame(animate);

            if(keys['KeyW']) player.position.z -= 0.2;
            if(keys['KeyS']) player.position.z += 0.2;
            if(keys['KeyA']) player.position.x -= 0.2;
            if(keys['KeyD']) player.position.x += 0.2;

            if(pulseCharge < 100) pulseCharge += 0.2;
            updateUI();

            projectiles.forEach((p, i) => {
                p.position.add(p.velocity);
                if(titanActive && p.position.distanceTo(titan.position) < 6) {
                    titanHP -= 10;
                    scene.remove(p);
                    projectiles.splice(i, 1);
                }
            });

            titanProjectiles.forEach((p, i) => {
                p.position.add(p.velocity);
                if(p.position.distanceTo(player.position) < 1.5) {
                    scene.remove(p);
                    titanProjectiles.splice(i, 1);
                    // Add hit effect if needed
                }
            });

            if(titanActive) {
                titan.core.rotation.y += 0.02 * currentPhase;
                titan.segments.forEach(s => s.rotation.x += 0.01 * currentPhase);
                titan.position.x = Math.sin(Date.now()*0.001) * (10 * (currentPhase-1));
                
                if(currentPhase >= 2 && Math.random() < 0.02 * currentPhase) titanAttack();
            } else if(titan.loot && player.position.distanceTo(titan.loot.position) < 3) {
                scene.remove(titan.loot);
                titan.loot = null;
                coresCollected++;
                document.getElementById('cores').textContent = coresCollected;
                document.getElementById('msg').style.display = 'block';
                setTimeout(() => document.getElementById('msg').style.display='none', 3000);
            }

            drones.forEach((d, i) => {
                d.ring.rotation.y += 0.1;
                let orbit = new THREE.Vector3(Math.cos(Date.now()*0.002+i*2)*6, 4, Math.sin(Date.now()*0.002+i*2)*6);
                d.position.lerp(player.position.clone().add(orbit), 0.05);
                d.lookAt(titanActive ? titan.position : player.position);
            });

            camera.position.lerp(new THREE.Vector3(player.position.x, 10, player.position.z + 25), 0.05);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
