<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat Lab | Atelier World Node 02</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050508; 
            overflow: hidden; 
            font-family: 'Space Grotesk', sans-serif;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border: 1px solid #E63946;
            border-radius: 5px;
            font-size: 12px;
            z-index: 10;
        }
        #ui span { color: #E63946; font-weight: 700; }
        #msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #457B9D;
            font-size: 2.5rem;
            display: none;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border: 2px solid #457B9D;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border: 1px solid #E63946;
            border-radius: 5px;
            font-size: 11px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="ui">
        TITAN PROTOCOL v7.5<br>
        TITAN HEALTH: <span id="thp">100</span>%<br>
        ENERGY CORES: <span id="cores">0</span><br>
        NEURAL FLEET: <span id="fleet">3</span> SUPPORT UNITS<br>
        <small>WASD to move | [SPACE] to blast</small>
    </div>
    <div id="msg">TITAN NEUTRALIZED<br>CORE SALVAGED</div>
    <div id="controls">
        USE [SPACE] TO BLAST | NEURAL FLEET PROVIDES TACTICAL TELEMETRY
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, player, titan, drones = [], projectiles = [], titanHP = 500, coresCollected = 0;
        let keys = {}, titanActive = true;

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050508);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 25);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
            const spotLight = new THREE.SpotLight(0xffffff, 1);
            spotLight.position.set(20, 40, 20);
            spotLight.castShadow = true;
            scene.add(spotLight);

            // Floor
            let floor = new THREE.Mesh(
                new THREE.CircleGeometry(50, 64),
                new THREE.MeshStandardMaterial({ color: 0x0A0A0F, metalness: 0.2, roughness: 0.8 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Player
            player = new THREE.Group();
            let body = new THREE.Mesh(
                new THREE.ConeGeometry(0.5, 1.5, 8),
                new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x457B9D, metalness: 0.9 })
            );
            body.rotation.x = Math.PI / 2;
            player.add(body);
            player.position.y = 1;
            scene.add(player);

            // Titan
            createTitan();

            // Neural Fleet Drones
            for (let i = 0; i < 3; i++) {
                spawnDrone();
            }

            // Input
            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (e.code === 'Space') fireProjectile();
            });
            window.addEventListener('keyup', (e) => {
                keys[e.code] = false;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        function spawnDrone() {
            let drone = new THREE.Group();
            let core = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xE63946, emissive: 0xE63946 })
            );
            drone.add(core);
            let ring = new THREE.Mesh(
                new THREE.TorusGeometry(0.3, 0.04, 8, 32),
                new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9 })
            );
            drone.add(ring);
            drone.ring = ring;
            drone.position.set(player.position.x, 5, player.position.z);
            scene.add(drone);
            drones.push(drone);
        }

        function createTitan() {
            titan = new THREE.Group();
            let core = new THREE.Mesh(
                new THREE.IcosahedronGeometry(3.5, 0),
                new THREE.MeshStandardMaterial({ color: 0xE63946, emissive: 0x440000, metalness: 0.8 })
            );
            titan.add(core);
            titan.core = core;

            titan.segments = [];
            for (let i = 0; i < 3; i++) {
                let segment = new THREE.Mesh(
                    new THREE.TorusGeometry(5, 0.15, 8, 32),
                    new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9 })
                );
                segment.rotation.x = Math.random() * Math.PI;
                titan.add(segment);
                titan.segments.push(segment);
            }

            titan.position.set(0, 5, -30);
            scene.add(titan);
        }

        function fireProjectile() {
            let p = new THREE.Mesh(
                new THREE.SphereGeometry(0.3, 8, 8),
                new THREE.MeshStandardMaterial({ color: 0x457B9D, emissive: 0x457B9D })
            );
            p.position.copy(player.position);
            p.velocity = new THREE.Vector3(0, 0, -1.2);
            scene.add(p);
            projectiles.push(p);
        }

        function spawnLoot() {
            titanActive = false;
            scene.remove(titan);
            let core = new THREE.Mesh(
                new THREE.IcosahedronGeometry(1.5, 4),
                new THREE.MeshStandardMaterial({ color: 0x457B9D, emissive: 0x457B9D })
            );
            core.position.set(titan.position.x, 1.5, titan.position.z);
            scene.add(core);
            titan.loot = core;
        }

        function animate() {
            requestAnimationFrame(animate);

            // Player movement
            if (keys['KeyW']) player.position.z -= 0.18;
            if (keys['KeyS']) player.position.z += 0.18;
            if (keys['KeyA']) player.position.x -= 0.18;
            if (keys['KeyD']) player.position.x += 0.18;

            // Projectiles
            projectiles.forEach((p, idx) => {
                p.position.add(p.velocity);
                if (titanActive && p.position.distanceTo(titan.position) < 6) {
                    titanHP -= 10;
                    document.getElementById('thp').textContent = Math.max(0, Math.floor((titanHP / 500) * 100));
                    scene.remove(p);
                    projectiles.splice(idx, 1);
                    if (titanHP <= 0) spawnLoot();
                }
            });

            // Drone AI
            drones.forEach((drone, i) => {
                drone.ring.rotation.y += 0.08;
                let offset = new THREE.Vector3(
                    Math.cos(Date.now() * 0.0015 + i * 2) * 5,
                    3 + Math.sin(Date.now() * 0.003 + i) * 1,
                    Math.sin(Date.now() * 0.0015 + i * 2) * 5
                );
                let targetPos = new THREE.Vector3().addVectors(player.position, offset);
                drone.position.lerp(targetPos, 0.06);
                drone.lookAt(titan.position);
            });

            // Titan Animation
            if (titanActive) {
                titan.core.rotation.y += 0.02;
                titan.segments.forEach(s => s.rotation.x += 0.01);
                titan.position.y = 5 + Math.sin(Date.now() * 0.002) * 1.5;
            } else if (titan.loot && player.position.distanceTo(titan.loot.position) < 2) {
                scene.remove(titan.loot);
                titan.loot = null;
                coresCollected++;
                document.getElementById('cores').textContent = coresCollected;
                document.getElementById('msg').style.display = 'block';
                setTimeout(() => document.getElementById('msg').style.display = 'none', 3000);
            }

            camera.position.lerp(new THREE.Vector3(player.position.x, 10, player.position.z + 20), 0.05);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
