
<!DOCTYPE html><html><head><title>Atelier World v15</title><style>body{background:#050508;color:#fff;font-family:sans-serif;margin:0;}section{padding:50px 5%;}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:40px;}a{background:#0A0A0F;padding:30px;border-radius:20px;color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,0.05);}.ws{background:#0A0A0F;padding:30px;border-radius:30px;border:1px solid #E63946;margin-top:20px;}.btn{background:#E63946;color:#fff;padding:10px 20px;border-radius:10px;cursor:pointer;display:inline-block;margin-top:10px;}</style></head><body><section><h1>Atelier World Hub</h1><div class="ws"><h3>NEURAL WORKSHOP</h3><div id="status">NEURAL CORE: NOT FOUND</div><div id="craft" style="display:none;"><p>Required: 1x Neural Core</p><div class="btn" onclick="craft()">CRAFT ASTRA X-FRAME</div></div><div id="res" style="margin-top:10px;font-weight:700;color:#457B9D;"></div></div><div class="grid"><a href="/games/the-orchard/"><h2>Orchard</h2></a><a href="/games/lab-sim/"><h2>Lab Sim</h2></a><a href="/games/combat-lab/"><h2>Combat Arena</h2></a><a href="/games/social-hub/"><h2>Social Hub</h2></a></div></section><script>function check(){let c=localStorage.getItem('lab_core');if(c==='active'){document.getElementById('status').innerText="NEURAL CORE: DETECTED";document.getElementById('craft').style.display="block";}if(localStorage.getItem('lab_frame')==='active'){document.getElementById('res').innerText="ASTRA X-FRAME [EQUIPPED]";document.getElementById('craft').style.display="none";}}function craft(){localStorage.setItem('lab_frame', 'active');check();}check();</script></body></html>
