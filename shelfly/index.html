<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelfly | Modern Organization</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3d405b; --accent: #81b29a; --bg: #f4f1de; --text: #333; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        nav { padding: 30px 6%; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .logo { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--primary); text-decoration: none; }
        .hero { padding: 100px 6%; text-align: center; }
        h1 { font-family: 'DM Serif Display', serif; font-size: 4rem; color: var(--primary); margin: 0; }
        .btn { display: inline-block; background: var(--primary); color: #fff; padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding: 60px 6%; }
        .img-box { background: #fff; padding: 20px; border-radius: 15px; }
        .img-box img { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>
    <nav><a href="/" class="logo">SHELFLY</a><div class="links"><a href="shop/" style="margin-left:20px; text-decoration:none; color:inherit; font-weight:600;">Shop</a></div></nav>
    <section class="hero">
        <h1>Organize with Intention.</h1>
        <p>Discover the art of the shelf. Premium storage solutions for the modern home.</p>
        <a href="shop/" class="btn">Explore the Shop</a>
    </section>
    <div class="grid">
        <div class="img-box"><img src="https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=800" alt="Shelving"></div>
        <div class="img-box"><img src="https://images.unsplash.com/photo-1591129841117-3adfd313e34f?w=800" alt="Storage"></div>
    </div>
    <footer style="text-align:center; padding:60px 6%; opacity:0.5; font-size:0.8rem;">&copy; 2026 SHELFLY // PRISCA DEZIGNS</footer>
</body>
</html>
