    <line x1="6" y1="36" x2="28" y2="36" stroke="#00E5FF" stroke-width="1" opacity="0.5" stroke-dasharray="3 2"/>
    <text x="28" y="48" font-family="Space Grotesk,Inter,Arial,sans-serif" font-weight="700" font-size="30" fill="url(#tsGrad)" filter="url(#tsGlow)">TECH</text>
    <text x="117" y="48" font-family="Space Grotesk,Inter,Arial,sans-serif" font-weight="300" font-size="30" letter-spacing="3" fill="#F0F0F5">SCOUT</text>
    <rect x="258" y="28" width="34" height="20" rx="4" fill="none" stroke="url(#tsGrad)" stroke-width="1.5"/>
    <text x="275" y="42" font-family="Space Grotesk,Inter,Arial,sans-serif" font-weight="700" font-size="11" letter-spacing="1.5" fill="url(#tsGrad)" text-anchor="middle">HQ</text>
    <path d="M306 16 L314 16 L314 56 L306 56" stroke="url(#tsGrad)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>
    <circle cx="6" cy="36" r="2.5" fill="#0A84FF" filter="url(#tsGlow)"/>
