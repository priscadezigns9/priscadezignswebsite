<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Frying pan body shaped like a steel pan (wide, shallow, circular) -->
  <!-- Pan outer rim -->
  <ellipse cx="95" cy="105" rx="78" ry="72" fill="#1a1a1a" stroke="#E01B24" stroke-width="3"/>
  <!-- Pan inner playing surface (steel pan has concave center) -->
  <ellipse cx="95" cy="108" rx="65" ry="60" fill="#2a2a2a"/>
  <!-- Steel pan groove rings (concentric circles like a real steel pan) -->
  <ellipse cx="95" cy="108" rx="52" ry="48" fill="none" stroke="#E01B24" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="95" cy="108" rx="38" ry="35" fill="none" stroke="#E01B24" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="95" cy="108" rx="24" ry="22" fill="none" stroke="#E01B24" stroke-width="1.5" opacity="0.6"/>
  <!-- Note dimples on the steel pan surface -->
  <circle cx="75" cy="90" r="4" fill="#3a3a3a" stroke="#E01B24" stroke-width="0.8"/>
  <circle cx="95" cy="85" r="4" fill="#3a3a3a" stroke="#E01B24" stroke-width="0.8"/>
  <circle cx="115" cy="90" r="4" fill="#3a3a3a" stroke="#E01B24" stroke-width="0.8"/>
  <circle cx="65" cy="108" r="4" fill="#3a3a3a" stroke="#E01B24" stroke-width="0.8"/>
  <circle cx="125" cy="108" r="4" fill="#3a3a3a" stroke="#E01B24" stroke-width="0.8"/>
  <circle cx="75" cy="126" r="4" fill="#3a3a3a" stroke="#E01B24" stroke-width="0.8"/>
  <circle cx="95" cy="131" r="4" fill="#3a3a3a" stroke="#E01B24" stroke-width="0.8"/>
  <circle cx="115" cy="126" r="4" fill="#3a3a3a" stroke="#E01B24" stroke-width="0.8"/>
  <circle cx="95" cy="108" r="6" fill="#3a3a3a" stroke="#E01B24" stroke-width="1"/>
  <!-- Frying pan handle -->
  <rect x="155" y="98" width="38" height="16" rx="8" fill="#1a1a1a" stroke="#E01B24" stroke-width="2"/>
  <!-- Handle grip lines -->
  <line x1="163" y1="103" x2="163" y2="111" stroke="#E01B24" stroke-width="1.2" opacity="0.7"/>
  <line x1="170" y1="103" x2="170" y2="111" stroke="#E01B24" stroke-width="1.2" opacity="0.7"/>
  <line x1="177" y1="103" x2="177" y2="111" stroke="#E01B24" stroke-width="1.2" opacity="0.7"/>
  <!-- Pan rim highlight -->
  <ellipse cx="78" cy="58" rx="18" ry="8" fill="white" opacity="0.06" transform="rotate(-20 78 58)"/>
</svg>
