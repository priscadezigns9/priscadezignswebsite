<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="100" fill="#1A0A00"/>

  <!-- Frying pan body (circular pan head) shaped like a steel pan drum -->
  <!-- Pan body - slightly elliptical like a steel pan surface -->
  <ellipse cx="230" cy="230" rx="165" ry="155" fill="#CC1A1A"/>
  <!-- Steel pan rim (outer ring) -->
  <ellipse cx="230" cy="230" rx="165" ry="155" fill="none" stroke="#8B0000" stroke-width="12"/>
  <!-- Inner drum surface (depressed center — steel pan characteristic) -->
  <ellipse cx="230" cy="238" rx="140" ry="130" fill="#B01010"/>
  <!-- Steel pan note zones (concentric rings like a tenor pan) -->
  <ellipse cx="230" cy="238" rx="110" ry="100" fill="none" stroke="#E84040" stroke-width="3" stroke-dasharray="0"/>
  <ellipse cx="230" cy="238" rx="78" ry="70" fill="none" stroke="#E84040" stroke-width="2.5"/>
  <ellipse cx="230" cy="238" rx="48" ry="42" fill="none" stroke="#E84040" stroke-width="2"/>
  <!-- Center note dimple -->
  <ellipse cx="230" cy="238" rx="22" ry="19" fill="#FF5555"/>

  <!-- Note dividers (radial lines like a steel pan) -->
  <line x1="230" y1="108" x2="230" y2="140" stroke="#FF6666" stroke-width="2.5"/>
  <line x1="314" y1="133" x2="296" y2="158" stroke="#FF6666" stroke-width="2.5"/>
  <line x1="360" y1="210" x2="330" y2="218" stroke="#FF6666" stroke-width="2.5"/>
  <line x1="348" y1="295" x2="320" y2="278" stroke="#FF6666" stroke-width="2.5"/>
  <line x1="288" y1="352" x2="273" y2="324" stroke="#FF6666" stroke-width="2.5"/>
  <line x1="172" y1="352" x2="187" y2="324" stroke="#FF6666" stroke-width="2.5"/>
  <line x1="112" y1="295" x2="140" y2="278" stroke="#FF6666" stroke-width="2.5"/>
  <line x1="100" y1="210" x2="130" y2="218" stroke="#FF6666" stroke-width="2.5"/>
  <line x1="146" y1="133" x2="164" y2="158" stroke="#FF6666" stroke-width="2.5"/>

  <!-- Pan handle (long, like a frying pan) -->
  <rect x="385" y="210" width="100" height="36" rx="18" fill="#CC1A1A"/>
  <rect x="383" y="212" width="96" height="32" rx="16" fill="#E02020"/>
  <!-- Handle grip detail -->
  <line x1="400" y1="222" x2="400" y2="234" stroke="#8B0000" stroke-width="3" stroke-linecap="round"/>
  <line x1="415" y1="222" x2="415" y2="234" stroke="#8B0000" stroke-width="3" stroke-linecap="round"/>
  <line x1="430" y1="222" x2="430" y2="234" stroke="#8B0000" stroke-width="3" stroke-linecap="round"/>
  <line x1="445" y1="222" x2="445" y2="234" stroke="#8B0000" stroke-width="3" stroke-linecap="round"/>
  <line x1="460" y1="222" x2="460" y2="234" stroke="#8B0000" stroke-width="3" stroke-linecap="round"/>

  <!-- D' PanYard text -->
  <text x="230" y="430" text-anchor="middle" fill="#FF6B35" font-family="Arial Black,sans-serif" font-weight="900" font-size="58" letter-spacing="-1">D' PanYard</text>
</svg>
