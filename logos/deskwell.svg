<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F6F0"/>
      <stop offset="100%" style="stop-color:#EDE8DC"/>
    </linearGradient>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8956C"/>
      <stop offset="100%" style="stop-color:#A0704A"/>
    </linearGradient>
  </defs>

  <!-- Background circle - warm white/cream -->
  <circle cx="200" cy="200" r="195" fill="url(#bg)" stroke="#D4C9B0" stroke-width="2"/>

  <!-- Desk surface - warm wood tone -->
  <rect x="60" y="248" width="280" height="16" rx="4" fill="url(#wood)"/>
  <!-- Wood grain lines -->
  <line x1="70" y1="252" x2="330" y2="252" stroke="#8B5E3C" stroke-width="0.8" opacity="0.4"/>
  <line x1="70" y1="257" x2="330" y2="257" stroke="#8B5E3C" stroke-width="0.8" opacity="0.3"/>
  <line x1="70" y1="261" x2="330" y2="261" stroke="#8B5E3C" stroke-width="0.8" opacity="0.4"/>

  <!-- Desk legs -->
  <rect x="85" y="264" width="10" height="30" rx="2" fill="#A0704A"/>
  <rect x="305" y="264" width="10" height="30" rx="2" fill="#A0704A"/>

  <!-- Monitor base -->
  <rect x="188" y="225" width="24" height="26" rx="2" fill="#A0704A"/>
  <rect x="175" y="246" width="50" height="6" rx="3" fill="#8B5E3C"/>

  <!-- Monitor body - fill transparent, brown outline only -->
  <rect x="138" y="138" width="124" height="90" rx="8" fill="none" stroke="#A0704A" stroke-width="3"/>

  <!-- Screen content - all brown lines only -->
  <!-- Top bar -->
  <rect x="150" y="150" width="100" height="8" rx="2" fill="none" stroke="#A0704A" stroke-width="1.5"/>
  <!-- Three dots outline only -->
  <circle cx="157" cy="154" r="3" fill="none" stroke="#A0704A" stroke-width="1.5"/>
  <circle cx="166" cy="154" r="3" fill="none" stroke="#A0704A" stroke-width="1.5"/>
  <circle cx="175" cy="154" r="3" fill="none" stroke="#A0704A" stroke-width="1.5"/>

  <!-- Content lines - brown -->
  <line x1="152" y1="167" x2="212" y2="167" stroke="#A0704A" stroke-width="2"/>
  <line x1="152" y1="175" x2="197" y2="175" stroke="#A0704A" stroke-width="1.5" opacity="0.7"/>
  <line x1="152" y1="182" x2="202" y2="182" stroke="#A0704A" stroke-width="1.5" opacity="0.7"/>
  <line x1="152" y1="189" x2="190" y2="189" stroke="#A0704A" stroke-width="1.5" opacity="0.5"/>

  <!-- Right panel - bar chart outline -->
  <rect x="220" y="163" width="26" height="50" rx="2" fill="none" stroke="#A0704A" stroke-width="1.5"/>
  <rect x="224" y="185" width="5" height="25" rx="1" fill="none" stroke="#A0704A" stroke-width="1.5"/>
  <rect x="231" y="178" width="5" height="32" rx="1" fill="none" stroke="#A0704A" stroke-width="1.5"/>
  <rect x="238" y="172" width="5" height="38" rx="1" fill="none" stroke="#A0704A" stroke-width="1.5"/>

  <!-- Laptop (closed, to the left) - brown outline only -->
  <rect x="75" y="235" width="70" height="14" rx="3" fill="none" stroke="#A0704A" stroke-width="2"/>
  <rect x="75" y="230" width="70" height="8" rx="2" fill="none" stroke="#A0704A" stroke-width="2"/>

  <!-- Coffee mug - brown outline -->
  <rect x="288" y="222" width="26" height="26" rx="4" fill="none" stroke="#A0704A" stroke-width="2"/>
  <ellipse cx="301" cy="224" rx="9" ry="3" fill="none" stroke="#A0704A" stroke-width="1.5"/>
  <path d="M314 228 Q322 228 322 234 Q322 240 314 240" fill="none" stroke="#A0704A" stroke-width="2"/>
  <!-- Steam -->
  <path d="M296 221 Q298 215 296 210" fill="none" stroke="#A0704A" stroke-width="1.5" opacity="0.5"/>
  <path d="M303 220 Q305 214 303 209" fill="none" stroke="#A0704A" stroke-width="1.5" opacity="0.5"/>

  <!-- Small plant - keep green, it's an accent not computer -->
  <rect x="248" y="232" width="10" height="18" rx="2" fill="#A0704A"/>
  <ellipse cx="253" cy="228" rx="14" ry="10" fill="#4CAF50"/>
  <ellipse cx="244" cy="224" rx="9" ry="7" fill="#388E3C"/>
  <ellipse cx="262" cy="223" rx="9" ry="7" fill="#388E3C"/>
  <ellipse cx="253" cy="219" rx="7" ry="6" fill="#4CAF50"/>

  <!-- Pencil holder - brown outline -->
  <rect x="108" y="226" width="18" height="22" rx="3" fill="none" stroke="#A0704A" stroke-width="2"/>
  <line x1="113" y1="220" x2="113" y2="226" stroke="#A0704A" stroke-width="2"/>
  <line x1="118" y1="218" x2="118" y2="226" stroke="#A0704A" stroke-width="2"/>
  <line x1="123" y1="222" x2="123" y2="226" stroke="#A0704A" stroke-width="2"/>

  <!-- Text -->
  <text x="200" y="320" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#2C3E50" text-anchor="middle" letter-spacing="3">DESKWELL</text>
  <text x="200" y="344" font-family="Arial, sans-serif" font-size="11" fill="#8B7D6B" text-anchor="middle" letter-spacing="5">HOME OFFICE</text>
</svg>
