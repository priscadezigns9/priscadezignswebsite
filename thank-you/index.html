<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You | Prisca Dezigns</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ivory: #FFFFF0;
      --ivory2: #F7F6E0;
      --purple: #5B2D8E;
      --purple2: #7B3FBE;
      --purple3: #9B5FDE;
      --black: #1a1a2e;
      --text: #2d2d4e;
      --muted: #7a7a9a;
      --white: #ffffff;
      --gold: #c9a84c;
      --gold-light: #e2c472;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      overflow: hidden;
    }

    /* Starfield / glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      pointer-events: none;
      animation: drift 10s ease-in-out infinite;
    }
    .blob1 { width: 600px; height: 600px; background: var(--purple); top: -200px; left: -200px; animation-delay: 0s; }
    .blob2 { width: 400px; height: 400px; background: var(--gold); bottom: -150px; right: -100px; animation-delay: 4s; }
    .blob3 { width: 300px; height: 300px; background: var(--purple3); top: 40%; left: 60%; animation-delay: 7s; }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -30px) scale(1.08); }
    }

    /* Card */
    .card {
      position: relative;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 32px;
      padding: 64px 52px;
      max-width: 540px;
      width: 100%;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,168,76,0.1);
      animation: slideUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(50px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Gold icon ring */
    .icon-wrap {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      background: rgba(201,168,76,0.08);
      animation: popIn 0.6s 0.35s cubic-bezier(0.16,1,0.3,1) both;
      box-shadow: 0 0 40px rgba(201,168,76,0.2);
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.4) rotate(-20deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    .icon-wrap svg { width: 42px; height: 42px; fill: var(--gold); }

    /* Tag */
    .tag {
      display: inline-block;
      border: 1px solid rgba(201,168,76,0.35);
      color: var(--gold);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 5px 16px;
      border-radius: 50px;
      margin-bottom: 22px;
      background: rgba(201,168,76,0.06);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3rem);
      line-height: 1.2;
      margin-bottom: 10px;
      color: var(--white);
    }
    h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .sub {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 28px;
    }

    /* Gold line divider */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 2px;
      margin: 0 auto 28px;
    }

    p {
      color: rgba(255,255,255,0.55);
      font-size: 0.95rem;
      line-height: 1.85;
      margin-bottom: 40px;
    }
    p strong { color: rgba(255,255,255,0.85); font-weight: 600; }

    /* Buttons */
    .btn-group { display: flex; flex-direction: column; gap: 12px; align-items: center; }

    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--black);
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 28px rgba(201,168,76,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(201,168,76,0.45); }

    .btn-secondary {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .btn-secondary:hover { color: rgba(255,255,255,0.75); }

    /* Bottom wordmark */
    .wordmark {
      margin-top: 52px;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: rgba(255,255,255,0.18);
      letter-spacing: 2px;
    }
    .wordmark span { color: var(--gold); opacity: 0.7; }

    @media (max-width: 480px) {
      .card { padding: 44px 28px; border-radius: 24px; }
    }
  </style>
</head>
<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <div class="card">

    <div class="icon-wrap">
      <!-- Sparkle / star icon -->
      <svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
    </div>

    <span class="tag">Prisca Dezigns</span>

    <h1>Thank You for<br><em>Joining the Vision</em></h1>
    <p class="sub">See you next time.</p>

    <div class="divider"></div>

    <p>
      Your message has been received.<br>
      <strong>We will be in touch with you shortly.</strong><br><br>
      Every great brand starts with a conversation —<br>
      and we are glad you started yours with us.
    </p>

    <div class="btn-group">
      <a href="/portfolio/" class="btn-primary">← Back to Portfolio</a>
      <a href="/" class="btn-secondary">Visit Prisca Dezigns ↗</a>
    </div>

  </div>

  <div class="wordmark"><span>Prisca</span> Dezigns</div>

</body>
</html>
