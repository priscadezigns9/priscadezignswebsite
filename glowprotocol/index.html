<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Protocol Shop - Gold Standard v4.3</title>
    <!-- Cache-Buster: Fri Jun 5 19:00:00 AST 2026 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --brand-color: #ec4899; 
            --bg-dark: #0a0a0a; 
            --card-bg: #141414; 
            --text-light: #f0f0f0; 
            --border-color: #222; 
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-light); line-height: 1.6; }
        
        nav { 
            background: var(--bg-dark); padding: 20px 5%; border-bottom: 3px solid var(--brand-color); 
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 2px 20px rgba(0,0,0,0.5); 
        }
        #logo { height: 50px; max-width: 200px; object-fit: contain; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; padding: 40px 5%; }
        .card { 
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; 
            padding: 30px; text-align: center; transition: 0.4s; display: flex; flex-direction: column; position: relative; 
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); border-color: var(--brand-color); }
        
        .img-box { height: 300px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; background: #fff; border-radius: 12px; overflow: hidden; }
        img.product-img { max-width: 90%; max-height: 90%; object-fit: contain; }
        
        h3 { font-size: 1rem; margin: 0 0 15px; font-weight: 800; color: var(--text-light); height: 3em; overflow: hidden; }
        .price { color: var(--brand-color); font-weight: 900; font-size: 1.5rem; margin-bottom: 20px; }
        
        /* THE BUTTON FIX: Force high contrast and visibility */
        .btn { 
            display: block; background: var(--brand-color) !important; color: #ffffff !important; 
            padding: 18px; border-radius: 12px; text-decoration: none !important; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 1px; margin-top: auto; font-size: 0.85rem; 
            transition: 0.3s; opacity: 1 !important; visibility: visible !important;
        }
        .btn:hover { background: #d81b60 !important; transform: scale(1.02); }

        footer { padding: 60px 5%; text-align: center; background: #000; color: #fff; border-top: 1px solid #222; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        #loader.hidden { display: none; }
    </style>
</head>
<body>
    <div id="loader"><h2 style="color:var(--brand-color); font-weight:900;">GLOW PROTOCOL</h2></div>
    <nav><img id="logo" src="https://priscadezigns.org/assets/logos/glow_protocol.png" alt="Glow Protocol"></nav>
    <div class="grid" id="grid"></div>
    <footer>
        <div style="font-weight:900; font-size:1.5rem">GLOW PROTOCOL</div>
        <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6; margin-top: 20px;">A PRISCION EMPIRE VENTURE - GOLD STANDARD RESTORATION v4.3</div>
    </footer>
    <script>
        const sb = supabase.createClient("https://sazhdnqzaqpqcralmthh.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc");
        async function load() {
            const { data } = await sb.from("empire_inventory").select("*").eq("brand", "Glow Protocol");
            const items = data || [];
            document.getElementById("grid").innerHTML = items.map(p => `
                <div class="card">
                    <div class="img-box"><img src="${p.image_url}" class="product-img"></div>
                    <h3>${p.title}</h3>
                    <div class="price">${p.price}</div>
                    <a href="${p.affiliate_link}" class="btn" target="_blank">Acquire Protocol</a>
                </div>
            `).join("");
            document.getElementById("loader").classList.add("hidden");
        }
        window.onload = load;
    </script>
</body>
</html>
