<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signals | Glow Protocol Editorial</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FF8BA7; --bg: #FFFFFE; --text: #33272A; --card: #FAEEE7; --border: rgba(0,0,0,0.05); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        nav { height: 80px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; position: sticky; top: 0; background: var(--bg); z-index: 1000; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--accent); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
        .nav-links a { color: var(--text); text-decoration: none; margin-left: 30px; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .header { padding: 100px 5% 60px; text-align: center; background: var(--card); }
        h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin: 0; color: #33272A; }
        .subtitle { color: #594a4e; font-size: 1.1rem; margin-top: 15px; font-weight: 300; }

        .blog-grid { padding: 80px 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 40px; max-width: 1200px; margin: 0 auto; }
        .blog-card { background: #fff; border: 1px solid var(--border); overflow: hidden; text-decoration: none; color: inherit; transition: 0.3s; }
        .blog-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .blog-img { height: 250px; background: #eee; }
        .blog-img img { width: 100%; height: 100%; object-fit: cover; }
        .blog-content { padding: 30px; }
        .blog-tag { color: var(--accent); font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .blog-card h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin: 0 0 15px; }
        .blog-card p { color: #594a4e; font-size: 0.95rem; line-height: 1.7; }

        footer { padding: 80px 5%; border-top: 1px solid var(--border); text-align: center; color: #666; font-size: 0.75rem; letter-spacing: 1px; }
    </style>
</head>
<body>
    <nav>
        <a href="../" class="logo"><img src="/glow-protocol/logo.png" alt="Glow Protocol" style="height: 40px;"></a>
        <div class="nav-links">
            <a href="../">Home</a>
            <a href="../shop/">Collection</a>
            <a href="./">Signals</a>
        </div>
    </nav>
    <header class="header">
        <h1>Signals</h1>
        <p class="subtitle">The 2026 Archive of Longevity Beauty & Regenerative Biotech.</p>
    </header>
    <main class="blog-grid">
        <a href="longevity-beauty-regenerative-biotech-2026/" class="blog-card">
            <div class="blog-img"><img src="https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?w=800&q=80" alt="Biotech Beauty"></div>
            <div class="blog-content">
                <span class="blog-tag">Bio-Intelligence</span>
                <h2>Longevity Beauty & Regenerative Biotech</h2>
                <p>How high-fidelity cellular restoration is defining the 2026 beauty tech cycle.</p>
            </div>
        </a>
    </main>
    <footer>&copy; 2026 GLOW PROTOCOL | MANAGED BY THE NETWORK HUB</footer>
</body>
</html>
