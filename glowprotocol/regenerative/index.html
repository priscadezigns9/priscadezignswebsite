<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Regenerative AI | Glow Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Inter:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FF5A5F; --bg: #fff; --text: #000; --border: #eee; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }

        header { position: fixed; top: 0; width: 100%; padding: 25px 8%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; color: #000; }
        
        .hero { min-height: 100vh; padding: 180px 8% 100px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 4px; color: var(--accent); font-weight: 900; margin-bottom: 20px; }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: clamp(3rem, 7vw, 6rem); line-height: 0.9; margin-bottom: 60px; font-weight: 700; }

        .interface { background: #fafafa; border: 1px solid var(--border); padding: 60px; max-width: 900px; width: 100%; position: relative; border-radius: 4px; }
        .input-group { display: flex; gap: 20px; margin-top: 20px; }
        input { flex: 1; padding: 20px; background: #fff; border: 1px solid var(--border); font-family: inherit; font-size: 1.1rem; }
        .run-btn { padding: 0 40px; background: #000; color: #fff; border: none; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .run-btn:hover { background: var(--accent); }

        #ai-result { margin-top: 60px; }
        .skin-report { text-align: left; animation: fadeIn 1s ease; border-top: 2px solid #000; padding-top: 40px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .routine-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; margin-top: 30px; }
        .routine-item { padding: 25px; border: 1px solid var(--border); background: #fff; }
        .r-label { font-size: 0.6rem; text-transform: uppercase; color: #888; margin-bottom: 10px; font-weight: 900; }
        .r-val { font-size: 1rem; font-weight: 700; color: #000; }

        .acq-btn { display: inline-block; width: 100%; text-align: center; background: #000; color: #fff; text-decoration: none; padding: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; margin-top: 40px; }

        footer { padding: 100px 8% 50px; text-align: center; border-top: 1px solid var(--border); opacity: 0.5; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; }
    </style>
</head>
<body>
    <header>
        <a href="../" class="logo">Glow Protocol</a>
        <nav><a href="../shop/" style="color:#000; text-decoration:none; font-weight:700; font-size:0.7rem; text-transform:uppercase; letter-spacing:1px;">The Shop</a></nav>
    </header>

    <main class="hero">
        <span class="label">Dermal Intelligence Core V1.2</span>
        <h1>Regenerative Lab.</h1>

        <div class="interface">
            <p style="color:#888; margin-bottom:40px; text-transform:uppercase; letter-spacing:3px; font-size:0.8rem;">Identify Skin Concern for Neural Protocol Generation</p>
            <div class="input-group">
                <input type="text" id="ai-input" placeholder="e.g. Hyperpigmentation, dehydration, fine lines..." autocomplete="off">
                <button class="run-btn" onclick="generateProtocol()">Analyze</button>
            </div>
            <div id="ai-result"></div>
        </div>
    </main>

    <footer>© 2026 GLOW PROTOCOL // ARCHIVAL LONGEVITY INTELLIGENCE</footer>

    <script>
    function generateProtocol() {
        const input = document.getElementById('ai-input').value.trim();
        const res = document.getElementById('ai-result');
        if(!input) return;

        res.innerHTML = '<p style="text-align:center; font-weight:700; letter-spacing:4px; margin-top:40px;">SIMULATING CELLULAR RECOVERY...</p>';

        setTimeout(() => {
            const query = input.toLowerCase(); const tag = "priscadezigns-20";
            let concern = "General Longevity"; 
            let routine = [
                { l: "AM Focus", v: "Vitamin C + Ferulic Acid" },
                { l: "PM Focus", v: "Retinoid + Peptides" },
                { l: "Barrier", v: "Ceramide Complex" },
                { l: "Protection", v: "SPF 50 PA++++" }
            ];
            
            if(query.includes('dry') || query.includes('dehydrated')) { concern = "Hydration Recovery"; routine[0].v = "Hyaluronic Acid + Squalane"; }
            if(query.includes('dark') || query.includes('spot')) { concern = "Pigment Correction"; routine[0].v = "Niacinamide + Tranexamic Acid"; }

            res.innerHTML = `
                <div class="skin-report">
                    <span class="label" style="font-size:0.6rem;">Protocol Generated // Core Concern: ${concern}</span>
                    <h2 style="font-family:'Space Grotesk'; font-size:2.5rem; margin:10px 0 40px;">Neural Skincare Readout</h2>
                    
                    <div class="routine-grid">
                        ${routine.map(r => `
                            <div class="routine-item">
                                <div class="r-label">${r.l}</div>
                                <div class="r-val">${r.v}</div>
                            </div>
                        `).join('')}
                    </div>

                    <a href="https://www.amazon.com/s?k=${encodeURIComponent(concern)}+skincare&tag=${tag}" target="_blank" class="acq-btn">Acquire Protocol Components →</a>
                </div>
            `;
        }, 1800);
    }
    </script>
</body>
</html>
