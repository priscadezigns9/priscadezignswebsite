<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glow Protocol — Skin Analysis ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blush: #FFF0F5;
      --cream: #FFF8FC;
      --pink: #FF4D8D;
      --pink-dark: #e03578;
      --text: #2d1b2e;
      --white: #ffffff;
    }
    body { font-family: 'Inter', sans-serif; background-color: var(--cream); color: var(--text); line-height: 1.6; }
    h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 1.5rem; text-align: center; color: var(--pink); }
    
    header { background: #fff; padding: 1rem 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--blush); position: sticky; top: 0; z-index: 100; }
    .logo-container { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 45px; width: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--pink); }
    .logo-text { font-size: 1.6rem; font-weight: 700; color: var(--pink); font-family: 'Playfair Display', serif; }
    
    .container { max-width: 800px; margin: 60px auto; padding: 0 20px; }
    .card { background: #fff; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(255, 77, 141, 0.05); border: 1px solid var(--blush); }
    
    .intro { text-align: center; margin-bottom: 40px; }
    .intro p { color: #7a5e7e; font-size: 1.1rem; }
    
    .form-group { margin-bottom: 25px; }
    label { display: block; font-weight: 600; margin-bottom: 10px; font-size: 1.1rem; }
    textarea, select { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--blush); background: var(--cream); font-size: 1rem; font-family: inherit; }
    
    .btn-submit { background: var(--pink); color: #fff; width: 100%; padding: 18px; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 77, 141, 0.3); }
    .btn-submit:hover { background: var(--pink-dark); transform: translateY(-2px); }

    .result { display: none; margin-top: 40px; background: var(--blush); padding: 30px; border-radius: 20px; }
    .result h3 { color: var(--pink); margin-bottom: 15px; }
  </style>
</head>
<body>

<header>
  <a href="/glowprotocol/" class="logo-container">
    <img src="https://lh3.googleusercontent.com/d/1oVHaG2yMmf3WvlnJXvZqtE4aGvxNuoK6" alt="Logo" class="logo-img">
    <span class="logo-text">Glow Protocol</span>
  </a>
</header>

<div class="container">
  <div class="card">
    <div class="intro">
      <h1>Skin Analysis</h1>
      <p>Tell us a bit about your skin, and we'll help you find the perfect products.</p>
    </div>
    
    <div class="form-group">
      <label>How does your skin feel most of the time?</label>
      <select id="feel">
        <option value="oily">Oily or Shiny</option>
        <option value="dry">Dry or Tight</option>
        <option value="combo">Oily in some spots, dry in others</option>
        <option value="sensitive">Easily irritated or red</option>
      </select>
    </div>

    <div class="form-group">
      <label>What's your main goal?</label>
      <select id="goal">
        <option value="clear">Clearer skin (less pimples)</option>
        <option value="bright">Brighter skin (less dullness)</option>
        <option value="smooth">Smoother skin (less wrinkles)</option>
        <option value="calm">Calmer skin (less redness)</option>
      </select>
    </div>

    <div class="form-group">
      <label>Any other details? (e.g. "I drink lots of water" or "I'm always in the sun")</label>
      <textarea id="details" rows="3" placeholder="Tell us in your own words..."></textarea>
    </div>

    <button class="btn-submit" onclick="analyze()">Show My Routine ✨</button>

    <div id="result" class="result">
      <h3>Your Personalized Plan</h3>
      <p id="planText"></p>
      <div style="margin-top:20px;">
        <a href="/glowprotocol/shop/" style="color:var(--pink); font-weight:700; text-decoration:none;">Go to Shop to see matches →</a>
      </div>
    </div>
  </div>
</div>

<script>
function analyze() {
  const feel = document.getElementById('feel').value;
  const goal = document.getElementById('goal').value;
  const plan = document.getElementById('result');
  const text = document.getElementById('planText');
  
  let msg = "Based on your " + feel + " skin and goal for " + goal + " skin, we recommend a focused routine. ";
  msg += "Check out our shop for products tagged with '" + feel.toUpperCase() + "'.";
  
  text.textContent = msg;
  plan.style.display = 'block';
  plan.scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
