<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>The Protocol Shop | Glow Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #FF4D8D; --bg: #FFFAF9; --text: #2d1b2e; --border: rgba(255,77,141,0.1); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        nav { padding: 30px 6%; display: flex; align-items: center; justify-content: space-between; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top:0; z-index:100; }
        .logo-group { display: flex; align-items: center; text-decoration: none; color: inherit; }
        .logo-group img { height: 40px; width: 40px; border-radius: 50%; border: 2px solid var(--pink); margin-right: 12px; }
        .logo-text { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.2rem; }
        .header { padding: 80px 6% 40px; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 4rem; font-style: italic; margin-bottom: 20px; color: var(--pink); }
        .niche-btn { display: inline-block; padding: 18px 40px; background: #FF9900; color: #fff; text-decoration: none; border-radius: 50px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; margin-bottom: 60px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 0 6% 100px; }
        .card { background: #fff; padding: 30px; border-radius: 20px; text-decoration: none; color: inherit; transition: 0.4s; border: 1px solid var(--border); display: flex; flex-direction: column; text-align: center; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(255,77,141,0.1); }
        .img-box { aspect-ratio: 1/1; background: #fdfdfd; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; padding: 20px; border-radius: 15px; overflow: hidden; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 10px; height: 3rem; overflow: hidden; }
        .price { font-weight: 700; font-size: 1.1rem; color: #888; margin-bottom: 20px; }
        .btn { background: var(--pink); color: #fff; padding: 14px; border-radius: 50px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; margin-top: auto; }
        footer { padding: 80px 6%; text-align: center; border-top: 1px solid var(--border); font-size: 0.85rem; opacity: 0.8; display: flex; flex-direction: column; align-items: center; gap: 15px; }
    </style>
</head>
<body>
    <nav>
        <a href="../" class="logo-group">
            <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/logos/glow-protocol.jpg" alt="Glow Protocol">
            <span class="logo-text">Glow Protocol</span>
        </a>
    </nav>
    <div class="header">
        <h1>THE PROTOCOL</h1>
        <a href="https://www.amazon.com/s?k=premium+skincare&tag=priscadezigns-20" class="niche-btn">Access Official Amazon Store</a>
    </div>
    <main class="grid">
        <a href="https://www.amazon.com/dp/B000787G9C?tag=priscadezigns-20" class="card" target="_blank">
            <div class="img-box"><img src="https://images-na.ssl-images-amazon.com/images/I/61NlIpbonCL.jpg" alt="La Mer"></div>
            <h3>Crème de la Mer Moisturizer</h3><div class="price">$380.00</div><div class="btn">Acquire</div>
        </a>
        <a href="https://www.amazon.com/dp/B000Z61YKC?tag=priscadezigns-20" class="card" target="_blank">
            <div class="img-box"><img src="https://images-na.ssl-images-amazon.com/images/I/61SUj2W5yXL.jpg" alt="SK-II"></div>
            <h3>SK-II Facial Treatment Essence</h3><div class="price">$185.00</div><div class="btn">Acquire</div>
        </a>
        <a href="https://www.amazon.com/dp/B002X6V766?tag=priscadezigns-20" class="card" target="_blank">
            <div class="img-box"><img src="https://images-na.ssl-images-amazon.com/images/I/71umw2cCkOL.jpg" alt="Estee Lauder"></div>
            <h3>Estée Lauder Advanced Night Repair</h3><div class="price">$115.00</div><div class="btn">Acquire</div>
        </a>
    </main>
    <footer>
        <div style="display:flex;align-items:center;gap:10px;">
            <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/logos/glow-protocol.jpg" style="height:30px;width:30px;border-radius:50%;">
            <span>Glow Protocol</span>
        </div>
        <p>© 2026 PRISCA DEZIGNS EMPIRE</p>
    </footer>
</body>
</html>
