<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Apothecary | Glow Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FF4D8D; --bg: #FFFFFE; --text: #33272A; --card: #FFF8FC; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        nav { height: 100px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between; padding: 0 6%; background: #fff; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--accent); font-weight: 700; text-decoration: none; }
        .shop-header { padding: 80px 6% 40px; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 4rem; margin: 0; color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 40px 6%; }
        .card { background: var(--card); padding: 30px; text-decoration: none; color: inherit; transition: 0.4s; display: flex; flex-direction: column; border-radius: 20px; border: 1px solid rgba(255,77,141,0.1); }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(255,77,141,0.05); }
        .img-box { aspect-ratio: 1/1; background: #fff; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; border-radius: 15px; overflow: hidden; }
        .img-box img { max-width: 90%; height: auto; }
        .name { font-weight: 700; font-size: 1.1rem; margin: 0 0 10px; min-height: 3rem; }
        .price { font-weight: 700; color: var(--accent); margin-bottom: 15px; }
        .btn { background: var(--accent); color: #fff; text-align: center; padding: 12px; font-weight: 700; border-radius: 10px; }
        footer { padding: 60px 6%; text-align: center; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>
    <nav><a href="../" class="logo">Glow Protocol</a></nav>
    <div class="shop-header"><h1>The Apothecary</h1></div>
    <main class="grid">
        <a href="https://www.amazon.com/dp/B01M0HOIFP/?tag=priscadezigns-20&language=en_US&currency=USD" class="card" target="_blank">
            <div class="img-box"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/img/glowprotocol/truskin-vit-c.jpg" alt="TruSkin Vitamin C"></div>
            <h3 class="name">TruSkin Vitamin C Serum</h3>
            <div class="price">$19.99 USD</div>
            <div class="btn">Acquire from Apothecary</div>
        </a>
        <a href="https://www.amazon.com/dp/B07VWSNXY5/?tag=priscadezigns-20&language=en_US&currency=USD" class="card" target="_blank">
            <div class="img-box"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/img/glowprotocol/cerave-retinol.jpg" alt="CeraVe Retinol"></div>
            <h3 class="name">CeraVe Retinol Serum</h3>
            <div class="price">$17.99 USD</div>
            <div class="btn">Acquire from Apothecary</div>
        </a>
        <a href="https://www.amazon.com/dp/B06X9MCPV9/?tag=priscadezigns-20&language=en_US&currency=USD" class="card" target="_blank">
            <div class="img-box"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/img/glowprotocol/ordinary-niacinamide.jpg" alt="The Ordinary"></div>
            <h3 class="name">The Ordinary Niacinamide</h3>
            <div class="price">$10.00 USD</div>
            <div class="btn">Acquire from Apothecary</div>
        </a>
        <a href="https://www.amazon.com/dp/B002MSN3QQ/?tag=priscadezigns-20&language=en_US&currency=USD" class="card" target="_blank">
            <div class="img-box"><img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/assets/img/glowprotocol/eltamd-spf.jpg" alt="EltaMD SPF"></div>
            <h3 class="name">EltaMD UV Clear SPF 46</h3>
            <div class="price">$38.99 USD</div>
            <div class="btn">Acquire from Apothecary</div>
        </a>
    </main>
    <footer>© 2026 GLOW PROTOCOL</footer>
</body>
</html>
