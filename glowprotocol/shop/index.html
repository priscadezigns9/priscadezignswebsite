<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Boutique | Glow Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FF8BA7; --bg: #FFFFFE; --text: #33272A; --card: #FAEEE7; --border: rgba(255,255,255,0.08); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        nav { height: 80px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; position: sticky; top: 0; background: var(--bg); z-index: 1000; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--accent); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
        .nav-links a { color: var(--text); text-decoration: none; margin-left: 30px; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .header { padding: 100px 5% 40px; border-bottom: 1px solid var(--border); }
        h1 { font-family: 'Playfair Display', serif; font-size: 4rem; margin: 0; color: #33272A; }

        .filters { padding: 30px 5%; display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn { padding: 10px 20px; border: 1px solid var(--border); background: transparent; color: var(--text); border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1px; background: var(--border); }
        .card { background: var(--bg); padding: 40px; text-decoration: none; color: inherit; transition: 0.4s; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .card:hover { background: #fff; transform: translateY(-5px); z-index: 2; }
        
        .img-box { aspect-ratio: 1/1; background: #fff; border-radius: 4px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 20px; }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; transition: 0.6s; }
        .card:hover img { transform: scale(1.05); }
        
        .cat-tag { font-size: 0.65rem; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .name { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin: 0 0 20px; flex-grow: 1; }
        .btn { border: 1px solid var(--accent); color: var(--accent); text-align: center; padding: 14px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .card:hover .btn { background: var(--accent); color: #000; }

        footer { padding: 80px 5%; border-top: 1px solid var(--border); text-align: center; color: #666; font-size: 0.75rem; letter-spacing: 1px; }
    </style>
</head>
<body>
    <nav>
        <a href="../" class="logo">Glow Protocol</a>
        <div class="nav-links">
            <a href="../">Home</a>
            <a href="index.html">Collection</a>
            <a href="../blog/">Signals</a>
        </div>
    </nav>
    <header class="header"><h1>The Boutique</h1></header>
    <div class="filters">
        <button class="filter-btn active" data-cat="all">All Modules</button>
        <button class="filter-btn" data-cat="Face Serums">Face Serums</button><button class="filter-btn" data-cat="Moisturisers & SPF">Moisturisers & SPF</button><button class="filter-btn" data-cat="Cleansers">Cleansers</button><button class="filter-btn" data-cat="Hair Care">Hair Care</button><button class="filter-btn" data-cat="Body Care">Body Care</button><button class="filter-btn" data-cat="Tools">Tools</button>
    </div>
    <div class="categories-nav" style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:40px; justify-content:center;"><a href="https://www.amazon.com/s?k=facial+cleanser" target="_blank" class="cat-btn" style="background:#FF4D8D; color:white; padding:10px 20px; border-radius:30px; text-decoration:none; font-weight:600; font-size:0.9rem;">Cleansers on Amazon ↗</a><a href="https://www.amazon.com/s?k=face+serum" target="_blank" class="cat-btn" style="background:#FF4D8D; color:white; padding:10px 20px; border-radius:30px; text-decoration:none; font-weight:600; font-size:0.9rem;">Serums on Amazon ↗</a><a href="https://www.amazon.com/s?k=face+moisturizer" target="_blank" class="cat-btn" style="background:#FF4D8D; color:white; padding:10px 20px; border-radius:30px; text-decoration:none; font-weight:600; font-size:0.9rem;">Moisturizers on Amazon ↗</a><a href="https://www.amazon.com/s?k=face+sunscreen" target="_blank" class="cat-btn" style="background:#FF4D8D; color:white; padding:10px 20px; border-radius:30px; text-decoration:none; font-weight:600; font-size:0.9rem;">Sunscreen on Amazon ↗</a><a href="https://www.amazon.com/s?k=skincare+tools" target="_blank" class="cat-btn" style="background:#FF4D8D; color:white; padding:10px 20px; border-radius:30px; text-decoration:none; font-weight:600; font-size:0.9rem;">Tools on Amazon ↗</a></div><main class="grid">

</main>
    <footer>&copy; 2026 Glow Protocol &middot; PRISCA DEZIGNS</footer>
    <script>
        const btns = document.querySelectorAll('.filter-btn');
        const cards = document.querySelectorAll('.card');
        function filter(cat) {
            btns.forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
            cards.forEach(c => c.style.display = (cat === 'all' || c.dataset.cat === cat) ? 'flex' : 'none');
        }
        btns.forEach(b => b.addEventListener('click', () => filter(b.dataset.cat)));
        
        // Handle URL Param
        const urlParams = new URLSearchParams(window.location.search);
        const catParam = urlParams.get('cat');
        if(catParam) filter(catParam);
    </script>
</body>
</html>
