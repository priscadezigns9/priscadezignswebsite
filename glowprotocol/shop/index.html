<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOW PROTOCOL | REGENERATIVE SKINCARE LABORATORY</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --blush: #FFF0F5;
            --cream: #FFF8FC;
            --pink: #FF4D8D;
            --text: #2d1b2e;
            --white: #FFFFFF;
        } 
        * { margin: 0; padding: 0; box-sizing: border-box; } 
        body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--text); padding-top: 100px; } 
        
        #empire-mandate {
            background: #000; color: #4682B4; padding: 10px 0; text-align: center; font-size: 11px; letter-spacing: 1.5px;
            border-bottom: 1px solid rgba(70,130,180,0.3); z-index: 10001; position: fixed; top: 0; left: 0; width: 100%; height: 32px;
            font-weight: 700; text-transform: uppercase; display: flex; align-items: center; justify-content: center;
        }

        nav {
            position: fixed; top: 32px; left: 0; right: 0; z-index: 1000; background: rgba(255, 248, 252, 0.98);
            padding: 0 5%; height: 64px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--blush);
        }
        .header-brand { display: flex; align-items: center; text-decoration: none; }
        .brand-text { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.5rem; color: var(--text); font-style: italic; }
        .brand-accent { color: var(--pink); }
        
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a {
            color: var(--text); text-decoration: none; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .nav-links a:hover { color: var(--pink); }
        
        .nav-btn { 
            background: var(--pink); color: #fff; padding: 10px 25px; 
            text-decoration: none; border-radius: 50px; font-size: 0.8rem; font-weight: 600; transition: 0.2s;
        }
        .nav-btn:hover { background: var(--text); color: var(--white); }

        .filter-wrap { 
            position: sticky; top: 96px; z-index: 999; background: var(--cream); 
            border-bottom: 1px solid var(--blush); padding: 15px 5%; display: flex; gap: 10px; overflow-x: auto; 
        } 
        .filter-btn { 
            font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 600; background: var(--white); 
            border: 1px solid var(--blush); color: var(--text); padding: 8px 18px; cursor: pointer; 
            border-radius: 50px; white-space: nowrap; transition: 0.2s; text-transform: uppercase;
        } 
        .filter-btn:hover, .filter-btn.active { background: var(--pink); border-color: var(--pink); color: #fff; } 

        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 40px 5%; } 
        .card { background: var(--white); border-radius: 15px; padding: 30px; display: flex; flex-direction: column; transition: 0.3s; border: 1px solid var(--blush); text-align: center; } 
        .card:hover { transform: translateY(-5px); border-color: var(--pink); box-shadow: 0 15px 35px rgba(255, 77, 141, 0.1); }
        
        .card-image { height: 220px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; background: var(--cream); border-radius: 10px; } 
        .card-image img { max-width: 80%; max-height: 80%; object-fit: contain; } 
        
        .card-title { 
            font-family: 'Playfair Display', serif; font-weight: 400; margin-bottom: 15px; height: 3em; 
            overflow: hidden; line-height: 1.3; font-size: 1rem; color: var(--text);
        } 
        .card-footer { display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 15px; padding-top: 20px; border-top: 1px solid var(--blush); } 
        .price { font-weight: 600; font-size: 1.1rem; color: var(--pink); } 
        .shop-btn { 
            background: var(--text); color: #fff; padding: 12px 30px; 
            text-decoration: none; border-radius: 50px; font-size: 0.8rem; font-weight: 600; width: 100%; transition: 0.2s; 
        }
        .shop-btn:hover { background: var(--pink); }

        footer {
            padding: 80px 5%; background: var(--white); border-top: 1px solid var(--blush); text-align: center;
        }
        .footer-brand { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.8rem; margin-bottom: 15px; font-style: italic; }
        footer p { font-size: 12px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
        .diagnostic-badge { display: inline-block; margin-top: 25px; border: 1px solid var(--pink); color: var(--pink); padding: 6px 20px; border-radius: 50px; font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <div id="empire-mandate">EMPIRE MANDATE: 10% SUPPORT <a href="https://priscadezigns.org/thewaymadeknown/" style="color: #4682B4; margin: 0 5px;">THE WAY MADE KNOWN</a> MISSION.</div>
    <nav>
        <a class="header-brand" href="https://priscadezigns.org/glowprotocol/">
            <div class="brand-text">GLOW <span class="brand-accent">PROTOCOL</span></div>
        </a>
        <div class="nav-links">
            <a href="https://priscadezigns.org/glowprotocol/">LABORATORY</a>
            <a href="https://priscadezigns.org/glowprotocol/diagnostics/">DIAGNOSTICS</a>
            <a href="https://www.redbubble.com/people/priscadezigns/shop" target="_blank" class="nav-btn">MERCH</a>
        </div>
    </nav>
    <div class="filter-wrap">
        <button onclick="f('all', this)" class="filter-btn active">ALL SOLUTIONS</button>
        <button onclick="f('Serums', this)" class="filter-btn">SERUMS</button>
        <button onclick="f('Cleansers', this)" class="filter-btn">CLEANSERS</button>
        <button onclick="f('Moisturizers', this)" class="filter-btn">HYDRATION</button>
        <button onclick="f('Beauty Tech', this)" class="filter-btn">TECH</button>
        <button onclick="f('Longevity', this)" class="filter-btn">LONGEVITY</button>
    </div>
    
<section class="shop-grid" id="grid"></section>
<footer>
        <div class="footer-brand">GLOW <span class="brand-accent">PROTOCOL</span></div>
        <p>© 2026 GLOW PROTOCOL · A PRISCA DEZIGNS CLINICAL AFFILIATE</p>
        <div class="diagnostic-badge">SKINCARE DIAGNOSTICS: OPTIMIZED</div>
    </footer>

    
    
    

    
    
    


    
    
    

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            const SB_URL = 'https://sazhdnqzaqpqcralmthh.supabase.co';
            const SB_KEY = 'sb_publishable_UicuMabi1dRKAvQ4YGiakg_NCMnftfS';
            const sb = supabase.createClient(SB_URL, SB_KEY);

            async function loadInventory() {
                const { data, error } = await sb
                    .from('empire_inventory')
                    .select('*')
                    .eq('brand', 'Glow Protocol')
                    .order('created_at', { ascending: false });
                
                if (error) {
                    console.error('Inventory Sync Error:', error);
                    return;
                }
                
                const grid = document.getElementById('grid');
                if (!grid) return;
                
                grid.innerHTML = '';
                                data.forEach(p => {
                    grid.innerHTML += `
                        <div class="product-card">
                            <img src="${p.image_url}" class="product-image" loading="lazy">
                            <h3>${p.title}</h3>
                            <span class="price">${p.price}</span>
                            <a href="${p.affiliate_link}" class="buy-link" target="_blank">View on Amazon</a>
                        </div>`;
                });
            }
            document.addEventListener('DOMContentLoaded', loadInventory);
        })();
    </script>
    <script src="/ateliagaming/js/vanguard_hud.js"></script>
</body>
</html>
