<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOW PROTOCOL | Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #007AFF; --white: #FFFFFF; --bg: #FAFAFA; --text: #1C1C1E; }
        body { margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); }
        nav { background: #fff; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .logo-img { height: 40px; }
        .nav-links a { color: var(--text); text-decoration: none; margin-left: 20px; font-weight: 700; font-size: 0.85rem; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 60px 5%; }
        .product-card { background: #fff; border: 1px solid #eee; border-radius: 20px; overflow: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; text-align: center; }
        .product-card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); border-color: var(--blue); }
        .product-image { width: 100%; height: 320px; object-fit: cover; }
        .product-info { padding: 30px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-info h3 { margin: 0 0 10px; font-size: 1.1rem; font-weight: 800; color: #000; line-height: 1.2; }
        .price { color: var(--blue); font-weight: 800; font-size: 1.2rem; margin-bottom: 25px; display: block; }
        .buy-link { background: var(--blue); color: white; text-align: center; padding: 14px; text-decoration: none; font-weight: 800; border-radius: 12px; font-size: 0.85rem; letter-spacing: 0.5px; }
        footer { padding: 60px 5%; text-align: center; background: #fff; border-top: 1px solid #eee; font-size: 12px; color: #888; }
        #empire-mandate { background: #fff; color: #4682B4; padding: 15px 0; text-align: center; font-size: 11px; font-weight: 700; text-transform: uppercase; border-top: 1px solid #eee; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav>
        <a href="../"><img src="https://priscadezigns.org/logos/glow-protocol-logo.png" class="logo-img" alt="Glow Logo"></a>
        <div class="nav-links">
            <a href="../laboratory/">LABORATORY</a>
            <a href="../diagnostics/">DIAGNOSTICS</a>
            <a href="https://priscadezigns.org/glowprotocol/shop/">SOLUTIONS</a>
        </div>
    </nav>
    <div class="product-grid" id="grid"></div>
    <footer>
        <img src="https://priscadezigns.org/logos/glow-protocol-logo.png" style="height: 25px; margin-bottom: 15px;" alt="Glow Logo"><br>
        © 2026 GLOW PROTOCOL · REGENERATIVE SKINCARE · A PRISCA DEZIGNS AFFILIATE
    </footer>
    <div id="empire-mandate">EMPIRE MANDATE: 10% OF EVERY PURCHASE SUPPORTS <a href="https://priscadezigns.org/thewaymadeknown/" style="color: #4682B4; text-decoration: none;">THE WAY MADE KNOWN</a> MISSION.</div>

    <script>
        const SB_URL = 'https://sazhdnqzaqpqcralmthh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function load() {
            const { data, error } = await sb.from('empire_inventory').select('*').eq('brand', 'Glow Protocol');
            if (error) return;
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map(p => `
                <div class="product-card">
                    <img src="${p.image_url}" class="product-image" loading="lazy">
                    <div class="product-info">
                        <h3>${p.title}</h3>
                        <span class="price">${p.price}</span>
                        <a href="${p.affiliate_link}" class="buy-link" target="_blank">View Solution</a>
                    </div>
                </div>
            `).join('');
        }
        load();
    </script>
</body>
</html>
