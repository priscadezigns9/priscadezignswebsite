<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Protocol Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FF4D8D; --bg: #f8f9fa; --text: #1a1a1a; --card: #fff; --border: #eee; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        nav { background: #fff; padding: 20px 6%; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo-group { display: flex; align-items: center; text-decoration: none; color: inherit; }
        .header { padding: 60px 6% 40px; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin: 0 0 10px; }
        .store-btn { display: inline-block; background: #FF9900; color: #fff; padding: 18px 36px; border-radius: 50px; text-decoration: none; font-weight: 900; margin-top: 20px; box-shadow: 0 4px 12px rgba(255,153,0,0.3); font-size: 1.1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; padding: 0 6% 80px; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; text-decoration: none; color: inherit; border: 1px solid var(--border); transition: 0.3s; text-align: center; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); border-color: var(--accent); }
        .img-box { height: 240px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; background: #fff; border-radius: 12px; overflow: hidden; }
        .img-box img { max-height: 100%; max-width: 100%; object-fit: contain; }
        h3 { font-size: 1.2rem; margin: 10px 0; height: 3rem; overflow: hidden; font-family: 'Playfair Display', serif; font-weight: 700; }
        .price { font-weight: 700; color: #888; margin-bottom: 18px; font-size: 1.1rem; }
        .btn { background: var(--accent); color: #fff; padding: 14px; border-radius: 8px; font-weight: 900; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; }
        footer { padding: 60px 6%; text-align: center; font-size: 0.85rem; border-top: 1px solid var(--border); background: #fff; opacity: 0.5; font-weight: 600; letter-spacing: 2px; }
    </style>
</head>
<body>
    <nav><a href="../" class="logo-group"><div style="background:#FF4D8D;color:#fff;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.5rem;font-family:'Playfair Display', serif;">G</div><span style="font-weight:700;letter-spacing:3px;margin-left:15px;font-size:0.9rem;color:#FF4D8D;">GLOW PROTOCOL</span></a></nav>
    <div class="header">
        <h1>Glow Protocol</h1>
        <p>Reliable high-fidelity essentials. Curated by Prisca Dezigns.</p>
        <a href="https://www.amazon.com/shop/priscadezigns" class="store-btn">Shop My Full Amazon Storefront</a>
    </div>
    <div class="grid">
        <a href="https://www.amazon.com/s?k=La+Roche-Posay+Anthelios+SPF+50+Tinted+Sunscreen&tag=priscadezigns-20" class="card" target="_blank">
            <div class="img-box"><img src="https://m.media-amazon.com/images/I/71O0YjXG0DL._AC_SL1500_.jpg" alt="La Roche-Posay Anthelios SPF 50 Tinted Sunscreen" onerror="this.style.display='none'"></div>
            <h3>La Roche-Posay Anthelios SPF 50 Tinted Sunscreen</h3>
            <div class="price">$30</div>
            <div class="btn">View on Amazon</div>
        </a>
        <a href="https://www.amazon.com/s?k=The+Ordinary+Niacinamide+10%+++Zinc+1%&tag=priscadezigns-20" class="card" target="_blank">
            <div class="img-box"><img src="https://m.media-amazon.com/images/I/61fL8zE6FmL._AC_SL1500_.jpg" alt="The Ordinary Niacinamide 10% + Zinc 1%" onerror="this.style.display='none'"></div>
            <h3>The Ordinary Niacinamide 10% + Zinc 1%</h3>
            <div class="price">$6</div>
            <div class="btn">View on Amazon</div>
        </a></div>
    <footer>&copy; 2026 GLOW PROTOCOL // PRISCA DEZIGNS</footer>
</body>
</html>
