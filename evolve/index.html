<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVolve Hub | Prisca Dezigns Authorized Partner</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root {
            --purple: #301934;
            --ivory: #FFFFF0;
            --gold: #D4AF37;
            --black: #000000;
            --glass: rgba(255, 255, 240, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--black);
            color: var(--ivory);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Kinetic Typography */
        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 40px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            mix-blend-mode: difference;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--ivory);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--ivory);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
        }

        /* Hero Section - Full Visual Immersion */
        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at center, #1a0d1d 0%, #000000 100%);
        }

        .hero-img {
            position: absolute;
            width: 80%;
            max-width: 1200px;
            z-index: 1;
            opacity: 0;
            transform: scale(1.1) translateY(30px);
            filter: drop-shadow(0 0 50px rgba(212, 175, 55, 0.1));
        }

        .hero-text {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .hero-text h1 {
            font-size: clamp(5rem, 15vw, 12rem);
            line-height: 0.8;
            margin-bottom: 20px;
            opacity: 0;
            color: var(--ivory);
        }

        .hero-text p {
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0;
        }

        /* Full-Bleed Feature Sections (The Kinetic Look) */
        .feature-section {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 10%;
            border-bottom: 1px solid rgba(255, 255, 240, 0.05);
            overflow: hidden;
        }

        .feature-content {
            width: 40%;
            z-index: 2;
        }

        .feature-content h2 {
            font-size: 5rem;
            margin-bottom: 30px;
            line-height: 0.9;
        }

        .feature-content p {
            font-size: 1.1rem;
            font-weight: 300;
            opacity: 0.7;
            margin-bottom: 40px;
            max-width: 400px;
        }

        .feature-img-wrap {
            position: absolute;
            right: 0;
            width: 65%;
            height: 80%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feature-img-wrap img {
            width: 100%;
            height: auto;
            object-fit: contain;
            transform: translateX(100px);
            opacity: 0;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .car-gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 30px;
        }

        .gallery-item {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 5px;
            opacity: 0.6;
            transition: opacity 0.3s ease;
            cursor: pointer;
        }

        .gallery-item:hover { opacity: 1; }

        .specs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .spec-item span {
            display: block;
            font-size: 0.7rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .spec-item h4 {
            font-size: 1.8rem;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }

        .btn-cta {
            display: inline-block;
            padding: 20px 45px;
            background: var(--gold);
            color: var(--black);
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .btn-cta:hover {
            transform: scale(1.05);
            background: var(--ivory);
        }

        /* Footer */
        footer {
            padding: 100px 5%;
            text-align: center;
            background: #0a0a0a;
        }

        .disclaimer {
            font-size: 0.7rem;
            opacity: 0.3;
            margin-top: 60px;
        }

        @media (max-width: 1024px) {
            .feature-section { flex-direction: column; height: auto; padding: 100px 5%; }
            .feature-content { width: 100%; margin-bottom: 50px; }
            .feature-img-wrap { position: relative; width: 100%; height: auto; }
            .feature-img-wrap img { transform: none !important; width: 100%; opacity: 1 !important; }
            .hero-text h1 { font-size: 5rem; }
        }
    </style>
    <style>
        .trust-badges {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 40px 5%;
            background: rgba(255,255,240,0.02);
            border-top: 1px solid rgba(255,255,240,0.05);
            flex-wrap: wrap;
        }

        .badge-item {
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0.7;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge-item svg {
            width: 20px;
            height: 20px;
            fill: var(--gold);
        }

        /* Massive Typography & Metrics */
        .massive-text {
            font-size: clamp(4rem, 15vw, 12rem);
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -5px;
            color: var(--ivory);
            opacity: 0.1;
            white-space: nowrap;
            user-select: none;
            margin: 100px 0;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px;
            padding: 100px 5%;
            text-align: center;
        }

        .metric-circle {
            width: 200px;
            height: 200px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            position: relative;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .metric-circle:hover {
            transform: scale(1.1);
            background: rgba(212, 175, 55, 0.05);
        }

        .metric-value {
            font-size: 3rem;
            font-weight: 900;
            color: var(--gold);
            font-family: 'Playfair Display', serif;
        }

        .metric-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
            margin-top: 5px;
        }

        .tech-blueprint {
            padding: 100px 5%;
            background: #050505;
            position: relative;
            overflow: hidden;
        }

        .blueprint-img {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            display: block;
            opacity: 0.3;
            filter: invert(1);
        }

        .comparison-section {
            padding: 100px 5%;
            background: linear-gradient(to bottom, #000, #0a0a0a);
        }

        .comp-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 50px;
        }

        .comp-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 240, 0.1);
            padding: 40px;
            border-radius: 20px;
            transition: transform 0.3s ease, border 0.3s ease;
        }

        .comp-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
        }

        .comp-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--gold);
        }

        .comp-card ul {
            list-style: none;
        }

        .comp-card ul li {
            margin-bottom: 15px;
            font-size: 0.9rem;
            opacity: 0.8;
            display: flex;
            align-items: center;
        }

        .comp-card ul li::before {
            content: '•';
            color: var(--gold);
            margin-right: 10px;
            font-size: 1.5rem;
        }

        .highlight-ev {
            border: 2px solid var(--gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
        }

        @media (max-width: 900px) {
            .comp-grid { grid-template-columns: 1fr; }
        }
    </style>
    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Interaction Logic: Gallery Swapping
        function changeMainImage(carId, newSrc) {
            const mainImg = document.querySelector(`#${carId}-main img`);
            gsap.to(mainImg, { 
                opacity: 0, 
                scale: 0.95, 
                duration: 0.3, 
                onComplete: () => {
                    mainImg.src = newSrc;
                    gsap.to(mainImg, { opacity: 1, scale: 1, duration: 0.5, ease: "expo.out" });
                }
            });
        }

        // Aura Text Parallax
        gsap.to("#aura-text", {
            scrollTrigger: {
                trigger: "#aura-text",
                start: "top bottom",
                end: "bottom top",
                scrub: 1
            },
            x: -200
        });

        // Metric Animations
        gsap.from(".metric-circle", {
            scrollTrigger: {
                trigger: ".metrics-grid",
                start: "top 80%"
            },
            scale: 0,
            opacity: 0,
            stagger: 0.2,
            duration: 1.5,
            ease: "expo.out"
        });

        // Hero Entrance
        gsap.to("#hero-img", { opacity: 1, y: 0, scale: 1, duration: 2, ease: "expo.out", delay: 0.2 });
        gsap.to("#hero-h1", { opacity: 1, y: 0, duration: 1.5, ease: "power4.out", delay: 0.6 });
        gsap.to("#hero-tag", { opacity: 1, duration: 1.5, delay: 1 });

        // Feature Animations
        document.querySelectorAll('.feature-section').forEach(section => {
            const img = section.querySelector('img');
            const content = section.querySelector('.feature-content');

            gsap.to(img, {
                scrollTrigger: {
                    trigger: section,
                    start: "top 60%",
                    toggleActions: "play none none reverse"
                },
                opacity: 1,
                x: 0,
                duration: 1.5,
                ease: "expo.out"
            });

            gsap.from(content, {
                scrollTrigger: {
                    trigger: section,
                    start: "top 70%",
                },
                y: 50,
                opacity: 0,
                duration: 1,
                ease: "power3.out"
            });
        });
    </script>
</body>
</html>
