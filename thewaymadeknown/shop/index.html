<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>THE WAY MADE KNOWN | High-Fidelity Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FFFFFF; --bg: #050508; --bg2: #0A0A10; --text: #FFFFFF; --border: rgba(255,255,255,0.08); --muted: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; overflow-x: hidden; }
        nav { position: fixed; top: 0; width: 100%; padding: 20px 6%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(5,5,8,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .nav-brand { font-family: 'Space Grotesk', sans-serif; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; color: #fff; font-size: 1.1rem; }
        .hero { padding: 160px 6% 60px; border-bottom: 1px solid var(--border); }
        .hero p { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 6px; color: var(--accent); font-weight: 900; margin-bottom: 15px; }
        .hero h1 { font-family: 'Space Grotesk', sans-serif; font-size: clamp(3rem, 10vw, 7rem); font-weight: 900; line-height: 0.85; letter-spacing: -3px; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1px; background: var(--border); padding: 1px; }
        .card { background: var(--bg); padding: 40px; text-decoration: none; color: inherit; transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .card:hover { background: var(--bg2); z-index: 2; transform: scale(1.02); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .img-box { width: 100%; aspect-ratio: 1; background: #fff; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; padding: 30px; border-radius: 2px; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .cat { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; color: var(--accent); margin-bottom: 10px; font-weight: 900; }
        h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; line-height: 1.2; }
        .desc { font-size: 0.85rem; color: var(--muted); margin-bottom: 25px; line-height: 1.6; flex-grow: 1; }
        .footer-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
        .price { font-weight: 900; font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; }
        .btn { padding: 12px 20px; border: 1px solid var(--accent); color: var(--accent); font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .card:hover .btn { background: var(--accent); color: #000; }
        footer { padding: 100px 6% 50px; text-align: center; border-top: 1px solid var(--border); }
        .copy { font-size: 0.65rem; color: #333; letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
<body>
    <nav><a href="../" class="nav-brand">THE WAY MADE KNOWN</a></nav>
    <div class="hero"><p>EVANGELICAL TOOLS & ASSETS</p><h1>THE BOUTIQUE</h1></div>
    <div class="shop-grid">
