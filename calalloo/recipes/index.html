<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Fidelity Caribbean Recipes | Calalloo</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900&family=Inter:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #E87722; --dark: #1A0D00; --bg: #FAFAFA; --font-display: 'Fraunces', serif; --font-sans: 'Inter', sans-serif; }
        body { background: var(--bg); font-family: var(--font-sans); margin: 0; padding: 0; color: var(--dark); }
        header { padding: 1.5rem 5%; background: white; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-family: var(--font-display); font-weight: 900; font-size: 1.8rem; color: var(--primary); text-decoration: none; }
        .hero-section { padding: 4rem 5%; text-align: center; max-width: 800px; margin: 0 auto; }
        .hero-section h1 { font-family: var(--font-display); font-size: 3rem; margin-bottom: 1rem; }
        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; padding: 0 5% 4rem; max-width: 1400px; margin: 0 auto; }
        .recipe-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-decoration: none; color: inherit; transition: transform 0.3s; border: 1px solid rgba(0,0,0,0.02); display: flex; flex-direction: column; }
        .recipe-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(232, 119, 34, 0.1); }
        .recipe-card img { width: 100%; height: 250px; object-fit: cover; background: #eee; }
        .recipe-card-content { padding: 1.5rem; flex: 1; }
        .recipe-card h3 { font-family: var(--font-display); margin: 0 0 0.5rem 0; font-size: 1.4rem; }
        .recipe-meta { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--primary); font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; }
        .badge { background: var(--primary); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.6rem; }
    </style>
</head>
<body>
    <header>
        <a href="../index.html" class="nav-brand">Calalloo</a>
        <div style="font-weight: 800; font-size: 0.7rem; letter-spacing: 0.1em; color: var(--primary);">AUTHENTIC REPOSITORY: 300+ NODES</div>
    </header>

    <div class="hero-section">
        <h1>Authentic Caribbean Recipes</h1>
        <p>A high-fidelity catalog of verified Caribbean cuisine, ensuring precise image-to-recipe alignment for heritage discovery.</p>
    </div>

    <div class="recipe-grid" id="recipe-container">
        <!-- Initial set of 16 high-fidelity recipes -->
    </div>

    <script>
        const recipes = [
            { name: "Trinidadian Callaloo", img: "https://globalkitchentravels.com/wp-content/uploads/2021/04/Trinidad-Callaloo-HERO-LR.jpg", cal: "320 kcal" },
            { name: "Grenadian Oil Down", img: "https://exploringtheprimordial.com/wp-content/uploads/2020/07/IMG_4570.jpg", cal: "540 kcal" },
            { name: "Chicken Pelau", img: "https://cookingwithria.com/wp-content/uploads/2013/02/IMG_1024-scaled.jpg", cal: "480 kcal" },
            { name: "Pholourie", img: "https://globalkitchentravels.com/wp-content/uploads/2020/09/Trinidad-Pholourie-HERO-LR.jpg", cal: "190 kcal" },
            { name: "Sahina", img: "https://i0.wp.com/tastetrinbago.com/wp-content/uploads/2020/01/Sahina.png?fit=1024%2C1024&ssl=1", cal: "210 kcal" },
            { name: "Curry Crab & Dumpling", img: "https://www.simplytrinicooking.com/wp-content/uploads/2009/01/curry-crab-dumpling.jpg", cal: "450 kcal" },
            { name: "Bake & Shark", img: "https://cookingwithria.com/wp-content/uploads/2014/06/IMG_4807.jpg", cal: "620 kcal" },
            { name: "Trinidadian Doubles", img: "https://globalkitchentravels.com/wp-content/uploads/2019/12/Trinidad-Doubles-HERO-LR.jpg", cal: "350 kcal" },
            { name: "Aloo Pie", img: "https://www.simplytrinicooking.com/wp-content/uploads/2008/04/aloo-pie-2.jpg", cal: "280 kcal" },
            { name: "Macaroni Pie", img: "https://cookingwithria.com/wp-content/uploads/2013/04/IMG_1423.jpg", cal: "520 kcal" },
            { name: "Stewed Chicken", img: "https://www.simplytrinicooking.com/wp-content/uploads/2008/01/stewed-chicken.jpg", cal: "430 kcal" },
            { name: "Curry Goat", img: "https://globalkitchentravels.com/wp-content/uploads/2020/04/Caribbean-Curry-Goat-HERO-LR.jpg", cal: "510 kcal" },
            { name: "Trinidadian Pastelles", img: "https://cookingwithria.com/wp-content/uploads/2012/12/IMG_8741.jpg", cal: "410 kcal" },
            { name: "Coocoo & Flying Fish", img: "https://www.sandals.com/blog/content/images/2020/04/Cou-Cou-Flying-Fish-Barbados.jpg", cal: "490 kcal" },
            { name: "Jerk Chicken", img: "https://images.unsplash.com/photo-1598511726623-d3065b219f85?auto=format&fit=crop&q=80&w=800", cal: "550 kcal" },
            { name: "Ackee & Saltfish", img: "https://www.simplyrecipes.com/thmb/9W66K6H6Zp5T6m86K6W6K6W6K6=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/Simply-Recipes-Ackee-Saltfish-LEAD-05-6a56e6d5e1a24d5e8e8e8e8e8e8e8e8e.jpg", cal: "380 kcal" }
        ];

        const container = document.getElementById('recipe-container');
        recipes.forEach(r => {
            const card = document.createElement('div');
            card.className = 'recipe-card';
            card.innerHTML = `
                <img src="${r.img}" alt="${r.name}" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&q=80&w=400'">
                <div class="recipe-card-content">
                    <h3>${r.name}</h3>
                    <div class="recipe-meta"><span>${r.cal}</span><span class="badge">VERIFIED IMAGE</span></div>
                </div>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
