<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calalloo | The Caribbean Food Lab</title>
    <meta name="description" content="The high-fidelity backbone of Caribbean culinary heritage. Discover recipes, ingredients, and local provisioners.">
    <meta name="keywords" content="Calalloo, Caribbean food lab, Trinidad recipes, heritage cuisine, local ingredients discovery, Caribbean chefs community, authentic Caribbean food, culinary backbone">
    <meta name="geo.region" content="TT" />
    <meta name="geo.placename" content="Trinidad and Tobago" />
    <meta name="geo.position" content="10.66;-61.51" />
    <meta name="ICBM" content="10.66, -61.51" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900;9..144,1,900&family=Inter:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/dpanyard/favicon.ico">
    
    <!-- Real Map Library -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg: #FAFAFA;
            --primary: #E87722;
            --secondary: #FF9F58;
            --dark: #1A0D00;
            --mid: #666666;
            --white: #FFFFFF;
            --calalloo-green: #2D5A27;
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        body.dark-mode {
            --bg: #0B0E14;
            --dark: #F8FAFC;
            --white: #1A1F26;
            --mid: #A0AEC0;
        }
        body.dark-mode p, body.dark-mode h1, body.dark-mode h2, body.dark-mode h3, body.dark-mode span, body.dark-mode div, body.dark-mode b, body.dark-mode small { color: #F8FAFC !important; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--dark); font-family: var(--font-sans); line-height: 1.6; transition: 0.3s; }

        header {
            padding: 1rem 5%;
            background: var(--white);
            border-bottom: 2px solid var(--calalloo-green);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-brand {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--calalloo-green);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .layout { display: flex; min-height: calc(100vh - 72px); }
        
        .sidebar {
            width: 280px;
            background: var(--white);
            border-right: 1px solid rgba(0,0,0,0.05);
            padding: 40px 20px;
            position: sticky;
            top: 72px;
            height: calc(100vh - 72px);
            overflow-y: auto;
        }

        .sidebar h2 { font-family: var(--font-display); font-size: 1.2rem; margin-bottom: 20px; color: var(--calalloo-green); }
        .cat-link { display: block; padding: 12px 16px; border-radius: 12px; text-decoration: none; color: var(--mid); font-weight: 600; margin-bottom: 5px; transition: 0.3s; cursor: pointer; }
        .cat-link:hover, .cat-link.active { background: var(--calalloo-green); color: white !important; }

        .main { flex: 1; padding: 40px 5%; overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .search-container { margin-bottom: 40px; position: relative; }
        .search-input { width: 100%; padding: 1.2rem 2.5rem; border-radius: 50px; border: 2px solid var(--calalloo-green); font-size: 1rem; font-family: var(--font-sans); outline: none; box-shadow: 0 10px 30px rgba(45, 90, 39, 0.05); background: var(--white); color: var(--dark); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .pin { background: var(--white); border-radius: 28px; overflow: hidden; box-shadow: 0 4px 25px rgba(0,0,0,0.04); transition: 0.3s; border: 1px solid rgba(0,0,0,0.02); display: flex; flex-direction: column; }
        .pin:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(45, 90, 39, 0.1); }
        .pin img { width: 100%; height: 260px; object-fit: cover; }
        .pin-content { padding: 1.5rem; flex: 1; }
        .pin-content h3 { font-family: var(--font-display); font-size: 1.4rem; margin-bottom: 8px; color: var(--calalloo-green); }
        .pin-tag { font-family: var(--font-mono); font-size: 0.75rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800; }
        .pin-meta { display: flex; gap: 10px; margin-top: 15px; }
        .btn-action { padding: 8px 16px; border-radius: 50px; border: 1px solid var(--calalloo-green); background: none; color: var(--calalloo-green); font-family: var(--font-sans); font-weight: 800; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .btn-action:hover { background: var(--calalloo-green); color: white !important; }

        .friend-card { background: var(--white); border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--border-color); margin-bottom: 15px; transition: 0.3s; }
        .friend-card:hover { border-color: var(--calalloo-green); transform: scale(1.02); }
        .friend-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--calalloo-green); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; }

        #map-view { width: 100%; height: 650px; border-radius: 32px; border: 1px solid rgba(0,0,0,0.05); z-index: 1; }

        .map-search-bar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 80%; max-width: 500px; display: flex; gap: 10px; }
        .map-search-bar input { flex: 1; padding: 12px 24px; border-radius: 50px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); font-family: var(--font-sans); font-weight: 600; }
        
        .search-results-label { font-family: var(--font-display); font-size: 1.2rem; margin: 20px 0 10px; color: var(--calalloo-green); display: none; }

        /* Modal Protocol */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .recipe-modal { background: var(--white); border-radius: 40px; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 40px; position: relative; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 32px; cursor: pointer; color: var(--calalloo-green); font-weight: 800; }
        .modal-hero { width: 100%; height: 350px; border-radius: 30px; object-fit: cover; margin-bottom: 30px; }
    </style>
</head>
<body>

<header>
    <a href="/" class="nav-brand">Calalloo</a>
    <nav style="display: flex; gap: 20px; align-items: center;">
        <a href="javascript:void(0)" onclick="showMainTab('feed')" style="text-decoration:none; font-weight:800; color:var(--dark); font-size:14px;">Culinary Feed</a>
        <a href="javascript:void(0)" onclick="showMainTab('map-tab')" style="text-decoration:none; font-weight:800; color:var(--dark); font-size:14px;">Market Locator</a>
        <a href="/community/index.html" style="text-decoration:none; font-weight:800; color:var(--dark); font-size:14px;">Community</a>
        <a href="/profile/index.html" style="text-decoration:none; font-weight:800; color:var(--dark); font-size:14px;">Profile</a>
        <a href="/login/index.html" style="background:var(--calalloo-green); color:white; padding:10px 24px; border-radius:50px; text-decoration:none; font-weight:800; font-size:14px;">Sign In</a>
    </nav>
</header>

<div class="layout">
    <aside class="sidebar">
        <h2>Categories</h2>
        <a class="cat-link active" onclick="filterCategory('All', this)">All Protocol</a>
        <a class="cat-link" onclick="filterCategory('Sunday', this)">Sunday Lunch</a>
        <a class="cat-link" onclick="filterCategory('Street', this)">Street Food Heritage</a>
        <a class="cat-link" onclick="filterCategory('Seafood', this)">Seafood & Coastal</a>
        <a class="cat-link" onclick="filterCategory('Provision', this)">Provision & Soil</a>
        <a class="cat-link" onclick="filterCategory('Breakfast', this)">Caribbean Breakfast</a>
        <a class="cat-link" onclick="filterCategory('Beverage', this)">Native Beverages</a>
    </aside>

    <main class="main">
        <!-- Feed Tab -->
        <div id="feed" class="tab-content active">
            <div class="search-container">
                <input type="text" class="search-input" id="recipe-search" placeholder="Search for recipes, ingredients or friends..." oninput="combinedSearch()">
            </div>
            
            <div id="friend-results-section">
                <h2 id="friends-label" class="search-results-label">Community Results</h2>
                <div id="friend-grid"></div>
            </div>

            <h2 id="recipes-label" class="search-results-label">Recipe Protocol</h2>
            <div class="grid" id="recipe-grid"></div>
        </div>

        <!-- Map Tab -->
        <div id="map-tab" class="tab-content">
            <h1 style="font-family: var(--font-display); margin-bottom: 24px;">Market Discovery Node</h1>
            <div style="position: relative;">
                <div class="map-search-bar">
                    <input type="text" id="market-search" placeholder="Search for local ingredients (e.g. Dasheen, Okra)..." oninput="searchMarkets()">
                </div>
                <div id="map-view"></div>
            </div>
        </div>
    </main>
</div>

<!-- Recipe Protocol Modal -->
<div class="modal-overlay" id="recipe-overlay" onclick="closeRecipe(event)">
    <div class="recipe-modal" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeRecipe()">&times;</span>
        <img id="modal-img" class="modal-hero" src="" alt="">
        <h1 id="modal-title" style="font-family: var(--font-display); margin-bottom: 10px; color: var(--calalloo-green);"></h1>
        <span id="modal-tag" class="pin-tag"></span>
        <p id="modal-desc" style="margin: 20px 0; font-size: 1.1rem;"></p>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 30px;">
            <div>
                <h3 style="font-family: var(--font-display); margin-bottom: 15px;">Ingredients</h3>
                <ul id="modal-ingredients" style="padding-left: 20px;"></ul>
            </div>
            <div>
                <h3 style="font-family: var(--font-display); margin-bottom: 15px;">Sourcing Map</h3>
                <p id="modal-sourcing" style="font-size: 14px; color: var(--mid); margin-bottom: 20px;"></p>
                <button class="btn-p" onclick="locateCurrentIngredients()">Locate Nearby Ingredients</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Supabase Config
    const supabaseUrl = 'https://sktpjacowqaedddtrhuz.supabase.co';
    const supabaseKey = '{{credential:supabase-anon-key}}';
    const sb = supabase.createClient(supabaseUrl, supabaseKey);

    const recipes = [
        {
            id: 1,
            name: "Trinidadian Callaloo Protocol",
            category: "Sunday",
            tag: "Heritage • Vol. 1",
            img: "https://thisbagogirl.com/wp-content/uploads/2021/04/Tobago-Crab-and-Callaloo-Recipe-scaled.jpg",
            desc: "Verified protocol from Maraval. A rich blend of dasheen bush, okra, and blue crab simmered in fresh coconut milk.",
            ingredients: ["Dasheen Bush", "Okra", "Blue Crab", "Coconut Milk", "Pimento Peppers", "Scotch Bonnet"],
            locations: ["Central Market POS", "Caroni Farmers Market"],
            substitutes: {"Dasheen Bush": "Spinach + Swiss Chard", "Blue Crab": "Smoked Turkey Tail (Halal Alternative)"}
        },
        {
            id: 2,
            name: "Heritage Chicken Pelau",
            category: "Sunday",
            tag: "Classic • One Pot",
            img: "https://cookingwithria.com/wp-content/uploads/2013/02/IMG_1024-scaled.jpg",
            desc: "The authentic 'burnt sugar' method. Caramelized chicken with pigeon peas, rice, and fresh pumpkin.",
            ingredients: ["Pigeon Peas", "Parboiled Rice", "Pumpkin", "Chicken", "Coconut Milk", "Green Seasoning"],
            locations: ["Chaguanas Market", "Caroni Farmers Market"],
            substitutes: {"Pigeon Peas": "Goya Canned Pigeon Peas (Global)", "Pumpkin": "Butternut Squash"}
        },
        {
            id: 3,
            name: "Authentic Doubles Node",
            category: "Street",
            tag: "Street Food • Verified",
            img: "https://globalkitchentravels.com/wp-content/uploads/2019/12/Trinidad-Doubles-HERO-LR.jpg",
            desc: "The quintessential Trinidadian street food. Bara and curried channa, topped with cucumber chutney.",
            ingredients: ["Channa", "Flour", "Turmeric", "Cumin", "Baking Powder", "Shado Beni"],
            locations: ["Curepe Hub", "St. Augustine Market"],
            substitutes: {"Channa": "Chickpeas (Canned/Dry)", "Shado Beni": "Cilantro + Lime"}
        },
        {
            id: 4,
            name: "Curried Crab & Dumpling",
            category: "Seafood",
            tag: "Coastal • Heritage",
            img: "https://www.sandals.com/blog/content/images/2020/02/Curry-Crab-Dumpling-Tobago.jpg",
            desc: "Store Bay protocol. Piquant curry with flour dumplings, a Tobago coastal staple.",
            ingredients: ["Blue Crab", "Curry Powder", "Flour", "Garlic", "Onion"],
            locations: ["Scarborough Market", "POS Fish Market"],
            substitutes: {"Blue Crab": "Dungeness Crab"}
        },
        {
            id: 5,
            name: "Saltfish & Bake",
            category: "Breakfast",
            tag: "Morning Fuel • Authentic",
            img: "https://simplytrinicooking.com/wp-content/uploads/2008/11/IMG_0185.jpg",
            desc: "The quintessential Caribbean breakfast node. Fluffy fried bakes paired with piquant sautéed saltfish.",
            ingredients: ["Saltfish", "Flour", "Onion", "Tomato", "Hot Pepper"],
            locations: ["Chaguanas Market", "Maraval Hub"],
            substitutes: {"Saltfish": "Salted Cod (Dry)"}
        }
    ];

    const friends = [
        { name: "Priscilla Narine", bio: "Heritage Chef • POS", handle: "@prisca" },
        { name: "Marcus Singh", bio: "Flavor Scout • Caroni", handle: "@marcus" },
        { name: "Astra Lore", bio: "Protocol Specialist", handle: "@astra" },
        { name: "Nova Vanguard", bio: "Tech Culinary Analyst", handle: "@nova" }
    ];

    const markets = [
        { name: "Central Market POS", lat: 10.648, lng: -61.503, items: ["Dasheen Bush", "Okra", "Blue Crab"] },
        { name: "Caroni Farmers Market", lat: 10.598, lng: -61.405, items: ["Pumpkin", "Okra", "Pigeon Peas"] },
        { name: "Chaguanas Market", lat: 10.516, lng: -61.411, items: ["Pigeon Peas", "Rice", "Coconut Milk"] },
        { name: "Curepe Heritage Hub", lat: 10.645, lng: -61.403, items: ["Channa", "Turmeric"] },
        { name: "St. Augustine Market", lat: 10.641, lng: -61.398, items: ["Flour", "Cumin"] },
        { name: "Alaska Global Pantry", lat: 61.218, lng: -149.9, items: ["Chickpeas", "Spinach", "Butternut Squash", "Salted Cod"] }
    ];

    let map;
    let markers = [];
    let currentActiveRecipe = null;

    async function syncSupabaseData() {
        console.log("Calalloo AI: Handshake with Supabase Cloud...");
        const { data, error } = await sb.from('recipes').select('*');
        if(!error && data && data.length > 0) {
            console.log("Verified Heritage Data Received.");
        }
    }

    function initMap() {
        if(map) return;
        const userLat = parseFloat(localStorage.getItem('calalloo_lat')) || 10.66;
        const userLng = parseFloat(localStorage.getItem('calalloo_lng')) || -61.51;
        
        map = L.map('map-view').setView([userLat, userLng], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
        
        L.marker([userLat, userLng], { 
            icon: L.divIcon({ className: 'user-kitchen', html: '<div style="background:var(--calalloo-green); width:15px; height:15px; border-radius:50%; border:3px solid white; box-shadow:0 0 10px rgba(0,0,0,0.3);"></div>' })
        }).addTo(map).bindPopup('<b>YOUR KITCHEN</b>');

        markets.forEach(m => {
            const marker = L.marker([m.lat, m.lng]).addTo(map).bindPopup(`<b>${m.name}</b><br>Available: ${m.items.join(', ')}`);
            markers.push({ marker, data: m });
        });
    }

    function combinedSearch() {
        const q = document.getElementById('recipe-search').value.toLowerCase();
        const filteredRecipes = recipes.filter(r => r.name.toLowerCase().includes(q) || r.ingredients.some(i => i.toLowerCase().includes(q)));
        renderRecipes(filteredRecipes);
        const filteredFriends = friends.filter(f => f.name.toLowerCase().includes(q) || f.handle.toLowerCase().includes(q));
        renderFriends(filteredFriends, q.length > 0);
        document.getElementById('recipes-label').style.display = (filteredRecipes.length > 0) ? 'block' : 'none';
        document.getElementById('friends-label').style.display = (filteredFriends.length > 0 && q.length > 0) ? 'block' : 'none';
    }

    function renderRecipes(data) {
        const grid = document.getElementById('recipe-grid');
        grid.innerHTML = '';
        data.forEach(r => {
            const el = document.createElement('div');
            el.className = 'pin';
            el.innerHTML = `
                <img src="${r.img}" alt="${r.name}">
                <div class="pin-content">
                    <span class="pin-tag">${r.tag}</span>
                    <h3>${r.name}</h3>
                    <p style="font-size:14px; color:var(--mid);">${r.desc.substring(0, 80)}...</p>
                    <div class="pin-meta">
                        <button class="btn-action" onclick="openRecipe(${r.id})">View Protocol</button>
                    </div>
                </div>
            `;
            grid.appendChild(el);
        });
    }

    function renderFriends(data, searching) {
        const grid = document.getElementById('friend-grid');
        grid.innerHTML = '';
        if(!searching) return;
        data.forEach(f => {
            const el = document.createElement('div');
            el.className = 'friend-card';
            el.innerHTML = `
                <div class="friend-avatar">${f.name[0]}</div>
                <div>
                    <h3 style="font-size:16px; margin:0;">${f.name} <small style="color:var(--mid); font-weight:400;">${f.handle}</small></h3>
                    <p style="font-size:13px; color:var(--mid); margin:0;">${f.bio}</p>
                </div>
                <button class="btn-action" style="margin-left:auto;">Connect Hub</button>
            `;
            grid.appendChild(el);
        });
    }

    function openRecipe(id) {
        const r = recipes.find(rec => rec.id === id);
        currentActiveRecipe = r;
        document.getElementById('modal-img').src = r.img;
        document.getElementById('modal-title').innerText = r.name;
        document.getElementById('modal-tag').innerText = r.tag;
        document.getElementById('modal-desc').innerText = r.desc;
        
        const ingList = document.getElementById('modal-ingredients');
        ingList.innerHTML = '';
        r.ingredients.forEach(i => {
            const li = document.createElement('li');
            li.style.marginBottom = '5px';
            li.innerText = i;
            ingList.appendChild(li);
        });

        document.getElementById('modal-sourcing').innerText = `Nearest Nodes: ${r.locations.join(', ')}`;
        document.getElementById('recipe-overlay').style.display = 'flex';
    }

    function closeRecipe() {
        document.getElementById('recipe-overlay').style.display = 'none';
    }

    function locateCurrentIngredients() {
        if(!currentActiveRecipe) return;
        closeRecipe();
        showMainTab('map-tab');
        
        const isRemote = localStorage.getItem('calalloo_lat') > 45; // e.g. Alaska
        const mainIng = currentActiveRecipe.ingredients[0];
        const sub = currentActiveRecipe.substitutes[mainIng];

        if(isRemote && sub) {
            alert(`AI Discovery: Local ${mainIng} is scarce in this climate. Sourcing Global substitute: ${sub} in Alaska.`);
            searchMarkets(sub);
        } else {
            searchMarkets(mainIng);
        }
    }

    function showMainTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'map-tab') setTimeout(initMap, 200);
    }

    function filterCategory(cat, el) {
        document.querySelectorAll('.cat-link').forEach(l => l.classList.remove('active'));
        if(el) el.classList.add('active');
        const filtered = cat === 'All' ? recipes : recipes.filter(r => r.category === cat);
        renderRecipes(filtered);
    }

    function searchMarkets(override) {
        const q = (override || document.getElementById('market-search').value).toLowerCase();
        markers.forEach(m => {
            const matches = m.data.items.some(i => i.toLowerCase().includes(q)) || m.data.name.toLowerCase().includes(q);
            if(matches) {
                m.marker.addTo(map);
                if(override) m.marker.openPopup();
            } else {
                map.removeLayer(m.marker);
            }
        });
    }

    window.onload = () => {
        renderRecipes(recipes);
        syncSupabaseData();
        if(localStorage.getItem('calalloo_dark_persistent') === 'true') document.body.classList.add('dark-mode');
    };
</script>
</body>
</html>
