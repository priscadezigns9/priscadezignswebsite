<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calalloo | The Caribbean Food Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900;9..144,1,900&family=Inter:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/dpanyard/favicon.ico">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg: #FAFAFA;
            --primary: #E87722;
            --calalloo-green: #2D5A27;
            --dark: #1A0D00;
            --white: #FFFFFF;
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
        }

        body.dark-mode { --bg: #0B0E14; --dark: #F8FAFC; --white: #1A1F26; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--dark); font-family: var(--font-sans); }

        header {
            padding: 1rem 5%;
            background: var(--white);
            border-bottom: 2px solid var(--calalloo-green);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-brand { font-family: var(--font-display); font-weight: 900; font-size: 1.8rem; color: var(--calalloo-green); text-decoration: none; }

        .layout { display: flex; height: calc(100vh - 72px); }
        
        .sidebar {
            width: 350px;
            background: var(--white);
            border-right: 1px solid rgba(0,0,0,0.05);
            padding: 30px 20px;
            overflow-y: auto;
        }

        .main { flex: 1; padding: 40px 5%; overflow-y: auto; position: relative; }

        /* Next-Level Universal Search */
        .universal-search-hub { position: relative; width: 100%; margin-bottom: 30px; }
        .search-input { width: 100%; padding: 1.5rem 3.5rem; border-radius: 100px; border: 3px solid var(--calalloo-green); font-size: 1.2rem; font-family: var(--font-sans); outline: none; box-shadow: 0 20px 60px rgba(45, 90, 39, 0.12); background: var(--white); color: var(--dark); font-weight: 700; transition: 0.3s; }
        .search-input:focus { transform: scale(1.02); border-color: var(--primary); }
        
        .ai-lens-btn { position: absolute; right: 25px; top: 50%; transform: translateY(-50%); background: var(--calalloo-green); color: white; border: none; padding: 8px 18px; border-radius: 30px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 12px; }

        .discovery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .node-card { background: var(--white); border-radius: 24px; padding: 25px; border: 1px solid rgba(0,0,0,0.05); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; overflow: hidden; }
        .node-card:hover { transform: translateY(-10px); border-color: var(--calalloo-green); box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        .node-type { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--primary); margin-bottom: 10px; display: block; }
        .node-title { font-family: var(--font-display); font-size: 1.3rem; margin-bottom: 5px; color: var(--calalloo-green); }
        
        /* Vectorized Preference Engine */
        .taste-profile-box { background: linear-gradient(135deg, var(--calalloo-green), #1a3617); border-radius: 20px; padding: 25px; color: white; margin-bottom: 30px; }
        .taste-profile-box h2 { font-family: var(--font-display); font-size: 1.4rem; margin-bottom: 15px; }
        .preference-tag { display: inline-block; padding: 6px 12px; background: rgba(255,255,255,0.15); border-radius: 50px; font-size: 12px; font-weight: 700; margin: 4px; }

        .map-container { width: 100%; height: 500px; border-radius: 30px; margin-top: 30px; border: 4px solid var(--white); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 40px; }
        .modal-content { background: var(--white); border-radius: 40px; max-width: 1000px; width: 100%; padding: 50px; position: relative; }
        
        /* High-Fidelity Suggestions */
        .suggestion-section { margin-top: 40px; }
        .suggestion-section h2 { font-family: var(--font-display); font-size: 1.5rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<header>
    <a href="/" class="nav-brand">Calalloo</a>
    <nav style="display: flex; gap: 20px; align-items: center;">
        <a href="/profile/index.html" style="text-decoration:none; font-weight:800; color:var(--dark); font-size:14px;">My Kitchen</a>
    </nav>
</header>

<div class="layout">
    <aside class="sidebar">
        <div class="taste-profile-box">
            <h2>Your AI Taste Profile</h2>
            <div id="ai-taste-tags">
                <span class="preference-tag">Piquant</span>
                <span class="preference-tag">Coastal Heritage</span>
                <span class="preference-tag">Sunday Lunch Protocol</span>
            </div>
            <p style="font-size: 11px; margin-top: 15px; opacity: 0.8;">AI is syncing your browsing vector with local market supply.</p>
        </div>

        <div class="suggestion-section">
            <h2 style="font-size: 1.1rem; color: var(--calalloo-green);">✨ Smart Follows</h2>
            <div id="smart-follows">
                <!-- AI dynamic people suggestions -->
            </div>
        </div>

        <div class="suggestion-section">
            <h2 style="font-size: 1.1rem; color: var(--calalloo-green);">🍲 Recommended Dishes</h2>
            <div id="smart-dishes">
                <!-- AI dynamic dish suggestions -->
            </div>
        </div>
    </aside>

    <main class="main">
        <div class="universal-search-hub">
            <input type="text" class="search-input" id="omni-search" placeholder="Ask anything: 'Where is the nearest Dasheen?' or 'Find Priscilla'..." oninput="vectorSearch(this.value)">
            <button class="ai-lens-btn" onclick="triggerAILens()">
                <span>📸</span> AI LENS
            </button>
        </div>

        <h2 id="view-label" style="font-family: var(--font-display); margin-bottom: 20px;">Universal Discovery Node</h2>
        <div class="discovery-grid" id="discovery-grid"></div>

        <div id="map-node" class="map-container"></div>
    </main>
</div>

<script>
    // Supabase Handshake
    const supabaseUrl = 'https://sktpjacowqaedddtrhuz.supabase.co';
    const supabaseKey = '{{credential:supabase-anon-key}}';
    const sb = supabase.createClient(supabaseUrl, supabaseKey);

    // High-Fidelity Universal Dataset
    const nodes = [
        { type: "RECIPE", title: "Trinidadian Callaloo Protocol", meta: "Dasheen, Crab, Okra", tags: ["Piquant", "Sunday"], lat: 10.65, lng: -61.5 },
        { type: "PERSON", title: "Priscilla Narine", meta: "Empire Architect • Chef", tags: ["Heritage"], lat: 10.68, lng: -61.51 },
        { type: "LOCATION", title: "Central Market POS", meta: "Fresh Provision • 4.9★", tags: ["Sourcing"], lat: 10.648, lng: -61.503 },
        { type: "DISH", title: "Curried Crab & Dumpling", meta: "Store Bay Protocol", tags: ["Coastal"], lat: 11.16, lng: -60.84 }
    ];

    function vectorSearch(q) {
        const query = q.toLowerCase();
        const grid = document.getElementById('discovery-grid');
        grid.innerHTML = '';
        
        const results = nodes.filter(n => 
            n.title.toLowerCase().includes(query) || 
            n.meta.toLowerCase().includes(query) ||
            n.tags.some(t => t.toLowerCase().includes(query))
        );

        results.forEach(n => {
            const card = document.createElement('div');
            card.className = 'node-card';
            card.innerHTML = `
                <span class="node-type">${n.type}</span>
                <h3 class="node-title">${n.title}</h3>
                <p style="font-size:13px; color:var(--mid);">${n.meta}</p>
                <div style="margin-top:10px;">
                    ${n.tags.map(t => `<span style="font-size:9px; font-weight:800; background:#f0f0f0; padding:3px 8px; border-radius:4px; margin-right:5px;">${t}</span>`).join('')}
                </div>
            `;
            card.onclick = () => focusNode(n);
            grid.appendChild(card);
        });
    }

    let map;
    function initMap() {
        if(map) return;
        map = L.map('map-node').setView([10.66, -61.51], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        nodes.forEach(n => {
            L.marker([n.lat, n.lng]).addTo(map).bindPopup(`<b>${n.title}</b><br>${n.type}`);
        });
    }

    function focusNode(n) {
        map.setView([n.lat, n.lng], 15);
        // AI logic: highlight on map and update sidebar suggestions
    }

    function triggerAILens() {
        alert("AI LENS: Analyzing image protocols... Segmenting ingredients... Searching local market supply nodes.");
    }

    function renderAISuggestions() {
        const follows = document.getElementById('smart-follows');
        const dishes = document.getElementById('smart-dishes');
        
        follows.innerHTML = `
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                <div style="width:40px; height:40px; border-radius:50%; background:var(--calalloo-green); color:white; display:flex; align-items:center; justify-content:center; font-weight:800;">PN</div>
                <div><b style="font-size:14px;">Priscilla Narine</b><br><small style="color:var(--mid);">Matches your Heritage profile</small></div>
            </div>
        `;

        dishes.innerHTML = `
            <div style="background:rgba(0,0,0,0.02); padding:15px; border-radius:15px;">
                <b style="font-size:14px;">Heritage Pelau</b><br>
                <small style="color:var(--mid);">Suggested based on your search for 'Pigeon Peas'</small>
            </div>
        `;
    }

    window.onload = () => {
        vectorSearch('');
        initMap();
        renderAISuggestions();
        if(localStorage.getItem('calalloo_dark') === 'true') document.body.classList.add('dark-mode');
    };
</script>
</body>
</html>
