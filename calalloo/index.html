<!DOCTYPE html>
<html lang="en">
<head>
<script>
    // HARD AUTH GUARD: Hide page until verified
    document.documentElement.style.display = 'block';
    (function() {
        const session = localStorage.getItem('calalloo_uid');
        const isAuthPage = window.location.href.includes('/login/') || window.location.href.includes('/signup/');
        if (!session && !isAuthPage) {
            window.location.href = '/calalloo/login/index.html';
        } else {
            document.addEventListener('DOMContentLoaded', () => {
                document.documentElement.style.display = 'block';
            });
        }
    })();
</script>

    <meta charset="UTF-8">

    <style>
        :root {
            --bg: #FAFAFA;
            --primary: #E87722;
            --calalloo-green: #2D5A27;
            --dark: #1A0D00;
            --white: #FFFFFF;
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
        }
        body.dark-mode { --bg: #0B0E14; --dark: #F8FAFC; --white: #1A1F26; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { padding-top: 104px;  background-color: var(--bg); color: var(--dark); font-family: var(--font-sans); }
        header { position: fixed; top: 32px; left: 0; width: 100%; z-index: 10000;  padding: 1rem 5%; background: var(--white); border-bottom: 2px solid var(--calalloo-green); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-brand { font-family: var(--font-display); font-weight: 900; font-size: 1.8rem; color: var(--calalloo-green); text-decoration: none; }
        .layout { display: flex; height: calc(100vh - 72px); }
        .sidebar { width: 350px; background: var(--white); border-right: 1px solid rgba(0,0,0,0.05); padding: 30px 20px; overflow-y: auto; }
        .main { flex: 1; padding: 40px 5%; overflow-y: auto; position: relative; }
        .universal-search-hub { position: relative; width: 100%; margin-bottom: 30px; }
        .search-input { width: 100%; padding: 1.5rem 3.5rem; border-radius: 100px; border: 3px solid var(--calalloo-green); font-size: 1.2rem; outline: none; box-shadow: 0 20px 60px rgba(45, 90, 39, 0.12); background: var(--white); color: var(--dark); font-weight: 700; }
        .discovery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .node-card { background: var(--white); border-radius: 24px; padding: 25px; border: 1px solid rgba(0,0,0,0.05); transition: 0.4s; cursor: pointer; }
        .taste-profile-box { background: linear-gradient(135deg, var(--calalloo-green), #1a3617); border-radius: 20px; padding: 25px; color: white; margin-bottom: 30px; }
        .map-container { width: 100%; height: 500px; border-radius: 30px; margin-top: 30px; }
    
        #empire-mandate {

<header style="display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: white; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100;">

        <!-- Auth Section -->
        <div id="auth-section" style="display: flex; gap: 15px; align-items: center;">

            <a href="/calalloo/signup/index.html" id="signup-link" style="text-decoration:none; font-weight:800; background:#E87722; color:white; padding: 8px 16px; border-radius: 4px; font-size:14px;">Sign Up</a>
        </div>
        
        <!-- Profile Link (Visible when logged in) -->

</header>

<div class="layout">
    <aside class="sidebar">
        <div class="taste-profile-box">
            <h2>Taste Profile</h2>
            <p>AI Syncing your preferences...</p>
        </div>
        <h2>Smart Recommendations</h2>
        <div id="ai-suggestions"></div>
    </aside>
    <main class="main">
        <div id="feed" class="tab-content">
            <div class="universal-search-hub">
                <input type="text" class="search-input" id="omni-search" placeholder="Search the Empire...">
            </div>
            <div class="discovery-grid" id="discovery-grid"></div>
        </div>
        <div id="map-tab" class="tab-content" style="display:none;">
            <div id="map-node" class="map-container"></div>
        </div>
    </main>
</div>
<script>
    const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', '{{credential:supabase-anon-key}}');
    const nodes = [
        { title: "Trinidadian Callaloo Protocol", meta: "Sunday Heritage", lat: 10.65, lng: -61.5 },
        { title: "Heritage Chicken Pelau", meta: "One Pot Classic", lat: 10.6, lng: -61.4 }
    ];
    function renderNodes() {
        document.getElementById('discovery-grid').innerHTML = nodes.map(n => `
            <div class="node-card">
                <h3>${n.title}</h3>
                <p>${n.meta}</p>
            </div>
        `).join('');
    }
    function showMainTab(id) {
        document.getElementById('feed').style.display = id === 'feed' ? 'block' : 'none';
        document.getElementById('map-tab').style.display = id === 'map-tab' ? 'block' : 'none';
        if(id === 'map-tab') setTimeout(initMap, 200);
    }
    let map;
    function initMap() {
        if(map) return;
        map = L.map('map-node').setView([10.66, -61.51], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    }
    window.onload = () => { 
        const urlParams = new URLSearchParams(window.location.search);
        const tab = urlParams.get('tab');
        if(tab === 'markets') showMainTab('map-tab');
        else showMainTab('feed'); 
        renderNodes(); 
    };
</script>
</body>
</html>
