<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Calalloo</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900&family=Inter:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAFAFA;
            --primary: #E87722;
            --dark: #1A0D00;
            --white: #FFFFFF;
            --border: rgba(0,0,0,0.05);
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
        }

        body.dark-mode {
            --bg: #0B0E14;
            --dark: #F8FAFC;
            --white: #1A1F26;
            --border: rgba(255,255,255,0.1);
            color: white;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: var(--font-sans); color: var(--dark); transition: 0.3s; }

        header {
            padding: 1rem 5%;
            background: var(--white);
            border-bottom: 2px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-brand {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--primary);
            text-decoration: none;
        }

        .layout { display: flex; min-height: calc(100vh - 72px); }
        .sidebar { width: 280px; background: var(--white); border-right: 1px solid var(--border); padding: 32px 16px; }
        .side-link { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 12px; text-decoration: none; color: inherit; font-weight: 600; margin-bottom: 8px; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-size: 15px; }
        .side-link:hover, .side-link.active { background: rgba(232, 119, 34, 0.08); color: var(--primary); }

        .main { flex: 1; padding: 40px 5%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--white); border-radius: 24px; padding: 32px; border: 1px solid var(--border); margin-bottom: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .card h2 { font-family: var(--font-display); font-size: 20px; margin-bottom: 20px; }

        .form-input { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid var(--border); font-family: inherit; font-size: 15px; margin-bottom: 20px; background: transparent; color: inherit; }
        
        .btn-p { background: var(--primary); color: white; padding: 14px 28px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-p:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(232, 119, 34, 0.2); }

        .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }

        .permission-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border); }
        .permission-row:last-child { border-bottom: none; }
    </style>
</head>
<body id="app-body">

<header>
    <a href="https://calalloo.com/" class="nav-brand">Calalloo</a>
    <div style="font-weight: 800; font-size: 12px; color: var(--primary);">PERSONAL PROFILE</div>
</header>

<div class="layout">
    <div class="sidebar">
        <button class="side-link active" onclick="showTab('profile', this)">My Profile</button>
        <button class="side-link" onclick="showTab('settings', this)">Settings</button>
        <button class="side-link" onclick="window.location.href='../community/'">Community</button>
        <button class="side-link" onclick="window.location.href='../recipes/'">Recipes</button>
    </div>

    <div class="main">
        <div id="profile" class="tab-content active">
            <h1 style="font-family: var(--font-display); margin-bottom: 32px;">Heritage Log</h1>
            <div class="card">
                <h2>User Profile</h2>
                <input type="text" id="user-name" class="form-input" placeholder="Your Name" oninput="autoSave()">
                <textarea id="user-bio" class="form-input" placeholder="Culinary Bio" rows="4" oninput="autoSave()"></textarea>
                <div style="font-size: 12px; color: var(--primary); font-weight: 800;" id="save-status">RECOVERY SYNC ACTIVE</div>
            </div>
        </div>

        <div id="settings" class="tab-content">
            <h1 style="font-family: var(--font-display); margin-bottom: 32px;">System Settings</h1>
            <div class="card">
                <h2>Permissions & Experience</h2>
                <div class="permission-row">
                    <span>Dark Mode Experience</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="dark-toggle" onchange="toggleDarkMode()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="permission-row">
                    <span>Camera Access (for AI Scanner)</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="camera-toggle" onchange="requestCamera()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="permission-row">
                    <span>Neighbourhood Location</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="loc-toggle" onchange="requestLoc()">
                        <span class="slider"></span>
                    </label>
                </div>
                
                <h2 style="margin-top: 32px;">Support</h2>
                <button class="btn-p" onclick="window.location.href='https://priscadezigns.org/agency/'">Contact Heritage Support</button>
                <button class="btn-p" style="margin-top: 12px; background: #333;" onclick="localStorage.clear(); location.reload();">Log Out</button>
            </div>
        </div>
    </div>
</div>

<script>
    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.side-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('calalloo_dark_mode', document.body.classList.contains('dark-mode'));
    }

    function requestCamera() {
        if(document.getElementById('camera-toggle').checked) {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(() => alert('Camera access enabled for AI Scanner!'))
                .catch(() => { alert('Camera access denied.'); document.getElementById('camera-toggle').checked = false; });
        }
    }

    function requestLoc() {
        if(document.getElementById('loc-toggle').checked) {
            navigator.geolocation.getCurrentPosition(() => alert('Location discovery active.'));
        }
    }

    function autoSave() {
        localStorage.setItem('calalloo_name', document.getElementById('user-name').value);
        localStorage.setItem('calalloo_bio', document.getElementById('user-bio').value);
        document.getElementById('save-status').innerText = "SYNCED TO CLOUD";
    }

    window.onload = function() {
        // Restore Preferences
        if(localStorage.getItem('calalloo_dark_mode') === 'true') {
            document.body.classList.add('dark-mode');
            document.getElementById('dark-toggle').checked = true;
        }
        
        // Restore Profile
        document.getElementById('user-name').value = localStorage.getItem('calalloo_name') || '';
        document.getElementById('user-bio').value = localStorage.getItem('calalloo_bio') || '';
    }
</script>
</body>
</html>
