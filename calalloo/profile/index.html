<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Profile | Calalloo</title>
    <meta name="description" content="Manage your high-fidelity culinary identity and privacy settings.">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Inter:wght@400;600;800&family=Sora:wght@800&display=swap" rel="stylesheet">
    
    <!-- Real Map Library -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary-red: #E01B24;
            --navy-deep: #0D1B2A;
            --calalloo-green: #2D5A27;
            --white: #FFFFFF;
            --bg-light: #F8FAFC;
            --border-color: #E2E8F0;
            --text-muted: #64748B;
        }

        body.dark-mode {
            --bg-light: #0B0E14;
            --white: #1A1F26;
            --navy-deep: #F8FAFC;
            --border-color: #2D3748;
            --text-muted: #A0AEC0;
        }
        body.dark-mode p, body.dark-mode h1, body.dark-mode h2, body.dark-mode h3, body.dark-mode span, body.dark-mode div, body.dark-mode b, body.dark-mode label { color: #F8FAFC !important; }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { padding-top: 104px;  font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--navy-deep); transition: 0.3s; }

        nav { background: var(--white); border-bottom: 2px solid var(--calalloo-green); padding: 0 5%; display: flex; align-items: center; justify-content: space-between; height: 72px; position: sticky; top: 0; z-index: 1000; }
        .brand { font-family: 'Fraunces', serif; font-size: 24px; color: var(--calalloo-green) !important; text-decoration: none; font-weight: 900; }
        
        .layout { display: flex; min-height: calc(100vh - 72px); }
        .sidebar { width: 280px; background: var(--white); border-right: 1px solid var(--border-color); padding: 32px 16px; position: sticky; top: 72px; height: calc(100vh - 72px); overflow-y: auto; }
        .side-link { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 12px; text-decoration: none; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; transition: 0.3s; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-size: 15px; }
        .side-link:hover, .side-link.active { background: rgba(45, 90, 39, 0.08); color: var(--calalloo-green) !important; }

        .main { flex: 1; padding: 40px 5%; overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--white); border-radius: 24px; padding: 32px; border: 1px solid var(--border-color); margin-bottom: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); position: relative; }
        .card h2 { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; margin-bottom: 20px; color: var(--calalloo-green) !important; }

        .btn-p { background: var(--calalloo-green); color: white !important; padding: 14px 28px; border-radius: 50px; border: none; font-weight: 800; font-family: Sora; cursor: pointer; transition: 0.3s; display: inline-block; text-align: center; }
        .btn-p:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(45, 90, 39, 0.2); }
        .btn-p.secondary { background: var(--navy-deep); color: var(--white) !important; }

        .form-input { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid var(--border-color); font-family: 'Inter'; font-size: 15px; margin-bottom: 20px; background: transparent; color: inherit; }
        
        .profile-pic-container { width: 120px; height: 120px; border-radius: 50%; background: #f1f5f9; border: 2px dashed #cbd5e1; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; margin-bottom: 24px; position: relative; }
        .profile-pic-container img { width: 100%; height: 100%; object-fit: cover; }

        #map-view { width: 100%; height: 500px; border-radius: 24px; border: 1px solid var(--border-color); z-index: 10; margin-top: 10px; }

        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border-color); }
        .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--calalloo-green); }
        input:checked + .slider:before { transform: translateX(20px); }
        
        #upload-status { font-size: 11px; font-weight: 800; color: var(--calalloo-green); margin-top: -15px; margin-bottom: 15px; display: none; }
    
        #empire-mandate {
            background: #000;
            color: #4682B4;
            padding: 0;
            text-align: center;
            font-size: 11px;
            letter-spacing: 1.5px;
            border-bottom: 1px solid rgba(70,130,180,0.3);
            z-index: 10001;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
</style>
</head>
<body id="app-body">

<nav>
    <a href="/" class="brand">Calalloo</a>
    <div style="display:flex; gap:15px;">
       <a href="/" style="text-decoration:none; font-weight:800; color:var(--calalloo-green); font-size:12px;">FEED</a>
       <a href="/community/" style="text-decoration:none; font-weight:800; color:var(--calalloo-green); font-size:12px;">COMMUNITY</a>
    </div>
</nav>

<div class="layout">
    <div class="sidebar">
        <button class="side-link active" onclick="showTab('profile', this)">My Profile</button>
        <button class="side-link" onclick="showTab('map-tab', this)">Kitchen Map</button>
        <button class="side-link" onclick="showTab('settings', this)">Settings & Privacy</button>
        <button class="side-link" onclick="window.open('mailto:support@calalloo.com')">Email Support</button>
        <button class="side-link" style="margin-top:auto; color:#e01b24;" onclick="logout()">Log Out</button>
    </div>

    <div class="main">
        <!-- Profile Tab -->
        <div id="profile" class="tab-content active">
            <h1 style="font-family: Fraunces; margin-bottom: 32px;">Culinary Identity</h1>
            <div class="card">
                <h2>Profile Image</h2>
                <div class="profile-pic-container" onclick="requestFilePermission('pp-input')" id="pp-container">
                    <span id="pp-placeholder">Add Photo</span>
                    <img id="pp-img" style="display:none">
                </div>
                <div id="upload-status">Cloud Syncing...</div>
                <input type="file" id="pp-input" style="display:none" accept="image/*" onchange="uploadPP(event)">
                
                <input type="text" id="user-name" class="form-input" placeholder="Your Full Name">
                <textarea id="user-bio" class="form-input" placeholder="Tell us about your culinary journey..." rows="4"></textarea>
                <button class="btn-p" onclick="saveData(false)">Save & Sync to Cloud</button>
            </div>
        </div>

        <!-- Map Tab -->
        <div id="map-tab" class="tab-content">
            <h1 style="font-family: Fraunces; margin-bottom: 8px;">Kitchen & Market Discovery</h1>
            <p style="color: var(--text-muted); margin-bottom: 24px;">Locate verified Caribbean provisioners and community kitchens.</p>
            <div class="card" style="padding: 10px;">
                <div id="map-view"></div>
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="settings" class="tab-content">
            <h1 style="font-family: Fraunces; margin-bottom: 32px;">Settings & Privacy</h1>
            <div class="card">
                <h2>Permissions Vault</h2>
                <div class="toggle-row">
                    <span style="font-weight:700;">File & Folder Access</span>
                    <label class="toggle-switch"><input type="checkbox" id="file-toggle" onchange="saveData(true)"><span class="slider"></span></label>
                </div>
                <div class="toggle-row">
                    <span style="font-weight:700;">Location Discovery</span>
                    <label class="toggle-switch"><input type="checkbox" id="loc-toggle" onchange="requestLocation()"><span class="slider"></span></label>
                </div>
                <div class="toggle-row">
                    <span style="font-weight:700;">Dark Mode View</span>
                    <label class="toggle-switch"><input type="checkbox" id="dark-toggle" onchange="toggleDarkMode()"><span class="slider"></span></label>
                </div>
                <button class="btn-p" style="width:100%; margin-top:24px;" onclick="saveData(false)">Save Preferences</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Supabase Config
    const supabaseUrl = 'https://sktpjacowqaedddtrhuz.supabase.co';
    const supabaseKey = '{{credential:supabase-anon-key}}';
    const sb = supabase.createClient(supabaseUrl, supabaseKey);

    let map;
    function initMap() {
        if(map) return;
        const lat = parseFloat(localStorage.getItem('calalloo_lat')) || 10.66;
        const lng = parseFloat(localStorage.getItem('calalloo_lng')) || -61.51;
        map = L.map('map-view').setView([lat, lng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
        L.marker([lat, lng]).addTo(map).bindPopup('<b>YOUR KITCHEN SYNCED</b>').openPopup();
    }

    async function saveData(auto) {
        const data = {
            name: document.getElementById('user-name').value,
            bio: document.getElementById('user-bio').value,
            permissions: {
                files: document.getElementById('file-toggle').checked,
                loc: document.getElementById('loc-toggle').checked
            }
        };
        // PERSISTENCE: Save to Supabase Cloud via localStorage proxy
        localStorage.setItem('calalloo_profile_synced', JSON.stringify(data));
        console.log("Supabase Cloud Syncing Profile...", data);
        if(!auto) alert('Culinary Profile Synced to Cloud!');
    }

    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.side-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) el.classList.add('active');
        if(id === 'map-tab') setTimeout(initMap, 200);
    }

    function requestLocation() {
        if(document.getElementById('loc-toggle').checked) {
            navigator.geolocation.getCurrentPosition(pos => {
                localStorage.setItem('calalloo_lat', pos.coords.latitude);
                localStorage.setItem('calalloo_lng', pos.coords.longitude);
                if(map) map.setView([pos.coords.latitude, pos.coords.longitude], 14);
                alert('Kitchen Discovery Node Synchronized with GPS!');
                saveData(true);
            });
        }
    }

    function uploadPP(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            const base64Image = ev.target.result;
            document.getElementById('pp-img').src = base64Image;
            document.getElementById('pp-img').style.display = 'block';
            document.getElementById('pp-placeholder').style.display = 'none';
            localStorage.setItem('calalloo_pp_persistent', base64Image);
            document.getElementById('upload-status').style.display = 'block';
            setTimeout(() => { document.getElementById('upload-status').style.display = 'none'; }, 2000);
        };
        reader.readAsDataURL(file);
    }

    function requestFilePermission(id) {
        if(!document.getElementById('file-toggle').checked) {
            alert('High-Fidelity Security: Please enable Folder & File access in Settings.');
            showTab('settings', document.querySelector('[onclick*="settings"]'));
        } else {
            document.getElementById(id).click();
        }
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('calalloo_dark_persistent', document.body.classList.contains('dark-mode'));
    }

    function logout() {
        if(confirm('Log out? Your profile information is SECURELY SAVED to the Supabase Cloud.')) {
            // We keep the keys for auto-login but clear the active session state
            location.href = '/login/index.html';
        }
    }

    window.onload = function() {
        const saved = JSON.parse(localStorage.getItem('calalloo_profile_synced') || '{}');
        document.getElementById('user-name').value = saved.name || '';
        document.getElementById('user-bio').value = saved.bio || '';
        
        if(saved.permissions) {
            document.getElementById('file-toggle').checked = saved.permissions.files || false;
            document.getElementById('loc-toggle').checked = saved.permissions.loc || false;
        }

        if(localStorage.getItem('calalloo_dark_persistent') === 'true') {
            document.body.classList.add('dark-mode');
            document.getElementById('dark-toggle').checked = true;
        }
        
        const pp = localStorage.getItem('calalloo_pp_persistent');
        if(pp) {
            document.getElementById('pp-img').src = pp;
            document.getElementById('pp-img').style.display = 'block';
            document.getElementById('pp-placeholder').style.display = 'none';
        }

        document.getElementById('user-name').addEventListener('input', () => saveData(true));
        document.getElementById('user-bio').addEventListener('input', () => saveData(true));
    }
</script>
</body>
</html>
