    <style>
        :root {
            --bg: #0F0A1F; --surface: #1B1336; --text: #F5F3FF; --muted: #A78BFA; 
            --accent: #8B5CF6; --primary: #4C1D95; --border: rgba(139, 92, 246, 0.2);

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
        
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }

        header { padding: 40px 6%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--font-header); font-size: 2.2rem; font-weight: 900; color: var(--accent); letter-spacing: -1px; }

        .hero { padding: 80px 6%; text-align: center; max-width: 900px; margin: 0 auto; }
        .hero h1 { font-family: var(--font-header); font-size: 4.5rem; line-height: 1; margin-bottom: 25px; }
        .hero p { font-size: 1.3rem; color: var(--muted); margin-bottom: 40px; }

        .vault-card { background: var(--surface); border: 1px solid var(--border); padding: 50px; border-radius: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .vault-card::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%); }
    </style>
</head>
<body>
    <canvas id="vyneCanvas"></canvas>

                <button style="background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 15px 30px; border-radius: 12px; font-weight: 800; cursor: pointer;">View Shards</button>
            </div>
        </div>
    </section>

    <script>
        lucide.createIcons();
        const canvas = document.getElementById('vyneCanvas');
        const ctx = canvas.getContext('2d');
        let lines = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        class Line {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.v = Math.random() * 2 + 0.5; this.l = Math.random() * 100 + 50; }
            draw() { ctx.strokeStyle = '#8B5CF6'; ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x, this.y + this.l); ctx.stroke(); }
            update() { this.y += this.v; if (this.y > canvas.height) this.reset(); }
        }
        for (let i = 0; i < 50; i++) lines.push(new Line());
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); lines.forEach(l => { l.update(); l.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
