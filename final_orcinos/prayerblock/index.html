        header { padding: 40px 6%; text-align: center; border-bottom: 1px solid var(--border); }

            </div>

    </section>
    <script>
        lucide.createIcons();
        const canvas = document.getElementById('prayerCanvas');
        const ctx = canvas.getContext('2d');
        let circles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        class Circle {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.r = Math.random() * 50 + 20; this.o = Math.random() * 0.5 + 0.1; this.s = Math.random() * 0.2; }
            draw() { ctx.fillStyle = `rgba(59,130,246,${this.o})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill(); }
            update() { this.y += this.s; if (this.y > canvas.height) this.reset(); }
        }
        for (let i = 0; i < 30; i++) circles.push(new Circle());
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); circles.forEach(c => { c.update(); c.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
