    <style>
        :root {
            --bg: #0A0A0A; --surface: #171717; --text: #FAFAF9; --muted: #D6D3D1; 
            --accent: #EAB308; --primary: #854D0E; --border: rgba(234, 179, 8, 0.1);
            --font-header: 'Playfair Display', serif; --font-body: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
        
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; }

        header { padding: 40px 6%; display: flex; justify-content: center; align-items: center; }
        .logo { font-family: var(--font-header); font-size: 2.5rem; font-weight: 900; color: var(--accent); letter-spacing: 5px; }

        .hero { padding: 100px 6%; text-align: center; max-width: 1000px; margin: 0 auto; position: relative; }
        .hero h1 { font-family: var(--font-header); font-size: 5rem; line-height: 1; margin-bottom: 30px; letter-spacing: -2px; }
        
        .luxury-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 0 6% 60px; }
        .luxury-card { height: 350px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: flex-end; padding: 30px; background-size: cover; background-position: center; transition: 0.4s; }
        .luxury-card:hover { transform: scale(1.02); border-color: var(--accent); }
    </style>
</head>
<body>
    <canvas id="syleCanvas"></canvas>
    <header><div class="logo">SYLE</div></header>
    <section class="hero">
        <h1>Curated AI Lifestyle.</h1>
        <p style="font-size: 1.2rem; color: var(--muted); text-transform: uppercase; letter-spacing: 4px;">Sovereign Elegance // Neural Selection</p>
    </section>
    <div class="luxury-grid">
        <div class="luxury-card" style="background-image: url('https://images.unsplash.com/photo-1542060748-10c28b62716f?q=80&w=2070&auto=format&fit=crop')"><h3>Couture Intelligence</h3></div>
        <div class="luxury-card" style="background-image: url('https://images.unsplash.com/photo-1505691723518-36a5ac3be353?q=80&w=2070&auto=format&fit=crop')"><h3>Sanctuary Design</h3></div>
        <div class="luxury-card" style="background-image: url('https://images.unsplash.com/photo-1512621776951-a57141f2eefd?q=80&w=2070&auto=format&fit=crop')"><h3>Wellness Shards</h3></div>
    </div>
    <script>
        lucide.createIcons();
        const canvas = document.getElementById('syleCanvas');
        const ctx = canvas.getContext('2d');
        let points = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        class Point {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.r = Math.random() * 2; this.s = Math.random() * 0.5 + 0.2; }
            draw() { ctx.fillStyle = '#EAB308'; ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill(); }
            update() { this.y -= this.s; if (this.y < 0) this.reset(); }
        }
        for (let i = 0; i < 100; i++) points.push(new Point());
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); points.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
