        :root {
            --bg: #03001C; --surface: #0B0133; --text: #D6D5E6; --muted: #7371FC;

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
        
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }

        header { padding: 40px 6%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--font-header); font-size: 2rem; font-weight: 900; color: var(--accent); }

        .hero { padding: 120px 6%; text-align: center; max-width: 900px; margin: 0 auto; }
        .hero h1 { font-family: var(--font-header); font-size: 4.5rem; line-height: 1; margin-bottom: 25px; text-shadow: 0 0 30px rgba(177,133,219,0.5); }
        
        .sleep-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 60px; }
        .metric-circle { border: 2px solid var(--border); width: 150px; height: 150px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto; transition: 0.3s; }
        .metric-circle:hover { border-color: var(--accent); background: rgba(177,133,219,0.05); }
    </style>
</head>
<body>
    <canvas id="slumberCanvas"></canvas>

        <div class="sleep-metrics">
            <div class="metric-circle"><div style="font-size: 1.5rem; font-weight: 900;">8.2h</div><div style="font-size: 0.6rem; text-transform: uppercase;">Avg Sleep</div></div>
            <div class="metric-circle"><div style="font-size: 1.5rem; font-weight: 900;">94%</div><div style="font-size: 0.6rem; text-transform: uppercase;">Efficiency</div></div>
            <div class="metric-circle"><div style="font-size: 1.5rem; font-weight: 900;">22%</div><div style="font-size: 0.6rem; text-transform: uppercase;">Deep REM</div></div>
        </div>
    </section>
    <script>
        lucide.createIcons();
        const canvas = document.getElementById('slumberCanvas');
        const ctx = canvas.getContext('2d');
        let pulses = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        class Pulse {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.r = 0; this.maxR = Math.random() * 100 + 50; this.o = 1; }
            draw() { ctx.strokeStyle = `rgba(177,133,219,${this.o * 0.3})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.stroke(); }
            update() { this.r += 0.5; this.o -= 0.005; if (this.o <= 0) this.reset(); }
        }
        for (let i = 0; i < 20; i++) pulses.push(new Pulse());
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); pulses.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
