<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Start Growing — Govern</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#010D06;color:#E8F5EC;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:60px 24px 80px}
a{text-decoration:none;color:inherit}
:root{--green:#22C55E;--green2:#16A34A;--dim:#2D5A3D;--muted:#4A7A5A;--border:rgba(34,197,94,0.12);--surface:#020F07}

.top{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:540px;margin-bottom:48px}
.nav-logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:#E8F5EC}
.nav-logo span{color:var(--green)}
.back{font-size:0.8rem;color:var(--muted);transition:color 0.2s}
.back:hover{color:#E8F5EC}

.card{width:100%;max-width:540px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:44px 40px}
.badge{display:inline-flex;align-items:center;gap:7px;background:rgba(34,197,94,0.08);border:1px solid var(--border);border-radius:980px;padding:5px 14px;font-size:0.65rem;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px}
.badge-dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.card h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-1px;margin-bottom:8px;line-height:1.1}
.card h1 span{color:var(--green)}
.card p.sub{color:var(--muted);font-size:0.88rem;margin-bottom:36px;line-height:1.65}

.field{margin-bottom:20px}
label{display:block;font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px}
input,textarea,select{width:100%;background:rgba(34,197,94,0.03);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:#E8F5EC;font-family:'Inter',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--green)}
textarea{resize:vertical;min-height:90px;line-height:1.6}
select option{background:#020F07}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.platforms{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.plat{background:rgba(34,197,94,0.05);border:1px solid var(--border);border-radius:980px;padding:6px 14px;font-size:0.78rem;color:var(--muted);cursor:pointer;transition:all 0.2s;user-select:none}
.plat.active,.plat:hover{background:rgba(34,197,94,0.12);border-color:var(--green);color:#E8F5EC}

.divider{height:1px;background:var(--border);margin:28px 0}
.submit{width:100%;background:var(--green);color:#010D06;border:none;padding:16px;border-radius:980px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all 0.2s;margin-top:8px}
.submit:hover{background:var(--green2);transform:translateY(-1px)}
.note{font-size:0.75rem;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6}
</style>
</head>
<body>

<div class="top">
  <a class="nav-logo" href="/govern/"><span>G</span>overn</a>
  <a class="back" href="/govern/">← Back</a>
</div>

<div class="card">
  <div class="badge"><span class="badge-dot"></span>Social Media Brief</div>
  <h1>Let's start<br/><span>growing.</span></h1>
  <p class="sub">Tell us about your brand and we'll set up your social media engine — posting daily, growing consistently.</p>

  <div class="row">
    <div class="field"><label>Your Name *</label><input type="text" placeholder="Full name"/></div>
    <div class="field"><label>WhatsApp *</label><input type="tel" placeholder="+1 868 000 0000"/></div>
  </div>
  <div class="field"><label>Email *</label><input type="email" placeholder="you@example.com"/></div>
  <div class="field"><label>Brand / Business Name *</label><input type="text" placeholder="What's your brand called?"/></div>
  <div class="field">
    <label>Which platforms? (tap to select)</label>
    <div class="platforms">
      <span class="plat">Facebook</span>
      <span class="plat">Instagram</span>
      <span class="plat">TikTok</span>
      <span class="plat">LinkedIn</span>
      <span class="plat">Twitter / X</span>
      <span class="plat">Pinterest</span>
      <span class="plat">YouTube</span>
    </div>
  </div>
  <div class="field">
    <label>Package *</label>
    <select>
      <option value="">Select a plan...</option>
      <option>Basic — $299/mo (1 page, 20 posts)</option>
      <option>Growth — $599/mo (3 pages, 90 posts)</option>
      <option>Full Empire — $999/mo (unlimited pages)</option>
      <option>Not sure — help me choose</option>
    </select>
  </div>
  <div class="field"><label>Describe your brand *</label><textarea placeholder="What do you sell or offer? Who's your audience? What's your vibe — fun, professional, luxury, local?"></textarea></div>
  <div class="field"><label>How did you find us?</label><select><option value="">Select...</option><option>Facebook</option><option>Instagram</option><option>Google</option><option>Referral</option><option>Other</option></select></div>

  <div class="divider"></div>
  <button class="submit">Start Growing →</button>
  <p class="note">First posts go out within 48 hours of onboarding. No lock-in.</p>
</div>

<script>
document.querySelectorAll('.plat').forEach(p=>p.addEventListener('click',()=>p.classList.toggle('active')));
</script>
</body>
</html>
