<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Priscion Caption AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-area">
        <h1>Priscion <span class="accent">AI</span></h1>
        <p class="tagline">High-Fidelity Captions. Sovereign Speed.</p>
      </div>
      <a href="options.html" class="settings-btn" target="_blank">⚙️</a>
    </header>

    <main>
      <div class="input-group">
        <label for="tone-select">Select Tone</label>
        <select id="tone-select">
          <option value="Professional">Professional</option>
          <option value="Hype">Hype</option>
          <option value="Inspirational">Inspirational</option>
          <option value="Luxury">Luxury</option>
          <option value="Spiritual">Spiritual (TWMK)</option>
        </select>
      </div>

      <button id="generate-btn" class="primary-btn">Generate Captions</button>

      <div id="loading" class="hidden">Generating high-fidelity captions...</div>

      <div class="results-area">
        <div class="tabs">
          <button class="tab-link active" data-platform="Instagram">IG</button>
          <button class="tab-link" data-platform="Threads">Threads</button>
          <button class="tab-link" data-platform="Facebook">FB</button>
          <button class="tab-link" data-platform="Twitter">X</button>
        </div>

        <div class="caption-container">
          <textarea id="caption-output" readonly></textarea>
          <div class="meta">
            <span id="char-count">0 / 2200</span>
            <button id="copy-btn">Copy Caption</button>
          </div>
        </div>
      </div>

      <div class="pro-badge">
        <p>Free Tier: <span id="daily-count">0</span>/5 today</p>
        <a href="https://priscadezigns.org/caption-ai/pro" target="_blank" class="upgrade-link">Upgrade to PRO for Unlimited Captions</a>
      </div>

      <div class="history-section">
        <h3>Recent History</h3>
        <ul id="history-list"></ul>
      </div>
    </main>

    <footer>
      <p>&copy; 2026 <a href="https://priscadezigns.org" target="_blank">Priscion Empire</a></p>
    </footer>
  </div>
  <script src="templates.js"></script>
  <script src="popup.js"></script>
</body>
</html>
