<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Priscion Caption AI - Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: #000000;
      --surface: #0A0A0A;
      --accent: #9B59FF;
      --text: #FFFFFF;
      --text-dim: #A0A0A0;
      --border: #222222;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--background);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }
    .container {
      width: 100%;
      max-width: 500px;
      padding: 30px;
      background-color: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }
    .accent { color: var(--accent); }
    .input-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--text-dim);
    }
    input {
      width: 100%;
      padding: 12px;
      background-color: #111;
      border: 1px solid var(--border);
      color: white;
      border-radius: 5px;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
    }
    .save-btn {
      width: 100%;
      padding: 15px;
      background-color: var(--accent);
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: 700;
      cursor: pointer;
    }
    .status {
      margin-top: 15px;
      text-align: center;
      font-size: 0.8rem;
      color: #00FF00;
    }
    .info {
      margin-top: 30px;
      font-size: 0.8rem;
      color: var(--text-dim);
      background: #111;
      padding: 15px;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Settings - Priscion <span class="accent">AI</span></h1>
    
    <div class="input-group">
      <label for="api-key">OpenAI API Key</label>
      <input type="password" id="api-key" placeholder="sk-...">
    </div>

    <div class="input-group">
      <label for="shop-url">Your Shop URL (appended to captions)</label>
      <input type="text" id="shop-url" placeholder="https://priscadezigns.org/shop">
    </div>

    <div class="input-group">
      <label for="brand-name">Brand Name</label>
      <input type="text" id="brand-name" value="Priscion Empire">
    </div>

    <button id="save-btn" class="save-btn">Save Settings</button>
    <div id="status" class="status"></div>

    <div class="info">
      <p><strong>Note:</strong> Your API Key is stored locally in your browser and is only used to generate captions. If you don't have a key, the extension will use built-in high-fidelity templates.</p>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
