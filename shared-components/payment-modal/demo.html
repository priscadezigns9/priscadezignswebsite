<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Payment Modal Demo - Prisca Dezigns Empire</title>
    <link rel="stylesheet" href="payment-modal.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 { margin-bottom: 40px; color: #1a1a1a; }
        .demo-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            text-align: center;
            width: 280px;
        }
        .card h3 { margin-top: 0; }
        .card p { color: #666; margin-bottom: 24px; }
        .btn-buy {
            background: #1a1a1a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-buy:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <h1>Empire Payment Modal Demo</h1>

    <div class="demo-container">
        <!-- Les Amour -->
        <div class="card">
            <h3>Les Amour</h3>
            <p>Covenant Club Membership</p>
            <div class="price" style="font-size: 24px; font-weight: 700; margin-bottom: 20px;">$14.99/mo</div>
            <button class="btn-buy" onclick="openLesAmour()">Join Club</button>
        </div>

        <!-- Hartaly -->
        <div class="card">
            <h3>Hartaly</h3>
            <p>Premium Mental Wellness</p>
            <div class="price" style="font-size: 24px; font-weight: 700; margin-bottom: 20px;">$29.00/yr</div>
            <button class="btn-buy" onclick="openHartaly()">Upgrade Now</button>
        </div>

        <!-- Dricil -->
        <div class="card">
            <h3>Dricil</h3>
            <p>AI Content Agency (Growth)</p>
            <div class="price" style="font-size: 24px; font-weight: 700; margin-bottom: 20px;">$597.00/mo</div>
            <button class="btn-buy" onclick="openDricil()">Start Trial</button>
        </div>
    </div>

    <script src="payment-modal.js"></script>
    <script>
        const CRYPTO_ADDR = "0xcef857e82c306b3d0f2db080e7794f4bb376049e";
        const PAYONEER_BASE = "https://www.payoneer.com/accounts/"; // Placeholder

        function openLesAmour() {
            openPaymentModal({
                productName: "Les Amour Covenant Club",
                price: "$14.99/month",
                paypalClientId: "sb", // Use 'sb' for sandbox testing
                payoneerLink: PAYONEER_BASE,
                cryptoAddress: CRYPTO_ADDR
            });
        }

        function openHartaly() {
            openPaymentModal({
                productName: "Hartaly Premium Yearly",
                price: "$29.00/year",
                paypalClientId: "sb",
                payoneerLink: PAYONEER_BASE,
                cryptoAddress: CRYPTO_ADDR
            });
        }

        function openDricil() {
            openPaymentModal({
                productName: "Dricil Growth Plan",
                price: "$597.00/month",
                paypalClientId: "sb",
                payoneerLink: PAYONEER_BASE,
                cryptoAddress: CRYPTO_ADDR
            });
        }
    </script>
</body>
</html>
