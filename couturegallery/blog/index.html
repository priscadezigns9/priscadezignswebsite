        .img-holder { background: #eee; aspect-ratio: 45; }

        .date { font-size: 0.8_rem; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-bottom: 10px; }
        h2 { margin: 0 0 10px; font-size: 1.8rem; }
        p { margin: 0; font-family: 'Inter', sans-serif; line-height: 1.6; color: #444; }
    </style>
</head>
