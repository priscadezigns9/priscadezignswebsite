<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Boutique | Couture Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #C9A84C; --bg: #050505; --text: #FFFFFF; --border: rgba(128,128,128,0.15); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        nav { height: 90px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 6%; background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--primary); text-decoration: none; font-weight: 700; letter-spacing: 1px; }
        .shop-header { padding: 120px 6% 60px; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 4rem; margin: 0; letter-spacing: -1px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; padding: 60px 6%; }
        .card { background: rgba(128,128,128,0.05); border: 1px solid var(--border); padding: 30px; text-decoration: none; color: inherit; transition: 0.4s; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--primary); transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .img-box { aspect-ratio: 1/1; background: #fff; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; padding: 15px; border-radius: 2px; }
        .img-box img { mix-blend-mode: multiply; max-width: 85%; max-height: 85%; object-fit: contain; }
        .name { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin: 0 0 20px; flex-grow: 1; }
        .btn { background: var(--primary); color: #000; text-align: center; padding: 15px; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }
        footer { padding: 80px 6%; border-top: 1px solid var(--border); text-align: center; font-size: 0.75rem; opacity: 0.4; }
    </style>
</head>
<body>
    <nav><a href="../" class="logo">Couture Gallery</a></nav>
    <div class="shop-header"><h1>The Boutique</h1></div>
    <main class="grid">
        <a href="https://www.amazon.com/s?k=Fendi+Black+Leather+Baguette&tag=priscastyleme-20" class="card" target="_blank">
            <div class="img-box"><img src="https://m.media-amazon.com/images/I/71V2p9h-vML._AC_SL1000_.jpg" alt="Fendi Black Leather Baguette"></div>
            <div style="font-size:0.65rem; color:var(--primary); font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-bottom:12px;">Shoulder Bags</div>
            <h3 class="name">Fendi Black Leather Baguette</h3>
            <div class="btn">Acquire Essential</div>
        </a>
        <a href="https://www.amazon.com/s?k=Saint+Laurent+Loulou+Medium&tag=priscastyleme-20" class="card" target="_blank">
            <div class="img-box"><img src="https://m.media-amazon.com/images/I/61N+V8H8HUL._AC_SL1000_.jpg" alt="Saint Laurent Loulou Medium"></div>
            <div style="font-size:0.65rem; color:var(--primary); font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-bottom:12px;">Shoulder Bags</div>
            <h3 class="name">Saint Laurent Loulou Medium</h3>
            <div class="btn">Acquire Essential</div>
        </a>
        <a href="https://www.amazon.com/s?k=LV+Neverfull+MM+Monogram&tag=priscastyleme-20" class="card" target="_blank">
            <div class="img-box"><img src="https://m.media-amazon.com/images/I/81X7-vL-vML._AC_SL1000_.jpg" alt="LV Neverfull MM Monogram"></div>
            <div style="font-size:0.65rem; color:var(--primary); font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-bottom:12px;">Totes</div>
            <h3 class="name">LV Neverfull MM Monogram</h3>
            <div class="btn">Acquire Essential</div>
        </a>
        <a href="https://www.amazon.com/s?k=Saint+Laurent+Rive+Gauche&tag=priscastyleme-20" class="card" target="_blank">
            <div class="img-box"><img src="https://m.media-amazon.com/images/I/71Y-t7W-5DL._AC_SL1000_.jpg" alt="Saint Laurent Rive Gauche"></div>
            <div style="font-size:0.65rem; color:var(--primary); font-weight:700; text-transform:uppercase; letter-spacing:2px; margin-bottom:12px;">Totes</div>
            <h3 class="name">Saint Laurent Rive Gauche</h3>
            <div class="btn">Acquire Essential</div>
        </a>
    </main>
    <footer>&copy; 2026 COUTURE GALLERY // PRISCA DEZIGNS</footer>
</body>
</html>
