<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Archival Valuation | Couture Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #000; --bg: #fff; --text: #1A1A1A; --border: #eee; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }

        header { position: fixed; top: 0; width: 100%; padding: 25px 8%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; text-decoration: none; color: #000; font-style: italic; }
        
        .hero { min-height: 100vh; padding: 180px 8% 100px; max-width: 1100px; margin: 0 auto; text-align: center; }
        .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 5px; color: #888; font-weight: 900; margin-bottom: 20px; display: block; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 7vw, 5rem); font-style: italic; line-height: 1; margin-bottom: 60px; }

        .valuation-box { background: #fafafa; border: 1px solid var(--border); padding: 60px; border-radius: 2px; }
        .input-group { display: flex; gap: 20px; margin-top: 20px; }
        input { flex: 1; padding: 20px; border: 1px solid var(--border); font-family: inherit; font-size: 1.1rem; }
        .run-btn { padding: 0 40px; background: #000; color: #fff; border: none; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }

        #ai-result { margin-top: 60px; }
        .valuation-report { text-align: left; animation: fadeIn 1s ease; border-top: 2px solid #000; padding-top: 50px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; margin: 40px 0; }
        .metric-box { padding: 30px; border: 1px solid var(--border); background: #fff; }
        .m-label { font-size: 0.6rem; text-transform: uppercase; color: #888; margin-bottom: 10px; }
        .m-val { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 700; color: #000; }

        .acq-btn { display: inline-block; width: 100%; text-align: center; background: #000; color: #fff; text-decoration: none; padding: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; margin-top: 40px; }

        footer { padding: 100px 8% 50px; text-align: center; border-top: 1px solid var(--border); opacity: 0.3; }
    </style>
</head>
<body>
    <header>
        <a href="../" class="logo">Couture Gallery</a>
        <nav><a href="../shop/" style="color:#000; text-decoration:none; font-weight:700; font-size:0.7rem; text-transform:uppercase; letter-spacing:1px;">The Archive</a></nav>
    </header>

    <main class="hero">
        <span class="label">Archival Valuation Core V1.0</span>
        <h1>Asset Appraisal.</h1>

        <div class="valuation-box">
            <p style="color:#888; margin-bottom:40px; text-transform:uppercase; letter-spacing:3px; font-size:0.8rem;">Enter Silhouette and Condition for Market Analysis</p>
            <div class="input-group">
                <input type="text" id="ai-input" placeholder="e.g. Hermès Birkin 35, Togo Leather, 2018..." autocomplete="off">
                <button class="run-btn" onclick="runAppraisal()">Appraise</button>
            </div>
            <div id="ai-result"></div>
        </div>
    </main>

    <footer>© 2026 COUTURE GALLERY // ARCHIVAL LUXURY INTELLIGENCE</footer>

    <script>
    function runAppraisal() {
        const input = document.getElementById('ai-input').value.trim();
        const res = document.getElementById('ai-result');
        if(!input) return;

        res.innerHTML = '<p style="text-align:center; font-weight:700; letter-spacing:4px; margin-top:40px;">ASSESSING MARKET TRAJECTORY...</p>';

        setTimeout(() => {
            const query = input.toLowerCase(); const tag = "priscadezigns-20";
            let delta = "+12.4%"; let retention = "High"; let status = "Appreciating";
            
            if(query.includes('birkin') || query.includes('kelly')) { delta = "+24.8%"; retention = "Elite"; }
            if(query.includes('chanel')) { delta = "+18.2%"; retention = "High"; }

            res.innerHTML = `
                <div class="valuation-report">
                    <span class="label" style="font-size:0.6rem;">Appraisal Complete // Reference: ${input.toUpperCase()}</span>
                    <h2 style="font-family:'Cormorant Garamond'; font-size:2.5rem; font-style:italic; margin:10px 0 40px;">Market Verdict</h2>
                    
                    <div class="metric-grid">
                        <div class="metric-box"><div class="m-label">Value Trajectory</div><div class="m-val">${delta}</div></div>
                        <div class="metric-box"><div class="m-label">Retention Core</div><div class="m-val">${retention}</div></div>
                        <div class="metric-box"><div class="m-label">Asset Status</div><div class="m-val">${status}</div></div>
                    </div>

                    <p style="color:#666; font-size:0.9rem;">Intelligence confirms this silhouette as a high-fidelity archival asset. Market liquidity for this condition remains strong within the global collector community.</p>

                    <a href="https://www.amazon.com/s?k=luxury+handbag+care+kit&tag=${tag}" target="_blank" class="acq-btn">Acquire Archival Care Components →</a>
                </div>
            `;
        }, 1800);
    }
    </script>
</body>
</html>
