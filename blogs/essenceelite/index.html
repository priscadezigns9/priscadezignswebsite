    <style>
        :root { --gold: #D4AF37; --bg: #0A0A0F; --text: #FFFFFF; --border: rgba(255,255,255,0.08); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }

        .blog-item:hover { background: rgba(255,255,255,0.05); transform: translateY(-5px); border-color: var(--gold); }
        .meta { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; color: var(--gold); margin-bottom: 15px; font-weight: 700; }
        .blog-title { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin: 0 0 15px; }
        .excerpt { font-size: 1rem; color: #888; }
        footer { padding: 80px 6%; border-top: 1px solid var(--border); text-align: center; font-size: 0.75rem; opacity: 0.4; letter-spacing: 2px; }
