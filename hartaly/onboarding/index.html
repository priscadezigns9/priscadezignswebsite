<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Hartaly | Onboarding</title>
    <style>
        :root {
            --sage: #8BA88E;
            --sand: #F5E6D3;
            --indigo: #3F51B5;
            --white: #FFFFFF;
        }
        body {
            background-color: var(--sand);
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #444;
        }
        .onboarding-card {
            background: var(--white);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h2 { color: var(--indigo); margin-bottom: 30px; }
        .step { display: none; }
        .step.active { display: block; }
        .options { text-align: left; margin: 20px 0; }
        .option { margin-bottom: 15px; font-size: 18px; }
        .btn {
            background: var(--sage);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 30px;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.9; }
        input[type="range"] { width: 100%; margin: 30px 0; }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="onboarding-card">
        <!-- Step 1 -->
        <div class="step active" id="step1">
            <h2>What brings you to Hartaly?</h2>
            <div class="options">
                <div class="option"><input type="checkbox"> Anxiety</div>
                <div class="option"><input type="checkbox"> Stress</div>
                <div class="option"><input type="checkbox"> Burnout</div>
                <div class="option"><input type="checkbox"> Grief</div>
                <div class="option"><input type="checkbox"> Loneliness</div>
            </div>
            <button class="btn" onclick="nextStep(2)">Continue</button>
        </div>

        <!-- Step 2 -->
        <div class="step" id="step2">
            <h2>How are you feeling right now?</h2>
            <input type="range" min="1" max="10" value="5">
            <div style="display: flex; justify-content: space-between; font-size: 16px; opacity: 0.7;">
                <span>Very Low</span>
                <span>Radiant</span>
            </div>
            <button class="btn" onclick="nextStep(3)">Next</button>
        </div>

        <!-- Step 3 -->
        <div class="step" id="step3">
            <h2>What's your goal?</h2>
            <div class="options">
                <div class="option"><input type="radio" name="goal"> Feel calmer</div>
                <div class="option"><input type="radio" name="goal"> Sleep better</div>
                <div class="option"><input type="radio" name="goal"> Process emotions</div>
                <div class="option"><input type="radio" name="goal"> Build resilience</div>
            </div>
            <button class="btn" onclick="nextStep(4)">Almost there</button>
        </div>

        <!-- Step 4 -->
        <div class="step" id="step4">
            <h2>Create your sanctuary</h2>
            <input type="email" placeholder="Email Address">
            <input type="password" placeholder="Choose Password">
            <button class="btn" onclick="finish()">Create Account</button>
        </div>
    </div>

    <script>
        function nextStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
        }
        function finish() {
            alert('Account created! Redirecting to your dashboard...');
            window.location.href = '../app/dashboard.html';
        }
    </script>
</body>
</html>
