<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Toolkit | Hartaly</title>
    <link rel="stylesheet" href="../shared/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="sidebar">
        <a href="../landing/index.html" class="logo">Hartaly</a>
        <nav class="sidebar-nav">
            <a href="dashboard.html">🏠 Dashboard</a>
            <a href="chat.html">💬 Hartaly Chat</a>
            <a href="mood.html">📈 Mood Tracker</a>
            <a href="journal.html">✍️ Guided Journal</a>
            <a href="cbt.html" class="active">📚 CBT Toolkit</a>
            <a href="breathing.html">🫁 Breathing Room</a>
        </nav>
        <a href="crisis.html" class="btn btn-danger" style="margin-top: auto; padding: 10px;">I need help now</a>
    </div>

    <main class="main-content">
        <header style="margin-bottom: 40px;">
            <h1>CBT Toolkit</h1>
            <p style="color: #666;">Evidence-based exercises to help you manage your thoughts.</p>
            <div style="margin-top: 20px; display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px;">
                <button class="btn btn-secondary btn-sm" onclick="filterCBT('All')">All</button>
                <button class="btn btn-secondary btn-sm" onclick="filterCBT('Anxiety')">Anxiety</button>
                <button class="btn btn-secondary btn-sm" onclick="filterCBT('Depression')">Depression</button>
                <button class="btn btn-secondary btn-sm" onclick="filterCBT('Stress')">Stress</button>
                <button class="btn btn-secondary btn-sm" onclick="filterCBT('Burnout')">Burnout</button>
                <button class="btn btn-secondary btn-sm" onclick="filterCBT('Self-Worth')">Self-Worth</button>
            </div>
        </header>

        <div class="dashboard-grid" id="cbt-list">
            <!-- Exercises injected here -->
        </div>
    </main>

    <!-- Exercise Modal -->
    <div id="exercise-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center;">
        <div class="card" style="max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;">
            <h2 id="modal-title"></h2>
            <p id="modal-desc" style="color: #666; margin: 10px 0;"></p>
            <div id="modal-steps" style="margin: 20px 0;"></div>
            <p><strong>Time:</strong> <span id="modal-time"></span></p>
            <button class="btn btn-primary" style="margin-top: 20px; width: 100%;" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="../shared/app.js"></script>
    <script>
        let allExercises = [];

        async function loadExercises() {
            const response = await fetch('../data/cbt-exercises.json');
            allExercises = await response.json();
            renderExercises(allExercises);
        }

        function renderExercises(list) {
            const container = document.getElementById('cbt-list');
            container.innerHTML = '';
            list.forEach(ex => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span style="font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--calm-sage);">${ex.category}</span>
                    <h4 style="margin: 5px 0;">${ex.title}</h4>
                    <p style="font-size: 14px; color: #777; margin-bottom: 15px;">${ex.description}</p>
                    <button class="btn btn-secondary btn-sm" onclick='openModal(${JSON.stringify(ex).replace(/'/g, "&apos;")})'>Start Exercise</button>
                `;
                container.appendChild(card);
            });
        }

        function filterCBT(cat) {
            if (cat === 'All') renderExercises(allExercises);
            else renderExercises(allExercises.filter(e => e.category === cat));
        }

        function openModal(ex) {
            document.getElementById('modal-title').innerText = ex.title;
            document.getElementById('modal-desc').innerText = ex.description;
            document.getElementById('modal-time').innerText = ex.time;
            
            const stepsDiv = document.getElementById('modal-steps');
            stepsDiv.innerHTML = '<ol>' + ex.instructions.map(s => `<li style="margin-bottom:10px;">${s}</li>`).join('') + '</ol>';
            
            document.getElementById('exercise-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('exercise-modal').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', loadExercises);
    </script>
</body>
</html>
