<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Hartaly</title>
    <link rel="stylesheet" href="../shared/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background-color: var(--soft-gray);">
    <div class="sidebar">
        <a href="../landing/index.html" class="logo">Hartaly</a>
        <nav class="sidebar-nav">
            <a href="dashboard.html">🏠 Dashboard</a>
            <a href="chat.html" class="active">💬 Hartaly Chat</a>
            <a href="mood.html">📈 Mood Tracker</a>
            <a href="journal.html">✍️ Guided Journal</a>
            <a href="cbt.html">📚 CBT Toolkit</a>
            <a href="breathing.html">🫁 Breathing Room</a>
        </nav>
        <a href="crisis.html" class="btn btn-danger" style="margin-top: auto; padding: 10px;">I need help now</a>
    </div>

    <main class="main-content" style="padding: 20px;">
        <div class="chat-container">
            <div class="chat-messages" id="chat-window">
                <div class="message bot">
                    Hello, I'm Hartaly. I'm so glad you're here. How are things feeling for you right now?
                </div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Type what's on your mind..." onkeypress="if(event.key === 'Enter') handleSend()">
                <button class="btn btn-primary" onclick="handleSend()">Send</button>
            </div>
        </div>
    </main>

    <script src="../shared/app.js"></script>
    <script>
        let chatHistory = [];

        async function handleSend() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            // Add user message to UI
            appendMessage(message, 'user');
            input.value = '';

            // Loading state
            const loadingMsg = appendMessage("Thinking...", 'bot', true);

            // Get AI response
            const response = await sendMessageToHartaly(message, chatHistory);
            
            // Remove loading
            loadingMsg.remove();

            if (response) {
                appendMessage(response, 'bot');
                chatHistory.push({ role: "user", content: message });
                chatHistory.push({ role: "assistant", content: response });
            }
        }

        function appendMessage(text, sender, isLoading = false) {
            const chatWindow = document.getElementById('chat-window');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerText = text;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return msgDiv;
        }
    </script>
</body>
</html>
