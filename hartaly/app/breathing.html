<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathing Room | Hartaly</title>
    <link rel="stylesheet" href="../shared/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .breathing-circle {
            transition: all 4s ease-in-out;
        }
        
        /* 4-7-8 Animation (In 4, Hold 7, Out 8) - Rough approximation with CSS */
        @keyframes breathe-4-7-8 {
            0% { transform: scale(1); }
            21% { transform: scale(1.5); } /* In 4 */
            58% { transform: scale(1.5); } /* Hold 7 */
            100% { transform: scale(1); }  /* Out 8 */
        }

        /* Box Breathing (In 4, Hold 4, Out 4, Hold 4) */
        @keyframes breathe-box {
            0% { transform: scale(1); }
            25% { transform: scale(1.5); }
            50% { transform: scale(1.5); }
            75% { transform: scale(1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="../landing/index.html" class="logo">Hartaly</a>
        <nav class="sidebar-nav">
            <a href="dashboard.html">🏠 Dashboard</a>
            <a href="chat.html">💬 Hartaly Chat</a>
            <a href="mood.html">📈 Mood Tracker</a>
            <a href="journal.html">✍️ Guided Journal</a>
            <a href="cbt.html">📚 CBT Toolkit</a>
            <a href="breathing.html" class="active">🫁 Breathing Room</a>
        </nav>
        <a href="crisis.html" class="btn btn-danger" style="margin-top: auto; padding: 10px;">I need help now</a>
    </div>

    <main class="main-content" style="text-align: center;">
        <header style="margin-bottom: 40px; text-align: left;">
            <h1>Breathing Room</h1>
            <p style="color: #666;">Return to your center with these guided techniques.</p>
        </header>

        <div class="card" style="max-width: 600px; margin: 0 auto; padding: 50px;">
            <h2 id="breathing-title">Box Breathing</h2>
            <p id="breathing-subtitle" style="color: #888; margin-bottom: 30px;">Follow the circle. Breathe in, hold, breathe out, hold.</p>
            
            <div id="visual-guide" class="breathing-circle">
                <span id="breathing-text">In</span>
            </div>

            <div style="margin-top: 50px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                <button class="btn btn-secondary btn-sm" onclick="startBreathing('Box Breathing', 'breathe-box', 16)">Box (4-4-4-4)</button>
                <button class="btn btn-secondary btn-sm" onclick="startBreathing('4-7-8 Relax', 'breathe-4-7-8', 19)">4-7-8</button>
                <button class="btn btn-secondary btn-sm" onclick="startBreathing('Belly Breath', 'breathe-box', 10)">2-1-4-1</button>
            </div>
            
            <button class="btn btn-primary" style="margin-top: 30px; width: 100%;" onclick="stopBreathing()">Stop Session</button>
        </div>
    </main>

    <script src="../shared/app.js"></script>
    <script>
        let intervalId = null;

        function startBreathing(name, animation, totalTime) {
            stopBreathing();
            document.getElementById('breathing-title').innerText = name;
            const circle = document.getElementById('visual-guide');
            circle.style.animation = `${animation} ${totalTime}s infinite linear`;
            
            // Audio cue every cycle
            playChime();
            intervalId = setInterval(() => {
                playChime();
            }, totalTime * 1000);

            // Simple text switcher logic (can be expanded)
            updateText(name);
        }

        function updateText(name) {
            const text = document.getElementById('breathing-text');
            // Simplified logic for demo
            if (name === 'Box Breathing') {
                let cycle = 0;
                const labels = ['In', 'Hold', 'Out', 'Hold'];
                const textInterval = setInterval(() => {
                    text.innerText = labels[cycle % 4];
                    cycle++;
                }, 4000);
                window.textInterval = textInterval;
            }
        }

        function stopBreathing() {
            const circle = document.getElementById('visual-guide');
            circle.style.animation = 'none';
            if (intervalId) clearInterval(intervalId);
            if (window.textInterval) clearInterval(window.textInterval);
            document.getElementById('breathing-text').innerText = 'Ready?';
        }
    </script>
</body>
</html>
